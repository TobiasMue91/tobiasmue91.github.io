<script>
    /* ═══════════════════════════════════════════
       SOUND ENGINE (Web Audio API)
       ═══════════════════════════════════════════ */
    const Sound = (() => {
        let ctx, enabled = true;
        const getCtx = () => {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            return ctx;
        };
        const play = (freq, type, dur, vol = 0.15) => {
            if (!enabled) return;
            try {
                const c = getCtx(), o = c.createOscillator(), g = c.createGain();
                o.type = type;
                o.frequency.value = freq;
                g.gain.setValueAtTime(vol, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
                o.connect(g);
                g.connect(c.destination);
                o.start();
                o.stop(c.currentTime + dur);
            } catch {
            }
        };
        return {
            get enabled() {
                return enabled;
            },
            set enabled(v) {
                enabled = v;
            },
            add: () => {
                play(880, 'sine', 0.1, 0.08);
                setTimeout(() => play(1320, 'sine', 0.12, 0.06), 60);
            },
            complete: () => {
                play(523, 'sine', 0.15, 0.1);
                setTimeout(() => play(659, 'sine', 0.15, 0.1), 80);
                setTimeout(() => play(784, 'sine', 0.2, 0.08), 160);
            },
            uncomplete: () => play(440, 'triangle', 0.12, 0.06),
            remove: () => play(220, 'triangle', 0.15, 0.08),
            tick: () => play(600, 'sine', 0.03, 0.04),
            timerDone: () => {
                [0, 200, 400, 600].forEach((d, i) => setTimeout(() => play(i % 2 ? 880 : 660, 'sine', 0.18, 0.12), d));
            }
        };
    })();

    /* ═══════════════════════════════════════════
       PARTICLE SYSTEM
       ═══════════════════════════════════════════ */
    const Particles = (() => {
        const canvas = document.getElementById('particle-canvas');
        const pCtx = canvas.getContext('2d');
        let particles = [], raf = null;
        const resize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', resize);
        resize();

        const colors = ['#7c5cf0', '#f0a040', '#0d9465', '#e0365c', '#0c8ed8', '#f59e0b'];

        function burst(x, y, count = 24) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
                const speed = 2 + Math.random() * 4;
                const size = 3 + Math.random() * 4;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2,
                    size,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1,
                    decay: 0.015 + Math.random() * 0.015,
                    gravity: 0.08 + Math.random() * 0.04
                });
            }
            if (!raf) animate();
        }

        function animate() {
            pCtx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.vx *= 0.98;
                p.life -= p.decay;
                if (p.life <= 0) return false;
                pCtx.globalAlpha = p.life;
                pCtx.fillStyle = p.color;
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                pCtx.fill();
                return true;
            });
            pCtx.globalAlpha = 1;
            if (particles.length > 0) {
                raf = requestAnimationFrame(animate);
            } else {
                raf = null;
            }
        }

        return {burst};
    })();

    /* ═══════════════════════════════════════════
       APP STATE & LOGIC
       ═══════════════════════════════════════════ */
    const App = (() => {
        // ─── State ───
        let state = {
            tasks: [],
            filter: 'all',
            search: '',
            view: 'list',
            theme: 'light',
            soundEnabled: true,
            timerVisible: false,
            detailTaskId: null
        };

        // Timer state
        let timer = {
            phase: 'work', // work, break, longBreak
            seconds: 25 * 60,
            running: false,
            interval: null,
            taskId: null,
            workDuration: 25 * 60,
            breakDuration: 5 * 60,
            longBreakDuration: 15 * 60,
            sessions: 0
        };

        // Undo stack
        let undoStack = [];

        const TAG_COLORS = [
            {bg: '#7c5cf01a', color: '#7c5cf0', border: '#7c5cf040'},
            {bg: '#e8930c1a', color: '#c77a08', border: '#e8930c40'},
            {bg: '#0d94651a', color: '#0d9465', border: '#0d946540'},
            {bg: '#e0365c1a', color: '#e0365c', border: '#e0365c40'},
            {bg: '#0c8ed81a', color: '#0c8ed8', border: '#0c8ed840'},
            {bg: '#a855f71a', color: '#a855f7', border: '#a855f740'},
            {bg: '#ec48991a', color: '#ec4899', border: '#ec489940'},
            {bg: '#14b8a61a', color: '#14b8a6', border: '#14b8a640'},
        ];

        // ─── Persistence ───
        function save() {
            try {
                localStorage.setItem('todo_v2_tasks', JSON.stringify(state.tasks));
                localStorage.setItem('todo_v2_prefs', JSON.stringify({
                    theme: state.theme,
                    soundEnabled: state.soundEnabled,
                    view: state.view
                }));
            } catch {
            }
        }

        function load() {
            try {
                const tasks = localStorage.getItem('todo_v2_tasks');
                if (tasks) state.tasks = JSON.parse(tasks);
                const prefs = localStorage.getItem('todo_v2_prefs');
                if (prefs) {
                    const p = JSON.parse(prefs);
                    state.theme = p.theme || 'light';
                    state.soundEnabled = p.soundEnabled !== false;
                    state.view = p.view || 'list';
                } else {
                    if (window.matchMedia('(prefers-color-scheme: dark)').matches) state.theme = 'dark';
                }
            } catch {
            }
        }

        function pushUndo(action, data) {
            undoStack.push({action, data, ts: Date.now()});
            if (undoStack.length > 30) undoStack.shift();
        }

        // ─── Task CRUD ───
        function addTask(title, priority = 'medium', dueDate = null, status = 'todo') {
            if (!title.trim()) return;
            const task = {
                id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2),
                title: title.trim(),
                notes: '',
                priority,
                status,
                dueDate: dueDate || null,
                tags: [],
                subtasks: [],
                createdAt: new Date().toISOString(),
                order: state.tasks.length
            };
            state.tasks.push(task);
            pushUndo('add', {taskId: task.id});
            save();
            Sound.add();
            render();
            return task;
        }

        function updateTask(id, updates) {
            const task = state.tasks.find(t => t.id === id);
            if (!task) return;
            const before = {...task, subtasks: [...task.subtasks], tags: [...task.tags]};
            Object.assign(task, updates);
            pushUndo('update', {taskId: id, before});
            save();
            render();
        }

        function toggleTask(id) {
            const task = state.tasks.find(t => t.id === id);
            if (!task) return;
            const wasDone = task.status === 'done';
            task.status = wasDone ? 'todo' : 'done';
            pushUndo('toggle', {taskId: id, prevStatus: wasDone ? 'done' : 'todo'});
            save();

            if (!wasDone) {
                Sound.complete();
                const el = document.querySelector(`[data-task-id="${id}"]`);
                if (el) {
                    const rect = el.getBoundingClientRect();
                    Particles.burst(rect.left + 20, rect.top + rect.height / 2);
                    el.classList.add('completing');
                }
                showToast('Task completed 🎉');
            } else {
                Sound.uncomplete();
                showToast('Task reopened');
            }
            render();
        }

        function deleteTask(id) {
            const idx = state.tasks.findIndex(t => t.id === id);
            if (idx === -1) return;
            const removed = state.tasks.splice(idx, 1)[0];
            pushUndo('delete', {task: removed, index: idx});
            save();
            Sound.remove();
            closeDetail();
            showToast('Task deleted', true);
            render();
        }

        function undo() {
            const entry = undoStack.pop();
            if (!entry) return;
            switch (entry.action) {
                case 'add':
                    state.tasks = state.tasks.filter(t => t.id !== entry.data.taskId);
                    break;
                case 'delete':
                    state.tasks.splice(entry.data.index, 0, entry.data.task);
                    break;
                case 'toggle': {
                    const t = state.tasks.find(t => t.id === entry.data.taskId);
                    if (t) t.status = entry.data.prevStatus;
                    break;
                }
                case 'update': {
                    const idx = state.tasks.findIndex(t => t.id === entry.data.taskId);
                    if (idx !== -1) state.tasks[idx] = entry.data.before;
                    break;
                }
                case 'clear':
                    state.tasks.push(...entry.data.tasks);
                    break;
            }
            save();
            render();
            showToast('Undone');
        }

        function clearCompleted() {
            const completed = state.tasks.filter(t => t.status === 'done');
            if (!completed.length) return;
            pushUndo('clear', {tasks: completed});
            state.tasks = state.tasks.filter(t => t.status !== 'done');
            save();
            render();
            showToast(`Cleared ${completed.length} completed task${completed.length > 1 ? 's' : ''}`, true);
        }

        // ─── Filters ───
        function getFiltered() {
            let tasks = [...state.tasks];
            if (state.search) {
                const s = state.search.toLowerCase();
                tasks = tasks.filter(t =>
                    t.title.toLowerCase().includes(s) ||
                    t.notes.toLowerCase().includes(s) ||
                    t.tags.some(tag => tag.toLowerCase().includes(s))
                );
            }
            switch (state.filter) {
                case 'active':
                    tasks = tasks.filter(t => t.status !== 'done');
                    break;
                case 'completed':
                    tasks = tasks.filter(t => t.status === 'done');
                    break;
                case 'today':
                    tasks = tasks.filter(t => t.dueDate && isToday(t.dueDate));
                    break;
                case 'overdue':
                    tasks = tasks.filter(t => t.dueDate && isOverdue(t.dueDate) && t.status !== 'done');
                    break;
                case 'urgent':
                    tasks = tasks.filter(t => t.priority === 'urgent' || t.priority === 'high');
                    break;
            }
            // Sort: incomplete first, then by priority, then by due date, then by order
            const pVal = {urgent: 0, high: 1, medium: 2, low: 3};
            tasks.sort((a, b) => {
                if ((a.status === 'done') !== (b.status === 'done')) return a.status === 'done' ? 1 : -1;
                if (pVal[a.priority] !== pVal[b.priority]) return pVal[a.priority] - pVal[b.priority];
                if (a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
                if (a.dueDate) return -1;
                if (b.dueDate) return 1;
                return (a.order || 0) - (b.order || 0);
            });
            return tasks;
        }

        // ─── Date helpers ───
        function isToday(d) {
            const t = new Date();
            t.setHours(0, 0, 0, 0);
            const dt = new Date(d + 'T00:00:00');
            dt.setHours(0, 0, 0, 0);
            return dt.getTime() === t.getTime();
        }

        function isTomorrow(d) {
            const t = new Date();
            t.setHours(0, 0, 0, 0);
            t.setDate(t.getDate() + 1);
            const dt = new Date(d + 'T00:00:00');
            dt.setHours(0, 0, 0, 0);
            return dt.getTime() === t.getTime();
        }

        function isOverdue(d) {
            const t = new Date();
            t.setHours(0, 0, 0, 0);
            const dt = new Date(d + 'T00:00:00');
            dt.setHours(0, 0, 0, 0);
            return dt < t;
        }

        function formatDate(d) {
            if (!d) return '';
            if (isToday(d)) return 'Today';
            if (isTomorrow(d)) return 'Tomorrow';
            const dt = new Date(d + 'T00:00:00');
            const yesterday = new Date();
            yesterday.setHours(0, 0, 0, 0);
            yesterday.setDate(yesterday.getDate() - 1);
            if (dt.getTime() === yesterday.getTime()) return 'Yesterday';
            const now = new Date();
            const sameYear = dt.getFullYear() === now.getFullYear();
            return dt.toLocaleDateString(undefined, {
                month: 'short',
                day: 'numeric', ...(sameYear ? {} : {year: 'numeric'})
            });
        }

        function dueDateClass(d) {
            if (!d) return '';
            if (isOverdue(d)) return 'overdue';
            if (isToday(d)) return 'today';
            if (isTomorrow(d)) return 'tomorrow';
            return '';
        }

        function todayStr() {
            return new Date().toISOString().split('T')[0];
        }

        // ─── Tag color ───
        function tagColor(tag) {
            let hash = 0;
            for (let i = 0; i < tag.length; i++) hash = tag.charCodeAt(i) + ((hash << 5) - hash);
            return TAG_COLORS[Math.abs(hash) % TAG_COLORS.length];
        }

        // ─── Toast system ───
        function showToast(msg, undoable = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<span>${msg}</span>` + (undoable ? `<button class="toast-undo" onclick="App.undo();this.closest('.toast').remove()">Undo</button>` : '');
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('leaving');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ─── Theme ───
        function setTheme(t) {
            state.theme = t;
            document.documentElement.setAttribute('data-theme', t);
            document.getElementById('themeIconMoon').style.display = t === 'dark' ? 'none' : '';
            document.getElementById('themeIconSun').style.display = t === 'dark' ? '' : 'none';
            save();
        }

        function toggleTheme() {
            setTheme(state.theme === 'dark' ? 'light' : 'dark');
        }

        // ─── Sound toggle ───
        function toggleSound() {
            state.soundEnabled = !state.soundEnabled;
            Sound.enabled = state.soundEnabled;
            const btn = document.getElementById('soundToggle');
            btn.classList.toggle('active', state.soundEnabled);
            save();
            showToast(state.soundEnabled ? 'Sound on' : 'Sound off');
        }

        // ─── View toggle ───
        function setView(v) {
            state.view = v;
            document.getElementById('viewList').classList.toggle('active', v === 'list');
            document.getElementById('viewBoard').classList.toggle('active', v === 'board');
            save();
            render();
        }

        // ─── Shortcuts modal ───
        function toggleShortcuts() {
            document.getElementById('shortcutsModal').classList.toggle('open');
        }

        // ─── Detail panel ───
        function openDetail(id) {
            state.detailTaskId = id;
            renderDetail();
            document.getElementById('overlay').classList.add('open');
            document.getElementById('detailPanel').classList.add('open');
        }

        function closeDetail() {
            state.detailTaskId = null;
            document.getElementById('overlay').classList.remove('open');
            document.getElementById('detailPanel').classList.remove('open');
        }

        // ─── Timer ───
        function toggleTimer() {
            state.timerVisible = !state.timerVisible;
            document.getElementById('timerToggle').classList.toggle('active', state.timerVisible);
            renderTimer();
        }

        function startTimer() {
            if (timer.running) return;
            timer.running = true;
            timer.interval = setInterval(() => {
                timer.seconds--;
                if (timer.seconds <= 0) {
                    clearInterval(timer.interval);
                    timer.running = false;
                    Sound.timerDone();
                    if (timer.phase === 'work') {
                        timer.sessions++;
                        if (timer.sessions % 4 === 0) {
                            timer.phase = 'longBreak';
                            timer.seconds = timer.longBreakDuration;
                        } else {
                            timer.phase = 'break';
                            timer.seconds = timer.breakDuration;
                        }
                        showToast('Focus session done! Take a break. 🧘');
                    } else {
                        timer.phase = 'work';
                        timer.seconds = timer.workDuration;
                        showToast('Break over — time to focus! 🔥');
                    }
                }
                renderTimer();
            }, 1000);
            renderTimer();
        }

        function pauseTimer() {
            timer.running = false;
            clearInterval(timer.interval);
            renderTimer();
        }

        function resetTimer() {
            pauseTimer();
            switch (timer.phase) {
                case 'work':
                    timer.seconds = timer.workDuration;
                    break;
                case 'break':
                    timer.seconds = timer.breakDuration;
                    break;
                case 'longBreak':
                    timer.seconds = timer.longBreakDuration;
                    break;
            }
            renderTimer();
        }

        function setTimerPhase(phase) {
            pauseTimer();
            timer.phase = phase;
            switch (phase) {
                case 'work':
                    timer.seconds = timer.workDuration;
                    break;
                case 'break':
                    timer.seconds = timer.breakDuration;
                    break;
                case 'longBreak':
                    timer.seconds = timer.longBreakDuration;
                    break;
            }
            renderTimer();
        }

        function formatTimer(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        // ─── Export / Import ───
        function exportTasks() {
            const data = JSON.stringify(state.tasks, null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tasks.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Tasks exported');
        }

        function importTasks() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = async (e) => {
                try {
                    const text = await e.target.files[0].text();
                    const imported = JSON.parse(text);
                    if (Array.isArray(imported)) {
                        pushUndo('clear', {tasks: [...state.tasks]});
                        state.tasks = imported;
                        save();
                        render();
                        showToast(`Imported ${imported.length} tasks`);
                    }
                } catch {
                    showToast('Invalid file');
                }
            };
            input.click();
        }

        // ─── Drag & Drop (List) ───
        let dragId = null;

        function onDragStart(e, id) {
            dragId = id;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
            setTimeout(() => render(), 0);
        }

        function onDragEnd(e) {
            dragId = null;
            e.target.classList.remove('dragging');
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        }

        function onDragOver(e, targetId) {
            e.preventDefault();
            if (dragId === targetId) return;
            e.currentTarget.classList.add('drag-over');
        }

        function onDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function onDrop(e, targetId) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (!dragId || dragId === targetId) return;
            const fromIdx = state.tasks.findIndex(t => t.id === dragId);
            const toIdx = state.tasks.findIndex(t => t.id === targetId);
            if (fromIdx === -1 || toIdx === -1) return;
            const [moved] = state.tasks.splice(fromIdx, 1);
            state.tasks.splice(toIdx, 0, moved);
            state.tasks.forEach((t, i) => t.order = i);
            save();
            render();
        }

        // Board drag & drop
        function onBoardDragStart(e, id) {
            dragId = id;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }

        function onBoardDragEnd(e) {
            dragId = null;
            e.target.classList.remove('dragging');
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        }

        function onColumnDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function onColumnDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function onColumnDrop(e, status) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (!dragId) return;
            const task = state.tasks.find(t => t.id === dragId);
            if (task) {
                const prev = task.status;
                task.status = status;
                if (status === 'done' && prev !== 'done') {
                    Sound.complete();
                    const rect = e.currentTarget.getBoundingClientRect();
                    Particles.burst(rect.left + rect.width / 2, rect.top + 30, 16);
                    showToast('Task completed 🎉');
                }
                save();
                render();
            }
        }

        // ═══════════════════════════════════════════
        //   RENDER
        // ═══════════════════════════════════════════
        function render() {
            renderStats();
            renderFilters();
            renderContent();
            renderTimer();
        }

        function renderStats() {
            const total = state.tasks.length;
            const done = state.tasks.filter(t => t.status === 'done').length;
            const active = total - done;
            const overdue = state.tasks.filter(t => t.dueDate && isOverdue(t.dueDate) && t.status !== 'done').length;
            const pct = total ? Math.round((done / total) * 100) : 0;
            const circumference = 2 * Math.PI * 15;
            const offset = circumference - (pct / 100) * circumference;

            document.getElementById('statsBar').innerHTML = `
            <div class="stat">
                <div class="stat-ring">
                    <svg width="38" height="38" viewBox="0 0 38 38">
                        <circle class="stat-ring-track" cx="19" cy="19" r="15"/>
                        <circle class="stat-ring-fill" cx="19" cy="19" r="15"
                            stroke-dasharray="${circumference}"
                            stroke-dashoffset="${offset}"/>
                    </svg>
                    <div class="stat-ring-text">${pct}%</div>
                </div>
                <div>
                    <div class="stat-value">${done}<span style="font-size:12px;color:var(--text-tertiary);font-weight:400">/${total}</span></div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-mini"><div class="stat-dot" style="background:var(--sky)"></div>${active} active</div>
            <div class="stat-mini"><div class="stat-dot" style="background:var(--rose)"></div>${overdue} overdue</div>
            ${done > 0 ? `<div style="margin-left:auto"><button class="chip" onclick="App.clearCompleted()" style="font-size:11px">Clear done</button></div>` : ''}
        `;
        }

        function renderFilters() {
            const counts = {
                all: state.tasks.length,
                active: state.tasks.filter(t => t.status !== 'done').length,
                completed: state.tasks.filter(t => t.status === 'done').length,
                today: state.tasks.filter(t => t.dueDate && isToday(t.dueDate)).length,
                overdue: state.tasks.filter(t => t.dueDate && isOverdue(t.dueDate) && t.status !== 'done').length,
                urgent: state.tasks.filter(t => t.priority === 'urgent' || t.priority === 'high').length
            };
            const filters = [
                {key: 'all', label: 'All'},
                {key: 'active', label: 'Active'},
                {key: 'completed', label: 'Done'},
                {key: 'today', label: 'Today'},
                {key: 'overdue', label: 'Overdue'},
                {key: 'urgent', label: 'Priority'}
            ];
            document.getElementById('filterChips').innerHTML = filters.map(f =>
                `<button class="chip${state.filter === f.key ? ' active' : ''}" onclick="App.setFilter('${f.key}')">${f.label}<span class="chip-count">${counts[f.key]}</span></button>`
            ).join('');
        }

        function renderContent() {
            const area = document.getElementById('contentArea');
            const tasks = getFiltered();

            if (state.tasks.length === 0) {
                area.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📝</div>
                    <div class="empty-title">No tasks yet</div>
                    <div class="empty-subtitle">Add your first task below, or press <span class="kbd" style="display:inline-flex">N</span> to get started.</div>
                </div>`;
                return;
            }

            if (tasks.length === 0) {
                area.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🔍</div>
                    <div class="empty-title">No matching tasks</div>
                    <div class="empty-subtitle">Try a different filter or search term.</div>
                </div>`;
                return;
            }

            if (state.view === 'board') {
                renderBoard(area, tasks);
            } else {
                renderList(area, tasks);
            }
        }

        function taskHTML(task, isBoard = false) {
            const isDone = task.status === 'done';
            const dueClass = task.dueDate ? dueDateClass(task.dueDate) : '';
            const dueStr = formatDate(task.dueDate);
            const stDone = task.subtasks.filter(s => s.done).length;
            const stTotal = task.subtasks.length;
            const stPct = stTotal ? (stDone / stTotal) * 100 : 0;

            const metaHTML = `
            ${task.tags.map(tag => {
                const c = tagColor(tag);
                return `<span class="task-tag" style="background:${c.bg};color:${c.color};border:1px solid ${c.border}">${tag}</span>`;
            }).join('')}
            ${task.dueDate ? `<span class="task-due ${dueClass}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                ${dueStr}
            </span>` : ''}
            ${stTotal ? `<span class="subtask-indicator">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                ${stDone}/${stTotal}
                <div class="subtask-progress-bar"><div class="subtask-progress-fill" style="width:${stPct}%"></div></div>
            </span>` : ''}
        `;

            if (isBoard) {
                return `
                <div class="board-task${isDone ? ' done' : ''}" data-task-id="${task.id}"
                    draggable="true"
                    ondragstart="App.onBoardDragStart(event,'${task.id}')"
                    ondragend="App.onBoardDragEnd(event)"
                    onclick="App.openDetail('${task.id}')">
                    <div class="priority-bar p-${task.priority}"></div>
                    <div class="task-title">${escHTML(task.title)}</div>
                    ${(task.tags.length || task.dueDate || stTotal) ? `<div class="task-meta">${metaHTML}</div>` : ''}
                </div>`;
            }

            return `
            <div class="task-item${isDone ? ' done' : ''}" data-task-id="${task.id}"
                draggable="true"
                ondragstart="App.onDragStart(event,'${task.id}')"
                ondragend="App.onDragEnd(event)"
                ondragover="App.onDragOver(event,'${task.id}')"
                ondragleave="App.onDragLeave(event)"
                ondrop="App.onDrop(event,'${task.id}')">
                <div class="priority-bar p-${task.priority}"></div>
                <label class="checkbox-wrap">
                    <input type="checkbox" ${isDone ? 'checked' : ''} onchange="App.toggleTask('${task.id}')">
                    <div class="checkbox-visual">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                </label>
                <div class="task-body" onclick="App.openDetail('${task.id}')">
                    <div class="task-title">${escHTML(task.title)}</div>
                    ${(task.tags.length || task.dueDate || stTotal) ? `<div class="task-meta">${metaHTML}</div>` : ''}
                </div>
                <div class="task-actions">
                    <button class="task-action-btn" onclick="event.stopPropagation();App.startTimerFor('${task.id}')" title="Focus on this">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </button>
                    <button class="task-action-btn delete" onclick="event.stopPropagation();App.deleteTask('${task.id}')" title="Delete">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </div>
            </div>`;
        }

        function renderList(area) {
            const tasks = getFiltered();
            area.innerHTML = `<div class="task-list">${tasks.map(t => taskHTML(t)).join('')}</div>`;
        }

        function renderBoard(area) {
            const tasks = getFiltered();
            const todo = tasks.filter(t => t.status === 'todo');
            const progress = tasks.filter(t => t.status === 'progress');
            const done = tasks.filter(t => t.status === 'done');

            area.innerHTML = `
            <div class="board">
                <div class="board-column col-todo">
                    <div class="board-column-header">To Do <span class="board-column-count">${todo.length}</span></div>
                    <div class="board-tasks" ondragover="App.onColumnDragOver(event)" ondragleave="App.onColumnDragLeave(event)" ondrop="App.onColumnDrop(event,'todo')">
                        ${todo.map(t => taskHTML(t, true)).join('')}
                    </div>
                    <button class="board-add-btn" onclick="document.getElementById('addInput').focus()">+ Add task</button>
                </div>
                <div class="board-column col-progress">
                    <div class="board-column-header">In Progress <span class="board-column-count">${progress.length}</span></div>
                    <div class="board-tasks" ondragover="App.onColumnDragOver(event)" ondragleave="App.onColumnDragLeave(event)" ondrop="App.onColumnDrop(event,'progress')">
                        ${progress.map(t => taskHTML(t, true)).join('')}
                    </div>
                </div>
                <div class="board-column col-done">
                    <div class="board-column-header">Done <span class="board-column-count">${done.length}</span></div>
                    <div class="board-tasks" ondragover="App.onColumnDragOver(event)" ondragleave="App.onColumnDragLeave(event)" ondrop="App.onColumnDrop(event,'done')">
                        ${done.map(t => taskHTML(t, true)).join('')}
                    </div>
                </div>
            </div>`;
        }

        function renderTimer() {
            const widget = document.getElementById('timerWidget');
            widget.classList.toggle('visible', state.timerVisible);
            if (!state.timerVisible) return;

            const taskName = timer.taskId ? (state.tasks.find(t => t.id === timer.taskId)?.title || '') : '';
            widget.innerHTML = `
            <div class="timer-header">
                <div class="timer-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Pomodoro${timer.sessions ? ` · Session ${timer.sessions}` : ''}
                </div>
                ${taskName ? `<div class="timer-task-name">🎯 ${escHTML(taskName)}</div>` : ''}
            </div>
            <div class="timer-display">
                <div class="timer-time">${formatTimer(timer.seconds)}</div>
            </div>
            <div class="timer-controls">
                ${timer.running
                ? `<button class="timer-btn timer-btn-pause" onclick="App.pauseTimer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>Pause</button>`
                : `<button class="timer-btn timer-btn-start" onclick="App.startTimer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>Start</button>`}
                <button class="timer-btn timer-btn-reset" onclick="App.resetTimer()">Reset</button>
            </div>
            <div class="timer-phases">
                <button class="timer-phase${timer.phase === 'work' ? ' active' : ''}" onclick="App.setTimerPhase('work')">Work 25m</button>
                <button class="timer-phase${timer.phase === 'break' ? ' active' : ''}" onclick="App.setTimerPhase('break')">Break 5m</button>
                <button class="timer-phase${timer.phase === 'longBreak' ? ' active' : ''}" onclick="App.setTimerPhase('longBreak')">Long 15m</button>
            </div>
        `;
        }

        function renderDetail() {
            const panel = document.getElementById('detailPanel');
            const task = state.tasks.find(t => t.id === state.detailTaskId);
            if (!task) {
                panel.innerHTML = '';
                return;
            }

            const stDone = task.subtasks.filter(s => s.done).length;
            const stTotal = task.subtasks.length;

            panel.innerHTML = `
            <div class="detail-header">
                <div class="detail-header-title">Task Details</div>
                <button class="btn-icon" onclick="App.closeDetail()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="detail-body">
                <div class="detail-field">
                    <label class="detail-label">Title</label>
                    <input class="detail-input" id="detailTitle" value="${escAttr(task.title)}" onchange="App.updateTaskField('title', this.value)">
                </div>
                <div class="detail-field">
                    <label class="detail-label">Notes</label>
                    <textarea class="detail-textarea" id="detailNotes" placeholder="Add notes..." onchange="App.updateTaskField('notes', this.value)">${escHTML(task.notes)}</textarea>
                </div>
                <div class="detail-field">
                    <label class="detail-label">Status</label>
                    <div class="priority-picker">
                        <button class="priority-option${task.status === 'todo' ? ' selected p-medium' : ''}" onclick="App.updateTaskField('status','todo')" style="${task.status === 'todo' ? 'background:var(--sky);border-color:var(--sky);color:#fff' : ''}">To Do</button>
                        <button class="priority-option${task.status === 'progress' ? ' selected p-high' : ''}" onclick="App.updateTaskField('status','progress')" style="${task.status === 'progress' ? 'background:var(--amber);border-color:var(--amber);color:#fff' : ''}">In Progress</button>
                        <button class="priority-option${task.status === 'done' ? ' selected p-urgent' : ''}" onclick="App.updateTaskField('status','done')" style="${task.status === 'done' ? 'background:var(--emerald);border-color:var(--emerald);color:#fff' : ''}">Done</button>
                    </div>
                </div>
                <div class="detail-field">
                    <label class="detail-label">Priority</label>
                    <div class="priority-picker">
                        ${['low', 'medium', 'high', 'urgent'].map(p =>
                `<button class="priority-option p-${p}${task.priority === p ? ' selected' : ''}" onclick="App.updateTaskField('priority','${p}')">${p}</button>`
            ).join('')}
                    </div>
                </div>
                <div class="detail-field">
                    <label class="detail-label">Due Date</label>
                    <input type="date" class="detail-input" value="${task.dueDate || ''}" onchange="App.updateTaskField('dueDate', this.value || null)">
                </div>
                <div class="detail-field">
                    <label class="detail-label">Tags</label>
                    <div class="tags-field" id="tagsField">
                        ${task.tags.map((tag, i) => {
                const c = tagColor(tag);
                return `<span class="tag-chip" style="background:${c.bg};color:${c.color}">${escHTML(tag)}<span class="tag-remove" onclick="App.removeTag(${i})">×</span></span>`;
            }).join('')}
                        <input class="tag-add-input" placeholder="+ Tag" id="tagInput"
                            onkeydown="if(event.key==='Enter'){event.preventDefault();App.addTag(this.value);this.value=''}">
                    </div>
                </div>
                <div class="detail-field">
                    <label class="detail-label">Subtasks${stTotal ? ` · ${stDone}/${stTotal}` : ''}</label>
                    <div class="subtask-list" id="subtaskList">
                        ${task.subtasks.map((st, i) => `
                            <div class="subtask-row">
                                <input type="checkbox" ${st.done ? 'checked' : ''} onchange="App.toggleSubtask(${i})">
                                <input class="subtask-text${st.done ? ' done' : ''}" value="${escAttr(st.text)}" onchange="App.updateSubtask(${i}, this.value)">
                                <button class="subtask-delete" onclick="App.removeSubtask(${i})">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                </button>
                            </div>
                        `).join('')}
                        <button class="subtask-add" onclick="App.addSubtask()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Add subtask
                        </button>
                    </div>
                </div>
            </div>
            <div class="detail-footer">
                <button class="btn btn-ghost btn-danger" onclick="App.deleteTask('${task.id}')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    Delete task
                </button>
                <div style="font-size:11px;color:var(--text-tertiary)">
                    Created ${new Date(task.createdAt).toLocaleDateString()}
                </div>
            </div>
        `;
        }

        // Detail field updates (avoid full re-render to keep focus)
        function updateTaskField(field, value) {
            const task = state.tasks.find(t => t.id === state.detailTaskId);
            if (!task) return;
            task[field] = value;
            save();
            renderStats();
            renderFilters();
            renderContent();
            // Re-render detail for status/priority changes
            if (field === 'status' || field === 'priority') renderDetail();
        }

        function addTag(tag) {
            if (!tag.trim()) return;
            const task = state.tasks.find(t => t.id === state.detailTaskId);
            if (!task || task.tags.includes(tag.trim())) return;
            task.tags.push(tag.trim());
            save();
            renderDetail();
            renderContent();
        }

        function removeTag(idx) {
            const task = state.tasks.find(t => t.id === state.detailTaskId);
            if (!task) return;
            task.tags.splice(idx, 1);
            save();
            renderDetail();
            renderContent();
        }

        function addSubtask() {
            const task = state.tasks.find(t => t.id === state.detailTaskId);
            if (!task) return;
            task.subtasks.push({text: '', done: false});
            save();
            renderDetail();
            // Focus new subtask
            setTimeout(() => {
                const inputs = document.querySelectorAll('#subtaskList .subtask-text');
                if (inputs.length) inputs[inputs.length - 1].focus();
            }, 50);
        }

        function toggleSubtask(idx) {
            const task = state.tasks.find(t => t.id === state.detailTaskId);
            if (!task) return;
            task.subtasks[idx].done = !task.subtasks[idx].done;
            if (task.subtasks[idx].done) Sound.tick();
            save();
            renderDetail();
            renderContent();
        }

        function updateSubtask(idx, text) {
            const task = state.tasks.find(t => t.id === state.detailTaskId);
            if (!task) return;
            task.subtasks[idx].text = text;
            save();
        }

        function removeSubtask(idx) {
            const task = state.tasks.find(t => t.id === state.detailTaskId);
            if (!task) return;
            task.subtasks.splice(idx, 1);
            save();
            renderDetail();
            renderContent();
        }

        function startTimerFor(taskId) {
            timer.taskId = taskId;
            state.timerVisible = true;
            document.getElementById('timerToggle').classList.add('active');
            resetTimer();
            renderTimer();
            showToast('Timer ready — press Start to focus');
        }

        function setFilter(f) {
            state.filter = f;
            render();
        }

        // ─── Utils ───
        function escHTML(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function escAttr(s) {
            return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // ─── Init ───
        function init() {
            load();
            setTheme(state.theme);
            Sound.enabled = state.soundEnabled;
            document.getElementById('soundToggle').classList.toggle('active', state.soundEnabled);
            setView(state.view);

            // Add task
            const addInput = document.getElementById('addInput');
            const addBtn = document.getElementById('addBtn');
            const addPriority = document.getElementById('addPriority');
            const addDate = document.getElementById('addDate');

            addBtn.addEventListener('click', () => {
                const val = addInput.value.trim();
                if (!val) return;
                addTask(val, addPriority.value, addDate.value || null);
                addInput.value = '';
                addDate.value = '';
                addPriority.value = 'medium';
            });
            addInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') addBtn.click();
            });

            // Search
            document.getElementById('searchInput').addEventListener('input', (e) => {
                state.search = e.target.value;
                renderContent();
            });

            // Theme
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);

            // Sound
            document.getElementById('soundToggle').addEventListener('click', toggleSound);

            // Timer
            document.getElementById('timerToggle').addEventListener('click', toggleTimer);

            // Export
            document.getElementById('exportBtn').addEventListener('click', () => {
                const choice = confirm('OK = Export tasks\nCancel = Import from file');
                if (choice) exportTasks();
                else importTasks();
            });

            // Shortcuts
            document.getElementById('shortcutsBtn').addEventListener('click', toggleShortcuts);

            // Overlay close
            document.getElementById('overlay').addEventListener('click', closeDetail);

            // View buttons
            document.getElementById('viewList').addEventListener('click', () => setView('list'));
            document.getElementById('viewBoard').addEventListener('click', () => setView('board'));

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
                    if (e.key === 'Escape') {
                        e.target.blur();
                        closeDetail();
                    }
                    return;
                }
                switch (e.key) {
                    case 'n':
                    case 'N':
                        e.preventDefault();
                        addInput.focus();
                        break;
                    case '/':
                        e.preventDefault();
                        document.getElementById('searchInput').focus();
                        break;
                    case 't':
                    case 'T':
                        toggleTheme();
                        break;
                    case 'p':
                    case 'P':
                        toggleTimer();
                        break;
                    case '?':
                        toggleShortcuts();
                        break;
                    case '1':
                        setView('list');
                        break;
                    case '2':
                        setView('board');
                        break;
                    case 'a':
                        state.filter = 'all';
                        render();
                        break;
                    case 'q':
                        state.filter = 'active';
                        render();
                        break;
                    case 'd':
                        state.filter = 'completed';
                        render();
                        break;
                    case 'Escape':
                        closeDetail();
                        document.getElementById('shortcutsModal').classList.remove('open');
                        break;
                    case 'z':
                        if (e.ctrlKey || e.metaKey) {
                            e.preventDefault();
                            undo();
                        }
                        break;
                }
            });

            render();
        }

        // Run
        init();

        // Public API
        return {
            toggleTask, deleteTask, openDetail, closeDetail, undo, clearCompleted,
            setFilter, onDragStart, onDragEnd, onDragOver, onDragLeave, onDrop,
            onBoardDragStart, onBoardDragEnd, onColumnDragOver, onColumnDragLeave, onColumnDrop,
            startTimer, pauseTimer, resetTimer, setTimerPhase, startTimerFor,
            addTag, removeTag, addSubtask, toggleSubtask, updateSubtask, removeSubtask,
            updateTaskField, toggleShortcuts, toggleTheme, exportTasks, importTasks
        };
    })();
</script>
<script src="../logo.js" data-position="bottom-left"></script>
</body>
