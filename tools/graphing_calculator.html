<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Graphing Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-el: #242424;
            --border: #2e2e2e;
            --text-pri: #e8e8e8;
            --text-sec: #888;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --radius-card: 6px;
            --radius-input: 4px;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: ui-monospace, 'SF Mono', Consolas, monospace;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text-pri);
            font-family: var(--font-sans);
            font-size: 14px
        }

        .app {
            display: flex;
            height: 100%;
            position: relative
        }

        /* SIDEBAR */
        .sidebar {
            width: 300px;
            min-width: 240px;
            max-width: 500px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: relative;
            z-index: 10
        }

        .sidebar.collapsed {
            display: none
        }

        .sidebar-header {
            padding: 16px 16px 0;
            flex-shrink: 0
        }

        .sidebar-header h1 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-pri);
            letter-spacing: -0.3px
        }

        .input-wrapper {
            margin-bottom: 12px
        }

        .input-wrapper label {
            display: block;
            font-size: 12px;
            color: var(--text-sec);
            margin-bottom: 4px
        }

        #funcInput {
            width: 100%;
            padding: 8px 12px;
            background: var(--surface-el);
            border: 1px solid var(--border);
            color: var(--text-pri);
            font-family: var(--font-mono);
            font-size: 14px;
            border-radius: var(--radius-input);
            outline: none;
            transition: border-color 150ms ease
        }

        #funcInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.3)
        }

        #funcInput.valid {
            border-color: #22c55e
        }

        #funcInput.invalid {
            border-color: #ef4444
        }

        .validation-msg {
            font-size: 11px;
            margin-top: 4px;
            height: 16px;
            color: #ef4444;
            font-family: var(--font-mono)
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-input);
            cursor: pointer;
            font-size: 13px;
            font-family: var(--font-sans);
            transition: background 150ms ease
        }

        .btn-primary {
            background: var(--accent);
            color: #fff
        }

        .btn-primary:hover {
            background: var(--accent-hover)
        }

        .btn-secondary {
            background: var(--surface-el);
            color: var(--text-sec);
            border: 1px solid var(--border)
        }

        .btn-secondary:hover {
            background: #2a2a2a;
            color: var(--text-pri)
        }

        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px
        }

        .sidebar-scroll::-webkit-scrollbar {
            width: 6px
        }

        .sidebar-scroll::-webkit-scrollbar-track {
            background: transparent
        }

        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px
        }

        /* FUNCTION LIST */
        .func-list {
            margin-bottom: 16px
        }

        .func-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: var(--surface-el);
            border-radius: var(--radius-card);
            margin-bottom: 8px;
            border: 1px solid transparent;
            transition: border-color 150ms ease;
            cursor: pointer
        }

        .func-item.selected {
            border-color: var(--accent)
        }

        .func-item.flash {
            animation: pulse-flash 400ms ease
        }

        @keyframes pulse-flash {
            0% {
                background: var(--surface-el)
            }
            50% {
                background: #2a3a5a
            }
            100% {
                background: var(--surface-el)
            }
        }

        .func-swatch {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            flex-shrink: 0;
            cursor: pointer;
            position: relative
        }

        .func-expr {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-pri);
            word-break: break-all;
            min-width: 0
        }

        .func-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: var(--radius-input);
            cursor: pointer;
            background: transparent;
            color: var(--text-sec);
            transition: background 150ms ease, color 150ms ease
        }

        .icon-btn:hover {
            background: var(--border);
            color: var(--text-pri)
        }

        .icon-btn.hidden-func {
            color: #555
        }

        .empty-state {
            text-align: center;
            padding: 24px 16px;
            color: var(--text-sec);
            font-size: 13px;
            line-height: 1.6
        }

        /* COLOR PICKER POPUP */
        .color-picker-popup {
            position: absolute;
            background: var(--surface-el);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 8px;
            display: grid;
            grid-template-columns:repeat(4, 24px);
            gap: 4px;
            z-index: 100;
            display: none
        }

        .color-picker-popup.visible {
            display: grid
        }

        .color-opt {
            width: 24px;
            height: 24px;
            border-radius: 3px;
            border: 2px solid transparent;
            cursor: pointer
        }

        .color-opt:hover, .color-opt.active {
            border-color: #fff
        }

        /* PRESETS */
        .presets-section {
            margin-top: 8px
        }

        .preset-category {
            margin-bottom: 8px
        }

        .preset-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 0;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-sec);
            user-select: none
        }

        .preset-header:hover {
            color: var(--text-pri)
        }

        .preset-arrow {
            transition: transform 150ms ease;
            font-size: 10px
        }

        .preset-header.open .preset-arrow {
            transform: rotate(90deg)
        }

        .preset-body {
            display: none;
            flex-wrap: wrap;
            gap: 4px;
            padding: 4px 0
        }

        .preset-body.open {
            display: flex
        }

        .preset-btn {
            padding: 4px 8px;
            background: var(--surface-el);
            border: 1px solid var(--border);
            border-radius: var(--radius-input);
            color: var(--text-sec);
            font-family: var(--font-mono);
            font-size: 11px;
            cursor: pointer;
            transition: background 150ms ease, color 150ms ease
        }

        .preset-btn:hover {
            background: var(--border);
            color: var(--text-pri)
        }

        /* RESIZE HANDLE */
        .resize-handle {
            width: 5px;
            background: transparent;
            cursor: col-resize;
            flex-shrink: 0;
            position: relative;
            z-index: 11
        }

        .resize-handle::after {
            content: '';
            position: absolute;
            left: 2px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--border)
        }

        .resize-handle:hover::after, .resize-handle:active::after {
            background: var(--accent);
            width: 3px;
            left: 1px
        }

        /* MAIN AREA */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative
        }

        .canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden
        }

        canvas {
            display: block;
            cursor: crosshair
        }

        canvas.grabbing {
            cursor: grabbing
        }

        /* SIDEBAR TOGGLE */
        .sidebar-toggle {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 20;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-input);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-sec);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background 150ms ease
        }

        .sidebar-toggle:hover {
            background: var(--surface-el);
            color: var(--text-pri)
        }

        .sidebar-toggle.visible {
            display: flex
        }

        /* BOTTOM TOOLBAR */
        .toolbar {
            height: 40px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 4px;
            flex-shrink: 0
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 2px
        }

        .toolbar-sep {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 6px
        }

        .tool-btn {
            height: 28px;
            padding: 0 10px;
            border: none;
            border-radius: var(--radius-input);
            background: transparent;
            color: var(--text-sec);
            font-size: 12px;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: background 150ms ease, color 150ms ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .tool-btn:hover {
            background: var(--surface-el);
            color: var(--text-pri)
        }

        .tool-btn.active {
            background: var(--accent);
            color: #fff
        }

        .tool-btn svg {
            width: 14px;
            height: 14px
        }

        .coord-readout {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-sec);
            margin-left: auto;
            padding: 0 8px;
            white-space: nowrap
        }

        /* ZOOM INFO */
        .zoom-info {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(15, 15, 15, 0.85);
            padding: 6px 10px;
            border-radius: var(--radius-input);
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-sec);
            border: 1px solid var(--border);
            pointer-events: none;
            z-index: 5
        }

        /* TOOLTIP */
        .tooltip {
            position: absolute;
            background: var(--surface-el);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 8px 12px;
            font-size: 12px;
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
            display: none
        }

        .tooltip.visible {
            display: block
        }

        .tooltip .tt-fn {
            color: var(--text-sec);
            font-size: 11px;
            margin-bottom: 2px
        }

        .tooltip .tt-vals {
            font-family: var(--font-mono);
            color: var(--text-pri)
        }

        /* ANALYSIS MARKERS */
        .marker-label {
            position: absolute;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-pri);
            background: rgba(15, 15, 15, 0.85);
            padding: 2px 6px;
            border-radius: 3px;
            pointer-events: none;
            z-index: 5;
            border: 1px solid var(--border);
            white-space: nowrap
        }

        /* MOBILE */
        @media (max-width: 900px) {
            .sidebar-toggle {
                display: flex
            }
        }

        @media (max-width: 768px) {
            .app {
                flex-direction: column-reverse
            }

            .sidebar {
                width: 100% !important;
                max-width: 100% !important;
                min-width: 0 !important;
                max-height: 50vh;
                border-right: none;
                border-top: 1px solid var(--border)
            }

            .sidebar.collapsed {
                display: none
            }

            .resize-handle {
                display: none
            }

            .sidebar-toggle {
                display: flex
            }

            .toolbar .tool-btn span.tool-label {
                display: none
            }
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>Graphing Calculator</h1>
            <div class="input-wrapper">
                <label for="funcInput">Function f(x)</label>
                <input type="text" id="funcInput" placeholder="e.g. sin(x) + cos(2x)" autocomplete="off"
                       spellcheck="false">
                <div class="validation-msg" id="validationMsg"></div>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btnAdd" aria-label="Add function">Plot</button>
                <button class="btn btn-secondary" id="btnClear" aria-label="Clear all functions">Clear All</button>
                <button class="btn btn-secondary" id="btnReset" aria-label="Reset view">Reset</button>
            </div>
        </div>
        <div class="sidebar-scroll" id="sidebarScroll">
            <div class="func-list" id="funcList"></div>
            <div class="presets-section" id="presets"></div>
        </div>
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="main">
        <button class="sidebar-toggle visible" id="sidebarToggle" aria-label="Toggle sidebar">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </button>
        <div class="canvas-wrap" id="canvasWrap" role="application" tabindex="0" aria-label="Graph canvas">
            <canvas id="canvas"></canvas>
            <div class="zoom-info" id="zoomInfo"></div>
            <div class="tooltip" id="tooltip">
                <div class="tt-fn" id="ttFn"></div>
                <div class="tt-vals" id="ttVals"></div>
            </div>
        </div>
        <div class="toolbar" id="toolbar">
            <div class="toolbar-group">
                <button class="tool-btn" id="btnZoomIn" aria-label="Zoom in">
                    <svg viewBox="0 0 16 16" fill="none">
                        <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
                <button class="tool-btn" id="btnZoomOut" aria-label="Zoom out">
                    <svg viewBox="0 0 16 16" fill="none">
                        <path d="M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
                <button class="tool-btn" id="btnHome" aria-label="Reset view">
                    <svg viewBox="0 0 16 16" fill="none">
                        <path d="M3 8l5-5 5 5M4 7v5.5a.5.5 0 00.5.5h3v-3h1v3h3a.5.5 0 00.5-.5V7" stroke="currentColor"
                              stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="toolbar-sep"></div>
            <div class="toolbar-group">
                <button class="tool-btn" data-tool="zeros" aria-label="Find zeros">
                    <svg viewBox="0 0 16 16" fill="none">
                        <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.2"/>
                        <path d="M5.5 10.5l-2.5 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                    </svg>
                    <span class="tool-label">Zeros</span></button>
                <button class="tool-btn" data-tool="extrema" aria-label="Find extrema">
                    <svg viewBox="0 0 16 16" fill="none">
                        <path d="M2 12 Q5 2 8 8 Q11 14 14 4" stroke="currentColor" stroke-width="1.2" fill="none"
                              stroke-linecap="round"/>
                    </svg>
                    <span class="tool-label">Extrema</span></button>
                <button class="tool-btn" data-tool="tangent" aria-label="Tangent line">
                    <svg viewBox="0 0 16 16" fill="none">
                        <path d="M2 12 Q8 2 14 8" stroke="currentColor" stroke-width="1.2" fill="none"
                              stroke-linecap="round"/>
                        <path d="M4 10l8-6" stroke="currentColor" stroke-width="1" stroke-linecap="round"
                              stroke-dasharray="2 2"/>
                    </svg>
                    <span class="tool-label">Tangent</span></button>
                <button class="tool-btn" data-tool="integral" aria-label="Definite integral">
                    <svg viewBox="0 0 16 16" fill="none">
                        <path d="M6 2c-2 0-2 3-2 6s0 6 2 6" stroke="currentColor" stroke-width="1.5" fill="none"
                              stroke-linecap="round"/>
                        <path d="M5 8h6" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
                    </svg>
                    <span class="tool-label">Integral</span></button>
                <button class="tool-btn" data-tool="intersect" aria-label="Find intersections">
                    <svg viewBox="0 0 16 16" fill="none">
                        <path d="M2 12l12-8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                        <path d="M2 4l12 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                        <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1" fill="none"/>
                    </svg>
                    <span class="tool-label">Intersect</span></button>
            </div>
            <div class="toolbar-sep"></div>
            <button class="tool-btn" id="btnScreenshot" aria-label="Export screenshot">
                <svg viewBox="0 0 16 16" fill="none">
                    <rect x="2" y="3" width="12" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/>
                    <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.2"/>
                </svg>
                <span class="tool-label">Export</span></button>
            <div class="coord-readout" id="coordReadout"></div>
        </div>
    </div>
</div>
<div class="color-picker-popup" id="colorPicker"></div>

<script>
    (() => {
        'use strict';

// ─── CONSTANTS ───
        const COLORS = ['#f43f5e', '#22d3ee', '#a78bfa', '#4ade80', '#fb923c', '#e879f9', '#38bdf8', '#facc15'];
        const GRID_MIN_PX = 50, GRID_MAX_PX = 200;

// ─── STATE ───
        const state = {
            functions: [],
            colorIdx: 0,
            scale: 50,
            offsetX: 0, offsetY: 0,
            targetScale: 50, targetOffsetX: 0, targetOffsetY: 0,
            isDragging: false, lastMX: 0, lastMY: 0,
            dirty: true,
            selectedId: null,
            activeTool: null,
            integralStart: null,
            markers: [],
            mouseX: -1, mouseY: -1,
            showArrows: false,
            sidebarOpen: true,
            animating: false,
            dpr: 1,
            canvasW: 0, canvasH: 0,
            pinchDist: 0
        };

// ─── DOM ───
        const $ = id => document.getElementById(id);
        const canvas = $('canvas'), ctx = canvas.getContext('2d');
        const canvasWrap = $('canvasWrap');
        const sidebar = $('sidebar');
        const funcInput = $('funcInput');
        const validationMsg = $('validationMsg');
        const funcListEl = $('funcList');
        const zoomInfoEl = $('zoomInfo');
        const tooltipEl = $('tooltip');
        const ttFn = $('ttFn');
        const ttVals = $('ttVals');
        const coordReadout = $('coordReadout');
        const colorPickerEl = $('colorPicker');

// ─── PREPROCESS EXPRESSION (implicit multiplication) ───
        function preprocess(expr) {
            let s = expr.trim();
            // number followed by x or letter func: 2x -> 2*x, 2sin -> 2*sin
            s = s.replace(/(\d)([a-zA-Z])/g, '$1*$2');
            // x or ) followed by (: x( -> x*(, )( -> )*(
            s = s.replace(/([a-zA-Z0-9)])(\()/g, (m, a, b) => {
                // Check if it's a function call like sin(, cos(, etc.
                const funcs = ['sin', 'cos', 'tan', 'asin', 'acos', 'atan', 'sinh', 'cosh', 'tanh', 'sqrt', 'cbrt', 'log', 'ln', 'exp', 'abs', 'sign', 'floor', 'ceil', 'round', 'sec', 'csc', 'cot', 'log2', 'log10'];
                // look back to see if preceding chars form a function name
                return m; // we'll handle this differently
            });
            // Actually, let me redo this more carefully
            s = expr.trim();
            // )(  -> )*(
            s = s.replace(/\)\(/g, ')*(');
            // number before x or open paren or letter (but not part of function)
            // Step 1: 2x -> 2*x, 3( -> 3*(
            s = s.replace(/(\d)([a-zA-Z(])/g, (m, d, c) => d + '*' + c);
            // Step 2: )x -> )*x, )2 -> )*2
            s = s.replace(/\)([a-zA-Z0-9])/g, ')*$1');
            // Step 3: x( -> check if it's a function call
            // We need to NOT insert * for known functions like sin(
            // Actually let me reconsider: after step 1, "2sin(x)" became "2*sin(x)" which is correct
            // "x(x+1)" -> after step1 "x*(x*+1*)" hmm that's wrong
            // Let me redo completely

            s = expr.trim();
            const tokens = [];
            let i = 0;
            while (i < s.length) {
                if (s[i] === ' ') {
                    i++;
                    continue;
                }
                // number (possibly decimal)
                if (/[0-9.]/.test(s[i])) {
                    let num = '';
                    while (i < s.length && /[0-9.]/.test(s[i])) {
                        num += s[i];
                        i++;
                    }
                    tokens.push({type: 'num', val: num});
                } else if (/[a-zA-Z_]/.test(s[i])) {
                    let word = '';
                    while (i < s.length && /[a-zA-Z_0-9]/.test(s[i])) {
                        word += s[i];
                        i++;
                    }
                    // Check if next char is ( -> function call
                    if (i < s.length && s[i] === '(' && word !== 'x' && word !== 'e' && word !== 'E') {
                        tokens.push({type: 'func', val: word});
                    } else {
                        tokens.push({type: 'var', val: word});
                    }
                } else if (s[i] === '(') {
                    tokens.push({type: 'open', val: '('});
                    i++;
                } else if (s[i] === ')') {
                    tokens.push({type: 'close', val: ')'});
                    i++;
                } else {
                    tokens.push({type: 'op', val: s[i]});
                    i++;
                }
            }
            // Insert multiplication
            let result = '';
            for (let j = 0; j < tokens.length; j++) {
                const t = tokens[j];
                if (j > 0) {
                    const p = tokens[j - 1];
                    const needMul =
                        (p.type === 'num' && (t.type === 'var' || t.type === 'func' || t.type === 'open')) ||
                        (p.type === 'var' && (t.type === 'num' || t.type === 'var' || t.type === 'func' || t.type === 'open')) ||
                        (p.type === 'close' && (t.type === 'num' || t.type === 'var' || t.type === 'func' || t.type === 'open'));
                    if (needMul) result += '*';
                }
                result += t.val;
            }
            return result;
        }

// ─── COMPILE + CACHE ───
        function compileExpr(expr) {
            const processed = preprocess(expr);
            try {
                const compiled = math.compile(processed);
                // Test evaluate
                compiled.evaluate({x: 1});
                return {compiled, processed, error: null};
            } catch (e) {
                return {compiled: null, processed, error: e.message};
            }
        }

        function evalFunc(compiled, x) {
            try {
                const y = compiled.evaluate({x, e: Math.E, pi: Math.PI});
                const n = typeof y === 'object' ? y.re !== undefined ? y.re : NaN : +y;
                return isFinite(n) ? n : NaN;
            } catch {
                return NaN;
            }
        }

        function numericalDeriv(compiled, x) {
            const h = 1e-7;
            const y1 = evalFunc(compiled, x + h);
            const y2 = evalFunc(compiled, x - h);
            if (isNaN(y1) || isNaN(y2)) return NaN;
            return (y1 - y2) / (2 * h);
        }

// ─── VALIDATION ───
        function validateInput(expr) {
            if (!expr.trim()) return {valid: false, msg: ''};
            const res = compileExpr(expr);
            if (res.error) {
                let msg = res.error;
                const m = msg.match(/char (\d+)/);
                if (m) msg = `Error at position ${m[1]}`;
                else if (msg.length > 40) msg = msg.substring(0, 40) + '…';
                return {valid: false, msg};
            }
            return {valid: true, msg: ''};
        }

// ─── COORDINATE TRANSFORMS ───
        function worldToScreen(wx, wy) {
            return [state.canvasW / 2 + state.offsetX + wx * state.scale,
                state.canvasH / 2 + state.offsetY - wy * state.scale];
        }

        function screenToWorld(sx, sy) {
            return [(sx - state.canvasW / 2 - state.offsetX) / state.scale,
                -(sy - state.canvasH / 2 - state.offsetY) / state.scale];
        }

// ─── SMART GRID (1-2-5 sequence) ───
        function niceStep(rough) {
            const pow = Math.pow(10, Math.floor(Math.log10(rough)));
            const frac = rough / pow;
            let nice;
            if (frac <= 1.5) nice = 1;
            else if (frac <= 3.5) nice = 2;
            else if (frac <= 7.5) nice = 5;
            else nice = 10;
            return nice * pow;
        }

        function getGridStep() {
            const minWorld = GRID_MIN_PX / state.scale;
            const maxWorld = GRID_MAX_PX / state.scale;
            const target = (minWorld + maxWorld) / 2;
            return niceStep(target);
        }

// ─── NUMBER FORMATTING ───
        function fmtNum(v) {
            if (v === 0) return '0';
            const a = Math.abs(v);
            if (a >= 10000) return v.toExponential(1);
            if (a < 0.001 && a > 0) return v.toExponential(1);
            // Remove trailing zeros
            let s = v.toPrecision(6);
            if (s.includes('.')) s = s.replace(/\.?0+$/, '');
            // If it's close to a nice number, show it nicer
            const rounded = parseFloat(v.toPrecision(10));
            let rs = String(rounded);
            if (rs.length < s.length) s = rs;
            return s;
        }

        function fmtLabel(v) {
            if (v === 0) return '0';
            const a = Math.abs(v);
            if (a >= 10000) return v.toExponential(0);
            if (a < 0.001 && a > 0) return v.toExponential(0);
            let s = String(parseFloat(v.toPrecision(10)));
            return s;
        }

// ─── ADAPTIVE SAMPLING ───
        function adaptiveSample(compiled, xMin, xMax, viewH) {
            const N = 300;
            const dx = (xMax - xMin) / N;
            const threshold = viewH * 0.2 / state.scale; // 20% of viewport in world coords
            const points = [];

            function sample(x) {
                return evalFunc(compiled, x);
            }

            function subdivide(x0, y0, x1, y1, depth) {
                if (depth > 8) {
                    points.push({x: x0, y: y0});
                    return;
                }
                const xm = (x0 + x1) / 2;
                const ym = sample(xm);
                const dy = Math.abs(y1 - y0);
                // Check if we need to subdivide
                if (!isNaN(y0) && !isNaN(y1) && !isNaN(ym)) {
                    const dy1 = Math.abs(ym - y0);
                    const dy2 = Math.abs(y1 - ym);
                    if (dy > threshold || dy1 > threshold * 0.5 || dy2 > threshold * 0.5) {
                        subdivide(x0, y0, xm, ym, depth + 1);
                        subdivide(xm, ym, x1, y1, depth + 1);
                        return;
                    }
                } else if (isNaN(y0) !== isNaN(ym) || isNaN(ym) !== isNaN(y1)) {
                    subdivide(x0, y0, xm, ym, depth + 1);
                    subdivide(xm, ym, x1, y1, depth + 1);
                    return;
                }
                points.push({x: x0, y: y0});
            }

            let prevX = xMin, prevY = sample(xMin);
            for (let i = 1; i <= N; i++) {
                const x = xMin + i * dx;
                const y = sample(x);
                subdivide(prevX, prevY, x, y, 0);
                prevX = x;
                prevY = y;
            }
            points.push({x: xMax, y: sample(xMax)});
            return points;
        }

// ─── DRAW GRID ───
        function drawGrid() {
            const step = getGridStep();
            const minorStep = step / 5;
            const [wxMin] = screenToWorld(0, 0);
            const [wxMax] = screenToWorld(state.canvasW, 0);
            const [, wyMax] = screenToWorld(0, 0);
            const [, wyMin] = screenToWorld(0, state.canvasH);

            // Minor grid
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 0.5;
            let start = Math.floor(wxMin / minorStep) * minorStep;
            for (let v = start; v <= wxMax; v += minorStep) {
                const sx = worldToScreen(v, 0)[0];
                ctx.beginPath();
                ctx.moveTo(sx, 0);
                ctx.lineTo(sx, state.canvasH);
                ctx.stroke();
            }
            start = Math.floor(wyMin / minorStep) * minorStep;
            for (let v = start; v <= wyMax; v += minorStep) {
                const sy = worldToScreen(0, v)[1];
                ctx.beginPath();
                ctx.moveTo(0, sy);
                ctx.lineTo(state.canvasW, sy);
                ctx.stroke();
            }

            // Major grid
            ctx.strokeStyle = '#2e2e2e';
            ctx.lineWidth = 0.5;
            start = Math.floor(wxMin / step) * step;
            for (let v = start; v <= wxMax; v += step) {
                if (Math.abs(v) < step * 0.01) continue;
                const sx = worldToScreen(v, 0)[0];
                ctx.beginPath();
                ctx.moveTo(sx, 0);
                ctx.lineTo(sx, state.canvasH);
                ctx.stroke();
            }
            start = Math.floor(wyMin / step) * step;
            for (let v = start; v <= wyMax; v += step) {
                if (Math.abs(v) < step * 0.01) continue;
                const sy = worldToScreen(0, v)[1];
                ctx.beginPath();
                ctx.moveTo(0, sy);
                ctx.lineTo(state.canvasW, sy);
                ctx.stroke();
            }
        }

// ─── DRAW AXES ───
        function drawAxes() {
            const cX = worldToScreen(0, 0)[0];
            const cY = worldToScreen(0, 0)[1];

            // Axes lines
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1.5;
            // X axis
            if (cY >= 0 && cY <= state.canvasH) {
                ctx.beginPath();
                ctx.moveTo(0, cY);
                ctx.lineTo(state.canvasW, cY);
                ctx.stroke();
                if (state.showArrows) {
                    ctx.beginPath();
                    ctx.moveTo(state.canvasW - 8, cY - 4);
                    ctx.lineTo(state.canvasW, cY);
                    ctx.lineTo(state.canvasW - 8, cY + 4);
                    ctx.stroke();
                }
            }
            // Y axis
            if (cX >= 0 && cX <= state.canvasW) {
                ctx.beginPath();
                ctx.moveTo(cX, 0);
                ctx.lineTo(cX, state.canvasH);
                ctx.stroke();
                if (state.showArrows) {
                    ctx.beginPath();
                    ctx.moveTo(cX - 4, 8);
                    ctx.lineTo(cX, 0);
                    ctx.lineTo(cX + 4, 8);
                    ctx.stroke();
                }
            }

            // Labels
            const step = getGridStep();
            const [wxMin] = screenToWorld(0, 0);
            const [wxMax] = screenToWorld(state.canvasW, 0);
            const [, wyMax] = screenToWorld(0, 0);
            const [, wyMin] = screenToWorld(0, state.canvasH);

            ctx.font = '11px ' + getComputedStyle(document.body).getPropertyValue('--font-mono').trim();
            ctx.fillStyle = '#666';
            ctx.textBaseline = 'top';
            ctx.textAlign = 'center';

            let s = Math.floor(wxMin / step) * step;
            for (let v = s; v <= wxMax; v += step) {
                const rv = parseFloat(v.toPrecision(10));
                if (Math.abs(rv) < step * 0.001) continue;
                const sx = worldToScreen(rv, 0)[0];
                const ly = Math.min(Math.max(cY + 6, 4), state.canvasH - 16);
                ctx.fillText(fmtLabel(rv), sx, ly);
            }

            ctx.textBaseline = 'middle';
            ctx.textAlign = 'right';
            s = Math.floor(wyMin / step) * step;
            for (let v = s; v <= wyMax; v += step) {
                const rv = parseFloat(v.toPrecision(10));
                if (Math.abs(rv) < step * 0.001) continue;
                const sy = worldToScreen(0, rv)[1];
                const lx = Math.min(Math.max(cX - 6, 30), state.canvasW - 4);
                ctx.fillText(fmtLabel(rv), lx, sy);
            }

            // Origin
            if (cX > -20 && cX < state.canvasW + 20 && cY > -20 && cY < state.canvasH + 20) {
                ctx.textAlign = 'right';
                ctx.textBaseline = 'top';
                ctx.fillText('0', cX - 6, cY + 6);
            }
        }

// ─── DRAW FUNCTIONS ───
        function drawFunctions() {
            const viewH = state.canvasH;
            const discThreshold = viewH * 0.5;
            const [wxMin] = screenToWorld(0, 0);
            const [wxMax] = screenToWorld(state.canvasW, 0);

            state.functions.forEach(fn => {
                if (!fn.visible || !fn.compiled) return;
                const isSelected = fn.id === state.selectedId;
                const points = adaptiveSample(fn.compiled, wxMin - (wxMax - wxMin) * 0.02, wxMax + (wxMax - wxMin) * 0.02, viewH);

                ctx.strokeStyle = fn.color;
                ctx.lineWidth = isSelected ? 3 : 2;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.beginPath();
                let penDown = false;

                for (let i = 0; i < points.length; i++) {
                    const p = points[i];
                    if (isNaN(p.y)) {
                        penDown = false;
                        continue;
                    }
                    const [sx, sy] = worldToScreen(p.x, p.y);

                    // Discontinuity check
                    if (penDown && i > 0) {
                        const prev = points[i - 1];
                        if (!isNaN(prev.y)) {
                            const [, psy] = worldToScreen(prev.x, prev.y);
                            const dy = Math.abs(sy - psy);
                            const signChange = (p.y > 0) !== (prev.y > 0);
                            if (dy > discThreshold && signChange) {
                                penDown = false;
                            }
                        }
                    }

                    if (sy < -2000 || sy > state.canvasH + 2000) {
                        penDown = false;
                        continue;
                    }

                    if (!penDown) {
                        ctx.moveTo(sx, sy);
                        penDown = true;
                    } else ctx.lineTo(sx, sy);
                }
                ctx.stroke();
            });
        }

// ─── DRAW MARKERS ───
        function drawMarkers() {
            state.markers.forEach(m => {
                const [sx, sy] = worldToScreen(m.x, m.y);
                if (sx < -50 || sx > state.canvasW + 50 || sy < -50 || sy > state.canvasH + 50) return;

                ctx.fillStyle = m.color || '#fff';
                ctx.beginPath();
                ctx.arc(sx, sy, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#0f0f0f';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                if (m.label) {
                    ctx.font = '11px ' + getComputedStyle(document.body).getPropertyValue('--font-mono').trim();
                    ctx.fillStyle = '#e8e8e8';
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'bottom';
                    const bg = m.label;
                    const tw = ctx.measureText(bg).width;
                    ctx.fillStyle = 'rgba(15,15,15,0.85)';
                    ctx.fillRect(sx + 8, sy - 22, tw + 8, 18);
                    ctx.strokeStyle = '#2e2e2e';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(sx + 8, sy - 22, tw + 8, 18);
                    ctx.fillStyle = '#e8e8e8';
                    ctx.fillText(bg, sx + 12, sy - 8);
                }

                // Integral shading
                if (m.type === 'integral-area' && m.points) {
                    ctx.fillStyle = m.color + '33';
                    ctx.beginPath();
                    const first = m.points[0];
                    const [fx, fy] = worldToScreen(first.x, 0);
                    ctx.moveTo(fx, fy);
                    m.points.forEach(p => {
                        const [px, py] = worldToScreen(p.x, p.y);
                        ctx.lineTo(px, py);
                    });
                    const last = m.points[m.points.length - 1];
                    const [lx, ly] = worldToScreen(last.x, 0);
                    ctx.lineTo(lx, ly);
                    ctx.closePath();
                    ctx.fill();
                }
            });

            // Tangent line
            state.markers.forEach(m => {
                if (m.type === 'tangent') {
                    ctx.strokeStyle = m.color || '#fff';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([4, 4]);
                    const [sx1, sy1] = worldToScreen(m.x1, m.y1);
                    const [sx2, sy2] = worldToScreen(m.x2, m.y2);
                    ctx.beginPath();
                    ctx.moveTo(sx1, sy1);
                    ctx.lineTo(sx2, sy2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            });
        }

// ─── TRACE MODE ───
        function drawTrace() {
            if (state.isDragging || state.activeTool || state.mouseX < 0) return;
            const mx = state.mouseX, my = state.mouseY;
            const [wx] = screenToWorld(mx, my);

            let closestFn = null, closestDist = 20, closestSx = 0, closestSy = 0, closestWy = 0;

            state.functions.forEach(fn => {
                if (!fn.visible || !fn.compiled) return;
                const wy = evalFunc(fn.compiled, wx);
                if (isNaN(wy)) return;
                const [sx, sy] = worldToScreen(wx, wy);
                const d = Math.abs(sy - my);
                if (d < closestDist) {
                    closestDist = d;
                    closestFn = fn;
                    closestSx = sx;
                    closestSy = sy;
                    closestWy = wy;
                }
            });

            if (closestFn) {
                // Dot on curve
                ctx.fillStyle = closestFn.color;
                ctx.beginPath();
                ctx.arc(closestSx, closestSy, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#0f0f0f';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Tooltip
                ttFn.textContent = closestFn.expression;
                ttFn.style.color = closestFn.color;
                ttVals.textContent = `x = ${fmtNum(wx)}  y = ${fmtNum(closestWy)}`;
                let tx = closestSx + 16, ty = closestSy - 40;
                if (tx + 180 > state.canvasW) tx = closestSx - 180;
                if (ty < 10) ty = closestSy + 16;
                tooltipEl.style.left = tx + 'px';
                tooltipEl.style.top = ty + 'px';
                tooltipEl.classList.add('visible');

                // Highlight sidebar
                document.querySelectorAll('.func-item').forEach(el => {
                    el.classList.toggle('selected', el.dataset.id == closestFn.id);
                });
            } else {
                tooltipEl.classList.remove('visible');
                // Crosshair
                ctx.strokeStyle = 'rgba(136,136,136,0.3)';
                ctx.lineWidth = 0.5;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(mx, 0);
                ctx.lineTo(mx, state.canvasH);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, my);
                ctx.lineTo(state.canvasW, my);
                ctx.stroke();
                ctx.setLineDash([]);

                const [cwx, cwy] = screenToWorld(mx, my);
                coordReadout.textContent = `x: ${fmtNum(cwx)}  y: ${fmtNum(cwy)}`;

                document.querySelectorAll('.func-item').forEach(el => {
                    el.classList.toggle('selected', el.dataset.id == state.selectedId);
                });
            }
        }

// ─── MAIN RENDER ───
        function render() {
            // Smooth interpolation
            const lerpAmt = 0.3;
            let needsMore = false;
            if (Math.abs(state.scale - state.targetScale) > 0.01) {
                state.scale += (state.targetScale - state.scale) * lerpAmt;
                state.offsetX += (state.targetOffsetX - state.offsetX) * lerpAmt;
                state.offsetY += (state.targetOffsetY - state.offsetY) * lerpAmt;
                needsMore = true;
                state.dirty = true;
            } else {
                state.scale = state.targetScale;
                state.offsetX = state.targetOffsetX;
                state.offsetY = state.targetOffsetY;
            }

            if (state.dirty) {
                ctx.save();
                ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
                ctx.clearRect(0, 0, state.canvasW, state.canvasH);
                drawGrid();
                drawAxes();
                drawFunctions();
                drawMarkers();
                drawTrace();
                ctx.restore();
                state.dirty = false;
                updateZoomInfo();
            }

            if (needsMore) state.dirty = true;
            requestAnimationFrame(render);
        }

// ─── CANVAS SETUP ───
        function setupCanvas() {
            const rect = canvasWrap.getBoundingClientRect();
            state.dpr = window.devicePixelRatio || 1;
            state.canvasW = rect.width;
            state.canvasH = rect.height - 0; // toolbar is outside canvas-wrap now
            canvas.width = state.canvasW * state.dpr;
            canvas.height = state.canvasH * state.dpr;
            canvas.style.width = state.canvasW + 'px';
            canvas.style.height = state.canvasH + 'px';
            state.dirty = true;
        }

        let resizeTimer;
        const resizeObserver = new ResizeObserver(() => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(setupCanvas, 100);
        });

// ─── ZOOM INFO ───
        function updateZoomInfo() {
            const [xMin, yMax] = screenToWorld(0, 0);
            const [xMax, yMin] = screenToWorld(state.canvasW, state.canvasH);
            zoomInfoEl.textContent = `x: [${fmtNum(xMin)}, ${fmtNum(xMax)}]  y: [${fmtNum(yMin)}, ${fmtNum(yMax)}]`;
        }

// ─── EVENT: Mouse ───
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            return [e.clientX - rect.left, e.clientY - rect.top];
        }

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const [mx, my] = getCanvasPos(e);
            const zf = e.deltaY > 0 ? 0.92 : 1 / 0.92;
            zoomAt(mx, my, zf);
        }, {passive: false});

        function zoomAt(mx, my, factor) {
            const [wx, wy] = screenToWorld(mx, my);
            const newScale = Math.max(2, Math.min(100000, state.targetScale * factor));
            const ratio = newScale / state.targetScale;
            state.targetScale = newScale;
            // Adjust offset so (mx, my) still maps to (wx, wy)
            state.targetOffsetX = mx - state.canvasW / 2 - wx * newScale;
            state.targetOffsetY = my - state.canvasH / 2 + wy * newScale;
            state.dirty = true;
        }

        canvas.addEventListener('mousedown', e => {
            if (e.button !== 0) return;
            if (state.activeTool) {
                handleToolClick(e);
                return;
            }
            state.isDragging = true;
            state.lastMX = e.clientX;
            state.lastMY = e.clientY;
            canvas.classList.add('grabbing');
            tooltipEl.classList.remove('visible');
        });

        canvas.addEventListener('mousemove', e => {
            const [mx, my] = getCanvasPos(e);
            state.mouseX = mx;
            state.mouseY = my;
            if (state.isDragging) {
                const dx = e.clientX - state.lastMX;
                const dy = e.clientY - state.lastMY;
                state.offsetX += dx;
                state.offsetY += dy;
                state.targetOffsetX += dx;
                state.targetOffsetY += dy;
                state.lastMX = e.clientX;
                state.lastMY = e.clientY;
            }
            state.dirty = true;
            // Update coord readout
            const [wx, wy] = screenToWorld(mx, my);
            coordReadout.textContent = `x: ${fmtNum(wx)}  y: ${fmtNum(wy)}`;
        });

        canvas.addEventListener('mouseup', () => {
            state.isDragging = false;
            canvas.classList.remove('grabbing');
        });
        canvas.addEventListener('mouseleave', () => {
            state.isDragging = false;
            canvas.classList.remove('grabbing');
            state.mouseX = -1;
            tooltipEl.classList.remove('visible');
            state.dirty = true;
        });

        canvas.addEventListener('dblclick', e => {
            const [mx, my] = getCanvasPos(e);
            const [wx, wy] = screenToWorld(mx, my);
            state.targetOffsetX = -wx * state.targetScale;
            state.targetOffsetY = wy * state.targetScale;
            state.dirty = true;
        });

// ─── TOUCH ───
        canvas.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                state.pinchDist = Math.sqrt(dx * dx + dy * dy);
                e.preventDefault();
            } else if (e.touches.length === 1) {
                if (state.activeTool) return;
                state.isDragging = true;
                state.lastMX = e.touches[0].clientX;
                state.lastMY = e.touches[0].clientY;
            }
        }, {passive: false});

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (e.touches.length === 2 && state.pinchDist > 0) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const factor = dist / state.pinchDist;
                const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const rect = canvas.getBoundingClientRect();
                zoomAt(cx - rect.left, cy - rect.top, factor);
                state.pinchDist = dist;
            } else if (e.touches.length === 1 && state.isDragging) {
                const dx = e.touches[0].clientX - state.lastMX;
                const dy = e.touches[0].clientY - state.lastMY;
                state.offsetX += dx;
                state.offsetY += dy;
                state.targetOffsetX += dx;
                state.targetOffsetY += dy;
                state.lastMX = e.touches[0].clientX;
                state.lastMY = e.touches[0].clientY;
                state.dirty = true;
            }
        }, {passive: false});

        canvas.addEventListener('touchend', () => {
            state.isDragging = false;
            state.pinchDist = 0;
        });

// ─── KEYBOARD ───
        canvasWrap.addEventListener('keydown', e => {
            const panAmt = 40;
            switch (e.key) {
                case 'ArrowLeft':
                    state.targetOffsetX += panAmt;
                    state.offsetX += panAmt;
                    state.dirty = true;
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    state.targetOffsetX -= panAmt;
                    state.offsetX -= panAmt;
                    state.dirty = true;
                    e.preventDefault();
                    break;
                case 'ArrowUp':
                    state.targetOffsetY += panAmt;
                    state.offsetY += panAmt;
                    state.dirty = true;
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    state.targetOffsetY -= panAmt;
                    state.offsetY -= panAmt;
                    state.dirty = true;
                    e.preventDefault();
                    break;
                case '+':
                case '=':
                    zoomAt(state.canvasW / 2, state.canvasH / 2, 1.2);
                    e.preventDefault();
                    break;
                case '-':
                    zoomAt(state.canvasW / 2, state.canvasH / 2, 1 / 1.2);
                    e.preventDefault();
                    break;
                case 'Home':
                    resetView();
                    e.preventDefault();
                    break;
            }
        });

// ─── ANALYSIS TOOLS ───
        function findClosestFuncAtScreen(mx, my) {
            const [wx] = screenToWorld(mx, my);
            let best = null, bestDist = 25;
            state.functions.forEach(fn => {
                if (!fn.visible || !fn.compiled) return;
                const wy = evalFunc(fn.compiled, wx);
                if (isNaN(wy)) return;
                const [, sy] = worldToScreen(wx, wy);
                const d = Math.abs(sy - my);
                if (d < bestDist) {
                    bestDist = d;
                    best = fn;
                }
            });
            return best;
        }

        function newtonRaphson(compiled, x0, maxIter = 50) {
            let x = x0;
            for (let i = 0; i < maxIter; i++) {
                const fx = evalFunc(compiled, x);
                if (isNaN(fx)) return NaN;
                if (Math.abs(fx) < 1e-12) return x;
                const fpx = numericalDeriv(compiled, x);
                if (Math.abs(fpx) < 1e-15) break;
                const xn = x - fx / fpx;
                if (Math.abs(xn - x) < 1e-12) return xn;
                // Check divergence
                if (Math.abs(xn - x0) > 100 * Math.abs(x - x0) && i > 5) break;
                x = xn;
            }
            // Fallback: bisection around x0
            return bisectionFallback(compiled, x0);
        }

        function bisectionFallback(compiled, x0) {
            const step = 0.5;
            let a = x0 - step, b = x0 + step;
            let fa = evalFunc(compiled, a), fb = evalFunc(compiled, b);
            // Try to find sign change
            for (let i = 0; i < 20; i++) {
                if (isNaN(fa) || isNaN(fb)) return NaN;
                if (fa * fb < 0) break;
                a -= step;
                b += step;
                fa = evalFunc(compiled, a);
                fb = evalFunc(compiled, b);
            }
            if (fa * fb >= 0) return NaN;
            // Bisect
            for (let i = 0; i < 60; i++) {
                const m = (a + b) / 2;
                const fm = evalFunc(compiled, m);
                if (isNaN(fm)) return NaN;
                if (Math.abs(fm) < 1e-12) return m;
                if (fa * fm < 0) {
                    b = m;
                    fb = fm;
                } else {
                    a = m;
                    fa = fm;
                }
            }
            return (a + b) / 2;
        }

        function findExtremum(compiled, x0) {
            // Find where derivative is zero using Newton's on the derivative
            // f'(x) = 0 => use Newton on g(x) = f'(x)
            let x = x0;
            for (let i = 0; i < 50; i++) {
                const fpx = numericalDeriv(compiled, x);
                if (Math.abs(fpx) < 1e-10) return x;
                const h = 1e-5;
                const fppx = (numericalDeriv(compiled, x + h) - numericalDeriv(compiled, x - h)) / (2 * h);
                if (Math.abs(fppx) < 1e-15) break;
                const xn = x - fpx / fppx;
                if (Math.abs(xn - x) < 1e-12) return xn;
                x = xn;
            }
            return NaN;
        }

        function simpsonsRule(compiled, a, b, n = 1000) {
            if (n % 2 !== 0) n++;
            const h = (b - a) / n;
            let sum = evalFunc(compiled, a) + evalFunc(compiled, b);
            for (let i = 1; i < n; i++) {
                const y = evalFunc(compiled, a + i * h);
                if (isNaN(y)) return NaN;
                sum += y * (i % 2 === 0 ? 2 : 4);
            }
            return sum * h / 3;
        }

        function handleToolClick(e) {
            const [mx, my] = getCanvasPos(e);
            const [wx, wy] = screenToWorld(mx, my);
            const fn = findClosestFuncAtScreen(mx, my);

            switch (state.activeTool) {
                case 'zeros': {
                    if (!fn) return;
                    const root = newtonRaphson(fn.compiled, wx);
                    if (!isNaN(root)) {
                        const ry = evalFunc(fn.compiled, root);
                        state.markers.push({
                            x: root,
                            y: ry,
                            color: fn.color,
                            label: `Zero: (${fmtNum(root)}, ${fmtNum(ry)})`
                        });
                        state.dirty = true;
                    }
                    break;
                }
                case 'extrema': {
                    if (!fn) return;
                    const ext = findExtremum(fn.compiled, wx);
                    if (!isNaN(ext)) {
                        const ey = evalFunc(fn.compiled, ext);
                        const kind = numericalDeriv(fn.compiled, ext - 0.01) > 0 ? 'Max' : 'Min';
                        state.markers.push({
                            x: ext,
                            y: ey,
                            color: fn.color,
                            label: `${kind}: (${fmtNum(ext)}, ${fmtNum(ey)})`
                        });
                        state.dirty = true;
                    }
                    break;
                }
                case 'tangent': {
                    if (!fn) return;
                    const ty = evalFunc(fn.compiled, wx);
                    const slope = numericalDeriv(fn.compiled, wx);
                    if (isNaN(slope)) return;
                    // Draw tangent across viewport
                    const [xMin] = screenToWorld(0, 0);
                    const [xMax] = screenToWorld(state.canvasW, 0);
                    const x1 = xMin, y1 = ty + slope * (x1 - wx);
                    const x2 = xMax, y2 = ty + slope * (x2 - wx);
                    state.markers.push({x: wx, y: ty, color: fn.color, label: `Slope: ${fmtNum(slope)}`});
                    state.markers.push({type: 'tangent', x1, y1, x2, y2, color: fn.color + '88'});
                    state.dirty = true;
                    break;
                }
                case 'integral': {
                    if (!fn) return;
                    if (!state.integralStart) {
                        state.integralStart = {fn, x: wx};
                        state.markers.push({x: wx, y: evalFunc(fn.compiled, wx), color: fn.color, label: 'Start'});
                        state.dirty = true;
                    } else {
                        const a = Math.min(state.integralStart.x, wx);
                        const b = Math.max(state.integralStart.x, wx);
                        const compiled = state.integralStart.fn.compiled;
                        const val = simpsonsRule(compiled, a, b);
                        // Collect points for shading
                        const pts = [];
                        const steps = 200;
                        for (let i = 0; i <= steps; i++) {
                            const xi = a + (b - a) * i / steps;
                            pts.push({x: xi, y: evalFunc(compiled, xi)});
                        }
                        // Remove the start marker
                        state.markers = state.markers.filter(m => m.label !== 'Start');
                        state.markers.push({
                            type: 'integral-area',
                            x: (a + b) / 2,
                            y: 0,
                            points: pts,
                            color: state.integralStart.fn.color,
                            label: `∫ = ${fmtNum(val)}`
                        });
                        state.integralStart = null;
                        state.dirty = true;
                    }
                    break;
                }
                case 'intersect': {
                    findIntersections();
                    break;
                }
            }
        }

        function findIntersections() {
            const visible = state.functions.filter(f => f.visible && f.compiled);
            if (visible.length < 2) return;
            const [xMin] = screenToWorld(0, 0);
            const [xMax] = screenToWorld(state.canvasW, 0);
            const steps = 500;
            const dx = (xMax - xMin) / steps;

            for (let i = 0; i < visible.length; i++) {
                for (let j = i + 1; j < visible.length; j++) {
                    const f1 = visible[i], f2 = visible[j];
                    let prevDiff = evalFunc(f1.compiled, xMin) - evalFunc(f2.compiled, xMin);
                    for (let k = 1; k <= steps; k++) {
                        const x = xMin + k * dx;
                        const diff = evalFunc(f1.compiled, x) - evalFunc(f2.compiled, x);
                        if (isNaN(diff) || isNaN(prevDiff)) {
                            prevDiff = diff;
                            continue;
                        }
                        if (prevDiff * diff < 0) {
                            // Bisect
                            let a = x - dx, b = x;
                            for (let iter = 0; iter < 50; iter++) {
                                const m = (a + b) / 2;
                                const d = evalFunc(f1.compiled, m) - evalFunc(f2.compiled, m);
                                if (Math.abs(d) < 1e-12) {
                                    a = b = m;
                                    break;
                                }
                                if ((evalFunc(f1.compiled, a) - evalFunc(f2.compiled, a)) * d < 0) b = m;
                                else a = m;
                            }
                            const ix = (a + b) / 2;
                            const iy = evalFunc(f1.compiled, ix);
                            state.markers.push({
                                x: ix,
                                y: iy,
                                color: '#facc15',
                                label: `(${fmtNum(ix)}, ${fmtNum(iy)})`
                            });
                        }
                        prevDiff = diff;
                    }
                }
            }
            state.dirty = true;
        }

// Tool buttons
        document.querySelectorAll('[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => {
                const tool = btn.dataset.tool;
                if (state.activeTool === tool) {
                    state.activeTool = null;
                    state.integralStart = null;
                    btn.classList.remove('active');
                } else {
                    state.activeTool = tool;
                    state.integralStart = null;
                    document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (tool === 'intersect') {
                        findIntersections();
                        state.activeTool = null;
                        btn.classList.remove('active');
                    }
                }
            });
        });

// ─── FUNCTION MANAGEMENT ───
        function addFunction(expression) {
            if (!expression || !expression.trim()) return;
            const res = compileExpr(expression);
            if (res.error) return;
            const fn = {
                id: Date.now() + Math.random(),
                expression: expression.trim(),
                compiled: res.compiled,
                color: COLORS[state.colorIdx % COLORS.length],
                visible: true
            };
            state.functions.push(fn);
            state.colorIdx++;
            state.selectedId = fn.id;
            updateFuncList();
            state.dirty = true;
            // Flash animation
            setTimeout(() => {
                const el = document.querySelector(`.func-item[data-id="${fn.id}"]`);
                if (el) el.classList.add('flash');
            }, 10);
        }

        function removeFunction(id) {
            state.functions = state.functions.filter(f => f.id !== id);
            if (state.selectedId === id) state.selectedId = null;
            updateFuncList();
            state.dirty = true;
        }

        function toggleVisibility(id) {
            const fn = state.functions.find(f => f.id === id);
            if (fn) fn.visible = !fn.visible;
            updateFuncList();
            state.dirty = true;
        }

        function selectFunction(id) {
            state.selectedId = state.selectedId === id ? null : id;
            updateFuncList();
            state.dirty = true;
        }

        function changeFuncColor(id, color) {
            const fn = state.functions.find(f => f.id === id);
            if (fn) fn.color = color;
            updateFuncList();
            state.dirty = true;
            colorPickerEl.classList.remove('visible');
        }

        function updateFuncList() {
            if (state.functions.length === 0) {
                funcListEl.innerHTML = '<div class="empty-state">Enter a function above or choose an example below</div>';
                return;
            }
            funcListEl.innerHTML = '';
            state.functions.forEach((fn, i) => {
                const el = document.createElement('div');
                el.className = 'func-item' + (fn.id === state.selectedId ? ' selected' : '');
                el.dataset.id = fn.id;
                const subscript = String.fromCharCode(0x2081 + i);
                el.innerHTML = `
      <div class="func-swatch" style="background:${fn.color}" data-action="color" aria-label="Change color"></div>
      <div class="func-expr">f${subscript}(x) = ${fn.expression}</div>
      <div class="func-actions">
        <button class="icon-btn ${fn.visible ? '' : 'hidden-func'}" data-action="toggle" aria-label="${fn.visible ? 'Hide' : 'Show'} function">
          ${fn.visible
                    ? '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/></svg>'
                    : '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.2"/><path d="M3 13L13 3" stroke="currentColor" stroke-width="1.2"/></svg>'
                }
        </button>
        <button class="icon-btn" data-action="delete" aria-label="Remove function">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>`;
                el.addEventListener('click', e => {
                    const action = e.target.closest('[data-action]')?.dataset.action;
                    if (action === 'delete') removeFunction(fn.id);
                    else if (action === 'toggle') toggleVisibility(fn.id);
                    else if (action === 'color') showColorPicker(fn.id, e);
                    else selectFunction(fn.id);
                });
                funcListEl.appendChild(el);
            });
        }

// ─── COLOR PICKER ───
        function showColorPicker(fnId, e) {
            colorPickerEl.innerHTML = '';
            COLORS.forEach(c => {
                const d = document.createElement('div');
                d.className = 'color-opt';
                d.style.background = c;
                const fn = state.functions.find(f => f.id === fnId);
                if (fn && fn.color === c) d.classList.add('active');
                d.addEventListener('click', ev => {
                    ev.stopPropagation();
                    changeFuncColor(fnId, c);
                });
                colorPickerEl.appendChild(d);
            });
            const rect = e.target.getBoundingClientRect();
            colorPickerEl.style.left = rect.right + 8 + 'px';
            colorPickerEl.style.top = rect.top + 'px';
            colorPickerEl.classList.add('visible');
        }

        document.addEventListener('click', e => {
            if (!e.target.closest('.color-picker-popup') && !e.target.closest('[data-action="color"]'))
                colorPickerEl.classList.remove('visible');
        });

// ─── PRESETS ───
        const presets = [
            {
                name: 'Polynomials', items: [
                    {label: 'x²', expr: 'x^2'}, {label: 'x³', expr: 'x^3'},
                    {label: 'x⁴−4x²+3', expr: 'x^4-4x^2+3'}
                ]
            },
            {
                name: 'Trigonometric', items: [
                    {label: 'sin(x)', expr: 'sin(x)'}, {label: 'cos(x)', expr: 'cos(x)'},
                    {label: 'tan(x)', expr: 'tan(x)'}, {label: 'sin(x)/x', expr: 'sin(x)/x'}
                ]
            },
            {
                name: 'Exponential / Log', items: [
                    {label: 'eˣ', expr: 'exp(x)'}, {label: 'ln(x)', expr: 'log(x)'},
                    {label: '2ˣ', expr: '2^x'}
                ]
            },
            {
                name: 'Special', items: [
                    {label: '|x|', expr: 'abs(x)'}, {label: 'floor(x)', expr: 'floor(x)'},
                    {label: 'sign(x)', expr: 'sign(x)'}, {label: 'x·sin(1/x)', expr: 'x*sin(1/x)'}
                ]
            }
        ];

        function buildPresets() {
            const container = $('presets');
            presets.forEach((cat, ci) => {
                const div = document.createElement('div');
                div.className = 'preset-category';
                const header = document.createElement('div');
                header.className = 'preset-header' + (ci === 0 ? ' open' : '');
                header.innerHTML = `<span class="preset-arrow">▶</span> ${cat.name}`;
                const body = document.createElement('div');
                body.className = 'preset-body' + (ci === 0 ? ' open' : '');
                cat.items.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'preset-btn';
                    btn.textContent = item.label;
                    btn.setAttribute('aria-label', `Plot ${item.label}`);
                    btn.addEventListener('click', () => {
                        addFunction(item.expr);
                        funcInput.value = '';
                    });
                    body.appendChild(btn);
                });
                header.addEventListener('click', () => {
                    header.classList.toggle('open');
                    body.classList.toggle('open');
                });
                div.appendChild(header);
                div.appendChild(body);
                container.appendChild(div);
            });
        }

// ─── SIDEBAR CONTROLS ───
        $('btnAdd').addEventListener('click', () => {
            const v = funcInput.value.trim();
            if (v) {
                addFunction(v);
                funcInput.value = '';
                validationMsg.textContent = '';
                funcInput.className = '';
            }
        });
        funcInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const v = funcInput.value.trim();
                if (v) {
                    addFunction(v);
                    funcInput.value = '';
                    validationMsg.textContent = '';
                    funcInput.className = '';
                }
            }
        });
        funcInput.addEventListener('input', () => {
            const v = funcInput.value;
            if (!v.trim()) {
                validationMsg.textContent = '';
                funcInput.className = '';
                return;
            }
            const r = validateInput(v);
            funcInput.className = r.valid ? 'valid' : 'invalid';
            validationMsg.textContent = r.msg;
        });

        $('btnClear').addEventListener('click', () => {
            state.functions = [];
            state.colorIdx = 0;
            state.selectedId = null;
            state.markers = [];
            updateFuncList();
            state.dirty = true;
        });

        function resetView() {
            state.targetScale = 50;
            state.targetOffsetX = 0;
            state.targetOffsetY = 0;
            state.dirty = true;
        }

        $('btnReset').addEventListener('click', resetView);
        $('btnHome').addEventListener('click', resetView);
        $('btnZoomIn').addEventListener('click', () => zoomAt(state.canvasW / 2, state.canvasH / 2, 1.3));
        $('btnZoomOut').addEventListener('click', () => zoomAt(state.canvasW / 2, state.canvasH / 2, 1 / 1.3));

// ─── SIDEBAR TOGGLE ───
        $('sidebarToggle').addEventListener('click', () => {
            state.sidebarOpen = !state.sidebarOpen;
            sidebar.classList.toggle('collapsed', !state.sidebarOpen);
            $('resizeHandle').style.display = state.sidebarOpen ? '' : 'none';
            setTimeout(setupCanvas, 50);
        });

// ─── SIDEBAR RESIZE ───
        let resizing = false;
        $('resizeHandle').addEventListener('mousedown', e => {
            resizing = true;
            e.preventDefault();
        });
        document.addEventListener('mousemove', e => {
            if (!resizing) return;
            const w = Math.max(240, Math.min(500, e.clientX));
            sidebar.style.width = w + 'px';
        });
        document.addEventListener('mouseup', () => {
            if (resizing) {
                resizing = false;
                setTimeout(setupCanvas, 50);
            }
        });

// ─── SCREENSHOT ───
        $('btnScreenshot').addEventListener('click', () => {
            // Create a clean render
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = state.canvasW * 2;
            tempCanvas.height = state.canvasH * 2;
            tempCtx.scale(2, 2);
            // Copy current state rendering to temp canvas
            // We'll just use the existing canvas data
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx.drawImage(canvas, 0, 0);
            tempCanvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'graph.png';
                a.click();
                URL.revokeObjectURL(url);
            });
        });

// ─── INIT ───
        function init() {
            resizeObserver.observe(canvasWrap);
            setupCanvas();
            buildPresets();
            updateFuncList();
            requestAnimationFrame(render);

            // Auto-check sidebar visibility
            if (window.innerWidth < 900) {
                state.sidebarOpen = false;
                sidebar.classList.add('collapsed');
                $('resizeHandle').style.display = 'none';
            }
        }

        init();
    })();
</script>
<script src="../logo.js" data-position="bottom-left"></script>
