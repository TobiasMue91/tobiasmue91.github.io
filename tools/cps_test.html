<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>CPS Test</title>
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖱️</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        :root {
            --accent: #3b82f6;
            --accent-h: #2563eb;
            --green: #22c55e;
            --purple: #8b5cf6;
            --bg: #f5f5f5;
            --fg: #111;
            --fg2: #6b7280;
            --card: #fff;
            --border: #e5e7eb;
            --hover: rgba(0, 0, 0, .03);
            --stat-bg: #f9fafb
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --fg: #e5e5e5;
                --fg2: #9ca3af;
                --card: #141414;
                --border: #262626;
                --hover: rgba(255, 255, 255, .03);
                --stat-bg: #1a1a1a
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.5;
            padding: 16px;
            max-width: 720px;
            margin: 0 auto
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -.02em
        }

        header {
            text-align: center;
            margin-bottom: 20px
        }

        header p {
            color: var(--fg2);
            font-size: .9rem;
            margin-top: 2px
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border)
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px
        }

        .time-opts {
            display: flex;
            gap: 6px
        }

        .time-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--fg);
            font-weight: 600;
            font-size: .85rem;
            cursor: pointer;
            transition: all .15s
        }

        .time-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .time-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }

        .mode-tog {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .85rem;
            color: var(--fg2)
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: var(--border);
            border-radius: 22px;
            transition: .2s
        }

        .slider:before {
            content: "";
            position: absolute;
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: .2s
        }

        input:checked + .slider {
            background: var(--accent)
        }

        input:checked + .slider:before {
            transform: translateX(18px)
        }

        .timer-row {
            text-align: center;
            margin-bottom: 12px
        }

        .timer-time {
            font-size: 1.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--fg)
        }

        .progress-track {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden
        }

        .progress-fill {
            height: 100%;
            width: 0;
            background: var(--accent);
            border-radius: 2px;
            transition: width .1s linear
        }

        .click-area {
            position: relative;
            min-height: 260px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            color: #fff;
            text-align: center;
            padding: 24px;
            overflow: hidden;
            transition: background .2s
        }

        .click-area.idle {
            background: var(--accent)
        }

        .click-area.active {
            background: var(--green)
        }

        .click-area.finished {
            background: var(--purple);
            cursor: default
        }

        .click-area h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 4px
        }

        .click-area .subtitle {
            font-size: .95rem;
            opacity: .85
        }

        .click-counter {
            font-size: 4.5rem;
            font-weight: 800;
            line-height: 1;
            font-variant-numeric: tabular-nums
        }

        .click-counter.bump {
            animation: bump .08s ease
        }

        @keyframes bump {
            0% {
                transform: scale(1)
            }
            50% {
                transform: scale(1.12)
            }
            100% {
                transform: scale(1)
            }
        }

        .ripple {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .25);
            transform: scale(0);
            animation: ripple-out .4s ease-out forwards;
            pointer-events: none
        }

        @keyframes ripple-out {
            to {
                transform: scale(4);
                opacity: 0
            }
        }

        .result-cps {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.1
        }

        .tier-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: .85rem;
            margin: 8px 0 12px;
            background: rgba(255, 255, 255, .2)
        }

        .result-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 16px;
            font-size: .9rem;
            opacity: .9
        }

        .result-row span {
            display: flex;
            align-items: center;
            gap: 4px
        }

        .btn-try {
            padding: 8px 24px;
            border: 2px solid #fff;
            border-radius: 8px;
            background: transparent;
            color: #fff;
            font-weight: 600;
            font-size: .9rem;
            cursor: pointer;
            transition: all .15s
        }

        .btn-try:hover {
            background: rgba(255, 255, 255, .15)
        }

        .chart-wrap {
            margin: 16px 0;
            height: 180px;
            display: none
        }

        .chart-wrap.visible {
            display: block
        }

        .stats-row {
            display: grid;
            grid-template-columns:repeat(4, 1fr);
            gap: 8px;
            margin-top: 12px
        }

        .stat {
            text-align: center;
            padding: 12px 8px;
            background: var(--stat-bg);
            border-radius: 8px;
            border: 1px solid var(--border)
        }

        .stat-val {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
            display: block
        }

        .stat-lbl {
            font-size: .75rem;
            color: var(--fg2);
            margin-top: 2px;
            display: block
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px
        }

        .tab {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: .85rem;
            color: var(--fg2);
            border-radius: 6px;
            transition: all .15s
        }

        .tab.active {
            background: var(--stat-bg);
            color: var(--accent)
        }

        .tab-content {
            display: none
        }

        .tab-content.active {
            display: block
        }

        .hist-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px
        }

        .hist-head h3 {
            font-size: 1rem;
            font-weight: 600
        }

        .hist-actions {
            display: flex;
            gap: 6px
        }

        .btn-sm {
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--fg2);
            font-size: .8rem;
            cursor: pointer;
            transition: all .15s
        }

        .btn-sm:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .hist-list {
            max-height: 280px;
            overflow-y: auto
        }

        .hist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: .85rem;
            gap: 8px
        }

        .hist-item:last-child {
            border-bottom: none
        }

        .hist-rank {
            font-weight: 700;
            min-width: 24px;
            color: var(--fg2)
        }

        .hist-meta {
            flex: 1;
            color: var(--fg2)
        }

        .hist-tier {
            font-size: .7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            color: #fff;
            white-space: nowrap
        }

        .hist-cps {
            font-weight: 700;
            min-width: 60px;
            text-align: right;
            color: var(--accent)
        }

        .stats-grid {
            display: grid;
            grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 16px
        }

        .stat-card {
            padding: 14px;
            background: var(--stat-bg);
            border-radius: 8px;
            border: 1px solid var(--border)
        }

        .stat-card h4 {
            font-size: .75rem;
            color: var(--fg2);
            font-weight: 500;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: .03em
        }

        .stat-card p {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent)
        }

        .hist-chart-wrap {
            height: 180px;
            margin-top: 16px
        }

        .empty-msg {
            color: var(--fg2);
            font-size: .85rem;
            text-align: center;
            padding: 20px 0
        }

        .kb-hint {
            text-align: center;
            font-size: .8rem;
            color: var(--fg2);
            margin-top: 8px;
            display: none
        }

        .kb-hint.show {
            display: block
        }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                align-items: stretch
            }

            .time-opts {
                justify-content: center
            }

            .mode-tog {
                justify-content: center
            }

            .stats-row {
                grid-template-columns:repeat(2, 1fr)
            }

            .click-area {
                min-height: 220px
            }

            .click-counter {
                font-size: 3.5rem
            }

            .result-cps {
                font-size: 2.2rem
            }

            .stats-grid {
                grid-template-columns:1fr 1fr
            }
        }
    </style>
</head>
<body>
<header><h1>CPS Test</h1>
    <p>Measure your clicking speed</p></header>
<div class="card">
    <div class="controls">
        <div class="time-opts">
            <button class="time-btn active" data-time="5">5s</button>
            <button class="time-btn" data-time="10">10s</button>
            <button class="time-btn" data-time="15">15s</button>
            <button class="time-btn" data-time="30">30s</button>
            <button class="time-btn" data-time="60">60s</button>
        </div>
        <div class="mode-tog">
            <span>Mouse</span>
            <label class="switch"><input type="checkbox" id="mode-toggle"><span class="slider"></span></label>
            <span>Keyboard</span>
        </div>
    </div>
    <div class="timer-row">
        <div class="timer-time" id="timer-time">5.0s</div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>
    <div class="click-area idle" id="click-area">
        <h2>Click to Start</h2>
        <p class="subtitle">Test your clicking speed</p>
    </div>
    <div class="kb-hint" id="kb-hint">Press any key to start and keep pressing</div>
    <div class="chart-wrap" id="chart-wrap">
        <canvas id="cps-chart"></canvas>
    </div>
    <div class="stats-row">
        <div class="stat"><span class="stat-val" id="s-clicks">0</span><span class="stat-lbl">Clicks</span></div>
        <div class="stat"><span class="stat-val" id="s-cps">0.0</span><span class="stat-lbl">CPS</span></div>
        <div class="stat"><span class="stat-val" id="s-best">0.0</span><span class="stat-lbl">Best</span></div>
        <div class="stat"><span class="stat-val" id="s-avg">0.0</span><span class="stat-lbl">Average</span></div>
    </div>
</div>
<div class="card">
    <div class="tabs">
        <button class="tab active" data-tab="history">History</button>
        <button class="tab" data-tab="statistics">Statistics</button>
    </div>
    <div class="tab-content active" id="history">
        <div class="hist-head"><h3>Results</h3>
            <div class="hist-actions">
                <button class="btn-sm" id="export-btn">Export</button>
                <button class="btn-sm" id="clear-btn">Clear</button>
            </div>
        </div>
        <div class="hist-list" id="hist-list"></div>
    </div>
    <div class="tab-content" id="statistics">
        <div class="stats-grid">
            <div class="stat-card"><h4>Best CPS</h4>
                <p id="st-best">0.0</p></div>
            <div class="stat-card"><h4>Average CPS</h4>
                <p id="st-avg">0.0</p></div>
            <div class="stat-card"><h4>Total Clicks</h4>
                <p id="st-clicks">0</p></div>
            <div class="stat-card"><h4>Tests Done</h4>
                <p id="st-tests">0</p></div>
        </div>
        <h3 style="font-size:.95rem;margin-bottom:8px">Recent Performance</h3>
        <div class="hist-chart-wrap">
            <canvas id="history-chart"></canvas>
        </div>
    </div>
</div>
<script>
    (() => {
        const $ = id => document.getElementById(id);
        const clickArea = $('click-area'), timerTime = $('timer-time'), progressFill = $('progress-fill');
        const sClicks = $('s-clicks'), sCps = $('s-cps'), sBest = $('s-best'), sAvg = $('s-avg');
        const stBest = $('st-best'), stAvg = $('st-avg'), stClicks = $('st-clicks'), stTests = $('st-tests');
        const chartWrap = $('chart-wrap'), kbHint = $('kb-hint'), modeToggle = $('mode-toggle');
        const histList = $('hist-list');

        const TIERS = [
            {name: 'Turtle', min: 0, color: '#94a3b8'},
            {name: 'Slow', min: 2, color: '#f59e0b'},
            {name: 'Average', min: 4, color: '#3b82f6'},
            {name: 'Fast', min: 6, color: '#22c55e'},
            {name: 'Pro', min: 8, color: '#8b5cf6'},
            {name: 'Master', min: 10, color: '#ec4899'},
            {name: 'Superhuman', min: 12, color: '#ef4444'}
        ];

        function getTier(cps) {
            let t = TIERS[0];
            for (let i = TIERS.length - 1; i >= 0; i--) {
                if (cps >= TIERS[i].min) {
                    t = TIERS[i];
                    break;
                }
            }
            return t;
        }

        let state = 'idle', testTime = 5, clicks = 0, startTime = 0, keyboardMode = false, pressedKeys = {};
        let progressInterval = null, chartInterval = null, cpsChart = null, historyChart = null;

        let data = {history: [], bestCPS: 0, totalClicks: 0, totalTests: 0};
        try {
            const s = localStorage.getItem('cpsData');
            if (s) data = JSON.parse(s);
        } catch (e) {
        }

        function save() {
            try {
                localStorage.setItem('cpsData', JSON.stringify(data));
            } catch (e) {
            }
        }

        function setIdle() {
            state = 'idle';
            clicks = 0;
            clearInterval(progressInterval);
            clearInterval(chartInterval);
            clickArea.className = 'click-area idle';
            const lbl = keyboardMode ? 'Press Any Key to Start' : 'Click to Start';
            const sub = keyboardMode ? 'Test your key pressing speed' : 'Test your clicking speed';
            clickArea.innerHTML = `<h2>${lbl}</h2><p class="subtitle">${sub}</p>`;
            timerTime.textContent = testTime + '.0s';
            progressFill.style.width = '0';
            sClicks.textContent = '0';
            sCps.textContent = '0.0';
            chartWrap.classList.remove('visible');
            if (cpsChart) {
                cpsChart.destroy();
                cpsChart = null;
            }
        }

        function startTest() {
            state = 'active';
            clicks = 0;
            startTime = Date.now();
            clickArea.className = 'click-area active';
            clickArea.innerHTML = `<div class="click-counter" id="counter">0</div><p class="subtitle">clicks</p>`;
            chartWrap.classList.add('visible');
            createChart();
            progressInterval = setInterval(tick, 50);
            chartInterval = setInterval(sampleChart, 500);
        }

        function tick() {
            const elapsed = (Date.now() - startTime) / 1000;
            const remain = Math.max(0, testTime - elapsed);
            timerTime.textContent = remain.toFixed(1) + 's';
            progressFill.style.width = (elapsed / testTime * 100) + '%';
            if (clicks > 0) {
                const c = (clicks / elapsed).toFixed(1);
                sCps.textContent = c;
            }
            if (elapsed >= testTime) endTest();
        }

        function addClick(e) {
            clicks++;
            sClicks.textContent = clicks;
            const counter = document.getElementById('counter');
            if (counter) {
                counter.textContent = clicks;
                counter.classList.remove('bump');
                void counter.offsetWidth;
                counter.classList.add('bump');
            }
            if (e && !keyboardMode) {
                const r = clickArea.getBoundingClientRect();
                const rip = document.createElement('div');
                rip.className = 'ripple';
                rip.style.left = (e.clientX - r.left - 20) + 'px';
                rip.style.top = (e.clientY - r.top - 20) + 'px';
                clickArea.appendChild(rip);
                setTimeout(() => rip.remove(), 400);
            }
        }

        function endTest() {
            state = 'finished';
            clearInterval(progressInterval);
            clearInterval(chartInterval);
            timerTime.textContent = '0.0s';
            progressFill.style.width = '100%';
            const elapsed = (Date.now() - startTime) / 1000;
            const cps = +(clicks / elapsed).toFixed(2);
            const tier = getTier(cps);
            clickArea.className = 'click-area finished';
            clickArea.innerHTML = `<div class="result-cps">${cps} CPS</div>
<div class="tier-badge" style="background:${tier.color}">${tier.name}</div>
<div class="result-row"><span>${clicks} clicks</span><span>${testTime}s</span><span>${keyboardMode ? 'Keyboard' : 'Mouse'}</span></div>
<button class="btn-try" id="try-again">Try Again</button>`;
            $('try-again').addEventListener('click', e => {
                e.stopPropagation();
                setIdle();
            });
            const result = {
                id: Date.now(),
                date: new Date().toLocaleString(),
                time: testTime,
                clicks,
                cps,
                mode: keyboardMode ? 'Keyboard' : 'Mouse'
            };
            data.history.unshift(result);
            if (data.history.length > 50) data.history.pop();
            data.totalClicks += clicks;
            data.totalTests++;
            if (cps > data.bestCPS) data.bestCPS = cps;
            save();
            sBest.textContent = data.bestCPS.toFixed(1);
            updateAvg();
            updateStats();
            renderHistory();
            if (historyChart) updateHistoryChart();
        }

        function createChart() {
            if (cpsChart) cpsChart.destroy();
            const dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
            const gridColor = dark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.06)';
            const ctx = $('cps-chart').getContext('2d');
            cpsChart = new Chart(ctx, {
                type: 'line', data: {
                    labels: [], datasets: [{
                        data: [],
                        borderColor: '#3b82f6',
                        backgroundColor: dark ? 'rgba(59,130,246,.15)' : 'rgba(59,130,246,.1)',
                        fill: true,
                        tension: .3,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: {duration: 0},
                    plugins: {legend: {display: false}},
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Time (s)',
                                color: dark ? '#9ca3af' : '#6b7280',
                                font: {size: 11}
                            },
                            ticks: {color: dark ? '#6b7280' : '#9ca3af', font: {size: 10}}, grid: {color: gridColor}
                        },
                        y: {
                            title: {display: true, text: 'CPS', color: dark ? '#9ca3af' : '#6b7280', font: {size: 11}},
                            beginAtZero: true,
                            ticks: {color: dark ? '#6b7280' : '#9ca3af', font: {size: 10}},
                            grid: {color: gridColor}
                        }
                    }
                }
            });
        }

        function sampleChart() {
            if (!cpsChart || state !== 'active') return;
            const elapsed = (Date.now() - startTime) / 1000;
            if (elapsed <= 0) return;
            const cps = +(clicks / elapsed).toFixed(2);
            cpsChart.data.labels.push(elapsed.toFixed(1));
            cpsChart.data.datasets[0].data.push(cps);
            cpsChart.update('none');
        }

        function updateAvg() {
            if (!data.history.length) {
                sAvg.textContent = '0.0';
                return;
            }
            const avg = (data.history.reduce((a, r) => a + r.cps, 0) / data.history.length).toFixed(1);
            sAvg.textContent = avg;
        }

        function updateStats() {
            stBest.textContent = data.bestCPS.toFixed(1);
            stClicks.textContent = data.totalClicks;
            stTests.textContent = data.totalTests;
            if (!data.history.length) {
                stAvg.textContent = '0.0';
                return;
            }
            stAvg.textContent = (data.history.reduce((a, r) => a + r.cps, 0) / data.history.length).toFixed(1);
        }

        function renderHistory() {
            if (!data.history.length) {
                histList.innerHTML = '<div class="empty-msg">No results yet</div>';
                return;
            }
            histList.innerHTML = data.history.map((r, i) => {
                const t = getTier(r.cps);
                const best = r.cps === data.bestCPS ? ' ★' : '';
                return `<div class="hist-item"><span class="hist-rank">${i + 1}</span>
<span class="hist-tier" style="background:${t.color}">${t.name}</span>
<span class="hist-meta">${r.mode} · ${r.time}s · ${r.date}</span>
<span class="hist-cps">${r.cps} CPS${best}</span></div>`;
            }).join('');
        }

        function createHistoryChart() {
            if (historyChart) historyChart.destroy();
            const recent = data.history.slice(0, 20).reverse();
            if (!recent.length) return;
            const dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
            const gridColor = dark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.06)';
            const ctx = $('history-chart').getContext('2d');
            historyChart = new Chart(ctx, {
                type: 'bar', data: {
                    labels: recent.map((_, i) => '' + (i + 1)),
                    datasets: [{
                        data: recent.map(r => r.cps), backgroundColor: recent.map(r => getTier(r.cps).color),
                        borderRadius: 4, maxBarThickness: 32
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: {duration: 200},
                    plugins: {legend: {display: false}},
                    scales: {
                        x: {
                            title: {display: true, text: 'Test', color: dark ? '#9ca3af' : '#6b7280', font: {size: 11}},
                            ticks: {color: dark ? '#6b7280' : '#9ca3af', font: {size: 10}}, grid: {display: false}
                        },
                        y: {
                            title: {display: true, text: 'CPS', color: dark ? '#9ca3af' : '#6b7280', font: {size: 11}},
                            beginAtZero: true,
                            ticks: {color: dark ? '#6b7280' : '#9ca3af', font: {size: 10}},
                            grid: {color: gridColor}
                        }
                    }
                }
            });
        }

        function updateHistoryChart() {
            if (!historyChart) return;
            const recent = data.history.slice(0, 20).reverse();
            historyChart.data.labels = recent.map((_, i) => '' + (i + 1));
            historyChart.data.datasets[0].data = recent.map(r => r.cps);
            historyChart.data.datasets[0].backgroundColor = recent.map(r => getTier(r.cps).color);
            historyChart.update();
        }

// Events
        clickArea.addEventListener('click', e => {
            if (keyboardMode) return;
            if (state === 'idle') {
                startTest();
                addClick(e);
            } else if (state === 'active') addClick(e);
        });

        document.addEventListener('keydown', e => {
            if (!keyboardMode) return;
            if (e.code === 'Space') e.preventDefault();
            if (state === 'idle') {
                startTest();
                pressedKeys[e.code] = true;
                addClick();
            } else if (state === 'active' && !pressedKeys[e.code]) {
                pressedKeys[e.code] = true;
                addClick();
            }
        });
        document.addEventListener('keyup', e => {
            delete pressedKeys[e.code];
        });

        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (state !== 'idle') return;
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                testTime = +btn.dataset.time;
                timerTime.textContent = testTime + '.0s';
            });
        });

        modeToggle.addEventListener('change', () => {
            keyboardMode = modeToggle.checked;
            kbHint.classList.toggle('show', keyboardMode);
            if (state !== 'idle') setIdle();
            else {
                const lbl = keyboardMode ? 'Press Any Key to Start' : 'Click to Start';
                const sub = keyboardMode ? 'Test your key pressing speed' : 'Test your clicking speed';
                clickArea.querySelector('h2').textContent = lbl;
                clickArea.querySelector('.subtitle').textContent = sub;
            }
        });

        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                $(btn.dataset.tab).classList.add('active');
                if (btn.dataset.tab === 'statistics') createHistoryChart();
            });
        });

        $('clear-btn').addEventListener('click', () => {
            if (!confirm('Clear all history?')) return;
            data.history = [];
            data.bestCPS = 0;
            data.totalClicks = 0;
            data.totalTests = 0;
            save();
            renderHistory();
            updateStats();
            sBest.textContent = '0.0';
            updateAvg();
            if (historyChart) {
                historyChart.destroy();
                historyChart = null;
            }
        });

        $('export-btn').addEventListener('click', () => {
            if (!data.history.length) {
                alert('No history to export');
                return;
            }
            const a = document.createElement('a');
            a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data.history, null, 2));
            a.download = 'cps_history.json';
            a.click();
        });

// Init
        sBest.textContent = data.bestCPS.toFixed(1);
        updateAvg();
        updateStats();
        renderHistory();
    })();
</script>
<script src="../logo.js"></script>
</body>
</html>
