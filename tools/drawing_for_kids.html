    <style>*, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #FAFAFA;
        font-family: 'Nunito', sans-serif;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        user-select: none;
    }

    #toolbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 64px;
        background: #FAFAFA;
        border-bottom: 2px solid #EEEEEE;
        display: flex;
        align-items: center;
        padding: 0 8px;
        z-index: 100;
        gap: 2px;
    }

    #toolbar-scroll {
        display: flex;
        align-items: center;
        overflow-x: auto;
        overflow-y: hidden;
        flex: 1;
        gap: 2px;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }

    #toolbar-scroll::-webkit-scrollbar {
        display: none;
    }

    .toolbar-group {
        display: flex;
        align-items: center;
        gap: 2px;
        flex-shrink: 0;
    }

    .toolbar-label {
        font-size: 9px;
        font-weight: 800;
        color: #AAA;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        writing-mode: vertical-lr;
        text-orientation: mixed;
        transform: rotate(180deg);
        flex-shrink: 0;
        padding: 0 2px;
    }

    .divider {
        width: 1px;
        height: 36px;
        background: #E0E0E0;
        flex-shrink: 0;
        margin: 0 4px;
    }

    .color-dot {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        flex-shrink: 0;
        cursor: pointer;
        border: 3px solid transparent;
        outline: none;
        transition: transform 0.12s ease-out, border-color 0.1s;
        position: relative;
    }

    .color-dot:active {
        transform: scale(0.92);
    }

    .color-dot.selected {
        border: 3px solid #2D3436;
        box-shadow: inset 0 0 0 3px #fff;
        transform: scale(1.15);
    }

    .brush-dot {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        flex-shrink: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 3px solid transparent;
        outline: none;
        transition: transform 0.12s ease-out;
        background: transparent;
    }

    .brush-dot:active {
        transform: scale(0.92);
    }

    .brush-dot.selected {
        border: 3px solid #2D3436;
        box-shadow: inset 0 0 0 3px #fff;
        background: #F0F0F0;
    }

    .brush-dot-inner {
        border-radius: 50%;
        pointer-events: none;
        transition: background 0.1s;
    }

    .tool-btn {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        background: #F5F5F5;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        outline: none;
        transition: background 0.1s, transform 0.08s ease-in-out;
        position: relative;
    }

    .tool-btn:hover {
        background: #E8E8E8;
    }

    .tool-btn:active {
        transform: scale(0.92);
    }

    .tool-btn.selected {
        border: 3px solid #2D3436;
        box-shadow: inset 0 0 0 2px #fff;
    }

    .tool-btn.disabled {
        opacity: 0.3;
        pointer-events: none;
    }

    .tool-btn .tool-icon {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
    }

    .tool-btn:hover .tool-icon {
        opacity: 0.85;
    }

    .tool-btn.confirm-state {
        background: #FFEBEE;
    }

    .tool-btn.download-success {
        background: #E8F5E9;
    }

    .undo-badge {
        position: absolute;
        top: 2px;
        right: 2px;
        min-width: 16px;
        height: 16px;
        border-radius: 8px;
        background: #4D96FF;
        color: #fff;
        font-size: 10px;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 3px;
        pointer-events: none;
        line-height: 1;
    }

    .bottom-sheet {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #FAFAFA;
        border-top: 2px solid #EEEEEE;
        padding: 12px 12px 20px;
        z-index: 100;
        transform: translateY(100%);
        transition: transform 0.2s ease-out;
        box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.08);

        overflow-y: auto;
    }

    .bottom-sheet.open {
        transform: translateY(0);
    }

    .sheet-handle {
        width: 32px;
        height: 4px;
        border-radius: 2px;
        background: #DDD;
        margin: 0 auto 10px;
    }

    .sheet-grid {
        display: flex;
        justify-content: center;

    .stamp-btn {
        width: 52px;
        height: 52px;
        border-radius: 8px;
        background: #F5F5F5;
        border: 3px solid transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        outline: none;
        transition: transform 0.12s ease-out;
        font-size: 28px;
        line-height: 1;
    }

    .stamp-btn:active {
        transform: scale(0.92);
    }

    .stamp-btn.selected {
        border: 3px solid #2D3436;
        box-shadow: inset 0 0 0 2px #fff;
    }

    .template-btn {
        width: 80px;
        height: 80px;
        border-radius: 8px;
        background: #FFF;
        border: 2px solid #EEE;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        outline: none;
        transition: transform 0.12s ease-out;
        padding: 4px;
    }

    .template-btn:active {
        transform: scale(0.92);
    }

    .template-btn canvas {
        pointer-events: none;
    }

    .template-btn span {
        font-size: 10px;
        color: #888;
        margin-top: 2px;
        pointer-events: none;
    }

    .bg-swatch-sm {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid #DDD;
        transition: transform 0.12s ease-out;
        flex-shrink: 0;
    }

    .bg-swatch-sm:active {
        transform: scale(0.92);
    }

    .bg-swatch-sm:hover {
        transform: scale(1.08);
    }

    .bg-swatch-sm.selected-bg {
        border: 3px solid #2D3436;
        box-shadow: inset 0 0 0 3px #fff;
        transform: scale(1.1);
    }

    #bg-inline {
        display: flex;
        gap: 4px;
        align-items: center;
        flex-shrink: 0;
    }

    #bg-inline.hidden {
        display: none;
    }

    #canvas-container {
        position: fixed;
        top: 64px;
        left: 0;
        right: 0;
        bottom: 0;
        transition: background-color 0.1s;
    }

    #drawing-canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
        cursor: crosshair;
    }

    #canvas-container.clear-flash {
        background-color: rgba(255, 0, 0, 0.05);
    }

    #eraser-cursor {
        position: fixed;
        pointer-events: none;
        border: 2px solid #999;
        border-radius: 50%;
        z-index: 50;
        display: none;
        transform: translate(-50%, -50%);
    }

    #ghost-stamp {
        position: fixed;
        pointer-events: none;
        z-index: 50;
        opacity: 0.4;
        display: none;
        transform: translate(-50%, -50%);
        font-size: 48px;
        line-height: 1;
    }

    #sheet-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 99;
        display: none;
    }

    #sheet-overlay.visible {
        display: block;
    }

    .emoji-category-label {
        width: 100%;
        text-align: center;
        font-size: 11px;
        font-weight: 700;
        color: #AAA;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 8px 0 4px;
    }

    @media (max-width: 767px) {
        #toolbar {
            height: 56px;
        }

        #canvas-container {
            top: 56px;
        }

        .color-dot {
            width: 38px;
            height: 38px;
        }

        .brush-dot {
            width: 38px;
            height: 38px;
        }

        .tool-btn {
            width: 42px;
            height: 42px;
        }

        .tool-btn .tool-icon {
            width: 22px;
            height: 22px;
            font-size: 18px;
        }

        .toolbar-label {
            font-size: 8px;
        }
    }</style>
</head>
<body>
<div id="toolbar">
    <div id="toolbar-scroll">
        <div id="bg-inline"></div>
        <div class="divider" id="bg-divider"></div>
        <div id="color-palette"></div>
        <div class="divider"></div>
        <div id="brush-sizes" style="display:flex;gap:2px;"></div>
        <div class="divider"></div>
        <div id="tool-buttons" style="display:flex;gap:4px;"></div>
    </div>
</div>
<div id="canvas-container">
    <canvas id="drawing-canvas"></canvas>
</div>
<div id="eraser-cursor"></div>
<div id="ghost-stamp"></div>
<div id="sheet-overlay"></div>
<div id="stamp-panel" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-grid" id="stamp-grid"></div>
</div>
<div id="template-panel" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-grid" id="template-grid"></div>
</div>
<script>
    // ===================================================================
    // STATE
    // ===================================================================
    const state = {
        color: '#4D96FF',
        brushSize: 20,
        tool: 'pencil', // 'pencil' | 'brush' | 'eraser' | 'stamp' | 'fill' | 'spray'
        stamp: null,
        bgColor: '#FFFFFF',
        history: [],
        historyIndex: -1,
        isDrawing: false,
        lastX: 0,
        lastY: 0,
        hasDrawn: false,
        clearConfirm: false,
        clearTimeout: null,
        soundEnabled: true,
        undoHolding: false,
        undoHoldTimer: null,
        undoRapidInterval: null,
        activeSheet: null,
        lastPointerX: 0,
        lastPointerY: 0,
        drawSpeed: 0,
        // Brush tool state
        brushPoints: [],
        // Spray state
        sprayInterval: null,
    };

    const COLORS = ['#FF6B6B', '#FF8F3F', '#FFD93D', '#6BCB77', '#00BCD4', '#4D96FF', '#9B5DE5', '#F472B6', '#8B5E3C', '#2D3436', '#636E72', '#FAFAFA'];
    const BRUSH_SIZES = [{dot: 6, draw: 4}, {dot: 12, draw: 10}, {dot: 20, draw: 20}, {dot: 28, draw: 36}];
    const STAMP_SIZES = {4: 30, 10: 50, 20: 70, 36: 100};
    const MAX_HISTORY = 15;
    const BG_COLORS = ['#FFFFFF', '#E3F2FD', '#FFF9E6', '#1A1A2E'];

    // Emoji stamps organized by category
    const EMOJI_STAMPS = {
        'Faces': ['😀', '😂', '🥰', '😎', '🤩', '😜', '🥺', '😸', '👻', '🤖'],
        'Animals': ['🐶', '🐱', '🐸', '🦋', '🐢', '🐙', '🦄', '🐝', '🐬', '🦊'],
        'Nature': ['🌸', '🌻', '🌈', '⭐', '🌙', '☀️', '❄️', '🔥', '💧', '🍀'],
        'Food': ['🍕', '🍦', '🍎', '🧁', '🍩', '🍓', '🌮', '🍪', '🍉', '🥑'],
        'Objects': ['🎈', '🎨', '🚀', '⚽', '🎸', '💎', '🏠', '🚗', '✈️', '🎁'],
        'Hearts': ['❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '💖', '💝'],
    };

    // ===================================================================
    // TEXT-BASED ICONS (emoji + CSS, avoids broken SVGs)
    // ===================================================================
    function makeIcon(char, fontSize) {
        fontSize = fontSize || 22;
        return `<div class="tool-icon" style="font-size:${fontSize}px;line-height:1;">${char}</div>`;
    }

    const ICONS = {
        pencil: makeIcon('✏️'),
        brush: makeIcon('🖌️'),
        eraser: makeIcon('🧽'),
        fill: makeIcon('🪣'),
        spray: makeIcon('💨'),
        stamp: makeIcon('�штамп'.length ? '⭐' : '⭐'), // fallback
        undo: makeIcon('↩️'),
        trash: makeIcon('🗑️'),
        check: makeIcon('✅'),
        download: makeIcon('💾'),
        book: makeIcon('📖'),
        sound: makeIcon('🔊'),
        soundOff: makeIcon('🔇'),
        stamp_icon: makeIcon('😀'),
    };

    // ===================================================================
    // AUDIO ENGINE
    // ===================================================================
    let audioCtx = null;
    let brushOsc = null;
    let brushGain = null;
    let brushActive = false;

    function ensureAudio() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
        }
    }

    function colorToFreq(color) {
        const hex = color.replace('#', '');
        const r = parseInt(hex.substring(0, 2), 16);
        const g = parseInt(hex.substring(2, 4), 16);
        const b = parseInt(hex.substring(4, 6), 16);
        const brightness = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
        const warmth = (r - b) / 510 + 0.5;
        const combined = brightness * 0.6 + warmth * 0.4;
        return 180 + combined * 340;
    }

    function startBrushSound() {
        if (!state.soundEnabled || !audioCtx) return;
        if (brushActive) return;
        brushOsc = audioCtx.createOscillator();
        brushGain = audioCtx.createGain();
        brushOsc.type = 'sine';
        brushOsc.frequency.value = colorToFreq(state.color);
        brushGain.gain.value = 0.06;
        brushOsc.connect(brushGain);
        brushGain.connect(audioCtx.destination);
        brushOsc.start();
        brushActive = true;
    }

    function updateBrushSound(speed) {
        if (!brushActive || !brushOsc) return;
        const baseFreq = colorToFreq(state.color);
        const freq = baseFreq + Math.min(speed, 500) * 0.4;
        brushOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
    }

    function stopBrushSound() {
        if (!brushActive || !brushOsc) return;
        brushGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
        const osc = brushOsc;
        setTimeout(() => {
            try {
                osc.stop();
            } catch (e) {
            }
        }, 100);
        brushOsc = null;
        brushGain = null;
        brushActive = false;
    }

    function playPop() {
        if (!state.soundEnabled || !audioCtx) return;
        const freq = colorToFreq(state.color);
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.value = freq + 200;
        o.frequency.setTargetAtTime(freq - 50, audioCtx.currentTime, 0.05);
        g.gain.value = 0.1;
        g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.08);
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start();
        o.stop(audioCtx.currentTime + 0.15);
    }

    function playWhoosh() {
        if (!state.soundEnabled || !audioCtx) return;
        const bufSize = audioCtx.sampleRate * 0.15;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.value = 2000;
        filt.frequency.setTargetAtTime(200, audioCtx.currentTime, 0.06);
        const g = audioCtx.createGain();
        g.gain.value = 0.08;
        src.connect(filt);
        filt.connect(g);
        g.connect(audioCtx.destination);
        src.start();
        src.stop(audioCtx.currentTime + 0.2);
    }

    function playSplash() {
        if (!state.soundEnabled || !audioCtx) return;
        const baseFreq = colorToFreq(state.color);
        const bufSize = audioCtx.sampleRate * 0.25;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.value = baseFreq;
        filt.frequency.setTargetAtTime(baseFreq + 800, audioCtx.currentTime, 0.08);
        filt.Q.value = 2;
        const g = audioCtx.createGain();
        g.gain.value = 0.1;
        src.connect(filt);
        filt.connect(g);
        g.connect(audioCtx.destination);
        src.start();
        src.stop(audioCtx.currentTime + 0.3);
    }

    function playSpraySound() {
        if (!state.soundEnabled || !audioCtx) return;
        const bufSize = audioCtx.sampleRate * 0.06;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize) * 0.3;
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'highpass';
        filt.frequency.value = 3000;
        const g = audioCtx.createGain();
        g.gain.value = 0.04;
        src.connect(filt);
        filt.connect(g);
        g.connect(audioCtx.destination);
        src.start();
        src.stop(audioCtx.currentTime + 0.08);
    }

    // ===================================================================
    // CANVAS SETUP
    // ===================================================================
    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});

    function getContainerSize() {
        const c = document.getElementById('canvas-container');
        return {w: c.clientWidth, h: c.clientHeight};
    }

    function resizeCanvas() {
        const {w, h} = getContainerSize();
        const dpr = window.devicePixelRatio || 1;
        let imgData = null;
        if (state.historyIndex >= 0 && state.history[state.historyIndex]) {
            imgData = state.history[state.historyIndex];
        }
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.fillStyle = state.bgColor;
        ctx.fillRect(0, 0, w, h);
        if (imgData) {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, w, h);
            };
            img.src = imgData;
        }
    }

    // ===================================================================
    // HISTORY
    // ===================================================================
    function saveHistory() {
        state.history = state.history.slice(0, state.historyIndex + 1);
        state.history.push(canvas.toDataURL('image/png'));
        if (state.history.length > MAX_HISTORY) state.history.shift();
        state.historyIndex = state.history.length - 1;
        updateUndoBtn();
    }

    // ===================================================================
    // DRAWING
    // ===================================================================
    function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {x: e.clientX - rect.left, y: e.clientY - rect.top};
    }

    function getCurrentDrawSize(pressure) {
        const base = state.brushSize;
        if (pressure !== undefined && pressure > 0 && pressure < 1) {
            return base * (0.4 + pressure * 0.6);
        }
        return base;
    }

    // ===================================================================
    // BRUSH TOOL: Smooth quadratic bezier with variable width
    // ===================================================================
    // Collects points, then draws smooth filled shapes between them
    // using midpoints as control points for quadratic bezier curves.
    // Width varies with speed for a natural feel.

    function brushAddPoint(x, y, pressure) {
        const pts = state.brushPoints;
        const last = pts.length > 0 ? pts[pts.length - 1] : null;
        let speed = 0;
        if (last) {
            const dx = x - last.x, dy = y - last.y;
            speed = Math.sqrt(dx * dx + dy * dy);
        }
        // Width: slower = thicker, faster = thinner
        const speedFactor = Math.max(0.25, 1 - speed / 120);
        const w = state.brushSize * speedFactor;
        pts.push({x, y, w, pressure: pressure || 0.5});
    }

    function brushDraw() {
        const pts = state.brushPoints;
        if (pts.length < 2) return;

        ctx.save();
        ctx.fillStyle = hexToRGBAString(state.color, 0.6);
        ctx.strokeStyle = hexToRGBAString(state.color, 0.6);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Draw filled polygon along the stroke with variable width
        // For each segment, compute perpendicular offsets and connect them
        const leftEdge = [];
        const rightEdge = [];

        for (let i = 0; i < pts.length; i++) {
            const p = pts[i];
            let angle;
            if (i === 0) {
                angle = Math.atan2(pts[1].y - p.y, pts[1].x - p.x);
            } else if (i === pts.length - 1) {
                angle = Math.atan2(p.y - pts[i - 1].y, p.x - pts[i - 1].x);
            } else {
                angle = Math.atan2(pts[i + 1].y - pts[i - 1].y, pts[i + 1].x - pts[i - 1].x);
            }
            const perpAngle = angle + Math.PI / 2;
            const halfW = p.w / 2;
            leftEdge.push({
                x: p.x + Math.cos(perpAngle) * halfW,
                y: p.y + Math.sin(perpAngle) * halfW
            });
            rightEdge.push({
                x: p.x - Math.cos(perpAngle) * halfW,
                y: p.y - Math.sin(perpAngle) * halfW
            });
        }

        // Draw filled shape using quadratic bezier smoothing through midpoints
        ctx.beginPath();

        // Left edge forward
        ctx.moveTo(leftEdge[0].x, leftEdge[0].y);
        for (let i = 0; i < leftEdge.length - 1; i++) {
            const mx = (leftEdge[i].x + leftEdge[i + 1].x) / 2;
            const my = (leftEdge[i].y + leftEdge[i + 1].y) / 2;
            ctx.quadraticCurveTo(leftEdge[i].x, leftEdge[i].y, mx, my);
        }
        const ll = leftEdge[leftEdge.length - 1];
        ctx.lineTo(ll.x, ll.y);

        // Right edge backward
        const rl = rightEdge[rightEdge.length - 1];
        ctx.lineTo(rl.x, rl.y);
        for (let i = rightEdge.length - 1; i > 0; i--) {
            const mx = (rightEdge[i].x + rightEdge[i - 1].x) / 2;
            const my = (rightEdge[i].y + rightEdge[i - 1].y) / 2;
            ctx.quadraticCurveTo(rightEdge[i].x, rightEdge[i].y, mx, my);
        }
        ctx.lineTo(rightEdge[0].x, rightEdge[0].y);

        ctx.closePath();
        ctx.fill();

        // Also draw round caps at start and end
        ctx.beginPath();
        ctx.arc(pts[0].x, pts[0].y, pts[0].w / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(pts[pts.length - 1].x, pts[pts.length - 1].y, pts[pts.length - 1].w / 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    // Incremental brush drawing: draw only the latest segment
    function brushDrawIncremental() {
        const pts = state.brushPoints;
        if (pts.length < 2) return;

        // Draw a filled circle "stamp" along the line from second-to-last to last point
        const p1 = pts[pts.length - 2];
        const p2 = pts[pts.length - 1];
        const dist = Math.sqrt((p2.x - p1.x) ** 2 + (p2.y - p1.y) ** 2);
        const steps = Math.max(1, Math.ceil(dist / 2));

        ctx.save();
        ctx.fillStyle = hexToRGBAString(state.color, 0.45);

        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const x = p1.x + (p2.x - p1.x) * t;
            const y = p1.y + (p2.y - p1.y) * t;
            const w = p1.w + (p2.w - p1.w) * t;
            ctx.beginPath();
            ctx.arc(x, y, w / 2, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    // ===================================================================
    // SPRAY PAINT TOOL
    // ===================================================================
    function sprayPaint(x, y) {
        const radius = state.brushSize * 1.5;
        const density = Math.floor(state.brushSize * 1.2);
        const hex = state.color.replace('#', '');
        const r = parseInt(hex.substring(0, 2), 16);
        const g = parseInt(hex.substring(2, 4), 16);
        const b = parseInt(hex.substring(4, 6), 16);

        ctx.save();
        for (let i = 0; i < density; i++) {
            // Random point in circle (uniform distribution)
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.sqrt(Math.random()) * radius;
            const px = x + Math.cos(angle) * dist;
            const py = y + Math.sin(angle) * dist;
            const alpha = 0.4 + Math.random() * 0.5;
            const dotSize = 0.5 + Math.random() * 1.5;
            ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
            ctx.beginPath();
            ctx.arc(px, py, dotSize, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    function startSpray() {
        if (state.sprayInterval) return;
        state.sprayInterval = setInterval(() => {
            if (!state.isDrawing) {
                stopSpray();
                return;
            }
            sprayPaint(state.lastX, state.lastY);
            playSpraySound();
        }, 50);
    }

    function stopSpray() {
        if (state.sprayInterval) {
            clearInterval(state.sprayInterval);
            state.sprayInterval = null;
        }
    }

    // ===================================================================
    // POINTER EVENTS
    // ===================================================================
    canvas.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 && e.pointerType === 'mouse') return;
        e.preventDefault();
        canvas.setPointerCapture(e.pointerId);
        ensureAudio();

        if (!state.hasDrawn) {
            state.hasDrawn = true;
            hideBgPicker();
        }

        const pos = getCanvasPos(e);
        state.lastPointerX = pos.x;
        state.lastPointerY = pos.y;

        // Fill tool
        if (state.tool === 'fill') {
            floodFill(pos.x, pos.y, state.color);
            saveHistory();
            playSplash();
            return;
        }

        // Stamp tool
        if (state.tool === 'stamp' && state.stamp) {
            const size = STAMP_SIZES[state.brushSize] || 70;
            drawEmojiStamp(ctx, state.stamp, pos.x, pos.y, size);
            saveHistory();
            playPop();
            hideGhostStamp();
            return;
        }

        // Drawing tools
        state.isDrawing = true;
        state.lastX = pos.x;
        state.lastY = pos.y;
        state.drawSpeed = 0;

        if (state.tool === 'brush') {
            state.brushPoints = [];
            brushAddPoint(pos.x, pos.y, e.pressure);
            // Draw initial dot
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, state.brushSize / 2, 0, Math.PI * 2);
            ctx.fillStyle = hexToRGBAString(state.color, 0.45);
            ctx.fill();
        } else if (state.tool === 'spray') {
            sprayPaint(pos.x, pos.y);
            startSpray();
            playSpraySound();
        } else {
            const sz = getCurrentDrawSize(e.pressure);
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, sz / 2, 0, Math.PI * 2);
            ctx.fillStyle = state.tool === 'eraser' ? state.bgColor : state.color;
            ctx.fill();
        }

        if (state.tool === 'pencil' || state.tool === 'brush') startBrushSound();
    });

    canvas.addEventListener('pointermove', (e) => {
        const pos = getCanvasPos(e);
        state.lastPointerX = e.clientX;
        state.lastPointerY = e.clientY;

        if (state.tool === 'eraser' || state.tool === 'spray') updateEraserCursor(e.clientX, e.clientY);
        if (state.tool === 'stamp' && state.stamp && e.pointerType === 'mouse' && !state.isDrawing) {
            showGhostStamp(e.clientX, e.clientY);
        }

        if (!state.isDrawing) return;
        e.preventDefault();

        const dx = pos.x - state.lastX;
        const dy = pos.y - state.lastY;
        state.drawSpeed = Math.sqrt(dx * dx + dy * dy);

        if (state.tool === 'brush') {
            brushAddPoint(pos.x, pos.y, e.pressure);
            brushDrawIncremental();
        } else if (state.tool === 'spray') {
            state.lastX = pos.x;
            state.lastY = pos.y;
        } else {
            const sz = getCurrentDrawSize(e.pressure);
            ctx.beginPath();
            ctx.moveTo(state.lastX, state.lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = state.tool === 'eraser' ? state.bgColor : state.color;
            ctx.lineWidth = sz;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        state.lastX = pos.x;
        state.lastY = pos.y;
        if (state.tool === 'pencil' || state.tool === 'brush') updateBrushSound(state.drawSpeed);
    });

    canvas.addEventListener('pointerup', () => {
        if (state.isDrawing) {
            state.isDrawing = false;
            stopSpray();
            saveHistory();
            stopBrushSound();
            state.brushPoints = [];
        }
    });

    canvas.addEventListener('pointercancel', () => {
        if (state.isDrawing) {
            state.isDrawing = false;
            stopSpray();
            saveHistory();
            stopBrushSound();
            state.brushPoints = [];
        }
    });

    canvas.addEventListener('pointerleave', () => {
        hideEraserCursor();
        hideGhostStamp();
    });

    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // ===================================================================
    // HELPER: hex to rgba string
    // ===================================================================
    function hexToRGBAString(hex, alpha) {
        const h = hex.replace('#', '');
        const r = parseInt(h.substring(0, 2), 16);
        const g = parseInt(h.substring(2, 4), 16);
        const b = parseInt(h.substring(4, 6), 16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    // ERASER / SPRAY CURSOR
    // ===================================================================
    const eraserCursorEl = document.getElementById('eraser-cursor');

    function updateEraserCursor(cx, cy) {
        const sz = state.tool === 'spray' ? state.brushSize * 3 : state.brushSize;
        eraserCursorEl.style.display = 'block';
        eraserCursorEl.style.width = sz + 'px';
        eraserCursorEl.style.height = sz + 'px';
        eraserCursorEl.style.left = cx + 'px';
        eraserCursorEl.style.top = cy + 'px';
        if (state.tool === 'spray') {
            eraserCursorEl.style.borderStyle = 'dashed';
            eraserCursorEl.style.borderColor = '#AAA';
        } else {
            eraserCursorEl.style.borderStyle = 'solid';
            eraserCursorEl.style.borderColor = '#999';
        }

        eraserCursorEl.style.display = 'none';

    // ===================================================================

    // ===================================================================
    const ghostEl = document.getElementById('ghost-stamp');

    function showGhostStamp(cx, cy) {
        if (!state.stamp) return;
        const size = STAMP_SIZES[state.brushSize] || 70;
        ghostEl.textContent = state.stamp;

    // ===================================================================
    // EMOJI STAMP DRAWING
    // ===================================================================
    function drawEmojiStamp(c, emoji, x, y, size) {
        c.save();
        c.globalAlpha = 1;
        c.font = size + 'px serif';
        c.textAlign = 'center';
        c.textBaseline = 'middle';
        c.fillText(emoji, x, y);
        c.restore();
    }

    // ===================================================================
    // FILL TOOL (Scanline Flood Fill)
    // ===================================================================
    function floodFill(startX, startY, fillColor) {
        const {w, h} = getContainerSize();
        const dpr = window.devicePixelRatio || 1;
        const cw = canvas.width;
        const ch = canvas.height;
        const sx = Math.round(startX * dpr);
        const sy = Math.round(startY * dpr);
        if (sx < 0 || sx >= cw || sy < 0 || sy >= ch) return;

        const imageData = ctx.getImageData(0, 0, cw, ch);
        const data = imageData.data;
        const pixels = new Uint32Array(data.buffer);
        const targetColor = pixels[sy * cw + sx];
        const fc = hexToRGBA(fillColor);
        const fillUint = (fc.a << 24) | (fc.b << 16) | (fc.g << 8) | fc.r;
        if (targetColor === fillUint) return;

        const tolerance = 32;
        const tr = (targetColor) & 0xFF;
        const tg = (targetColor >> 8) & 0xFF;
        const tb = (targetColor >> 16) & 0xFF;
        const maxPixels = cw * ch * 0.8;
        let visited = 0;

        function matches(idx) {
            const c = pixels[idx];
            const r = c & 0xFF;
            const g = (c >> 8) & 0xFF;
            const b = (c >> 16) & 0xFF;
            const dr = r - tr, dg = g - tg, db = b - tb;
            return (dr * dr + dg * dg + db * db) <= tolerance * tolerance;
        }

        const queue = [[sx, sy]];
        const seen = new Uint8Array(cw * ch);
        seen[sy * cw + sx] = 1;

        while (queue.length > 0) {
            const [px, py] = queue.pop();
            if (!matches(py * cw + px)) continue;
            let left = px, right = px;
            while (left > 0 && matches(py * cw + left - 1) && !seen[py * cw + left - 1]) left--;
            while (right < cw - 1 && matches(py * cw + right + 1) && !seen[py * cw + right + 1]) right++;
            for (let x = left; x <= right; x++) {
                pixels[py * cw + x] = fillUint;
                seen[py * cw + x] = 1;
                visited++;
            }
            if (visited > maxPixels) {
                for (let i = 0; i < pixels.length; i++) {
                    if (matches(i)) pixels[i] = fillUint;
                }
                break;
            }
            for (const ny of [py - 1, py + 1]) {
                if (ny < 0 || ny >= ch) continue;
                let inSpan = false;
                for (let x = left; x <= right; x++) {
                    const idx = ny * cw + x;
                    if (matches(idx) && !seen[idx]) {
                        if (!inSpan) {
                            queue.push([x, ny]);
                            inSpan = true;
                        }
                    } else {
                        inSpan = false;
                    }
                }
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }

    function hexToRGBA(hex) {
        const h = hex.replace('#', '');
        return {
            r: parseInt(h.substring(0, 2), 16),
            g: parseInt(h.substring(2, 4), 16),
            b: parseInt(h.substring(4, 6), 16),
            a: 255
        };
    }

                c.beginPath();
                c.arc(cx - 70 * s, cy - 15 * s, 6 * s, 0, Math.PI * 2);
                c.stroke();
                c.beginPath();
                c.moveTo(cx - 70 * s, cy - 21 * s);
                c.lineTo(cx - 70 * s, cy - 9 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx - 76 * s, cy - 15 * s);
                c.lineTo(cx - 64 * s, cy - 15 * s);
                c.stroke();

                // ===== RIGHT TOWER =====
                c.strokeRect(cx + 55 * s, cy - 30 * s, 30 * s, 95 * s);
                // Right tower battlements
                for (let i = 0; i < 3; i++) {
                    if (i % 2 === 0) {
                        c.strokeRect(cx + 55 * s + i * 10 * s, cy - 42 * s, 10 * s, 12 * s);
                    }
                }
                // Right tower window (arched)
                c.beginPath();
                c.moveTo(cx + 64 * s, cy + 20 * s);
                c.lineTo(cx + 64 * s, cy + 5 * s);
                c.arc(cx + 70 * s, cy + 5 * s, 6 * s, Math.PI, 0);
                c.lineTo(cx + 76 * s, cy + 20 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx + 70 * s, cy + 0 * s);
                c.lineTo(cx + 70 * s, cy + 20 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx + 64 * s, cy + 12 * s);
                c.lineTo(cx + 76 * s, cy + 12 * s);
                c.stroke();
                // Right tower upper window
                c.beginPath();
                c.arc(cx + 70 * s, cy - 15 * s, 6 * s, 0, Math.PI * 2);
                c.stroke();
                c.beginPath();
                c.moveTo(cx + 70 * s, cy - 21 * s);
                c.lineTo(cx + 70 * s, cy - 9 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx + 64 * s, cy - 15 * s);
                c.lineTo(cx + 76 * s, cy - 15 * s);
                c.stroke();

                // ===== CENTER TOWER (tallest, behind) =====
                c.strokeRect(cx - 20 * s, cy - 55 * s, 40 * s, 45 * s);
                // Center tower battlements
                for (let i = 0; i < 5; i++) {
                    if (i % 2 === 0) {
                        c.strokeRect(cx - 20 * s + i * 8 * s, cy - 65 * s, 8 * s, 10 * s);
                    }
                }
                // Center tower big window
                c.beginPath();
                c.moveTo(cx - 10 * s, cy - 15 * s);
                c.lineTo(cx - 10 * s, cy - 30 * s);
                c.arc(cx, cy - 30 * s, 10 * s, Math.PI, 0);
                c.lineTo(cx + 10 * s, cy - 15 * s);
                c.stroke();
                // Window dividers
                c.beginPath();
                c.moveTo(cx, cy - 40 * s);
                c.lineTo(cx, cy - 15 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx - 10 * s, cy - 25 * s);
                c.lineTo(cx + 10 * s, cy - 25 * s);
                c.stroke();

                // ===== FLAG on center tower =====
                c.beginPath();
                c.moveTo(cx, cy - 65 * s);
                c.lineTo(cx, cy - 90 * s);
                c.stroke();
                // Flag pennant (triangle)
                c.beginPath();
                c.moveTo(cx, cy - 90 * s);
                c.lineTo(cx + 18 * s, cy - 83 * s);
                c.lineTo(cx, cy - 76 * s);
                c.closePath();
                c.stroke();
                // Flag design (small cross/star)
                c.beginPath();
                c.moveTo(cx + 6 * s, cy - 86 * s);
                c.lineTo(cx + 12 * s, cy - 80 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx + 12 * s, cy - 86 * s);
                c.lineTo(cx + 6 * s, cy - 80 * s);
                c.stroke();

                // ===== WALL WINDOWS (small, on main wall) =====
                // Left side
                c.strokeRect(cx - 50 * s, cy + 5 * s, 10 * s, 14 * s);
                c.beginPath();
                c.moveTo(cx - 45 * s, cy + 5 * s);
                c.lineTo(cx - 45 * s, cy + 19 * s);
                c.stroke();
                // Right side
                c.strokeRect(cx + 40 * s, cy + 5 * s, 10 * s, 14 * s);
                c.beginPath();
                c.moveTo(cx + 45 * s, cy + 5 * s);
                c.lineTo(cx + 45 * s, cy + 19 * s);
                c.stroke();

                // ===== STONE TEXTURE (a few stone lines on walls) =====
                // Main wall stones
                const stoneLines = [
                    [-55, 15, -25, 15], [25, 15, 52, 15],
                    [-55, 35, -20, 35], [20, 35, 52, 35],
                    [-55, 50, -22, 50], [22, 50, 52, 50],
                    [-40, 15, -40, 35], [35, 15, 35, 35],
                    [-30, 35, -30, 50], [40, 35, 40, 50],
                ];
                c.lineWidth = 2 * s;
                stoneLines.forEach(([x1, y1, x2, y2]) => {
                    c.beginPath();
                    c.moveTo(cx + x1 * s, cy + y1 * s);
                    c.lineTo(cx + x2 * s, cy + y2 * s);
                    c.stroke();
                });
                c.lineWidth = 3.5 * s;

                // ===== DRAWBRIDGE CHAINS =====
                c.lineWidth = 2.5 * s;
                // Left chain
                c.beginPath();
                c.moveTo(cx - 18 * s, cy + 10 * s);
                c.lineTo(cx - 25 * s, cy + 0 * s);
                c.stroke();
                // Right chain
                c.beginPath();
                c.moveTo(cx + 18 * s, cy + 10 * s);
                c.lineTo(cx + 25 * s, cy + 0 * s);
                c.stroke();
                c.lineWidth = 3.5 * s;

                // ===== GROUND / MOAT =====
                c.lineWidth = 3 * s;
                // Ground line
                c.beginPath();
                c.moveTo(cx - 95 * s, cy + 65 * s);
                c.lineTo(cx + 95 * s, cy + 65 * s);
                c.stroke();
                // Moat waves
                for (let i = -4; i <= 4; i++) {
                    c.beginPath();
                    c.arc(cx + i * 20 * s, cy + 72 * s, 10 * s, Math.PI, 0);
                    c.stroke();
                }

                // ===== TINY DETAILS: arrow slits on towers =====
                c.lineWidth = 2.5 * s;
                // Left tower arrow slit
                c.beginPath();
                c.moveTo(cx - 70 * s, cy + 35 * s);
                c.lineTo(cx - 70 * s, cy + 50 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx - 74 * s, cy + 42 * s);
                c.lineTo(cx - 66 * s, cy + 42 * s);
                c.stroke();
                // Right tower arrow slit
                c.beginPath();
                c.moveTo(cx + 70 * s, cy + 35 * s);
                c.lineTo(cx + 70 * s, cy + 50 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx + 66 * s, cy + 42 * s);
                c.lineTo(cx + 74 * s, cy + 42 * s);
                c.stroke();

                // ===== TOWER TOPS: conical roofs on side towers =====
                c.lineWidth = 3.5 * s;
                // Left tower roof
                c.beginPath();
                c.moveTo(cx - 88 * s, cy - 42 * s);
                c.lineTo(cx - 70 * s, cy - 62 * s);
                c.lineTo(cx - 52 * s, cy - 42 * s);
                c.stroke();
                // Right tower roof
                c.beginPath();
                c.moveTo(cx + 52 * s, cy - 42 * s);
                c.lineTo(cx + 70 * s, cy - 62 * s);
                c.lineTo(cx + 88 * s, cy - 42 * s);
                c.stroke();
                // Little flags on side towers
                c.lineWidth = 2.5 * s;
                c.beginPath();
                c.moveTo(cx - 70 * s, cy - 62 * s);
                c.lineTo(cx - 70 * s, cy - 72 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx - 70 * s, cy - 72 * s);
                c.lineTo(cx - 60 * s, cy - 68 * s);
                c.lineTo(cx - 70 * s, cy - 65 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx + 70 * s, cy - 62 * s);
                c.lineTo(cx + 70 * s, cy - 72 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx + 70 * s, cy - 72 * s);
                c.lineTo(cx + 80 * s, cy - 68 * s);
                c.lineTo(cx + 70 * s, cy - 65 * s);
                c.stroke();

                // ===== PATH leading to gate =====
                c.lineWidth = 3 * s;
                c.beginPath();
                c.moveTo(cx - 18 * s, cy + 65 * s);
                c.lineTo(cx - 30 * s, cy + 85 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx + 18 * s, cy + 65 * s);
                c.lineTo(cx + 30 * s, cy + 85 * s);
                c.stroke();
                // Path stones
                c.lineWidth = 2 * s;
                c.beginPath();
                c.moveTo(cx - 22 * s, cy + 72 * s);
                c.lineTo(cx + 22 * s, cy + 72 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx - 26 * s, cy + 80 * s);
                c.lineTo(cx + 26 * s, cy + 80 * s);
                c.stroke();

                // ===== BONUS: clouds and birds =====
                c.lineWidth = 2.5 * s;
                // Cloud left
                function cloud(x2, y2, sz) {
                    c.beginPath();
                    c.arc(x2, y2, 8 * sz, 0, Math.PI * 2);
                    c.stroke();
                    c.beginPath();
                    c.arc(x2 - 8 * sz, y2 + 3 * sz, 6 * sz, 0, Math.PI * 2);
                    c.stroke();
                    c.beginPath();
                    c.arc(x2 + 8 * sz, y2 + 3 * sz, 6 * sz, 0, Math.PI * 2);
                    c.stroke();
                }
                cloud(cx - 70 * s, cy - 80 * s, s);
                cloud(cx + 55 * s, cy - 85 * s, s * 0.8);

                // Birds (simple V shapes)
                function bird(bx, by, sz) {
                    c.beginPath();
                    c.moveTo(bx - 6 * sz, by + 3 * sz);
                    c.quadraticCurveTo(bx - 3 * sz, by - 3 * sz, bx, by);
                    c.quadraticCurveTo(bx + 3 * sz, by - 3 * sz, bx + 6 * sz, by + 3 * sz);
                    c.stroke();
                }
                bird(cx + 30 * s, cy - 78 * s, s);
                bird(cx + 40 * s, cy - 82 * s, s * 0.7);
                bird(cx - 40 * s, cy - 88 * s, s * 0.8);

                // ===== EXTRA ABSURD: Torch brackets on main wall =====
                c.lineWidth = 2.5 * s;
                // Left torch
                c.beginPath();
                c.moveTo(cx - 35 * s, cy + 25 * s);
                c.lineTo(cx - 38 * s, cy + 18 * s);
                c.stroke();
                // Torch flame
                c.beginPath();
                c.moveTo(cx - 42 * s, cy + 14 * s);
                c.quadraticCurveTo(cx - 38 * s, cy + 6 * s, cx - 34 * s, cy + 14 * s);
                c.quadraticCurveTo(cx - 38 * s, cy + 10 * s, cx - 42 * s, cy + 14 * s);
                c.stroke();
                // Right torch
                c.beginPath();
                c.moveTo(cx + 35 * s, cy + 25 * s);
                c.lineTo(cx + 38 * s, cy + 18 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx + 34 * s, cy + 14 * s);
                c.quadraticCurveTo(cx + 38 * s, cy + 6 * s, cx + 42 * s, cy + 14 * s);
                c.quadraticCurveTo(cx + 38 * s, cy + 10 * s, cx + 34 * s, cy + 14 * s);
                c.stroke();

                // ===== SHIELD above gate =====
                c.lineWidth = 3 * s;
                c.beginPath();
                c.moveTo(cx - 8 * s, cy - 2 * s);
                c.lineTo(cx - 8 * s, cy + 6 * s);
                c.quadraticCurveTo(cx, cy + 14 * s, cx + 8 * s, cy + 6 * s);
                c.lineTo(cx + 8 * s, cy - 2 * s);
                c.closePath();
                c.stroke();
                // Shield cross
                c.lineWidth = 2 * s;
                c.beginPath();
                c.moveTo(cx, cy - 2 * s);
                c.lineTo(cx, cy + 10 * s);
                c.stroke();
                c.beginPath();
                c.moveTo(cx - 8 * s, cy + 3 * s);
                c.lineTo(cx + 8 * s, cy + 3 * s);
                c.stroke();

                // ===== BUSHES near base =====
                c.lineWidth = 2.5 * s;
                function bush(bx, by, sz) {
                    c.beginPath();
                    c.arc(bx, by, 7 * sz, Math.PI, 0);
                    c.stroke();
                    c.beginPath();
                    c.arc(bx - 6 * sz, by, 5 * sz, Math.PI, 0);
                    c.stroke();
                    c.beginPath();
                    c.arc(bx + 6 * sz, by, 5 * sz, Math.PI, 0);
                    c.stroke();
                }
                bush(cx - 75 * s, cy + 65 * s, s);
                bush(cx + 80 * s, cy + 65 * s, s * 0.9);

                c.restore();
            }
        },
    ];

    // ===================================================================
    // UI BUILDERS
    // ===================================================================
    function buildColorPalette() {
        const container = document.getElementById('color-palette');
        container.style.display = 'flex';
        container.style.gap = '2px';
        COLORS.forEach(color => {
            const dot = document.createElement('div');
            dot.className = 'color-dot';
            dot.style.background = color;
            if (color === '#FAFAFA') dot.style.boxShadow = 'inset 0 0 0 1px #DDD';
            if (color === state.color) dot.classList.add('selected');
            dot.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                state.color = color;
                if (state.tool === 'eraser') state.tool = 'pencil';
                if (state.tool === 'stamp') {
                    state.tool = 'pencil';
                    state.stamp = null;
                    closeSheet('stamp');
                }
                updateSelections();
            });
            container.appendChild(dot);
        });
    }

    function buildBrushSizes() {
        const container = document.getElementById('brush-sizes');
        BRUSH_SIZES.forEach(s => {
            const btn = document.createElement('div');
            btn.className = 'brush-dot';
            btn.dataset.draw = s.draw;
            const inner = document.createElement('div');
            inner.className = 'brush-dot-inner';
            inner.style.width = s.dot + 'px';
            inner.style.height = s.dot + 'px';
            inner.style.background = state.color;
            btn.appendChild(inner);
            if (s.draw === state.brushSize) btn.classList.add('selected');
            btn.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                state.brushSize = s.draw;
                updateSelections();
            });
            container.appendChild(btn);
        });
    }

    function buildToolButtons() {
        const container = document.getElementById('tool-buttons');

        const pencilBtn = createToolBtn('pencil', ICONS.pencil);

            state.stamp = null;
            closeAllSheets();

        });
        container.appendChild(pencilBtn);

        // Brush
        const brushBtn = createToolBtn('brush', ICONS.brush);
        brushBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            state.tool = 'brush';
            state.stamp = null;
            closeAllSheets();
            updateSelections();
        });
        container.appendChild(brushBtn);

        // Spray
        const sprayBtn = createToolBtn('spray', ICONS.spray);

            e.stopPropagation();
            state.tool = state.tool === 'spray' ? 'pencil' : 'spray';

            hideEraserCursor();
            updateSelections();
        });

        const fillBtn = createToolBtn('fill', ICONS.fill);
        fillBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            state.tool = state.tool === 'fill' ? 'pencil' : 'fill';
            state.stamp = null;
            closeAllSheets();
            updateSelections();
        });
        container.appendChild(fillBtn);

        // Eraser
        const eraserBtn = createToolBtn('eraser', ICONS.eraser);
        eraserBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            state.tool = state.tool === 'eraser' ? 'pencil' : 'eraser';
            state.stamp = null;
            closeAllSheets();
            hideEraserCursor();
            updateSelections();
        });
        container.appendChild(eraserBtn);

        // Stamp
        const stampBtn = createToolBtn('stamp', ICONS.stamp_icon);
        stampBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            toggleSheet('stamp');
        });
        container.appendChild(stampBtn);

        // Templates
        const templateBtn = createToolBtn('template', ICONS.book);
        templateBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            toggleSheet('template');
        });
        container.appendChild(templateBtn);

        // Undo
        const undoBtn = createToolBtn('undo', ICONS.undo);
        undoBtn.classList.add('disabled');
        undoBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            doUndo();
            startUndoHold();
        });
        undoBtn.addEventListener('pointerup', stopUndoHold);
        undoBtn.addEventListener('pointercancel', stopUndoHold);
        undoBtn.addEventListener('pointerleave', stopUndoHold);
        container.appendChild(undoBtn);

        // Clear
        const clearBtn = createToolBtn('clear', ICONS.trash);
        clearBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            handleClear();
        });
        container.appendChild(clearBtn);

        // Download
        const dlBtn = createToolBtn('download', ICONS.download);
        dlBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();

        // Sound toggle
        const soundBtn = createToolBtn('sound', ICONS.sound);
        soundBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            ensureAudio();
            state.soundEnabled = !state.soundEnabled;

        });

    function createToolBtn(id, iconHTML) {
        const btn = document.createElement('button');
        btn.className = 'tool-btn';
        btn.id = 'btn-' + id;
        btn.innerHTML = iconHTML;
        return btn;
    }

    // ===================================================================
    // BG PICKER (Inline with label)
    // ===================================================================
    function buildBgPicker() {
        const container = document.getElementById('bg-inline');
        const label = document.createElement('div');
        label.className = 'toolbar-label';
        label.textContent = 'BG';
        container.appendChild(label);
        BG_COLORS.forEach(color => {

    function hideBgPicker() {
        document.getElementById('bg-inline').classList.add('hidden');
        document.getElementById('bg-divider').style.display = 'none';
    }

    function showBgPicker() {
        document.getElementById('bg-inline').classList.remove('hidden');
        document.getElementById('bg-divider').style.display = '';
    }

    // ===================================================================
    // BOTTOM SHEETS
    // ===================================================================
    const overlay = document.getElementById('sheet-overlay');

    function openSheet(name) {
        closeAllSheets();
        const panel = document.getElementById(name + '-panel');
        if (!panel) return;
        state.activeSheet = name;
        panel.classList.add('open');
        overlay.classList.add('visible');
        if (name === 'stamp') buildStampGrid();
        if (name === 'template') buildTemplateGrid();
    }

    function closeSheet(name) {
        const panel = document.getElementById(name + '-panel');
        if (panel) panel.classList.remove('open');
        if (state.activeSheet === name) {
            state.activeSheet = null;
            overlay.classList.remove('visible');
        }
    }

    function closeAllSheets() {
        ['stamp', 'template'].forEach(n => {
            document.getElementById(n + '-panel')?.classList.remove('open');
        });
        state.activeSheet = null;
        overlay.classList.remove('visible');
    }

    function toggleSheet(name) {
        if (state.activeSheet === name) {
            closeSheet(name);
            if (name === 'stamp' && state.tool === 'stamp') {
                state.tool = 'pencil';
                state.stamp = null;
            }
        } else {
            openSheet(name);
        }
        updateSelections();
    }

    overlay.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
        closeAllSheets();
        updateSelections();
    });

    // ===================================================================
    // STAMP PANEL (Emoji-based)
    // ===================================================================
    function buildStampGrid() {
        const grid = document.getElementById('stamp-grid');
        grid.innerHTML = '';
        for (const [category, emojis] of Object.entries(EMOJI_STAMPS)) {
            const label = document.createElement('div');
            label.className = 'emoji-category-label';
            label.textContent = category;
            grid.appendChild(label);
            emojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'stamp-btn';
                btn.textContent = emoji;
                btn.dataset.stamp = emoji;
                if (state.tool === 'stamp' && state.stamp === emoji) btn.classList.add('selected');
                btn.addEventListener('pointerdown', (e) => {
                    e.stopPropagation();
                    state.tool = 'stamp';
                    state.stamp = emoji;
                    updateSelections();
                    grid.querySelectorAll('.stamp-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                });
                grid.appendChild(btn);
            });
        }
    }

    // ===================================================================
    // TEMPLATE PANEL
    // ===================================================================
    function buildTemplateGrid() {
        const grid = document.getElementById('template-grid');
        grid.innerHTML = '';
        TEMPLATES.forEach((tmpl, idx) => {
            const btn = document.createElement('button');
            btn.className = 'template-btn';
            const c = document.createElement('canvas');
            c.width = 72;
            c.height = 72;
            const tc = c.getContext('2d');
            tc.fillStyle = '#FFFFFF';
            tc.fillRect(0, 0, 72, 72);
            tmpl.draw(tc, 36, 38, 0.35);
            btn.appendChild(c);
            const label = document.createElement('span');
            label.textContent = tmpl.name;
            btn.appendChild(label);
            btn.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                applyTemplate(idx);
                closeAllSheets();
                updateSelections();
            });
            grid.appendChild(btn);
        });
    }

    function applyTemplate(idx) {
        const tmpl = TEMPLATES[idx];
        const {w, h} = getContainerSize();
        state.bgColor = '#FFFFFF';
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, w, h);
        const scale = Math.min(w, h) * 0.7 / 200;
        tmpl.draw(ctx, w / 2, h / 2, scale);
        state.hasDrawn = true;
        state.history = [];
        state.historyIndex = -1;
        hideBgPicker();
        saveHistory();
        state.tool = 'fill';
        updateSelections();
    }

    // ===================================================================
    // UNDO
    // ===================================================================
    function doUndo() {
        if (state.historyIndex <= 0) {
            if (state.historyIndex === 0) {
                state.historyIndex = -1;
                const {w, h} = getContainerSize();
                ctx.fillStyle = state.bgColor;
                ctx.fillRect(0, 0, w, h);
                playWhoosh();
            }
            updateUndoBtn();
            return;
        }
        state.historyIndex--;
        const img = new Image();
        img.onload = () => {
            const {w, h} = getContainerSize();
            ctx.clearRect(0, 0, w, h);
            ctx.drawImage(img, 0, 0, w, h);
        };
        img.src = state.history[state.historyIndex];
        playWhoosh();
        updateUndoBtn();
    }

    function startUndoHold() {
        state.undoHoldTimer = setTimeout(() => {
            state.undoHolding = true;
            state.undoRapidInterval = setInterval(() => {
                if (state.historyIndex <= 0) {
                    if (state.historyIndex === 0) doUndo();
                    stopUndoHold();
                    return;
                }
                doUndo();
            }, 300);
        }, 400);
    }

    function stopUndoHold() {
        clearTimeout(state.undoHoldTimer);
        clearInterval(state.undoRapidInterval);
        state.undoHolding = false;
    }

    function updateUndoBtn() {
        const btn = document.getElementById('btn-undo');
        if (!btn) return;
        btn.classList.toggle('disabled', state.historyIndex < 0);

        // Update undo badge (step count)
        let badge = btn.querySelector('.undo-badge');
        if (state.historyIndex >= 0 && state.history.length > 0) {
            if (!badge) {
                badge = document.createElement('div');
                badge.className = 'undo-badge';
                btn.appendChild(badge);
            }
            badge.textContent = state.historyIndex + 1;
            badge.style.display = 'flex';
        } else {
            if (badge) badge.style.display = 'none';
        }
    }

    // ===================================================================
    // CLEAR
    // ===================================================================
    function handleClear() {
        const btn = document.getElementById('btn-clear');
        if (state.clearConfirm) {
            clearTimeout(state.clearTimeout);
            state.clearConfirm = false;
            btn.innerHTML = ICONS.trash;
            btn.classList.remove('confirm-state');
            const {w, h} = getContainerSize();
            ctx.fillStyle = state.bgColor;
            ctx.fillRect(0, 0, w, h);
            state.history = [];
            state.historyIndex = -1;
            state.hasDrawn = false;
            updateUndoBtn();
            showBgPicker();
            const container = document.getElementById('canvas-container');
            container.classList.add('clear-flash');
            setTimeout(() => container.classList.remove('clear-flash'), 150);
        } else {
            state.clearConfirm = true;
            btn.classList.add('confirm-state');
            btn.innerHTML = ICONS.check;
            state.clearTimeout = setTimeout(() => {
                state.clearConfirm = false;
                btn.classList.remove('confirm-state');
                btn.innerHTML = ICONS.trash;
            }, 2000);
        }
    }

    // ===================================================================
    // DOWNLOAD
    // ===================================================================
    function doDownload() {
        const btn = document.getElementById('btn-download');
        const link = document.createElement('a');
        const now = new Date();
        const ts = now.getFullYear().toString() +
            String(now.getMonth() + 1).padStart(2, '0') +
            String(now.getDate()).padStart(2, '0') + '-' +
            String(now.getHours()).padStart(2, '0') +
            String(now.getMinutes()).padStart(2, '0') +
            String(now.getSeconds()).padStart(2, '0');
        link.download = 'my-drawing-' + ts + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        btn.classList.add('download-success');
        btn.innerHTML = ICONS.check;
        setTimeout(() => {
            btn.classList.remove('download-success');
            btn.innerHTML = ICONS.download;
        }, 1200);
    }

    // ===================================================================
    // UPDATE SELECTIONS
    // ===================================================================
    function updateSelections() {
        // Colors
        document.querySelectorAll('.color-dot').forEach(dot => {
            const dotColor = rgbToHex(dot.style.backgroundColor).toUpperCase();
            const match = state.tool !== 'eraser' && dotColor === state.color.toUpperCase();
            dot.classList.toggle('selected', match);
            if (dotColor === '#FAFAFA') {
                dot.style.boxShadow = match ? 'inset 0 0 0 3px #fff' : 'inset 0 0 0 1px #DDD';
            }
        });

        // Brush sizes
        document.querySelectorAll('.brush-dot').forEach(btn => {
            btn.classList.toggle('selected', parseInt(btn.dataset.draw) === state.brushSize);
        });
        document.querySelectorAll('.brush-dot-inner').forEach(inner => {
            inner.style.background = state.color;
        });

        // Tool buttons
        document.getElementById('btn-pencil')?.classList.toggle('selected', state.tool === 'pencil');
        document.getElementById('btn-brush')?.classList.toggle('selected', state.tool === 'brush');
        document.getElementById('btn-spray')?.classList.toggle('selected', state.tool === 'spray');
        document.getElementById('btn-eraser')?.classList.toggle('selected', state.tool === 'eraser');
        document.getElementById('btn-stamp')?.classList.toggle('selected', state.tool === 'stamp');
        document.getElementById('btn-fill')?.classList.toggle('selected', state.tool === 'fill');

        // Canvas cursor
        if (state.tool === 'eraser' || state.tool === 'spray') {
            canvas.style.cursor = 'none';
        } else {
            canvas.style.cursor = 'crosshair';
        }
        if (state.tool !== 'eraser' && state.tool !== 'spray') hideEraserCursor();
        if (state.tool !== 'stamp') hideGhostStamp();
    }

    function rgbToHex(rgb) {
        if (rgb.startsWith('#')) return rgb;
        const match = rgb.match(/(\d+)/g);
        if (!match) return '#000000';
        return '#' + match.slice(0, 3).map(n => parseInt(n).toString(16).padStart(2, '0')).join('');
    }

    // ===================================================================
    // PREVENT ACCIDENTAL NAVIGATION
    // ===================================================================
    window.addEventListener('beforeunload', (e) => {
        if (state.hasDrawn && state.historyIndex >= 0) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    // ===================================================================
    // RESIZE
    // ===================================================================
    window.addEventListener('resize', () => {
        resizeCanvas();
    });

    // ===================================================================
    // INIT
    // ===================================================================
    function init() {
        buildBgPicker();
        buildColorPalette();
        buildBrushSizes();
        buildToolButtons();
        resizeCanvas();
        updateSelections();
    }

    init();
</script>
</body>
</html>
