    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#F5F5F5;font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}

        /* ===== CANVAS ===== */
        #canvas-container{position:fixed;top:0;left:0;right:0;bottom:72px;background:#FAFAFA}
        #drawing-canvas{display:block;width:100%;height:100%;touch-action:none;cursor:crosshair}
        #canvas-container.clear-flash{background-color:#FFF0F0}

        /* ===== BOTTOM TOOLBAR ===== */
        #toolbar{
            position:fixed;bottom:0;left:0;right:0;height:72px;background:#FFFFFF;
            border-top:2px solid #EEEEEE;display:flex;align-items:center;
            justify-content:space-between;padding:0 6px;z-index:100;
        }
        .toolbar-section{display:flex;align-items:center;gap:6px;height:100%}

        /* ===== TOOL BUTTONS ===== */
        .tool-btn{
            width:56px;height:56px;border-radius:14px;background:#F0F0F0;border:3px solid transparent;
            cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
            outline:none;position:relative;font-size:26px;line-height:1;
            -webkit-appearance:none;appearance:none;
            transition:transform 0.12s ease-out,background 0.1s,border-color 0.1s;
        }
        .tool-btn:active{transform:scale(0.9) translateY(1px)}
        .tool-btn.selected{border-color:#2D3436;background:#E8E8E8}
        .tool-btn.disabled{opacity:0.25;pointer-events:none}
        .tool-btn.confirm-state{background:#FFCDD2;border-color:#EF5350}
        .tool-btn.download-ok{background:#C8E6C9;border-color:#66BB6A}

        /* Color button in toolbar */
        #btn-color{
            border-radius:50%;width:56px;height:56px;border:4px solid #FFF;
            box-shadow:0 0 0 2px #DDD;
            transition:transform 0.12s ease-out,box-shadow 0.15s;
        }
        #btn-color:active{transform:scale(0.88)}
        #btn-color.panel-open{box-shadow:0 0 0 3px #2D3436}

        /* Undo badge */
        .undo-badge{
            position:absolute;top:0;right:0;min-width:18px;height:18px;border-radius:9px;
            background:#4D96FF;color:#fff;font-size:10px;font-weight:800;display:none;
            align-items:center;justify-content:center;padding:0 4px;pointer-events:none;line-height:1;
        }
        .undo-badge.show{display:flex}

        /* ===== PANELS ===== */
        .panel-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:98;display:none}
        .panel-overlay.show{display:block}

        .panel{
            position:fixed;left:0;right:0;bottom:72px;background:#FFFFFF;border-top:2px solid #EEE;
            z-index:99;transform:translateY(100%);transition:transform 0.22s ease-out;
            padding:10px 10px 8px;max-height:55vh;overflow-y:auto;
            box-shadow:0 -4px 16px rgba(0,0,0,0.07);
        }
        .panel.open{transform:translateY(0)}
        .panel-handle{width:36px;height:4px;border-radius:2px;background:#DDD;margin:0 auto 10px}
        .panel-label{font-size:11px;font-weight:800;color:#AAA;text-transform:uppercase;letter-spacing:1px;text-align:center;padding:6px 0 4px}

        /* ===== COLOR PANEL ===== */
        #color-panel .color-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:10px}
        .color-dot{
            width:56px;height:56px;border-radius:50%;flex-shrink:0;cursor:pointer;
            border:3px solid transparent;outline:none;
            transition:transform 0.12s ease-out,border-color 0.1s;
        }
        .color-dot:active{transform:scale(0.88)}
        .color-dot.selected{border-color:#2D3436;box-shadow:inset 0 0 0 3px #fff;transform:scale(1.1)}

        /* Rainbow toggle */
        .rainbow-toggle{
            display:flex;align-items:center;justify-content:center;gap:8px;
            padding:8px 18px;border-radius:28px;background:#F0F0F0;border:3px solid transparent;
            cursor:pointer;font-size:15px;font-weight:700;color:#555;margin:0 auto 10px;
            transition:transform 0.12s ease-out,background 0.1s;
        }
        .rainbow-toggle:active{transform:scale(0.94)}
        .rainbow-toggle.active{border-color:#2D3436;background:#FFF3E0}

        /* Brush sizes */
        .size-row{display:flex;justify-content:center;gap:10px;padding:4px 0}
        .size-btn{
            width:56px;height:56px;border-radius:14px;background:#F5F5F5;border:3px solid transparent;
            cursor:pointer;display:flex;align-items:center;justify-content:center;outline:none;
            transition:transform 0.12s ease-out;
        }
        .size-btn:active{transform:scale(0.88)}
        .size-btn.selected{border-color:#2D3436;background:#E8E8E8}
        .size-preview{border-radius:50%;pointer-events:none}

        /* ===== MORE TOOLS TRAY ===== */
        #more-panel .tools-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
        #more-panel .tool-btn{width:64px;height:64px;font-size:28px;border-radius:16px}
        .bg-row{display:flex;justify-content:center;gap:8px;margin-top:6px}
        .bg-swatch{
            width:48px;height:48px;border-radius:50%;cursor:pointer;border:3px solid #DDD;
            transition:transform 0.12s ease-out;flex-shrink:0;
        }
        .bg-swatch:active{transform:scale(0.88)}
        .bg-swatch.sel{border-color:#2D3436;box-shadow:inset 0 0 0 3px #fff;transform:scale(1.08)}

        /* ===== STAMP PANEL ===== */
        #stamp-panel .stamp-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
        .stamp-btn{
            width:56px;height:56px;border-radius:12px;background:#F5F5F5;border:3px solid transparent;
            cursor:pointer;display:flex;align-items:center;justify-content:center;outline:none;
            font-size:30px;line-height:1;transition:transform 0.12s ease-out;
        }
        .stamp-btn:active{transform:scale(0.88)}
        .stamp-btn.selected{border-color:#2D3436;background:#E8E8E8}
        .emoji-cat-label{width:100%;text-align:center;font-size:12px;font-weight:800;color:#BBB;text-transform:uppercase;letter-spacing:1px;padding:10px 0 4px}

        /* ===== TEMPLATE PANEL ===== */
        #template-panel .template-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
        .template-btn{
            width:100px;height:100px;border-radius:12px;background:#FFF;border:2px solid #EEE;
            cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
            outline:none;padding:4px;transition:transform 0.12s ease-out;
        }
        .template-btn:active{transform:scale(0.92)}
        .template-btn canvas{pointer-events:none}
        .template-btn span{font-size:11px;font-weight:700;color:#888;margin-top:3px;pointer-events:none}

        /* ===== SHAPES PANEL ===== */
        #shapes-panel .shapes-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
        .shape-btn{
            width:64px;height:64px;border-radius:14px;background:#F5F5F5;border:3px solid transparent;
            cursor:pointer;display:flex;align-items:center;justify-content:center;outline:none;
            transition:transform 0.12s ease-out;font-size:28px;
        }
        .shape-btn:active{transform:scale(0.88)}
        .shape-btn.selected{border-color:#2D3436;background:#E8E8E8}

        /* ===== ACTIONS PANEL ===== */
        #actions-panel .actions-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
        #actions-panel .tool-btn{width:64px;height:64px;font-size:28px;border-radius:16px}

        /* ===== MISC OVERLAY ELEMENTS ===== */
        #eraser-cursor{position:fixed;pointer-events:none;border:2px solid #999;border-radius:50%;z-index:50;display:none;transform:translate(-50%,-50%)}
        #ghost-stamp{position:fixed;pointer-events:none;z-index:50;opacity:0.35;display:none;transform:translate(-50%,-50%);font-size:48px;line-height:1}

        /* ===== CLEAR CONFIRM TOAST ===== */
        #confirm-toast{
            position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
            background:#FF6B6B;color:#FFF;padding:10px 24px;border-radius:20px;
            font-size:16px;font-weight:800;z-index:110;opacity:0;pointer-events:none;
            transition:opacity 0.15s,transform 0.15s;white-space:nowrap;
        }
        #confirm-toast.show{opacity:1;transform:translateX(-50%) translateY(-12px);pointer-events:auto}

        /* ===== MIRROR LINE ===== */
        #mirror-line{
            position:fixed;top:0;bottom:72px;left:50%;width:2px;background:#4D96FF;
            z-index:10;pointer-events:none;opacity:0;transition:opacity 0.2s;
        }
        #mirror-line.show{opacity:0.4}

        /* ===== SHAPE PREVIEW CANVAS ===== */
        #shape-preview{position:fixed;top:0;left:0;right:0;bottom:72px;pointer-events:none;z-index:9}

        /* ===== ONBOARDING ===== */
        #onboarding{
            position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;
            background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;
        }
        #onboarding.gone{display:none}
        .onboard-card{
            background:#FFF;border-radius:24px;padding:32px 28px;max-width:340px;width:90%;
            text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.12);
        }
        .onboard-card h1{font-size:28px;font-weight:900;color:#2D3436;margin-bottom:4px}
        .onboard-card p{font-size:16px;font-weight:600;color:#888;margin-bottom:20px;line-height:1.5}
        .onboard-icons{font-size:44px;letter-spacing:6px;margin-bottom:14px}
        .onboard-start{
            display:inline-block;padding:14px 40px;border-radius:28px;background:#4D96FF;
            color:#FFF;font-size:18px;font-weight:800;border:none;cursor:pointer;
            transition:transform 0.12s;
        }
        .onboard-start:active{transform:scale(0.94)}

        /* ===== RESPONSIVE: TABLET ===== */
        @media(min-width:768px){
            #toolbar{height:80px;padding:0 10px}
            #canvas-container{bottom:80px}
            .tool-btn{width:64px;height:64px;font-size:28px;border-radius:16px}
            #btn-color{width:64px;height:64px}
            .color-dot{width:64px;height:64px}
            .size-btn{width:64px;height:64px}
            .stamp-btn{width:64px;height:64px;font-size:34px}
            .template-btn{width:110px;height:110px}
            .shape-btn{width:72px;height:72px;font-size:32px}
            #more-panel .tool-btn{width:72px;height:72px;font-size:30px}
            #actions-panel .tool-btn{width:72px;height:72px;font-size:30px}
            .panel{bottom:80px}
            #confirm-toast{bottom:88px}
            #mirror-line{bottom:80px}
            #shape-preview{bottom:80px}
            .toolbar-section{gap:8px}
            .bg-swatch{width:56px;height:56px}
        }
    </style>
</head>
<body>

<!-- Onboarding -->
<div id="onboarding" class="gone">
    <div class="onboard-card">
        <div class="onboard-icons">🎨 ✏️ ⭐</div>
        <h1>Let's Draw!</h1>
        <p>Pick a color and start drawing!<br>Tools are at the bottom.</p>
        <button class="onboard-start" id="onboard-go">Start Drawing! 🖌️</button>

</div>

<!-- Canvas -->

<div id="toolbar">

    // =====================================================================
    // AUDIO ENGINE
    // =====================================================================
    let audioCtx = null, brushOsc = null, brushGain = null, brushActive = false;

    function ensureAudio() {
        if (audioCtx) return;
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }

    function colorToFreq(color) {
        if (color.startsWith('hsl')) return 360;
        const h = color.replace('#','');
        const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
        const brightness = (r*.299+g*.587+b*.114)/255;
        const warmth = (r-b)/510+.5;
        return 180 + (brightness*.6+warmth*.4) * 340;
    }

    function startBrushSound() {
        if (!S.soundEnabled || !audioCtx || brushActive) return;
        brushOsc = audioCtx.createOscillator(); brushGain = audioCtx.createGain();
        brushOsc.type = 'sine'; brushOsc.frequency.value = colorToFreq(S.color);
        brushGain.gain.value = 0.05;
        brushOsc.connect(brushGain); brushGain.connect(audioCtx.destination);
        brushOsc.start(); brushActive = true;
    }

    function updateBrushSound(speed) {
        if (!brushActive || !brushOsc) return;
        const f = colorToFreq(S.color) + Math.min(speed, 500) * 0.4;
        brushOsc.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.05);
    }

    function stopBrushSound() {
        if (!brushActive || !brushOsc) return;
        brushGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
        const o = brushOsc;
        setTimeout(() => { try { o.stop(); } catch(e) {} }, 100);
        brushOsc = null; brushGain = null; brushActive = false;
    }

    function playPop() {
        if (!S.soundEnabled || !audioCtx) return;
        const f = colorToFreq(S.color);
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = f + 200;
        o.frequency.setTargetAtTime(f - 50, audioCtx.currentTime, 0.05);
        g.gain.value = 0.08; g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.08);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.15);
    }

    function playWhoosh() {
        if (!S.soundEnabled || !audioCtx) return;
        const n = audioCtx.sampleRate * 0.15;
        const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * (1 - i/n);
        const src = audioCtx.createBufferSource(); src.buffer = buf;
        const f = audioCtx.createBiquadFilter(); f.type = 'bandpass';
        f.frequency.value = 2000; f.frequency.setTargetAtTime(200, audioCtx.currentTime, 0.06);
        const g = audioCtx.createGain(); g.gain.value = 0.06;
        src.connect(f); f.connect(g); g.connect(audioCtx.destination);
        src.start(); src.stop(audioCtx.currentTime + 0.2);
    }

    function playSplash() {
        if (!S.soundEnabled || !audioCtx) return;
        const bf = colorToFreq(S.color);
        const n = audioCtx.sampleRate * 0.25;
        const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/n, 2);
        const src = audioCtx.createBufferSource(); src.buffer = buf;
        const f = audioCtx.createBiquadFilter(); f.type = 'bandpass';
        f.frequency.value = bf; f.frequency.setTargetAtTime(bf + 800, audioCtx.currentTime, 0.08);
        f.Q.value = 2;
        const g = audioCtx.createGain(); g.gain.value = 0.08;
        src.connect(f); f.connect(g); g.connect(audioCtx.destination);
        src.start(); src.stop(audioCtx.currentTime + 0.3);
    }

    function playClick() {
        if (!S.soundEnabled || !audioCtx) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = 800;

    function playSpraySound() {
        if (!S.soundEnabled || !audioCtx) return;
        const n = audioCtx.sampleRate * 0.06;

    // =====================================================================
    // CANVAS SETUP
    // =====================================================================
    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const shapeCanvas = document.getElementById('shape-preview');
    const shapeCtx = shapeCanvas.getContext('2d');

    function getContainerSize() {
        const c = document.getElementById('canvas-container');
        return { w: c.clientWidth, h: c.clientHeight };
    }

    function resizeCanvas() {
        const { w, h } = getContainerSize();
        const dpr = window.devicePixelRatio || 1;
        let imgData = null;
        if (S.historyIndex >= 0 && S.history[S.historyIndex]) imgData = S.history[S.historyIndex];
        canvas.width = w * dpr; canvas.height = h * dpr;
        canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.fillStyle = S.bgColor; ctx.fillRect(0, 0, w, h);
        if (imgData) {
            const img = new Image();
            img.onload = () => { ctx.drawImage(img, 0, 0, w, h); };
            img.src = imgData;
        }
        shapeCanvas.width = w * dpr; shapeCanvas.height = h * dpr;
        shapeCanvas.style.width = w + 'px'; shapeCanvas.style.height = h + 'px';
        shapeCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    // =====================================================================
    // HISTORY
    // =====================================================================
    function saveHistory() {
        S.history = S.history.slice(0, S.historyIndex + 1);
        S.history.push(canvas.toDataURL('image/png'));
        if (S.history.length > MAX_HISTORY) S.history.shift();
        S.historyIndex = S.history.length - 1;
        updateUndoBtn();
    }

    }

    function getCurrentColor() {
        if (S.rainbowMode) { S.rainbowHue = (S.rainbowHue + 2) % 360; return `hsl(${S.rainbowHue},85%,55%)`; }
        return S.color;
    }

    function hexToRGBA(hex) {
        const h = hex.replace('#','');
        return { r: parseInt(h.substring(0,2),16), g: parseInt(h.substring(2,4),16), b: parseInt(h.substring(4,6),16), a: 255 };
    }

    function mirrorX(x) { return getContainerSize().w - x; }

    // =====================================================================
    // BRUSH TOOL — fully opaque watercolor-style strokes
    // Uses overlapping circles with full opacity for a thick, rich feel.
    // =====================================================================
    function brushAddPoint(x, y) {
        const pts = S.brushPoints;
        const last = pts.length > 0 ? pts[pts.length-1] : null;
        let speed = 0;
        if (last) { const dx = x - last.x, dy = y - last.y; speed = Math.sqrt(dx*dx + dy*dy); }
        const w = S.brushSize * Math.max(0.3, 1 - speed / 100);
        pts.push({ x, y, w });
    }

    function brushDrawIncremental() {
        const pts = S.brushPoints;
        if (pts.length < 2) return;
        const p1 = pts[pts.length-2], p2 = pts[pts.length-1];
        const dist = Math.sqrt((p2.x-p1.x)**2 + (p2.y-p1.y)**2);
        const steps = Math.max(1, Math.ceil(dist/2));
        const col = getCurrentColor();
        ctx.save();
        ctx.globalAlpha = 1;
        ctx.fillStyle = col;
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const x = p1.x + (p2.x-p1.x)*t, y = p1.y + (p2.y-p1.y)*t;
            const w = p1.w + (p2.w-p1.w)*t;
            ctx.beginPath(); ctx.arc(x, y, w/2, 0, Math.PI*2); ctx.fill();
            if (S.mirrorMode) { ctx.beginPath(); ctx.arc(mirrorX(x), y, w/2, 0, Math.PI*2); ctx.fill(); }
        }
        ctx.restore();
    }

    // =====================================================================
    // SPRAY PAINT — fully opaque dots at varying sizes
    // =====================================================================
    function sprayPaint(x, y) {
        const radius = S.brushSize * 1.5;
        const density = Math.floor(S.brushSize * 1.2);
        const col = getCurrentColor();
        ctx.save();
        ctx.globalAlpha = 1;
        ctx.fillStyle = col;
        for (let i = 0; i < density; i++) {
            const a = Math.random()*Math.PI*2, d = Math.sqrt(Math.random())*radius;
            const px = x+Math.cos(a)*d, py = y+Math.sin(a)*d;
            const ds = 0.5+Math.random()*1.5;
            ctx.beginPath(); ctx.arc(px, py, ds, 0, Math.PI*2); ctx.fill();
            if (S.mirrorMode) { ctx.beginPath(); ctx.arc(mirrorX(px), py, ds, 0, Math.PI*2); ctx.fill(); }
        }
        ctx.restore();
    }

    function startSpray() {
        if (S.sprayInterval) return;
        S.sprayInterval = setInterval(() => {
            if (!S.isDrawing) { stopSpray(); return; }
            sprayPaint(S.lastX, S.lastY); playSpraySound();
        }, 50);
    }
    function stopSpray() { if (S.sprayInterval) { clearInterval(S.sprayInterval); S.sprayInterval = null; } }

    // =====================================================================
    // SHAPES — fully opaque, filled
    // =====================================================================
    function drawShape(c, shape, cx, cy, size, color, fill) {
        c.save(); c.globalAlpha = 1; c.strokeStyle = color; c.fillStyle = color;
        c.lineWidth = Math.max(3, size/15); c.lineCap = 'round'; c.lineJoin = 'round';
        const r = size / 2;
        if (shape === 'circle') { c.beginPath(); c.arc(cx, cy, r, 0, Math.PI*2); fill ? c.fill() : c.stroke(); }
        else if (shape === 'square') { c.beginPath(); c.rect(cx-r, cy-r, r*2, r*2); fill ? c.fill() : c.stroke(); }
        else if (shape === 'triangle') {
            c.beginPath(); c.moveTo(cx, cy-r); c.lineTo(cx+r, cy+r*.75); c.lineTo(cx-r, cy+r*.75); c.closePath();
            fill ? c.fill() : c.stroke();
        }
        else if (shape === 'star') {
            c.beginPath();
            for (let i = 0; i < 10; i++) { const rad = i%2===0 ? r : r*0.4; const a = i*Math.PI/5-Math.PI/2;
                i===0 ? c.moveTo(cx+Math.cos(a)*rad, cy+Math.sin(a)*rad) : c.lineTo(cx+Math.cos(a)*rad, cy+Math.sin(a)*rad); }
            c.closePath(); fill ? c.fill() : c.stroke();
        }
        else if (shape === 'heart') {
            const hs = r; c.beginPath(); c.moveTo(cx, cy+hs*0.7);
            c.bezierCurveTo(cx-hs*1.2, cy-hs*0.3, cx-hs*0.6, cy-hs*1.1, cx, cy-hs*0.5);
            c.bezierCurveTo(cx+hs*0.6, cy-hs*1.1, cx+hs*1.2, cy-hs*0.3, cx, cy+hs*0.7);
            c.closePath(); fill ? c.fill() : c.stroke();
        }
        else if (shape === 'diamond') {
            c.beginPath(); c.moveTo(cx, cy-r); c.lineTo(cx+r*0.6, cy); c.lineTo(cx, cy+r); c.lineTo(cx-r*0.6, cy);
            c.closePath(); fill ? c.fill() : c.stroke();
        }
        c.restore();
    }

    function clearShapePreview() {
        const { w, h } = getContainerSize();
        shapeCtx.clearRect(0, 0, w, h);
    }

    function drawShapePreview(shape, sx, sy, ex, ey, color) {
        clearShapePreview();
        const dx = ex - sx, dy = ey - sy;
        const size = Math.max(20, Math.sqrt(dx*dx + dy*dy) * 2);
        const cx = (sx + ex) / 2, cy = (sy + ey) / 2;
        drawShape(shapeCtx, shape, cx, cy, size, color, false);
        if (S.mirrorMode) drawShape(shapeCtx, shape, mirrorX(cx), cy, size, color, false);
    }

    // =====================================================================
    // POINTER EVENTS
    // =====================================================================
    canvas.addEventListener('pointerdown', e => {
        if (e.button !== 0 && e.pointerType === 'mouse') return;
        e.preventDefault(); canvas.setPointerCapture(e.pointerId); ensureAudio();
        if (!S.hasDrawn) S.hasDrawn = true;
        const pos = getCanvasPos(e);

        // Fill
        if (S.tool === 'fill') { floodFill(pos.x, pos.y, getCurrentColor()); saveHistory(); playSplash(); return; }
        // Stamp
        if (S.tool === 'stamp' && S.stamp) {
            const sz = STAMP_SIZES[S.brushSize] || 70;
            drawEmojiStamp(ctx, S.stamp, pos.x, pos.y, sz);
            if (S.mirrorMode) drawEmojiStamp(ctx, S.stamp, mirrorX(pos.x), pos.y, sz);
            saveHistory(); playPop(); hideGhostStamp(); return;
        }
        // Shape start
        if (S.tool === 'shape' && S.shape) { S.shapeStart = { x: pos.x, y: pos.y }; S.isDrawing = true; return; }

        S.isDrawing = true; S.lastX = pos.x; S.lastY = pos.y; S.drawSpeed = 0;

        if (S.tool === 'brush') {
            S.brushPoints = []; brushAddPoint(pos.x, pos.y);
            const col = getCurrentColor();
            ctx.save(); ctx.globalAlpha = 1; ctx.fillStyle = col;
            ctx.beginPath(); ctx.arc(pos.x, pos.y, S.brushSize/2, 0, Math.PI*2); ctx.fill();
            if (S.mirrorMode) { ctx.beginPath(); ctx.arc(mirrorX(pos.x), pos.y, S.brushSize/2, 0, Math.PI*2); ctx.fill(); }
            ctx.restore();
        } else if (S.tool === 'spray') {
            sprayPaint(pos.x, pos.y); startSpray(); playSpraySound();
        } else {
            const col = S.tool === 'eraser' ? S.bgColor : getCurrentColor();
            ctx.save(); ctx.globalAlpha = 1;
            ctx.beginPath(); ctx.arc(pos.x, pos.y, S.brushSize/2, 0, Math.PI*2); ctx.fillStyle = col; ctx.fill();
            if (S.mirrorMode && S.tool !== 'eraser') {
                ctx.beginPath(); ctx.arc(mirrorX(pos.x), pos.y, S.brushSize/2, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }
        if (S.tool === 'pencil' || S.tool === 'brush') startBrushSound();
    });

    canvas.addEventListener('pointermove', e => {
        const pos = getCanvasPos(e);
        if (S.tool === 'eraser' || S.tool === 'spray') updateEraserCursor(e.clientX, e.clientY);
        if (S.tool === 'stamp' && S.stamp && e.pointerType === 'mouse' && !S.isDrawing) showGhostStamp(e.clientX, e.clientY);
        if (!S.isDrawing) return;
        e.preventDefault();

        // Shape drag preview
        if (S.tool === 'shape' && S.shapeStart) {
            drawShapePreview(S.shape, S.shapeStart.x, S.shapeStart.y, pos.x, pos.y, getCurrentColor());
            return;
        }

        const dx = pos.x - S.lastX, dy = pos.y - S.lastY;
        S.drawSpeed = Math.sqrt(dx*dx + dy*dy);

        if (S.tool === 'brush') {
            brushAddPoint(pos.x, pos.y); brushDrawIncremental();
        } else if (S.tool === 'spray') {
            S.lastX = pos.x; S.lastY = pos.y;
        } else {
            const col = S.tool === 'eraser' ? S.bgColor : getCurrentColor();
            ctx.save(); ctx.globalAlpha = 1;
            ctx.beginPath(); ctx.moveTo(S.lastX, S.lastY); ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = col; ctx.lineWidth = S.brushSize; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
            if (S.mirrorMode && S.tool !== 'eraser') {
                ctx.beginPath(); ctx.moveTo(mirrorX(S.lastX), S.lastY); ctx.lineTo(mirrorX(pos.x), pos.y); ctx.stroke();
            }
            ctx.restore();
        }
        S.lastX = pos.x; S.lastY = pos.y;
        if (S.tool === 'pencil' || S.tool === 'brush') updateBrushSound(S.drawSpeed);
    });

    canvas.addEventListener('pointerup', e => {
        if (S.isDrawing) {
            // Shape finalize
            if (S.tool === 'shape' && S.shapeStart) {
                const pos = getCanvasPos(e);
                const sx = S.shapeStart.x, sy = S.shapeStart.y;
                const dx = pos.x - sx, dy = pos.y - sy;
                const size = Math.max(20, Math.sqrt(dx*dx + dy*dy) * 2);
                const cx2 = (sx + pos.x) / 2, cy2 = (sy + pos.y) / 2;
                const col = getCurrentColor();
                drawShape(ctx, S.shape, cx2, cy2, size, col, true);
                if (S.mirrorMode) drawShape(ctx, S.shape, mirrorX(cx2), cy2, size, col, true);
                clearShapePreview();
                S.shapeStart = null; playPop();
            }
            S.isDrawing = false; stopSpray(); saveHistory(); stopBrushSound(); S.brushPoints = [];
        }
    });

    canvas.addEventListener('pointercancel', () => {
        S.isDrawing = false; stopSpray(); saveHistory(); stopBrushSound(); S.brushPoints = [];
        S.shapeStart = null; clearShapePreview();
    });
    canvas.addEventListener('pointerleave', () => { hideEraserCursor(); hideGhostStamp(); });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    // =====================================================================
    // ERASER CURSOR / GHOST STAMP
    // =====================================================================
    const eraserCursorEl = document.getElementById('eraser-cursor');
    function updateEraserCursor(cx, cy) {
        const sz = S.tool === 'spray' ? S.brushSize * 3 : S.brushSize;
        eraserCursorEl.style.display = 'block';
        eraserCursorEl.style.width = sz + 'px'; eraserCursorEl.style.height = sz + 'px';
        eraserCursorEl.style.left = cx + 'px'; eraserCursorEl.style.top = cy + 'px';
        eraserCursorEl.style.borderStyle = S.tool === 'spray' ? 'dashed' : 'solid';
        eraserCursorEl.style.borderColor = S.tool === 'spray' ? '#AAA' : '#999';
    }
    function hideEraserCursor() { eraserCursorEl.style.display = 'none'; }

    const ghostEl = document.getElementById('ghost-stamp');
    function showGhostStamp(cx, cy) {
        if (!S.stamp) return;
        const sz = STAMP_SIZES[S.brushSize] || 70;
        ghostEl.textContent = S.stamp; ghostEl.style.fontSize = sz + 'px';
        ghostEl.style.display = 'block'; ghostEl.style.left = cx + 'px'; ghostEl.style.top = cy + 'px';
    }
    function hideGhostStamp() { ghostEl.style.display = 'none'; }

    function drawEmojiStamp(c, emoji, x, y, size) {
        c.save(); c.globalAlpha = 1; c.font = size + 'px serif';
        c.textAlign = 'center'; c.textBaseline = 'middle';
        c.fillText(emoji, x, y); c.restore();
    }

    // =====================================================================
    // FLOOD FILL (Scanline)
    // =====================================================================
    function floodFill(startX, startY, fillColor) {
        const { w, h } = getContainerSize();
        const dpr = window.devicePixelRatio || 1;
        const cw = canvas.width, ch = canvas.height;
        const sx = Math.round(startX * dpr), sy = Math.round(startY * dpr);
        if (sx < 0 || sx >= cw || sy < 0 || sy >= ch) return;
        const imageData = ctx.getImageData(0, 0, cw, ch);
        const data = imageData.data;
        const pixels = new Uint32Array(data.buffer);
        const targetColor = pixels[sy * cw + sx];

        let fc;
        if (fillColor.startsWith('hsl')) {
            const tc = document.createElement('canvas'); tc.width = 1; tc.height = 1;
            const t = tc.getContext('2d'); t.fillStyle = fillColor; t.fillRect(0,0,1,1);
            const p = t.getImageData(0,0,1,1).data;
            fc = { r: p[0], g: p[1], b: p[2], a: 255 };
        } else { fc = hexToRGBA(fillColor); }

        const fillUint = (fc.a << 24) | (fc.b << 16) | (fc.g << 8) | fc.r;
        if (targetColor === fillUint) return;

        const tolerance = 32;
        const tr = targetColor & 0xFF, tg = (targetColor >> 8) & 0xFF, tb = (targetColor >> 16) & 0xFF;
        let visited = 0;
        const maxPixels = cw * ch * 0.8;

        function matches(idx) {
            const c = pixels[idx];
            const r = c & 0xFF, g = (c >> 8) & 0xFF, b = (c >> 16) & 0xFF;
            const dr = r - tr, dg = g - tg, db = b - tb;
            return (dr*dr + dg*dg + db*db) <= tolerance * tolerance;
        }

        const queue = [[sx, sy]];
        const seen = new Uint8Array(cw * ch);
        seen[sy * cw + sx] = 1;

        while (queue.length > 0) {
            const [px, py] = queue.pop();
            if (!matches(py * cw + px)) continue;
            let left = px, right = px;
            while (left > 0 && matches(py * cw + left - 1) && !seen[py * cw + left - 1]) left--;
            while (right < cw - 1 && matches(py * cw + right + 1) && !seen[py * cw + right + 1]) right++;
            for (let x = left; x <= right; x++) { pixels[py * cw + x] = fillUint; seen[py * cw + x] = 1; visited++; }
            if (visited > maxPixels) { for (let i = 0; i < pixels.length; i++) { if (matches(i)) pixels[i] = fillUint; } break; }
            for (const ny of [py - 1, py + 1]) {
                if (ny < 0 || ny >= ch) continue;
                let inSpan = false;
                for (let x = left; x <= right; x++) {
                    const idx = ny * cw + x;
                    if (matches(idx) && !seen[idx]) { if (!inSpan) { queue.push([x, ny]); inSpan = true; } }
                    else { inSpan = false; }
                }
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }

    // =====================================================================
    // UNDO
    // =====================================================================
    function doUndo() {
        if (S.historyIndex <= 0) {
            if (S.historyIndex === 0) {
                S.historyIndex = -1;
                const { w, h } = getContainerSize();
                ctx.fillStyle = S.bgColor; ctx.fillRect(0, 0, w, h);
                playWhoosh();
            }
            updateUndoBtn(); return;
        }
        S.historyIndex--;
        const img = new Image();
        img.onload = () => { const { w, h } = getContainerSize(); ctx.clearRect(0,0,w,h); ctx.drawImage(img, 0, 0, w, h); };
        img.src = S.history[S.historyIndex];
        playWhoosh(); updateUndoBtn();
    }

    let undoHoldTimer = null, undoRapidInterval = null;
    function startUndoHold() {
        undoHoldTimer = setTimeout(() => {
            undoRapidInterval = setInterval(() => {
                if (S.historyIndex <= 0) { if (S.historyIndex === 0) doUndo(); stopUndoHold(); return; }
                doUndo();
            }, 300);
        }, 400);
    }
    function stopUndoHold() { clearTimeout(undoHoldTimer); clearInterval(undoRapidInterval); }

    function updateUndoBtn() {
        const btn = document.getElementById('btn-undo');
        if (!btn) return;
        btn.classList.toggle('disabled', S.historyIndex < 0);
        let badge = btn.querySelector('.undo-badge');
        if (!badge) { badge = document.createElement('div'); badge.className = 'undo-badge'; btn.appendChild(badge); }
        if (S.historyIndex >= 0) { badge.textContent = S.historyIndex + 1; badge.classList.add('show'); }
        else { badge.classList.remove('show'); }
    }

    // =====================================================================
    // CLEAR
    // =====================================================================
    function handleClear() {
        const btn = document.getElementById('btn-clear');
        const toast = document.getElementById('confirm-toast');
        if (S.clearConfirm) {
            clearTimeout(S.clearTimer); S.clearConfirm = false;
            btn.innerHTML = '🗑️'; btn.classList.remove('confirm-state');
            toast.classList.remove('show');
            const { w, h } = getContainerSize();
            ctx.fillStyle = S.bgColor; ctx.fillRect(0, 0, w, h);
            S.history = []; S.historyIndex = -1; S.hasDrawn = false; updateUndoBtn();
            const cc = document.getElementById('canvas-container');
            cc.classList.add('clear-flash'); setTimeout(() => cc.classList.remove('clear-flash'), 200);
            playWhoosh();
        } else {
            S.clearConfirm = true; btn.classList.add('confirm-state'); btn.innerHTML = '✅';
            toast.classList.add('show');
            S.clearTimer = setTimeout(() => {
                S.clearConfirm = false; btn.classList.remove('confirm-state');
                btn.innerHTML = '🗑️'; toast.classList.remove('show');
            }, 3000);
        }
    }

    // =====================================================================
    // DOWNLOAD
    // =====================================================================
    function doDownload() {
        const btn = document.getElementById('btn-download');
        const link = document.createElement('a');
        const now = new Date();
        const ts = now.getFullYear().toString() + String(now.getMonth()+1).padStart(2,'0') +
            String(now.getDate()).padStart(2,'0') + '-' + String(now.getHours()).padStart(2,'0') +
            String(now.getMinutes()).padStart(2,'0') + String(now.getSeconds()).padStart(2,'0');
        link.download = 'my-drawing-' + ts + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        btn.classList.add('download-ok'); btn.innerHTML = '✅';
        setTimeout(() => { btn.classList.remove('download-ok'); btn.innerHTML = '📥'; }, 1200);
    }

    // =====================================================================
    // PANELS
    // =====================================================================
    const panelOverlay = document.getElementById('panel-overlay');

    function openPanel(name) {
        if (S.activePanel === name) { closePanel(); return; }
        closePanel();
        S.activePanel = name;
        document.getElementById(name + '-panel').classList.add('open');
        panelOverlay.classList.add('show');
        if (name === 'stamp') buildStampGrid();
        if (name === 'template') buildTemplateGrid();
        playClick();
    }

    function closePanel() {
        if (!S.activePanel) return;
        const el = document.getElementById(S.activePanel + '-panel');
        if (el) el.classList.remove('open');
        S.activePanel = null;
        panelOverlay.classList.remove('show');
    }

    panelOverlay.addEventListener('pointerdown', e => { e.stopPropagation(); closePanel(); updateSelections(); });

    // =====================================================================
    // STAMP GRID
    // =====================================================================
    function buildStampGrid() {
        const grid = document.getElementById('stamp-grid');
        grid.innerHTML = '';
        for (const [cat, emojis] of Object.entries(EMOJI_STAMPS)) {
            const lbl = document.createElement('div'); lbl.className = 'emoji-cat-label'; lbl.textContent = cat;
            grid.appendChild(lbl);
            emojis.forEach(emoji => {
                const btn = document.createElement('button'); btn.className = 'stamp-btn'; btn.textContent = emoji;
                if (S.tool === 'stamp' && S.stamp === emoji) btn.classList.add('selected');
                btn.addEventListener('pointerdown', e => {
                    e.stopPropagation(); S.tool = 'stamp'; S.stamp = emoji; S.shape = null;
                    updateSelections();
                    grid.querySelectorAll('.stamp-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected'); closePanel(); playPop();
                });
                grid.appendChild(btn);
            });
        }
    }

    // =====================================================================
    // TEMPLATE GRID
    // =====================================================================
    function buildTemplateGrid() {
        const grid = document.getElementById('template-grid');
        grid.innerHTML = '';
        TEMPLATES.forEach((tmpl, idx) => {
            const btn = document.createElement('button'); btn.className = 'template-btn';
            const c = document.createElement('canvas'); c.width = 88; c.height = 88;
            const tc = c.getContext('2d');
            tc.fillStyle = '#FFFFFF'; tc.fillRect(0, 0, 88, 88);
            try { tmpl.draw(tc, 44, 46, 0.4); } catch(err) {}
            btn.appendChild(c);
            const lbl = document.createElement('span'); lbl.textContent = tmpl.name; btn.appendChild(lbl);
            btn.addEventListener('pointerdown', e => { e.stopPropagation(); applyTemplate(idx); closePanel(); updateSelections(); });
            grid.appendChild(btn);
        });
    }

    function applyTemplate(idx) {
        const tmpl = TEMPLATES[idx];
        const { w, h } = getContainerSize();
        S.bgColor = '#FFFFFF'; ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, w, h);
        const scale = Math.min(w, h) * 0.7 / 200;
        tmpl.draw(ctx, w/2, h/2, scale);
        S.hasDrawn = true; S.history = []; S.historyIndex = -1;
        saveHistory(); S.tool = 'fill'; updateSelections();
    }

    // =====================================================================
    // BUILD UI
    // =====================================================================
    function makeToolBtn(id, icon, handler) {
        const btn = document.createElement('button'); btn.className = 'tool-btn'; btn.id = 'btn-' + id;
        btn.innerHTML = icon;
        btn.addEventListener('pointerdown', e => { e.stopPropagation(); handler(); });
        return btn;
    }

    function buildToolbar() {
        const left = document.getElementById('toolbar-left');
        const right = document.getElementById('toolbar-right');

        // Color button
        const colorBtn = document.createElement('button');
        colorBtn.id = 'btn-color'; colorBtn.style.background = S.color;
        colorBtn.addEventListener('pointerdown', e => {
            e.stopPropagation(); openPanel('color');
            colorBtn.classList.toggle('panel-open', S.activePanel === 'color');
        });
        left.appendChild(colorBtn);

        // Pencil
        left.appendChild(makeToolBtn('pencil', '✏️', () => {
            S.tool = 'pencil'; S.stamp = null; S.shape = null; closePanel(); updateSelections(); playClick();
        }));
        // Brush
        left.appendChild(makeToolBtn('brush', '🖌️', () => {
            S.tool = 'brush'; S.stamp = null; S.shape = null; closePanel(); updateSelections(); playClick();
        }));
        // Eraser
        left.appendChild(makeToolBtn('eraser', '🧽', () => {
            S.tool = S.tool === 'eraser' ? 'pencil' : 'eraser'; S.stamp = null; S.shape = null;
            closePanel(); hideEraserCursor(); updateSelections(); playClick();
        }));

        // More tools
        right.appendChild(makeToolBtn('more', '🎨', () => { openPanel('more'); updateSelections(); }));

        const undoBtn = makeToolBtn('undo', '↩️', () => { doUndo(); startUndoHold(); });

        undoBtn.addEventListener('pointercancel', stopUndoHold);
        undoBtn.addEventListener('pointerleave', stopUndoHold);
        right.appendChild(undoBtn);

        right.appendChild(makeToolBtn('actions', '⋯', () => { openPanel('actions'); updateSelections(); }));

    function buildColorPanel() {
        const grid = document.getElementById('color-grid');
        COLORS.forEach(color => {
            const dot = document.createElement('div'); dot.className = 'color-dot'; dot.style.background = color;
            if (color === '#FAFAFA') dot.style.boxShadow = 'inset 0 0 0 1px #DDD';
            if (color === S.color) dot.classList.add('selected');
            dot.addEventListener('pointerdown', e => {
                e.stopPropagation(); S.color = color; S.rainbowMode = false;
                if (S.tool === 'eraser') S.tool = 'pencil';
                if (S.tool === 'stamp') { S.tool = 'pencil'; S.stamp = null; }
                updateSelections(); closePanel(); playPop();
            });
            grid.appendChild(dot);
        });

        // Rainbow toggle
        document.getElementById('rainbow-toggle').addEventListener('pointerdown', e => {
            e.stopPropagation(); S.rainbowMode = !S.rainbowMode;
            if (S.tool === 'eraser') S.tool = 'pencil';
            updateSelections(); playPop();
        });

        // Brush sizes
        const sizeRow = document.getElementById('size-row');
        BRUSH_SIZES.forEach(s => {
            const btn = document.createElement('div'); btn.className = 'size-btn'; btn.dataset.draw = s.draw;
            const inner = document.createElement('div'); inner.className = 'size-preview';
            inner.style.width = s.dot + 'px'; inner.style.height = s.dot + 'px'; inner.style.background = S.color;
            btn.appendChild(inner);
            if (s.draw === S.brushSize) btn.classList.add('selected');
            btn.addEventListener('pointerdown', e => { e.stopPropagation(); S.brushSize = s.draw; updateSelections(); playClick(); });
            sizeRow.appendChild(btn);
        });
    }

    function buildMorePanel() {
        const grid = document.getElementById('more-tools-grid');
        const tools = [
            { id: 'fill', icon: '🪣', handler() { S.tool = S.tool === 'fill' ? 'pencil' : 'fill'; S.stamp = null; S.shape = null; closePanel(); updateSelections(); playClick(); } },
            { id: 'spray', icon: '💨', handler() { S.tool = S.tool === 'spray' ? 'pencil' : 'spray'; S.stamp = null; S.shape = null; closePanel(); updateSelections(); playClick(); } },
            { id: 'stamp2', icon: '😀', handler() { closePanel(); setTimeout(() => openPanel('stamp'), 60); } },
            { id: 'shapes2', icon: '⭐', handler() { closePanel(); setTimeout(() => openPanel('shapes'), 60); } },
            { id: 'template2', icon: '📖', handler() { closePanel(); setTimeout(() => openPanel('template'), 60); } },
            { id: 'mirror', icon: '🪞', handler() { S.mirrorMode = !S.mirrorMode; document.getElementById('mirror-line').classList.toggle('show', S.mirrorMode); updateSelections(); playClick(); } },
        ];
        tools.forEach(t => { grid.appendChild(makeToolBtn(t.id, t.icon, t.handler)); });

        // BG swatches
        const bgRow = document.getElementById('bg-row');
        BG_COLORS.forEach(color => {
            const dot = document.createElement('div'); dot.className = 'bg-swatch'; dot.style.background = color;
            if (color === '#FFFFFF') dot.style.border = '3px solid #DDD';
            if (color === S.bgColor) dot.classList.add('sel');
            dot.addEventListener('pointerdown', e => {
                e.stopPropagation(); S.bgColor = color;
                const { w, h } = getContainerSize();
                ctx.fillStyle = S.bgColor; ctx.fillRect(0, 0, w, h);
                S.hasDrawn = true; saveHistory(); updateSelections(); closePanel(); playPop();
            });
            bgRow.appendChild(dot);
        });
    }

    function buildShapesPanel() {
        const grid = document.getElementById('shapes-grid');
        SHAPES.forEach(sh => {
            const btn = document.createElement('button'); btn.className = 'shape-btn'; btn.innerHTML = sh.icon; btn.dataset.shape = sh.id;
            if (S.tool === 'shape' && S.shape === sh.id) btn.classList.add('selected');
            btn.addEventListener('pointerdown', e => {
                e.stopPropagation(); S.tool = 'shape'; S.shape = sh.id; S.stamp = null;
                updateSelections();
                grid.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected'); closePanel(); playPop();
            });
            grid.appendChild(btn);
        });
    }

    function buildActionsPanel() {
        const grid = document.getElementById('actions-grid');
        grid.appendChild(makeToolBtn('clear', '🗑️', handleClear));
        grid.appendChild(makeToolBtn('download', '📥', () => { doDownload(); closePanel(); }));
        const soundBtn = makeToolBtn('sound', '🔊', () => {
            ensureAudio(); S.soundEnabled = !S.soundEnabled;
            soundBtn.innerHTML = S.soundEnabled ? '🔊' : '🔇';
            if (S.soundEnabled) playPop();
        });
        grid.appendChild(soundBtn);
    }

    // =====================================================================
    // UPDATE SELECTIONS
    // =====================================================================
    function updateSelections() {
        // Color button
        const colorBtn = document.getElementById('btn-color');
        if (colorBtn) {
            if (S.rainbowMode) {
                colorBtn.style.background = '#FF6B6B';
                colorBtn.style.boxShadow = '0 0 0 2px #FFD93D, 0 0 0 4px #4D96FF';
            } else {
                colorBtn.style.background = S.color;
                colorBtn.style.boxShadow = '0 0 0 2px #DDD';
            }
            colorBtn.classList.toggle('panel-open', S.activePanel === 'color');
        }

        // Color dots
        document.querySelectorAll('.color-dot').forEach(dot => {
            const dc = rgbToHex(dot.style.backgroundColor).toUpperCase();
            const match = S.tool !== 'eraser' && !S.rainbowMode && dc === S.color.toUpperCase();
            dot.classList.toggle('selected', match);
        });

        // Rainbow toggle
        const rt = document.getElementById('rainbow-toggle');
        if (rt) rt.classList.toggle('active', S.rainbowMode);

        // Brush sizes
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.classList.toggle('selected', parseInt(btn.dataset.draw) === S.brushSize);
        });
        document.querySelectorAll('.size-preview').forEach(p => {
            p.style.background = S.rainbowMode ? '#FF6B6B' : S.color;
        });

        // Tool buttons
        ['pencil','brush','eraser'].forEach(t => {
            const b = document.getElementById('btn-' + t);
            if (b) b.classList.toggle('selected', S.tool === t);
        });
        const fillBtn = document.getElementById('btn-fill');
        if (fillBtn) fillBtn.classList.toggle('selected', S.tool === 'fill');
        const sprayBtn = document.getElementById('btn-spray');
        if (sprayBtn) sprayBtn.classList.toggle('selected', S.tool === 'spray');
        const mirrorBtn = document.getElementById('btn-mirror');
        if (mirrorBtn) mirrorBtn.classList.toggle('selected', S.mirrorMode);

        // BG swatches
        document.querySelectorAll('.bg-swatch').forEach(sw => {
            sw.classList.toggle('sel', rgbToHex(sw.style.backgroundColor).toUpperCase() === S.bgColor.toUpperCase());
        });

        // Canvas cursor
        if (S.tool === 'eraser' || S.tool === 'spray') canvas.style.cursor = 'none';
        else canvas.style.cursor = 'crosshair';
        if (S.tool !== 'eraser' && S.tool !== 'spray') hideEraserCursor();
        if (S.tool !== 'stamp') hideGhostStamp();

        // Mirror line
        document.getElementById('mirror-line').classList.toggle('show', S.mirrorMode);
    }

    function rgbToHex(rgb) {
        if (rgb.startsWith('#')) return rgb;
        const m = rgb.match(/(\d+)/g);
        if (!m) return '#000000';
        return '#' + m.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
    }

    // =====================================================================
    // ONBOARDING
    // =====================================================================
    function initOnboarding() {
        const seen = localStorage.getItem('drawkids_onboarded');
        if (!seen) {
            document.getElementById('onboarding').classList.remove('gone');
            document.getElementById('onboard-go').addEventListener('pointerdown', e => {
                e.stopPropagation();
                document.getElementById('onboarding').classList.add('gone');
                localStorage.setItem('drawkids_onboarded', '1');
                ensureAudio(); playPop();
            });
        }
    }

    // =====================================================================
    // RESIZE & PREVENT NAVIGATION
    // =====================================================================
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('beforeunload', e => {
        if (S.hasDrawn && S.historyIndex >= 0) { e.preventDefault(); e.returnValue = ''; }
    });

    // =====================================================================
    // INIT
    // =====================================================================
    function init() {
        buildToolbar();
        buildColorPanel();
        buildMorePanel();
        buildShapesPanel();
        buildActionsPanel();
        resizeCanvas();
        updateSelections();
        initOnboarding();
    }
    init();
</script>
</body>
