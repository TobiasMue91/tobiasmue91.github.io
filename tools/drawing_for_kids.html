            padding: 0 2px;

        .color-dot:active {
            transform: scale(0.92);
        }

        .color-dot.selected {
            border: 3px solid #2D3436;

            transform: scale(1.15);
        }

        .brush-dot {
            width: 44px;
            height: 44px;

            flex-shrink: 0;
            cursor: pointer;

            align-items: center;
            justify-content: center;
            border: 3px solid transparent;
            outline: none;
            transition: transform 0.12s ease-out;

        .brush-dot:active {
            transform: scale(0.92);
        }

        .brush-dot.selected {
            border: 3px solid #2D3436;

        }

        .brush-dot-inner {
            border-radius: 50%;

        }

        .tool-btn {

            height: 48px;

        .tool-btn:hover {

        .tool-btn:active {
            transform: scale(0.92);
        }

        .tool-btn.selected {
            border: 3px solid #2D3436;
            box-shadow: inset 0 0 0 2px #fff;
        }

        .tool-btn.disabled {

            pointer-events: none;

        }
    </style>

<script>
    // ===================================================================
    // STATE
    // ===================================================================
    const state = {
        color: '#4D96FF',
        brushSize: 20,
        tool: 'pencil', // 'pencil' | 'brush' | 'eraser' | 'stamp' | 'fill'

        undoRapidInterval: null,
        activeSheet: null,

        lastPointerY: 0,

        brushPoints: [],
    };

    const COLORS = [
        '#FF6B6B', '#FF8F3F', '#FFD93D', '#6BCB77', '#00BCD4',
        '#4D96FF', '#9B5DE5', '#F472B6', '#8B5E3C', '#2D3436', '#636E72', '#FAFAFA'
    ];

    const BRUSH_SIZES = [
        {dot: 6, draw: 4},
        {dot: 12, draw: 10},
        {dot: 20, draw: 20},
        {dot: 28, draw: 36},
    ];

    const STAMP_SIZES = {4: 30, 10: 50, 20: 70, 36: 100};

    const MAX_HISTORY = 15;

    const BG_COLORS = ['#FFFFFF', '#E3F2FD', '#FFF9E6', '#1A1A2E'];

    // Emoji stamps organized by category
    const EMOJI_STAMPS = {
        'Faces': ['😀', '😂', '🥰', '😎', '🤩', '😜', '🥺', '😸', '👻', '🤖'],
        'Animals': ['🐶', '🐱', '🐸', '🦋', '🐢', '🐙', '🦄', '🐝', '🐬', '🦊'],
        'Nature': ['🌸', '🌻', '🌈', '⭐', '🌙', '☀️', '❄️', '🔥', '💧', '🍀'],
        'Food': ['🍕', '🍦', '🍎', '🧁', '🍩', '🍓', '🌮', '🍪', '🍉', '🥑'],
        'Objects': ['🎈', '🎨', '🚀', '⚽', '🎸', '💎', '🏠', '🚗', '✈️', '🎁'],
        'Hearts': ['❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '💖', '💝'],
    };

    // ===================================================================
    // SVG ICONS (fixed/improved)
    // ===================================================================
    const ICONS = {
        pencil: `<svg viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>`,

        brush: `<svg viewBox="0 0 24 24"><path d="M18.37 2.63a2.12 2.12 0 0 1 3 3L14 13l-4 1 1-4 7.37-7.37z"/><path d="M9 15c-3 0-5 2-5 4 0 1.5-1.5 2-2 2 1.5 0 4-.5 5-2 .5-.75 1-1.5 1-2.5"/></svg>`,

        eraser: `<svg viewBox="0 0 24 24"><path d="M7 21h10"/><path d="M5.5 13.5 12 7l5.5 5.5-4 4H7l-1.5-3z"/><path d="M12 7l5.5-3.5a1.5 1.5 0 0 1 2 2L14 11"/></svg>`,

        fill: `<svg viewBox="0 0 24 24"><path d="M16.5 9.4l-9-9-1.4 1.4 2.3 2.3-5.2 5.2a2 2 0 0 0 0 2.8l5.2 5.2a2 2 0 0 0 2.8 0l5.2-5.2a2 2 0 0 0 0-2.8z"/><path d="M2 12l5.2 5.2"/><path d="M7.5 7.1L12 2.6"/><path d="M19 15c.6 1 1 2 1 3a3 3 0 0 1-6 0c0-1 .4-2 1-3l2-3 2 3z" fill="currentColor" stroke="none"/></svg>`,

        stamp: `<svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M9 11v3H6a1 1 0 0 0-1 1v1h14v-1a1 1 0 0 0-1-1h-3v-3"/><path d="M4 19h16v2H4z"/></svg>`,

        undo: `<svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.5 15a9 9 0 1 0 2.1-6.5L1 10"/></svg>`,

        trash: `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,

        check: `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,

        download: `<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,

        book: `<svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="13" y2="11"/></svg>`,

        sound: `<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="none"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>`,

        soundOff: `<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="none"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`,
    };

    // ===================================================================
    // AUDIO ENGINE
    // ===================================================================
    let audioCtx = null;
    let brushOsc = null;
    let brushGain = null;
    let brushActive = false;

    function ensureAudio() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
        }
    }

    // Map color to frequency: bright/warm colors = higher pitch, dark/cool = lower
    function colorToFreq(color) {
        const hex = color.replace('#', '');
        const r = parseInt(hex.substring(0, 2), 16);
        const g = parseInt(hex.substring(2, 4), 16);
        const b = parseInt(hex.substring(4, 6), 16);
        // Perceived brightness
        const brightness = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
        // Hue influence: reds/yellows higher, blues lower
        const warmth = (r - b) / 510 + 0.5; // 0..1
        const combined = brightness * 0.6 + warmth * 0.4;
        // Map to frequency range 180 - 520 Hz
        return 180 + combined * 340;
    }

    function startBrushSound() {
        if (!state.soundEnabled || !audioCtx) return;
        if (brushActive) return;
        brushOsc = audioCtx.createOscillator();
        brushGain = audioCtx.createGain();
        brushOsc.type = 'sine';
        brushOsc.frequency.value = colorToFreq(state.color);
        brushGain.gain.value = 0.06;
        brushOsc.connect(brushGain);
        brushGain.connect(audioCtx.destination);
        brushOsc.start();
        brushActive = true;
    }

    function updateBrushSound(speed) {
        if (!brushActive || !brushOsc) return;
        const baseFreq = colorToFreq(state.color);
        const freq = baseFreq + Math.min(speed, 500) * 0.4;
        brushOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
    }

    function stopBrushSound() {
        if (!brushActive || !brushOsc) return;
        brushGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
        const osc = brushOsc;
        setTimeout(() => {
            try {
                osc.stop();
            } catch (e) {
            }
        }, 100);
        brushOsc = null;
        brushGain = null;
        brushActive = false;
    }

    function playPop() {
        if (!state.soundEnabled || !audioCtx) return;
        const freq = colorToFreq(state.color);
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.value = freq + 200;
        o.frequency.setTargetAtTime(freq - 50, audioCtx.currentTime, 0.05);
        g.gain.value = 0.1;
        g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.08);
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start();
        o.stop(audioCtx.currentTime + 0.15);
    }

    function playWhoosh() {
        if (!state.soundEnabled || !audioCtx) return;
        const bufSize = audioCtx.sampleRate * 0.15;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.value = 2000;
        filt.frequency.setTargetAtTime(200, audioCtx.currentTime, 0.06);
        const g = audioCtx.createGain();
        g.gain.value = 0.08;
        src.connect(filt);
        filt.connect(g);
        g.connect(audioCtx.destination);
        src.start();
        src.stop(audioCtx.currentTime + 0.2);
    }

    function playSplash() {
        if (!state.soundEnabled || !audioCtx) return;
        const baseFreq = colorToFreq(state.color);
        const bufSize = audioCtx.sampleRate * 0.25;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.value = baseFreq;
        filt.frequency.setTargetAtTime(baseFreq + 800, audioCtx.currentTime, 0.08);
        filt.Q.value = 2;
        const g = audioCtx.createGain();
        g.gain.value = 0.1;
        src.connect(filt);
        filt.connect(g);
        g.connect(audioCtx.destination);
        src.start();
        src.stop(audioCtx.currentTime + 0.3);
    }

    // ===================================================================
    // CANVAS SETUP
    // ===================================================================
    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});

    function getContainerSize() {
        const c = document.getElementById('canvas-container');
        return {w: c.clientWidth, h: c.clientHeight};
    }

    function resizeCanvas() {
        const {w, h} = getContainerSize();
        const dpr = window.devicePixelRatio || 1;
        let imgData = null;
        if (state.historyIndex >= 0 && state.history[state.historyIndex]) {
            imgData = state.history[state.historyIndex];
        }
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.fillStyle = state.bgColor;
        ctx.fillRect(0, 0, w, h);
        if (imgData) {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, w, h);
            };
            img.src = imgData;
        }
    }

    // ===================================================================
    // HISTORY
    // ===================================================================
    function saveHistory() {
        state.history = state.history.slice(0, state.historyIndex + 1);
        state.history.push(canvas.toDataURL('image/png'));
        if (state.history.length > MAX_HISTORY) state.history.shift();
        state.historyIndex = state.history.length - 1;
        updateUndoBtn();
    }

    // ===================================================================
    // DRAWING
    // ===================================================================
    function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {x: e.clientX - rect.left, y: e.clientY - rect.top};
    }

    function getCurrentDrawSize(pressure) {
        const base = state.brushSize;
        if (pressure !== undefined && pressure > 0 && pressure < 1) {
            return base * (0.4 + pressure * 0.6);
        }
        return base;
    }

    canvas.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 && e.pointerType === 'mouse') return;
        e.preventDefault();
        canvas.setPointerCapture(e.pointerId);
        ensureAudio();

        if (!state.hasDrawn) {
            state.hasDrawn = true;
            hideBgPicker();
        }

        const pos = getCanvasPos(e);
        state.lastPointerX = pos.x;
        state.lastPointerY = pos.y;

        // Fill tool
        if (state.tool === 'fill') {
            floodFill(pos.x, pos.y, state.color);
            saveHistory();
            playSplash();
            return;
        }

        // Stamp tool
        if (state.tool === 'stamp' && state.stamp) {
            const size = STAMP_SIZES[state.brushSize] || 70;
            drawEmojiStamp(ctx, state.stamp, pos.x, pos.y, size);
            saveHistory();
            playPop();
            hideGhostStamp();
            return;
        }

        // Pencil / Brush / Eraser
        state.isDrawing = true;
        state.lastX = pos.x;
        state.lastY = pos.y;
        state.drawSpeed = 0;

        if (state.tool === 'brush') {
            state.brushPoints = [{x: pos.x, y: pos.y, pressure: e.pressure || 0.5}];
            // Draw initial dot
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, state.brushSize / 2, 0, Math.PI * 2);
            ctx.fillStyle = hexToRGBAString(state.color, 0.5);
            ctx.fill();
        } else {
            const sz = getCurrentDrawSize(e.pressure);
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, sz / 2, 0, Math.PI * 2);
            ctx.fillStyle = state.tool === 'eraser' ? state.bgColor : state.color;
            ctx.fill();
        }

        if (state.tool === 'pencil' || state.tool === 'brush') startBrushSound();
    });

    canvas.addEventListener('pointermove', (e) => {
        const pos = getCanvasPos(e);
        state.lastPointerX = e.clientX;
        state.lastPointerY = e.clientY;

        if (state.tool === 'eraser') updateEraserCursor(e.clientX, e.clientY);
        if (state.tool === 'stamp' && state.stamp && e.pointerType === 'mouse' && !state.isDrawing) {
            showGhostStamp(e.clientX, e.clientY);
        }

        if (!state.isDrawing) return;
        e.preventDefault();

        const dx = pos.x - state.lastX;
        const dy = pos.y - state.lastY;
        state.drawSpeed = Math.sqrt(dx * dx + dy * dy);

        if (state.tool === 'brush') {
            // Brush: variable width based on speed, semi-transparent for layering
            const speedFactor = Math.max(0.3, 1 - state.drawSpeed / 150);
            const sz = state.brushSize * speedFactor;
            ctx.beginPath();
            ctx.moveTo(state.lastX, state.lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = hexToRGBAString(state.color, 0.35);
            ctx.lineWidth = sz;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        } else {
            const sz = getCurrentDrawSize(e.pressure);
            ctx.beginPath();
            ctx.moveTo(state.lastX, state.lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = state.tool === 'eraser' ? state.bgColor : state.color;
            ctx.lineWidth = sz;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        state.lastX = pos.x;
        state.lastY = pos.y;
        if (state.tool === 'pencil' || state.tool === 'brush') updateBrushSound(state.drawSpeed);
    });

    canvas.addEventListener('pointerup', () => {
        if (state.isDrawing) {
            state.isDrawing = false;
            saveHistory();
            stopBrushSound();
        }
    });

    canvas.addEventListener('pointercancel', () => {
        if (state.isDrawing) {
            state.isDrawing = false;
            saveHistory();
            stopBrushSound();
        }
    });

    canvas.addEventListener('pointerleave', () => {
        hideEraserCursor();
        hideGhostStamp();
    });

    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // ===================================================================
    // HELPER: hex to rgba string
    // ===================================================================
    function hexToRGBAString(hex, alpha) {
        const h = hex.replace('#', '');
        const r = parseInt(h.substring(0, 2), 16);
        const g = parseInt(h.substring(2, 4), 16);
        const b = parseInt(h.substring(4, 6), 16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    // ===================================================================
    // EMOJI STAMP DRAWING
    // ===================================================================
    function drawEmojiStamp(c, emoji, x, y, size) {

    // ===================================================================
    // FILL TOOL (Scanline Flood Fill)
    // ===================================================================
    function floodFill(startX, startY, fillColor) {
        const {w, h} = getContainerSize();
        const dpr = window.devicePixelRatio || 1;
        const cw = canvas.width;
        const ch = canvas.height;
        const sx = Math.round(startX * dpr);
        const sy = Math.round(startY * dpr);
        if (sx < 0 || sx >= cw || sy < 0 || sy >= ch) return;

        const imageData = ctx.getImageData(0, 0, cw, ch);
        const data = imageData.data;
        const pixels = new Uint32Array(data.buffer);
        const targetColor = pixels[sy * cw + sx];

        const fc = hexToRGBA(fillColor);
        const fillUint = (fc.a << 24) | (fc.b << 16) | (fc.g << 8) | fc.r;
        if (targetColor === fillUint) return;

        const tolerance = 32;
        const tr = (targetColor) & 0xFF;
        const tg = (targetColor >> 8) & 0xFF;
        const tb = (targetColor >> 16) & 0xFF;
        const maxPixels = cw * ch * 0.8;
        let visited = 0;

        function matches(idx) {
            const c = pixels[idx];
            const r = c & 0xFF;
            const g = (c >> 8) & 0xFF;
            const b = (c >> 16) & 0xFF;
            const dr = r - tr, dg = g - tg, db = b - tb;
            return (dr * dr + dg * dg + db * db) <= tolerance * tolerance;
        }

        const queue = [[sx, sy]];
        const seen = new Uint8Array(cw * ch);
        seen[sy * cw + sx] = 1;

        while (queue.length > 0) {
            const [px, py] = queue.pop();
            if (!matches(py * cw + px)) continue;
            let left = px, right = px;
            while (left > 0 && matches(py * cw + left - 1) && !seen[py * cw + left - 1]) left--;
            while (right < cw - 1 && matches(py * cw + right + 1) && !seen[py * cw + right + 1]) right++;
            for (let x = left; x <= right; x++) {
                pixels[py * cw + x] = fillUint;
                seen[py * cw + x] = 1;
                visited++;
            }
            if (visited > maxPixels) {
                for (let i = 0; i < pixels.length; i++) {
                    if (matches(i)) pixels[i] = fillUint;
                }
                break;
            }
            for (const ny of [py - 1, py + 1]) {
                if (ny < 0 || ny >= ch) continue;
                let inSpan = false;
                for (let x = left; x <= right; x++) {
                    const idx = ny * cw + x;
                    if (matches(idx) && !seen[idx]) {
                        if (!inSpan) {
                            queue.push([x, ny]);
                            inSpan = true;
                        }
                    } else {
                        inSpan = false;
                    }
                }
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }

    function hexToRGBA(hex) {
        const h = hex.replace('#', '');
        return {
            r: parseInt(h.substring(0, 2), 16),
            g: parseInt(h.substring(2, 4), 16),
            b: parseInt(h.substring(4, 6), 16),
            a: 255
        };
    }

        }
    ];

    // ===================================================================
    // UI BUILDERS
    // ===================================================================
    function buildColorPalette() {
        const container = document.getElementById('color-palette');
        container.style.display = 'flex';
        container.style.gap = '2px';
        COLORS.forEach(color => {
            const dot = document.createElement('div');
            dot.className = 'color-dot';
            dot.style.background = color;
            if (color === '#FAFAFA') dot.style.boxShadow = 'inset 0 0 0 1px #DDD';
            if (color === state.color) dot.classList.add('selected');
            dot.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                state.color = color;
                if (state.tool === 'eraser') state.tool = 'pencil';
                if (state.tool === 'stamp') {
                    state.tool = 'pencil';
                    state.stamp = null;
                    closeSheet('stamp');
                }
                updateSelections();
            });
            container.appendChild(dot);
        });
    }

    function buildBrushSizes() {
        const container = document.getElementById('brush-sizes');
        BRUSH_SIZES.forEach(s => {
            const btn = document.createElement('div');
            btn.className = 'brush-dot';
            btn.dataset.draw = s.draw;
            const inner = document.createElement('div');
            inner.className = 'brush-dot-inner';
            inner.style.width = s.dot + 'px';
            inner.style.height = s.dot + 'px';
            inner.style.background = state.color;
            btn.appendChild(inner);
            if (s.draw === state.brushSize) btn.classList.add('selected');
            btn.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                state.brushSize = s.draw;
                updateSelections();
            });
            container.appendChild(btn);
        });
    }

    function buildToolButtons() {
        const container = document.getElementById('tool-buttons');

        // Pencil
        const pencilBtn = createToolBtn('pencil', ICONS.pencil);
        pencilBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            state.tool = 'pencil';
            state.stamp = null;
            closeAllSheets();
            updateSelections();
        });
        container.appendChild(pencilBtn);

        // Brush
        const brushBtn = createToolBtn('brush', ICONS.brush);
        brushBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            state.tool = 'brush';
            state.stamp = null;
            closeAllSheets();
            updateSelections();
        });
        container.appendChild(brushBtn);

        // Fill
        const fillBtn = createToolBtn('fill', ICONS.fill);
        fillBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            state.tool = state.tool === 'fill' ? 'pencil' : 'fill';
            state.stamp = null;
            closeAllSheets();
            updateSelections();
        });
        container.appendChild(fillBtn);

        // Eraser
        const eraserBtn = createToolBtn('eraser', ICONS.eraser);
        eraserBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            state.tool = state.tool === 'eraser' ? 'pencil' : 'eraser';
            state.stamp = null;
            closeAllSheets();
            hideEraserCursor();
            updateSelections();
        });
        container.appendChild(eraserBtn);

        // Stamp
        const stampBtn = createToolBtn('stamp', ICONS.stamp);
        stampBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            toggleSheet('stamp');
        });
        container.appendChild(stampBtn);

        // Templates
        const templateBtn = createToolBtn('template', ICONS.book);
        templateBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            toggleSheet('template');
        });
        container.appendChild(templateBtn);

        // Undo
        const undoBtn = createToolBtn('undo', ICONS.undo);
        undoBtn.classList.add('disabled');
        undoBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            doUndo();
            startUndoHold();
        });
        undoBtn.addEventListener('pointerup', stopUndoHold);
        undoBtn.addEventListener('pointercancel', stopUndoHold);
        undoBtn.addEventListener('pointerleave', stopUndoHold);
        container.appendChild(undoBtn);

        // Clear
        const clearBtn = createToolBtn('clear', ICONS.trash);
        clearBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            handleClear();
        });
        container.appendChild(clearBtn);

        // Download
        const dlBtn = createToolBtn('download', ICONS.download);
        dlBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            doDownload();
        });
        container.appendChild(dlBtn);

        // Sound toggle
        const soundBtn = createToolBtn('sound', ICONS.sound);
        soundBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            ensureAudio();
            state.soundEnabled = !state.soundEnabled;
            soundBtn.innerHTML = state.soundEnabled ? ICONS.sound : ICONS.soundOff;
            if (state.soundEnabled) playPop();
        });
        container.appendChild(soundBtn);
    }

    function createToolBtn(id, iconHTML) {
        const btn = document.createElement('button');
        btn.className = 'tool-btn';
        btn.id = 'btn-' + id;
        btn.innerHTML = iconHTML;
        return btn;
    }

    // ===================================================================
    // BG PICKER (Inline with label)
    // ===================================================================
    function buildBgPicker() {
        const container = document.getElementById('bg-inline');
        const label = document.createElement('div');
        label.className = 'toolbar-label';
        label.textContent = 'BG';
        container.appendChild(label);

        BG_COLORS.forEach(color => {
            const dot = document.createElement('div');
            dot.className = 'bg-swatch-sm';
            dot.style.background = color;
            if (color === '#FFFFFF') dot.style.border = '2px solid #DDD';
            if (color === state.bgColor) dot.classList.add('selected-bg');
            dot.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                state.bgColor = color;
                const {w, h} = getContainerSize();
                ctx.fillStyle = state.bgColor;
                ctx.fillRect(0, 0, w, h);
                state.hasDrawn = true;
                hideBgPicker();
                saveHistory();
            });
            container.appendChild(dot);
        });
    }

    function hideBgPicker() {
        document.getElementById('bg-inline').classList.add('hidden');
        document.getElementById('bg-divider').style.display = 'none';
    }

    function showBgPicker() {
        document.getElementById('bg-inline').classList.remove('hidden');
        document.getElementById('bg-divider').style.display = '';
    }

    // ===================================================================
    // BOTTOM SHEETS
    // ===================================================================
    const overlay = document.getElementById('sheet-overlay');

    function openSheet(name) {
        closeAllSheets();
        const panel = document.getElementById(name + '-panel');
        if (!panel) return;
        state.activeSheet = name;
        panel.classList.add('open');
        overlay.classList.add('visible');
        if (name === 'stamp') buildStampGrid();
        if (name === 'template') buildTemplateGrid();
    }

    function closeSheet(name) {
        const panel = document.getElementById(name + '-panel');
        if (panel) panel.classList.remove('open');
        if (state.activeSheet === name) {
            state.activeSheet = null;
            overlay.classList.remove('visible');
        }
    }

    function closeAllSheets() {
        ['stamp', 'template'].forEach(n => {
            document.getElementById(n + '-panel')?.classList.remove('open');
        });
        state.activeSheet = null;
        overlay.classList.remove('visible');
    }

    function toggleSheet(name) {
        if (state.activeSheet === name) {
            closeSheet(name);
            if (name === 'stamp' && state.tool === 'stamp') {
                state.tool = 'pencil';
                state.stamp = null;
            }
        } else {
            openSheet(name);
        }
        updateSelections();
    }

    overlay.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
        closeAllSheets();
        updateSelections();
    });

    // ===================================================================
    // STAMP PANEL (Emoji-based)
    // ===================================================================
    function buildStampGrid() {
        const grid = document.getElementById('stamp-grid');
        grid.innerHTML = '';

        for (const [category, emojis] of Object.entries(EMOJI_STAMPS)) {
            const label = document.createElement('div');
            label.className = 'emoji-category-label';
            label.textContent = category;
            grid.appendChild(label);

            emojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'stamp-btn';
                btn.textContent = emoji;
                btn.dataset.stamp = emoji;
                if (state.tool === 'stamp' && state.stamp === emoji) btn.classList.add('selected');
                btn.addEventListener('pointerdown', (e) => {
                    e.stopPropagation();
                    state.tool = 'stamp';
                    state.stamp = emoji;
                    updateSelections();
                    // Update selection in grid
                    grid.querySelectorAll('.stamp-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                });
                grid.appendChild(btn);
            });
        }
    }

    // ===================================================================
    // TEMPLATE PANEL
    // ===================================================================
    function buildTemplateGrid() {
        const grid = document.getElementById('template-grid');
        grid.innerHTML = '';
        TEMPLATES.forEach((tmpl, idx) => {
            const btn = document.createElement('button');
            btn.className = 'template-btn';
            const c = document.createElement('canvas');
            c.width = 72;
            c.height = 72;
            const tc = c.getContext('2d');
            tc.fillStyle = '#FFFFFF';
            tc.fillRect(0, 0, 72, 72);
            tmpl.draw(tc, 36, 38, 0.35);
            btn.appendChild(c);
            const label = document.createElement('span');
            label.textContent = tmpl.name;
            btn.appendChild(label);
            btn.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                applyTemplate(idx);
                closeAllSheets();
                updateSelections();
            });
            grid.appendChild(btn);
        });
    }

    function applyTemplate(idx) {
        const tmpl = TEMPLATES[idx];
        const {w, h} = getContainerSize();
        state.bgColor = '#FFFFFF';
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, w, h);
        const scale = Math.min(w, h) * 0.7 / 200;
        tmpl.draw(ctx, w / 2, h / 2, scale);
        state.hasDrawn = true;
        state.history = [];
        state.historyIndex = -1;
        hideBgPicker();
        saveHistory();
        state.tool = 'fill';
        updateSelections();
    }

    // ===================================================================
    // UNDO
    // ===================================================================
    function doUndo() {
        if (state.historyIndex <= 0) {
            if (state.historyIndex === 0) {
                state.historyIndex = -1;
                const {w, h} = getContainerSize();
                ctx.fillStyle = state.bgColor;
                ctx.fillRect(0, 0, w, h);
                playWhoosh();
            }
            updateUndoBtn();
            return;
        }
        state.historyIndex--;
        const img = new Image();
        img.onload = () => {
            const {w, h} = getContainerSize();
            ctx.clearRect(0, 0, w, h);
            ctx.drawImage(img, 0, 0, w, h);
        };
        img.src = state.history[state.historyIndex];
        playWhoosh();
        updateUndoBtn();
    }

    function startUndoHold() {
        state.undoHoldTimer = setTimeout(() => {
            state.undoHolding = true;
            state.undoRapidInterval = setInterval(() => {
                if (state.historyIndex <= 0) {
                    if (state.historyIndex === 0) doUndo();
                    stopUndoHold();
                    return;
                }
                doUndo();
            }, 300);
        }, 400);
    }

    function stopUndoHold() {
        clearTimeout(state.undoHoldTimer);
        clearInterval(state.undoRapidInterval);
        state.undoHolding = false;
    }

    function updateUndoBtn() {
        const btn = document.getElementById('btn-undo');
        if (!btn) return;
        btn.classList.toggle('disabled', state.historyIndex < 0);
        updateUndoProgress();
    }

    function updateUndoProgress() {
        const btn = document.getElementById('btn-undo');
        let svg = btn.querySelector('.undo-progress');
        if (!svg) {
            svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('class', 'undo-progress');
            svg.setAttribute('viewBox', '0 0 10 10');
            svg.setAttribute('width', '10');
            svg.setAttribute('height', '10');
            btn.appendChild(svg);
        }
        if (state.history.length <= 1) {
            svg.innerHTML = '';
            return;
        }
        const pct = (state.historyIndex + 1) / state.history.length;
        const r = 3.5, cx = 5, cy = 5;
        const angle = pct * Math.PI * 2 - Math.PI / 2;
        const largeArc = pct > 0.5 ? 1 : 0;
        const ex = cx + r * Math.cos(angle);
        const ey = cy + r * Math.sin(angle);
        if (pct <= 0) {
            svg.innerHTML = '';
        } else if (pct >= 1) {
            svg.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#4D96FF" stroke-width="1.5"/>`;
        } else {
            svg.innerHTML = `<path d="M ${cx} ${cy - r} A ${r} ${r} 0 ${largeArc} 1 ${ex} ${ey}" fill="none" stroke="#4D96FF" stroke-width="1.5"/>`;
        }
    }

    // ===================================================================
    // CLEAR
    // ===================================================================
    function handleClear() {
        const btn = document.getElementById('btn-clear');
        if (state.clearConfirm) {
            clearTimeout(state.clearTimeout);
            state.clearConfirm = false;
            btn.classList.remove('confirm-state');
            btn.innerHTML = ICONS.trash;
            const {w, h} = getContainerSize();
            ctx.fillStyle = state.bgColor;
            ctx.fillRect(0, 0, w, h);
            state.history = [];
            state.historyIndex = -1;
            state.hasDrawn = false;
            updateUndoBtn();
            showBgPicker();
            const container = document.getElementById('canvas-container');
            container.classList.add('clear-flash');
            setTimeout(() => container.classList.remove('clear-flash'), 150);
        } else {
            state.clearConfirm = true;
            btn.classList.add('confirm-state');
            btn.innerHTML = ICONS.check;
            state.clearTimeout = setTimeout(() => {
                state.clearConfirm = false;
                btn.classList.remove('confirm-state');
                btn.innerHTML = ICONS.trash;
            }, 2000);
        }
    }

    // ===================================================================
    // DOWNLOAD (separate action, no gallery)
    // ===================================================================
    function doDownload() {
        const btn = document.getElementById('btn-download');
        const link = document.createElement('a');
        const now = new Date();
        const ts = now.getFullYear().toString()
            + String(now.getMonth() + 1).padStart(2, '0')
            + String(now.getDate()).padStart(2, '0') + '-'
            + String(now.getHours()).padStart(2, '0')
            + String(now.getMinutes()).padStart(2, '0')
            + String(now.getSeconds()).padStart(2, '0');
        link.download = 'my-drawing-' + ts + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        btn.classList.add('download-success');
        btn.innerHTML = ICONS.check;
        setTimeout(() => {
            btn.classList.remove('download-success');
            btn.innerHTML = ICONS.download;
        }, 1200);
    }

    // ===================================================================
    // UPDATE SELECTIONS
    // ===================================================================
    function updateSelections() {
        // Colors
        document.querySelectorAll('.color-dot').forEach(dot => {
            const dotColor = rgbToHex(dot.style.backgroundColor).toUpperCase();
            const match = state.tool !== 'eraser' && dotColor === state.color.toUpperCase();
            dot.classList.toggle('selected', match);
            if (dotColor === '#FAFAFA') {
                dot.style.boxShadow = match ? 'inset 0 0 0 3px #fff' : 'inset 0 0 0 1px #DDD';
            }
        });

        // Brush sizes
        document.querySelectorAll('.brush-dot').forEach(btn => {
            btn.classList.toggle('selected', parseInt(btn.dataset.draw) === state.brushSize);
        });
        document.querySelectorAll('.brush-dot-inner').forEach(inner => {
            inner.style.background = state.color;
        });

        // Tool buttons
        document.getElementById('btn-pencil')?.classList.toggle('selected', state.tool === 'pencil');
        document.getElementById('btn-brush')?.classList.toggle('selected', state.tool === 'brush');
        document.getElementById('btn-eraser')?.classList.toggle('selected', state.tool === 'eraser');
        document.getElementById('btn-stamp')?.classList.toggle('selected', state.tool === 'stamp');
        document.getElementById('btn-fill')?.classList.toggle('selected', state.tool === 'fill');

        // Canvas cursor
        if (state.tool === 'eraser') {
            canvas.style.cursor = 'none';
        } else {
            canvas.style.cursor = 'crosshair';
        }

        if (state.tool !== 'eraser') hideEraserCursor();
        if (state.tool !== 'stamp') hideGhostStamp();
    }

    function rgbToHex(rgb) {
        if (rgb.startsWith('#')) return rgb;
        const match = rgb.match(/(\d+)/g);
        if (!match) return '#000000';
        return '#' + match.slice(0, 3).map(n => parseInt(n).toString(16).padStart(2, '0')).join('');
    }

    // ===================================================================
    // PREVENT ACCIDENTAL NAVIGATION
    // ===================================================================
    window.addEventListener('beforeunload', (e) => {
        if (state.hasDrawn && state.historyIndex >= 0) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    // ===================================================================
    // RESIZE
    // ===================================================================
    window.addEventListener('resize', () => {
        resizeCanvas();
    });

    // ===================================================================
    // INIT
    // ===================================================================
    function init() {
        buildBgPicker();
        buildColorPalette();
        buildBrushSizes();
        buildToolButtons();
        resizeCanvas();
        updateSelections();
    }

    init();
</script>
</body>
</html>
