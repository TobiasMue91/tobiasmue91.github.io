        #toast-container {
            position: fixed;

        .toast {

        .toast.info {

            background: #dc2626;

        .toast.success {

            color: #fff

        @keyframes toastIn {
            from {

                transform: translateY(0)
            }
        }

        .toast.removing {

        @keyframes toastOut {

        #loading-overlay {

        .spinner {
            width: 36px;

            border-radius: 50%;

        }

        }

        #loading-text {

            color: #6b7280;

        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0)
        }
    </style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script>
    // ===== PDF.js Worker =====
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ===== State =====
    const S = {
        pdfDoc: null, pdfBytes: null, totalPages: 0, currentPage: 1,
        scale: 1.5, minScale: 0.5, maxScale: 3.0, scaleStep: 0.25,
        activeTool: 'select', pageAnnotations: {}, pageDimensions: {},
        fabricCanvas: null, isRendering: false
    };

    // ===== DOM =====
    const D = {
        canvasEl: document.getElementById('fabric-canvas'),
        canvasContainer: document.getElementById('canvas-container'),
        scrollArea: document.getElementById('canvas-scroll-area'),
        placeholder: document.getElementById('placeholder'),
        thumbList: document.getElementById('thumb-list'),
        pageIndicator: document.getElementById('page-indicator'),
        zoomLevel: document.getElementById('zoom-level'),
        btnDownload: document.getElementById('btn-download'),
        propsPanel: document.getElementById('props-panel'),
        propsContent: document.getElementById('props-content'),
        loadingOverlay: document.getElementById('loading-overlay'),
        loadingText: document.getElementById('loading-text')
    };

    // ===== Toast =====
    function toast(msg, type = 'info') {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast ' + type;
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(() => {
            t.classList.add('removing');
            t.addEventListener('animationend', () => t.remove())
        }, 3500);
    }

    // ===== Loading =====
    function loading(show, text = '') {
        D.loadingOverlay.classList.toggle('visible', show);
        D.loadingText.textContent = text;
    }

    // ===== Init Fabric =====
    function initFabric() {
        if (S.fabricCanvas) S.fabricCanvas.dispose();
        S.fabricCanvas = new fabric.Canvas('fabric-canvas', {
            selection: true, preserveObjectStacking: true, stopContextMenu: true, fireRightClick: false
        });
        S.fabricCanvas.on('selection:created', updateProps);
        S.fabricCanvas.on('selection:updated', updateProps);
        S.fabricCanvas.on('selection:cleared', hideProps);
        S.fabricCanvas.on('object:modified', updateProps);
        S.fabricCanvas.on('mouse:down', handleCanvasClick);
    }

    // ===== File Upload =====
    async function handleFileUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        e.target.value = '';
        if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
            toast('Please upload a valid PDF file.', 'error');
            return;
        }
        try {
            loading(true, 'Loading PDF...');
            const ab = await file.arrayBuffer();
            S.pdfBytes = new Uint8Array(ab);
            S.pdfDoc = await pdfjsLib.getDocument({data: S.pdfBytes.slice()}).promise;
            S.totalPages = S.pdfDoc.numPages;
            S.currentPage = 1;
            S.pageAnnotations = {};
            S.pageDimensions = {};
            for (let i = 1; i <= S.totalPages; i++) {
                const p = await S.pdfDoc.getPage(i);
                const vp = p.getViewport({scale: 1.0});
                S.pageDimensions[i] = {width: vp.width, height: vp.height};
            }
            D.placeholder.style.display = 'none';
            D.scrollArea.style.display = 'block';
            D.btnDownload.disabled = false;
            initFabric();
            await renderPage();
            await renderThumbs();
            updatePageInfo();
            toast('PDF loaded — ' + S.totalPages + ' page' + (S.totalPages > 1 ? 's' : ''), 'success');
        } catch (err) {
            console.error('PDF load error:', err);
            toast('Failed to load PDF. The file may be corrupted.', 'error');
        } finally {
            loading(false)
        }
    }

    // ===== Render Current Page =====
    async function renderPage() {
        if (!S.pdfDoc || S.isRendering) return;
        S.isRendering = true;
        try {
            const page = await S.pdfDoc.getPage(S.currentPage);
            const vp = page.getViewport({scale: S.scale});
            const w = Math.floor(vp.width), h = Math.floor(vp.height);
            const off = document.createElement('canvas');
            off.width = w;
            off.height = h;
            await page.render({canvasContext: off.getContext('2d'), viewport: vp}).promise;
            const url = off.toDataURL('image/png');
            S.fabricCanvas.setDimensions({width: w, height: h});
            await new Promise(r => {
                fabric.Image.fromURL(url, img => {
                    S.fabricCanvas.setBackgroundImage(img, () => {
                        S.fabricCanvas.renderAll();
                        r()
                    }, {scaleX: 1, scaleY: 1});
                });
            });
            await restoreAnnotations(S.currentPage);
        } catch (err) {
            console.error('Render error:', err);
            toast('Failed to render page.', 'error');
        } finally {
            S.isRendering = false
        }
    }

    // ===== Annotations Serialize / Restore =====
    function saveAnnotations() {
        if (!S.fabricCanvas) return;
        const objs = S.fabricCanvas.getObjects();
        if (objs.length > 0) {
            S.pageAnnotations[S.currentPage] = objs.map(o => o.toObject(['selectable', 'evented', 'editable']));
        } else delete S.pageAnnotations[S.currentPage];
        updateThumbBadges();
    }

    async function restoreAnnotations(pn) {
        const d = S.pageAnnotations[pn];
        if (!d || !d.length) return;
        const objs = await enliven(d);
        objs.forEach(o => S.fabricCanvas.add(o));
        S.fabricCanvas.renderAll();
    }

    function enliven(data) {
        return new Promise((res, rej) => {
            try {
                fabric.util.enlivenObjects(data, objs => res(objs))
            } catch (e) {
                rej(e)
            }
        });
    }

    // ===== Switch Page =====
    async function switchPage(pn) {
        if (pn < 1 || pn > S.totalPages || pn === S.currentPage || S.isRendering) return;
        saveAnnotations();
        S.fabricCanvas.clear();
        S.currentPage = pn;
        await renderPage();
        updatePageInfo();
        updateActiveThumb();
        D.canvasContainer.scrollTop = 0;
    }

    // ===== Thumbnails =====
    async function renderThumbs() {
        D.thumbList.innerHTML = '';
        for (let i = 1; i <= S.totalPages; i++) {
            const p = await S.pdfDoc.getPage(i);
            const vp = p.getViewport({scale: 0.2});
            const wrap = document.createElement('div');
            wrap.className = 'thumb-wrap' + (i === S.currentPage ? ' active' : '');
            wrap.dataset.page = i;
            wrap.onclick = () => switchPage(i);
            const badge = document.createElement('div');
            badge.className = 'thumb-badge';
            wrap.appendChild(badge);
            const c = document.createElement('canvas');
            c.width = Math.floor(vp.width);
            c.height = Math.floor(vp.height);
            await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
            wrap.appendChild(c);
            const lbl = document.createElement('div');
            lbl.className = 'thumb-label';
            lbl.textContent = 'Page ' + i;
            wrap.appendChild(lbl);
            D.thumbList.appendChild(wrap);
        }
        updateThumbBadges();
    }

    function updateActiveThumb() {
        document.querySelectorAll('.thumb-wrap').forEach(el => {
            el.classList.toggle('active', parseInt(el.dataset.page) === S.currentPage);
        });
    }

    function updateThumbBadges() {
        document.querySelectorAll('.thumb-wrap').forEach(el => {
            const p = parseInt(el.dataset.page);
            el.classList.toggle('has-edits', !!(S.pageAnnotations[p] && S.pageAnnotations[p].length));
        });
    }

    function updatePageInfo() {
        D.pageIndicator.textContent = S.totalPages ? 'Page ' + S.currentPage + ' of ' + S.totalPages : '';
    }

    // ===== Zoom =====
    function zoomIn() {
        setZoom(S.scale + S.scaleStep)
    }

    function zoomOut() {
        setZoom(S.scale - S.scaleStep)
    }

    async function setZoom(ns) {
        ns = Math.round(ns * 100) / 100;
        if (ns < S.minScale || ns > S.maxScale || !S.pdfDoc || S.isRendering) return;
        const ratio = ns / S.scale;
        const c = D.canvasContainer;
        const sx = c.scrollWidth > c.clientWidth ? c.scrollLeft / (c.scrollWidth - c.clientWidth) : 0;
        const sy = c.scrollHeight > c.clientHeight ? c.scrollTop / (c.scrollHeight - c.clientHeight) : 0;
        saveAnnotations();
        scaleAnnotations(S.currentPage, ratio);
        S.scale = ns;
        D.zoomLevel.textContent = Math.round(ns * 100) + '%';
        S.fabricCanvas.clear();
        await renderPage();
        requestAnimationFrame(() => {
            c.scrollLeft = sx * (c.scrollWidth - c.clientWidth);
            c.scrollTop = sy * (c.scrollHeight - c.clientHeight);
        });
    }

    function scaleAnnotations(pn, r) {
        const d = S.pageAnnotations[pn];
        if (!d) return;
        d.forEach(o => {
            if (o.left != null) o.left *= r;
            if (o.top != null) o.top *= r;
            if (o.scaleX != null) o.scaleX *= r;
            if (o.scaleY != null) o.scaleY *= r;
            if (o.strokeWidth != null) o.strokeWidth *= r;
            if (o.type === 'i-text' || o.type === 'text' || o.type === 'textbox') {
                if (o.fontSize != null) o.fontSize *= r;
                o.scaleX = (o.scaleX || r) / r;
                o.scaleY = (o.scaleY || r) / r;
            }
        });
    }

    D.canvasContainer.addEventListener('wheel', e => {
        if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            e.deltaY < 0 ? zoomIn() : zoomOut()
        }
    }, {passive: false});

    // ===== Tools =====
    function setTool(tool) {
        S.activeTool = tool;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
        if (!S.fabricCanvas) return;
        S.fabricCanvas.isDrawingMode = (tool === 'draw');
        S.fabricCanvas.selection = (tool === 'select');
        if (tool === 'draw') {
            S.fabricCanvas.freeDrawingBrush.width = 2 * S.scale;
            S.fabricCanvas.freeDrawingBrush.color = '#1f2937';
        }
        if (tool === 'select') {
            S.fabricCanvas.defaultCursor = 'default';
            S.fabricCanvas.hoverCursor = 'move'
        } else if (tool !== 'draw') {
            S.fabricCanvas.defaultCursor = 'crosshair';
            S.fabricCanvas.hoverCursor = 'crosshair'
        }
        if (tool !== 'select') {
            S.fabricCanvas.discardActiveObject();
            S.fabricCanvas.renderAll();
            hideProps()
        }
    }

    // ===== Canvas Click =====
    function handleCanvasClick(opt) {
        if (!S.fabricCanvas || S.activeTool === 'select' || S.activeTool === 'draw') return;
        const ptr = S.fabricCanvas.getPointer(opt.e);
        if (opt.target) return;
        const x = ptr.x, y = ptr.y, s = S.scale;
        let obj = null;
        switch (S.activeTool) {
            case'text':
                obj = new fabric.IText('Type here', {
                    left: x,
                    top: y,
                    fontSize: 16 * s,
                    fontFamily: "-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",
                    fill: '#1f2937',
                    editable: true
                });
                break;
            case'rect':
                obj = new fabric.Rect({
                    left: x, top: y, width: 120 * s, height: 80 * s, fill: 'transparent',
                    stroke: '#2563eb', strokeWidth: 2 * s, strokeUniform: true
                });
                break;
            case'circle':
                obj = new fabric.Circle({
                    left: x, top: y, radius: 50 * s, fill: 'transparent',
                    stroke: '#2563eb', strokeWidth: 2 * s, strokeUniform: true
                });
                break;
            case'line':
                obj = new fabric.Line([x, y, x + 150 * s, y], {
                    stroke: '#1f2937',
                    strokeWidth: 2 * s,
                    strokeUniform: true
                });
                break;
            case'highlight':
                obj = new fabric.Rect({
                    left: x, top: y, width: 200 * s, height: 24 * s,
                    fill: 'rgba(253,224,71,0.4)', stroke: '', strokeWidth: 0
                });
                break;
            case'image':
                insertImage(x, y);
                return;
        }
        if (obj) {
            S.fabricCanvas.add(obj);
            S.fabricCanvas.setActiveObject(obj);
            S.fabricCanvas.renderAll();
            setTool('select')
        }
    }

    function insertImage(x, y) {
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'image/png,image/jpeg,image/jpg';
        inp.onchange = async e => {
            const f = e.target.files[0];
            if (!f) return;
            try {
                const url = await readFileURL(f);
                fabric.Image.fromURL(url, img => {
                    const max = 300 * S.scale;
                    const sf = Math.min(max / img.width, max / img.height, 1);
                    img.set({left: x, top: y, scaleX: sf, scaleY: sf});
                    S.fabricCanvas.add(img);
                    S.fabricCanvas.setActiveObject(img);
                    S.fabricCanvas.renderAll();
                    setTool('select');
                });
            } catch (err) {
                console.error(err);
                toast('Failed to insert image.', 'error')
            }
        };
        inp.click();
    }

    function readFileURL(f) {
        return new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = rej;
            r.readAsDataURL(f)
        });
    }

    // ===== Properties Panel =====
    function updateProps() {
        const o = S.fabricCanvas.getActiveObject();
        if (!o || o.type === 'activeSelection') {
            hideProps();
            return
        }
        let h = '';
        const isText = o.type === 'i-text' || o.type === 'text' || o.type === 'textbox';
        const isShape = ['rect', 'circle', 'line', 'ellipse', 'triangle', 'polygon'].includes(o.type);
        const isPath = o.type === 'path';
        if (isText) {
            h += pr('Color', '<input type="color" value="' + hex(o.fill || '#000') + '" onchange="setProp(\'fill\',this.value)">');
            h += pr('Size', '<input type="number" value="' + Math.round(o.fontSize) + '" min="1" max="999" style="width:60px" onchange="setProp(\'fontSize\',parseInt(this.value))">');
        }
        if (isShape || isPath) {
            if (o.stroke) h += pr('Stroke', '<input type="color" value="' + hex(o.stroke || '#000') + '" onchange="setProp(\'stroke\',this.value)">');
            if (o.strokeWidth != null) h += pr('Width', '<input type="number" value="' + Math.round(o.strokeWidth || 1) + '" min="1" max="50" style="width:60px" onchange="setProp(\'strokeWidth\',parseInt(this.value))">');
            if (o.fill && o.fill !== 'transparent' && !isPath) h += pr('Fill', '<input type="color" value="' + hex(o.fill) + '" onchange="setProp(\'fill\',this.value)">');
        }
        if (isPath) h += pr('Color', '<input type="color" value="' + hex(o.stroke || '#000') + '" onchange="setProp(\'stroke\',this.value)">');
        const ov = Math.round((o.opacity || 1) * 100);
        h += pr('Opacity', '<input type="range" min="5" max="100" value="' + ov + '" oninput="setProp(\'opacity\',this.value/100);this.nextElementSibling.textContent=this.value+\'%\'"><span class="range-val">' + ov + '%</span>');
        D.propsContent.innerHTML = h;
        D.propsPanel.classList.add('visible');
    }

    function pr(l, i) {
        return '<div class="prop-row"><label>' + l + '</label>' + i + '</div>'
    }

    function hideProps() {
        D.propsPanel.classList.remove('visible')
    }

    function setProp(p, v) {
        const o = S.fabricCanvas.getActiveObject();
        if (!o) return;
        o.set(p, v);
        S.fabricCanvas.renderAll()
    }

    function deleteSelected() {
        const o = S.fabricCanvas.getActiveObject();
        if (!o) return;
        S.fabricCanvas.remove(o);
        S.fabricCanvas.discardActiveObject();
        S.fabricCanvas.renderAll();
        hideProps();
    }

    function hex(c) {
        if (!c || c === 'transparent') return '#000000';
        if (c.startsWith('#')) return c.length === 4 ? '#' + c[1] + c[1] + c[2] + c[2] + c[3] + c[3] : c;
        if (c.startsWith('rgb')) {
            const m = c.match(/(\d+)/g);
            if (m) return '#' + m.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('')
        }
        return '#000000';
    }

    // ===== Keyboard =====
    document.addEventListener('keydown', e => {
        if (!S.fabricCanvas) return;
        const t = e.target.tagName.toLowerCase();
        if (t === 'input' || t === 'textarea') return;
        const ao = S.fabricCanvas.getActiveObject();
        if (ao && ao.isEditing) return;
        if (e.key === 'Delete' || e.key === 'Backspace') {
            e.preventDefault();
            deleteSelected()
        }
        if (e.key === 'Escape') {
            S.fabricCanvas.discardActiveObject();
            S.fabricCanvas.renderAll();
            hideProps();
            setTool('select')
        }
    });

    // ===== DOWNLOAD — Vector text + high-res raster overlay =====
    function hexToRgbNorm(h) {
        h = hex(h);
        const r = parseInt(h.slice(1, 3), 16) / 255;
        const g = parseInt(h.slice(3, 5), 16) / 255;
        const b = parseInt(h.slice(5, 7), 16) / 255;
        return {r, g, b};
    }

    function parseRgba(c) {
        if (!c) return null;
        if (c.startsWith('rgba')) {
            const m = c.match(/[\d.]+/g);
            if (m && m.length >= 4) return {r: +m[0] / 255, g: +m[1] / 255, b: +m[2] / 255, a: +m[3]};
        }
        if (c.startsWith('rgb')) {
            const m = c.match(/\d+/g);
            if (m && m.length >= 3) return {r: +m[0] / 255, g: +m[1] / 255, b: +m[2] / 255, a: 1};
        }
        if (c.startsWith('#')) {
            const n = hexToRgbNorm(c);
            n.a = 1;
            return n
        }
        return null;
    }

    async function downloadPDF() {
        if (!S.pdfBytes) return;
        try {
            loading(true, 'Preparing PDF...');
            saveAnnotations();
            const pdfLibDoc = await PDFLib.PDFDocument.load(S.pdfBytes, {ignoreEncryption: true});
            const pages = pdfLibDoc.getPages();
            const annotatedPages = Object.keys(S.pageAnnotations).map(Number);

            if (!annotatedPages.length) {
                const out = await pdfLibDoc.save();
                triggerDL(out, 'edited.pdf');
                toast('PDF downloaded (no changes).', 'success');
                return;
            }

// Embed fonts for vector text
            const helvetica = await pdfLibDoc.embedFont(PDFLib.StandardFonts.Helvetica);
            const helveticaBold = await pdfLibDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);

            for (const pn of annotatedPages) {
                const objData = S.pageAnnotations[pn];
                if (!objData || !objData.length) continue;
                const pdfPage = pages[pn - 1];
                const pageW = pdfPage.getWidth(), pageH = pdfPage.getHeight();
                const ratio = 1 / S.scale;

// Separate text objects from non-text objects
                const textObjs = [];
                const rasterObjs = [];
                const scaled = JSON.parse(JSON.stringify(objData));
                scaled.forEach(o => {
// Scale all objects to original PDF dimensions
                    if (o.left != null) o.left *= ratio;
                    if (o.top != null) o.top *= ratio;
                    if (o.scaleX != null) o.scaleX *= ratio;
                    if (o.scaleY != null) o.scaleY *= ratio;
                    if (o.strokeWidth != null && !o.strokeUniform) o.strokeWidth *= ratio;
                    if (o.type === 'i-text' || o.type === 'text' || o.type === 'textbox') {
                        if (o.fontSize) o.fontSize *= ratio;
                        o.scaleX = (o.scaleX || ratio) / ratio;
                        o.scaleY = (o.scaleY || ratio) / ratio;
                        textObjs.push(o);
                    } else {
                        if (o.type === 'line' && o.x1 != null) {
                            o.x1 *= ratio;
                            o.y1 *= ratio;
                            o.x2 *= ratio;
                            o.y2 *= ratio
                        }
                        rasterObjs.push(o);
                    }
                });

// === VECTOR TEXT: Draw text directly into PDF using pdf-lib ===
                for (const t of textObjs) {
                    const text = t.text || '';
                    if (!text.trim()) continue;
                    const fontSize = t.fontSize * (t.scaleY || 1);
                    const font = (t.fontWeight === 'bold') ? helveticaBold : helvetica;
                    const color = parseRgba(t.fill || '#000000');
                    const opacity = t.opacity != null ? t.opacity : 1;
                    const lines = text.split('\n');
                    const lineH = fontSize * 1.2;
                    for (let i = 0; i < lines.length; i++) {
                        if (!lines[i]) continue;
// PDF Y: origin bottom-left. Canvas Y: origin top-left.
// Text top in canvas = t.top. Baseline for line i ≈ t.top + fontSize + i*lineH
                        const canvasY = t.top + fontSize * 0.85 + i * lineH;
                        const pdfY = pageH - canvasY;
                        const pdfX = t.left;
                        pdfPage.drawText(lines[i], {
                            x: pdfX, y: pdfY, size: fontSize, font: font,
                            color: PDFLib.rgb(color ? color.r : 0, color ? color.g : 0, color ? color.b : 0),
                            opacity: opacity
                        });
                    }
                }

// === RASTER OVERLAY: Render non-text objects at 3x for sharpness ===
                if (rasterObjs.length > 0) {
                    const multiplier = 3;
                    const tempEl = document.createElement('canvas');
                    tempEl.width = Math.ceil(pageW);
                    tempEl.height = Math.ceil(pageH);
                    document.body.appendChild(tempEl);
                    const tempCanvas = new fabric.StaticCanvas(tempEl, {
                        width: Math.ceil(pageW), height: Math.ceil(pageH), backgroundColor: 'transparent'
                    });
                    const enlivened = await enliven(rasterObjs);
                    enlivened.forEach(o => tempCanvas.add(o));
                    tempCanvas.renderAll();

                    const overlayURL = tempCanvas.toDataURL({format: 'png', multiplier: multiplier});
                    const overlayBytes = dataURLToBytes(overlayURL);
                    const overlayImg = await pdfLibDoc.embedPng(overlayBytes);
                    pdfPage.drawImage(overlayImg, {x: 0, y: 0, width: pageW, height: pageH});
                    tempCanvas.dispose();
                    tempEl.remove();
                }
            }

            const out = await pdfLibDoc.save();
            triggerDL(out, 'edited.pdf');
            toast('PDF downloaded successfully!', 'success');
        } catch (err) {
            console.error('Download error:', err);
            toast('Failed to save PDF: ' + err.message, 'error');
        } finally {
            loading(false)
        }
    }

    function dataURLToBytes(url) {
        const b64 = url.split(',')[1];
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return bytes;
    }

    function triggerDL(bytes, name) {
        const blob = new Blob([bytes], {type: 'application/pdf'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // ===== Init =====
    D.zoomLevel.textContent = Math.round(S.scale * 100) + '%';
</script>
<script src="../logo.js"></script>
</body>
