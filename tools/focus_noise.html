<body>
<div class="app">
    <div class="head">
        <div class="name">Focus Noise</div>
        <div class="indicator" id="indicator"><span></span><span></span><span></span><span></span></div>
    </div>

    <div class="seg" id="colorSeg">
        <button data-color="brown">Brown</button>
        <button data-color="pink">Pink</button>
        <button data-color="white">White</button>
        <button data-color="blue">Blue</button>
        <button data-color="grey">Grey</button>
    </div>
    <div class="colorhint" id="colorHint"></div>

    <button class="play" id="play" aria-label="Play">
        <svg id="playIcon" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z"/>
        </svg>
    </button>

    <div class="ctrl">
        <div class="row"><span class="label">Volume</span><span class="readout" id="volReadout">50%</span></div>
        <input type="range" id="vol" min="0" max="100" value="50">
    </div>

    <div class="ctrl">
        <div class="row"><span class="label">Dark ↔ Bright</span><span class="readout" id="toneReadout">Bright</span>
        </div>
        <input type="range" id="tone" min="0" max="100" value="100">
    </div>

    <div class="ctrl">
        <span class="label">Sleep timer</span>
        <div class="timers" id="timers">
            <button data-min="15">15m</button>
            <button data-min="30">30m</button>
            <button data-min="60">1h</button>
            <button data-min="120">2h</button>
            <button data-min="0">Off</button>
        </div>
        <div class="countdown" id="countdown"></div>
    </div>

    <div class="hints">
        <kbd>Space</kbd> play · <kbd>↑↓</kbd> volume · <kbd>1–5</kbd> color · <kbd>Esc</kbd> timer off
    </div>
    <div class="err" id="err" style="display:none"></div>
</div>

<script>
    /* ============================================================
       Worklet source (inlined, loaded via Blob URL).
       Generates 5 noise colors continuously on the audio thread.
       Stereo: an INDEPENDENT sample is generated per channel
       (decorrelated) so the noise images wide on headphones
       instead of collapsing to a point inside the head.
       ============================================================ */
    const WORKLET_SRC = `
class NoiseGen extends AudioWorkletProcessor {
  constructor(){
    super();
    this.color = 0; this.fadeColor = 0; this.mix = 1;
    this.step = 1/(0.15*sampleRate);            // ~150ms color crossfade
    this.S = [this.newState(), this.newState()]; // per-channel filter state
    this.port.onmessage = e => {
      if (e.data.color !== undefined && e.data.color !== this.fadeColor){
        this.color = this.fadeColor; this.fadeColor = e.data.color; this.mix = 0;
      }
    };
  }
  newState(){
    return {
      brown:0,
      b0:0,b1:0,b2:0,b3:0,b4:0,b5:0,b6:0,   // pink (Paul Kellet)
      gb0:0,gb1:0,gb2:0,gb3:0,gb4:0,gb5:0,gb6:0, // grey: pink core
      lastW:0,                              // blue: needs previous white (differentiator)
      hpX:0, hpY:0                          // 20Hz cleanup highpass (per channel)
    };
  }
  // colors: 0 brown, 1 pink, 2 white, 3 blue, 4 grey
  raw(color, s){
    const w = Math.random()*2 - 1;
    if (color === 2) return w * 0.5;                                   // white
    if (color === 0){ s.brown = (s.brown + 0.02*w)/1.02; return s.brown*3.5; } // brown
    if (color === 3){                                                  // blue: differentiate white (+3dB/oct-ish), high-emphasis
      const out = (w - s.lastW); s.lastW = w; return out*0.5;
    }
    if (color === 1){                                                  // pink
      s.b0=0.99886*s.b0+w*0.0555179; s.b1=0.99332*s.b1+w*0.0750759;
      s.b2=0.96900*s.b2+w*0.1538520; s.b3=0.86650*s.b3+w*0.3104856;
      s.b4=0.55000*s.b4+w*0.5329522; s.b5=-0.7616*s.b5-w*0.0168980;
      const p=s.b0+s.b1+s.b2+s.b3+s.b4+s.b5+s.b6+w*0.5362; s.b6=w*0.115926; return p*0.11;
    }
    // grey (4): approximation of equal-loudness noise. True grey shapes white by
    // the inverse equal-loudness contour. Cheap practical version: blend a pink
    // core (carries the low/mid energy the ear is sensitive to, reduced) with
    // raw white (restores the high-frequency presence), giving a flatter
    // *perceived* loudness than white without a full FIR contour filter.
    s.gb0=0.99886*s.gb0+w*0.0555179; s.gb1=0.99332*s.gb1+w*0.0750759;
    s.gb2=0.96900*s.gb2+w*0.1538520; s.gb3=0.86650*s.gb3+w*0.3104856;
    s.gb4=0.55000*s.gb4+w*0.5329522; s.gb5=-0.7616*s.gb5-w*0.0168980;
    const pk=(s.gb0+s.gb1+s.gb2+s.gb3+s.gb4+s.gb5+s.gb6+w*0.5362)*0.11; s.gb6=w*0.115926;
    return (pk*0.6 + (w*0.5)*0.5);
  }
  // gentle 1-pole highpass ~20Hz to strip inaudible sub-bass DC rumble (mainly brown)
  hp(s, x){
    const a = 0.9985;
    const y = a*(s.hpY + x - s.hpX);
    s.hpX = x; s.hpY = y; return y;
  }
  gen(color, s){ return this.hp(s, this.raw(color, s)); }
  process(_in, outputs){
    const out = outputs[0];
    const L = out[0], R = out[1] || out[0];
    for (let i=0;i<L.length;i++){
      let l, r;
      if (this.mix < 1){
        l = this.gen(this.color,this.S[0])*(1-this.mix) + this.gen(this.fadeColor,this.S[0])*this.mix;
        r = this.gen(this.color,this.S[1])*(1-this.mix) + this.gen(this.fadeColor,this.S[1])*this.mix;
        this.mix += this.step; if (this.mix>=1){ this.mix=1; this.color=this.fadeColor; }
      } else {
        l = this.gen(this.color,this.S[0]); r = this.gen(this.color,this.S[1]);
      }
      L[i]=l; if (out[1]) R[i]=r;
    }
    return true;
  }
}
registerProcessor('noise-gen', NoiseGen);
`;

    /* ---------- state ---------- */
    const COLORS = ['brown', 'pink', 'white', 'blue', 'grey'];
    const HINTS = {
        brown: 'Deep low rumble — gentlest, best for sleep & focus',
        pink: 'Balanced, natural — softer than white',
        white: 'Full bright hiss — strongest masking',
        blue: 'High-frequency emphasis — good for tinnitus masking',
        grey: 'Perceptually flat — equal-loudness, easy on the ears'
    };
    const defaults = {playing: false, color: 'brown', volume: 50, tone: 100, timer: 0};
    let state = loadState();

    const rt = {
        ctx: null, node: null, filter: null, master: null, ready: false,
        timerEnd: 0, timerInt: null, fadeStarted: false
    };

    function loadState() {
        try {
            const s = JSON.parse(localStorage.getItem('focusnoise') || '{}');
            const merged = {...defaults, ...s, playing: false};
            if (!COLORS.includes(merged.color)) merged.color = 'brown';
            return merged;
        } catch (e) {
            return {...defaults};
        }
    }

    function persist() {
        try {
            const {color, volume, tone, timer} = state;
            localStorage.setItem('focusnoise', JSON.stringify({color, volume, tone, timer}));
        } catch (e) {
        }
    }

    /* ---------- audio ---------- */
    function volToGain(v) {
        const x = v / 100;
        return x * x;
    }                  // perceptual
    function toneToCutoff(t) {
        return 200 * Math.pow(20000 / 200, t / 100);
    } // 200Hz..20kHz

    async function ensureAudio() {
        if (rt.ready) return true;
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return false;
        rt.ctx = new AC();
        rt.filter = rt.ctx.createBiquadFilter();
        rt.filter.type = 'lowpass';
        rt.filter.frequency.value = toneToCutoff(state.tone);
        rt.filter.Q.value = 0.0001;
        rt.master = rt.ctx.createGain();
        rt.master.gain.value = 0;
        try {
            if (rt.ctx.audioWorklet) {
                const url = URL.createObjectURL(new Blob([WORKLET_SRC], {type: 'application/javascript'}));
                await rt.ctx.audioWorklet.addModule(url);
                URL.revokeObjectURL(url);
                rt.node = new AudioWorkletNode(rt.ctx, 'noise-gen', {outputChannelCount: [2]});
                rt.node.port.postMessage({color: COLORS.indexOf(state.color)});
            } else {
                rt.node = makeScriptProcessor();
            }
        } catch (e) {
            rt.node = makeScriptProcessor();
        }
        rt.node.connect(rt.filter);
        rt.filter.connect(rt.master);
        rt.master.connect(rt.ctx.destination);
        rt.ready = true;
        return true;
    }

    /* ScriptProcessor fallback (deprecated, but universally supported; only used when
       AudioWorklet is unavailable). Mirrors the worklet: continuous generation, 5
       colors, per-channel decorrelated state, 150ms crossfade, 20Hz cleanup highpass. */
    function makeScriptProcessor() {
        const sp = rt.ctx.createScriptProcessor(4096, 0, 2);
        const mk = () => ({brown: 0, b: [0, 0, 0, 0, 0, 0, 0], g: [0, 0, 0, 0, 0, 0, 0], lastW: 0, hpX: 0, hpY: 0});
        const S = [mk(), mk()];
        let mix = 1, cur = COLORS.indexOf(state.color), tgt = cur;
        const stepN = 1 / (0.15 * rt.ctx.sampleRate);
        sp._setColor = c => {
            if (c !== tgt) {
                cur = tgt;
                tgt = c;
                mix = 0;
            }
        };

        function raw(color, s) {
            const w = Math.random() * 2 - 1;
            if (color === 2) return w * 0.5;
            if (color === 0) {
                s.brown = (s.brown + 0.02 * w) / 1.02;
                return s.brown * 3.5;
            }
            if (color === 3) {
                const o = w - s.lastW;
                s.lastW = w;
                return o * 0.5;
            }
            if (color === 1) {
                const b = s.b;
                b[0] = 0.99886 * b[0] + w * 0.0555179;
                b[1] = 0.99332 * b[1] + w * 0.0750759;
                b[2] = 0.96900 * b[2] + w * 0.1538520;
                b[3] = 0.86650 * b[3] + w * 0.3104856;
                b[4] = 0.55000 * b[4] + w * 0.5329522;
                b[5] = -0.7616 * b[5] - w * 0.0168980;
                const p = b[0] + b[1] + b[2] + b[3] + b[4] + b[5] + b[6] + w * 0.5362;
                b[6] = w * 0.115926;
                return p * 0.11;
            }
            const g = s.g;
            g[0] = 0.99886 * g[0] + w * 0.0555179;
            g[1] = 0.99332 * g[1] + w * 0.0750759;
            g[2] = 0.96900 * g[2] + w * 0.1538520;
            g[3] = 0.86650 * g[3] + w * 0.3104856;
            g[4] = 0.55000 * g[4] + w * 0.5329522;
            g[5] = -0.7616 * g[5] - w * 0.0168980;
            const pk = (g[0] + g[1] + g[2] + g[3] + g[4] + g[5] + g[6] + w * 0.5362) * 0.11;
            g[6] = w * 0.115926;
            return pk * 0.6 + (w * 0.5) * 0.5;
        }

        function hp(s, x) {
            const y = 0.9985 * (s.hpY + x - s.hpX);
            s.hpX = x;
            s.hpY = y;
            return y;
        }

        function gen(c, s) {
            return hp(s, raw(c, s));
        }

        sp.onaudioprocess = e => {
            const o0 = e.outputBuffer.getChannelData(0), o1 = e.outputBuffer.getChannelData(1);
            for (let i = 0; i < o0.length; i++) {
                let l, r;
                if (mix < 1) {
                    l = gen(cur, S[0]) * (1 - mix) + gen(tgt, S[0]) * mix;
                    r = gen(cur, S[1]) * (1 - mix) + gen(tgt, S[1]) * mix;
                    mix += stepN;
                    if (mix >= 1) {
                        mix = 1;
                        cur = tgt;
                    }
                } else {
                    l = gen(cur, S[0]);
                    r = gen(cur, S[1]);
                }
                o0[i] = l;
                o1[i] = r;
            }
        };
        return sp;
    }

    function applyColor() {
        const idx = COLORS.indexOf(state.color);
        if (rt.node && rt.node.port) rt.node.port.postMessage({color: idx});
        else if (rt.node && rt.node._setColor) rt.node._setColor(idx);
    }

    function applyVolume() {
        if (!rt.ready || !state.playing) return;
        rt.master.gain.setTargetAtTime(volToGain(state.volume), rt.ctx.currentTime, 0.02);
    }

    function applyTone() {
        if (!rt.ready) return;
        rt.filter.frequency.setTargetAtTime(toneToCutoff(state.tone), rt.ctx.currentTime, 0.02);
    }

    async function play() {
        const ok = await ensureAudio();
        if (!ok) {
            showError();
            return;
        }
        await rt.ctx.resume();
        applyColor();
        // fade IN over ~400ms so starting in a silent room isn't a slap
        const now = rt.ctx.currentTime, target = volToGain(state.volume);
        rt.master.gain.cancelScheduledValues(now);
        rt.master.gain.setValueAtTime(Math.max(rt.master.gain.value, 0.0001), now);
        rt.master.gain.linearRampToValueAtTime(target, now + 0.4);
        state.playing = true;
        render();
    }

    function pause() {
        if (rt.ready) {
            const now = rt.ctx.currentTime;
            rt.master.gain.cancelScheduledValues(now);
            rt.master.gain.setTargetAtTime(0, now, 0.02);
            setTimeout(() => {
                if (!state.playing && rt.ctx) rt.ctx.suspend();
            }, 80);
        }
        state.playing = false;
        render();
    }

    function toggle() {
        state.playing ? pause() : play();
    }

    /* ---------- timer ---------- */
    function setTimer(min) {
        state.timer = min;
        persist();
        clearTimer();
        if (min > 0) {
            rt.timerEnd = Date.now() + min * 60 * 1000;
            rt.fadeStarted = false;
            if (!state.playing) play();
            rt.timerInt = setInterval(tick, 250);
            tick();
        } else if (rt.ready && state.playing) {
            rt.master.gain.cancelScheduledValues(rt.ctx.currentTime);
            rt.master.gain.setTargetAtTime(volToGain(state.volume), rt.ctx.currentTime, 0.1);
        }
        renderTimers();
        renderCountdown();
    }

    function clearTimer() {
        if (rt.timerInt) {
            clearInterval(rt.timerInt);
            rt.timerInt = null;
        }
        rt.timerEnd = 0;
    }

    function tick() {
        const ms = rt.timerEnd - Date.now();
        if (ms <= 0) {
            clearTimer();
            state.timer = 0;
            persist();
            if (rt.ready) rt.master.gain.setTargetAtTime(0, rt.ctx.currentTime, 0.3);
            state.playing = false;
            render();
            return;
        }
        if (ms <= 30000 && !rt.fadeStarted && rt.ready && state.playing) {
            rt.fadeStarted = true;
            const now = rt.ctx.currentTime;
            rt.master.gain.cancelScheduledValues(now);
            rt.master.gain.setValueAtTime(rt.master.gain.value, now);
            rt.master.gain.linearRampToValueAtTime(0.0001, now + ms / 1000);
        }
        renderCountdown();
    }

    /* ---------- update fns ---------- */
    function setColor(c) {
        if (!COLORS.includes(c)) return;
        state.color = c;
        persist();
        applyColor();
        renderColor();
        renderTitle();
    }

    function setVolume(v) {
        state.volume = Math.max(0, Math.min(100, v));
        persist();
        applyVolume();
        renderVolume();
    }

    function setTone(t) {
        state.tone = Math.max(0, Math.min(100, t));
        persist();
        applyTone();
        renderTone();
    }

    /* ---------- render ---------- */
    const el = id => document.getElementById(id);

    function renderColor() {
        document.querySelectorAll('#colorSeg button').forEach(b =>
            b.classList.toggle('active', b.dataset.color === state.color));
        el('colorHint').textContent = HINTS[state.color] || '';
    }

    function renderVolume() {
        el('vol').value = state.volume;
        el('volReadout').textContent = state.volume + '%';
    }

    function renderTone() {
        el('tone').value = state.tone;
        const t = state.tone;
        el('toneReadout').textContent = t >= 95 ? 'Bright' : t <= 5 ? 'Dark' : t + '%';
    }

    function renderTimers() {
        document.querySelectorAll('#timers button').forEach(b =>
            b.classList.toggle('active', Number(b.dataset.min) === state.timer));
    }

    function renderCountdown() {
        if (state.timer > 0 && rt.timerEnd) {
            const ms = Math.max(0, rt.timerEnd - Date.now());
            const tot = Math.ceil(ms / 1000), m = Math.floor(tot / 60), s = tot % 60;
            el('countdown').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        } else el('countdown').textContent = '';
    }

    function renderPlay() {
        const p = el('play');
        p.classList.toggle('playing', state.playing);
        p.setAttribute('aria-label', state.playing ? 'Pause' : 'Play');
        el('playIcon').innerHTML = state.playing
            ? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'
            : '<path d="M8 5v14l11-7z"/>';
    }

    function renderIndicator() {
        el('indicator').classList.toggle('on', state.playing);
    }

    function renderTitle() {
        const name = state.color.charAt(0).toUpperCase() + state.color.slice(1);
        document.title = state.playing ? `▶ ${name} noise` : 'Focus Noise';
    }

    function render() {
        renderColor();
        renderVolume();
        renderTone();
        renderTimers();
        renderCountdown();
        renderPlay();
        renderIndicator();
        renderTitle();
    }

    function showError() {
        el('err').style.display = 'block';
        el('err').textContent = 'This browser doesn’t support Web Audio synthesis, so noise can’t be generated here.';
    }

    /* ---------- events ---------- */
    el('play').addEventListener('click', toggle);
    document.querySelectorAll('#colorSeg button').forEach(b =>
        b.addEventListener('click', () => setColor(b.dataset.color)));
    el('vol').addEventListener('input', e => setVolume(Number(e.target.value)));
    el('tone').addEventListener('input', e => setTone(Number(e.target.value)));
    document.querySelectorAll('#timers button').forEach(b =>
        b.addEventListener('click', () => setTimer(Number(b.dataset.min))));

    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') {
            if (e.code !== 'Space') return;
        }
        switch (e.code) {
            case 'Space':
                e.preventDefault();
                toggle();
                break;
            case 'ArrowUp':
                e.preventDefault();
                setVolume(state.volume + 5);
                break;
            case 'ArrowDown':
                e.preventDefault();
                setVolume(state.volume - 5);
                break;
            case 'Digit1':
                setColor('brown');
                break;
            case 'Digit2':
                setColor('pink');
                break;
            case 'Digit3':
                setColor('white');
                break;
            case 'Digit4':
                setColor('blue');
                break;
            case 'Digit5':
                setColor('grey');
                break;
            case 'Escape':
                setTimer(0);
                break;
        }
    });

    /* ---------- init ---------- */
    if (!(window.AudioContext || window.webkitAudioContext)) showError();
    render();
</script>
<script src="../logo.js"></script>
</body>
</html>
