<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description" content="Free online Image Splitter tool. Cut any image into grid tiles for Instagram carousels, social media posts, and more. Supports custom grids, square cropping, and ZIP download.">
    <meta name="keywords" content="image splitter, grid cutter, Instagram carousel, split image, tile cutter, image grid, photo splitter, Instagram grid, image crop tool">
    <meta name="author" content="Claude Opus 4.6 prompted by Tobias Müller">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.gptgames.dev/tools/image_splitter.html">
    <meta property="og:title" content="Image Splitter — Cut Images into Grid Tiles">
    <meta property="og:description" content="Free online tool to split images into grid tiles for Instagram carousels and social media. Custom grids, square cropping, PNG/JPEG/WebP export, and ZIP download.">
    <meta property="og:image" content="https://www.gptgames.dev/screenshots/screenshot_257.webp">
    <meta property="og:url" content="https://www.gptgames.dev/tools/image_splitter.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="GPT Games">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Image Splitter — Cut Images into Grid Tiles">
    <meta name="twitter:description" content="Free online tool to split images into grid tiles for Instagram carousels and social media. Custom grids, square cropping, and ZIP download.">
    <meta name="twitter:image" content="https://www.gptgames.dev/screenshots/screenshot_257.webp">
    <title>Image Splitter — Grid Tile Cutter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #f5f5f7;
            --surface: #fff;
            --surface2: #f0f0f2;
            --border: #e0e0e4;
            --text: #1d1d1f;
            --text2: #6e6e73;
            --accent: #0071e3;
            --accent-hover: #0062c4;
            --danger: #ff3b30;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(0, 0, 0, .08), 0 4px 12px rgba(0, 0, 0, .04)
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px
        }

        header svg {
            width: 28px;
            height: 28px;
            color: var(--accent)
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -.3px
        }

        header span {
            font-size: 13px;
            color: var(--text2);
            margin-left: auto
        }

        .app {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        .preview-panel {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow-y: auto
        }

        .controls-panel {
            width: 340px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-shrink: 0
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 48px 24px;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            flex: 1;
            min-height: 300px;
            position: relative
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(0, 113, 227, .04)
        }

        .drop-zone svg {
            width: 48px;
            height: 48px;
            color: var(--text2)
        }

        .drop-zone p {
            font-size: 15px;
            color: var(--text2);
            text-align: center
        }

        .drop-zone .browse {
            color: var(--accent);
            font-weight: 500;
            text-decoration: underline;
            cursor: pointer
        }

        .drop-zone input {
            display: none
        }

        .canvas-wrap {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px
        }

        .canvas-wrap canvas {
            max-width: 100%;
            max-height: 60vh;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow);
            display: block
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            border-radius: var(--radius-sm)
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text2);
            margin-bottom: 4px
        }

        .grid-presets {
            display: grid;
            grid-template-columns:repeat(3, 1fr);
            gap: 8px
        }

        .preset-btn {
            padding: 10px 4px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            transition: all .15s;
            text-align: center
        }

        .preset-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .preset-btn.active {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff
        }

        .custom-grid {
            display: grid;
            grid-template-columns:1fr 1fr;
            gap: 8px
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .field label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text2)
        }

        .field input, .field select {
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--surface2);
            color: var(--text);
            outline: none;
            transition: border-color .2s
        }

        .field input:focus, .field select:focus {
            border-color: var(--accent)
        }

        .range-field {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .range-field label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text2);
            display: flex;
            justify-content: space-between
        }

        .range-field input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--border);
            outline: none
        }

        .range-field input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .2)
        }

        .checkbox-field {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text)
        }

        .checkbox-field input {
            accent-color: var(--accent);
            width: 16px;
            height: 16px
        }

        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%
        }

        .btn-primary {
            background: var(--accent);
            color: #fff
        }

        .btn-primary:hover {
            background: var(--accent-hover)
        }

        .btn-primary:disabled {
            opacity: .4;
            cursor: not-allowed
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border)
        }

        .btn-secondary:hover {
            background: var(--border)
        }

        .btn-danger {
            background: none;
            color: var(--danger);
            border: 1px solid var(--danger);
            font-size: 13px;
            padding: 8px 12px
        }

        .btn-danger:hover {
            background: var(--danger);
            color: #fff
        }

        .tiles-section {
            margin-top: 20px
        }

        .tiles-section h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px
        }

        .tiles-grid {
            display: grid;
            gap: 8px
        }

        .tile-card {
            position: relative;
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: var(--shadow);
            background: var(--surface);
            cursor: pointer;
            transition: transform .15s
        }

        .tile-card:hover {
            transform: scale(1.03)
        }

        .tile-card canvas {
            width: 100%;
            display: block
        }

        .tile-num {
            position: absolute;
            top: 6px;
            left: 6px;
            background: rgba(0, 0, 0, .7);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .tile-dl {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0, 0, 0, .55);
            color: #fff;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .15s
        }

        .tile-card:hover .tile-dl {
            opacity: 1
        }

        .info-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px
        }

        .info-chip {
            font-size: 12px;
            color: var(--text2);
            background: var(--surface);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border)
        }

        .divider {
            height: 1px;
            background: var(--border)
        }

        .hidden {
            display: none !important
        }

        @media (max-width: 860px) {
            .app {
                flex-direction: column-reverse
            }

            .controls-panel {
                width: 100%;
                border-left: none;
                border-top: 1px solid var(--border);
                max-height: 45vh;
                overflow-y: auto
            }

            .canvas-wrap canvas {
                max-height: 40vh
            }
        }
    </style>
</head>
<body>
<header>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <h1>Image Splitter</h1>
    <span>Cut images into grid tiles</span>
</header>
<div class="app">
    <div class="preview-panel">
        <div id="dropZone" class="drop-zone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p>Drop your image here or <span class="browse">browse</span></p>
            <p style="font-size:12px;color:var(--text2)">Supports PNG, JPG, WebP</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div id="canvasArea" class="hidden">
            <div class="info-bar" id="infoBar"></div>
            <div class="canvas-wrap" id="canvasWrap">
                <canvas id="previewCanvas"></canvas>
                <canvas id="overlayCanvas" class="grid-overlay"></canvas>
            </div>
            <div class="tiles-section" id="tilesSection">
                <h3>Tile Preview <span id="tileCount" style="font-weight:400;color:var(--text2)"></span></h3>
                <div class="tiles-grid" id="tilesGrid"></div>
            </div>
        </div>
    </div>
    <div class="controls-panel">
        <div>
            <div class="section-title">Grid Layout</div>
            <div class="grid-presets" id="presets"></div>
        </div>
        <div>
            <div class="section-title">Custom Size</div>
            <div class="custom-grid">
                <div class="field"><label>Columns</label><input type="number" id="colsInput" min="1" max="20" value="3">
                </div>
                <div class="field"><label>Rows</label><input type="number" id="rowsInput" min="1" max="20" value="3">
                </div>
            </div>
        </div>
        <div class="divider"></div>
        <div>
            <div class="section-title">Crop Mode</div>
            <div class="grid-presets" style="grid-template-columns:1fr 1fr">
                <button class="preset-btn active" data-crop="original">Original</button>
                <button class="preset-btn" data-crop="square">Square 1:1</button>
            </div>
        </div>
        <div>
            <div class="section-title">Output</div>
            <div class="field"><label>Format</label>
                <select id="formatSelect">
                    <option value="png">PNG (lossless)</option>
                    <option value="jpeg">JPEG</option>
                    <option value="webp">WebP</option>
                </select>
            </div>
            <div class="range-field" id="qualityField">
                <label>Quality <span id="qualityVal">92%</span></label>
                <input type="range" id="qualityRange" min="10" max="100" value="92">
            </div>
        </div>
        <div class="checkbox-field">
            <input type="checkbox" id="numberToggle" checked>
            <label for="numberToggle">Show tile numbers in preview</label>
        </div>
        <div class="divider"></div>
        <button class="btn btn-primary" id="downloadZip" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download All as ZIP
        </button>
        <button class="btn btn-secondary" id="downloadIndividual" disabled>Download Tiles Individually</button>
        <button class="btn btn-danger hidden" id="resetBtn">Remove Image</button>
    </div>
</div>
<script>
    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);
    const presets = [
        {label: '1 × 2', c: 1, r: 2}, {label: '1 × 3', c: 1, r: 3}, {label: '2 × 2', c: 2, r: 2},
        {label: '2 × 3', c: 2, r: 3}, {label: '3 × 3', c: 3, r: 3}, {label: '3 × 1', c: 3, r: 1}
    ];
    let img = null, cols = 3, rows = 3, cropMode = 'original', tileCanvases = [];
    const previewCanvas = $('#previewCanvas'), overlayCanvas = $('#overlayCanvas');
    const pCtx = previewCanvas.getContext('2d'), oCtx = overlayCanvas.getContext('2d');
    // Init presets
    const presetsEl = $('#presets');
    presets.forEach((p, i) => {
        const btn = document.createElement('button');
        btn.className = 'preset-btn';
        btn.textContent = p.label;
        btn.dataset.c = p.c;
        btn.dataset.r = p.r;
        btn.addEventListener('click', () => {
            $$('#presets .preset-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            cols = p.c;
            rows = p.r;
            $('#colsInput').value = cols;
            $('#rowsInput').value = rows;
            update();
        });
        presetsEl.appendChild(btn);
    });
    // Custom inputs
    $('#colsInput').addEventListener('input', e => {
        cols = clamp(+e.target.value, 1, 20);
        syncPreset();
        update();
    });
    $('#rowsInput').addEventListener('input', e => {
        rows = clamp(+e.target.value, 1, 20);
        syncPreset();
        update();
    });

    function clamp(v, a, b) {
        return Math.max(a, Math.min(b, v || 1))
    }

    function syncPreset() {
        $$('#presets .preset-btn').forEach(b => {
            b.classList.toggle('active', +b.dataset.c === cols && +b.dataset.r === rows);
        });
    }

    // Crop mode
    $$('[data-crop]').forEach(btn => {
        btn.addEventListener('click', () => {
            $$('[data-crop]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            cropMode = btn.dataset.crop;
            update();
        });
    });
    // Format/quality
    $('#formatSelect').addEventListener('change', () => {
        $('#qualityField').style.display = $('#formatSelect').value === 'png' ? 'none' : '';
        generateTiles();
    });
    $('#qualityRange').addEventListener('input', e => {
        $('#qualityVal').textContent = e.target.value + '%';
    });
    $('#qualityRange').addEventListener('change', () => generateTiles());
    $('#numberToggle').addEventListener('change', () => {
        $$('.tile-num').forEach(n => n.style.display = $('#numberToggle').checked ? '' : 'none');
    });
    // Drop zone
    const dropZone = $('#dropZone'), fileInput = $('#fileInput');
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => {
        if (e.target.files[0]) handleFile(e.target.files[0]);
    });
    // Paste support
    document.addEventListener('paste', e => {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
            if (item.type.startsWith('image/')) {
                handleFile(item.getAsFile());
                break;
            }
        }
    });

    function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => {
            img = new Image();
            img.onload = () => {
                $('#dropZone').classList.add('hidden');
                $('#canvasArea').classList.remove('hidden');
                $('#resetBtn').classList.remove('hidden');
                $('#downloadZip').disabled = false;
                $('#downloadIndividual').disabled = false;
                update();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    $('#resetBtn').addEventListener('click', () => {
        img = null;
        tileCanvases = [];
        $('#dropZone').classList.remove('hidden');
        $('#canvasArea').classList.add('hidden');
        $('#resetBtn').classList.add('hidden');
        $('#downloadZip').disabled = true;
        $('#downloadIndividual').disabled = true;
        fileInput.value = '';
    });

    function getSourceRect() {
        if (cropMode === 'square') {
            const s = Math.min(img.width, img.height);
            return {x: (img.width - s) / 2, y: (img.height - s) / 2, w: s, h: s};
        }
        return {x: 0, y: 0, w: img.width, h: img.height};
    }

    function update() {
        if (!img) return;
        const src = getSourceRect();
        const maxW = Math.min(src.w, 1200), scale = maxW / src.w;
        const cw = Math.round(src.w * scale), ch = Math.round(src.h * scale);
        previewCanvas.width = cw;
        previewCanvas.height = ch;
        pCtx.drawImage(img, src.x, src.y, src.w, src.h, 0, 0, cw, ch);
        drawOverlay(cw, ch);
        updateInfo(src);
        generateTiles();
    }

    function drawOverlay(w, h) {
        overlayCanvas.width = w;
        overlayCanvas.height = h;
        const wrap = $('#canvasWrap');
        const rect = previewCanvas.getBoundingClientRect();
        overlayCanvas.style.width = rect.width + 'px';
        overlayCanvas.style.height = rect.height + 'px';
// Position overlay precisely on canvas
        const wrapRect = wrap.getBoundingClientRect();
        overlayCanvas.style.left = (rect.left - wrapRect.left) + 'px';
        overlayCanvas.style.top = (rect.top - wrapRect.top) + 'px';
        oCtx.clearRect(0, 0, w, h);
        oCtx.strokeStyle = 'rgba(255,255,255,.85)';
        oCtx.lineWidth = 2;
        oCtx.setLineDash([6, 4]);
        for (let c = 1; c < cols; c++) {
            const x = Math.round(w * c / cols);
            oCtx.beginPath();
            oCtx.moveTo(x, 0);
            oCtx.lineTo(x, h);
            oCtx.stroke();
        }
        for (let r = 1; r < rows; r++) {
            const y = Math.round(h * r / rows);
            oCtx.beginPath();
            oCtx.moveTo(0, y);
            oCtx.lineTo(w, y);
            oCtx.stroke();
        }
// Dark shadow lines for contrast
        oCtx.strokeStyle = 'rgba(0,0,0,.3)';
        oCtx.lineWidth = 2;
        oCtx.setLineDash([6, 4]);
        oCtx.lineDashOffset = 5;
        for (let c = 1; c < cols; c++) {
            const x = Math.round(w * c / cols);
            oCtx.beginPath();
            oCtx.moveTo(x, 0);
            oCtx.lineTo(x, h);
            oCtx.stroke();
        }
        for (let r = 1; r < rows; r++) {
            const y = Math.round(h * r / rows);
            oCtx.beginPath();
            oCtx.moveTo(0, y);
            oCtx.lineTo(w, y);
            oCtx.stroke();
        }
        oCtx.lineDashOffset = 0;
// Tile numbers
        oCtx.setLineDash([]);
        const tw = w / cols, th = h / rows;
        oCtx.font = `bold ${Math.max(12, Math.min(20, tw / 4))}px -apple-system,sans-serif`;
        oCtx.textAlign = 'center';
        oCtx.textBaseline = 'middle';
        let n = 1;
        for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
            const cx = tw * c + tw / 2, cy = th * r + th / 2;
            oCtx.fillStyle = 'rgba(0,0,0,.5)';
            const rad = Math.max(10, Math.min(18, tw / 5));
            oCtx.beginPath();
            oCtx.arc(cx, cy, rad, 0, Math.PI * 2);
            oCtx.fill();
            oCtx.fillStyle = '#fff';
            oCtx.fillText(n++, cx, cy + 1);
        }
    }

    function updateInfo(src) {
        $('#infoBar').innerHTML = `
<span class="info-chip">${img.naturalWidth} × ${img.naturalHeight}px</span>
<span class="info-chip">${cropMode === 'square' ? 'Square crop' : 'Original ratio'}</span>
<span class="info-chip">${cols} × ${rows} grid → ${cols * rows} tiles</span>
<span class="info-chip">~${Math.round(src.w / cols)} × ${Math.round(src.h / rows)}px each</span>`;
    }

    function generateTiles() {
        if (!img) return;
        const src = getSourceRect();
        const tw = src.w / cols, th = src.h / rows;
        tileCanvases = [];
        const grid = $('#tilesGrid');
        grid.innerHTML = '';
        grid.style.gridTemplateColumns = `repeat(${cols},1fr)`;
        const showNums = $('#numberToggle').checked;
        let n = 0;
        for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
            n++;
            const tc = document.createElement('canvas');
            tc.width = Math.round(tw);
            tc.height = Math.round(th);
            const ctx = tc.getContext('2d');
            ctx.drawImage(img, src.x + Math.round(c * tw), src.y + Math.round(r * th), Math.round(tw), Math.round(th), 0, 0, tc.width, tc.height);
            tileCanvases.push(tc);
            const card = document.createElement('div');
            card.className = 'tile-card';
            const display = document.createElement('canvas');
            display.width = tc.width;
            display.height = tc.height;
            display.getContext('2d').drawImage(tc, 0, 0);
            card.appendChild(display);
            const num = document.createElement('span');
            num.className = 'tile-num';
            num.textContent = n;
            num.style.display = showNums ? '' : 'none';
            card.appendChild(num);
            const dl = document.createElement('button');
            dl.className = 'tile-dl';
            dl.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
            dl.title = 'Download tile ' + n;
            const idx = n;
            dl.addEventListener('click', e => {
                e.stopPropagation();
                downloadTile(idx - 1);
            });
            card.appendChild(dl);
            grid.appendChild(card);
        }
        $('#tileCount').textContent = `(${n} tiles)`;
    }

    function getFormat() {
        const f = $('#formatSelect').value;
        return {
            mime: f === 'png' ? 'image/png' : f === 'jpeg' ? 'image/jpeg' : 'image/webp',
            ext: f === 'jpeg' ? 'jpg' : f,
            quality: (+$('#qualityRange').value) / 100
        };
    }

    function tileToBlob(tc) {
        return new Promise(res => {
            const {mime, quality} = getFormat();
            tc.toBlob(b => res(b), mime, quality);
        });
    }

    function downloadTile(i) {
        const {ext} = getFormat();
        tileToBlob(tileCanvases[i]).then(blob => {
            saveAs(blob, `tile_${String(i + 1).padStart(2, '0')}.${ext}`);
        });
    }

    $('#downloadZip').addEventListener('click', async () => {
        const btn = $('#downloadZip');
        btn.disabled = true;
        btn.textContent = 'Generating…';
        const zip = new JSZip();
        const {ext} = getFormat();
        const folder = zip.folder('tiles');
        const promises = tileCanvases.map((tc, i) =>
            tileToBlob(tc).then(blob => folder.file(`tile_${String(i + 1).padStart(2, '0')}.${ext}`, blob))
        );
        await Promise.all(promises);
        const content = await zip.generateAsync({type: 'blob'});
        saveAs(content, `tiles_${cols}x${rows}.zip`);
        btn.disabled = false;
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download All as ZIP';
    });
    $('#downloadIndividual').addEventListener('click', async () => {
        for (let i = 0; i < tileCanvases.length; i++) {
            await new Promise(r => setTimeout(r, 150));
            downloadTile(i);
        }
    });
    // Resize observer for overlay repositioning
    new ResizeObserver(() => {
        if (img) requestAnimationFrame(() => {
            const src = getSourceRect();
            const maxW = Math.min(src.w, 1200), scale = maxW / src.w;
            drawOverlay(Math.round(src.w * scale), Math.round(src.h * scale));
        })
    }).observe($('#canvasWrap'));
</script>
<script src="../logo.js"></script>
</body>
