<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Encoder/Decoder Tool</title>
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
    <meta name="description"
          content="A professional URL encoder/decoder tool with live preview, syntax highlighting, and multiple encoding modes.">
    <style>
        :root {
            --p: #2563eb;
            --p-hover: #1d4ed8;
            --p-subtle: #eff6ff;
            --red: #e11d48;
            --red-hover: #be123c;
            --green: #059669;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --surface: #fff;
            --text: #0f172a;
            --text2: #475569;
            --text3: #94a3b8;
            --radius: 8px;
            --shadow: 0 1px 3px rgba(0, 0, 0, .08);
            --mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace
        }

        [data-theme="dark"] {
            --p: #3b82f6;
            --p-hover: #60a5fa;
            --p-subtle: #1e293b;
            --red: #f43f5e;
            --red-hover: #fb7185;
            --green: #34d399;
            --border: #334155;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 20px;
            transition: background .2s, color .2s
        }

        .wrap {
            max-width: 780px;
            margin: 0 auto
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -.02em
        }

        .subtitle {
            color: var(--text2);
            font-size: .875rem;
            margin-top: 2px
        }

        .theme-btn {
            background: 0;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 6px 10px;
            color: var(--text);
            transition: border-color .2s
        }

        .theme-btn:hover {
            border-color: var(--p)
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow)
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden
        }

        .tab {
            flex: 1;
            padding: 10px 8px;
            background: var(--bg);
            border: none;
            cursor: pointer;
            font-size: .8rem;
            font-weight: 600;
            color: var(--text2);
            transition: all .15s;
            text-align: center;
            border-right: 1px solid var(--border)
        }

        .tab:last-child {
            border-right: none
        }

        .tab.active {
            background: var(--p);
            color: #fff
        }

        .tab:not(.active):hover {
            background: var(--p-subtle);
            color: var(--p)
        }

        .tab small {
            display: block;
            font-weight: 400;
            font-size: .7rem;
            opacity: .75;
            margin-top: 1px
        }

        label.field {
            display: block;
            font-size: .8rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: .04em
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            font-size: .875rem;
            resize: vertical;
            line-height: 1.5;
            transition: border-color .15s
        }

        textarea:focus {
            outline: none;
            border-color: var(--p)
        }

        .meta {
            font-size: .75rem;
            color: var(--text3);
            text-align: right;
            margin-top: 4px
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            margin: 16px 0;
            flex-wrap: wrap
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: .8rem;
            transition: all .15s
        }

        .btn-p {
            background: var(--p);
            color: #fff
        }

        .btn-p:hover {
            background: var(--p-hover)
        }

        .btn-r {
            background: var(--red);
            color: #fff
        }

        .btn-r:hover {
            background: var(--red-hover)
        }

        .btn-o {
            background: 0;
            border: 1px solid var(--border);
            color: var(--text)
        }

        .btn-o:hover {
            border-color: var(--p);
            color: var(--p)
        }

        .btn kbd {
            font-size: .65rem;
            opacity: .7;
            font-family: inherit
        }

        .sep {
            flex: 1
        }

        .live-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .8rem;
            color: var(--text2);
            cursor: pointer;
            user-select: none
        }

        .live-toggle input {
            display: none
        }

        .switch {
            width: 36px;
            height: 20px;
            background: var(--border);
            border-radius: 10px;
            position: relative;
            transition: background .2s
        }

        .switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform .2s
        }

        .live-toggle input:checked + .switch {
            background: var(--p)
        }

        .live-toggle input:checked + .switch::after {
            transform: translateX(16px)
        }

        .live-dir {
            display: none;
            gap: 4px;
            margin-left: 4px
        }

        .live-toggle input:checked ~ .live-dir {
            display: flex
        }

        .dir-btn {
            padding: 2px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: 0;
            font-size: .7rem;
            cursor: pointer;
            color: var(--text2);
            font-weight: 600
        }

        .dir-btn.active {
            background: var(--p);
            color: #fff;
            border-color: var(--p)
        }

        .output-wrap {
            position: relative
        }

        .output-display {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            font-family: var(--mono);
            font-size: .875rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-y: auto;
            max-height: 300px;
            color: var(--text)
        }

        .output-display:empty::before {
            content: 'Output will appear here';
            color: var(--text3)
        }

        .output-display .enc {
            color: var(--p);
            font-weight: 600;
            background: var(--p-subtle);
            border-radius: 3px;
            padding: 0 2px
        }

        .copy-float {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            cursor: pointer;
            font-size: .75rem;
            font-weight: 600;
            color: var(--text2);
            transition: all .15s;
            opacity: .7
        }

        .copy-float:hover {
            opacity: 1;
            border-color: var(--p);
            color: var(--p)
        }

        .examples {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px
        }

        .chip {
            padding: 6px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: .78rem;
            cursor: pointer;
            transition: all .15s;
            color: var(--text2)
        }

        .chip:hover {
            border-color: var(--p);
            color: var(--p)
        }

        .ref-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: 0;
            border: none;
            cursor: pointer;
            font-size: .8rem;
            font-weight: 600;
            color: var(--text2);
            padding: 0;
            margin-bottom: 10px
        }

        .ref-toggle .arrow {
            transition: transform .2s;
            font-size: .7rem
        }

        .ref-toggle.open .arrow {
            transform: rotate(90deg)
        }

        .ref-table {
            display: none;
            width: 100%;
            border-collapse: collapse;
            font-size: .78rem
        }

        .ref-table.show {
            display: table
        }

        .ref-table th {
            text-align: left;
            padding: 6px 10px;
            border-bottom: 2px solid var(--border);
            color: var(--text2);
            font-weight: 600
        }

        .ref-table td {
            padding: 5px 10px;
            border-bottom: 1px solid var(--border);
            font-family: var(--mono);
            font-size: .78rem
        }

        .ref-table tr:last-child td {
            border-bottom: none
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 16px;
            border-radius: var(--radius);
            color: #fff;
            font-size: .8rem;
            font-weight: 600;
            transform: translateY(-80px);
            opacity: 0;
            transition: all .25s;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .15)
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1
        }

        .stats {
            display: flex;
            gap: 16px;
            font-size: .75rem;
            color: var(--text3);
            margin-top: 4px;
            flex-wrap: wrap
        }

        .stats span {
            display: flex;
            align-items: center;
            gap: 4px
        }

        .stats .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block
        }

        @media (max-width: 540px) {
            .tab small {
                display: none
            }

            .toolbar {
                gap: 6px
            }

            .btn {
                padding: 7px 12px;
                font-size: .78rem
            }

            .btn kbd {
                display: none
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="header">
        <div><h1>URL Encoder / Decoder</h1>
            <p class="subtitle">Convert special characters for safe URL transmission</p></div>
        <button id="themeBtn" class="theme-btn" aria-label="Toggle dark mode">🌙</button>
    </div>
    <div class="card">
        <div class="tabs" id="tabs">
            <button class="tab" data-mode="component">Component<small>encodeURIComponent</small></button>
            <button class="tab active" data-mode="form">Form / Query<small>spaces → +</small></button>
            <button class="tab" data-mode="uri">Full URI<small>preserves :/?#&amp;=</small></button>
        </div>
        <label class="field" for="input">Input</label>
        <textarea id="input" placeholder="Paste or type text to encode or decode…" spellcheck="false"></textarea>
        <div class="meta"><span id="inMeta">0 chars · 0 bytes</span></div>
        <div class="toolbar">
            <button id="encBtn" class="btn btn-p">▶ Encode <kbd>Ctrl ↵</kbd></button>
            <button id="decBtn" class="btn btn-r">◀ Decode <kbd>Ctrl ⇧ ↵</kbd></button>
            <button id="swapBtn" class="btn btn-o" title="Move output to input">⇅ Swap</button>
            <button id="clearBtn" class="btn btn-o">✕ Clear</button>
            <span class="sep"></span>
            <label class="live-toggle"><input type="checkbox" id="liveChk"><span class="switch"></span> Live
                <span class="live-dir"><button class="dir-btn active" data-dir="enc">Enc</button><button class="dir-btn"
                                                                                                         data-dir="dec">Dec</button></span>
            </label>
        </div>
        <label class="field">Output</label>
        <div class="output-wrap">
            <div id="output" class="output-display" role="textbox" aria-readonly="true"></div>
            <button id="copyBtn" class="copy-float">Copy</button>
        </div>
        <div class="stats" id="stats"></div>
        <div class="examples">
            <div class="chip" data-v="https://example.com/path?name=John Doe&age=25">URL with params</div>
            <div class="chip" data-v="email@example.com?subject=Hello World!">Email subject</div>
            <div class="chip" data-v="Special chars: !@#$%^&*()">Special chars</div>
            <div class="chip" data-v="日本語テスト · données · данные">Unicode / i18n</div>
        </div>
    </div>
    <div class="card">
        <button class="ref-toggle" id="refToggle"><span class="arrow">▶</span> Common Encoding Reference</button>
        <table class="ref-table" id="refTable">
            <tr>
                <th>Character</th>
                <th>Encoded</th>
                <th>Character</th>
                <th>Encoded</th>
            </tr>
            <tr>
                <td>(space)</td>
                <td>%20 or +</td>
                <td>!</td>
                <td>%21</td>
            </tr>
            <tr>
                <td>#</td>
                <td>%23</td>
                <td>$</td>
                <td>%24</td>
            </tr>
            <tr>
                <td>&amp;</td>
                <td>%26</td>
                <td>=</td>
                <td>%3D</td>
            </tr>
            <tr>
                <td>?</td>
                <td>%3F</td>
                <td>@</td>
                <td>%40</td>
            </tr>
            <tr>
                <td>/</td>
                <td>%2F</td>
                <td>:</td>
                <td>%3A</td>
            </tr>
            <tr>
                <td>+</td>
                <td>%2B</td>
                <td>%</td>
                <td>%25</td>
            </tr>
        </table>
    </div>
</div>
<div id="toast" class="toast"></div>
<script>
    const $ = s => document.getElementById(s), q = (s, p) => (p || document).querySelectorAll(s);
    const input = $('input'), output = $('output'), inMeta = $('inMeta'), statsEl = $('stats');
    let mode = 'form', rawOutput = '', liveDir = 'enc';
    // Theme
    $('themeBtn').onclick = () => {
        const d = document.body.dataset.theme === 'dark';
        document.body.dataset.theme = d ? '' : 'dark';
        $('themeBtn').textContent = d ? '🌙' : '☀️'
    };
    // Tabs
    q('.tab').forEach(t => t.onclick = () => {
        q('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        mode = t.dataset.mode;
        if ($('liveChk').checked) runLive()
    });

    // Encode / Decode
    function encode(s) {
        if (mode === 'component') return encodeURIComponent(s);
        if (mode === 'form') return encodeURIComponent(s).replace(/%20/g, '+');
        return encodeURI(s)
    }

    function decode(s) {
        try {
            if (mode === 'form') return decodeURIComponent(s.replace(/\+/g, ' '));
            return mode === 'uri' ? decodeURI(s) : decodeURIComponent(s)
        } catch (e) {
            return null
        }
    }

    function run(dir) {
        const s = input.value;
        if (!s) {
            setOutput('', '');
            return
        }
        let r;
        if (dir === 'enc') {
            r = encode(s);
            setOutput(r, 'enc');
            toast('Encoded')
        } else {
            r = decode(s);
            if (r === null) {
                toast('Invalid encoded input', 'err');
                return
            }
            setOutput(r, 'dec');
            toast('Decoded')
        }
    }

    function setOutput(text, dir) {
        rawOutput = text;
        if (!text) {
            output.innerHTML = '';
            statsEl.innerHTML = '';
            return
        }
        if (dir === 'enc') {
            const h = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/(%[0-9A-Fa-f]{2}|\+)/g, '<span class="enc">$1</span>');
            output.innerHTML = h;
            const m = text.match(/%[0-9A-Fa-f]{2}/g);
            const cnt = m ? m.length : 0;
            const plus = (mode === 'form' ? (text.match(/\+/g) || []).length : 0);
            const total = cnt + plus;
            statsEl.innerHTML = total ? `<span><span class="dot" style="background:var(--p)"></span>${total} encoded sequence${total > 1 ? 's' : ''}</span><span>${text.length} chars · ${new Blob([text]).size} bytes</span>` : `<span>No characters needed encoding</span><span>${text.length} chars · ${new Blob([text]).size} bytes</span>`
        } else {
            output.textContent = text;
            statsEl.innerHTML = `<span>${text.length} chars · ${new Blob([text]).size} bytes</span>`
        }
    }

    // Buttons
    $('encBtn').onclick = () => run('enc');
    $('decBtn').onclick = () => run('dec');
    $('swapBtn').onclick = () => {
        if (!rawOutput) return;
        input.value = rawOutput;
        rawOutput = '';
        output.innerHTML = '';
        statsEl.innerHTML = '';
        updMeta();
        toast('Swapped')
    };
    $('clearBtn').onclick = () => {
        input.value = '';
        rawOutput = '';
        output.innerHTML = '';
        statsEl.innerHTML = '';
        updMeta()
    };
    $('copyBtn').onclick = async () => {
        if (!rawOutput) {
            toast('Nothing to copy', 'err');
            return
        }
        try {
            await navigator.clipboard.writeText(rawOutput);
            toast('Copied!')
        } catch {
            toast('Copy failed', 'err')
        }
    };

    // Meta
    function updMeta() {
        const v = input.value;
        inMeta.textContent = `${v.length} chars · ${new Blob([v]).size} bytes`
    }

    input.addEventListener('input', () => {
        updMeta();
        if ($('liveChk').checked) runLive()
    });

    // Live mode
    function runLive() {
        run(liveDir)
    }

    $('liveChk').onchange = function () {
        if (this.checked && input.value) runLive()
    };
    q('.dir-btn').forEach(b => b.onclick = () => {
        q('.dir-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        liveDir = b.dataset.dir;
        if ($('liveChk').checked && input.value) runLive()
    });
    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            run(e.shiftKey ? 'dec' : 'enc')
        }
    });
    // Examples
    q('.chip').forEach(c => c.onclick = () => {
        input.value = c.dataset.v;
        updMeta();
        if ($('liveChk').checked) runLive()
    });
    // Reference toggle
    $('refToggle').onclick = function () {
        this.classList.toggle('open');
        $('refTable').classList.toggle('show')
    };
    // Toast
    let toastTimer;

    function toast(msg, type) {
        const t = $('toast');
        t.textContent = msg;
        t.style.background = type === 'err' ? 'var(--red)' : 'var(--green)';
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2000)
    }
</script>
<script src="../logo.js"></script>
</body>
</html>
