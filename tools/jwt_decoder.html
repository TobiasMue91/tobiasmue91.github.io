    <style>
        :root {
            --bg: #F8F9FA;
            --card-bg: #FFFFFF;
            --text: #1A1A2E;
            --text-muted: #6C757D;
            --border: #E2E6EA;
            --accent: #4A6CF7;
            --json-key: #1A1A2E;
            --json-str: #2D8A56;
            --json-num: #C75C00;
            --json-bool: #8B5CF6;
            --red: #DC3545;
            --green: #28A745;
            --amber: #D4A017;
            --hover-bg: #F0F1F3;
            --seg-header: #6B9BD2;
            --seg-payload: #A78BDB;
            --seg-sig: #5BA6A6;
            --input-shadow: 0 1px 3px rgba(0, 0, 0, 0.04);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0F1117;
                --card-bg: #1A1D27;
                --text: #E4E4E7;
                --text-muted: #8B8D97;
                --border: #2A2D37;
                --accent: #6B8AFD;
                --json-key: #E4E4E7;
                --json-str: #4ADE80;
                --json-num: #FB923C;
                --json-bool: #A78BFA;
                --hover-bg: #2A2D37;
                --seg-header: #7BAEE0;
                --seg-payload: #B99DE8;
                --seg-sig: #6BBABA;
                --input-shadow: none;
            }
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 760px;
            margin: 0 auto;
            padding: 40px 24px 64px;
        }

        @media (max-width: 760px) {
            .app {
                padding: 24px 16px 48px;
            }
        }

        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
        }

        .privacy-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 10px;
        }

        .privacy-badge svg {
            flex-shrink: 0;
        }

        /* Input area */
        .input-wrapper {
            position: relative;
            margin-bottom: 8px;
        }

        .token-input {
            width: 100%;
            min-height: 110px;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            resize: vertical;
            outline: none;
            word-break: break-all;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            box-shadow: var(--input-shadow);
            transition: border-color 120ms ease-out;
        }

        .token-input:focus {
            border-color: var(--accent);
        }

        .token-input:empty::before {
            content: attr(data-placeholder);
            color: var(--text-muted);
            opacity: 0.5;
            pointer-events: none;
        }

        .token-input .seg-h {
            color: var(--seg-header);
        }

        .token-input .seg-p {
            color: var(--seg-payload);
        }

        .token-input .seg-s {
            color: var(--seg-sig);
        }

        .token-input .seg-dot {
            color: var(--text-muted);
        }

        /* History */
        .history-section {
            margin-bottom: 24px;
        }

        .history-toggle {
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .history-toggle:hover {
            color: var(--text);
        }

        .history-toggle .arrow {
            transition: transform 120ms ease-out;
            display: inline-block;
            font-size: 10px;
        }

        .history-toggle .arrow.open {
            transform: rotate(90deg);
        }

        .history-list {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 120ms ease-out;
        }

        .history-item:hover {
            background: var(--hover-bg);
        }

        .history-item .preview {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            margin-right: 8px;
        }

        .history-item .claim {
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            flex-shrink: 0;

        .history-clear {
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 0;
            margin-top: 4px;
        }

        .history-clear:hover {
            color: var(--red);
        }

        .history-note {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            font-style: italic;

        /* Status banner */

        }

        .status-valid {

            border-left-color: var(--green);

        }

        .status-nbf {
            background: rgba(212, 160, 23, 0.1);
            border-left-color: var(--amber);
            color: var(--amber);
        }

        .status-none {
            background: var(--card-bg);
            border-left-color: var(--border);
            color: var(--text-muted);
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 16px;

        .card-label {

            font-weight: 600;

        .info-icon {

            justify-content: center;

            height: 16px;
            border-radius: 50%;
            font-size: 10px;
            color: var(--text-muted);
            cursor: help;
            position: relative;
            vertical-align: middle;
            margin-left: 4px;
            border: 1px solid var(--border);
            font-style: normal;
            font-family: 'Inter', sans-serif;
        }

        .tooltip {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: var(--bg);
            font-size: 11px;
            padding: 6px 10px;
            border-radius: 6px;
            white-space: nowrap;
            max-width: 260px;
            white-space: normal;
            pointer-events: none;
            animation: fadeIn 100ms ease-out;
            z-index: 10;
            font-style: normal;
            font-family: 'Inter', sans-serif;
            line-height: 1.4;
        }

        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: var(--text);
        }

        /* Copy buttons */
        .copy-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            background: none;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: background 120ms ease-out, color 120ms ease-out;
        }

        .copy-btn:hover {
            background: var(--hover-bg);
            color: var(--text);
        }

        .copy-btn.copied {
            color: var(--green);
        }

        .copy-all-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: background 120ms ease-out, color 120ms ease-out;
            margin-bottom: 16px;
        }

        .copy-all-btn:hover {
            background: var(--hover-bg);
            color: var(--text);
        }

        .copy-all-btn.copied {
            color: var(--green);
        }

        /* Signature raw */
        .sig-raw {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-muted);
            word-break: break-all;
            line-height: 1.6;
        }

        .sig-note {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 12px;
            font-style: italic;
        }

        /* Empty / Error state */
        .message-area {
            margin-bottom: 24px;
            min-height: 24px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            padding: 32px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .empty-state svg {
            opacity: 0.4;
        }

        .error-msg {
            color: var(--red);
            font-size: 13px;
            padding: 4px 0;
        }

        /* Footer */
        .footer {
            margin-top: 32px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .footer kbd {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            background: var(--hover-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 5px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0ms !important;
                transition-duration: 0ms !important;
            }
        }
    </style>
</head>

<script>
    (function () {
        'use strict';

        // --- CLAIM GLOSSARY ---
        const REGISTERED_CLAIMS = {
            iss: 'Issuer',
            sub: 'Subject',
            aud: 'Audience',
            exp: 'Expiration Time',
            nbf: 'Not Before',
            iat: 'Issued At',
            jti: 'JWT ID'
        };
        const CLAIM_TOOLTIPS = {
            iss: 'Identifies the principal that issued the JWT.',
            sub: 'Identifies the subject of the JWT (usually a user ID).',
            aud: 'Identifies the recipients that the JWT is intended for.',
            exp: 'The time after which the JWT must not be accepted.',
            nbf: 'The time before which the JWT must not be accepted.',
            iat: 'The time at which the JWT was issued.',
            jti: 'A unique identifier for the JWT, used to prevent replay.',
            roles: 'A list of roles assigned to the token subject.',
            scope: 'OAuth 2.0 scopes granted to the token.',
            email: 'Email address of the authenticated user.',
            name: 'Display name of the authenticated user.',
            permissions: 'Specific permissions granted to the token holder.',
            azp: 'Authorized party — the client ID of the application.',
            at_hash: 'Access token hash, used to validate the access token.',
            nonce: 'A value used to associate a client session with an ID token.',
            auth_time: 'Time when the user authentication occurred.',
            email_verified: 'Whether the user\'s email has been verified.',
            picture: 'URL of the user\'s profile picture.',
            given_name: 'The user\'s given (first) name.',
            family_name: 'The user\'s family (last) name.',
            locale: 'The user\'s locale or language preference.'
        };
        const TIME_CLAIMS = new Set(['exp', 'nbf', 'iat', 'auth_time']);

        // --- STATE ---
        const state = {
            raw: '',
            lastRendered: '',
            header: null,
            payload: null,
            signature: null,
            headerError: null,
            payloadError: null,
            error: null,
            history: [],
            historyOpen: false
        };

        // --- DOM REFS ---
        const $input = document.getElementById('tokenInput');
        const $message = document.getElementById('messageArea');
        const $status = document.getElementById('statusBanner');
        const $output = document.getElementById('decodedOutput');
        const $history = document.getElementById('historySection');

        // --- UTILS ---
        function decodeBase64Url(str) {
            let s = str.replace(/-/g, '+').replace(/_/g, '/');
            while (s.length % 4) s += '=';
            try {
                const decoded = atob(s);
                return decodeURIComponent(escape(decoded));
            } catch (e) {
                return null;
            }
        }

        function formatTimestamp(unix) {
            if (typeof unix !== 'number' || !isFinite(unix)) return null;
            const d = new Date(unix * 1000);
            if (isNaN(d.getTime())) return null;
            const absolute = new Intl.DateTimeFormat(undefined, {
                year: 'numeric', month: 'short', day: 'numeric',
                hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
            }).format(d);
            const diff = d.getTime() - Date.now();
            const absDiff = Math.abs(diff);
            let relative;
            if (absDiff < 60000) relative = 'just now';
            else if (absDiff < 3600000) {
                const m = Math.floor(absDiff / 60000);
                relative = diff < 0 ? `${m} minute${m > 1 ? 's' : ''} ago` : `in ${m} minute${m > 1 ? 's' : ''}`;
            } else if (absDiff < 86400000) {
                const h = Math.floor(absDiff / 3600000);
                relative = diff < 0 ? `${h} hour${h > 1 ? 's' : ''} ago` : `in ${h} hour${h > 1 ? 's' : ''}`;
            } else {
                const days = Math.floor(absDiff / 86400000);
                relative = diff < 0 ? `${days} day${days > 1 ? 's' : ''} ago` : `in ${days} day${days > 1 ? 's' : ''}`;
            }
            return {absolute, relative};
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function syntaxHighlight(obj, indent, isPayload) {
            return renderValue(obj, indent || 0, isPayload, '');
        }

        function renderValue(val, indent, isPayload, key) {
            if (val === null) return `<span class="json-null">null</span>`;
            if (typeof val === 'boolean') return `<span class="json-bool">${val}</span>`;
            if (typeof val === 'number') return `<span class="json-num">${val}</span>`;
            if (typeof val === 'string') return `<span class="json-str">"${escapeHtml(val)}"</span>`;
            if (Array.isArray(val)) return renderArray(val, indent, isPayload);
            if (typeof val === 'object') return renderObject(val, indent, isPayload);
            return escapeHtml(String(val));
        }

        function renderArray(arr, indent, isPayload) {
            if (arr.length === 0) return '[]';
            const pad = '  '.repeat(indent + 1);
            const endPad = '  '.repeat(indent);
            const items = arr.map(v => pad + renderValue(v, indent + 1, isPayload, ''));
            return '[\n' + items.join(',\n') + '\n' + endPad + ']';
        }

        function renderObject(obj, indent, isPayload) {
            const keys = Object.keys(obj);
            if (keys.length === 0) return '{}';
            const pad = '  '.repeat(indent + 1);
            const endPad = '  '.repeat(indent);
            const lines = keys.map(k => {
                const valStr = renderValue(obj[k], indent + 1, isPayload, k);
                let annotation = '';
                if (isPayload && indent === 0) {
                    if (REGISTERED_CLAIMS[k]) {
                        annotation += `<span class="claim-annotation">${REGISTERED_CLAIMS[k]}</span>`;
                    }
                    if (CLAIM_TOOLTIPS[k]) {
                        annotation += `<span class="info-icon" data-tip="${escapeHtml(CLAIM_TOOLTIPS[k])}">i</span>`;
                    }
                    if (TIME_CLAIMS.has(k) && typeof obj[k] === 'number') {
                        const t = formatTimestamp(obj[k]);
                        if (t) annotation += `<span class="claim-time">${escapeHtml(t.absolute)} · ${escapeHtml(t.relative)}</span>`;
                    } else if (TIME_CLAIMS.has(k) && typeof obj[k] !== 'number') {
                        annotation += `<span class="claim-annotation" style="color:var(--red)">Expected a number</span>`;
                    }
                }
                return `${pad}<span class="json-key">"${escapeHtml(k)}"</span>: ${valStr}${annotation}`;
            });
            return '{\n' + lines.join(',\n') + '\n' + endPad + '}';
        }

        // --- COPY ---
        function copyText(text, btn) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => showCopied(btn));
            } else {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showCopied(btn);
            }
        }

        function showCopied(btn) {
            btn.classList.add('copied');
            const orig = btn.innerHTML;
            btn.innerHTML = svgCheck;
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = orig;
            }, 1500);
        }

        const svgCopy = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
        const svgCheck = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

        // --- HISTORY ---
        function loadHistory() {
            try {
                const h = localStorage.getItem('jwt-decoder-history');
                state.history = h ? JSON.parse(h) : [];
            } catch (e) {
                state.history = [];
            }
        }

        function saveHistory() {
            try {
                localStorage.setItem('jwt-decoder-history', JSON.stringify(state.history));
            } catch (e) {
            }
        }

        function addToHistory(token) {
            if (!token || token.length < 10) return;
            state.history = state.history.filter(t => t !== token);
            state.history.unshift(token);
            if (state.history.length > 5) state.history = state.history.slice(0, 5);
            saveHistory();
        }

        function clearHistory() {
            state.history = [];
            saveHistory();
            renderHistory();
        }

        function getClaimPreview(token) {
            try {
                const parts = token.split('.');
                if (parts.length < 2) return '';
                const json = JSON.parse(decodeBase64Url(parts[1]));
                return json.sub || json.iss || json.email || '';
            } catch (e) {
                return '';
            }
        }

        function renderHistory() {
            if (state.history.length === 0) {
                $history.style.display = 'none';
                return;
            }
            $history.style.display = 'block';
            let html = `<button class="history-toggle" id="histToggle"><span class="arrow ${state.historyOpen ? 'open' : ''}">▶</span> Recent (${state.history.length})</button>`;
            if (state.historyOpen) {
                html += '<div class="history-list">';
                state.history.forEach((t, i) => {
                    const preview = t.substring(0, 24) + '…';
                    const claim = getClaimPreview(t);
                    html += `<div class="history-item" data-idx="${i}"><span class="preview">${escapeHtml(preview)}</span>${claim ? `<span class="claim">${escapeHtml(claim)}</span>` : ''}</div>`;
                });
                html += '</div>';
                html += '<button class="history-clear" id="histClear">Clear history</button>';
                html += '<div class="history-note">History stored locally in your browser only.</div>';
            }
            $history.innerHTML = html;

            document.getElementById('histToggle').addEventListener('click', () => {
                state.historyOpen = !state.historyOpen;
                renderHistory();
            });
            if (state.historyOpen) {
                $history.querySelectorAll('.history-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const idx = parseInt(el.dataset.idx);
                        setInput(state.history[idx]);
                    });
                });
                const clr = document.getElementById('histClear');
                if (clr) clr.addEventListener('click', clearHistory);
            }
        }

        // --- PARSE ---
        function parse(raw) {
            const cleaned = raw.replace(/\s+/g, '');
            state.header = null;
            state.payload = null;
            state.signature = null;
            state.error = null;
            state.headerError = null;
            state.payloadError = null;

            if (!cleaned) return;

            const parts = cleaned.split('.');
            if (parts.length < 2 || parts.length > 3) {
                state.error = `Invalid structure: expected 3 dot-separated segments, found ${parts.length}`;
                return;
            }

            // Header
            const hStr = decodeBase64Url(parts[0]);
            if (hStr === null) {
                state.headerError = 'Header is not valid base64url-encoded data';
            } else {
                try {
                    state.header = JSON.parse(hStr);
                } catch (e) {
                    state.headerError = 'Header is not valid JSON';
                }
            }

            // Payload
            const pStr = decodeBase64Url(parts[1]);
            if (pStr === null) {
                state.payloadError = 'Payload is not valid base64url-encoded data';
            } else {
                try {
                    state.payload = JSON.parse(pStr);
                } catch (e) {
                    state.payloadError = 'Payload is not valid JSON';
                }
            }

            // Signature
            state.signature = parts.length === 3 ? parts[2] : null;

            if (!state.header && !state.payload) {
                state.error = state.headerError || state.payloadError;
            }

            if (state.header || state.payload) {
                addToHistory(cleaned);
                renderHistory();
                // URL sync
                if (cleaned.length <= 2000) {
                    try {
                        history.replaceState(null, '', '?token=' + encodeURIComponent(cleaned));
                    } catch (e) {
                    }
                }
            }
        }

        // --- COLOR INPUT ---
        function colorizeInput(raw) {
            const cleaned = raw.replace(/\s+/g, '');
            const parts = cleaned.split('.');
            if (parts.length >= 2 && parts.length <= 3) {
                let html = `<span class="seg-h">${escapeHtml(parts[0])}</span><span class="seg-dot">.</span><span class="seg-p">${escapeHtml(parts[1])}</span>`;
                if (parts.length === 3) {
                    html += `<span class="seg-dot">.</span><span class="seg-s">${escapeHtml(parts[2])}</span>`;
                }
                return html;
            }
            return escapeHtml(raw);
        }

        // Preserve cursor at end after setting innerHTML
        function setInputHtml(html) {
            $input.innerHTML = html;
            // Move cursor to end
            const range = document.createRange();
            const sel = window.getSelection();
            range.selectNodeContents($input);
            range.collapse(false);
            sel.removeAllRanges();
            sel.addRange(range);
        }

        // --- RENDER ---
        function render() {
            // Message area
            const raw = state.raw.replace(/\s+/g, '');
            if (!raw) {
                $message.innerHTML = `<div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Paste a JWT above to decode it
      </div>`;
                $status.style.display = 'none';
                $output.innerHTML = '';
                return;
            }

            if (state.error && !state.header && !state.payload) {
                $message.innerHTML = `<div class="error-msg">${escapeHtml(state.error)}</div>`;
                $status.style.display = 'none';
                $output.innerHTML = '';
                return;
            }

            // Partial errors
            let partialErrors = '';
            if (state.headerError) partialErrors += `<div class="error-msg">${escapeHtml(state.headerError)}</div>`;
            if (state.payloadError) partialErrors += `<div class="error-msg">${escapeHtml(state.payloadError)}</div>`;
            $message.innerHTML = partialErrors;

            // Status banner
            renderStatusBanner();

            // Output
            let html = '';

            // Header card
            if (state.header) {
                const alg = state.header.alg || 'unknown';
                const typ = state.header.typ || '';
                let pills = '';
                if (alg === 'none') {
                    pills += `<span class="pill danger">alg: none — Unsigned token</span>`;
                } else {
                    pills += `<span class="pill">alg: ${escapeHtml(alg)}</span>`;
                }
                if (typ) pills += `<span class="pill">typ: ${escapeHtml(typ)}</span>`;

                html += `<div class="card" id="headerCard">
        <button class="copy-btn" data-copy="header" title="Copy header JSON">${svgCopy}</button>
        <div class="card-label">Header</div>
        <div class="pills">${pills}</div>
        <div class="json-block">${syntaxHighlight(state.header, 0, false)}</div>
      </div>`;
            }

            // Payload card
            if (state.payload) {
                html += `<div class="card" id="payloadCard">
        <button class="copy-btn" data-copy="payload" title="Copy payload JSON">${svgCopy}</button>
        <div class="card-label">Payload</div>
        <div class="json-block">${syntaxHighlight(state.payload, 0, true)}</div>
      </div>`;
            }

            // Copy all
            if (state.header || state.payload) {
                html += `<button class="copy-all-btn" id="copyAll">${svgCopy} Copy all</button>`;
            }

            // Signature card
            html += `<div class="card subdued" id="sigCard">
      <div class="card-label">Signature</div>`;
            if (state.signature !== null) {
                const algLabel = state.header ? (state.header.alg || 'unknown') : 'unknown';
                html += `<div class="pills"><span class="pill">Algorithm: ${escapeHtml(algLabel)}</span></div>`;
                html += `<div class="sig-raw">${escapeHtml(state.signature || '(empty)')}</div>`;
            } else {
                html += `<div class="sig-raw" style="color:var(--amber)">No signature segment present</div>`;
            }
            html += `<div class="sig-note">Signature verification requires the secret/key and is not performed client-side.</div>`;
            html += `</div>`;

            $output.innerHTML = html;

            // Wire copy buttons
            $output.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const which = btn.dataset.copy;
                    const data = which === 'header' ? state.header : state.payload;
                    copyText(JSON.stringify(data, null, 2), btn);
                });
            });
            const copyAllBtn = document.getElementById('copyAll');
            if (copyAllBtn) {
                copyAllBtn.addEventListener('click', () => {
                    const all = {header: state.header, payload: state.payload, signature: state.signature};
                    copyText(JSON.stringify(all, null, 2), copyAllBtn);
                });
            }

            // Wire tooltips
            $output.querySelectorAll('.info-icon').forEach(el => {
                const tip = el.dataset.tip;
                let tooltipEl = null;
                const show = () => {
                    if (tooltipEl) return;
                    tooltipEl = document.createElement('div');
                    tooltipEl.className = 'tooltip';
                    tooltipEl.textContent = tip;
                    el.appendChild(tooltipEl);
                };
                const hide = () => {
                    if (tooltipEl) {
                        tooltipEl.remove();
                        tooltipEl = null;
                    }
                };
                el.addEventListener('mouseenter', show);
                el.addEventListener('mouseleave', hide);
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    tooltipEl ? hide() : show();
                });
            });
        }

        function renderStatusBanner() {
            if (!state.payload) {
                $status.style.display = 'none';
                return;
            }
            const p = state.payload;
            const now = Math.floor(Date.now() / 1000);

            if (typeof p.exp === 'number') {
                const t = formatTimestamp(p.exp);
                if (!t) {
                    $status.style.display = 'none';
                    return;
                }
                if (p.exp < now) {
                    $status.className = 'status-banner status-expired';
                    $status.textContent = `Expired ${t.relative} (${t.absolute})`;
                } else {
                    // Check nbf
                    if (typeof p.nbf === 'number' && p.nbf > now) {
                        const nt = formatTimestamp(p.nbf);
                        $status.className = 'status-banner status-nbf';
                        $status.textContent = `Not valid until ${nt ? nt.absolute + ' · ' + nt.relative : p.nbf}`;
                    } else {
                        $status.className = 'status-banner status-valid';
                        $status.textContent = `Expires ${t.relative} (${t.absolute})`;
                    }
                }
            } else if (typeof p.nbf === 'number' && p.nbf > now) {
                const nt = formatTimestamp(p.nbf);
                $status.className = 'status-banner status-nbf';
                $status.textContent = `Not valid until ${nt ? nt.absolute + ' · ' + nt.relative : p.nbf}`;
            } else {
                $status.className = 'status-banner status-none';
                $status.textContent = 'No expiration set';
            }
            $status.style.display = 'block';
        }

        // --- INPUT HANDLING ---
        let debounceTimer = null;
        let isColorizing = false;

        function getPlainText() {
            // Get text content, stripping any HTML
            return $input.innerText || $input.textContent || '';
        }

        function handleInput() {
            if (isColorizing) return;
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const raw = getPlainText().trim();
                if (raw === state.raw) return;
                state.raw = raw;

                // Colorize
                isColorizing = true;
                const colored = raw ? colorizeInput(raw) : '';
                if (raw) {
                    // Save selection offset
                    const sel = window.getSelection();
                    let offset = 0;
                    if (sel.rangeCount) {
                        const preRange = document.createRange();
                        preRange.selectNodeContents($input);
                        preRange.setEnd(sel.getRangeAt(0).endContainer, sel.getRangeAt(0).endOffset);
                        offset = preRange.toString().length;
                    }
                    $input.innerHTML = colored;
                    // Restore cursor
                    restoreCursor(offset);
                }
                isColorizing = false;

                parse(raw);
                render();
            }, 150);
        }

        function restoreCursor(offset) {
            const sel = window.getSelection();
            const range = document.createRange();
            let current = 0;
            const walker = document.createTreeWalker($input, NodeFilter.SHOW_TEXT, null, false);
            let node;
            while (node = walker.nextNode()) {
                const len = node.textContent.length;
                if (current + len >= offset) {
                    range.setStart(node, Math.min(offset - current, len));
                    range.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(range);
                    return;
                }
                current += len;
            }
            // Fallback: end
            range.selectNodeContents($input);
            range.collapse(false);
            sel.removeAllRanges();
            sel.addRange(range);
        }

        function setInput(value) {
            state.raw = value.trim();
            $input.innerHTML = state.raw ? colorizeInput(state.raw) : '';
            parse(state.raw);
            render();
            renderHistory();
        }

        // Paste handler: strip formatting
        $input.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text/plain').trim();
            // Clear and set
            state.raw = text;
            $input.innerHTML = text ? colorizeInput(text) : '';
            // Move cursor to end
            const range = document.createRange();
            const sel = window.getSelection();
            range.selectNodeContents($input);
            range.collapse(false);
            sel.removeAllRanges();
            sel.addRange(range);

            parse(text);
            render();
            renderHistory();
        });

        $input.addEventListener('input', handleInput);

        // --- KEYBOARD SHORTCUTS ---
        document.addEventListener('keydown', (e) => {
            const mod = e.ctrlKey || e.metaKey;
            if (mod && e.key === 'k') {
                e.preventDefault();
                $input.focus();
            }
            if (mod && e.shiftKey && e.key.toLowerCase() === 'c') {
                e.preventDefault();
                if (state.header || state.payload) {
                    const all = {header: state.header, payload: state.payload, signature: state.signature};
                    const btn = document.getElementById('copyAll');
                    if (btn) copyText(JSON.stringify(all, null, 2), btn);
                }
            }
        });

        // --- INIT ---
        loadHistory();
        renderHistory();

        // Check URL param
        const params = new URLSearchParams(window.location.search);
        const tokenParam = params.get('token');
        if (tokenParam) {
            setInput(tokenParam);
        } else {
            render();
        }

        $input.focus();

    })();
</script>
<script src="../logo.js"></script>
</body>
</html>
