    <meta name="author" content="Claude Opus 4.6 prompted by Tobias Müller">
    <meta property="og:title" content="Bloomplan — AI Plant Care Plan Generator">
    <meta property="og:description"
          content="Type your plant's name, get a printable PDF care calendar. No app, no account, no subscription.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bloomplan.gptgames.dev">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

          rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #F7F5F0;
            --surface: #FFFFFF;
            --text: #1A1A1A;
            --text-muted: #6B6B6B;
            --accent: #2D6A4F;
            --accent-light: #D8F3DC;
            --accent-hover: #1B4332;
            --warning: #BC4749;
            --warning-bg: #FFF1F1;
            --border: #E0DDD5;
            --font-heading: 'DM Serif Display', serif;
            --font-body: 'DM Sans', sans-serif;
            --c-water: #2196F3;
            --c-mist: #00897B;
            --c-feed: #F9A825;
            --c-turn: #7B1FA2;
            --c-clean: #43A047;
            --c-check: #757575;
            --c-prune: #6D4C41;
            --c-repot: #8D6E63;
        }

        body {
            font-family: var(--font-body);
            font-weight: 400;
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        #input-phase {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .input-wrapper {
            width: 100%;
            max-width: 640px;
        }

        .wordmark {
            font-family: var(--font-heading);
            font-size: 24px;
            color: var(--accent);
            text-align: center;
            margin-bottom: 32px;
            letter-spacing: 0.02em;
            user-select: none;
        }

        #plant-input {
            width: 100%;
            height: 56px;
            padding: 0 16px;
            font-family: var(--font-body);
            font-size: 18px;
            font-weight: 400;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.15s ease;
        }

        #plant-input:focus {
            border-color: var(--accent);
        }

        #plant-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #plant-input.shake {
            animation: shake 0.35s ease;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-6px);
            }
            40% {
                transform: translateX(6px);
            }
            60% {
                transform: translateX(-4px);
            }
            80% {
                transform: translateX(4px);
            }
        }

        .date-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }

        .date-label {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            flex-shrink: 0;
        }

        #start-date {
            flex: 1;
            height: 44px;
            padding: 0 12px;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.15s ease;
            max-width: 200px;
        }

        #start-date:focus {
            border-color: var(--accent);
        }

        #start-date:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #generate-btn {
            width: 100%;
            height: 48px;
            margin-top: 12px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.15s ease, opacity 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #generate-btn:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        #generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .advanced-toggle {
            display: block;
            margin-top: 16px;
            background: none;
            border: none;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 0;
            text-align: center;
            width: 100%;
        }

        .advanced-toggle:hover {
            color: var(--text);
        }

        .advanced-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, margin-top 0.3s ease;
            margin-top: 0;
        }

        .advanced-panel.open {
            max-height: 200px;
            margin-top: 12px;
        }

        .advanced-fields {
            display: flex;
            gap: 12px;
        }

        .advanced-fields input {
            flex: 1;
            height: 44px;
            padding: 0 12px;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.15s ease;
        }

        .advanced-fields input:focus {
            border-color: var(--accent);
        }

        .advanced-fields input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #error-msg {
            display: none;
            margin-top: 12px;
            padding: 12px 16px;
            background: var(--warning-bg);
            color: var(--warning);
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            border-left: 3px solid var(--warning);
        }

        #error-msg.visible {
            display: block;
        }

        .retry-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 16px;
            background: var(--warning);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .retry-btn:hover {
            opacity: 0.85;
        }

        #preview-phase {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 16px 64px;
            opacity: 0;
            transition: opacity 0.3s ease 0.1s;
        }

        #preview-phase.visible {
            display: block;
        }

        #preview-phase.fade-in {
            opacity: 1;
        }

        .preview-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            align-items: center;
        }

        #download-btn {
            flex: 1;
            height: 48px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #download-btn:hover {
            background: var(--accent-hover);
        }

        #reset-btn {
            background: none;
            border: none;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px 12px;
            white-space: nowrap;
        }

        #reset-btn:hover {
            color: var(--text);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .this-week-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .this-week-card .section-title {
            margin-bottom: 12px;
        }

        .week-day {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .week-day:last-child {
            border-bottom: none;
        }

        .week-date {
            font-weight: 500;
            font-size: 14px;
            min-width: 90px;
            flex-shrink: 0;
            color: var(--text);
        }

        .week-tasks {
            font-size: 14px;
            color: var(--text-muted);
        }

        .week-tasks .task-emojis {
            margin-right: 6px;
            font-size: 16px;
            letter-spacing: 2px;
        }

        .no-tasks-msg {
            font-size: 14px;
            color: var(--text-muted);
            padding: 8px 0;
        }

        .plant-header {
            text-align: center;
            padding: 32px 24px;
        }

        .plant-name {
            font-family: var(--font-heading);
            font-size: 32px;
            color: var(--text);
            margin-bottom: 4px;
        }

        .plant-scientific {
            font-style: italic;
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 16px;
        }

        .plant-desc {
            color: var(--text-muted);
            font-size: 15px;
            max-width: 480px;
            margin: 0 auto;
        }

        .seasonal-overview {
            color: var(--accent);
            font-size: 14px;
            font-style: italic;
            margin-top: 12px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        .env-grid {
            display: grid;
            grid-template-columns:1fr 1fr;
            gap: 16px;
        }

        .env-item {
            padding: 12px 0;
        }

        .env-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .env-value {
            font-size: 14px;
            color: var(--text);
            line-height: 1.5;
        }

        .warnings-box {
            background: var(--warning-bg);
            border-left: 3px solid var(--warning);
            border-radius: 0 12px 12px 0;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        .warnings-box .warnings-title {
            font-weight: 500;
            font-size: 14px;
            color: var(--warning);
            margin-bottom: 8px;
        }

        .warnings-box ul {
            list-style: none;
            padding: 0;
        }

        .warnings-box li {
            font-size: 14px;
            color: var(--warning);
            padding: 2px 0;
        }

        .warnings-box li::before {
            content: "⚠ ";
        }

        .tips-list {
            padding: 0;
            list-style: none;
        }

        .tips-list li {
            font-size: 14px;
            color: var(--text);
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }

        .tips-list li:last-child {
            border-bottom: none;
        }

        .tips-list li::before {
            content: "💡 ";
        }

        .section-title {
            font-family: var(--font-heading);
            font-size: 20px;
            color: var(--text);
            margin-bottom: 16px;
        }

        .calendar-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .calendar-table th {
            text-align: left;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 12px;
            border-bottom: 2px solid var(--border);
        }

        .calendar-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        .calendar-table tr:nth-child(even) td {
            background: var(--bg);
        }

        .calendar-table .day-num {
            font-weight: 500;
            white-space: nowrap;
            min-width: 90px;
        }

        .calendar-table .task-emojis {
            font-size: 16px;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .calendar-table .task-labels {
            color: var(--text-muted);
            font-size: 13px;
        }

        .monday-break td {
            border-bottom: 2px solid var(--accent-light) !important;
        }

        .legend-grid {
            display: grid;
            gap: 16px;
        }

        .legend-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .legend-emoji {
            font-size: 20px;
            flex-shrink: 0;
            width: 28px;
            text-align: center;
        }

        .legend-content {
            flex: 1;
        }

        .legend-label {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .legend-instruction {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .legend-seasonal {
            font-size: 12px;
            color: var(--accent);
            margin-top: 4px;
            font-style: italic;
        }

        @media print {
            #input-phase, .preview-actions {
                display: none !important;
            }

            #preview-phase {
                display: block !important;
                opacity: 1 !important;
                padding-top: 0;
            }

            .card, .this-week-card {
                break-inside: avoid;
                border: 1px solid #ccc;
            }

            body {
                background: #fff;
            }
        }

        @media (max-width: 600px) {
            .env-grid {
                grid-template-columns:1fr;
            }

            .advanced-fields {
                flex-direction: column;
            }

            .plant-name {
                font-size: 26px;
            }

            .preview-actions {
                flex-direction: column;
            }

            #reset-btn {
                text-align: center;
            }

            .date-row {
                flex-direction: column;
                align-items: stretch;
            }

            #start-date {
                max-width: none;
            }

            .week-date {
                min-width: 80px;
            }
        }

        @media (min-width: 800px) {
            .env-grid {
                grid-template-columns:1fr 1fr 1fr;
            }
        }
    </style>
</head>

    function addDays(date, n) {
        const d = new Date(date);

    function buildSystemPrompt() {
        return `You are a plant care expert. The user will give you a plant name (possibly in any language, with possible typos or common nicknames). Your job is to return a structured JSON care plan for that plant as an indoor/houseplant/potted plant.

RULES:
1. IDENTIFY the plant. The plant name may be in ANY language, including regional common names, nicknames, dialectal forms, or phonetic approximations. Before returning an error, attempt to: (a) translate the name to English and identify, (b) search for the name as a common name in German, French, Spanish, Portuguese, Italian, Dutch, Japanese, and Chinese, (c) try phonetic/fuzzy matching for possible misspellings. Only return an error if none of these approaches yield a confident match. If you identify the plant through a non-obvious name, mention the common name mapping in the briefDescription (e.g., "Known in German as Glückskastanie").
If you cannot confidently identify the plant after all attempts, return: {"error":true,"message":"<polite message in the user's language explaining the plant was not recognized>"}
2. If the input is an outdoor-only plant, garden vegetable, tree, or non-plant, return: {"error":true,"message":"<polite message in the user's language explaining this tool is for indoor/potted plants only>"}
3. RESPOND IN THE LANGUAGE indicated by the "Preferred language" field. If the plant name itself suggests a different language, still use the preferred language for all text output.
4. Return ONLY valid JSON. No markdown fences, no preamble, no explanation outside the JSON.
5. Include only task categories that are relevant for the specific plant. Not every plant needs misting, pruning, or rotation.
6. The cycle length must be the least common multiple (LCM) of all task frequencies, capped at 56 days. If LCM exceeds 56, use 56 and note in the explanation which tasks extend beyond.
7. The schedule array contains ONLY days that have at least one task. Day numbers are 1-indexed.
8. If the user provides age or size context, adjust recommendations accordingly (younger plants = less fertilizer, smaller pots dry faster, etc.).
9. Be factual and specific. Never hallucinate care data. If unsure about a specific detail, err on the side of the most common/safe recommendation.
10. Keep task instruction fields to 1-2 sentences max. Be concise.
11. Do NOT include repotting in the schedule array. Instead, include repotting guidance as an entry in the tips array (e.g., "Consider repotting every 1-2 years in spring when roots emerge from drainage holes."). You may still include a repot task in the tasks array for the legend/guide if relevant.
12. If the plant has strong seasonal variation (e.g., dormancy in winter), include a top-level "seasonalOverview" string field summarizing the key seasonal shifts in 1-2 sentences.

REQUIRED JSON STRUCTURE (return exactly this shape):
{
  "plant":{
    "commonName":"string — common name in the response language",
    "scientificName":"string — Latin binomial",
    "emoji":"string — single plant-related emoji that best fits",
    "briefDescription":"string — one sentence about the plant's character and origin"
  },
  "seasonalOverview":"string or null — 1-2 sentences about key seasonal care shifts, if applicable",
  "environment":{
    "light":"string — ideal light conditions",
    "temperature":"string — ideal range in °C",
    "humidity":"string — needs and how to provide them",
    "soil":"string — type and composition",
    "potSize":"string — sizing guidance"
  },
  "calendar":{
    "cycleLengthDays":number,
    "explanation":"string — why this cycle length",
    "tasks":[
      {
        "id":"string — short identifier like water, mist, fertilize, rotate, clean, inspect, prune, repot",
        "label":"string — human-readable label in response language",
        "emoji":"string — task emoji: 💧🌫️🧪🔄🍃🔍✂️🪴",
        "frequencyDays":number,
        "instruction":"string — 1-2 sentence specific how-to for THIS plant",
        "seasonalNotes":"string — how this changes in winter vs summer"
      }
    ],
    "schedule":[
      {
        "day":number,
        "taskIds":["string"],
        "notes":"string — optional per-day note"
      }
    ]
  },
  "warnings":["string — e.g. toxicity, allergens"],
  "tips":["string — actionable care tips specific to this plant, including repotting guidance"]
}

TASK CATEGORIES TO CONSIDER (include only relevant ones):
- water (💧): frequency, amount, method
- mist (🌫️): if the plant benefits from misting
- fertilize (🧪): type, dilution, frequency
- rotate (🔄): how often for even growth
- clean (🍃): leaf cleaning frequency and method
- inspect (🔍): pest inspection, what to look for
- prune (✂️): when and how
- repot (🪴): include in tasks array for legend only, NOT in schedule; put guidance in tips`;
    }

    function buildUserMessage(plantName, age, size) {
        let msg = `Plant: ${plantName}`;
        if (age) msg += `\nAge: ${age}`;
        if (size) msg += `\nSize: ${size}`;
        msg += `\nPreferred language: ${state.lang}`;
        return msg;
    }

    async function generatePlan(plantName, age, size) {
        const controller = new AbortController();
        state.abortController = controller;
        const timeout = setTimeout(() => controller.abort(), 30000);
        try {
            const res = await fetch('https://chatgpt.tobiasmue91.workers.dev/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Accept': '*/*'},
                signal: controller.signal,
                body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    max_tokens: 4096,
                    temperature: 0.3,
                    messages: [
                        {role: 'system', content: buildSystemPrompt()},
                        {role: 'user', content: buildUserMessage(plantName, age, size)}
                    ]
                })
            });
            clearTimeout(timeout);
            state.abortController = null;
            if (!res.ok) throw new Error(t('errorNetwork'));
            const json = await res.json();
            const raw = json.choices[0].message.content;
            const cleaned = raw.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
            const parsed = JSON.parse(cleaned);
            if (parsed.error) throw new Error(parsed.message || t('errorGeneric'));
            return parsed;
        } catch (err) {
            clearTimeout(timeout);
            state.abortController = null;
            if (err.name === 'AbortError') throw new Error(t('errorTimeout'));
            if (err instanceof SyntaxError) throw new Error(t('errorGeneric'));
            throw err;
        }
    }

        // Environment

    function esc(str) {

    function getTaskColor(taskId) {
        const id = taskId.toLowerCase();

    }

    function getTaskPdfLabel(taskId) {
        const id = taskId.toLowerCase();
        const key = TASK_PDF_KEYS[id];

    function drawColoredDot(doc, x, y, color) {

    function generatePDF(data) {
        const {jsPDF} = window.jspdf;
        const doc = new jsPDF({unit: 'mm', format: 'a4'});
        const pw = 210;
        const margin = 20;
        const cw = pw - 2 * margin;
        const startDate = parseStartDate();
        const nowStr = formatDateFull(new Date());
        const startStr = formatDateFull(startDate);
        let page = 1;

        const taskMap = {};
        (data.calendar.tasks || []).forEach(task => {
            taskMap[task.id] = task;
        });

        function addHeader() {
            doc.setFontSize(9);
            doc.setTextColor(107, 107, 107);
            doc.setFont('helvetica', 'normal');
            doc.text('Bloomplan', margin, 12);
            doc.text(data.plant.commonName, pw - margin, 12, {align: 'right'});
            doc.setDrawColor(224, 221, 213);
            doc.line(margin, 15, pw - margin, 15);
        }

        function addFooter() {
            doc.setFontSize(8);
            doc.setTextColor(107, 107, 107);
            doc.setFont('helvetica', 'normal');
            const footerY = 290;
            doc.text(`Generated by Bloomplan \u00B7 gptgames.dev/tools/bloomplan.html \u00B7 ${nowStr}`, margin, footerY);
            doc.text(`${page}`, pw - margin, footerY, {align: 'right'});
        }

        addHeader();
        let y = 24;

        // Title — no emoji
        doc.setFontSize(28);
        doc.setTextColor(26, 26, 26);
        doc.setFont('helvetica', 'bold');
        doc.text(data.plant.commonName, margin, y);
        y += 10;

        doc.setFontSize(12);
        doc.setTextColor(107, 107, 107);
        doc.setFont('helvetica', 'italic');
        doc.text(data.plant.scientificName, margin, y);
        y += 6;

        // Start date line
        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(45, 106, 79);
        doc.text(`${t('cycleStarting')} ${startStr}`, margin, y);
        y += 8;

        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(107, 107, 107);
        const descLines = doc.splitTextToSize(data.plant.briefDescription, cw);
        doc.text(descLines, margin, y);
        y += descLines.length * 5 + 4;

        if (data.seasonalOverview) {
            doc.setFont('helvetica', 'italic');
            doc.setTextColor(45, 106, 79);
            const soLines = doc.splitTextToSize(data.seasonalOverview, cw);
            doc.text(soLines, margin, y);
            y += soLines.length * 5 + 4;
        }
        y += 4;

        // Warnings
        if (data.warnings && data.warnings.length > 0) {
            doc.setFillColor(255, 241, 241);
            doc.setDrawColor(188, 71, 73);
            const warnTexts = data.warnings.map(w => `! ${w}`);
            const warnLines = [];
            warnTexts.forEach(wt => {
                warnLines.push(...doc.splitTextToSize(wt, cw - 10));
            });
            const warnH = warnLines.length * 5 + 8;
            doc.rect(margin, y - 4, cw, warnH, 'F');
            doc.setLineWidth(0.5);
            doc.line(margin, y - 4, margin, y - 4 + warnH);
            doc.setFontSize(9);
            doc.setTextColor(188, 71, 73);
            doc.setFont('helvetica', 'normal');
            doc.text(warnLines, margin + 4, y + 2);
            y += warnH + 6;
        }

        // Environment
        doc.setFontSize(14);
        doc.setTextColor(26, 26, 26);
        doc.setFont('helvetica', 'bold');
        doc.text(t('environment'), margin, y);
        y += 4;

        const envRows = [
            [t('light'), data.environment.light || ''],
            [t('temperature'), data.environment.temperature || ''],
            [t('humidity'), data.environment.humidity || ''],
            [t('soil'), data.environment.soil || ''],
            [t('potSize'), data.environment.potSize || '']
        ];
        doc.autoTable({
            startY: y,
            margin: {left: margin, right: margin},
            head: [],
            body: envRows,
            theme: 'plain',
            styles: {fontSize: 9, cellPadding: 3, textColor: [26, 26, 26], font: 'helvetica'},
            columnStyles: {0: {fontStyle: 'bold', cellWidth: 35, textColor: [107, 107, 107]}, 1: {cellWidth: cw - 35}},
            didParseCell: function (hookData) {
                if (hookData.row.index % 2 === 0) hookData.cell.styles.fillColor = [247, 245, 240];
            }
        });
        y = doc.lastAutoTable.finalY + 8;

        // Tips
        if (data.tips && data.tips.length > 0) {
            if (y > 240) {
                addFooter();
                doc.addPage();
                page++;
                addHeader();
                y = 24;
            }
            doc.setFontSize(14);
            doc.setTextColor(26, 26, 26);
            doc.setFont('helvetica', 'bold');
            doc.text(t('tips'), margin, y);
            y += 6;
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(26, 26, 26);
            data.tips.forEach(tip => {
                const lines = doc.splitTextToSize(`\u2022 ${tip}`, cw);
                if (y + lines.length * 4.5 > 275) {
                    addFooter();
                    doc.addPage();
                    page++;
                    addHeader();
                    y = 24;
                }
                doc.text(lines, margin, y);
                y += lines.length * 4.5 + 2;
            });
            y += 4;
        }

        addFooter();

        // Page 2: Calendar
        doc.addPage();
        page++;
        addHeader();
        y = 24;

        doc.setFontSize(14);
        doc.setTextColor(26, 26, 26);
        doc.setFont('helvetica', 'bold');
        doc.text(t('careCalendar'), margin, y);
        y += 4;
        doc.setFontSize(8);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(107, 107, 107);
        doc.text(`${t('cycleLengthNote')}: ${data.calendar.cycleLengthDays} ${t('days')}`, margin, y);
        y += 6;

        const calBody = (data.calendar.schedule || []).map(entry => {
            const entryDate = addDays(startDate, entry.day - 1);
            const dateStr = formatDateShort(entryDate);
            const labels = entry.taskIds.map(id => taskMap[id]?.label || id).join(', ');
            return [dateStr, entry.taskIds, labels, entry.notes || ''];
        });

        doc.autoTable({
            startY: y,
            margin: {left: margin, right: margin},
            head: [['', t('tasks'), t('details'), '']],
            body: calBody.map(row => [row[0], '', row[2], row[3]]),
            theme: 'plain',
            headStyles: {
                fillColor: [45, 106, 79],
                textColor: [255, 255, 255],
                fontSize: 8,
                fontStyle: 'bold',
                cellPadding: 3
            },
            styles: {fontSize: 8, cellPadding: 3, textColor: [26, 26, 26], font: 'helvetica', overflow: 'linebreak'},
            columnStyles: {
                0: {cellWidth: 28, fontStyle: 'bold'},
                1: {cellWidth: 40},
                2: {cellWidth: cw - 40 - 28 - 40},
                3: {cellWidth: 40, textColor: [107, 107, 107]}
            },
            didParseCell: function (hookData) {
                if (hookData.section === 'body' && hookData.row.index % 2 === 0) {
                    hookData.cell.styles.fillColor = [247, 245, 240];
                }
            },
            didDrawCell: function (hookData) {
                if (hookData.section === 'body' && hookData.column.index === 1) {
                    const rowData = calBody[hookData.row.index];
                    if (!rowData) return;
                    const taskIds = rowData[1];
                    let cx = hookData.cell.x + 2;
                    const cy = hookData.cell.y + hookData.cell.height / 2 + 1;
                    taskIds.forEach(id => {
                        const color = getTaskColor(id);
                        const label = getTaskPdfLabel(id);
                        doc.setFillColor(color[0], color[1], color[2]);
                        doc.circle(cx + 1.5, cy - 1, 1.5, 'F');
                        doc.setFontSize(6);
                        doc.setTextColor(color[0], color[1], color[2]);
                        doc.setFont('helvetica', 'bold');
                        doc.text(label, cx + 4.5, cy);
                        const labelWidth = doc.getTextWidth(label);
                        cx += 4.5 + labelWidth + 3;
                    });
                }
            },
            didDrawPage: function () {
                addHeader();
                addFooter();
            }
        });

        y = doc.lastAutoTable.finalY + 10;

        // Task Guide
        if (y > 200) {
            doc.addPage();
            page++;
            addHeader();
            y = 24;
        }

        doc.setFontSize(14);
        doc.setTextColor(26, 26, 26);
        doc.setFont('helvetica', 'bold');
        doc.text(t('taskGuide'), margin, y);
        y += 6;

        (data.calendar.tasks || []).forEach(task => {
            if (y > 260) {
                addFooter();
                doc.addPage();
                page++;
                addHeader();
                y = 24;
            }
            const color = getTaskColor(task.id);
            const pdfLabel = getTaskPdfLabel(task.id);

            // Colored dot + label instead of emoji
            doc.setFillColor(color[0], color[1], color[2]);
            doc.circle(margin + 1.5, y - 1, 1.5, 'F');
            doc.setFontSize(10);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(color[0], color[1], color[2]);
            doc.text(pdfLabel, margin + 5, y);
            const pdfLabelW = doc.getTextWidth(pdfLabel);
            doc.setTextColor(26, 26, 26);
            doc.text(` ${task.label}`, margin + 5 + pdfLabelW, y);
            y += 5;

            doc.setFontSize(8);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(107, 107, 107);
            const instrLines = doc.splitTextToSize(task.instruction, cw - 4);
            doc.text(instrLines, margin + 2, y);
            y += instrLines.length * 4 + 2;

            if (task.seasonalNotes) {
                doc.setFont('helvetica', 'italic');
                doc.setTextColor(45, 106, 79);
                const sLines = doc.splitTextToSize(`${t('seasonalNote')}: ${task.seasonalNotes}`, cw - 4);
                doc.text(sLines, margin + 2, y);
                y += sLines.length * 4 + 2;
            }
            y += 3;
        });

        addFooter();

        const fileName = `bloomplan-${data.plant.commonName.toLowerCase().replace(/[^a-z0-9]+/g, '-')}.pdf`;
        doc.save(fileName);
    }

    $generateBtn.addEventListener('click', handleGenerate);
    $plantInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleGenerate();
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && state.phase === 'loading' && state.abortController) {
            state.abortController.abort();
            state.abortController = null;
            state.phase = 'input';
            setLoading(false);
            hideError();
        }
    });
    $downloadBtn.addEventListener('click', () => {
        if (state.plantData) generatePDF(state.plantData);
    });
    $resetBtn.addEventListener('click', resetUI);
    $advancedToggle.addEventListener('click', () => {
        const open = $advancedPanel.classList.toggle('open');
        $advancedToggle.textContent = (open ? '▾ ' : '▸ ') + t('advancedToggle');
    });

    async function handleGenerate() {
        const name = $plantInput.value.trim();
        if (!name) {
            $plantInput.classList.add('shake');
            setTimeout(() => $plantInput.classList.remove('shake'), 350);
            showError(t('errorEmpty'), false);
            return;
        }
        hideError();
        setLoading(true);
        state.phase = 'loading';
        const age = $ageInput.value.trim();
        const size = $sizeInput.value.trim();
        try {
            const data = await generatePlan(name.slice(0, 200), age, size);
            state.plantData = data;
            state.phase = 'preview';
            setLoading(false);
            showPreview(data);
        } catch (err) {
            state.phase = 'error';
            state.errorMessage = err.message || t('errorGeneric');
            setLoading(false);
            showError(state.errorMessage, true);
        }
    }

    initUI();
    $plantInput.focus();
</script>
<script src="../logo.js"></script>
</body>
</html>
