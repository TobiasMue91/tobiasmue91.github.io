    <meta property="og:title" content="Bloomplan — AI Plant Care Plan Generator">
    <meta property="og:description"

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bloomplan.gptgames.dev">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

          rel="stylesheet">

    <style>
        /* ========== RESET & CUSTOM PROPERTIES ========== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #F7F5F0;
            --surface: #FFFFFF;
            --text: #1A1A1A;
            --text-muted: #6B6B6B;
            --accent: #2D6A4F;
            --accent-light: #D8F3DC;
            --accent-hover: #1B4332;
            --warning: #BC4749;
            --warning-bg: #FFF1F1;
            --border: #E0DDD5;
            --font-heading: 'DM Serif Display', serif;
            --font-body: 'DM Sans', sans-serif;
        }

        body {
            font-family: var(--font-body);
            font-weight: 400;
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== INPUT PHASE ========== */
        #input-phase {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            transition: min-height 0.4s ease, padding 0.4s ease, justify-content 0.3s ease;
        }

        #input-phase.compact {
            min-height: auto;
            justify-content: flex-start;
            padding-top: 48px;
            padding-bottom: 32px;
        }

        .input-wrapper {
            width: 100%;
            max-width: 640px;
        }

        .wordmark {
            font-family: var(--font-heading);
            font-size: 24px;
            color: var(--accent);
            text-align: center;
            margin-bottom: 32px;
            letter-spacing: 0.02em;
            user-select: none;
        }

        .wordmark span {
            display: inline-block;
            font-size: 16px;
            color: var(--text-muted);
            font-family: var(--font-body);
            font-weight: 400;
            margin-left: 8px;
            vertical-align: baseline;
            position: relative;
            top: -1px;
        }

        #plant-input {
            width: 100%;
            height: 56px;
            padding: 0 16px;
            font-family: var(--font-body);
            font-size: 18px;
            font-weight: 400;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.15s ease;
        }

        #plant-input:focus {
            border-color: var(--accent);
        }

        #plant-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #plant-input.shake {
            animation: shake 0.35s ease;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-6px);
            }
            40% {
                transform: translateX(6px);
            }
            60% {
                transform: translateX(-4px);
            }
            80% {
                transform: translateX(4px);
            }
        }

        #generate-btn {
            width: 100%;
            height: 48px;
            margin-top: 12px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.15s ease, opacity 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #generate-btn:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        #generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ========== ADVANCED OPTIONS ========== */
        .advanced-toggle {
            display: block;
            margin-top: 16px;
            background: none;
            border: none;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 0;
            text-align: center;
            width: 100%;
        }

        .advanced-toggle:hover {
            color: var(--text);
        }

        .advanced-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, margin-top 0.3s ease;
            margin-top: 0;
        }

        .advanced-panel.open {
            max-height: 200px;
            margin-top: 12px;
        }

        .advanced-fields {
            display: flex;
            gap: 12px;
        }

        .advanced-fields input {
            flex: 1;
            height: 44px;
            padding: 0 12px;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.15s ease;
        }

        .advanced-fields input:focus {
            border-color: var(--accent);
        }

        .advanced-fields input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ========== ERROR MESSAGE ========== */
        #error-msg {
            display: none;
            margin-top: 12px;
            padding: 12px 16px;
            background: var(--warning-bg);
            color: var(--warning);
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            border-left: 3px solid var(--warning);
        }

        #error-msg.visible {
            display: block;
        }

        /* ========== PREVIEW PHASE ========== */
        #preview-phase {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 16px 64px;
            opacity: 0;
            transition: opacity 0.3s ease 0.1s;
        }

        #preview-phase.visible {
            display: block;
        }

        #preview-phase.fade-in {
            opacity: 1;
        }

        .preview-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            align-items: center;
        }

        #download-btn {
            flex: 1;
            height: 48px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #download-btn:hover {
            background: var(--accent-hover);
        }

        #reset-btn {
            background: none;
            border: none;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px 12px;
            white-space: nowrap;
        }

        #reset-btn:hover {
            color: var(--text);
        }

        /* ========== PREVIEW CARDS ========== */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .plant-header {
            text-align: center;
            padding: 32px 24px;
        }

        .plant-emoji {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }

        .plant-name {
            font-family: var(--font-heading);
            font-size: 32px;
            color: var(--text);
            margin-bottom: 4px;
        }

        .plant-scientific {
            font-style: italic;
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 16px;
        }

        .plant-desc {
            color: var(--text-muted);
            font-size: 15px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* ========== ENVIRONMENT GRID ========== */
        .env-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .env-item {
            padding: 12px 0;
        }

        .env-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .env-value {
            font-size: 14px;
            color: var(--text);
            line-height: 1.5;
        }

        /* ========== WARNINGS & TIPS ========== */
        .warnings-box {
            background: var(--warning-bg);
            border-left: 3px solid var(--warning);
            border-radius: 0 12px 12px 0;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        .warnings-box .warnings-title {
            font-weight: 500;
            font-size: 14px;
            color: var(--warning);
            margin-bottom: 8px;
        }

        .warnings-box ul {
            list-style: none;
            padding: 0;
        }

        .warnings-box li {
            font-size: 14px;
            color: var(--warning);
            padding: 2px 0;
        }

        .warnings-box li::before {
            content: "⚠ ";
        }

        .tips-list {
            padding: 0;
            list-style: none;
        }

        .tips-list li {
            font-size: 14px;
            color: var(--text);
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }

        .tips-list li:last-child {
            border-bottom: none;
        }

        .tips-list li::before {
            content: "💡 ";
        }

        .section-title {
            font-family: var(--font-heading);
            font-size: 20px;
            color: var(--text);
            margin-bottom: 16px;
        }

        /* ========== CALENDAR TABLE ========== */
        .calendar-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .calendar-table th {
            text-align: left;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 12px;
            border-bottom: 2px solid var(--border);
        }

        .calendar-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        .calendar-table tr:nth-child(even) td {
            background: var(--bg);
        }

        .calendar-table .day-num {
            font-weight: 500;
            white-space: nowrap;
            min-width: 56px;
        }

        .calendar-table .task-emojis {
            font-size: 16px;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .calendar-table .task-labels {
            color: var(--text-muted);
            font-size: 13px;
        }

        .week-separator td {
            border-bottom: 2px solid var(--accent-light) !important;
        }

        /* ========== TASK LEGEND ========== */
        .legend-grid {
            display: grid;
            gap: 16px;
        }

        .legend-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .legend-emoji {
            font-size: 20px;
            flex-shrink: 0;
            width: 28px;
            text-align: center;
        }

        .legend-content {
            flex: 1;
        }

        .legend-label {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .legend-instruction {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .legend-seasonal {
            font-size: 12px;
            color: var(--accent);
            margin-top: 4px;
            font-style: italic;
        }

        /* ========== PRINT ========== */
        @media print {
            #input-phase, .preview-actions {
                display: none !important;
            }

            #preview-phase {
                display: block !important;
                opacity: 1 !important;
                padding-top: 0;
            }

            .card {
                break-inside: avoid;
                border: 1px solid #ccc;
            }

            body {
                background: #fff;
            }
        }

        /* ========== MOBILE ========== */
        @media (max-width: 600px) {
            .env-grid {
                grid-template-columns: 1fr;
            }

            .advanced-fields {
                flex-direction: column;
            }

            .plant-name {
                font-size: 26px;
            }

            .preview-actions {
                flex-direction: column;
            }

            #reset-btn {
                text-align: center;
            }

            #input-phase.compact {
                padding-top: 32px;
            }
        }

        @media (min-width: 800px) {
            .env-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }
    </style>
</head>
<body>

<!-- ========== INPUT PHASE ========== -->

</div>

       STATE & LANGUAGE

    const state = {
        phase: 'input',
        plantData: null,

    function detectLanguage() {
        const nav = (navigator.language || 'en').toLowerCase().slice(0, 2);
        return i18n[nav] ? nav : 'en';
    }

    function t(key) {
        return (i18n[state.lang] || i18n.en)[key] || i18n.en[key] || key;

    /* =================================================================

    const $inputPhase = document.getElementById('input-phase');

    /* =================================================================
       AI SYSTEM PROMPT
       ================================================================= */
    function buildSystemPrompt() {
        return `You are a plant care expert. The user will give you a plant name (possibly in any language, with possible typos or common nicknames). Your job is to return a structured JSON care plan for that plant as an indoor/houseplant/potted plant.

RULES:
1. IDENTIFY the plant. Handle common names, scientific names, misspellings, abbreviations, and multiple languages. If you cannot confidently identify the plant, return: {"error":true,"message":"<polite message in the user's language explaining the plant was not recognized>"}
2. If the input is an outdoor-only plant, garden vegetable, tree, or non-plant, return: {"error":true,"message":"<polite message in the user's language explaining this tool is for indoor/potted plants only>"}
3. RESPOND IN THE LANGUAGE indicated by the "Preferred language" field. If the plant name itself suggests a different language, still use the preferred language for all text output.
4. Return ONLY valid JSON. No markdown fences, no preamble, no explanation outside the JSON.
5. Include only task categories that are relevant for the specific plant. Not every plant needs misting, pruning, or rotation.
6. The cycle length must be the least common multiple (LCM) of all task frequencies, capped at 56 days. If LCM exceeds 56, use 56 and note in the explanation which tasks extend beyond.
7. The schedule array contains ONLY days that have at least one task. Day numbers are 1-indexed.
8. If the user provides age or size context, adjust recommendations accordingly (younger plants = less fertilizer, smaller pots dry faster, etc.).
9. Be factual and specific. Never hallucinate care data. If unsure about a specific detail, err on the side of the most common/safe recommendation.

REQUIRED JSON STRUCTURE (return exactly this shape):
{
  "plant": {
    "commonName": "string — common name in the response language",
    "scientificName": "string — Latin binomial",
    "emoji": "string — single plant-related emoji that best fits",
    "briefDescription": "string — one sentence about the plant's character and origin"
  },
  "environment": {
    "light": "string — ideal light conditions",
    "temperature": "string — ideal range in °C",
    "humidity": "string — needs and how to provide them",
    "soil": "string — type and composition",
    "potSize": "string — sizing guidance"
  },
  "calendar": {
    "cycleLengthDays": number,
    "explanation": "string — why this cycle length",
    "tasks": [
      {
        "id": "string — short identifier like water, mist, fertilize, rotate, clean, inspect, prune, repot",
        "label": "string — human-readable label in response language",
        "emoji": "string — task emoji: 💧🌫️🧪🔄🍃🔍✂️🪴",
        "frequencyDays": number,
        "instruction": "string — specific how-to for THIS plant",
        "seasonalNotes": "string — how this changes in winter vs summer"
      }
    ],
    "schedule": [
      { "day": number, "taskIds": ["string"], "notes": "string — optional per-day note" }
    ]
  },
  "warnings": ["string — e.g. toxicity, allergens"],
  "tips": ["string — actionable care tips specific to this plant"]
}

TASK CATEGORIES TO CONSIDER (include only relevant ones):
- water (💧): frequency, amount, method, what "dry" means for this plant
- mist (🌫️): if the plant benefits from misting
- fertilize (🧪): type, dilution, frequency during growing season, when to stop
- rotate (🔄): how often for even growth
- clean (🍃): leaf cleaning frequency and method
- inspect (🔍): pest inspection, what to look for
- prune (✂️): when and how
- repot (🪴): signs it's time, best season, pot size increment (use high frequencyDays like 365 for repotting — this represents a reminder check, not actual repotting frequency; cap schedule entries to cycle length)

For repotting: set frequencyDays to a high value (180-365) and include it in the task list for the legend, but only include ONE schedule entry for it within the cycle (e.g., on day 1 as a reminder to check).`;
    }

    function buildUserMessage(plantName, age, size) {
        let msg = `Plant: ${plantName}`;
        if (age) msg += `\nAge: ${age}`;
        if (size) msg += `\nSize: ${size}`;
        msg += `\nPreferred language: ${state.lang}`;
        return msg;
    }

    /* =================================================================
       API CALL
       ================================================================= */
    async function generatePlan(plantName, age, size) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 30000);

        try {
            const res = await fetch('https://chatgpt.tobiasmue91.workers.dev/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Accept': '*/*'},
                signal: controller.signal,
                body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    max_tokens: 4096,
                    temperature: 0.3,
                    messages: [
                        {role: 'system', content: buildSystemPrompt()},
                        {role: 'user', content: buildUserMessage(plantName, age, size)}
                    ]
                })
            });

            clearTimeout(timeout);

            if (!res.ok) throw new Error('API returned ' + res.status);

            const data = await res.json();
            const content = data.choices?.[0]?.message?.content;
            if (!content) throw new Error('Empty response');

            const cleaned = content.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
            const parsed = JSON.parse(cleaned);

            if (parsed.error) {
                throw new Error(parsed.message || t('errorGeneric'));
            }

            return parsed;
        } catch (err) {
            clearTimeout(timeout);
            if (err.name === 'AbortError') throw new Error(t('errorTimeout'));
            if (err instanceof SyntaxError) throw new Error(t('errorGeneric'));
            throw err;
        }
    }

    /* =================================================================
       UI RENDERING
       ================================================================= */
    function initUI() {
        state.lang = detectLanguage();
        $plantInput.placeholder = t('placeholder');
        $generateBtn.textContent = t('generate');
        $advancedToggle.textContent = '▸ ' + t('advancedToggle');
        $ageInput.placeholder = t('agePlaceholder');
        $sizeInput.placeholder = t('sizePlaceholder');
        $downloadBtn.innerHTML = t('download');
        $resetBtn.textContent = t('reset');
    }

    function showError(msg) {
        $errorMsg.textContent = msg;
        $errorMsg.classList.add('visible');
    }

    function hideError() {
        $errorMsg.classList.remove('visible');
    }

    function setLoading(loading) {
        $plantInput.disabled = loading;
        $generateBtn.disabled = loading;
        $ageInput.disabled = loading;
        $sizeInput.disabled = loading;

        if (loading) {
            $generateBtn.innerHTML = `<span class="spinner"></span> ${t('generating')}`;
        } else {
            $generateBtn.textContent = t('generate');
        }
    }

    function showPreview(data) {
        $inputPhase.classList.add('compact');

        const taskMap = {};
        (data.calendar.tasks || []).forEach(task => {
            taskMap[task.id] = task;
        });

        const envKeys = ['light', 'temperature', 'humidity', 'soil', 'potSize'];

        let html = `
    <div class="card plant-header">
      <span class="plant-emoji">${esc(data.plant.emoji)}</span>
      <h1 class="plant-name">${esc(data.plant.commonName)}</h1>
      <div class="plant-scientific">${esc(data.plant.scientificName)}</div>
      <p class="plant-desc">${esc(data.plant.briefDescription)}</p>
    </div>`;

        if (data.warnings && data.warnings.length > 0) {
            html += `<div class="warnings-box"><div class="warnings-title">${t('warnings')}</div><ul>`;
            data.warnings.forEach(w => {
                html += `<li>${esc(w)}</li>`;
            });
            html += `</ul></div>`;
        }

        html += `<div class="card"><h2 class="section-title">${t('environment')}</h2><div class="env-grid">`;
        envKeys.forEach(key => {
            if (data.environment[key]) {
                html += `<div class="env-item"><div class="env-label">${t(key)}</div><div class="env-value">${esc(data.environment[key])}</div></div>`;
            }
        });
        html += `</div></div>`;

        html += `<div class="card"><h2 class="section-title">${t('careCalendar')}</h2>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
      ${t('cycleLengthNote')}: ${data.calendar.cycleLengthDays} ${t('days')} — ${esc(data.calendar.explanation)}
    </p>
    <div class="calendar-scroll"><table class="calendar-table">
    <thead><tr><th>${t('day')}</th><th>${t('tasks')}</th><th>${t('details')}</th></tr></thead><tbody>`;

        (data.calendar.schedule || []).forEach((entry, i) => {
            const emojis = entry.taskIds.map(id => taskMap[id]?.emoji || '').join(' ');
            const labels = entry.taskIds.map(id => taskMap[id]?.label || id).join(', ');
            const isWeekEnd = entry.day % 7 === 0;
            const nextEntry = data.calendar.schedule[i + 1];
            const isWeekBoundary = nextEntry && Math.floor((entry.day - 1) / 7) < Math.floor((nextEntry.day - 1) / 7);
            const rowClass = isWeekBoundary ? ' class="week-separator"' : '';

            html += `<tr${rowClass}>
      <td class="day-num">${t('day')} ${entry.day}</td>
      <td class="task-emojis">${emojis}</td>
      <td><span class="task-labels">${esc(labels)}</span>${entry.notes ? '<br><small style="color:var(--text-muted)">' + esc(entry.notes) + '</small>' : ''}</td>
    </tr>`;
        });

        html += `</tbody></table></div></div>`;

        html += `<div class="card"><h2 class="section-title">${t('taskGuide')}</h2><div class="legend-grid">`;
        (data.calendar.tasks || []).forEach(task => {
            html += `<div class="legend-item">
      <span class="legend-emoji">${task.emoji}</span>
      <div class="legend-content">
        <div class="legend-label">${esc(task.label)}</div>
        <div class="legend-instruction">${esc(task.instruction)}</div>
        ${task.seasonalNotes ? `<div class="legend-seasonal">${t('seasonalNote')}: ${esc(task.seasonalNotes)}</div>` : ''}
      </div>
    </div>`;
        });
        html += `</div></div>`;

        if (data.tips && data.tips.length > 0) {
            html += `<div class="card"><h2 class="section-title">${t('tips')}</h2><ul class="tips-list">`;
            data.tips.forEach(tip => {
                html += `<li>${esc(tip)}</li>`;
            });
            html += `</ul></div>`;
        }

        $previewContent.innerHTML = html;
        $previewPhase.classList.add('visible');
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                $previewPhase.classList.add('fade-in');
                $downloadBtn.focus();
            });
        });
    }

    function resetUI() {
        state.phase = 'input';
        state.plantData = null;
        state.errorMessage = '';
        $inputPhase.classList.remove('compact');
        $previewPhase.classList.remove('visible', 'fade-in');
        $previewContent.innerHTML = '';
        $plantInput.value = '';
        $ageInput.value = '';
        $sizeInput.value = '';
        hideError();
        setLoading(false);
        $plantInput.focus();
    }

    function esc(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    /* =================================================================
       PDF GENERATION
       ================================================================= */
    function generatePDF(data) {
        const {jsPDF} = window.jspdf;
        const doc = new jsPDF({unit: 'mm', format: 'a4'});
        const pw = 210;
        const margin = 20;
        const cw = pw - 2 * margin;
        const now = new Date().toLocaleDateString(state.lang, {year: 'numeric', month: 'long', day: 'numeric'});
        let page = 1;

        const taskMap = {};
        (data.calendar.tasks || []).forEach(task => {
            taskMap[task.id] = task;
        });

        function addHeader() {
            doc.setFontSize(9);
            doc.setTextColor(107, 107, 107);
            doc.setFont('helvetica', 'normal');
            doc.text('Bloomplan', margin, 12);
            doc.text(data.plant.commonName, pw - margin, 12, {align: 'right'});
            doc.setDrawColor(224, 221, 213);
            doc.line(margin, 15, pw - margin, 15);
        }

        function addFooter() {
            doc.setFontSize(8);
            doc.setTextColor(107, 107, 107);
            doc.setFont('helvetica', 'normal');
            const footerY = 290;
            doc.text(`Generated by Bloomplan · bloomplan.gptgames.dev · ${now}`, margin, footerY);
            doc.text(`${page}`, pw - margin, footerY, {align: 'right'});
        }

        /* ---- PAGE 1: OVERVIEW ---- */
        addHeader();
        let y = 24;

        doc.setFontSize(28);
        doc.setTextColor(26, 26, 26);
        doc.setFont('helvetica', 'bold');
        doc.text(`${data.plant.emoji}  ${data.plant.commonName}`, margin, y);
        y += 10;

        doc.setFontSize(12);
        doc.setTextColor(107, 107, 107);
        doc.setFont('helvetica', 'italic');
        doc.text(data.plant.scientificName, margin, y);
        y += 8;

        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(107, 107, 107);
        const descLines = doc.splitTextToSize(data.plant.briefDescription, cw);
        doc.text(descLines, margin, y);
        y += descLines.length * 5 + 8;

        /* Warnings */
        if (data.warnings && data.warnings.length > 0) {
            doc.setFillColor(255, 241, 241);
            doc.setDrawColor(188, 71, 73);
            const warnTexts = data.warnings.map(w => `!  ${w}`);
            const warnLines = [];
            warnTexts.forEach(wt => {
                warnLines.push(...doc.splitTextToSize(wt, cw - 10));
            });
            const warnH = warnLines.length * 5 + 8;
            doc.rect(margin, y - 4, cw, warnH, 'F');
            doc.setLineWidth(0.5);
            doc.line(margin, y - 4, margin, y - 4 + warnH);
            doc.setFontSize(9);
            doc.setTextColor(188, 71, 73);
            doc.text(warnLines, margin + 4, y + 2);
            y += warnH + 6;
        }

        /* Environment Table */
        doc.setFontSize(14);
        doc.setTextColor(26, 26, 26);
        doc.setFont('helvetica', 'bold');
        doc.text(t('environment'), margin, y);
        y += 4;

        const envRows = [
            [t('light'), data.environment.light || ''],
            [t('temperature'), data.environment.temperature || ''],
            [t('humidity'), data.environment.humidity || ''],
            [t('soil'), data.environment.soil || ''],
            [t('potSize'), data.environment.potSize || '']
        ];

        doc.autoTable({
            startY: y,
            margin: {left: margin, right: margin},
            head: [],
            body: envRows,
            theme: 'plain',
            styles: {fontSize: 9, cellPadding: 3, textColor: [26, 26, 26], font: 'helvetica'},
            columnStyles: {
                0: {fontStyle: 'bold', cellWidth: 35, textColor: [107, 107, 107]},
                1: {cellWidth: cw - 35}
            },
            didParseCell: function (hookData) {
                if (hookData.row.index % 2 === 0) {
                    hookData.cell.styles.fillColor = [247, 245, 240];
                }
            }
        });
        y = doc.lastAutoTable.finalY + 8;

        /* Tips */
        if (data.tips && data.tips.length > 0) {
            if (y > 240) {
                doc.addPage();
                page++;
                addHeader();
                y = 24;
            }
            doc.setFontSize(14);
            doc.setTextColor(26, 26, 26);
            doc.setFont('helvetica', 'bold');
            doc.text(t('tips'), margin, y);
            y += 6;
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(26, 26, 26);
            data.tips.forEach(tip => {
                const lines = doc.splitTextToSize(`•  ${tip}`, cw);
                if (y + lines.length * 4.5 > 275) {
                    addFooter();
                    doc.addPage();
                    page++;
                    addHeader();
                    y = 24;
                }
                doc.text(lines, margin, y);
                y += lines.length * 4.5 + 2;
            });
            y += 4;
        }

        addFooter();

        /* ---- PAGE 2+: CARE CALENDAR ---- */
        doc.addPage();
        page++;
        addHeader();
        y = 24;

        doc.setFontSize(14);
        doc.setTextColor(26, 26, 26);
        doc.setFont('helvetica', 'bold');
        doc.text(t('careCalendar'), margin, y);
        y += 4;

        doc.setFontSize(8);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(107, 107, 107);
        const cycleNote = `${t('cycleLengthNote')}: ${data.calendar.cycleLengthDays} ${t('days')}`;
        doc.text(cycleNote, margin, y);
        y += 6;

        const calBody = (data.calendar.schedule || []).map(entry => {
            const emojis = entry.taskIds.map(id => taskMap[id]?.emoji || '').join(' ');
            const labels = entry.taskIds.map(id => taskMap[id]?.label || id).join(', ');
            return [`${t('day')} ${entry.day}`, emojis, labels, entry.notes || ''];
        });

        doc.autoTable({
            startY: y,
            margin: {left: margin, right: margin},
            head: [[t('day'), '', t('tasks'), t('details')]],
            body: calBody,
            theme: 'plain',
            headStyles: {
                fillColor: [45, 106, 79],
                textColor: [255, 255, 255],
                fontSize: 8,
                fontStyle: 'bold',
                cellPadding: 3
            },
            styles: {fontSize: 8, cellPadding: 3, textColor: [26, 26, 26], font: 'helvetica', overflow: 'linebreak'},
            columnStyles: {
                0: {cellWidth: 22, fontStyle: 'bold'},
                1: {cellWidth: 18},
                2: {cellWidth: 50},
                3: {cellWidth: cw - 90, textColor: [107, 107, 107]}
            },
            didParseCell: function (hookData) {
                if (hookData.section === 'body' && hookData.row.index % 2 === 0) {
                    hookData.cell.styles.fillColor = [247, 245, 240];
                }
            },
            didDrawPage: function () {
                addHeader();
                addFooter();
            }
        });

        y = doc.lastAutoTable.finalY + 10;

        /* Task Legend */
        if (y > 200) {
            doc.addPage();
            page++;
            addHeader();
            y = 24;
        }

        doc.setFontSize(14);
        doc.setTextColor(26, 26, 26);
        doc.setFont('helvetica', 'bold');
        doc.text(t('taskGuide'), margin, y);
        y += 6;

        (data.calendar.tasks || []).forEach(task => {
            if (y > 260) {
                addFooter();
                doc.addPage();
                page++;
                addHeader();
                y = 24;
            }

            doc.setFontSize(10);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(26, 26, 26);
            doc.text(`${task.emoji}  ${task.label}`, margin, y);
            y += 5;

            doc.setFontSize(8);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(107, 107, 107);
            const instrLines = doc.splitTextToSize(task.instruction, cw - 4);
            doc.text(instrLines, margin + 2, y);
            y += instrLines.length * 4 + 2;

            if (task.seasonalNotes) {
                doc.setFont('helvetica', 'italic');
                doc.setTextColor(45, 106, 79);
                const sLines = doc.splitTextToSize(`${t('seasonalNote')}: ${task.seasonalNotes}`, cw - 4);
                doc.text(sLines, margin + 2, y);
                y += sLines.length * 4 + 2;
            }
            y += 3;
        });

        addFooter();

        const fileName = `bloomplan-${data.plant.commonName.toLowerCase().replace(/[^a-z0-9]+/g, '-')}.pdf`;
        doc.save(fileName);
    }

    /* =================================================================
       EVENT HANDLERS
       ================================================================= */
    $generateBtn.addEventListener('click', handleGenerate);
    $plantInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleGenerate();
    });
    $downloadBtn.addEventListener('click', () => {
        if (state.plantData) generatePDF(state.plantData);
    });
    $resetBtn.addEventListener('click', resetUI);

    $advancedToggle.addEventListener('click', () => {
        const open = $advancedPanel.classList.toggle('open');
        $advancedToggle.textContent = (open ? '▾ ' : '▸ ') + t('advancedToggle');
    });

    async function handleGenerate() {
        const name = $plantInput.value.trim();
        if (!name) {
            $plantInput.classList.add('shake');
            setTimeout(() => $plantInput.classList.remove('shake'), 350);
            showError(t('errorEmpty'));
            return;
        }

        hideError();
        setLoading(true);
        state.phase = 'loading';

        const age = $ageInput.value.trim();
        const size = $sizeInput.value.trim();

        try {
            const data = await generatePlan(name.slice(0, 200), age, size);
            state.plantData = data;
            state.phase = 'preview';
            setLoading(false);
            showPreview(data);
        } catch (err) {
            state.phase = 'error';
            state.errorMessage = err.message || t('errorGeneric');
            setLoading(false);
            showError(state.errorMessage);
        }
    }

    /* =================================================================
       INIT
       ================================================================= */
    initUI();
    $plantInput.focus();
</script>
<script src="../logo.js"></script>
</body>
