<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Word & Character Counter | Writing Tool</title>
    <meta name="description"
          content="A text counter built for people writing toward specific goals. Platform limits, draft comparison, and selection-aware stats.">
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap"
          rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --accent: #4361ee;
            --accent-warn: #e6a117;
            --accent-err: #d93025;
            --bg: #ffffff;
            --bg2: #f5f5f7;
            --tx: #1d1d1f;
            --tx2: #6e6e73;
            --tx3: #aeaeb2;
            --bd: #e5e5e7;
            --bd2: #d2d2d7;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Inter', system-ui, sans-serif;
            --rad: 8px;
        }

        [data-theme="dark"] {
            --bg: #1a1a2e;
            --bg2: #24243e;
            --tx: #e8e8ed;
            --tx2: #a1a1aa;
            --tx3: #636370;
            --bd: #2e2e45;
            --bd2: #3a3a55;
            --accent: #6c7cff;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--tx);
            line-height: 1.6;
            font-size: 14px;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 16px;
            padding: 0 4px;
        }

        .header h1 {
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 500;
            color: var(--tx);
        }

        .header button {
            background: none;
            border: 0.5px solid var(--bd2);
            border-radius: var(--rad);
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            font-family: var(--sans);
            color: var(--tx2);
        }

        .header button:hover {
            background: var(--bg2);
            color: var(--tx);
        }

        .wrap {
            display: flex;
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 480px;
        }

        .col-l {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .col-r {
            width: 340px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        textarea {
            width: 100%;
            height: 380px;
            resize: vertical;
            border: 0.5px solid var(--bd);
            border-radius: var(--rad);
            padding: 16px;
            font-family: var(--mono);
            font-size: 14px;
            line-height: 1.7;
            background: var(--bg);
            color: var(--tx);
            outline: none;
            transition: border-color 0.15s;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: var(--tx3);
            transition: opacity 0.2s;
        }

        textarea:focus::placeholder {
            opacity: 0.4;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .toolbar button {
            font-family: var(--sans);
            font-size: 12px;
            padding: 5px 10px;
            border: 0.5px solid var(--bd2);
            border-radius: var(--rad);
            background: var(--bg);
            color: var(--tx2);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .toolbar button:hover {
            background: var(--bg2);
            color: var(--tx);
        }

        .toolbar button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .toolbar .sep {
            width: 0.5px;
            height: 20px;
            background: var(--bd);
            margin: 0 2px;
        }

        .fr-bar {
            display: none;
            gap: 6px;
            align-items: center;
            padding: 8px 0;
        }

        .fr-bar.show {
            display: flex;
        }

        .fr-bar input[type=text] {
            flex: 1;
            font-family: var(--mono);
            font-size: 13px;
            padding: 6px 10px;
            border: 0.5px solid var(--bd);
            border-radius: var(--rad);
            background: var(--bg);
            color: var(--tx);
            outline: none;
        }

        .fr-bar input:focus {
            border-color: var(--accent);
        }

        .fr-bar button {
            font-family: var(--sans);
            font-size: 12px;
            padding: 5px 10px;
            border: 0.5px solid var(--bd2);
            border-radius: var(--rad);
            background: var(--bg);
            color: var(--tx2);
            cursor: pointer;
        }

        .fr-bar button:hover {
            background: var(--bg2);
        }

        .fr-bar .match-count {
            font-size: 12px;
            color: var(--tx3);
            min-width: 60px;
            text-align: right;
        }

        .section-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--tx3);
            margin-bottom: 4px;
        }

        .target-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .target-row select {
            flex: 1;
            font-family: var(--sans);
            font-size: 13px;
            padding: 6px 10px;
            border: 0.5px solid var(--bd);
            border-radius: var(--rad);
            background: var(--bg);
            color: var(--tx);
            outline: none;
            cursor: pointer;
        }

        .target-row select:focus {
            border-color: var(--accent);
        }

        .variant-toggle {
            display: flex;
            gap: 0;
            border: 0.5px solid var(--bd);
            border-radius: var(--rad);
            overflow: hidden;
        }

        .variant-toggle button {
            border: none;
            border-right: 0.5px solid var(--bd);
            padding: 4px 10px;
            font-size: 11px;
            font-family: var(--sans);
            background: var(--bg);
            color: var(--tx2);
            cursor: pointer;
        }

        .variant-toggle button:last-child {
            border-right: none;
        }

        .variant-toggle button.active {
            background: var(--accent);
            color: #fff;
        }

        .ring-box {
            display: none;
            align-items: center;
            gap: 16px;
            padding: 8px 0;
        }

        .ring-box.show {
            display: flex;
        }

        .ring-svg {
            width: 100px;
            height: 100px;
            flex-shrink: 0;
        }

        .ring-info {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--tx2);
            line-height: 1.8;
        }

        .ring-info .big {
            font-size: 20px;
            font-weight: 500;
            color: var(--tx);
            display: block;
        }

        .ring-info .over {
            color: var(--accent-err);
            font-weight: 500;
        }

        .preview-box {
            display: none;
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.6;
            padding: 8px 12px;
            border: 0.5px solid var(--bd);
            border-radius: var(--rad);
            background: var(--bg2);
            word-break: break-all;
        }

        .preview-box.show {
            display: block;
        }

        .preview-box .cut {
            color: var(--accent-err);
            text-decoration: line-through;
            opacity: 0.6;
        }

        .stats-grid {
            display: grid;
            grid-template-columns:1fr 1fr;
            gap: 8px;
        }

        .stat {
            padding: 10px 12px;
            background: var(--bg2);
            border-radius: var(--rad);
        }

        .stat .label {
            font-size: 11px;
            color: var(--tx3);
            margin-bottom: 2px;
        }

        .stat .val {
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 500;
            color: var(--tx);
            transition: transform 0.15s;
        }

        .stat .val.bump {
            transform: scale(1.05);
        }

        .sel-bar {
            display: none;
            padding: 8px 12px;
            background: var(--bg2);
            border-radius: var(--rad);
            font-family: var(--mono);
            font-size: 12px;
            color: var(--tx2);
            border-left: 3px solid var(--accent);
            margin-bottom: 4px;
        }

        .sel-bar.show {
            display: block;
        }

        .cmp-box {
            display: none;
            padding: 12px;
            border: 0.5px solid var(--bd);
            border-radius: var(--rad);
        }

        .cmp-box.show {
            display: block;
        }

        .cmp-summary {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--tx2);
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .cmp-summary .pos {
            color: #1a8a4a;
        }

        .cmp-summary .neg {
            color: var(--accent-err);
        }

        .cmp-diff {
            max-height: 200px;
            overflow-y: auto;
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.7;
            padding: 8px;
            background: var(--bg2);
            border-radius: var(--rad);
        }

        .cmp-diff .add {
            background: rgba(26, 138, 74, 0.15);
            border-radius: 2px;
            padding: 0 2px;
        }

        .cmp-diff .del {
            background: rgba(217, 48, 37, 0.12);
            text-decoration: line-through;
            opacity: 0.6;
            border-radius: 2px;
            padding: 0 2px;
        }

        .cmp-reset {
            margin-top: 8px;
            font-size: 12px;
            color: var(--tx3);
            cursor: pointer;
            border: none;
            background: none;
            font-family: var(--sans);
            text-decoration: underline;
        }

        .cmp-reset:hover {
            color: var(--tx);
        }

        .custom-limit {
            display: none;
            gap: 6px;
            align-items: center;
            margin-top: 4px;
        }

        .custom-limit.show {
            display: flex;
        }

        .custom-limit input {
            width: 70px;
            font-family: var(--mono);
            font-size: 13px;
            padding: 4px 8px;
            border: 0.5px solid var(--bd);
            border-radius: var(--rad);
            background: var(--bg);
            color: var(--tx);
            outline: none;
        }

        .custom-limit select {
            font-size: 12px;
            padding: 4px 8px;
            border: 0.5px solid var(--bd);
            border-radius: var(--rad);
            background: var(--bg);
            color: var(--tx);
            font-family: var(--sans);
        }

        .sticky-bar {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--bg);
            border-bottom: 0.5px solid var(--bd);
            padding: 8px 20px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--tx2);
            gap: 16px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .wrap {
                flex-direction: column;
            }

            .col-r {
                width: 100%;
            }

            textarea {
                height: 200px;
            }

            .stats-grid {
                grid-template-columns:1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns:1fr;
            }
        }
    </style>
</head>
<body>
<div class="header">
    <h1>word counter</h1>
    <button id="themeToggle">Dark mode</button>
</div>
<div class="sticky-bar" id="stickyBar"></div>
<div class="wrap">
    <div class="col-l">
        <div class="fr-bar" id="frBar">
            <input type="text" id="findInput" placeholder="Find...">
            <input type="text" id="replaceInput" placeholder="Replace...">
            <button id="replaceAllBtn">Replace all</button>
            <span class="match-count" id="matchCount"></span>
            <button id="closeFr" style="padding:5px 8px;">✕</button>
        </div>
        <textarea id="input" placeholder="Type or paste your text here..." spellcheck="false"></textarea>
        <div class="toolbar">
            <button id="copyBtn" title="Copy text">Copy</button>
            <button id="clearBtn" title="Clear text">Clear</button>
            <button id="dlBtn" title="Download as .txt">Download</button>
            <span class="sep"></span>
            <button id="upperBtn" title="UPPERCASE">AA</button>
            <button id="lowerBtn" title="lowercase">aa</button>
            <button id="titleBtn" title="Title Case">Aa</button>
            <button id="sentBtn" title="Sentence case">Aa.</button>
            <button id="stripWsBtn" title="Strip extra whitespace">⌧ spaces</button>
            <button id="stripLbBtn" title="Strip line breaks">⌧ breaks</button>
            <span class="sep"></span>
            <button id="frToggle" title="Find & Replace (Ctrl+H)">Find & Replace</button>
            <button id="cmpToggle" title="Compare drafts">Compare</button>
        </div>
    </div>
    <div class="col-r">
        <div>
            <div class="section-label">Platform target</div>
            <div class="target-row">
                <select id="targetSel">
                    <option value="none">None</option>
                    <option value="twitter">Twitter / X post</option>
                    <option value="linkedin">LinkedIn post</option>
                    <option value="instagram">Instagram caption</option>
                    <option value="google_ads">Google Ads</option>
                    <option value="meta_tags">Meta tags</option>
                    <option value="email_subject">Email subject line</option>
                    <option value="sms">SMS</option>
                    <option value="custom">Custom</option>
                </select>
            </div>
            <div class="variant-toggle" id="variantToggle" style="display:none;margin-top:6px;"></div>
            <div class="custom-limit" id="customLimit">
                <input type="number" id="customVal" value="280" min="1">
                <select id="customUnit">
                    <option value="chars">chars</option>
                    <option value="words">words</option>
                </select>
            </div>
            <div class="ring-box" id="ringBox">
                <svg class="ring-svg" viewBox="0 0 100 100" id="ringSvg">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="var(--bd)" stroke-width="6"/>
                    <circle cx="50" cy="50" r="42" fill="none" stroke="var(--accent)" stroke-width="6"
                            stroke-linecap="round" id="ringArc" transform="rotate(-90 50 50)" stroke-dasharray="263.89"
                            stroke-dashoffset="263.89" style="transition:stroke-dashoffset 0.2s,stroke 0.2s;"/>
                    <text x="50" y="47" text-anchor="middle" font-family="var(--mono)" font-size="14" font-weight="500"
                          fill="var(--tx)" id="ringPct"></text>
                    <text x="50" y="62" text-anchor="middle" font-family="var(--sans)" font-size="9" fill="var(--tx3)"
                          id="ringLabel"></text>
                </svg>
                <div class="ring-info" id="ringInfo"></div>
            </div>
            <div class="preview-box" id="previewBox"></div>
        </div>
        <div>
            <div class="section-label">Stats</div>
            <div class="sel-bar" id="selBar"></div>
            <div class="stats-grid" id="statsGrid">
                <div class="stat">
                    <div class="label">Words</div>
                    <div class="val" id="sWords">0</div>
                </div>
                <div class="stat">
                    <div class="label">Characters</div>
                    <div class="val" id="sChars">0</div>
                </div>
                <div class="stat">
                    <div class="label">Chars (no spaces)</div>
                    <div class="val" id="sCharsNs">0</div>
                </div>
                <div class="stat">
                    <div class="label">Lines</div>
                    <div class="val" id="sLines">0</div>
                </div>
                <div class="stat">
                    <div class="label">Unique words</div>
                    <div class="val" id="sUnique">0</div>
                </div>
                <div class="stat">
                    <div class="label">Reading time</div>
                    <div class="val" id="sRead">0s</div>
                </div>
                <div class="stat">
                    <div class="label">Speaking time</div>
                    <div class="val" id="sSpeak">0s</div>
                </div>
            </div>
        </div>
        <div class="cmp-box" id="cmpBox">
            <div class="section-label">Draft comparison</div>
            <div class="cmp-summary" id="cmpSummary"></div>
            <div class="cmp-diff" id="cmpDiff"></div>
            <button class="cmp-reset" id="cmpReset">Reset comparison</button>
        </div>
    </div>
</div>
<script>
    (function () {
        /* ── DOM refs ── */
        const $ = s => document.getElementById(s);
        const input = $('input');

        /* ── Target configs ── */
        const targets = {
            none: {limit: 0, unit: 'chars'},
            twitter: {limit: 280, unit: 'chars', note: 'URLs count as 23 chars'},
            linkedin: {limit: 3000, unit: 'chars'},
            instagram: {limit: 2200, unit: 'chars'},
            google_ads: {
                variants: {headline: {limit: 30, unit: 'chars'}, description: {limit: 90, unit: 'chars'}},
                defaultVariant: 'headline'
            },
            meta_tags: {
                variants: {
                    title: {limit: 60, unit: 'chars', preview: true},
                    description: {limit: 160, unit: 'chars', preview: true}
                }, defaultVariant: 'title'
            },
            email_subject: {limit: 60, unit: 'chars', preview: true},
            sms: {limit: 160, unit: 'chars'},
            custom: {limit: 280, unit: 'chars'}
        };

        /* ── State ── */
        let state = {
            target: 'none',
            variant: null,
            customLimit: 280,
            customUnit: 'chars',
            compareMode: false,
            draftA: null,
            draftAStats: null,
            lastStats: null,
            diffTimer: null
        };

        /* ── Analysis functions ── */
        function getWords(t) {
            return t.trim() ? t.trim().split(/\s+/) : [];
        }

        function countChars(t) {
            return t.length;
        }

        function countCharsNs(t) {
            return t.replace(/\s/g, '').length;
        }

        function countLines(t) {
            return t ? t.split(/\r\n|\r|\n/).length : 1;
        }

        function uniqueWords(words) {
            return new Set(words.map(w => w.toLowerCase())).size;
        }

        function fmtTime(mins) {
            if (mins < 1 / 60) return '0s';
            if (mins < 1) {
                let s = Math.ceil(mins * 60);
                return s + 's';
            }
            let m = Math.floor(mins), s = Math.ceil((mins - m) * 60);
            return s > 0 ? m + 'm ' + s + 's' : m + 'm';
        }

        function analyze(t) {
            let words = getWords(t);
            return {
                words: words.length,
                chars: countChars(t),
                charsNs: countCharsNs(t),
                lines: countLines(t),
                uniq: uniqueWords(words),
                readTime: fmtTime(words.length / 200),
                speakTime: fmtTime(words.length / 130)
            };
        }

        function esc(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        /* ── UI update functions ── */
        function setVal(id, v) {
            let el = $(id);
            if (el.textContent !== String(v)) {
                el.textContent = v;
                el.classList.remove('bump');
                void el.offsetWidth;
                el.classList.add('bump');
                setTimeout(() => el.classList.remove('bump'), 200);
            }
        }

        function getTargetConfig() {
            let t = state.target;
            if (t === 'none') return null;
            if (t === 'custom') return {limit: state.customLimit, unit: state.customUnit};
            let cfg = targets[t];
            if (cfg.variants) {
                let v = state.variant || cfg.defaultVariant;
                return {...cfg.variants[v], variantName: v};
            }
            return cfg;
        }

        function updateRing(stats) {
            let cfg = getTargetConfig();
            let ringBox = $('ringBox'), previewBox = $('previewBox');
            if (!cfg) {
                ringBox.classList.remove('show');
                previewBox.classList.remove('show');
                return;
            }
            ringBox.classList.add('show');
            let current = cfg.unit === 'words' ? stats.words : stats.chars;
            let limit = cfg.limit;
            let pct = limit > 0 ? Math.min(current / limit, 1.5) : 0;
            let circ = 2 * Math.PI * 42;
            let offset = circ - (circ * Math.min(pct, 1));
            let arc = $('ringArc');
            arc.style.strokeDashoffset = offset;
            let color = pct > 1 ? 'var(--accent-err)' : pct > 0.9 ? 'var(--accent-warn)' : 'var(--accent)';
            arc.style.stroke = color;
            $('ringPct').textContent = Math.round(Math.min(pct, 1) * 100) + '%';
            $('ringLabel').textContent = cfg.unit;
            let info = '<span class="big">' + current + ' / ' + limit + '</span>';
            info += cfg.unit === 'words' ? 'words' : 'characters';
            if (current > limit) {
                let over = current - limit;
                info += '<br><span class="over">' + over + ' over limit</span>';
            }
            if (cfg.note) info += '<br><span style="font-size:11px;color:var(--tx3)">' + cfg.note + '</span>';
            $('ringInfo').innerHTML = info;
            if (cfg.preview) {
                previewBox.classList.add('show');
                let text = input.value;
                if (text.length <= limit) {
                    previewBox.innerHTML = '<span style="color:var(--tx)">' + esc(text || '(empty)') + '</span>';
                } else {
                    previewBox.innerHTML = '<span style="color:var(--tx)">' + esc(text.slice(0, limit)) + '</span><span class="cut">' + esc(text.slice(limit)) + '</span>';
                }
            } else {
                previewBox.classList.remove('show');
            }
        }

        function updateSelectionBar(stats) {
            let el = $('selBar');
            let s = input.selectionStart, e = input.selectionEnd;
            if (s === e) {
                el.classList.remove('show');
                return;
            }
            let sel = input.value.slice(s, e);
            let sw = getWords(sel).length;
            let sc = sel.length;
            let txt = 'Selected: ' + sw + ' words, ' + sc + ' chars';
            let cfg = getTargetConfig();
            if (cfg) {
                txt += ' &middot; limit: ' + cfg.limit + ' ' + cfg.unit;
            }
            el.innerHTML = txt;
            el.classList.add('show');
        }

        function updateStickyBar(stats) {
            let bar = $('stickyBar');
            if (window.innerWidth > 768) {
                bar.style.display = 'none';
                return;
            }
            let rect = $('statsGrid').getBoundingClientRect();
            if (rect.top < 0) {
                bar.style.display = 'flex';
                bar.textContent = stats.words + ' words  ·  ' + stats.chars + ' chars  ·  ' + stats.readTime + ' read';
            } else {
                bar.style.display = 'none';
            }
        }

        function updateFindCount() {
            let f = $('findInput').value;
            if (!f) {
                $('matchCount').textContent = '';
                return;
            }
            try {
                let re = new RegExp(f.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
                let m = input.value.match(re);
                $('matchCount').textContent = (m ? m.length : 0) + ' matches';
            } catch (e) {
                $('matchCount').textContent = '';
            }
        }

        function updateStats() {
            let text = input.value;
            let stats = analyze(text);
            state.lastStats = stats;
            setVal('sWords', stats.words);
            setVal('sChars', stats.chars);
            setVal('sCharsNs', stats.charsNs);
            setVal('sLines', stats.lines);
            setVal('sUnique', stats.uniq);
            setVal('sRead', stats.readTime);
            setVal('sSpeak', stats.speakTime);
            updateRing(stats);
            updateSelectionBar(stats);
            updateStickyBar(stats);
            if (state.compareMode && state.draftA !== null) {
                scheduleDiff();
            }
            updateFindCount();
        }

        /* ── Diff algorithm (word-level, greedy) ── */
        function wordDiff(a, b) {
            let result = [];
            let ia = 0, ib = 0;
            while (ia < a.length && ib < b.length) {
                if (a[ia] === b[ib]) {
                    result.push({type: 'eq', val: a[ia]});
                    ia++;
                    ib++;
                    continue;
                }
                let fa = -1, fb = -1;
                let searchLen = Math.min(200, Math.max(a.length - ia, b.length - ib));
                for (let k = 1; k < searchLen; k++) {
                    if (fb < 0 && ib + k < b.length && a[ia] === b[ib + k]) fb = k;
                    if (fa < 0 && ia + k < a.length && a[ia + k] === b[ib]) fa = k;
                    if (fa >= 0 || fb >= 0) break;
                }
                if (fa < 0 && fb < 0) {
                    result.push({type: 'del', val: a[ia]});
                    result.push({type: 'add', val: b[ib]});
                    ia++;
                    ib++;
                } else if (fb >= 0 && (fa < 0 || fb <= fa)) {
                    for (let j = 0; j < fb; j++) result.push({type: 'add', val: b[ib + j]});
                    ib += fb;
                } else {
                    for (let j = 0; j < fa; j++) result.push({type: 'del', val: a[ia + j]});
                    ia += fa;
                }
            }
            while (ia < a.length) {
                result.push({type: 'del', val: a[ia]});
                ia++;
            }
            while (ib < b.length) {
                result.push({type: 'add', val: b[ib]});
                ib++;
            }
            return result;
        }

        function scheduleDiff() {
            clearTimeout(state.diffTimer);
            state.diffTimer = setTimeout(computeDiff, 300);
        }

        function computeDiff() {
            if (!state.compareMode || state.draftA === null) return;
            let statsB = state.lastStats;
            let sA = state.draftAStats;
            let dw = statsB.words - sA.words;
            let dc = statsB.chars - sA.chars;

            function fmtD(v, label) {
                let s = v > 0 ? '+' + v : String(v);
                let c = v > 0 ? 'pos' : v < 0 ? 'neg' : '';
                return c ? '<span class="' + c + '">' + s + ' ' + label + '</span>' : s + ' ' + label;
            }

            $('cmpSummary').innerHTML = fmtD(dw, 'words') + ' &middot; ' + fmtD(dc, 'chars');
            let wA = state.draftA.trim() ? state.draftA.trim().split(/\s+/) : [];
            let wB = input.value.trim() ? input.value.trim().split(/\s+/) : [];
            let maxLen = 5000;
            let a = wA.slice(0, maxLen), b = wB.slice(0, maxLen);
            let diff = wordDiff(a, b);
            let html = '';
            for (let d of diff) {
                if (d.type === 'eq') html += esc(d.val) + ' ';
                else if (d.type === 'add') html += '<span class="add">' + esc(d.val) + '</span> ';
                else html += '<span class="del">' + esc(d.val) + '</span> ';
            }
            if (wA.length > maxLen || wB.length > maxLen) html += '<br><span style="color:var(--tx3)">[diff truncated at ' + maxLen + ' words]</span>';
            $('cmpDiff').innerHTML = html;
        }

        /* ── Event handlers ── */
        let debounceTimer;
        input.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(updateStats, 150);
        });
        input.addEventListener('select', () => updateSelectionBar(state.lastStats || analyze(input.value)));
        document.addEventListener('selectionchange', () => {
            if (document.activeElement === input) updateSelectionBar(state.lastStats || analyze(input.value));
        });
        window.addEventListener('scroll', () => updateStickyBar(state.lastStats || {
            words: 0,
            chars: 0,
            readTime: '0s'
        }), {passive: true});

// Copy / Clear / Download
        $('copyBtn').onclick = () => {
            navigator.clipboard.writeText(input.value);
            $('copyBtn').textContent = 'Copied!';
            setTimeout(() => $('copyBtn').textContent = 'Copy', 1500);
        };
        $('clearBtn').onclick = () => {
            input.value = '';
            updateStats();
            input.focus();
        };
        $('dlBtn').onclick = () => {
            let b = new Blob([input.value], {type: 'text/plain'});
            let u = URL.createObjectURL(b);
            let a = document.createElement('a');
            a.href = u;
            a.download = 'text.txt';
            a.click();
            URL.revokeObjectURL(u);
        };

// Text transforms
        $('upperBtn').onclick = () => {
            input.value = input.value.toUpperCase();
            updateStats();
        };
        $('lowerBtn').onclick = () => {
            input.value = input.value.toLowerCase();
            updateStats();
        };
        $('titleBtn').onclick = () => {
            input.value = input.value.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase());
            updateStats();
        };
        $('sentBtn').onclick = () => {
            input.value = input.value.toLowerCase().replace(/(^\s*\w|[.!?]\s+\w)/g, c => c.toUpperCase());
            updateStats();
        };
        $('stripWsBtn').onclick = () => {
            input.value = input.value.replace(/[^\S\n]+/g, ' ').replace(/ +\n/g, '\n').replace(/\n +/g, '\n').trim();
            updateStats();
        };
        $('stripLbBtn').onclick = () => {
            input.value = input.value.replace(/\n+/g, ' ').replace(/ +/g, ' ').trim();
            updateStats();
        };

// Find & Replace
        $('frToggle').onclick = () => {
            let bar = $('frBar');
            bar.classList.toggle('show');
            if (bar.classList.contains('show')) $('findInput').focus();
        };
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'h') {
                e.preventDefault();
                $('frToggle').click();
            }
        });
        $('closeFr').onclick = () => $('frBar').classList.remove('show');
        $('findInput').addEventListener('input', updateFindCount);
        $('replaceAllBtn').onclick = () => {
            let f = $('findInput').value;
            if (!f) return;
            let r = $('replaceInput').value;
            try {
                let re = new RegExp(f.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
                input.value = input.value.replace(re, r);
            } catch (e) {
            }
            updateStats();
        };

// Platform target
        $('targetSel').onchange = function () {
            state.target = this.value;
            let cfg = targets[this.value];
            let vt = $('variantToggle');
            let cl = $('customLimit');
            vt.style.display = 'none';
            cl.classList.remove('show');
            if (cfg && cfg.variants) {
                vt.style.display = 'flex';
                vt.innerHTML = '';
                state.variant = cfg.defaultVariant;
                for (let k in cfg.variants) {
                    let b = document.createElement('button');
                    b.textContent = k;
                    b.className = k === state.variant ? 'active' : '';
                    b.onclick = function () {
                        state.variant = k;
                        vt.querySelectorAll('button').forEach(x => x.classList.remove('active'));
                        this.classList.add('active');
                        updateStats();
                    };
                    vt.appendChild(b);
                }
            } else {
                state.variant = null;
            }
            if (this.value === 'custom') cl.classList.add('show');
            updateStats();
        };
        $('customVal').oninput = function () {
            state.customLimit = parseInt(this.value) || 1;
            updateStats();
        };
        $('customUnit').onchange = function () {
            state.customUnit = this.value;
            updateStats();
        };

// Compare mode
        $('cmpToggle').onclick = function () {
            if (!state.compareMode) {
                state.compareMode = true;
                state.draftA = input.value;
                state.draftAStats = analyze(input.value);
                this.classList.add('active');
                this.textContent = 'Comparing...';
                $('cmpBox').classList.add('show');
                $('cmpSummary').textContent = 'Draft A saved. Edit text to see changes.';
                $('cmpDiff').innerHTML = '';
            }
        };
        $('cmpReset').onclick = () => {
            state.compareMode = false;
            state.draftA = null;
            state.draftAStats = null;
            $('cmpToggle').classList.remove('active');
            $('cmpToggle').textContent = 'Compare';
            $('cmpBox').classList.remove('show');
        };

// Theme toggle
        $('themeToggle').onclick = function () {
            if (document.body.getAttribute('data-theme') === 'dark') {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                this.textContent = 'Dark mode';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                this.textContent = 'Light mode';
            }
        };

        /* ── Init ── */
        (function initTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                $('themeToggle').textContent = 'Light mode';
            }
        })();
        input.focus();
        updateStats();
    })();
</script>
<script src="../logo.js"></script>
</body>
