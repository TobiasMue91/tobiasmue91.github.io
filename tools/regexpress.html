<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RegExpress — AI Regex Generator & Tester</title>
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
          rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0F172A;
            --surface: #1E293B;
            --text: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --blue: #3B82F6;
            --blue-hover: #2563EB;
            --blue-dim: #1E3A5F;
            --blue-light: #93C5FD;
            --red: #EF4444;
            --green: #22C55E;
            --radius: 6px;
            --font: 'Inter', system-ui, sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 40px 16px 60px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 28px;
        }

        .zone {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 12px;
        }

        .label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        /* Input Zone */
        #input {
            width: 100%;
            background: var(--bg);
            color: var(--text);
            border: 1px solid #334155;
            border-radius: var(--radius);
            padding: 14px 16px;
            font-size: 16px;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.15s;
        }

        #input:focus {
            border-color: var(--blue);
        }

        #input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #input::placeholder {
            color: var(--text-muted);
        }

        #generateBtn {
            width: 100%;
            padding: 14px;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.15s;
        }

        #generateBtn:hover:not(:disabled) {
            background: var(--blue-hover);
        }

        #generateBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #1D4ED8;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 16px;
        }

        .chip {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid #334155;
            border-radius: 100px;
            padding: 5px 12px;
            font-size: 12px;
            font-family: var(--font);
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .chip:hover {
            border-color: var(--blue);
            color: var(--text);
        }

        /* Output Zone */
        #outputZone .label {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .regex-wrap {
            position: relative;
            cursor: pointer;
        }

        #regexDisplay {
            font-family: var(--mono);
            font-size: 16px;
            font-weight: 500;
            background: var(--bg);
            padding: 14px 16px;
            border-radius: var(--radius);
            word-break: break-all;
            min-height: 48px;
            display: flex;
            align-items: center;
            border: 1px solid #334155;
        }

        #regexDisplay.placeholder {
            color: var(--text-muted);
            font-style: italic;
            font-family: var(--font);
            font-weight: 400;
            font-size: 14px;
        }

        .copy-toast {
            position: absolute;
            top: -8px;
            right: 12px;
            background: var(--green);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 100px;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }

        .copy-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .flags-row {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            align-items: center;
        }

        .flags-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-right: 6px;
        }

        .flag-btn {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 100px;
            border: 1px solid #334155;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .flag-btn.active {
            background: var(--blue);
            border-color: var(--blue);
            color: #fff;
        }

        .flag-btn:hover:not(.active) {
            border-color: var(--text-muted);
            color: var(--text-secondary);
        }

        .js-note {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 10px;
        }

        /* Explanation */
        .explanation-toggle {
            margin-top: 14px;
        }

        .explanation-toggle summary {
            font-size: 13px;
            font-weight: 500;
            color: var(--blue-light);
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }

        .explanation-toggle summary::-webkit-details-marker {
            display: none;
        }

        .explanation-toggle summary::before {
            content: '▸';
            font-size: 11px;
            transition: transform 0.15s;
            display: inline-block;
        }

        .explanation-toggle[open] summary::before {
            transform: rotate(90deg);
        }

        #explanationContent {
            margin-top: 10px;
        }

        .explanation-row {
            display: flex;
            gap: 12px;
            padding: 5px 0;
            font-size: 13px;
            border-bottom: 1px solid #1a2535;
        }

        .explanation-row:last-child {
            border-bottom: none;
        }

        .expl-pattern {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--blue-light);
            white-space: nowrap;
            min-width: 0;
            flex-shrink: 0;
            max-width: 40%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .expl-meaning {
            color: var(--text-secondary);
            flex: 1;
            min-width: 0;
        }

        .expl-loading {
            color: var(--text-muted);
            font-size: 13px;
            font-style: italic;
            padding: 6px 0;
        }

        .expl-error {
            color: var(--red);
            font-size: 13px;
        }

        /* Test Zone */
        #testZone {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease, margin 0.3s ease, padding 0.3s ease;
            padding-top: 0;
            padding-bottom: 0;
            margin-bottom: 0;
        }

        #testZone.visible {
            max-height: 600px;
            opacity: 1;
            padding-top: 24px;
            padding-bottom: 24px;
            margin-bottom: 12px;
        }

        .test-label-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        #matchBadge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 100px;
            display: none;
        }

        #matchBadge.has-matches {
            display: inline-block;
            background: #0B3D1C;
            color: var(--green);
        }

        #matchBadge.no-matches {
            display: inline-block;
            background: #3B1318;
            color: var(--red);
        }

        #matchBadge.invalid {
            display: inline-block;
            background: #3B1318;
            color: var(--red);
        }

        #testInput {
            width: 100%;
            min-height: 120px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid #334155;
            border-radius: var(--radius);
            padding: 12px 16px;
            font-size: 15px;
            font-family: var(--font);
            resize: vertical;
            outline: none;
            transition: border-color 0.15s;
        }

        #testInput:focus {
            border-color: var(--blue);
        }

        .matches-label {
            margin-top: 14px;
            margin-bottom: 6px;
        }

        #matchDisplay {
            background: var(--bg);
            border: 1px solid #334155;
            border-radius: var(--radius);
            padding: 12px 16px;
            font-size: 15px;
            font-family: var(--font);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 48px;
            color: var(--text);
        }

        #matchDisplay:empty::before {
            content: 'Matches will appear here…';
            color: var(--text-muted);
            font-style: italic;
            font-size: 14px;
        }

        #matchDisplay mark {
            background: var(--blue-dim);
            color: var(--blue-light);
            border-radius: 2px;
            padding: 0 1px;
        }

        /* Error display */
        .error-msg {
            color: var(--red);
            font-size: 14px;
            padding: 10px 0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 16px 40px;
            }

            h1 {
                font-size: 24px;
            }

            .chip {
                font-size: 11px;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>RegExpress</h1>
    <p class="subtitle">AI-powered regex from plain language — generate, understand, test.</p>

    <!-- ZONE 1: INPUT -->
    <div class="zone">
        <div class="label">Description</div>
        <input type="text" id="input" placeholder='e.g., "Match email addresses that end in .edu or .gov"'>
        <button id="generateBtn" onclick="generateRegex()">
            <span class="spinner" id="spinner"></span>
            <span id="btnText">Generate Regex</span>
        </button>
        <div class="examples">
            <button class="chip" onclick="setExample('Match valid email addresses')">Email Addresses</button>
            <button class="chip" onclick="setExample('Extract hashtags from text')">Hashtags</button>
            <button class="chip" onclick="setExample('Find dates in MM/DD/YYYY or YYYY-MM-DD format')">Dates</button>
            <button class="chip" onclick="setExample('Match phone numbers in US formats')">Phone Numbers</button>
            <button class="chip" onclick="setExample('Validate passwords: 8+ chars, uppercase, lowercase, digit')">
                Passwords
            </button>
            <button class="chip" onclick="setExample('Find URLs starting with http or https')">URLs</button>
        </div>
    </div>

    <!-- ZONE 2: OUTPUT -->
    <div class="zone" id="outputZone">
        <div class="label">
            <span>Generated Regex</span>
        </div>
        <div class="regex-wrap" onclick="copyRegex()" title="Click to copy">
            <div id="regexDisplay" class="placeholder">Your regex will appear here</div>
            <div class="copy-toast" id="copyToast">Copied!</div>
        </div>

        <div class="flags-row" id="flagsRow" style="display:none;">
            <span class="flags-label">Flags</span>
            <button class="flag-btn active" data-flag="g" onclick="toggleFlag(this)">g</button>
            <button class="flag-btn" data-flag="i" onclick="toggleFlag(this)">i</button>
            <button class="flag-btn" data-flag="m" onclick="toggleFlag(this)">m</button>
            <button class="flag-btn" data-flag="s" onclick="toggleFlag(this)">s</button>
        </div>

        <div class="js-note" id="jsNote" style="display:none;">JavaScript-compatible regex</div>

        <details class="explanation-toggle" id="explanationSection" style="display:none;">
            <summary>Pattern Explanation</summary>
            <div id="explanationContent"></div>
        </details>
    </div>

    <!-- ZONE 3: TEST -->
    <div class="zone" id="testZone">
        <div class="test-label-row">
            <span class="label" style="margin-bottom:0;">Test String</span>
            <span id="matchBadge"></span>
        </div>
        <textarea id="testInput" placeholder="Paste text here to test your regex…"></textarea>
        <div class="label matches-label">Matches</div>
        <div id="matchDisplay"></div>
    </div>
</div>

<script>
    const API = 'https://chatgpt.tobiasmue91.workers.dev/';
    let currentPattern = '';
    let debounceTimer = null;

    // --- Initialization ---
    document.addEventListener('DOMContentLoaded', initFromHash);
    window.addEventListener('hashchange', initFromHash);

    document.getElementById('input').addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !this.disabled) generateRegex();
    });

    document.getElementById('testInput').addEventListener('input', function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(runTest, 150);
    });

    // --- Core Functions ---
    async function generateRegex() {
        const input = document.getElementById('input');
        const description = input.value.trim();
        if (!description) return;

        const btn = document.getElementById('generateBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');

        btn.disabled = true;
        input.disabled = true;
        spinner.style.display = 'inline-block';
        btnText.textContent = 'Generating…';

        try {
            const res = await fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Accept': '*/*'},
                body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    max_tokens: 150,
                    temperature: 0.1,
                    top_p: 0.3,
                    messages: [
                        {
                            role: 'system',
                            content: 'You are a regex expert. The user will describe a pattern in natural language. Respond with ONLY the regex pattern — no delimiters, no flags, no explanation, no markdown formatting. Just the raw pattern.'
                        },
                        {role: 'user', content: description}
                    ]
                })
            });

            if (!res.ok) throw new Error('API request failed (' + res.status + ')');

            const data = await res.json();
            const raw = data.choices?.[0]?.message?.content;
            if (!raw) throw new Error('Empty response from AI');

            const pattern = extractPattern(raw);
            if (!pattern) {
                showError('The AI returned an unexpected format. Try rephrasing your description.');
                return;
            }

            currentPattern = pattern;
            showRegex(pattern);
            showTestZone();
            runTest();
            updateHash(description);
            fetchExplanation(pattern);
        } catch (err) {
            showError(err.message || 'Something went wrong. Please try again.');
        } finally {
            btn.disabled = false;
            input.disabled = false;
            spinner.style.display = 'none';
            btnText.textContent = 'Generate Regex';
        }
    }

    function extractPattern(raw) {
        let p = raw.trim();
        // Remove markdown code fences
        p = p.replace(/^```(?:regex|regexp|text)?\s*/i, '').replace(/\s*```\s*$/i, '');
        // Remove inline backticks
        p = p.replace(/^`+|`+$/g, '');
        // Remove /pattern/flags wrapper
        const slashMatch = p.match(/^\/(.*?)\/([gimsuy]*)$/s);
        if (slashMatch) p = slashMatch[1];
        p = p.trim();
        // If result still looks like multi-line prose, try to grab just the first line
        if (p.split('\n').length > 3 && p.length > 300) {
            // Looks like an explanation, not a pattern
            return null;
        }
        // Take only the first line if multiple lines
        if (p.includes('\n')) {
            const firstLine = p.split('\n')[0].trim();
            // Check if first line looks like a regex (has special chars)
            if (/[\\[\](){}|^$*+?.]/.test(firstLine)) {
                p = firstLine;
            }
        }
        return p || null;
    }

    function showRegex(pattern) {
        const display = document.getElementById('regexDisplay');
        display.classList.remove('placeholder');
        display.textContent = '/' + pattern + '/' + getFlags();
        document.getElementById('flagsRow').style.display = 'flex';
        document.getElementById('jsNote').style.display = 'block';
    }

    function showError(msg) {
        const display = document.getElementById('regexDisplay');
        display.classList.remove('placeholder');
        display.innerHTML = '';
        const span = document.createElement('span');
        span.className = 'error-msg';
        span.textContent = msg;
        display.appendChild(span);
    }

    function showTestZone() {
        document.getElementById('testZone').classList.add('visible');
    }

    // --- Flags ---
    function getFlags() {
        let flags = '';
        document.querySelectorAll('.flag-btn.active').forEach(btn => {
            flags += btn.dataset.flag;
        });
        return flags;
    }

    function toggleFlag(btn) {
        btn.classList.toggle('active');
        if (currentPattern) {
            document.getElementById('regexDisplay').textContent = '/' + currentPattern + '/' + getFlags();
            runTest();
        }
    }

    // --- Copy ---
    function copyRegex() {
        if (!currentPattern) return;
        const text = '/' + currentPattern + '/' + getFlags();
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('copyToast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        });
    }

    // --- Test / Highlighting ---
    function runTest() {
        if (!currentPattern) return;
        const testStr = document.getElementById('testInput').value;
        const badge = document.getElementById('matchBadge');
        const display = document.getElementById('matchDisplay');

        if (!testStr) {
            badge.style.display = 'none';
            badge.className = '';
            display.innerHTML = '';
            return;
        }

        const result = highlightMatches(testStr, currentPattern, getFlags());

        if (result.error) {
            badge.textContent = 'Invalid pattern';
            badge.className = 'invalid';
            badge.style.display = 'inline-block';
            display.innerHTML = '';
            const t = document.createTextNode(testStr);
            display.appendChild(t);
            return;
        }

        if (result.count > 0) {
            badge.textContent = result.count + ' match' + (result.count !== 1 ? 'es' : '');
            badge.className = 'has-matches';
        } else {
            badge.textContent = 'No matches';
            badge.className = 'no-matches';
        }
        badge.style.display = 'inline-block';
        display.innerHTML = result.html;
    }

    function highlightMatches(text, pattern, flags) {
        try {
            // matchAll requires global flag
            const gFlags = flags.includes('g') ? flags : flags + 'g';
            const regex = new RegExp(pattern, gFlags);
            const matches = [...text.matchAll(regex)];

            // Filter zero-length matches
            const validMatches = matches.filter(m => m[0].length > 0);

            if (validMatches.length === 0) {
                return {html: escapeHtml(text), count: 0};
            }

            // Sort by index and deduplicate overlapping
            validMatches.sort((a, b) => a.index - b.index);

            let html = '';
            let lastIdx = 0;

            for (const m of validMatches) {
                const start = m.index;
                const end = start + m[0].length;
                if (start < lastIdx) continue; // skip overlapping

                html += escapeHtml(text.slice(lastIdx, start));
                html += '<mark>' + escapeHtml(m[0]) + '</mark>';
                lastIdx = end;
            }
            html += escapeHtml(text.slice(lastIdx));

            return {html: html, count: validMatches.length};
        } catch (e) {
            return {html: escapeHtml(text), count: 0, error: e.message};
        }
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // --- Explanation ---
    async function fetchExplanation(pattern) {
        const section = document.getElementById('explanationSection');
        const content = document.getElementById('explanationContent');
        section.style.display = 'block';
        section.removeAttribute('open');
        content.innerHTML = '<div class="expl-loading">Loading explanation…</div>';

        try {
            const res = await fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Accept': '*/*'},
                body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    max_tokens: 300,
                    temperature: 0.3,
                    messages: [
                        {
                            role: 'system',
                            content: 'You are a regex expert. Explain the given regular expression in plain language, part by part. Be concise. Format: one line per component, using → as separator between the regex fragment and its meaning. Example: \\d{3} → exactly three digits'
                        },
                        {role: 'user', content: pattern}
                    ]
                })
            });

            if (!res.ok) throw new Error('Failed');

            const data = await res.json();
            const text = data.choices?.[0]?.message?.content || '';
            renderExplanation(text);
        } catch {
            content.innerHTML = '<div class="expl-error">Could not load explanation.</div>';
        }
    }

    function renderExplanation(text) {
        const content = document.getElementById('explanationContent');
        const lines = text.split('\n').filter(l => l.trim());
        let html = '';

        for (const line of lines) {
            const idx = line.indexOf('→');
            if (idx === -1) {
                // Try other separators
                const dashIdx = line.indexOf(' - ');
                if (dashIdx !== -1 && dashIdx < 40) {
                    const frag = line.slice(0, dashIdx).trim();
                    const meaning = line.slice(dashIdx + 3).trim();
                    html += renderExplRow(frag, meaning);
                } else {
                    // Single line explanation
                    html += '<div class="explanation-row"><span class="expl-meaning" style="flex:none;width:100%;">' + escapeHtml(line.trim()) + '</span></div>';
                }
            } else {
                const frag = line.slice(0, idx).trim();
                const meaning = line.slice(idx + 1).trim();
                html += renderExplRow(frag, meaning);
            }
        }

        content.innerHTML = html || '<div class="expl-error">No explanation available.</div>';
    }

    function renderExplRow(frag, meaning) {
        return '<div class="explanation-row"><span class="expl-pattern">' + escapeHtml(frag) + '</span><span class="expl-meaning">' + escapeHtml(meaning) + '</span></div>';
    }

    // --- Examples ---
    function setExample(text) {
        document.getElementById('input').value = text;
    }

    // --- URL Hash ---
    function updateHash(description) {
        history.replaceState(null, '', '#q=' + encodeURIComponent(description));
    }

    function initFromHash() {
        const hash = window.location.hash;
        if (hash.startsWith('#q=')) {
            const q = decodeURIComponent(hash.slice(3));
            if (q) {
                document.getElementById('input').value = q;
                generateRegex();
            }
        }
    }
</script>
<script src="../logo.js"></script>
</body>
</html>
