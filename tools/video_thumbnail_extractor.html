        }

        function formatTime(t, ms = false) {
            const m = Math.floor(t / 60);
            const s = Math.floor(t % 60);
            if (ms) {
                const mil = Math.floor((t % 1) * 1000);
                return `${m}:${String(s).padStart(2, '0')}.${String(mil).padStart(3, '0')}`
            }
            return `${m}:${String(s).padStart(2, '0')}`
        }

        function updateTime() {

            timelineProgress.style.width = pct * 100 + '%';

        }

            if (f && f.type.startsWith('video/')) loadVideo(f); else showToast('Please drop a video file')
        });
        fileInput.addEventListener('change', e => {
            if (e.target.files[0]) loadVideo(e.target.files[0])
        });
        video.addEventListener('timeupdate', updateTime);
        video.addEventListener('play', () => {
            isPlaying = true;
            btnPlay.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
        });
        video.addEventListener('pause', () => {
            isPlaying = false;
            btnPlay.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>'
        });
        btnPlay.addEventListener('click', () => {
            if (video.paused) video.play(); else video.pause()
        });
        btnPrevFrame.addEventListener('click', () => {
            video.pause();
            video.currentTime = Math.max(0, video.currentTime - FRAME_STEP)
        });
        btnNextFrame.addEventListener('click', () => {
            video.pause();
            video.currentTime = Math.min(video.duration, video.currentTime + FRAME_STEP)
        });

        function seekFromEvent(e) {
            const rect = timeline.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            video.currentTime = pct * (video.duration || 0);
            updateTime()
        }

        timeline.addEventListener('mousedown', e => {
            isSeeking = true;
            video.pause();
            seekFromEvent(e)
        });
        document.addEventListener('mousemove', e => {
            if (isSeeking) seekFromEvent(e)
        });
        document.addEventListener('mouseup', () => {
            isSeeking = false
        });
        timeline.addEventListener('touchstart', e => {
            isSeeking = true;
            video.pause();
            seekFromEvent(e.touches[0])
        }, {passive: true});
        document.addEventListener('touchmove', e => {
            if (isSeeking) seekFromEvent(e.touches[0])
        });
        document.addEventListener('touchend', () => {
            isSeeking = false
        });
        qualitySlider.addEventListener('input', () => {
            qualityVal.textContent = qualitySlider.value + '%'
        });

        function captureFrame() {
            return new Promise(resolve => {
                const s = parseFloat(scaleSel.value);
                const w = Math.round(video.videoWidth * s);
                const h = Math.round(video.videoHeight * s);
                const c = document.createElement('canvas');
                c.width = w;
                c.height = h;
                const ctx = c.getContext('2d');
                ctx.drawImage(video, 0, 0, w, h);
                const fmt = formatSel.value;
                const q = parseInt(qualitySlider.value) / 100;
                const mime = fmt === 'png' ? 'image/png' : fmt === 'webp' ? 'image/webp' : 'image/jpeg';
                c.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const time = video.currentTime;
                    const idx = frames.length + 1;
                    frames.push({blob, url, time, idx, fmt});
                    addMarker(time);
                    updateGalleryUI();
                    addThumbCard(frames[frames.length - 1]);
                    resolve()
                }, mime, q)
            })
        }

        btnCapture.addEventListener('click', async () => {
            video.pause();
            await captureFrame();
            showToast('Frame captured!')
        });

        function addMarker(time) {
            const pct = (time / (video.duration || 1)) * 100;
            const m = document.createElement('div');
            m.className = 'timeline-marker';
            m.style.left = pct + '%';
            timelineMarkers.appendChild(m)
        }

        function updateGalleryUI() {
            const n = frames.length;
            frameCount.textContent = n;
            galleryHeader.style.display = n ? 'flex' : 'none';
            emptyGallery.style.display = n ? 'none' : 'block';
            btnDownloadAll.disabled = !n
        }

        function addThumbCard(frame) {
            const card = document.createElement('div');
            card.className = 'thumb-card';
            card.innerHTML = `<span class="badge-num">#${frame.idx}</span><img src="${frame.url}" alt="Frame ${frame.idx}"><div class="info"><span class="timestamp">${formatTime(frame.time, true)}</span><div class="card-actions"><button class="dl" title="Download"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button><button class="seek" title="Seek to timestamp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button><button class="del" title="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div></div>`;
            card.querySelector('img').addEventListener('click', () => {
                modalImg.src = frame.url;
                modal.classList.add('active')
            });
            card.querySelector('.dl').addEventListener('click', () => {
                const a = document.createElement('a');
                a.href = frame.url;
                a.download = `thumb_${frame.idx}_${formatTime(frame.time).replace(':', '-')}.${frame.fmt}`;
                a.click()
            });
            card.querySelector('.seek').addEventListener('click', () => {
                video.currentTime = frame.time;
                video.pause();
                window.scrollTo({top: 0, behavior: 'smooth'})
            });
            card.querySelector('.del').addEventListener('click', () => {
                const i = frames.indexOf(frame);
                if (i > -1) {
                    frames.splice(i, 1);
                    URL.revokeObjectURL(frame.url)
                }
                card.remove();
                rebuildMarkers();
                updateGalleryUI()
            });
            gallery.appendChild(card)
        }

        function rebuildMarkers() {
            timelineMarkers.innerHTML = '';
            frames.forEach(f => addMarker(f.time))
        }

        btnAutoExtract.addEventListener('click', async () => {
            const intv = parseFloat(intervalInput.value);
            if (!intv || intv <= 0) return showToast('Enter a valid interval');
            const dur = video.duration;
            if (!dur) return;
            const wasPlaying = !video.paused;
            video.pause();
            const times = [];
            for (let t = 0; t < dur; t += intv) times.push(t);
            progressBar.classList.add('active');
            btnAutoExtract.disabled = true;
            btnAutoExtract.textContent = 'Extracting...';
            for (let i = 0; i < times.length; i++) {
                video.currentTime = times[i];
                await new Promise(r => {
                    const h = () => {
                        video.removeEventListener('seeked', h);
                        r()
                    };
                    video.addEventListener('seeked', h)
                });
                await captureFrame();
                progressFill.style.width = ((i + 1) / times.length * 100) + '%'
            }
            progressBar.classList.remove('active');
            progressFill.style.width = '0%';
            btnAutoExtract.disabled = false;
            btnAutoExtract.textContent = 'Extract All';
            showToast(`Extracted ${times.length} frames!`)
        });
        btnDownloadAll.addEventListener('click', async () => {
            if (!frames.length) return;
            btnDownloadAll.disabled = true;
            btnDownloadAll.textContent = 'Zipping...';
            const zip = new JSZip();
            const promises = frames.map((f, i) => f.blob.arrayBuffer().then(buf => zip.file(`thumb_${String(i + 1).padStart(3, '0')}_${formatTime(f.time).replace(':', '-')}.${f.fmt}`, buf)));
            await Promise.all(promises);
            const content = await zip.generateAsync({type: 'blob'});
            saveAs(content, 'thumbnails.zip');
            btnDownloadAll.disabled = false;
            btnDownloadAll.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download ZIP';
            showToast('ZIP downloaded!')
        });
        btnClearAll.addEventListener('click', () => {
            if (!frames.length) return;
            if (!confirm('Clear all captured frames?')) return;
            frames.forEach(f => URL.revokeObjectURL(f.url));
            frames = [];
            gallery.innerHTML = '';
            timelineMarkers.innerHTML = '';
            updateGalleryUI();
            showToast('All frames cleared')
        });
        btnNewVideo.addEventListener('click', () => {
            if (frames.length && !confirm('Load a new video? Current frames will be lost.')) return;
            frames.forEach(f => URL.revokeObjectURL(f.url));
            frames = [];
            gallery.innerHTML = '';
            timelineMarkers.innerHTML = '';
            video.src = '';
            if (objectURL) URL.revokeObjectURL(objectURL);
            objectURL = null;
            workspace.classList.remove('active');
            dropZone.style.display = '';
            fileInput.value = '';
            updateGalleryUI()
        });
        modalClose.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', e => {
            if (e.target === modal) modal.classList.remove('active')
        });
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
            if (!workspace.classList.contains('active')) return;
            switch (e.key) {
                case' ':
                    e.preventDefault();
                    if (video.paused) video.play(); else video.pause();
                    break;
                case'ArrowLeft':
                    e.preventDefault();
                    video.currentTime = Math.max(0, video.currentTime - 5);
                    break;
                case'ArrowRight':
                    e.preventDefault();
                    video.currentTime = Math.min(video.duration, video.currentTime + 5);
                    break;
                case'c':
                case'C':
                    e.preventDefault();
                    video.pause();
                    captureFrame().then(() => showToast('Frame captured!'));
                    break;
                case',':
                    e.preventDefault();
                    video.pause();
                    video.currentTime = Math.max(0, video.currentTime - FRAME_STEP);
                    break;
                case'.':
                    e.preventDefault();
                    video.pause();
                    video.currentTime = Math.min(video.duration, video.currentTime + FRAME_STEP);
                    break;
                case'Escape':
                    modal.classList.remove('active');
                    break
            }
        });
    })();
</script>
<script src="../logo.js"></script>
</body>
</html>
