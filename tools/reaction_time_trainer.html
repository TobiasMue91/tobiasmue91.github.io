    <title>Reaction Time Trainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --border: #E5E5E5;
            --text: #1A1A1A;
            --text2: #737373;
            --accent: #2563EB;
            --signal: #16A34A;
            --error: #DC2626;
            --neutral: #F0F0F0;
            --neutral-dark: #E0E0E0;
            --radius: 6px;
            --radius-sm: 4px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0A0A0A;
                --surface: #171717;
                --border: #262626;
                --text: #FAFAFA;
                --text2: #A3A3A3;
                --neutral: #1C1C1C;
                --neutral-dark: #2A2A2A;
            }
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            max-width: 640px;
            margin: 0 auto;
            padding: 0 1rem 3rem;
        }

        header {
            padding: 1.25rem 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        header h1 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        header span {
            font-size: 0.75rem;
            color: var(--text2);
        }

        .mode-selector {
            display: flex;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 0.75rem;
        }

        .mode-btn {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border: none;
            background: var(--surface);
            color: var(--text2);
            font-family: inherit;
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
        }

        .mode-btn + .mode-btn { border-left: 1px solid var(--border); }
        .mode-btn.active { background: var(--accent); color: #fff; }
        .mode-btn svg { width: 14px; height: 14px; }

        .reaction-area {
            width: 100%;
            height: 300px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            position: relative;
            background: var(--neutral);
            overflow: hidden;
        }

        .reaction-area[data-state="idle"] { background: var(--neutral); }
        .reaction-area[data-state="waiting"] { background: var(--neutral-dark); border-color: var(--neutral-dark); }
        .reaction-area[data-state="fakeout"] { background: var(--neutral-dark); border-color: var(--neutral-dark); }
        .reaction-area[data-state="active"] { border-color: var(--signal); }
        .reaction-area[data-state="active"].mode-color { background: var(--signal); }
        .reaction-area[data-state="active"].mode-shape { background: var(--neutral); }
        .reaction-area[data-state="active"].mode-sound { background: var(--neutral); }
        .reaction-area[data-state="early"] { background: var(--error); border-color: var(--error); }

        .reaction-area .main-text {
            font-size: 1.125rem;
            font-weight: 500;
            color: var(--text2);
            text-align: center;
            pointer-events: none;
        }

        .reaction-area[data-state="active"].mode-color .main-text,
        .reaction-area[data-state="early"] .main-text {
            color: #fff;
            font-weight: 600;
        }

        .reaction-area .sub-text {
            font-size: 0.75rem;
            color: var(--text2);
            margin-top: 0.25rem;
            pointer-events: none;
            opacity: 0.7;
        }

        .reaction-area[data-state="early"] .sub-text { color: rgba(255,255,255,0.7); }
        .reaction-area[data-state="active"].mode-color .sub-text { color: rgba(255,255,255,0.7); }

        .result-time {
            font-size: 2.5rem;
            font-weight: 700;
            font-feature-settings: 'tnum';
            color: var(--text);
            pointer-events: none;
        }

        .result-unit {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text2);
        }

        .shape-stimulus {
            pointer-events: none;
            position: absolute;
        }

        .accuracy-badge {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            font-size: 0.6875rem;
            font-weight: 500;
            color: var(--text2);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.2rem 0.5rem;
            border-radius: var(--radius-sm);
            pointer-events: none;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.625rem 0.75rem;
        }

        .stat-label {
            font-size: 0.6875rem;
            font-weight: 500;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .stat-value {
            font-feature-settings: 'tnum';
            font-weight: 600;
            color: var(--text);
        }

        .stat-value.large {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-value.medium {
            font-size: 1.125rem;
            line-height: 1.3;
        }

        .stat-ms {
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text2);
        }

        .warmup-line {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: var(--text2);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.375rem 0.75rem;
            display: none;
        }

        .warmup-line.visible { display: block; }

        .warmup-line .baseline {
            color: var(--accent);
            font-weight: 600;
        }

        .alltime-badge {
            display: none;
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--accent);
            margin-top: 0.125rem;
        }

        .alltime-badge.visible { display: block; }

        .section {
            margin-top: 1.5rem;
        }

        .section-title {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.5rem;
        }

        .session-log {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .session-row {
            display: grid;
            grid-template-columns: 1.5fr 0.75fr 0.75fr 0.75fr 0.5fr 40px;
            align-items: center;
            padding: 0.5rem 0.75rem;
            font-size: 0.75rem;
            color: var(--text2);
            cursor: pointer;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .session-row:last-child { border-bottom: none; }
        .session-row:hover { background: var(--neutral); }

        .session-row .date { color: var(--text); font-weight: 500; }
        .session-row .baseline-val { color: var(--accent); font-weight: 600; font-feature-settings: 'tnum'; }
        .session-row .best-val { font-feature-settings: 'tnum'; }
        .session-row .trials-val { font-feature-settings: 'tnum'; }
        .session-row .mode-icon { text-align: center; font-size: 0.8125rem; }

        .session-row .expand-col {
            text-align: center;
            color: var(--text2);
            font-size: 0.625rem;
        }

        .session-detail {
            display: none;
            padding: 0.5rem 0.75rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .session-detail.open { display: flex; align-items: center; gap: 0.75rem; }

        .session-detail .sparkline-label {
            font-size: 0.6875rem;
            color: var(--text2);
            white-space: nowrap;
        }

        .session-empty {
            padding: 1.5rem;
            text-align: center;
            font-size: 0.8125rem;
            color: var(--text2);
            background: var(--surface);
        }

        .patterns-section { display: none; }
        .patterns-section.visible { display: block; }

        .pattern-bars {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.75rem;
        }

        .pattern-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.375rem;
            font-size: 0.75rem;
        }

        .pattern-row:last-child { margin-bottom: 0; }

        .pattern-label {
            width: 70px;
            color: var(--text2);
            font-weight: 500;
            flex-shrink: 0;
        }

        .pattern-bar-bg {
            flex: 1;
            height: 18px;
            background: var(--neutral);
            border-radius: 2px;
            overflow: hidden;
        }

        .pattern-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            min-width: 0;
        }

        .pattern-bar.best { background: var(--signal); }

        .pattern-val {
            width: 55px;
            text-align: right;
            font-feature-settings: 'tnum';
            color: var(--text);
            font-weight: 500;
            flex-shrink: 0;
        }

        .pattern-insight {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: var(--text2);
            padding: 0.375rem 0;
        }

        .pattern-insight strong {
            color: var(--accent);
            font-weight: 600;
        }

        .settings-toggle {
            background: none;
            border: none;
            color: var(--text2);
            font-family: inherit;
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .settings-toggle:hover { color: var(--text); }

        .settings-toggle .arrow {
            display: inline-block;
            font-size: 0.625rem;
        }

        .settings-body {
            display: none;
            margin-top: 0.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.75rem;
        }

        .settings-body.open { display: block; }

        .settings-body label {
            display: block;
            font-size: 0.75rem;
            color: var(--text2);
            margin-bottom: 0.25rem;
            font-weight: 500;
        }

        .settings-body input[type="number"] {
            width: 100%;
            padding: 0.375rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 0.8125rem;
            font-feature-settings: 'tnum';
            margin-bottom: 0.625rem;
            outline: none;
        }

        .settings-body input[type="number"]:focus { border-color: var(--accent); }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .coarse-only { display: none; }
        .fine-only { display: block; }

        @media (pointer: coarse) {
            .coarse-only { display: block; }
            .fine-only { display: none; }
        }

        @media (max-width: 480px) {
            .reaction-area { height: 260px; }
            .session-row { grid-template-columns: 1.25fr 0.75fr 0.75fr 0.75fr 0.5fr 32px; font-size: 0.6875rem; padding: 0.5rem; }
            .stats-row { grid-template-columns: 1fr 1fr 1fr; }
            .stat-value.large { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>Reaction Time Trainer</h1>
        <span>your reaction journal</span>
    </header>

    <div class="mode-selector">
        <button class="mode-btn active" data-mode="color">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
            Color
        </button>
        <button class="mode-btn" data-mode="shape">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 20 2 20"/></svg>
            Shape
        </button>
        <button class="mode-btn" data-mode="sound" id="sound-mode-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            Sound
        </button>
    </div>

    <div class="reaction-area" id="area" data-state="idle">
    <span class="main-text" id="main-text">
      <span class="fine-only">Press Space to begin</span>
      <span class="coarse-only">Tap to begin</span>
    </span>
        <span class="sub-text" id="sub-text"></span>
        <div class="accuracy-badge" id="accuracy-badge" style="display:none"></div>
    </div>

    <div class="stats-row">
        <div class="stat">
            <div class="stat-label">Current</div>
            <div class="stat-value large" id="stat-current">—</div>
            <div class="alltime-badge" id="alltime-badge">⚡ New all-time best</div>
        </div>
        <div class="stat">
            <div class="stat-label">Average</div>
            <div class="stat-value medium" id="stat-avg">—</div>
            <div class="stat-ms">ms</div>
        </div>
        <div class="stat">
            <div class="stat-label">Best</div>
            <div class="stat-value medium" id="stat-best">—</div>
            <div class="stat-ms">ms</div>
        </div>
    </div>

    <div class="warmup-line" id="warmup-line"></div>

    <div class="section patterns-section" id="patterns-section">
        <div class="section-title">Your patterns</div>
        <div class="pattern-bars" id="pattern-bars"></div>
        <div class="pattern-insight" id="pattern-insight"></div>
    </div>

    <div class="section">
        <div class="section-title">Session log</div>
        <div class="session-log" id="session-log"></div>
    </div>

    <div class="section">
        <button class="settings-toggle" id="settings-toggle">
            <span class="arrow">▶</span> Settings
        </button>
        <div class="settings-body" id="settings-body">
            <div class="settings-grid">
                <div>
                    <label for="delay-min">Min delay (ms)</label>
                    <input type="number" id="delay-min" min="500" max="4000" step="100" value="1500">
                </div>
                <div>
                    <label for="delay-max">Max delay (ms)</label>
                    <input type="number" id="delay-max" min="1000" max="8000" step="100" value="4000">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (() => {
        // ── DOM references ──
        const area = document.getElementById('area');
        const mainText = document.getElementById('main-text');
        const subText = document.getElementById('sub-text');
        const accuracyBadge = document.getElementById('accuracy-badge');
        const statCurrent = document.getElementById('stat-current');
        const statAvg = document.getElementById('stat-avg');
        const statBest = document.getElementById('stat-best');
        const alltimeBadge = document.getElementById('alltime-badge');
        const warmupLine = document.getElementById('warmup-line');
        const sessionLogEl = document.getElementById('session-log');
        const patternsSection = document.getElementById('patterns-section');
        const patternBars = document.getElementById('pattern-bars');
        const patternInsight = document.getElementById('pattern-insight');
        const settingsToggle = document.getElementById('settings-toggle');
        const settingsBody = document.getElementById('settings-body');
        const delayMinInput = document.getElementById('delay-min');
        const delayMaxInput = document.getElementById('delay-max');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const soundModeBtn = document.getElementById('sound-mode-btn');

        // ── State ──
        let sessions = [];
        let currentSession = null;
        let testState = 'idle'; // idle | waiting | fakeout | active | result | early
        let activeMode = 'color';
        let startTime = 0;
        let timeoutId = null;
        let fakeoutTimeoutId = null;
        let lastTrialTimestamp = 0;
        let audioCtx = null;
        let webAudioAvailable = true;
        let expandedSessionId = null;
        const SESSION_GAP_MS = 3 * 60 * 1000;

        // ── Session management ──
        const loadSessions = () => {
            try {
                const raw = localStorage.getItem('reaction_sessions');
                if (raw) sessions = JSON.parse(raw);
                if (!Array.isArray(sessions)) sessions = [];
            } catch {
                sessions = [];
            }
        };

        const saveSessions = () => {
            try {
                localStorage.setItem('reaction_sessions', JSON.stringify(sessions));
            } catch { /* storage full or unavailable */ }
        };

        const ensureSession = () => {
            const now = Date.now();
            if (currentSession && (now - lastTrialTimestamp) > SESSION_GAP_MS && currentSession.trials.length > 0) {
                currentSession = null;
            }
            if (!currentSession) {
                currentSession = {
                    id: now,
                    mode: activeMode,
                    trials: [],
                    startedAt: new Date().toISOString()
                };
                sessions.push(currentSession);
            }
            currentSession.mode = activeMode;
        };

        // ── Audio ──
        const initAudio = () => {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch {
                webAudioAvailable = false;
                if (activeMode === 'sound') {
                    activeMode = 'color';
                    updateModeUI();
                }
                soundModeBtn.style.display = 'none';
            }
        };

        const playTone = (freq, duration, volume) => {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
            gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + duration / 1000 - 0.01);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration / 1000);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration / 1000);
        };

        // ── Core test logic ──
        const getDelay = () => {
            const min = parseInt(delayMinInput.value) || 1500;
            const max = parseInt(delayMaxInput.value) || 4000;
            return min + Math.random() * (Math.max(max, min + 500) - min);
        };

        const shouldFakeout = () => Math.random() < (1 / 6);

        const startTest = () => {
            if (testState === 'waiting' || testState === 'fakeout' || testState === 'active') return;
            initAudio();
            ensureSession();
            testState = 'waiting';
            area.dataset.state = 'waiting';
            area.className = 'reaction-area';
            mainText.textContent = 'Wait\u2026';
            subText.textContent = '';
            accuracyBadge.style.display = 'none';
            alltimeBadge.classList.remove('visible');
            clearShapeStimulus();
            showSessionAccuracy();

            const delay = getDelay();
            const doFakeout = shouldFakeout();

            if (doFakeout) {
                const fakeoutTime = 400 + Math.random() * (delay - 800);
                fakeoutTimeoutId = setTimeout(() => {
                    if (testState !== 'waiting') return;
                    testState = 'fakeout';
                    triggerFakeout();
                }, fakeoutTime);
            }

            timeoutId = setTimeout(() => {
                if (testState !== 'waiting' && testState !== 'fakeout') return;
                showStimulus();
            }, delay);
        };

        const triggerFakeout = () => {
            if (activeMode === 'color') {
                area.dataset.state = 'fakeout';
                setTimeout(() => {
                    if (testState === 'fakeout') {
                        area.dataset.state = 'waiting';
                    }
                }, 300);
            } else if (activeMode === 'shape') {
                const shape = createShape(40, 0.2);
                area.appendChild(shape);
                setTimeout(() => { if (shape.parentNode) shape.remove(); }, 300);
            } else if (activeMode === 'sound') {
                playTone(220, 30, 0.15);
            }
        };

        const showStimulus = () => {
            testState = 'active';
            area.dataset.state = 'active';
            area.className = `reaction-area mode-${activeMode}`;

            if (activeMode === 'color') {
                mainText.textContent = 'GO!';
                subText.textContent = '';
            } else if (activeMode === 'shape') {
                mainText.textContent = '';
                subText.textContent = '';
                const shape = createShape(120, 1);
                area.appendChild(shape);
            } else if (activeMode === 'sound') {
                mainText.textContent = '🔊';
                subText.textContent = 'Click when you hear it';
                playTone(880, 150, 1.0);
            }

            startTime = performance.now();
        };

        const handleReaction = () => {
            if (testState === 'idle' || testState === 'result') {
                startTest();
                return;
            }

            if (testState === 'early') return;

            if (testState === 'waiting' || testState === 'fakeout') {
                clearTimeout(timeoutId);
                clearTimeout(fakeoutTimeoutId);
                testState = 'early';
                area.dataset.state = 'early';
                area.className = 'reaction-area';
                mainText.textContent = 'Too early';
                subText.textContent = '';
                clearShapeStimulus();
                ensureSession();
                currentSession.trials.push({ time: 0, falseStart: true, timestamp: new Date().toISOString() });
                lastTrialTimestamp = Date.now();
                saveSessions();
                updateSessionStats();
                showSessionAccuracy();
                setTimeout(() => {
                    testState = 'idle';
                    startTest();
                }, 1200);
                return;
            }

            if (testState === 'active') {
                const elapsed = Math.round(performance.now() - startTime);
                testState = 'result';
                area.dataset.state = 'idle';
                area.className = 'reaction-area';
                clearShapeStimulus();

                mainText.innerHTML = `<span class="result-time">${elapsed}<span class="result-unit">ms</span></span>`;
                const hint = window.matchMedia('(pointer: coarse)').matches ? 'tap to continue' : 'click or space to continue';
                subText.textContent = hint;

                currentSession.trials.push({ time: elapsed, falseStart: false, timestamp: new Date().toISOString() });
                lastTrialTimestamp = Date.now();
                saveSessions();
                updateSessionStats();
                renderSessionLog();
                checkAlltimeBest(elapsed);
                showSessionAccuracy();
            }
        };

        // ── Shape stimulus helpers ──
        const createShape = (size, opacity) => {
            const shapes = ['circle', 'triangle', 'square'];
            const chosen = shapes[Math.floor(Math.random() * shapes.length)];
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', size);
            svg.setAttribute('height', size);
            svg.setAttribute('viewBox', '0 0 100 100');
            svg.style.opacity = opacity;
            svg.classList.add('shape-stimulus');

            let el;
            if (chosen === 'circle') {
                el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                el.setAttribute('cx', '50'); el.setAttribute('cy', '50'); el.setAttribute('r', '45');
            } else if (chosen === 'triangle') {
                el = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                el.setAttribute('points', '50,5 95,90 5,90');
            } else {
                el = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                el.setAttribute('x', '10'); el.setAttribute('y', '10');
                el.setAttribute('width', '80'); el.setAttribute('height', '80');
            }
            el.setAttribute('fill', getComputedStyle(document.documentElement).getPropertyValue('--accent').trim());
            svg.appendChild(el);
            return svg;
        };

        const clearShapeStimulus = () => {
            area.querySelectorAll('.shape-stimulus').forEach(el => el.remove());
        };

        // ── Stats & warmup calculation ──
        const getValidTrials = (session) => session.trials.filter(t => !t.falseStart);
        const getFalseStarts = (session) => session.trials.filter(t => t.falseStart);

        const detectWarmup = (trials) => {
            if (trials.length < 5) return { warmupCount: 0, baseline: null };

            const times = trials.map(t => t.time);
            const rollingAvg = [];
            for (let i = 0; i < times.length; i++) {
                if (i < 2) { rollingAvg.push(null); continue; }
                rollingAvg.push((times[i] + times[i-1] + times[i-2]) / 3);
            }

            let warmupEnd = 0;
            for (let i = 3; i < rollingAvg.length && i <= 8; i++) {
                const prev = rollingAvg[i - 1];
                const curr = rollingAvg[i];
                if (prev && curr && Math.abs(curr - prev) / prev <= 0.1) {
                    warmupEnd = i - 2;
                    break;
                }
            }

            if (warmupEnd === 0 && times.length > 8) warmupEnd = 4;

            if (warmupEnd > 0 && warmupEnd < times.length) {
                const baselineTimes = times.slice(warmupEnd);
                const avg = baselineTimes.reduce((s, t) => s + t, 0) / baselineTimes.length;
                return { warmupCount: warmupEnd, baseline: Math.round(avg) };
            }

            return { warmupCount: 0, baseline: null };
        };

        const getSessionBaseline = (session) => {
            const valid = getValidTrials(session);
            if (valid.length === 0) return null;
            const { warmupCount, baseline } = detectWarmup(valid);
            if (baseline) return baseline;
            const times = valid.map(t => t.time);
            return Math.round(times.reduce((s, t) => s + t, 0) / times.length);
        };

        const updateSessionStats = () => {
            if (!currentSession) return;
            const valid = getValidTrials(currentSession);
            if (valid.length === 0) {
                statCurrent.textContent = '—';
                statAvg.textContent = '—';
                statBest.textContent = '—';
                warmupLine.classList.remove('visible');
                return;
            }

            const times = valid.map(t => t.time);
            const latest = times[times.length - 1];
            const avg = Math.round(times.reduce((s, t) => s + t, 0) / times.length);
            const best = Math.min(...times);

            statCurrent.innerHTML = `${latest}<span class="stat-ms"> ms</span>`;
            statAvg.textContent = avg;
            statBest.textContent = best;

            const { warmupCount, baseline } = detectWarmup(valid);
            if (baseline && warmupCount > 0) {
                warmupLine.innerHTML = `Warmup: ${warmupCount} trials → <span class="baseline">Baseline: ${baseline}ms</span>`;
                warmupLine.classList.add('visible');
            } else {
                warmupLine.classList.remove('visible');
            }
        };

        const checkAlltimeBest = (time) => {
            let allBest = Infinity;
            for (const s of sessions) {
                if (s === currentSession) continue;
                for (const t of s.trials) {
                    if (!t.falseStart && t.time < allBest) allBest = t.time;
                }
            }
            if (time < allBest && allBest !== Infinity) {
                alltimeBadge.classList.add('visible');
            } else {
                alltimeBadge.classList.remove('visible');
            }
        };

        const showSessionAccuracy = () => {
            if (!currentSession || currentSession.trials.length < 2) {
                accuracyBadge.style.display = 'none';
                return;
            }
            const total = currentSession.trials.length;
            const falseStarts = getFalseStarts(currentSession).length;
            if (falseStarts === 0) { accuracyBadge.style.display = 'none'; return; }
            const acc = Math.round(((total - falseStarts) / total) * 100);
            accuracyBadge.textContent = `Accuracy: ${acc}%`;
            accuracyBadge.style.display = 'block';
        };

        // ── Rendering / UI ──
        const updateModeUI = () => {
            modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === activeMode));
        };

        const modeIcon = (mode) => {
            if (mode === 'color') return '◼';
            if (mode === 'shape') return '△';
            if (mode === 'sound') return '🔊';
            return '';
        };

        const formatDate = (iso) => {
            const d = new Date(iso);
            const now = new Date();
            const pad = n => String(n).padStart(2, '0');
            const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
            const isToday = d.toDateString() === now.toDateString();
            const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
            const isYesterday = d.toDateString() === yesterday.toDateString();
            if (isToday) return `Today ${time}`;
            if (isYesterday) return `Yesterday ${time}`;
            return `${pad(d.getDate())}.${pad(d.getMonth()+1)} ${time}`;
        };

        const renderSessionLog = () => {
            const displaySessions = sessions
                .filter(s => s.trials.length > 0)
                .slice(-20)
                .reverse();

            if (displaySessions.length === 0) {
                sessionLogEl.innerHTML = '<div class="session-empty">No sessions yet. Start testing to build your log.</div>';
                return;
            }

            let html = '';
            for (const s of displaySessions) {
                const valid = getValidTrials(s);
                const baseline = getSessionBaseline(s);
                const best = valid.length > 0 ? Math.min(...valid.map(t => t.time)) : '—';
                const baselineStr = baseline ? `${baseline}ms` : '—';
                const bestStr = best !== '—' ? `${best}ms` : '—';
                const isExpanded = expandedSessionId === s.id;

                html += `<div class="session-row" data-sid="${s.id}">
        <span class="date">${formatDate(s.startedAt)}</span>
        <span class="baseline-val">${baselineStr}</span>
        <span class="best-val">${bestStr}</span>
        <span class="trials-val">${valid.length} trials</span>
        <span class="mode-icon">${modeIcon(s.mode)}</span>
        <span class="expand-col">${isExpanded ? '▼' : '▶'}</span>
      </div>`;

                html += `<div class="session-detail${isExpanded ? ' open' : ''}" data-detail="${s.id}">
        <span class="sparkline-label">${valid.length} trials:</span>
        <canvas class="sparkline" data-sparkline="${s.id}" width="120" height="30" style="width:60px;height:30px;"></canvas>
      </div>`;
            }

            sessionLogEl.innerHTML = html;

            sessionLogEl.querySelectorAll('.session-row').forEach(row => {
                row.addEventListener('click', () => {
                    const sid = parseInt(row.dataset.sid);
                    expandedSessionId = expandedSessionId === sid ? null : sid;
                    renderSessionLog();
                });
            });

            // Draw sparklines for expanded sessions
            if (expandedSessionId) {
                const canvas = sessionLogEl.querySelector(`canvas[data-sparkline="${expandedSessionId}"]`);
                if (canvas) {
                    const session = sessions.find(s => s.id === expandedSessionId);
                    if (session) drawSparkline(canvas, getValidTrials(session).map(t => t.time));
                }
            }

            renderPatterns();
        };

        const drawSparkline = (canvas, data) => {
            if (data.length < 2) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = w / 2 + 'px';
            canvas.style.height = h / 2 + 'px';

            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 1;
            const pad = 2;
            const drawW = w - pad * 2;
            const drawH = h - pad * 2;

            ctx.beginPath();
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            ctx.lineWidth = 1.5;
            ctx.lineJoin = 'round';

            for (let i = 0; i < data.length; i++) {
                const x = pad + (i / (data.length - 1)) * drawW;
                const y = pad + drawH - ((data[i] - min) / range) * drawH;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        };

        // ── Patterns / time-of-day ──
        const renderPatterns = () => {
            const completedSessions = sessions.filter(s => getValidTrials(s).length >= 3);
            if (completedSessions.length < 5) {
                patternsSection.classList.remove('visible');
                return;
            }

            const periods = { Morning: [], Afternoon: [], Evening: [], Night: [] };

            for (const s of completedSessions) {
                const h = new Date(s.startedAt).getHours();
                const baseline = getSessionBaseline(s);
                if (!baseline) continue;
                if (h >= 6 && h < 12) periods.Morning.push(baseline);
                else if (h >= 12 && h < 18) periods.Afternoon.push(baseline);
                else if (h >= 18 && h < 24) periods.Evening.push(baseline);
                else periods.Night.push(baseline);
            }

            const avgs = {};
            let bestPeriod = null;
            let bestAvg = Infinity;
            let maxAvg = 0;

            for (const [period, vals] of Object.entries(periods)) {
                if (vals.length > 0) {
                    const avg = Math.round(vals.reduce((s, v) => s + v, 0) / vals.length);
                    avgs[period] = avg;
                    if (avg > maxAvg) maxAvg = avg;
                    if (avg < bestAvg) { bestAvg = avg; bestPeriod = period; }
                } else {
                    avgs[period] = null;
                }
            }

            if (!bestPeriod) { patternsSection.classList.remove('visible'); return; }

            patternsSection.classList.add('visible');

            let html = '';
            for (const [period, avg] of Object.entries(avgs)) {
                const pct = avg ? Math.round((avg / maxAvg) * 100) : 0;
                const isBest = period === bestPeriod;
                html += `<div class="pattern-row">
        <span class="pattern-label">${period}</span>
        <div class="pattern-bar-bg">
          ${avg ? `<div class="pattern-bar${isBest ? ' best' : ''}" style="width:${pct}%"></div>` : ''}
        </div>
        <span class="pattern-val">${avg ? avg + 'ms' : '—'}</span>
      </div>`;
            }
            patternBars.innerHTML = html;

            const periodLower = bestPeriod.toLowerCase();
            const count = periods[bestPeriod].length;
            patternInsight.innerHTML = `You're fastest in the <strong>${periodLower}</strong> (${bestAvg}ms avg across ${count} sessions)`;
        };

        // ── Settings ──
        settingsToggle.addEventListener('click', () => {
            const open = settingsBody.classList.toggle('open');
            settingsToggle.querySelector('.arrow').textContent = open ? '▼' : '▶';
        });

        // ── Event listeners ──
        area.addEventListener('click', (e) => {
            e.preventDefault();
            handleReaction();
        });

        area.addEventListener('touchend', (e) => {
            e.preventDefault();
        });

        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (testState === 'waiting' || testState === 'active' || testState === 'fakeout') return;
                const mode = btn.dataset.mode;
                if (mode === 'sound' && !webAudioAvailable) return;
                activeMode = mode;
                updateModeUI();
                if (testState === 'idle' || testState === 'result') {
                    testState = 'idle';
                    area.dataset.state = 'idle';
                    area.className = 'reaction-area';
                    const hint = window.matchMedia('(pointer: coarse)').matches ? 'Tap to begin' : 'Press Space to begin';
                    mainText.textContent = hint;
                    subText.textContent = '';
                }
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Enter') {
                const tag = document.activeElement?.tagName;
                if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
                e.preventDefault();
                handleReaction();
            }
        });

        // Prevent focus ring on click but keep for keyboard
        area.addEventListener('mousedown', (e) => { e.preventDefault(); });

        // ── Init ──
        const init = () => {
            loadSessions();

            // Check Web Audio support
            try {
                const test = new (window.AudioContext || window.webkitAudioContext)();
                test.close();
            } catch {
                webAudioAvailable = false;
                soundModeBtn.style.display = 'none';
            }

            renderSessionLog();
            updateModeUI();
        };

        init();
    })();
</script>
<script src="../logo.js"></script>
</body>
</html>
