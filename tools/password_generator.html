<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
    <title>Password Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --blue: #2563eb;
            --blue-h: #1d4ed8;
            --green: #16a34a;
            --amber: #d97706;
            --red: #dc2626;
            --bg: #f1f5f9;
            --card: #fff;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --r: 10px
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            border-radius: var(--r);
            box-shadow: 0 1px 3px rgba(0, 0, 0, .08), 0 4px 24px rgba(0, 0, 0, .06);
            padding: 28px
        }

        h1 {
            font-size: 1.25rem;
            text-align: center;
            margin-bottom: 2px
        }

        .sub {
            text-align: center;
            color: var(--muted);
            font-size: .85rem;
            margin-bottom: 22px
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            border-radius: 8px;
            padding: 3px;
            margin-bottom: 20px
        }

        .tab {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            font-size: .875rem;
            font-weight: 500;
            color: var(--muted);
            transition: all .2s
        }

        .tab.active {
            background: var(--card);
            color: var(--text);
            box-shadow: 0 1px 3px rgba(0, 0, 0, .1)
        }

        .pw-display {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 14px;
            margin-bottom: 6px;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            transition: border-color .2s
        }

        .pw-display.copied {
            border-color: var(--green)
        }

        .pw-text {
            flex: 1;
            font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 1.05rem;
            word-break: break-all;
            line-height: 1.6;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis
        }

        .pw-text.wrap {
            white-space: normal
        }

        .c-upper {
            color: #2563eb
        }

        .c-num {
            color: #d97706
        }

        .c-sym {
            color: #dc2626
        }

        .pw-actions {
            display: flex;
            gap: 2px;
            flex-shrink: 0
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            transition: all .15s
        }

        .icon-btn:hover {
            background: var(--border);
            color: var(--text)
        }

        .icon-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 18px;
            padding: 0 2px
        }

        .stat {
            font-size: .78rem;
            color: var(--muted)
        }

        .stat b {
            color: var(--text);
            font-weight: 600
        }

        .meter {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-bottom: 14px;
            overflow: hidden
        }

        .meter-fill {
            height: 100%;
            border-radius: 3px;
            width: 0;
            transition: all .4s ease
        }

        .m-weak {
            background: var(--red)
        }

        .m-fair {
            background: var(--amber)
        }

        .m-good {
            background: #22c55e
        }

        .m-strong {
            background: var(--green)
        }

        .section {
            margin-bottom: 16px
        }

        .section-label {
            font-size: .8rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 8px
        }

        .range-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px
        }

        .range-row label {
            font-size: .9rem;
            white-space: nowrap;
            min-width: 90px
        }

        .range-row input[type=range] {
            flex: 1;
            accent-color: var(--blue);
            height: 6px
        }

        .range-val {
            font-weight: 700;
            font-size: .9rem;
            min-width: 24px;
            text-align: right;
            font-variant-numeric: tabular-nums
        }

        .presets {
            display: flex;
            gap: 6px;
            margin-bottom: 14px
        }

        .preset {
            flex: 1;
            padding: 6px 4px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--card);
            cursor: pointer;
            font-size: .8rem;
            text-align: center;
            transition: all .15s;
            color: var(--muted)
        }

        .preset:hover, .preset.active {
            border-color: var(--blue);
            color: var(--blue);
            background: #eff6ff
        }

        .opt-grid {
            display: grid;
            grid-template-columns:1fr 1fr;
            gap: 8px 16px
        }

        .opt {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            font-size: .875rem
        }

        .tog {
            position: relative;
            width: 40px;
            height: 22px;
            flex-shrink: 0
        }

        .tog input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute
        }

        .tog .sl {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #cbd5e1;
            border-radius: 22px;
            transition: .2s
        }

        .tog .sl::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: .2s
        }

        .tog input:checked + .sl {
            background: var(--blue)
        }

        .tog input:checked + .sl::before {
            transform: translateX(18px)
        }

        .custom-sym {
            margin-top: 8px;
            margin-bottom: 4px
        }

        .custom-sym input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: monospace;
            font-size: .85rem
        }

        .custom-sym .hint {
            font-size: .75rem;
            color: var(--muted);
            margin-top: 4px
        }

        .sep-row {
            display: flex;
            gap: 4px;
            margin-bottom: 10px
        }

        .sep-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--card);
            cursor: pointer;
            font-family: monospace;
            font-size: .85rem;
            color: var(--muted);
            transition: all .15s
        }

        .sep-btn:hover, .sep-btn.active {
            border-color: var(--blue);
            color: var(--blue);
            background: #eff6ff
        }

        .gen-btn {
            width: 100%;
            padding: 13px;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: var(--r);
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
            margin-top: 4px
        }

        .gen-btn:hover {
            background: var(--blue-h)
        }

        .pane {
            display: none
        }

        .pane.active {
            display: block
        }

        @media (max-width: 480px) {
            .opt-grid {
                grid-template-columns:1fr
            }

            .stats {
                flex-direction: column;
                gap: 4px
            }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Password Generator</h1>
    <p class="sub">Cryptographically secure passwords & passphrases</p>
    <div class="tabs">
        <button class="tab active" data-mode="password">Password</button>
        <button class="tab" data-mode="passphrase">Passphrase</button>
    </div>
    <div class="pw-display" id="pw-display">
        <div class="pw-text" id="pw-text"></div>
        <div class="pw-actions">
            <button class="icon-btn" id="btn-vis" title="Toggle visibility">
                <svg viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
            <button class="icon-btn" id="btn-copy" title="Copy">
                <svg viewBox="0 0 24 24">
                    <rect x="9" y="9" width="13" height="13" rx="2"/>
                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
            </button>
            <button class="icon-btn" id="btn-refresh" title="Regenerate">
                <svg viewBox="0 0 24 24">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
                </svg>
            </button>
        </div>
    </div>
    <div class="meter">
        <div class="meter-fill" id="meter-fill"></div>
    </div>
    <div class="stats">
        <span class="stat">Strength: <b id="s-label">—</b></span>
        <span class="stat">Entropy: <b id="s-entropy">—</b></span>
        <span class="stat">Crack time: <b id="s-crack">—</b></span>
    </div>
    <!-- PASSWORD PANE -->
    <div class="pane active" id="pane-password">
        <div class="range-row">
            <label for="pw-len">Length: <span class="range-val" id="pw-len-val">16</span></label>
            <input type="range" id="pw-len" min="4" max="80" value="16">
        </div>
        <div class="presets">
            <button class="preset" data-l="6" data-c="n">PIN</button>
            <button class="preset" data-l="10" data-c="lun">Basic</button>
            <button class="preset active" data-l="16" data-c="luns">Strong</button>
            <button class="preset" data-l="24" data-c="luns">Ultra</button>
        </div>
        <div class="opt-grid">
            <div class="opt"><span>Lowercase (a–z)</span><label class="tog"><input type="checkbox" id="o-lower" checked><span
                    class="sl"></span></label></div>
            <div class="opt"><span>Uppercase (A–Z)</span><label class="tog"><input type="checkbox" id="o-upper" checked><span
                    class="sl"></span></label></div>
            <div class="opt"><span>Numbers (0–9)</span><label class="tog"><input type="checkbox" id="o-num"
                                                                                 checked><span
                    class="sl"></span></label></div>
            <div class="opt"><span>Symbols</span><label class="tog"><input type="checkbox" id="o-sym" checked><span
                    class="sl"></span></label></div>
            <div class="opt"><span>Exclude similar (1lI0O)</span><label class="tog"><input type="checkbox"
                                                                                           id="o-excl"><span
                    class="sl"></span></label></div>
            <div class="opt"><span>Require each type</span><label class="tog"><input type="checkbox" id="o-ensure"
                                                                                     checked><span
                    class="sl"></span></label></div>
        </div>
        <div class="custom-sym" id="custom-sym-wrap">
            <input type="text" id="custom-sym" value="!@#$%^&*()-_=+[]{}|;:,.<>?/" placeholder="Custom symbols">
            <p class="hint">Edit to restrict which symbols are used</p>
        </div>
    </div>
    <!-- PASSPHRASE PANE -->
    <div class="pane" id="pane-passphrase">
        <div class="range-row">
            <label for="pp-words">Words: <span class="range-val" id="pp-words-val">5</span></label>
            <input type="range" id="pp-words" min="3" max="10" value="5">
        </div>
        <div class="section">
            <div class="section-label">Separator</div>
            <div class="sep-row">
                <button class="sep-btn active" data-sep="-">-</button>
                <button class="sep-btn" data-sep=".">.</button>
                <button class="sep-btn" data-sep="_">_</button>
                <button class="sep-btn" data-sep=" ">space</button>
            </div>
        </div>
        <div class="opt-grid">
            <div class="opt"><span>Capitalize words</span><label class="tog"><input type="checkbox" id="pp-cap" checked><span
                    class="sl"></span></label></div>
            <div class="opt"><span>Append number</span><label class="tog"><input type="checkbox" id="pp-num"
                                                                                 checked><span
                    class="sl"></span></label></div>
        </div>
    </div>
    <button class="gen-btn" id="btn-gen">Generate</button>
</div>
<script>
    const WORDS = "able acid aged area army away baby back ball band bank base bath bear beat been bell belt best bird bite blow blue boat body bolt bond bone book born boss both burn cage cake call calm came camp card care case cash cast cave cell chat chip city clan clay clip club clue coal coat code cold come cook cool cope copy cord core cost crew crop cube cult cure cute cycle dare dark data dawn dead deal dear debt deep deer deny desk diet dirt dish dock does dome done door dose down draw drew drop drum dual dumb dump dust duty each earn ease east easy edge else even ever evil exam face fact fade fail fair fall fame farm fast fate fear feed feel feet fell file fill film find fine fire firm fish five flag flat flew flip flow foam fold folk fond food foot ford form fort foul four free from fuel full fund fury gain game gang gate gave gaze gear gene gift girl give glad glow glue goal goes gold golf gone good grab gray grew grid grin grip grow gulf gust hack hair half hall hand hang hard harm hate have head heal heap hear heat held help here hero hide high hill hint hire hold hole holy home hook hope horn host hour huge hung hunt hurt icon idea inch info into iron isle item jack jail jazz join joke jump jury just keen keep kept kick kind king kiss knee knew knob know lack lake lamp land lane last late lawn lead leaf lean left lend less life lift like limb limp line link lion list live load loan lock logo lone long look lord lose loss lost loud love luck made mail main make male mall many mark mask mass mate maze meal mean meat meet melt memo menu mere mesh mild mile milk mill mind mine mint miss mode mold mood moon more moss most move much must myth nail name navy near neat neck need nest next nice nine node none norm nose note noun odds okay once only onto open oral oven over pace pack page paid pair pale palm park part pass past path peak peer pick pier pile pine pink pipe plan play plot plug plus poem poet pole poll pond pool poor pope port pose post pour pray prey pull pump pure push quit race rack rage raid rail rain rank rare rate read real rear rely rent rest rice rich ride ring rise risk road roar rock rode role roll roof room root rope rose ruin rule rush safe sake sale salt same sand sang save seal seat seed seek seem seen self sell send sent shed ship shop shot show shut sick side sign silk sing sink site size skin slam slap slim slip slot slow snap snow soak soar soft soil sold sole some song soon sort soul spin spot star stay stem step stir stop such suit sure surf swim tail take tale tall tank tape task taxi team tear tell tend tent term test text than them then thin this thus tide tidy tied till time tiny tire toad told toll tone took tool tops tore torn tour town trap tree trim trip true tube tuck tune turn twin type ugly unit upon urge used user vale vast very view vine visa void vote wade wage wait wake walk wall want ward warm warn wash wave weak wear weed week well went were west what when whom wide wife wild will wind wine wing wire wise wish with wolf wood wool word wore work worm worn wrap yard year zero zone".split(" ");
    const CHARS = {
        l: 'abcdefghijklmnopqrstuvwxyz',
        u: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        n: '0123456789',
        similar: '1lI0Oo'
    };
    let mode = 'password', separator = '-', currentPw = '', visible = true;
    const $ = id => document.getElementById(id);

    function rand(max) {
        const a = new Uint32Array(1), lim = Math.floor(4294967295 / max) * max;
        do {
            crypto.getRandomValues(a)
        } while (a[0] >= lim);
        return a[0] % max
    }

    function pick(arr) {
        return arr[rand(arr.length)]
    }

    function escHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    }

    function genPassword() {
        const len = +$('pw-len').value, useLower = $('o-lower').checked, useUpper = $('o-upper').checked,
            useNum = $('o-num').checked, useSym = $('o-sym').checked, excl = $('o-excl').checked,
            ensure = $('o-ensure').checked;
        if (!useLower && !useUpper && !useNum && !useSym) {
            $('o-lower').checked = true;
            return genPassword()
        }
        const symChars = $('custom-sym').value.trim() || "!@#$%^&*()-_=+[]{}|;:,.<>?/";
        let pool = '', types = [];
        if (useLower) {
            pool += CHARS.l;
            types.push(CHARS.l)
        }
        if (useUpper) {
            pool += CHARS.u;
            types.push(CHARS.u)
        }
        if (useNum) {
            pool += CHARS.n;
            types.push(CHARS.n)
        }
        if (useSym) {
            pool += symChars;
            types.push(symChars)
        }
        if (excl) for (const c of CHARS.similar) pool = pool.replaceAll(c, '');
        let pw = '';
        if (ensure) for (let t of types) {
            let f = t;
            if (excl) for (const c of CHARS.similar) f = f.replaceAll(c, '');
            if (f.length) pw += f[rand(f.length)]
        }
        while (pw.length < len) pw += pool[rand(pool.length)];
        const arr = [...pw];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = rand(i + 1);
            [arr[i], arr[j]] = [arr[j], arr[i]]
        }
        currentPw = arr.join('');
        renderPw();
        updateStats(Math.log2(pool.length) * len)
    }

    function genPassphrase() {
        const count = +$('pp-words').value, cap = $('pp-cap').checked, addNum = $('pp-num').checked;
        let words = [];
        for (let i = 0; i < count; i++) {
            let w = WORDS[rand(WORDS.length)];
            if (cap) w = w[0].toUpperCase() + w.slice(1);
            words.push(w)
        }
        let result = words.join(separator);
        if (addNum) result += separator + rand(100);
        currentPw = result;
        const bitsPerWord = Math.log2(WORDS.length), entropy = count * bitsPerWord + (addNum ? Math.log2(100) : 0);
        renderPw();
        updateStats(entropy)
    }

    function renderPw() {
        const el = $('pw-text');
        if (!visible) {
            el.textContent = '•'.repeat(Math.min(currentPw.length, 30));
            el.classList.remove('wrap');
            return
        }
        if (mode === 'passphrase') {
            el.textContent = currentPw;
            el.classList.add('wrap');
            return
        }
        el.classList.add('wrap');
        el.innerHTML = currentPw.split('').map(c => {
            let cls = '';
            if (/[A-Z]/.test(c)) cls = 'c-upper'; else if (/[0-9]/.test(c)) cls = 'c-num'; else if (!/[a-z]/.test(c)) cls = 'c-sym';
            return `<span class="${cls}">${escHtml(c)}</span>`
        }).join('')
    }

    function updateStats(entropy) {
        const e = Math.round(entropy), secs = Math.pow(2, entropy) / 1e10;
        let label, cls, pct;
        if (e < 30) {
            label = 'Weak';
            cls = 'm-weak';
            pct = 20
        } else if (e < 50) {
            label = 'Fair';
            cls = 'm-fair';
            pct = 40
        } else if (e < 70) {
            label = 'Good';
            cls = 'm-good';
            pct = 65
        } else if (e < 90) {
            label = 'Strong';
            cls = 'm-strong';
            pct = 85
        } else {
            label = 'Very Strong';
            cls = 'm-strong';
            pct = 100
        }
        $('s-label').textContent = label;
        $('s-entropy').textContent = e + ' bits';
        $('s-crack').textContent = formatTime(secs);
        const mf = $('meter-fill');
        mf.className = 'meter-fill ' + cls;
        mf.style.width = pct + '%'
    }

    function formatTime(s) {
        if (s < 1) return 'instant';
        if (s < 60) return Math.round(s) + 's';
        if (s < 3600) return Math.round(s / 60) + 'm';
        if (s < 86400) return Math.round(s / 3600) + 'h';
        if (s < 3.156e7) return Math.round(s / 86400) + ' days';
        if (s < 3.156e9) return Math.round(s / 3.156e7) + ' yrs';
        if (s < 3.156e12) return (s / 3.156e9).toFixed(1) + 'K yrs';
        if (s < 3.156e15) return (s / 3.156e12).toFixed(1) + 'M yrs';
        if (s < 3.156e18) return (s / 3.156e15).toFixed(1) + 'B yrs';
        return (s / 3.156e18).toFixed(1) + 'T yrs'
    }

    function generate() {
        mode === 'password' ? genPassword() : genPassphrase()
    }

    // Tabs
    document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        mode = t.dataset.mode;
        $('pane-password').classList.toggle('active', mode === 'password');
        $('pane-passphrase').classList.toggle('active', mode === 'passphrase');
        generate()
    }));
    // Password controls
    $('pw-len').addEventListener('input', () => {
        $('pw-len-val').textContent = $('pw-len').value
    });
    $('pw-len').addEventListener('change', generate);
    ['o-lower', 'o-upper', 'o-num', 'o-sym', 'o-excl', 'o-ensure'].forEach(id => $(id).addEventListener('change', generate));
    $('custom-sym').addEventListener('input', () => {
        if ($('custom-sym').value.trim()) $('o-sym').checked = true;
        generate()
    });
    $('o-sym').addEventListener('change', () => {
        $('custom-sym-wrap').style.display = $('o-sym').checked ? '' : 'none';
        generate()
    });
    // Presets
    document.querySelectorAll('.preset').forEach(b => b.addEventListener('click', () => {
        document.querySelectorAll('.preset').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        $('pw-len').value = b.dataset.l;
        $('pw-len-val').textContent = b.dataset.l;
        const c = b.dataset.c;
        $('o-lower').checked = c.includes('l');
        $('o-upper').checked = c.includes('u');
        $('o-num').checked = c.includes('n');
        $('o-sym').checked = c.includes('s');
        $('custom-sym-wrap').style.display = c.includes('s') ? '' : 'none';
        generate()
    }));
    // Passphrase controls
    $('pp-words').addEventListener('input', () => {
        $('pp-words-val').textContent = $('pp-words').value
    });
    $('pp-words').addEventListener('change', generate);
    ['pp-cap', 'pp-num'].forEach(id => $(id).addEventListener('change', generate));
    document.querySelectorAll('.sep-btn').forEach(b => b.addEventListener('click', () => {
        document.querySelectorAll('.sep-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        separator = b.dataset.sep;
        generate()
    }));
    // Actions
    $('btn-gen').addEventListener('click', generate);
    $('btn-refresh').addEventListener('click', generate);
    $('btn-copy').addEventListener('click', () => {
        if (!currentPw) return;
        navigator.clipboard.writeText(currentPw).then(() => {
            const d = $('pw-display');
            d.classList.add('copied');
            setTimeout(() => d.classList.remove('copied'), 800)
        })
    });
    $('btn-vis').addEventListener('click', () => {
        visible = !visible;
        renderPw()
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.target.matches('input[type=text]')) generate()
    });
    // Init
    generate();
</script>
<script src="../logo.js"></script>
</body>
</html>
