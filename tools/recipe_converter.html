<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Recipe Converter</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
			background: #F5F5F0;
			color: #1A1A1A;
			font-size: 15px;
			line-height: 1.5;
			min-height: 100vh;
		}

		.app {
			max-width: 1120px;
			margin: 0 auto;
			padding: 40px 24px;
		}

		.app-header {
			margin-bottom: 32px;
		}

		.app-title {
			font-size: 22px;
			font-weight: 600;
			letter-spacing: -0.02em;
			color: #1A1A1A;
		}

		.app-subtitle {
			font-size: 13px;
			color: #6B6B6B;
			margin-top: 4px;
		}

		.toolbar {
			display: flex;
			align-items: center;
			gap: 24px;
			margin-bottom: 20px;
			flex-wrap: wrap;
		}

		.toggle-group {
			display: flex;
			border: 1px solid #2D5A27;
			border-radius: 4px;
			overflow: hidden;
			flex-shrink: 0;
		}

		.toggle-btn {
			padding: 8px 18px;
			font-family: 'Inter', sans-serif;
			font-size: 13px;
			font-weight: 500;
			border: none;
			cursor: pointer;
			background: #FFFFFF;
			color: #2D5A27;
			transition: background-color 150ms, color 150ms;
			white-space: nowrap;
		}

		.toggle-btn.active {
			background: #2D5A27;
			color: #FFFFFF;
		}

		.toggle-btn:first-child {
			border-right: 1px solid #2D5A27;
		}

		.servings-control {
			display: flex;
			align-items: center;
			gap: 12px;
			flex-shrink: 0;
		}

		.servings-field {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.servings-label {
			font-size: 12px;
			font-weight: 500;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			color: #6B6B6B;
		}

		.servings-arrow {
			font-size: 16px;
			color: #6B6B6B;
			flex-shrink: 0;
		}

		.num-input-wrap {
			display: flex;
			align-items: center;
			border: 1px solid #E0E0E0;
			border-radius: 4px;
			overflow: hidden;
			background: #FFFFFF;
		}

		.num-btn {
			width: 30px;
			height: 32px;
			border: none;
			background: #FFFFFF;
			font-family: 'Inter', sans-serif;
			font-size: 16px;
			font-weight: 500;
			color: #1A1A1A;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			flex-shrink: 0;
		}

		.num-btn:hover { background: #F5F5F0; }

		.num-val {
			width: 36px;
			height: 32px;
			border: none;
			border-left: 1px solid #E0E0E0;
			border-right: 1px solid #E0E0E0;
			text-align: center;
			font-family: 'Inter', sans-serif;
			font-size: 14px;
			font-weight: 500;
			color: #1A1A1A;
			background: #FFFFFF;
		}

		.num-val:focus { outline: 2px solid #2D5A27; outline-offset: -2px; }

		.panels {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 20px;
			align-items: start;
		}

		.panel {
			background: #FFFFFF;
			border: 1px solid #E0E0E0;
			border-radius: 4px;
			display: flex;
			flex-direction: column;
		}

		.panel-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 12px 16px;
			border-bottom: 1px solid #E0E0E0;
		}

		.panel-label {
			font-size: 12px;
			font-weight: 500;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			color: #6B6B6B;
		}

		.btn-sm {
			font-family: 'Inter', sans-serif;
			font-size: 12px;
			font-weight: 500;
			padding: 4px 10px;
			border: 1px solid #E0E0E0;
			border-radius: 4px;
			background: #FFFFFF;
			color: #6B6B6B;
			cursor: pointer;
		}

		.btn-sm:hover { background: #F5F5F0; }

		.copy-btn {
			font-family: 'Inter', sans-serif;
			font-size: 12px;
			font-weight: 500;
			padding: 4px 10px;
			border: 1px solid #2D5A27;
			border-radius: 4px;
			background: #2D5A27;
			color: #FFFFFF;
			cursor: pointer;
			display: flex;
			align-items: center;
			gap: 5px;
			transition: opacity 150ms;
		}

		.copy-btn:hover { opacity: 0.85; }

		.copy-btn svg { width: 13px; height: 13px; fill: currentColor; }

		.copy-hint {
			font-size: 11px;
			color: #9B8E7E;
			margin-left: 6px;
		}

		.input-area {
			width: 100%;
			min-height: 420px;
			padding: 16px;
			border: none;
			font-family: 'Inter', sans-serif;
			font-size: 15px;
			line-height: 1.6;
			color: #1A1A1A;
			background: #FFFFFF;
			resize: vertical;
		}

		.input-area:focus { outline: none; }

		.input-area::placeholder { color: #9B8E7E; }

		.output-area {
			padding: 0;
			min-height: 420px;
			overflow-y: auto;
		}

		.output-line {
			padding: 6px 16px;
			font-size: 15px;
			line-height: 1.6;
		}

		.output-line:nth-child(odd) { background: #FAFAF8; }
		.output-line:nth-child(even) { background: #FFFFFF; }

		.output-line.unparsed { color: #9B8E7E; font-style: italic; }

		.placeholder-text {
			padding: 16px;
			color: #9B8E7E;
			font-style: italic;
			font-size: 15px;
			line-height: 1.8;
			white-space: pre-line;
		}

		@media (max-width: 768px) {
			.app { padding: 24px 16px; }
			.panels { grid-template-columns: 1fr; }
			.input-area { min-height: 240px; }
			.output-area { min-height: 200px; }
			.toolbar { gap: 16px; }
			.copy-hint { display: none; }
		}
	</style>
</head>
<body>
<div class="app">
	<header class="app-header">
		<div class="app-title">Recipe Converter</div>
		<div class="app-subtitle">Paste ingredients from any recipe — units convert automatically</div>
	</header>

	<div class="toolbar">
		<div class="toggle-group">
			<button class="toggle-btn active" data-dir="imperial-to-metric">Imperial → Metric</button>
			<button class="toggle-btn" data-dir="metric-to-imperial">Metric → Imperial</button>
		</div>

		<div class="servings-control">
			<div class="servings-field">
				<span class="servings-label">Original</span>
				<div class="num-input-wrap">
					<button class="num-btn" data-target="orig" data-delta="-1">−</button>
					<input type="number" class="num-val" id="servings-orig" value="1" min="1" max="99">
					<button class="num-btn" data-target="orig" data-delta="1">+</button>
				</div>
			</div>
			<span class="servings-arrow">→</span>
			<div class="servings-field">
				<span class="servings-label">Desired</span>
				<div class="num-input-wrap">
					<button class="num-btn" data-target="desired" data-delta="-1">−</button>
					<input type="number" class="num-val" id="servings-desired" value="1" min="1" max="99">
					<button class="num-btn" data-target="desired" data-delta="1">+</button>
				</div>
			</div>
		</div>
	</div>

	<div class="panels">
		<div class="panel">
			<div class="panel-header">
				<span class="panel-label">Ingredients</span>
				<button class="btn-sm" id="clear-btn">Clear</button>
			</div>
			<textarea class="input-area" id="input" placeholder="Paste your ingredients here…&#10;&#10;2 cups all-purpose flour&#10;1½ tsp baking powder&#10;¼ cup sugar&#10;1 cup milk&#10;2 large eggs&#10;3 tbsp butter, melted" spellcheck="false"></textarea>
		</div>

		<div class="panel">
			<div class="panel-header">
				<span class="panel-label">Converted</span>
				<div style="display:flex;align-items:center;">
					<button class="copy-btn" id="copy-btn">
						<svg id="copy-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="5" width="9" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M3 11V3a1 1 0 0 1 1-1h8" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
						<svg id="check-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="display:none"><path d="M3 8.5l3.5 3.5 6.5-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
						<span id="copy-label">Copy</span>
					</button>
					<span class="copy-hint">⌘⇧C</span>
				</div>
			</div>
			<div class="output-area" id="output"></div>
		</div>
	</div>
</div>

<script>
	(function() {
		'use strict';

		// ── Unicode fraction map ──
		const UNICODE_FRACS = {
			'½': 0.5, '⅓': 1/3, '⅔': 2/3, '¼': 0.25, '¾': 0.75,
			'⅛': 0.125, '⅜': 0.375, '⅝': 0.625, '⅞': 0.875, '⅕': 0.2,
			'⅖': 0.4, '⅗': 0.6, '⅘': 0.8, '⅙': 1/6, '⅚': 5/6
		};

		const WORD_NUMS = {
			'one':1,'two':2,'three':3,'four':4,'five':5,'six':6,
			'seven':7,'eight':8,'nine':9,'ten':10,'eleven':11,'twelve':12,
			'a':1,'an':1
		};

		// ── Unit system ──
		// type: 'volume' or 'mass'. toMetric: ml or g equivalent of 1 unit.
		const UNIT_DEFS = {
			tsp:   { type:'volume', ml:4.929 },
			tbsp:  { type:'volume', ml:14.787 },
			floz:  { type:'volume', ml:29.574 },
			cup:   { type:'volume', ml:236.588 },
			pint:  { type:'volume', ml:473.176 },
			quart: { type:'volume', ml:946.353 },
			gallon:{ type:'volume', ml:3785.41 },
			stick: { type:'mass',   g:113 },
			oz:    { type:'mass',   g:28.3495 },
			lb:    { type:'mass',   g:453.592 },
			ml:    { type:'volume', ml:1 },
			l:     { type:'volume', ml:1000 },
			g:     { type:'mass',   g:1 },
			kg:    { type:'mass',   g:1000 },
		};

		// Map every alias to canonical key
		const UNIT_ALIASES = {};
		function alias(canonical, ...names) { names.forEach(n => UNIT_ALIASES[n.toLowerCase()] = canonical); }

		alias('tsp','tsp','tsp.','tsps','teaspoon','teaspoons');
		alias('tbsp','tbsp','tbsp.','tbsps','tablespoon','tablespoons');
		alias('floz','fl oz','fl. oz','fl.oz','fluid oz','fluid ounce','fluid ounces');
		alias('cup','cup','cups','c');
		alias('pint','pint','pints','pt');
		alias('quart','quart','quarts','qt','qts');
		alias('gallon','gallon','gallons','gal');
		alias('stick','stick','sticks');
		alias('oz','oz','oz.','ounce','ounces');
		alias('lb','lb','lb.','lbs','lbs.','pound','pounds');
		alias('ml','ml','milliliter','milliliters','millilitre','millilitres');
		alias('l','l','liter','liters','litre','litres');
		alias('g','g','gram','grams','gramme','grammes');
		alias('kg','kg','kilogram','kilograms');

		// Compound (two-word) unit aliases – checked first
		const COMPOUND_UNITS = [
			['fl','oz'], ['fl.','oz'], ['fl.','oz.'], ['fluid','oz'],
			['fluid','ounce'], ['fluid','ounces'], ['fl','oz.']
		];

		// Units that are imperial (for direction logic)
		const IMPERIAL_UNITS = new Set(['tsp','tbsp','floz','cup','pint','quart','gallon','oz','lb','stick']);
		const METRIC_UNITS = new Set(['ml','l','g','kg']);

		// Pass-through "units" (not converted, but recognized so ingredient text is clean)
		const PASSTHROUGH_UNITS = new Set([
			'large','medium','small','clove','cloves','bunch','bunches',
			'can','cans','slice','slices','piece','pieces','head','heads',
			'sprig','sprigs','handful','handfuls','pinch','pinches','dash','dashes',
			'drop','drops','whole','pkg','package','packages','bag','bags',
			'box','boxes','jar','jars','bottle','bottles','sheet','sheets','ear','ears'
		]);

		// ── Parser ──
		function parseLine(raw) {
			let line = raw;
			// Strip list markers
			line = line.replace(/^[\s]*[\-\•\*]\s*/, '');
			line = line.replace(/^[\s]*\d+[\.\)]\s*/, '');
			line = line.trim();

			if (!line) return { raw, quantity: null, unit: null, ingredient: '', parsed: false, blank: true };

			let rest = line;
			let quantity = null;

			// Try to extract quantity from start
			// Pattern: optional word number, or numeric with optional unicode/ascii fraction
			const qResult = extractQuantity(rest);
			if (qResult) {
				quantity = qResult.value;
				rest = qResult.rest.trim();
			}

			// Try to detect hyphenated unit pattern in rest, e.g. "14-oz" before the unit lookup
			let hyphUnit = null;
			const hyphMatch = rest.match(/^(\d+\.?\d*)\s*-\s*([a-zA-Z.]+(?:\s+[a-zA-Z.]+)?)\s+/);
			if (hyphMatch) {
				const hCanon = resolveUnit(hyphMatch[2]);
				if (hCanon) {
					// Fold hyphenated amount into quantity
					const hVal = parseFloat(hyphMatch[1]);
					if (quantity !== null) {
						// "one 14-oz can" → quantity stays, we embed "14-oz" context into ingredient
						// Actually, the useful conversion: treat 14 oz as the quantity, "can" is the passthrough
						// Heuristic: if there's already a quantity (like "one"/"1"), multiply? No — "1 14-oz can" means 14 oz total
						// Let's use the hyphenated value as the primary quantity for conversion
						quantity = hVal * (quantity || 1);
					} else {
						quantity = hVal;
					}
					hyphUnit = hCanon;
					rest = rest.slice(hyphMatch[0].length).trim();
				}
			}

			// Try unit
			let unit = hyphUnit;
			if (!unit) {
				// Check compound units first (two words)
				const words = rest.split(/\s+/);
				if (words.length >= 2) {
					const twoWord = words[0].toLowerCase() + ' ' + words[1].toLowerCase();
					const canon = UNIT_ALIASES[twoWord];
					if (canon) {
						unit = canon;
						rest = words.slice(2).join(' ');
					}
				}
				if (!unit && words.length >= 1) {
					const oneWord = words[0].toLowerCase().replace(/[.,]+$/, '');
					const canon = UNIT_ALIASES[oneWord];
					if (canon) {
						unit = canon;
						rest = words.slice(1).join(' ');
					} else if (PASSTHROUGH_UNITS.has(oneWord)) {
						unit = '_' + oneWord; // prefix _ = passthrough
						rest = words.slice(1).join(' ');
					}
				}
			}

			// Clean up ingredient rest
			rest = rest.replace(/^[\s,\-]+/, '').trim();

			// "a pinch of X" → if unit is passthrough pinch and no quantity, set quantity 1
			if (quantity === null && unit && unit.startsWith('_')) {
				quantity = 1;
			}

			const parsed = quantity !== null;
			return { raw, quantity, unit, ingredient: rest || raw, parsed, blank: false };
		}

		function extractQuantity(str) {
			let s = str;
			let value = 0;
			let matched = false;

			// Word number at start? ("one", "two", "a", "an")
			const wordMatch = s.match(/^([a-zA-Z]+)\s+/);
			if (wordMatch && WORD_NUMS[wordMatch[1].toLowerCase()] !== undefined) {
				value = WORD_NUMS[wordMatch[1].toLowerCase()];
				s = s.slice(wordMatch[0].length);
				matched = true;

				// Check if followed by a unicode fraction
				const uf = s.match(new RegExp('^([' + Object.keys(UNICODE_FRACS).join('') + '])\\s*'));
				if (uf) {
					value += UNICODE_FRACS[uf[1]];
					s = s.slice(uf[0].length);
				}
				return { value, rest: s };
			}

			// Numeric patterns
			// Try: whole + unicode fraction (1½)
			const mixedUni = s.match(new RegExp('^(\\d+)\\s*([' + Object.keys(UNICODE_FRACS).join('') + '])\\s*'));
			if (mixedUni) {
				value = parseInt(mixedUni[1]) + UNICODE_FRACS[mixedUni[2]];
				return { value, rest: s.slice(mixedUni[0].length) };
			}

			// Standalone unicode fraction
			const uniOnly = s.match(new RegExp('^([' + Object.keys(UNICODE_FRACS).join('') + '])\\s*'));
			if (uniOnly) {
				return { value: UNICODE_FRACS[uniOnly[1]], rest: s.slice(uniOnly[0].length) };
			}

			// Mixed number with ASCII fraction: "1 1/2" or "1-1/2"
			const mixedAscii = s.match(/^(\d+)\s+(\d+)\s*\/\s*(\d+)\s*/);
			if (mixedAscii) {
				value = parseInt(mixedAscii[1]) + parseInt(mixedAscii[2]) / parseInt(mixedAscii[3]);
				return { value, rest: s.slice(mixedAscii[0].length) };
			}

			// Plain ASCII fraction: "1/2"
			const frac = s.match(/^(\d+)\s*\/\s*(\d+)\s*/);
			if (frac) {
				value = parseInt(frac[1]) / parseInt(frac[2]);
				return { value, rest: s.slice(frac[0].length) };
			}

			// Decimal or integer
			const dec = s.match(/^(\d+\.?\d*)\s*/);
			if (dec) {
				value = parseFloat(dec[1]);
				// Check for trailing unicode fraction
				const afterNum = s.slice(dec[0].length);
				const trailUni = afterNum.match(new RegExp('^([' + Object.keys(UNICODE_FRACS).join('') + '])\\s*'));
				if (trailUni) {
					value += UNICODE_FRACS[trailUni[1]];
					return { value, rest: afterNum.slice(trailUni[0].length) };
				}
				return { value, rest: s.slice(dec[0].length) };
			}

			return null;
		}

		function resolveUnit(str) {
			const s = str.toLowerCase().replace(/[.,]+$/, '');
			return UNIT_ALIASES[s] || null;
		}

		// ── Converter ──
		function convertItems(items, direction, scaleFactor) {
			return items.map(item => {
				if (!item.parsed || item.quantity === null) {
					return { ...item, displayQty: null, displayUnit: null, converted: false };
				}

				let qty = item.quantity * scaleFactor;
				let unit = item.unit;

				// Passthrough units: scale but don't convert
				if (!unit || unit.startsWith('_')) {
					const uLabel = unit ? unit.slice(1) : '';
					return {
						...item,
						displayQty: qty,
						displayUnit: uLabel,
						converted: true,
						isMetricResult: false,
						isImperialResult: false,
						isPassthrough: true
					};
				}

				const def = UNIT_DEFS[unit];
				if (!def) {
					return { ...item, displayQty: qty, displayUnit: unit, converted: true, isPassthrough: true };
				}

				const isImp = IMPERIAL_UNITS.has(unit);
				const isMet = METRIC_UNITS.has(unit);

				if (direction === 'imperial-to-metric' && isImp) {
					// Convert to metric
					if (def.type === 'volume') {
						let ml = qty * def.ml;
						return metricVolumeResult(item, ml);
					} else {
						let g = qty * def.g;
						return metricMassResult(item, g);
					}
				} else if (direction === 'metric-to-imperial' && isMet) {
					if (def.type === 'volume') {
						let ml = qty * def.ml;
						return imperialVolumeResult(item, ml);
					} else {
						let g = qty * def.g;
						return imperialMassResult(item, g);
					}
				} else {
					// Already in target system or unknown, just scale
					return {
						...item, displayQty: qty, displayUnit: unit,
						converted: true, isPassthrough: true,
						isMetricResult: isMet, isImperialResult: isImp
					};
				}
			});
		}

		function metricVolumeResult(item, ml) {
			if (ml >= 1000) {
				return { ...item, displayQty: roundMetric(ml / 1000, 'l'), displayUnit: 'L', converted: true, isMetricResult: true };
			}
			return { ...item, displayQty: roundMetricVolume(ml), displayUnit: 'ml', converted: true, isMetricResult: true };
		}

		function metricMassResult(item, g) {
			if (g >= 1000) {
				return { ...item, displayQty: roundMetric(g / 1000, 'kg'), displayUnit: 'kg', converted: true, isMetricResult: true };
			}
			return { ...item, displayQty: roundMetricMass(g), displayUnit: 'g', converted: true, isMetricResult: true };
		}

		function roundMetricVolume(ml) {
			if (ml <= 0) return 0;
			if (ml <= 15) return Math.round(ml);
			if (ml <= 100) return Math.round(ml / 5) * 5;
			if (ml <= 250) return Math.round(ml / 10) * 10;
			return Math.round(ml / 25) * 25;
		}

		function roundMetricMass(g) {
			if (g <= 0) return 0;
			if (g <= 15) return Math.round(g);
			if (g <= 100) return Math.round(g / 5) * 5;
			if (g <= 250) return Math.round(g / 10) * 10;
			return Math.round(g / 25) * 25;
		}

		function roundMetric(val, unit) {
			// For kg/L, round to 2 decimal places then clean
			return Math.round(val * 100) / 100;
		}

		// Imperial reverse conversion: find best-fit unit
		function imperialVolumeResult(item, ml) {
			// Pick best imperial unit
			const units = [
				{ key: 'gallon', ml: 3785.41 },
				{ key: 'quart', ml: 946.353 },
				{ key: 'pint', ml: 473.176 },
				{ key: 'cup', ml: 236.588 },
				{ key: 'floz', ml: 29.574 },
				{ key: 'tbsp', ml: 14.787 },
				{ key: 'tsp', ml: 4.929 },
			];
			const labels = { gallon:'gallon', quart:'quart', pint:'pint', cup:'cup', floz:'fl oz', tbsp:'tbsp', tsp:'tsp' };

			// Use the best unit that gives a value >= 0.25
			for (const u of units) {
				const val = ml / u.ml;
				if (val >= 0.25) {
					const display = toImperialFraction(val);
					const plural = (val > 1 && !['tsp','tbsp','floz'].includes(u.key)) ? 's' : '';
					return { ...item, displayQty: display, displayUnit: labels[u.key] + plural, converted: true, isImperialResult: true, isFraction: true };
				}
			}
			const val = ml / 4.929;
			return { ...item, displayQty: toImperialFraction(val), displayUnit: 'tsp', converted: true, isImperialResult: true, isFraction: true };
		}

		function imperialMassResult(item, g) {
			if (g >= 453.592 * 0.5) {
				const lbs = g / 453.592;
				const plural = lbs > 1 ? 's' : '';
				return { ...item, displayQty: toImperialFraction(lbs), displayUnit: 'lb' + plural, converted: true, isImperialResult: true, isFraction: true };
			}
			const ozVal = g / 28.3495;
			return { ...item, displayQty: toImperialFraction(ozVal), displayUnit: 'oz', converted: true, isImperialResult: true, isFraction: true };
		}

		// ── Fraction display ──
		const COMMON_FRACS = [
			{ n:0, d:1, val:0 },
			{ n:1, d:8, val:1/8 },
			{ n:1, d:4, val:0.25 },
			{ n:1, d:3, val:1/3 },
			{ n:3, d:8, val:3/8 },
			{ n:1, d:2, val:0.5 },
			{ n:5, d:8, val:5/8 },
			{ n:2, d:3, val:2/3 },
			{ n:3, d:4, val:0.75 },
			{ n:7, d:8, val:7/8 },
			{ n:1, d:1, val:1 },
		];

		const FRAC_CHARS = {
			'1/2':'½','1/3':'⅓','2/3':'⅔','1/4':'¼','3/4':'¾',
			'1/8':'⅛','3/8':'⅜','5/8':'⅝','7/8':'⅞'
		};

		function toImperialFraction(val) {
			if (val <= 0) return '0';
			const whole = Math.floor(val);
			const frac = val - whole;

			// Find closest common fraction
			let best = COMMON_FRACS[0];
			let bestDist = 999;
			for (const f of COMMON_FRACS) {
				const d = Math.abs(frac - f.val);
				if (d < bestDist) { bestDist = d; best = f; }
			}

			// If fraction rounds to 1, bump whole
			let w = whole;
			let fracStr = '';
			if (best.val >= 1) {
				w += 1;
			} else if (best.val > 0) {
				const key = best.n + '/' + best.d;
				fracStr = FRAC_CHARS[key] || key;
			}

			if (w > 0 && fracStr) return w + ' ' + fracStr;
			if (w > 0) return String(w);
			if (fracStr) return fracStr;
			return String(Math.round(val * 100) / 100);
		}

		function formatQty(item) {
			if (item.isFraction) return item.displayQty;
			const v = item.displayQty;
			if (v === null || v === undefined) return '';
			if (Number.isInteger(v)) return String(v);
			// Clean decimals
			if (v >= 100) return String(Math.round(v));
			if (v >= 10) return String(Math.round(v * 10) / 10);
			return String(Math.round(v * 100) / 100);
		}

		// ── Renderer ──
		function renderOutput(items) {
			const container = document.getElementById('output');
			container.innerHTML = '';

			if (items.length === 0 || items.every(i => i.blank)) {
				container.innerHTML = '<div class="placeholder-text">Paste your ingredients here…\n\n2 cups all-purpose flour\n1½ tsp baking powder\n¼ cup sugar\n1 cup milk\n2 large eggs\n3 tbsp butter, melted</div>';
				return;
			}

			items.forEach(item => {
				const div = document.createElement('div');
				div.className = 'output-line' + ((!item.parsed && !item.blank) ? ' unparsed' : '');

				if (!item.parsed) {
					div.textContent = item.raw;
				} else {
					const qty = formatQty(item);
					const unit = item.displayUnit || '';
					const ing = item.ingredient || '';
					const parts = [qty, unit, ing].filter(Boolean);
					div.textContent = parts.join(' ');
				}

				container.appendChild(div);
			});
		}

		// ── Main update pipeline ──
		let currentItems = [];

		function update() {
			const text = document.getElementById('input').value;
			const lines = text.split('\n');
			const direction = document.querySelector('.toggle-btn.active').dataset.dir;
			const orig = Math.max(1, parseInt(document.getElementById('servings-orig').value) || 1);
			const desired = Math.max(1, parseInt(document.getElementById('servings-desired').value) || 1);
			const scale = desired / orig;

			const parsed = lines.map(parseLine);
			currentItems = convertItems(parsed, direction, scale);
			renderOutput(currentItems);
		}

		// ── Copy ──
		function getPlainText() {
			return currentItems
					.filter(i => !i.blank)
					.map(i => {
						if (!i.parsed) return i.raw;
						const qty = formatQty(i);
						const unit = i.displayUnit || '';
						const ing = i.ingredient || '';
						return [qty, unit, ing].filter(Boolean).join(' ');
					}).join('\n');
		}

		function doCopy() {
			const text = getPlainText();
			if (!text) return;
			navigator.clipboard.writeText(text).then(() => {
				const copyIcon = document.getElementById('copy-icon');
				const checkIcon = document.getElementById('check-icon');
				const label = document.getElementById('copy-label');
				copyIcon.style.display = 'none';
				checkIcon.style.display = 'block';
				label.textContent = 'Copied';
				setTimeout(() => {
					copyIcon.style.display = 'block';
					checkIcon.style.display = 'none';
					label.textContent = 'Copy';
				}, 1500);
			});
		}

		// ── Event wiring ──
		let debounceTimer;
		const input = document.getElementById('input');

		input.addEventListener('input', () => {
			clearTimeout(debounceTimer);
			debounceTimer = setTimeout(update, 250);
		});

		input.addEventListener('paste', () => {
			// On paste, update immediately after the paste content is inserted
			setTimeout(update, 0);
		});

		document.querySelectorAll('.toggle-btn').forEach(btn => {
			btn.addEventListener('click', () => {
				document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
				btn.classList.add('active');
				update();
			});
		});

		document.querySelectorAll('.num-btn').forEach(btn => {
			btn.addEventListener('click', () => {
				const target = btn.dataset.target === 'orig' ? 'servings-orig' : 'servings-desired';
				const el = document.getElementById(target);
				const newVal = Math.max(1, Math.min(99, (parseInt(el.value) || 1) + parseInt(btn.dataset.delta)));
				el.value = newVal;
				update();
			});
		});

		document.getElementById('servings-orig').addEventListener('input', update);
		document.getElementById('servings-desired').addEventListener('input', update);

		document.getElementById('clear-btn').addEventListener('click', () => {
			input.value = '';
			update();
			input.focus();
		});

		document.getElementById('copy-btn').addEventListener('click', doCopy);

		// Keyboard shortcut
		document.addEventListener('keydown', (e) => {
			if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key.toLowerCase() === 'c') {
				e.preventDefault();
				doCopy();
			}
		});

		// Initial render
		update();
	})();
</script>
<script src="../logo.js"></script>
