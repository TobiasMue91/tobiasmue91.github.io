<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darkroom — Image Editor</title>
    <style>
        /* ============================================================
           DARKROOM — a photographer's image editor
           Palette: charcoal panels, amber safelight, paper highlight
           ============================================================ */
        :root {
            --bg: #13110f; /* deep darkroom black, warm */
            --panel: #1c1a17; /* panel surface */
            --panel-2: #242019; /* raised surface */
            --line: #332e26; /* hairline divider */
            --line-2: #403a30; /* stronger divider */
            --ink: #e9e2d4; /* paper-white text */
            --ink-dim: #a8a08e; /* muted text */
            --ink-faint: #6f685a; /* faint labels */
            --amber: #e8943a; /* safelight accent */
            --amber-soft: #c97b2c;
            --amber-glow: rgba(232, 148, 58, .18);
            --red: #d8513f; /* developer red */
            --good: #7fa86b;
            --radius: 7px;
            --radius-sm: 4px;
            --shadow: 0 8px 30px rgba(0, 0, 0, .55);
            --mono: "SF Mono", ui-monospace, "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
            --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html, body {
            height: 100%
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--ink);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            font-size: 13px;
        }

        button {
            font-family: inherit;
            color: inherit;
            cursor: pointer;
            border: none;
            background: none
        }

        button:disabled {
            opacity: .35;
            cursor: not-allowed
        }

        input, select {
            font-family: inherit
        }

        ::-webkit-scrollbar {
            width: 9px;
            height: 9px
        }

        ::-webkit-scrollbar-thumb {
            background: var(--line-2);
            border-radius: 6px;
            border: 2px solid var(--panel)
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        /* ---------- App shell ---------- */
        #app {
            display: grid;
            grid-template-rows:auto 1fr auto;
            height: 100vh
        }

        /* ---------- Top bar ---------- */
        .topbar {
            display: flex;
            align-items: center;
            gap: 14px;
            height: 50px;
            padding: 0 16px;
            background: linear-gradient(180deg, var(--panel-2), var(--panel));
            border-bottom: 1px solid var(--line);
            z-index: 40;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 9px;
            user-select: none
        }

        .lamp {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #ffd9a0, var(--amber) 55%, #8a4d16);
            box-shadow: 0 0 10px 1px var(--amber-glow), 0 0 22px 3px var(--amber-glow);
            animation: flicker 5s infinite;
        }

        @keyframes flicker {
            0%, 93%, 100% {
                opacity: 1
            }
            94% {
                opacity: .7
            }
            96% {
                opacity: .95
            }
        }

        .brand h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: .14em;
            text-transform: uppercase;
        }

        .brand .sub {
            color: var(--ink-faint);
            font-size: 10px;
            letter-spacing: .18em;
            text-transform: uppercase;
            font-weight: 500
        }

        .topbar .sep {
            width: 1px;
            height: 24px;
            background: var(--line-2)
        }

        .topbar .grow {
            flex: 1
        }

        .tb-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            height: 32px;
            padding: 0 13px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            border: 1px solid transparent;
            transition: background .12s, border-color .12s;
            color: var(--ink-dim);
        }

        .tb-btn:hover {
            background: var(--panel-2);
            color: var(--ink)
        }

        .tb-btn svg {
            width: 15px;
            height: 15px
        }

        .tb-btn.primary {
            background: var(--amber);
            color: #1a1206;
            font-weight: 600
        }

        .tb-btn.primary:hover {
            background: #f0a04c
        }

        .tb-btn.ghost {
            border-color: var(--line-2)
        }

        /* ---------- Main 3-column ---------- */
        .main {
            display: grid;
            grid-template-columns:56px 1fr 280px;
            min-height: 0
        }

        /* ---------- Tool rail (left) ---------- */
        .rail {
            background: var(--panel);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            gap: 4px;
        }

        .tool {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: grid;
            place-items: center;
            color: var(--ink-dim);
            position: relative;
            transition: background .12s, color .12s;
        }

        .tool:hover {
            background: var(--panel-2);
            color: var(--ink)
        }

        .tool.active {
            background: var(--amber-glow);
            color: var(--amber)
        }

        .tool.active::before {
            content: "";
            position: absolute;
            left: -10px;
            top: 9px;
            bottom: 9px;
            width: 3px;
            background: var(--amber);
            border-radius: 0 3px 3px 0;
        }

        .tool svg {
            width: 20px;
            height: 20px
        }

        .rail .spacer {
            flex: 1
        }

        .tooltip {
            position: fixed;
            background: #000;
            color: var(--ink);
            font-size: 11px;
            padding: 5px 9px;
            border-radius: var(--radius-sm);
            pointer-events: none;
            white-space: nowrap;
            z-index: 100;
            border: 1px solid var(--line-2);
            opacity: 0;
            transform: translateY(2px);
            transition: opacity .1s;
        }

        .tooltip .k {
            color: var(--ink-faint);
            margin-left: 6px
        }

        /* ---------- Canvas stage (center) ---------- */
        .stage-wrap {
            position: relative;
            min-width: 0;
            background: radial-gradient(ellipse at 50% 40%, #1a1714, #0d0b09 80%);
            overflow: hidden;
        }

        .stage-scroll {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            overflow: auto
        }

        .canvas-frame {
            position: relative;
            box-shadow: var(--shadow), 0 0 0 1px var(--line);
            background: linear-gradient(45deg, #2a2620 25%, transparent 25%, transparent 75%, #2a2620 75%),
            linear-gradient(45deg, #2a2620 25%, #211d18 25%, #211d18 75%, #2a2620 75%);
            background-size: 18px 18px;
            background-position: 0 0, 9px 9px;
            transform-origin: center center;
        }

        #view {
            display: block
        }

        #overlay {
            position: absolute;
            inset: 0;
            pointer-events: none
        }

        .stage-empty {
            text-align: center;
            color: var(--ink-faint);
            user-select: none;
            max-width: 330px;
            padding: 30px;
        }

        .stage-empty .ring {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            border: 2px dashed var(--line-2);
            display: grid;
            place-items: center;
            margin: 0 auto 20px;
            color: var(--ink-faint);
        }

        .stage-empty .ring svg {
            width: 34px;
            height: 34px
        }

        .stage-empty h2 {
            font-size: 16px;
            color: var(--ink-dim);
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: .02em
        }

        .stage-empty p {
            font-size: 12.5px;
            line-height: 1.6;
            margin-bottom: 18px
        }

        .stage-empty .load {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--amber);
            color: #1a1206;
            font-weight: 600;
            padding: 9px 16px;
            border-radius: var(--radius-sm);
            font-size: 12.5px;
        }

        .stage-empty .load.alt {
            background: transparent;
            color: var(--ink-dim);
            box-shadow: inset 0 0 0 1px var(--line)
        }

        .stage-empty .load.alt:hover {
            color: var(--ink);
            box-shadow: inset 0 0 0 1px var(--amber)
        }

        .stage-empty .hint {
            margin-top: 14px;
            font-size: 11px;
            color: var(--ink-faint)
        }

        kbd {
            font-family: var(--mono);
            font-size: 10.5px;
            background: var(--panel-2);
            border: 1px solid var(--line-2);
            border-bottom-width: 2px;
            border-radius: 3px;
            padding: 1px 5px;
            color: var(--ink-dim);
        }

        /* zoom pill */
        .zoom-pill {
            position: absolute;
            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 2px;
            background: rgba(20, 18, 15, .9);
            border: 1px solid var(--line-2);
            border-radius: 30px;
            padding: 3px;
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow);
            z-index: 10;
        }

        .zoom-pill button {
            width: 28px;
            height: 26px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            color: var(--ink-dim)
        }

        .zoom-pill button:hover {
            background: var(--panel-2);
            color: var(--ink)
        }

        .zoom-pill .val {
            min-width: 52px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--ink)
        }

        .zoom-pill svg {
            width: 15px;
            height: 15px
        }

        /* ---------- Right inspector ---------- */
        .inspector {
            background: var(--panel);
            border-left: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .insp-head {
            padding: 13px 16px 11px;
            border-bottom: 1px solid var(--line);
        }

        .insp-head .ttl {
            font-size: 11px;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--amber);
            font-weight: 600
        }

        .insp-head .desc {
            font-size: 11.5px;
            color: var(--ink-faint);
            margin-top: 3px;
            line-height: 1.4
        }

        .insp-body {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0 20px
        }

        .group {
            border-bottom: 1px solid var(--line)
        }

        .group-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 16px;
            cursor: pointer;
            user-select: none;
        }

        .group-head:hover {
            background: var(--panel-2)
        }

        .group-head .name {
            font-size: 11px;
            letter-spacing: .13em;
            text-transform: uppercase;
            color: var(--ink-dim);
            font-weight: 600
        }

        .group-head .chev {
            color: var(--ink-faint);
            transition: transform .18s
        }

        .group.collapsed .chev {
            transform: rotate(-90deg)
        }

        .group.collapsed .group-content {
            display: none
        }

        .group-content {
            padding: 2px 16px 14px
        }

        /* slider control */
        .ctrl {
            margin: 13px 0
        }

        .ctrl:first-child {
            margin-top: 6px
        }

        .ctrl-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 7px
        }

        .ctrl-top label {
            font-size: 12px;
            color: var(--ink-dim)
        }

        .ctrl-top .v {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink);
            font-variant-numeric: tabular-nums;
            cursor: ew-resize
        }

        .ctrl-top .v.changed {
            color: var(--amber)
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 3px;
            border-radius: 3px;
            background: var(--line-2);
            outline: none;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--ink);
            border: 2px solid var(--panel);
            box-shadow: 0 1px 3px rgba(0, 0, 0, .5);
            transition: transform .1s;
        }

        input[type=range]:hover::-webkit-slider-thumb {
            transform: scale(1.12)
        }

        input[type=range]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--ink);
            border: 2px solid var(--panel);
            box-shadow: 0 1px 3px rgba(0, 0, 0, .5);
        }

        input[type=range].amber::-webkit-slider-thumb {
            background: var(--amber)
        }

        /* button rows */
        .btn-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 10px 0
        }

        .chip {
            flex: 1;
            min-width: 0;
            padding: 7px 8px;
            border-radius: var(--radius-sm);
            background: var(--panel-2);
            border: 1px solid var(--line);
            font-size: 11.5px;
            color: var(--ink-dim);
            text-align: center;
            transition: all .12s;
            white-space: nowrap;
        }

        .chip:hover {
            border-color: var(--line-2);
            color: var(--ink)
        }

        .chip.on {
            background: var(--amber-glow);
            border-color: var(--amber-soft);
            color: var(--amber)
        }

        .chip svg {
            width: 14px;
            height: 14px;
            vertical-align: -2px
        }

        /* filter thumbnails */
        .filter-grid {
            display: grid;
            grid-template-columns:1fr 1fr 1fr;
            gap: 7px;
            margin-top: 4px
        }

        .filt {
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1.5px solid var(--line);
            cursor: pointer;
            transition: border-color .12s, transform .1s;
            background: var(--panel-2);
        }

        .filt:hover {
            border-color: var(--line-2)
        }

        .filt.on {
            border-color: var(--amber)
        }

        .filt canvas {
            display: block;
            width: 100%;
            height: 52px;
            object-fit: cover
        }

        .filt .nm {
            font-size: 10px;
            text-align: center;
            padding: 4px 2px;
            color: var(--ink-dim);
            text-transform: uppercase;
            letter-spacing: .05em
        }

        .filt.on .nm {
            color: var(--amber)
        }

        /* layers panel */
        .layer-tools {
            display: flex;
            gap: 4px;
            padding: 0 16px 10px
        }

        .layer-tools button {
            width: 30px;
            height: 28px;
            border-radius: var(--radius-sm);
            display: grid;
            place-items: center;
            background: var(--panel-2);
            border: 1px solid var(--line);
            color: var(--ink-dim);
        }

        .layer-tools button:hover:not(:disabled) {
            color: var(--ink);
            border-color: var(--line-2)
        }

        .layer-tools button svg {
            width: 15px;
            height: 15px
        }

        .layer-tools .grow {
            flex: 1
        }

        .layer-list {
            padding: 0 10px
        }

        .layer {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 8px;
            border-radius: var(--radius-sm);
            margin-bottom: 3px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .layer:hover {
            background: var(--panel-2)
        }

        .layer.sel {
            background: var(--amber-glow);
            border-color: var(--amber-soft)
        }

        .layer .eye {
            color: var(--ink-faint);
            flex-shrink: 0;
            display: grid;
            place-items: center;
            width: 18px;
            height: 18px
        }

        .layer .eye:hover {
            color: var(--ink)
        }

        .layer.hidden .thumb, .layer.hidden .lname {
            opacity: .4
        }

        .layer .thumb {
            width: 36px;
            height: 30px;
            border-radius: 3px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--line-2);
            background-color: #000;
            background-image: linear-gradient(45deg, #2a2620 25%, transparent 25%, transparent 75%, #2a2620 75%),
            linear-gradient(45deg, #2a2620 25%, #211d18 25%, #211d18 75%, #2a2620 75%);
        }

        .layer .lname {
            flex: 1;
            font-size: 12px;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .layer .lname input {
            background: var(--bg);
            border: 1px solid var(--amber-soft);
            color: var(--ink);
            border-radius: 3px;
            padding: 2px 5px;
            width: 100%;
            font-size: 12px;
            outline: none
        }

        .layer .pct {
            font-size: 10px;
            color: var(--ink-faint);
            font-variant-numeric: tabular-nums
        }

        /* ---------- Status bar ---------- */
        .statusbar {
            display: flex;
            align-items: center;
            gap: 16px;
            height: 28px;
            padding: 0 16px;
            background: var(--panel-2);
            border-top: 1px solid var(--line);
            font-size: 11px;
            color: var(--ink-faint);
            font-variant-numeric: tabular-nums;
        }

        .statusbar .s {
            display: flex;
            align-items: center;
            gap: 6px
        }

        .statusbar .s svg {
            width: 13px;
            height: 13px;
            opacity: .7
        }

        .statusbar .grow {
            flex: 1
        }

        .statusbar .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--good)
        }

        /* ---------- Color swatch ---------- */
        .swatch-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0 4px
        }

        .swatch {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--line-2);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            flex-shrink: 0;
        }

        .swatch input {
            position: absolute;
            inset: -4px;
            width: 150%;
            height: 150%;
            cursor: pointer;
            border: none;
            padding: 0;
            background: none
        }

        .swatch-row .lbl {
            font-size: 11.5px;
            color: var(--ink-dim)
        }

        .swatch-row .hex {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-faint);
            margin-left: auto
        }

        .preset-row {
            display: flex;
            gap: 5px;
            margin-top: 8px;
            flex-wrap: wrap
        }

        .preset {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid var(--line-2);
            cursor: pointer
        }

        .preset:hover {
            transform: scale(1.12)
        }

        /* toast */
        .toast-wrap {
            position: fixed;
            bottom: 42px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center
        }

        .toast {
            background: #000;
            border: 1px solid var(--line-2);
            color: var(--ink);
            padding: 9px 16px;
            border-radius: var(--radius);
            font-size: 12px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 9px;
            animation: toastIn .25s ease;
        }

        .toast svg {
            width: 15px;
            height: 15px;
            color: var(--amber)
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .empty-note {
            font-size: 11.5px;
            color: var(--ink-faint);
            padding: 10px 16px;
            line-height: 1.5;
            text-align: center
        }

        /* crop overlay handles drawn on canvas; cursor states */
        .stage-scroll.crop {
            cursor: crosshair
        }

        .stage-scroll.move-tool {
            cursor: grab
        }

        .stage-scroll.draw {
            cursor: crosshair
        }

        /* number input */
        .num-row {
            display: flex;
            gap: 8px;
            margin: 10px 0
        }

        .num-field {
            flex: 1
        }

        .num-field label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--ink-faint);
            margin-bottom: 4px
        }

        .num-field input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--line-2);
            color: var(--ink);
            border-radius: var(--radius-sm);
            padding: 7px 9px;
            font-size: 12px;
            outline: none;
            font-variant-numeric: tabular-nums
        }

        .num-field input:focus {
            border-color: var(--amber-soft)
        }

        .lock-link {
            display: grid;
            place-items: center;
            color: var(--ink-faint);
            padding-top: 18px
        }

        .lock-link.on {
            color: var(--amber)
        }

        .do-row {
            display: flex;
            gap: 6px;
            margin-top: 10px
        }

        .do-btn {
            flex: 1;
            padding: 8px;
            border-radius: var(--radius-sm);
            background: var(--amber);
            color: #1a1206;
            font-weight: 600;
            font-size: 12px;
            text-align: center
        }

        .do-btn:hover {
            background: #f0a04c
        }

        .do-btn.sec {
            background: var(--panel-2);
            color: var(--ink-dim);
            border: 1px solid var(--line-2)
        }

        .do-btn.sec:hover {
            color: var(--ink)
        }

        @media (max-width: 880px) {
            .main {
                grid-template-columns:50px 1fr
            }

            .inspector {
                position: fixed;
                right: 0;
                top: 50px;
                bottom: 28px;
                width: 280px;
                z-index: 30;
                transform: translateX(100%);
                transition: transform .2s;
                box-shadow: var(--shadow)
            }

            .inspector.open {
                transform: none
            }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- TOP BAR -->
    <div class="topbar">
        <div class="brand">
            <div class="lamp"></div>
            <h1>Darkroom</h1>
            <span class="sub">image editor</span>
        </div>
        <div class="sep"></div>
        <button class="tb-btn" id="btnOpen" title="Open image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            Open
        </button>
        <button class="tb-btn" id="btnNew" title="New blank canvas (N)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
                <path d="M14 3v4a1 1 0 001 1h4"/>
                <path d="M5 3h9l5 5v11a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/>
                <path d="M11 12h2M12 11v2" transform="translate(0 2)"/>
            </svg>
            New
        </button>
        <button class="tb-btn" id="btnUndo" title="Undo (Ctrl+Z)" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
                <path d="M9 14L4 9l5-5"/>
                <path d="M4 9h11a5 5 0 0 1 5 5v0a5 5 0 0 1-5 5H8"/>
            </svg>
            Undo
        </button>
        <button class="tb-btn" id="btnRedo" title="Redo (Ctrl+Y)" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
                <path d="M15 14l5-5-5-5"/>
                <path d="M20 9H9a5 5 0 0 0-5 5v0a5 5 0 0 0 5 5h8"/>
            </svg>
            Redo
        </button>
        <div class="grow"></div>
        <button class="tb-btn ghost" id="btnReset" title="Revert all edits">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12a9 9 0 109-9 9 9 0 00-9 9z"/>
                <path d="M12 7v5l3 2"/>
            </svg>
            Revert
        </button>
        <button class="tb-btn primary" id="btnExport" title="Export image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 3v12"/>
                <path d="M8 11l4 4 4-4"/>
                <path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/>
            </svg>
            Export
        </button>
    </div>

    <!-- MAIN -->
    <div class="main">
        <!-- TOOL RAIL -->
        <div class="rail" id="rail">
            <button class="tool active" data-tool="move" data-key="V" data-name="Move &amp; Pan">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/>
                </svg>
            </button>
            <button class="tool" data-tool="crop" data-key="C" data-name="Crop">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 2v14a2 2 0 002 2h14"/>
                    <path d="M2 6h14a2 2 0 012 2v14"/>
                </svg>
            </button>
            <button class="tool" data-tool="select" data-key="M" data-name="Select">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-dasharray="3 3">
                    <rect x="3" y="3" width="18" height="18" rx="1"/>
                </svg>
            </button>
            <button class="tool" data-tool="shape" data-key="S" data-name="Shapes">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <rect x="3" y="4" width="9" height="9" rx="1"/>
                    <circle cx="16.5" cy="15.5" r="4.5"/>
                </svg>
            </button>
            <button class="tool" data-tool="brush" data-key="B" data-name="Brush">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="m14.622 17.897-10.68-2.913"/>
                    <path d="M18.376 2.622a1 1 0 1 1 3.002 3.002L17.36 9.643a.5.5 0 0 0 0 .707l.944.944a2.41 2.41 0 0 1 0 3.408l-.944.944a.5.5 0 0 1-.707 0L8.354 7.348a.5.5 0 0 1 0-.707l.944-.944a2.41 2.41 0 0 1 3.408 0l.944.944a.5.5 0 0 0 .707 0z"/>
                    <path d="M9 8c-1.804 2.71-3.97 3.46-6.583 3.948a.507.507 0 0 0-.302.819l7.32 8.883a1 1 0 0 0 1.185.204C12.735 20.405 16 16.792 16 15"/>
                </svg>
            </button>
            <button class="tool" data-tool="erase" data-key="E" data-name="Eraser">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M19 20H8.5l-5-5a2 2 0 010-3l9-9a2 2 0 013 0l5 5a2 2 0 010 3L13 20"/>
                    <path d="M9 21h11"/>
                </svg>
            </button>
            <button class="tool" data-tool="text" data-key="T" data-name="Text">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M4 7V5h16v2M9 19h6M12 5v14"/>
                </svg>
            </button>
            <button class="tool" data-tool="eyedrop" data-key="I" data-name="Eyedropper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/>
                    <path d="M14 5.5l4 4"/>
                    <path d="M9 12l-5.3 5.3a2 2 0 0 0 0 2.8v0a2 2 0 0 0 2.8 0L11.8 15"/>
                </svg>
            </button>
            <div class="spacer"></div>
            <button class="tool" data-tool="fit" data-key="0" data-name="Fit to screen" id="toolFit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 3H5a2 2 0 00-2 2v3M16 3h3a2 2 0 012 2v3M21 16v3a2 2 0 01-2 2h-3M3 16v3a2 2 0 002 2h3"/>
                </svg>
            </button>
        </div>

        <!-- STAGE -->
        <div class="stage-wrap">
            <div class="stage-scroll" id="stageScroll">
                <!-- empty state -->
                <div class="stage-empty" id="emptyState">
                    <div class="ring">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M3 16l5-5 4 4 5-6 4 5"/>
                            <rect x="2" y="3" width="20" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                        </svg>
                    </div>
                    <h2>Load a frame to begin</h2>
                    <p>Drop an image anywhere, paste from your clipboard, or open a file. Everything happens in your
                        browser — nothing is uploaded.</p>
                    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
                        <button class="load" id="emptyLoad">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                                 stroke-width="2">
                                <path d="M12 3v12"/>
                                <path d="M8 7l4-4 4 4"/>
                                <path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/>
                            </svg>
                            Open an image
                        </button>
                        <button class="load alt" id="emptyNew">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                            New blank canvas
                        </button>
                    </div>
                    <div class="hint"><kbd>⌘V</kbd> paste &nbsp; · &nbsp; <kbd>N</kbd> new canvas</div>
                </div>
                <!-- canvas -->
                <div class="canvas-frame" id="canvasFrame" style="display:none">
                    <canvas id="view"></canvas>
                    <canvas id="overlay"></canvas>
                </div>
            </div>
            <!-- zoom -->
            <div class="zoom-pill" id="zoomPill" style="display:none">
                <button id="zoomOut" title="Zoom out">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14"/>
                    </svg>
                </button>
                <span class="val" id="zoomVal">100%</span>
                <button id="zoomIn" title="Zoom in">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                </button>
                <button id="zoomFit" title="Fit">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 3H5a2 2 0 00-2 2v3M16 3h3a2 2 0 012 2v3M21 16v3a2 2 0 01-2 2h-3M3 16v3a2 2 0 002 2h3"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- INSPECTOR -->
        <div class="inspector" id="inspector">
            <div class="insp-head">
                <div class="ttl" id="inspTitle">Develop</div>
                <div class="desc" id="inspDesc">Tonal adjustments applied across all layers.</div>
            </div>
            <div class="insp-body" id="inspBody">
                <!-- panels injected by JS -->
            </div>
        </div>
    </div>

    <!-- STATUS BAR -->
    <div class="statusbar">
        <div class="s"><span class="dot"></span><span id="stTool">Move</span></div>
        <div class="s" id="stDimWrap" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
            <span id="stDim">—</span>
        </div>
        <div class="s" id="stPosWrap" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            <span id="stPos">—</span>
        </div>
        <div class="s" id="stColorWrap" style="display:none">
            <span id="stColorSw"
                  style="width:11px;height:11px;border-radius:2px;border:1px solid var(--line-2);display:inline-block"></span>
            <span id="stColor">—</span>
        </div>
        <div class="grow"></div>
        <div class="s"><span id="stMsg">Ready</span></div>
    </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">
<div class="toast-wrap" id="toastWrap"></div>

<script>
    /* =========================================================================
       DARKROOM ENGINE
       A layer-based, non-destructive-ish raster editor.
       Architecture:
         - state.layers: array of {id,name,visible,opacity,blend,canvas}
         - state.adjust: global develop settings (applied at composite time)
         - history: snapshots of serialized layer pixel data + adjust
       ========================================================================= */
    "use strict";
    const $ = s => document.querySelector(s), $$ = s => [...document.querySelectorAll(s)];

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[c]));
    }

    function rgbToHex(r, g, b) {
        return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    const State = {
        doc: null,            // {w,h}
        layers: [],
        activeId: null,
        zoom: 1,
        tool: 'move',
        adjust: defaultAdjust(),
        // brush/text settings
        brush: {size: 24, hardness: .7, color: '#e8943a', opacity: 1},
        text: {value: '', size: 64, color: '#e9e2d4', font: 'Inter', bold: true},
        crop: null,           // {x,y,w,h} in image space while cropping
        shape: {kind: 'rect', stroke: '#e8943a', fill: '#00000000', width: 6, fillOn: false},
        sel: null,            // committed selection rect {x,y,w,h} in image space
        _selDraft: null,      // selection being dragged
        _shapeDraft: null,    // shape being dragged {x0,y0,x1,y1}
    };

    function defaultAdjust() {
        return {
            brightness: 0, contrast: 0, saturation: 0, exposure: 0, temperature: 0,
            tint: 0, vibrance: 0, hue: 0, sharpen: 0, blur: 0, vignette: 0, grain: 0,
            filter: 'none', flipH: false, flipV: false, rotate: 0
        };
    }

    let uid = 1;
    const nid = () => 'l' + (uid++);

    /* ---------- Layer model ---------- */
    function makeLayer(name, w, h) {
        const c = document.createElement('canvas');
        c.width = w;
        c.height = h;
        return {id: nid(), name, visible: true, opacity: 1, blend: 'normal', canvas: c, _thumb: null, _thumbUrl: null};
    }

    function activeLayer() {
        return State.layers.find(l => l.id === State.activeId);
    }

    /* Cached layer thumbnail — only re-rendered when a layer's pixels change.
       Avoids full-resolution toDataURL() on every UI refresh (the big perf sink
       on large images). Draws the layer downscaled into a small canvas. */
    const THUMB_W = 48, THUMB_H = 40;

    function refreshLayerThumb(l) {
        if (!l) return;
        if (!l._thumb) {
            l._thumb = document.createElement('canvas');
            l._thumb.width = THUMB_W;
            l._thumb.height = THUMB_H;
        }
        const tc = l._thumb.getContext('2d');
        tc.clearRect(0, 0, THUMB_W, THUMB_H);
        // contain the layer within the thumb box
        const s = Math.min(THUMB_W / l.canvas.width, THUMB_H / l.canvas.height);
        const dw = l.canvas.width * s, dh = l.canvas.height * s;
        tc.imageSmoothingQuality = 'low';
        tc.drawImage(l.canvas, (THUMB_W - dw) / 2, (THUMB_H - dh) / 2, dw, dh);
        l._thumbUrl = l._thumb.toDataURL();
        return l._thumbUrl;
    }

    function layerThumbUrl(l) {
        return l._thumbUrl || refreshLayerThumb(l);
    }

    /* ---------- History (undo/redo) ----------
       Copy-on-write snapshots. Each snapshot stores, per layer, a reference to an
       immutable canvas. When a layer's pixels change we mark it dirty; only dirty
       layers are cloned at snapshot time, and unchanged layers are shared by
       reference across snapshots. Since most edits touch a single layer, this
       keeps both snapshot time and memory low even on 30-megapixel documents, and
       restore() stays synchronous (instant undo, no async decode). */
    const History = {stack: [], ptr: -1};

    function historyDepth() {
        if (!State.doc) return 30;
        const mp = (State.doc.w * State.doc.h) / 1e6;
        if (mp > 24) return 12;
        if (mp > 12) return 18;
        if (mp > 6) return 24;
        return 30;
    }

    function cloneCanvas(src) {
        const c = document.createElement('canvas');
        c.width = src.width;
        c.height = src.height;
        c.getContext('2d').drawImage(src, 0, 0);
        return c;
    }

    // Mark the active (or given) layer's pixels as changed since last snapshot.
    function markDirty(l) {
        l = l || activeLayer();
        if (l) l._dirty = true;
    }

    function snapshot(label) {
        const snap = {
            label,
            doc: {...State.doc},
            activeId: State.activeId,
            adjust: {...State.adjust},
            sel: State.sel ? {...State.sel} : null,
            layers: State.layers.map(l => {
                // reuse the previous immutable snapshot canvas when this layer is clean
                if (!l._dirty && l._snapCanvas) {
                    return {
                        id: l.id,
                        name: l.name,
                        visible: l.visible,
                        opacity: l.opacity,
                        blend: l.blend,
                        canvas: l._snapCanvas
                    };
                }
                const snapCanvas = cloneCanvas(l.canvas);
                l._snapCanvas = snapCanvas;
                l._dirty = false;
                return {
                    id: l.id,
                    name: l.name,
                    visible: l.visible,
                    opacity: l.opacity,
                    blend: l.blend,
                    canvas: snapCanvas
                };
            })
        };
        History.stack = History.stack.slice(0, History.ptr + 1);
        History.stack.push(snap);
        const cap = historyDepth();
        while (History.stack.length > cap) History.stack.shift();
        History.ptr = History.stack.length - 1;
        updateHistoryButtons();
    }

    function restore(snap) {
        State.doc = {...snap.doc};
        State.adjust = {...snap.adjust};
        State.activeId = snap.activeId;
        State.sel = snap.sel ? {...snap.sel} : null;
        // Copy each stored (immutable) canvas into a fresh editable layer canvas so
        // future edits never mutate the snapshot we're keeping in history.
        State.layers = snap.layers.map(ls => ({
            id: ls.id, name: ls.name, visible: ls.visible, opacity: ls.opacity, blend: ls.blend,
            canvas: cloneCanvas(ls.canvas), _thumb: null, _thumbUrl: null,
            _snapCanvas: ls.canvas, _dirty: false
        }));
        afterRestore();
    }

    function afterRestore() {
        composite();
        renderLayers();
        buildInspector();
        syncAdjustUI();
        fitIfNeeded();
    }

    function undo() {
        if (History.ptr > 0) {
            History.ptr--;
            restore(History.stack[History.ptr]);
            updateHistoryButtons();
            toast('Undo');
        }
    }

    function redo() {
        if (History.ptr < History.stack.length - 1) {
            History.ptr++;
            restore(History.stack[History.ptr]);
            updateHistoryButtons();
            toast('Redo');
        }
    }

    function updateHistoryButtons() {
        $('#btnUndo').disabled = History.ptr <= 0;
        $('#btnRedo').disabled = History.ptr >= History.stack.length - 1;
    }

    /* =========================================================================
       COMPOSITING + ADJUSTMENTS
       The visible canvas = all layers stacked, then global develop filters
       applied via a temp pipeline. Filters that CSS-filter can't do
       (vignette, grain, sharpen, channel temp) are done in pixel passes.
       ========================================================================= */
    const view = $('#view'), vctx = view.getContext('2d', {willReadFrequently: true});
    const overlay = $('#overlay'), octx = overlay.getContext('2d');
    let composeRAF = 0;
    // Cap the live-preview buffer so per-pixel passes stay fast on huge images.
    // The full-resolution pixels are only ever processed at export time.
    const PREVIEW_MAX = 2200;

    function previewScale() {
        if (!State.doc) return 1;
        return Math.min(1, PREVIEW_MAX / Math.max(State.doc.w, State.doc.h));
    }

    function composite() {
        if (!State.doc) return;
        cancelAnimationFrame(composeRAF);
        composeRAF = requestAnimationFrame(_composite);
    }

    // Stack visible layers into a destination context at an arbitrary scale.
    function stackLayers(ctx, sw, sh) {
        ctx.clearRect(0, 0, sw, sh);
        for (const l of State.layers) {
            if (!l.visible || l.opacity <= 0) continue;
            ctx.globalAlpha = l.opacity;
            ctx.globalCompositeOperation = blendMap(l.blend);
            ctx.drawImage(l.canvas, 0, 0, sw, sh);
        }
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
    }

    // Apply the full develop pipeline to a context already containing stacked
    // layers. Works at whatever resolution the context is (preview or full).
    function developInto(srcCanvas, destCtx, sw, sh) {
        const a = State.adjust;
        const cssParts = [];
        if (a.brightness) cssParts.push(`brightness(${1 + a.brightness / 100})`);
        if (a.contrast) cssParts.push(`contrast(${1 + a.contrast / 100})`);
        if (a.saturation) cssParts.push(`saturate(${1 + a.saturation / 100})`);
        if (a.hue) cssParts.push(`hue-rotate(${a.hue}deg)`);
        if (a.blur > 0) cssParts.push(`blur(${a.blur * 0.12}px)`);
        if (a.exposure) cssParts.push(`brightness(${Math.pow(2, a.exposure / 100)})`);
        destCtx.clearRect(0, 0, sw, sh);
        destCtx.filter = cssParts.join(' ') || 'none';
        destCtx.drawImage(srcCanvas, 0, 0, sw, sh);
        destCtx.filter = 'none';
        const needPixel = a.temperature || a.tint || a.vibrance || a.filter !== 'none';
        if (needPixel) {
            const id = destCtx.getImageData(0, 0, sw, sh);
            pixelPass(id.data, a);
            destCtx.putImageData(id, 0, 0);
        }
        if (a.sharpen > 0) sharpen(destCtx, sw, sh, a.sharpen / 100);
        if (a.vignette > 0) drawVignette(destCtx, sw, sh, a.vignette / 100);
        if (a.grain > 0) drawGrain(destCtx, sw, sh, a.grain / 100);
    }

    function _composite() {
        const {w, h} = State.doc;
        const sc = previewScale();
        const sw = Math.max(1, Math.round(w * sc)), sh = Math.max(1, Math.round(h * sc));
        view.width = sw;
        view.height = sh;
        overlay.width = sw;
        overlay.height = sh;
        // 1) stack layers at preview resolution
        const base = getBuffer('base', sw, sh);
        const bctx = base.getContext('2d');
        stackLayers(bctx, sw, sh);
        // 2) develop straight into the visible canvas
        developInto(base, vctx, sw, sh);
        updateStatusDims();
        drawOverlay();
    }

    // Full-resolution render for export — never throttled, processes true pixels.
    function renderFull() {
        const {w, h} = State.doc;
        const base = document.createElement('canvas');
        base.width = w;
        base.height = h;
        stackLayers(base.getContext('2d'), w, h);
        const out = document.createElement('canvas');
        out.width = w;
        out.height = h;
        developInto(base, out.getContext('2d', {willReadFrequently: true}), w, h);
        return out;
    }

    /* persistent offscreen buffers keyed by name */
    const _buffers = {};

    function getBuffer(key, w, h) {
        let b = _buffers[key];
        if (!b) {
            b = document.createElement('canvas');
            _buffers[key] = b;
        }
        if (b.width !== w || b.height !== h) {
            b.width = w;
            b.height = h;
        }
        return b;
    }

    function blendMap(b) {
        return ({
            normal: 'source-over', multiply: 'multiply', screen: 'screen', overlay: 'overlay',
            'soft-light': 'soft-light', 'hard-light': 'hard-light', darken: 'darken', lighten: 'lighten',
            'color-dodge': 'color-dodge', 'color-burn': 'color-burn', difference: 'difference'
        })[b] || 'source-over';
    }

    /* per-pixel: temperature, tint, vibrance, creative filters */
    function pixelPass(d, a) {
        const temp = a.temperature / 100, tint = a.tint / 100, vib = a.vibrance / 100;
        const filt = a.filter;
        for (let i = 0; i < d.length; i += 4) {
            let r = d[i], g = d[i + 1], b = d[i + 2];
            // temperature: warm pushes R up, B down
            if (temp) {
                r = clamp(r + temp * 40);
                b = clamp(b - temp * 40);
            }
            // tint: magenta/green on G channel
            if (tint) {
                g = clamp(g - tint * 40);
            }
            // vibrance: saturate less-saturated pixels more
            if (vib) {
                const mx = Math.max(r, g, b), mn = Math.min(r, g, b), sat = (mx - mn) / 255;
                const amt = vib * (1 - sat);
                const avg = (r + g + b) / 3;
                r = clamp(r + (r - avg) * amt);
                g = clamp(g + (g - avg) * amt);
                b = clamp(b + (b - avg) * amt);
            }
            // creative filters
            if (filt !== 'none') {
                [r, g, b] = applyFilterPixel(filt, r, g, b);
            }
            d[i] = r;
            d[i + 1] = g;
            d[i + 2] = b;
        }
    }

    function applyFilterPixel(f, r, g, b) {
        switch (f) {
            case'mono': {
                const v = 0.299 * r + 0.587 * g + 0.114 * b;
                return [v, v, v];
            }
            case'sepia': {
                const nr = r * .393 + g * .769 + b * .189, ng = r * .349 + g * .686 + b * .168,
                    nb = r * .272 + g * .534 + b * .131;
                return [clamp(nr), clamp(ng), clamp(nb)];
            }
            case'noir': {
                let v = 0.299 * r + 0.587 * g + 0.114 * b;
                v = clamp((v - 128) * 1.5 + 118);
                return [v, v, v];
            }
            case'cyano': {
                const v = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                return [clamp(v * 60), clamp(v * 150 + 20), clamp(v * 200 + 40)];
            }
            case'vintage': {
                return [clamp(r * 1.05 + 10), clamp(g * 0.95 + 8), clamp(b * 0.8 + 5)];
            }
            case'cool': {
                return [clamp(r * 0.92), clamp(g * 1.0), clamp(b * 1.12)];
            }
            case'warm': {
                return [clamp(r * 1.12), clamp(g * 1.0), clamp(b * 0.88)];
            }
            case'fade': {
                return [clamp(r * 0.85 + 38), clamp(g * 0.85 + 38), clamp(b * 0.85 + 42)];
            }
            case'punch': {
                const f2 = v => clamp((v - 128) * 1.35 + 128);
                return [f2(r), f2(g), f2(b)];
            }
            case'invert':
                return [255 - r, 255 - g, 255 - b];
            case'infrared': {
                const v = 0.299 * r + 0.587 * g + 0.114 * b;
                return [clamp(255 - g * 0.5), clamp(v * 0.6), clamp(b * 0.7)];
            }
            default:
                return [r, g, b];
        }
    }

    const FILTERS = [
        ['none', 'Original'], ['mono', 'Mono'], ['noir', 'Noir'], ['sepia', 'Sepia'],
        ['cyano', 'Cyanotype'], ['vintage', 'Vintage'], ['fade', 'Faded'], ['warm', 'Warm'],
        ['cool', 'Cool'], ['punch', 'Punch'], ['infrared', 'Infrared'], ['invert', 'Invert']
    ];

    /* unsharp-ish mask using a simple convolution */
    function sharpen(ctx, w, h, amt) {
        const src = ctx.getImageData(0, 0, w, h);
        const out = ctx.createImageData(w, h);
        const s = src.data, o = out.data;
        const k = amt * 0.8;
        const w4 = w * 4;
        for (let y = 1; y < h - 1; y++) {
            for (let x = 1; x < w - 1; x++) {
                const i = (y * w + x) * 4;
                for (let c = 0; c < 3; c++) {
                    const idx = i + c;
                    const center = s[idx];
                    const sum = s[idx - 4] + s[idx + 4] + s[idx - w4] + s[idx + w4];
                    o[idx] = clamp(center + (center * 4 - sum) * k * 0.25 * 4 / 4 * (k ? k : 0) + (center - sum / 4) * k);
                }
                o[i + 3] = s[i + 3];
            }
        }
        // copy borders
        for (let x = 0; x < w; x++) {
            for (const yy of [0, h - 1]) {
                const i = (yy * w + x) * 4;
                o[i] = s[i];
                o[i + 1] = s[i + 1];
                o[i + 2] = s[i + 2];
                o[i + 3] = s[i + 3];
            }
        }
        for (let y = 0; y < h; y++) {
            for (const xx of [0, w - 1]) {
                const i = (y * w + xx) * 4;
                o[i] = s[i];
                o[i + 1] = s[i + 1];
                o[i + 2] = s[i + 2];
                o[i + 3] = s[i + 3];
            }
        }
        ctx.putImageData(out, 0, 0);
    }

    function drawVignette(ctx, w, h, amt) {
        const g = ctx.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.3, w / 2, h / 2, Math.max(w, h) * 0.72);
        g.addColorStop(0, 'rgba(0,0,0,0)');
        g.addColorStop(1, `rgba(0,0,0,${amt * 0.85})`);
        ctx.save();
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);
        ctx.restore();
    }

    let _grainCanvas = null;

    function drawGrain(ctx, w, h, amt) {
        // generate a tiled noise pattern once, reuse
        if (!_grainCanvas || _grainCanvas.width !== 256) {
            _grainCanvas = document.createElement('canvas');
            _grainCanvas.width = _grainCanvas.height = 256;
            const gc = _grainCanvas.getContext('2d');
            const id = gc.createImageData(256, 256);
            for (let i = 0; i < id.data.length; i += 4) {
                const v = Math.random() * 255;
                id.data[i] = id.data[i + 1] = id.data[i + 2] = v;
                id.data[i + 3] = 255;
            }
            gc.putImageData(id, 0, 0);
        }
        ctx.save();
        ctx.globalAlpha = amt * 0.5;
        ctx.globalCompositeOperation = 'overlay';
        const pat = ctx.createPattern(_grainCanvas, 'repeat');
        ctx.fillStyle = pat;
        ctx.fillRect(0, 0, w, h);
        ctx.restore();
    }

    const clamp = v => v < 0 ? 0 : v > 255 ? 255 : v;

    /* =========================================================================
       VIEW / ZOOM / PAN
       ========================================================================= */
    const frame = $('#canvasFrame'), stageScroll = $('#stageScroll');

    function applyZoom() {
        if (!State.doc) return;
        const {w, h} = State.doc;
        frame.style.width = w * State.zoom + 'px';
        frame.style.height = h * State.zoom + 'px';
        view.style.width = w * State.zoom + 'px';
        view.style.height = h * State.zoom + 'px';
        overlay.style.width = w * State.zoom + 'px';
        overlay.style.height = h * State.zoom + 'px';
        $('#zoomVal').textContent = Math.round(State.zoom * 100) + '%';
    }

    function setZoom(z, centerEvt) {
        z = Math.max(0.05, Math.min(16, z));
        State.zoom = z;
        applyZoom();
    }

    function fitToScreen() {
        if (!State.doc) return;
        const pad = 64;
        const aw = stageScroll.clientWidth - pad, ah = stageScroll.clientHeight - pad;
        const z = Math.min(aw / State.doc.w, ah / State.doc.h, 1);
        setZoom(z);
        // center
        requestAnimationFrame(() => {
            stageScroll.scrollLeft = (frame.offsetWidth - stageScroll.clientWidth) / 2;
            stageScroll.scrollTop = (frame.offsetHeight - stageScroll.clientHeight) / 2;
        });
    }

    function fitIfNeeded() {
        if (State.zoom * State.doc.w > stageScroll.clientWidth || State.zoom === 1) fitToScreen();
    }

    $('#zoomIn').onclick = () => setZoom(State.zoom * 1.25);
    $('#zoomOut').onclick = () => setZoom(State.zoom / 1.25);
    $('#zoomFit').onclick = fitToScreen;
    $('#toolFit').onclick = fitToScreen;

    // wheel zoom (ctrl) / scroll
    stageScroll.addEventListener('wheel', e => {
        if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            const old = State.zoom;
            const rect = stageScroll.getBoundingClientRect();
            const mx = e.clientX - rect.left + stageScroll.scrollLeft;
            const my = e.clientY - rect.top + stageScroll.scrollTop;
            const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
            setZoom(State.zoom * factor);
            const ratio = State.zoom / old;
            stageScroll.scrollLeft = mx * ratio - (e.clientX - rect.left);
            stageScroll.scrollTop = my * ratio - (e.clientY - rect.top);
        }
    }, {passive: false});

    /* =========================================================================
       IMAGE LOADING
       ========================================================================= */
    function loadImageFromSrc(src, name = 'Photograph') {
        const img = new Image();
        img.onload = () => {
            let w = img.naturalWidth, h = img.naturalHeight;
            const MAX = 8192;
            if (w > MAX || h > MAX) {
                const s = MAX / Math.max(w, h);
                w = Math.round(w * s);
                h = Math.round(h * s);
            }
            State.doc = {w, h};
            State.adjust = defaultAdjust();
            const layer = makeLayer(name, w, h);
            layer.canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            State.layers = [layer];
            State.activeId = layer.id;
            History.stack = [];
            History.ptr = -1;
            showCanvas();
            composite();
            renderLayers();
            buildInspector();
            syncAdjustUI();
            fitToScreen();
            snapshot('Open image');
            toast('Image loaded', iconCheck);
            setStatus('Loaded ' + w + '×' + h);
        };
        img.onerror = () => toast('Could not read that image');
        img.src = src;
    }

    function loadFile(file) {
        if (!file || !file.type.startsWith('image/')) {
            toast('That file isn\'t an image');
            return;
        }
        const r = new FileReader();
        r.onload = e => loadImageFromSrc(e.target.result, file.name.replace(/\.[^.]+$/, ''));
        r.readAsDataURL(file);
    }

    function newBlankCanvas(w = 1280, h = 800, bg = '#ffffff') {
        State.doc = {w, h};
        State.adjust = defaultAdjust();
        State.sel = null;
        const l = makeLayer('Background', w, h);
        if (bg && bg !== 'transparent') {
            const c = l.canvas.getContext('2d');
            c.fillStyle = bg;
            c.fillRect(0, 0, w, h);
        }
        State.layers = [l];
        State.activeId = l.id;
        History.stack = [];
        History.ptr = -1;
        showCanvas();
        composite();
        renderLayers();
        buildInspector();
        syncAdjustUI();
        fitToScreen();
        snapshot('New canvas');
        toast(`New ${w}×${h} canvas`, iconCheck);
    }

    function showCanvas() {
        $('#emptyState').style.display = 'none';
        frame.style.display = 'block';
        $('#zoomPill').style.display = 'flex';
        $('#stDimWrap').style.display = 'flex';
    }

    $('#btnOpen').onclick = $('#emptyLoad').onclick = () => $('#fileInput').click();
    $('#emptyNew').onclick = () => buildNewCanvasSheet();
    $('#btnNew').onclick = () => buildNewCanvasSheet();
    $('#fileInput').onchange = e => {
        if (e.target.files[0]) loadFile(e.target.files[0]);
        e.target.value = '';
    };

    // drag & drop
    ['dragover', 'drop'].forEach(ev => document.addEventListener(ev, e => e.preventDefault()));
    document.addEventListener('drop', e => {
        const f = e.dataTransfer.files[0];
        if (f) loadFile(f);
    });
    // paste
    document.addEventListener('paste', e => {
        const items = e.clipboardData?.items || [];
        for (const it of items) {
            if (it.type.startsWith('image/')) {
                loadFile(it.getAsFile());
                return;
            }
        }
    });

    /* =========================================================================
       TOOLS
       ========================================================================= */
    const railBtns = $$('.tool[data-tool]');
    const toolPanels = {
        move: {
            title: 'Develop',
            desc: 'Drag the canvas to move the layer (or selection). Sliders below adjust all layers.'
        },
        crop: {title: 'Crop & Size', desc: 'Trim the frame, straighten, or set exact dimensions.'},
        select: {title: 'Select', desc: 'Marquee a region to fill, clear, or crop into.'},
        shape: {title: 'Shapes', desc: 'Draw rectangles, ellipses, lines and arrows.'},
        brush: {title: 'Brush', desc: 'Paint on the active layer.'},
        erase: {title: 'Eraser', desc: 'Remove pixels from the active layer.'},
        text: {title: 'Text', desc: 'Stamp type onto a new layer.'},
        eyedrop: {title: 'Eyedropper', desc: 'Sample a color from the canvas.'},
    };

    function setTool(t) {
        if (t === 'fit') {
            fitToScreen();
            return;
        }
        // commit crop if leaving crop tool
        if (State.tool === 'crop' && t !== 'crop' && State.crop) {
            State.crop = null;
        }
        State.tool = t;
        railBtns.forEach(b => b.classList.toggle('active', b.dataset.tool === t));
        const drawCursor = (t === 'brush' || t === 'erase' || t === 'shape');
        stageScroll.className = 'stage-scroll' + (t === 'crop' ? ' crop' : t === 'move' ? ' move-tool' : drawCursor ? ' draw' : (t === 'select') ? ' crop' : '');
        $('#stTool').textContent = ({
            move: 'Move',
            crop: 'Crop',
            select: 'Select',
            shape: 'Shapes',
            brush: 'Brush',
            erase: 'Eraser',
            text: 'Text',
            eyedrop: 'Eyedropper'
        })[t];
        buildInspector();
        drawOverlay();
    }

    railBtns.forEach(b => {
        b.onclick = () => setTool(b.dataset.tool);
        // tooltip
        b.addEventListener('mouseenter', () => showTip(b));
        b.addEventListener('mouseleave', hideTip);
    });
    let tipEl = null;

    function showTip(b) {
        hideTip();
        tipEl = document.createElement('div');
        tipEl.className = 'tooltip';
        tipEl.innerHTML = b.dataset.name + (b.dataset.key ? `<span class="k">${b.dataset.key}</span>` : '');
        document.body.appendChild(tipEl);
        const r = b.getBoundingClientRect();
        tipEl.style.left = r.right + 8 + 'px';
        tipEl.style.top = r.top + r.height / 2 - tipEl.offsetHeight / 2 + 'px';
        requestAnimationFrame(() => tipEl && (tipEl.style.opacity = '1'));
    }

    function hideTip() {
        if (tipEl) {
            tipEl.remove();
            tipEl = null;
        }
    }

    /* =========================================================================
       CANVAS POINTER — drawing, cropping, sampling, panning
       ========================================================================= */
    function evtToImg(e) {
        const r = view.getBoundingClientRect();
        const x = (e.clientX - r.left) / State.zoom;
        const y = (e.clientY - r.top) / State.zoom;
        return {x, y};
    }

    let pointer = {down: false, last: null, start: null, mode: null, panStart: null};
    view.parentElement.style.touchAction = 'none';

    stageScroll.addEventListener('pointerdown', e => {
        if (!State.doc) return;
        const onCanvas = e.target === view || e.target === overlay;
        const p = evtToImg(e);
        // space or middle-mouse = pan the view
        if (e.button === 1 || spaceDown) {
            pointer.mode = 'pan';
            pointer.down = true;
            pointer.panStart = {x: e.clientX, y: e.clientY, sl: stageScroll.scrollLeft, st: stageScroll.scrollTop};
            stageScroll.setPointerCapture(e.pointerId);
            stageScroll.style.cursor = 'grabbing';
            return;
        }
        if (!onCanvas) return;
        pointer.down = true;
        pointer.last = p;
        pointer.start = p;
        stageScroll.setPointerCapture(e.pointerId);

        if (State.tool === 'move') {
            beginMove(p);
        } else if (State.tool === 'brush' || State.tool === 'erase') {
            beginStroke();
            strokeTo(p, true);
        } else if (State.tool === 'eyedrop') {
            sampleColor(p);
        } else if (State.tool === 'text') {
            placeText(p);
        } else if (State.tool === 'crop') {
            const hit = cropHandleAt(p);
            pointer.mode = hit ? ('crop-' + hit) : 'crop-new';
            if (pointer.mode === 'crop-new') {
                State.crop = {x: p.x, y: p.y, w: 0, h: 0};
            }
        } else if (State.tool === 'select') {
            pointer.mode = 'sel-new';
            State._selDraft = {x: p.x, y: p.y, w: 0, h: 0};
        } else if (State.tool === 'shape') {
            pointer.mode = 'shape-new';
            State._shapeDraft = {x0: p.x, y0: p.y, x1: p.x, y1: p.y};
        }
    });
    stageScroll.addEventListener('pointermove', e => {
        if (!State.doc) return;
        const p = evtToImg(e);
        updatePosStatus(p);
        if (State.tool === 'shape' && !pointer.down) drawShapeCursor(p);
        if (!pointer.down) return;
        if (pointer.mode === 'pan') {
            stageScroll.scrollLeft = pointer.panStart.sl - (e.clientX - pointer.panStart.x);
            stageScroll.scrollTop = pointer.panStart.st - (e.clientY - pointer.panStart.y);
            return;
        }
        if (State.tool === 'move') {
            moveTo(p);
        } else if (State.tool === 'brush' || State.tool === 'erase') {
            strokeTo(p);
        } else if (State.tool === 'crop') {
            updateCrop(p);
        } else if (State.tool === 'select' && State._selDraft) {
            State._selDraft.w = p.x - State._selDraft.x;
            State._selDraft.h = p.y - State._selDraft.y;
            drawOverlay();
        } else if (State.tool === 'shape' && State._shapeDraft) {
            State._shapeDraft.x1 = p.x;
            State._shapeDraft.y1 = p.y;
            State._shapeDraft.shift = e.shiftKey;
            drawOverlay();
        }
    });
    stageScroll.addEventListener('pointerup', e => {
        if (pointer.mode === 'pan') {
            stageScroll.style.cursor = '';
        }
        if (pointer.down && State.tool === 'move') {
            endMove();
        }
        if (pointer.down && (State.tool === 'brush' || State.tool === 'erase')) {
            endStroke();
        }
        if (pointer.down && State.tool === 'crop' && State.crop) {
            normalizeCrop();
            drawOverlay();
        }
        if (pointer.down && State.tool === 'select' && State._selDraft) {
            commitSelection();
        }
        if (pointer.down && State.tool === 'shape' && State._shapeDraft) {
            commitShape();
        }
        pointer.down = false;
        pointer.mode = null;
    });

    /* ---------- Move tool ----------
       Drags pixel content. With an active selection, only the selected region is
       lifted and moved (leaving transparency behind); otherwise the whole active
       layer is moved. This is what gives the selection a real purpose. */
    let _move = null;

    function beginMove(p) {
        const l = activeLayer();
        if (!l) {
            return;
        }
        pointer.mode = 'move';
        const src = document.createElement('canvas');
        src.width = State.doc.w;
        src.height = State.doc.h;
        if (State.sel) {
            const r = State.sel;
            // lift selected pixels onto the float buffer, erase from layer
            src.getContext('2d').drawImage(l.canvas, r.x, r.y, r.w, r.h, r.x, r.y, r.w, r.h);
            const lc = l.canvas.getContext('2d');
            lc.save();
            lc.globalCompositeOperation = 'destination-out';
            lc.fillStyle = '#000';
            lc.fillRect(r.x, r.y, r.w, r.h);
            lc.restore();
        } else {
            // lift whole layer
            src.getContext('2d').drawImage(l.canvas, 0, 0);
            l.canvas.getContext('2d').clearRect(0, 0, State.doc.w, State.doc.h);
        }
        _move = {layer: l, float: src, startX: p.x, startY: p.y, dx: 0, dy: 0, sel0: State.sel ? {...State.sel} : null};
        composite();
    }

    function moveTo(p) {
        if (!_move) return;
        _move.dx = p.x - _move.startX;
        _move.dy = p.y - _move.startY;
        const l = _move.layer;
        const ctx = l.canvas.getContext('2d');
        // capture the static remainder (everything not lifted) exactly once
        if (!_move.remainder) {
            _move.remainder = document.createElement('canvas');
            _move.remainder.width = State.doc.w;
            _move.remainder.height = State.doc.h;
            _move.remainder.getContext('2d').drawImage(l.canvas, 0, 0);
        }
        ctx.clearRect(0, 0, State.doc.w, State.doc.h);
        ctx.drawImage(_move.remainder, 0, 0);
        ctx.drawImage(_move.float, _move.dx, _move.dy);
        // selection rectangle follows the floating content live
        if (_move.sel0) {
            State.sel = {x: _move.sel0.x + _move.dx, y: _move.sel0.y + _move.dy, w: _move.sel0.w, h: _move.sel0.h};
        }
        composite();
        drawOverlay();
    }

    function endMove() {
        if (!_move) {
            return;
        }
        const l = _move.layer;
        if (_move.sel0) State.sel = {
            x: Math.round(_move.sel0.x + _move.dx),
            y: Math.round(_move.sel0.y + _move.dy),
            w: _move.sel0.w,
            h: _move.sel0.h
        };
        l._thumbUrl = null;
        updateLayerThumb(l);
        markDirty(l);
        _move = null;
        composite();
        drawOverlay();
        buildInspector();
        snapshot('Move');
    }

    /* ---------- Brush / Eraser ---------- */
    let strokeCtx = null;

    function beginStroke() {
        const l = activeLayer();
        if (!l) return;
        strokeCtx = l.canvas.getContext('2d');
    }

    function strokeTo(p, first) {
        const l = activeLayer();
        if (!l || !strokeCtx) return;
        const ctx = strokeCtx;
        const erase = State.tool === 'erase';
        const size = State.brush.size;
        ctx.save();
        ctx.globalCompositeOperation = erase ? 'destination-out' : 'source-over';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = State.brush.color;
        ctx.globalAlpha = erase ? 1 : State.brush.opacity;
        ctx.lineWidth = size;
        // soft brush via shadow blur trick
        if (!erase && State.brush.hardness < 1) {
            ctx.shadowColor = State.brush.color;
            ctx.shadowBlur = size * (1 - State.brush.hardness) * 0.6;
        }
        if (first || !pointer.last) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, size / 2, 0, 7);
            ctx.fillStyle = State.brush.color;
            if (erase) {
                ctx.globalCompositeOperation = 'destination-out';
            }
            ctx.fill();
        } else {
            ctx.beginPath();
            ctx.moveTo(pointer.last.x, pointer.last.y);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        }
        ctx.restore();
        pointer.last = p;
        composite();
        drawBrushCursor(p);
    }

    function endStroke() {
        const l = activeLayer();
        if (l) {
            l._thumbUrl = null;
            updateLayerThumb(l);
            markDirty(l);
        }
        snapshot('Paint');
        strokeCtx = null;
    }

    /* ---------- Eyedropper ---------- */
    function sampleColor(p) {
        const x = Math.floor(p.x), y = Math.floor(p.y);
        if (x < 0 || y < 0 || x >= State.doc.w || y >= State.doc.h) return;
        // Sample from a true-resolution stack so the picked colour is exact,
        // independent of the downscaled preview buffer.
        const s = getBuffer('sample', State.doc.w, State.doc.h);
        stackLayers(s.getContext('2d'), State.doc.w, State.doc.h);
        const d = s.getContext('2d', {willReadFrequently: true}).getImageData(x, y, 1, 1).data;
        const hex = rgbToHex(d[0], d[1], d[2]);
        setBrushColor(hex);
        toast('Sampled ' + hex.toUpperCase(), iconDrop);
        setStatus('Picked ' + hex.toUpperCase());
    }

    // Single source of truth for the active paint colour — updates every panel
    // that shows it (brush panel, eyedrop panel) so the UI never goes stale.
    function setBrushColor(hex) {
        State.brush.color = hex;
        if ($('#brushColor')) $('#brushColor').value = hex;
        if ($('#brushHex')) $('#brushHex').textContent = hex.toUpperCase();
        $$('.js-color-swatch').forEach(el => el.style.background = hex);
        $$('.js-color-hex').forEach(el => el.textContent = hex.toUpperCase());
    }

    /* =========================================================================
       SELECTION (rectangular marquee)
       A committed selection lives in State.sel as an image-space rect. It can be
       filled with the paint colour, cleared (erased) on the active layer, or used
       to crop the whole document down to the region.
       ========================================================================= */
    function normRect(r) {
        let {x, y, w, h} = r;
        if (w < 0) {
            x += w;
            w = -w;
        }
        if (h < 0) {
            y += h;
            h = -h;
        }
        return {x: Math.round(x), y: Math.round(y), w: Math.round(w), h: Math.round(h)};
    }

    function clampRectToDoc(r) {
        const x = Math.max(0, Math.min(r.x, State.doc.w));
        const y = Math.max(0, Math.min(r.y, State.doc.h));
        const w = Math.max(0, Math.min(r.w, State.doc.w - x));
        const h = Math.max(0, Math.min(r.h, State.doc.h - y));
        return {x, y, w, h};
    }

    function commitSelection() {
        const r = clampRectToDoc(normRect(State._selDraft));
        State._selDraft = null;
        if (r.w < 2 || r.h < 2) {
            State.sel = null;
            drawOverlay();
            buildInspector();
            setStatus('Selection cleared');
            return;
        }
        State.sel = r;
        drawOverlay();
        buildInspector();
        setStatus(`Selected ${r.w}×${r.h}`);
    }

    function selectAll() {
        State.sel = {x: 0, y: 0, w: State.doc.w, h: State.doc.h};
        drawOverlay();
        buildInspector();
        setStatus('Selected all');
    }

    function clearSelection() {
        State.sel = null;
        drawOverlay();
        buildInspector();
        setStatus('Selection cleared');
    }

    function fillSelection(color) {
        const a = activeLayer();
        const r = State.sel;
        if (!a || !r) return;
        const ctx = a.canvas.getContext('2d');
        ctx.save();
        ctx.fillStyle = color;
        ctx.fillRect(r.x, r.y, r.w, r.h);
        ctx.restore();
        a._thumbUrl = null;
        updateLayerThumb(a);
        markDirty(a);
        composite();
        snapshot('Fill selection');
        toast('Filled selection', iconCheck);
    }

    function clearSelectionPixels() {
        const a = activeLayer();
        const r = State.sel;
        if (!a || !r) return;
        const ctx = a.canvas.getContext('2d');
        ctx.save();
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = '#000';
        ctx.fillRect(r.x, r.y, r.w, r.h);
        ctx.restore();
        a._thumbUrl = null;
        updateLayerThumb(a);
        markDirty(a);
        composite();
        snapshot('Clear selection');
        toast('Cleared selection', iconCheck);
    }

    function cropToSelection() {
        const r = State.sel;
        if (!r || r.w < 2 || r.h < 2) return;
        for (const l of State.layers) {
            const nc = document.createElement('canvas');
            nc.width = r.w;
            nc.height = r.h;
            nc.getContext('2d').drawImage(l.canvas, r.x, r.y, r.w, r.h, 0, 0, r.w, r.h);
            l.canvas = nc;
            l._thumbUrl = null;
            l._dirty = true;
        }
        State.doc = {w: r.w, h: r.h};
        State.sel = null;
        composite();
        renderLayers();
        buildInspector();
        fitToScreen();
        snapshot('Crop to selection');
        toast(`Cropped to ${r.w}×${r.h}`, iconCheck);
    }

    /* =========================================================================
       SHAPES (rectangle, ellipse, line, arrow) — rasterised onto active layer
       ========================================================================= */
    function shapeGeom(d) {
        let {x0, y0, x1, y1} = d;
        if (d.shift) {
            // constrain: square/circle for box shapes, 45° steps for lines
            if (State.shape.kind === 'line' || State.shape.kind === 'arrow') {
                const dx = x1 - x0, dy = y1 - y0;
                const ang = Math.atan2(dy, dx);
                const step = Math.PI / 4;
                const a = Math.round(ang / step) * step;
                const len = Math.hypot(dx, dy);
                x1 = x0 + Math.cos(a) * len;
                y1 = y0 + Math.sin(a) * len;
            } else {
                const s = Math.max(Math.abs(x1 - x0), Math.abs(y1 - y0));
                x1 = x0 + Math.sign(x1 - x0 || 1) * s;
                y1 = y0 + Math.sign(y1 - y0 || 1) * s;
            }
        }
        return {x0, y0, x1, y1};
    }

    function drawShapeOnCtx(ctx, d, opts) {
        const {x0, y0, x1, y1} = shapeGeom(d);
        const kind = State.shape.kind;
        const sw = State.shape.width;
        ctx.save();
