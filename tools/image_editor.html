        ctx.lineWidth = sw;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.strokeStyle = State.shape.stroke;
        ctx.fillStyle = State.shape.fill;
        const doFill = State.shape.fillOn && (kind === 'rect' || kind === 'ellipse');
        if (kind === 'rect') {
            const x = Math.min(x0, x1), y = Math.min(y0, y1), w = Math.abs(x1 - x0), h = Math.abs(y1 - y0);
            if (doFill) ctx.fillRect(x, y, w, h);
            if (sw > 0) ctx.strokeRect(x, y, w, h);
        } else if (kind === 'ellipse') {
            const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2, rx = Math.abs(x1 - x0) / 2, ry = Math.abs(y1 - y0) / 2;
            ctx.beginPath();
            ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
            if (doFill) ctx.fill();
            if (sw > 0) ctx.stroke();
        } else if (kind === 'line') {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            ctx.stroke();
        } else if (kind === 'arrow') {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            ctx.stroke();
            // arrowhead
            const ang = Math.atan2(y1 - y0, x1 - x0);
            const head = Math.max(12, sw * 3);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x1 - head * Math.cos(ang - Math.PI / 7), y1 - head * Math.sin(ang - Math.PI / 7));
            ctx.moveTo(x1, y1);
            ctx.lineTo(x1 - head * Math.cos(ang + Math.PI / 7), y1 - head * Math.sin(ang + Math.PI / 7));
            ctx.stroke();
        }
        ctx.restore();
    }

    function commitShape() {
        const d = State._shapeDraft;
        State._shapeDraft = null;
        if (!d) {
            drawOverlay();
            return;
        }
        if (Math.hypot(d.x1 - d.x0, d.y1 - d.y0) < 2) {
            drawOverlay();
            return;
        }
        const a = activeLayer();
        if (!a) {
            drawOverlay();
            return;
        }
        drawShapeOnCtx(a.canvas.getContext('2d'), d);
        a._thumbUrl = null;
        updateLayerThumb(a);
        markDirty(a);
        composite();
        drawOverlay();
        snapshot('Draw ' + State.shape.kind);
        toast(State.shape.kind[0].toUpperCase() + State.shape.kind.slice(1) + ' added', iconCheck);
    }

    /* ---------- Text ---------- */
    function placeText(p) {
        const txt = State.text.value.trim();
        if (!txt) {
            toast('Type some text in the panel first');
            return;
        }
        const l = makeLayer('Text — ' + txt.slice(0, 14), State.doc.w, State.doc.h);
        const ctx = l.canvas.getContext('2d');
        ctx.fillStyle = State.text.color;
        ctx.font = `${State.text.bold ? '700' : '400'} ${State.text.size}px ${State.text.font}, sans-serif`;
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'left';
        ctx.fillText(txt, p.x, p.y);
        const idx = State.layers.indexOf(activeLayer());
        State.layers.splice(idx + 1, 0, l);
        State.activeId = l.id;
        composite();
        renderLayers();
        snapshot('Add text');
        toast('Text added', iconCheck);
    }

    /* =========================================================================
       CROP
       ========================================================================= */
    function cropHit(p) {
        return State.tool === 'crop' && State.crop && inRect(p, State.crop);
    }

    function inRect(p, r) {
        return p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
    }

    function cropHandleAt(p) {
        if (!State.crop) return null;
        const r = State.crop, t = 12 / State.zoom;
        const near = (a, b) => Math.abs(a - b) < t;
        const L = near(p.x, r.x), R = near(p.x, r.x + r.w), T = near(p.y, r.y), B = near(p.y, r.y + r.h);
        if (L && T) return 'nw';
        if (R && T) return 'ne';
        if (L && B) return 'sw';
        if (R && B) return 'se';
        if (inRect(p, r)) return 'move';
        return null;
    }

    function updateCrop(p) {
        const r = State.crop;
        const m = pointer.mode.replace('crop-', '');
        if (m === 'new') {
            r.w = p.x - r.x;
            r.h = p.y - r.y;
        } else if (m === 'move') {
            const dx = p.x - pointer.last.x, dy = p.y - pointer.last.y;
            r.x += dx;
            r.y += dy;
            pointer.last = p;
        } else {
            if (m.includes('w')) (r.w += r.x - p.x, r.x = p.x);
            if (m.includes('e')) r.w = p.x - r.x;
            if (m.includes('n')) (r.h += r.y - p.y, r.y = p.y);
            if (m.includes('s')) r.h = p.y - r.y;
        }
        drawOverlay();
        updateCropFields();
    }

    function normalizeCrop() {
        let r = State.crop;
        if (r.w < 0) {
            r.x += r.w;
            r.w = -r.w;
        }
        if (r.h < 0) {
            r.y += r.h;
            r.h = -r.h;
        }
        r.x = Math.max(0, r.x);
        r.y = Math.max(0, r.y);
        r.w = Math.min(r.w, State.doc.w - r.x);
        r.h = Math.min(r.h, State.doc.h - r.y);
        if (r.w < 4 || r.h < 4) State.crop = null;
        updateCropFields();
    }

    function applyCrop() {
        if (!State.crop || State.crop.w < 4) {
            toast('Drag a crop region first');
            return;
        }
        const r = State.crop;
        const x = Math.round(r.x), y = Math.round(r.y), w = Math.round(r.w), h = Math.round(r.h);
        State.layers.forEach(l => {
            const nc = document.createElement('canvas');
            nc.width = w;
            nc.height = h;
            nc.getContext('2d').drawImage(l.canvas, x, y, w, h, 0, 0, w, h);
            l.canvas = nc;
            l._thumbUrl = null;
            l._dirty = true;
        });
        State.doc = {w, h};
        State.crop = null;
        State.sel = null;
        composite();
        renderLayers();
        fitToScreen();
        snapshot('Crop');
        toast('Cropped to ' + w + '×' + h, iconCheck);
    }

    /* =========================================================================
       TRANSFORM (rotate / flip / resize)
       ========================================================================= */
    function rotateDoc(deg) {
        const rad = deg * Math.PI / 180;
        const {w, h} = State.doc;
        const nw = deg % 180 === 0 ? w : h, nh = deg % 180 === 0 ? h : w;
        State.layers.forEach(l => {
            const nc = document.createElement('canvas');
            nc.width = nw;
            nc.height = nh;
            const ctx = nc.getContext('2d');
            ctx.translate(nw / 2, nh / 2);
            ctx.rotate(rad);
            ctx.drawImage(l.canvas, -w / 2, -h / 2);
            l.canvas = nc;
            l._thumbUrl = null;
            l._dirty = true;
        });
        State.doc = {w: nw, h: nh};
        State.sel = null;
        composite();
        renderLayers();
        fitToScreen();
        snapshot('Rotate ' + deg + '°');
    }

    // Straighten: rotate every layer by an arbitrary angle, growing the canvas so
    // nothing is clipped. Pairs naturally with a follow-up crop.
    function rotateDocByAngle(deg) {
        const rad = deg * Math.PI / 180;
        const {w, h} = State.doc;
        const cos = Math.abs(Math.cos(rad)), sin = Math.abs(Math.sin(rad));
        const nw = Math.round(w * cos + h * sin), nh = Math.round(w * sin + h * cos);
        State.layers.forEach(l => {
            const nc = document.createElement('canvas');
            nc.width = nw;
            nc.height = nh;
            const ctx = nc.getContext('2d');
            ctx.imageSmoothingQuality = 'high';
            ctx.translate(nw / 2, nh / 2);
            ctx.rotate(rad);
            ctx.drawImage(l.canvas, -w / 2, -h / 2);
            l.canvas = nc;
            l._thumbUrl = null;
            l._dirty = true;
        });
        State.doc = {w: nw, h: nh};
        State.sel = null;
        composite();
        renderLayers();
        buildInspector();
        fitToScreen();
        snapshot('Straighten ' + deg + '°');
        toast('Straightened ' + deg + '°', iconCheck);
    }

    function flipDoc(axis) {
        const {w, h} = State.doc;
        State.layers.forEach(l => {
            const nc = document.createElement('canvas');
            nc.width = w;
            nc.height = h;
            const ctx = nc.getContext('2d');
            ctx.translate(axis === 'h' ? w : 0, axis === 'v' ? h : 0);
            ctx.scale(axis === 'h' ? -1 : 1, axis === 'v' ? -1 : 1);
            ctx.drawImage(l.canvas, 0, 0);
            l.canvas = nc;
            l._thumbUrl = null;
            l._dirty = true;
        });
        composite();
        renderLayers();
        snapshot('Flip');
    }

    function resizeDoc(nw, nh) {
        nw = Math.max(1, Math.round(nw));
        nh = Math.max(1, Math.round(nh));
        State.layers.forEach(l => {
            const nc = document.createElement('canvas');
            nc.width = nw;
            nc.height = nh;
            nc.getContext('2d').imageSmoothingQuality = 'high';
            nc.getContext('2d').drawImage(l.canvas, 0, 0, nw, nh);
            l.canvas = nc;
            l._thumbUrl = null;
            l._dirty = true;
        });
        State.doc = {w: nw, h: nh};
        State.sel = null;
        composite();
        renderLayers();
        fitToScreen();
        snapshot('Resize');
        toast('Resized to ' + nw + '×' + nh, iconCheck);
    }

    /* =========================================================================
       OVERLAY (crop guides, brush ring)
       ========================================================================= */
    function drawOverlay() {
        if (!State.doc) return;
        const ps = previewScale();
        octx.setTransform(1, 0, 0, 1, 0, 0);
        octx.clearRect(0, 0, overlay.width, overlay.height);
        // Work in image-space coordinates regardless of preview downscaling.
        octx.setTransform(ps, 0, 0, ps, 0, 0);
        if (State.tool === 'crop' && State.crop) drawCropOverlay();
        if ((State.tool === 'select' || State.tool === 'move') && (State.sel || State._selDraft)) drawSelectionOverlay();
        if (State.tool === 'shape' && State._shapeDraft) drawShapeDraftOverlay();
        octx.setTransform(1, 0, 0, 1, 0, 0);
    }

    function drawSelectionOverlay() {
        const r = State._selDraft ? normRect(State._selDraft) : State.sel;
        if (!r || r.w < 1 || r.h < 1) return;
        const {w, h} = State.doc;
        octx.save();
        octx.fillStyle = 'rgba(10,9,7,.45)';
        octx.beginPath();
        octx.rect(0, 0, w, h);
        octx.rect(r.x, r.y, r.w, r.h);
        octx.fill('evenodd');
        // marching-ants style dashed border
        octx.strokeStyle = '#e8943a';
        octx.lineWidth = 1.5 / State.zoom;
        octx.setLineDash([6 / State.zoom, 4 / State.zoom]);
        octx.strokeRect(r.x, r.y, r.w, r.h);
        octx.setLineDash([]);
        octx.restore();
    }

    function drawShapeDraftOverlay() {
        // preview the shape live as it's dragged
        drawShapeOnCtx(octx, State._shapeDraft, {preview: true});
    }

    // Transient angled-guide preview while dragging the Straighten slider.
    let _straightenAngle = 0;

    function drawStraightenPreview(deg) {
        _straightenAngle = deg;
        const ps = previewScale();
        octx.setTransform(1, 0, 0, 1, 0, 0);
        octx.clearRect(0, 0, overlay.width, overlay.height);
        octx.setTransform(ps, 0, 0, ps, 0, 0);
        if (deg !== 0) {
            const {w, h} = State.doc;
            const rad = deg * Math.PI / 180;
            octx.save();
            octx.translate(w / 2, h / 2);
            octx.rotate(rad);
            octx.strokeStyle = 'rgba(232,148,58,.9)';
            octx.lineWidth = 1.5 / State.zoom;
            const ext = Math.hypot(w, h);
            // angled thirds grid centered on canvas
            octx.strokeStyle = 'rgba(233,226,212,.5)';
            octx.lineWidth = 1 / State.zoom;
            for (let i = -2; i <= 2; i++) {
                const off = i * (h / 6);
                octx.beginPath();
                octx.moveTo(-ext, off);
                octx.lineTo(ext, off);
                octx.stroke();
                const offx = i * (w / 6);
                octx.beginPath();
                octx.moveTo(offx, -ext);
                octx.lineTo(offx, ext);
                octx.stroke();
            }
            octx.restore();
            // label
            octx.setTransform(1, 0, 0, 1, 0, 0);
            octx.save();
            octx.font = '600 13px Inter, sans-serif';
            octx.fillStyle = '#e8943a';
            octx.textAlign = 'center';
            octx.fillText(deg + '°', overlay.width / 2, 22);
            octx.restore();
            octx.setTransform(ps, 0, 0, ps, 0, 0);
        }
    }

    function drawCropOverlay() {
        const r = State.crop;
        const {w, h} = State.doc;
        octx.save();
        octx.fillStyle = 'rgba(10,9,7,.62)';
        // darken outside crop
        octx.beginPath();
        octx.rect(0, 0, w, h);
        octx.rect(r.x, r.y, r.w, r.h);
        octx.fill('evenodd');
        // border
        octx.strokeStyle = '#e8943a';
        octx.lineWidth = 1.5 / State.zoom;
        octx.strokeRect(r.x, r.y, r.w, r.h);
        // thirds
        octx.strokeStyle = 'rgba(233,226,212,.35)';
        octx.lineWidth = 1 / State.zoom;
        for (let i = 1; i < 3; i++) {
            octx.beginPath();
            octx.moveTo(r.x + r.w * i / 3, r.y);
            octx.lineTo(r.x + r.w * i / 3, r.y + r.h);
            octx.stroke();
            octx.beginPath();
            octx.moveTo(r.x, r.y + r.h * i / 3);
            octx.lineTo(r.x + r.w, r.y + r.h * i / 3);
            octx.stroke();
        }
        // corner handles
        octx.fillStyle = '#e8943a';
        const hs = 7 / State.zoom;
        [[r.x, r.y], [r.x + r.w, r.y], [r.x, r.y + r.h], [r.x + r.w, r.y + r.h]].forEach(([x, y]) => {
            octx.fillRect(x - hs / 2, y - hs / 2, hs, hs);
        });
        octx.restore();
    }

    let brushCursorTimer = 0;

    function drawBrushCursor(p) {/* live ring drawn during stroke is optional; skipped for perf */
    }

    function drawShapeCursor(p) {/* crosshair handled via CSS cursor on the stage */
    }

    /* =========================================================================
       INSPECTOR PANELS (per tool)
       ========================================================================= */
    const ADJ_GROUPS = [
        {
            name: 'Light', items: [
                ['exposure', 'Exposure', -100, 100], ['brightness', 'Brightness', -100, 100],
                ['contrast', 'Contrast', -100, 100],
            ]
        },
        {
            name: 'Color', items: [
                ['saturation', 'Saturation', -100, 100], ['vibrance', 'Vibrance', -100, 100],
                ['temperature', 'Temperature', -100, 100], ['tint', 'Tint', -100, 100], ['hue', 'Hue shift', -180, 180],
            ]
        },
        {
            name: 'Detail', items: [
                ['sharpen', 'Sharpen', 0, 100], ['blur', 'Blur', 0, 100],
            ]
        },
        {
            name: 'Effects', items: [
                ['vignette', 'Vignette', 0, 100], ['grain', 'Film grain', 0, 100],
            ]
        },
    ];

    function buildInspector() {
        const body = $('#inspBody');
        const t = State.tool;
        $('#inspTitle').textContent = (toolPanels[t] || toolPanels.move).title;
        $('#inspDesc').textContent = (toolPanels[t] || toolPanels.move).desc;
        body.innerHTML = '';
        if (!State.doc) {
            body.innerHTML = '<div class="empty-note">Load an image to access the develop controls, filters, and layers.</div>';
            return;
        }

        if (t === 'move') {
            buildDevelopPanel(body);
            buildFilterPanel(body);
            buildLayersPanel(body);
        } else if (t === 'crop') {
            buildCropPanel(body);
        } else if (t === 'select') {
            buildSelectPanel(body);
            buildLayersPanel(body);
        } else if (t === 'shape') {
            buildShapePanel(body);
            buildLayersPanel(body);
        } else if (t === 'brush' || t === 'erase') {
            buildBrushPanel(body);
            buildLayersPanel(body);
        } else if (t === 'text') {
            buildTextPanel(body);
            buildLayersPanel(body);
        } else if (t === 'eyedrop') {
            buildEyedropPanel(body);
        }
    }

    function group(parent, name, collapsed) {
        const g = document.createElement('div');
        g.className = 'group' + (collapsed ? ' collapsed' : '');
        g.innerHTML = `<div class="group-head"><span class="name">${name}</span>
    <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></div>
    <div class="group-content"></div>`;
        g.querySelector('.group-head').onclick = () => g.classList.toggle('collapsed');
        parent.appendChild(g);
        return g.querySelector('.group-content');
    }

    function slider(parent, key, label, min, max) {
        const wrap = document.createElement('div');
        wrap.className = 'ctrl';
        const val = State.adjust[key];
        wrap.innerHTML = `<div class="ctrl-top"><label>${label}</label><span class="v" data-k="${key}">${val > 0 ? '+' : ''}${val}</span></div>`;
        const inp = document.createElement('input');
        inp.type = 'range';
        inp.min = min;
        inp.max = max;
        inp.value = val;
        inp.className = 'adjust amber';
        inp.dataset.key = key;
        wrap.appendChild(inp);
        const vEl = wrap.querySelector('.v');
        inp.addEventListener('input', () => {
            State.adjust[key] = +inp.value;
            vEl.textContent = (inp.value > 0 ? '+' : '') + inp.value;
            vEl.classList.toggle('changed', +inp.value !== 0);
            composite();
        });
        inp.addEventListener('change', () => snapshot('Adjust ' + label));
        // double-click value to reset
        vEl.addEventListener('dblclick', () => {
            inp.value = 0;
            State.adjust[key] = 0;
            vEl.textContent = '0';
            vEl.classList.remove('changed');
            composite();
            snapshot('Reset ' + label);
        });
        parent.appendChild(wrap);
        return inp;
    }

    function buildDevelopPanel(body) {

    // Analyse a downsampled version of the current composite and pick tonal
    // adjustments that expand contrast, balance brightness and lift flat colour.
    function autoEnhance() {
        // sample at small size for speed
        const sw = 160, sh = Math.max(1, Math.round(160 * State.doc.h / State.doc.w));
        const s = document.createElement('canvas');
        s.width = sw;
        s.height = sh;
        const sx = s.getContext('2d', {willReadFrequently: true});
        stackLayers(sx, sw, sh);
        const d = sx.getImageData(0, 0, sw, sh).data;
        let sum = 0, n = 0, satSum = 0;
        let lo = 255, hi = 0;
        const N = d.length / 4;
        for (let i = 0; i < d.length; i += 4) {
            const r = d[i], g = d[i + 1], b = d[i + 2];
            const lum = 0.299 * r + 0.587 * g + 0.114 * b;
            sum += lum;
            n++;
            if (lum < lo) lo = lum;
            if (lum > hi) hi = lum;
            const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
            satSum += mx === 0 ? 0 : (mx - mn) / mx;
        }
        const mean = sum / n;
        const sat = satSum / n;
        // brightness: nudge mean toward ~128
        const targetMean = 128;
        let brightness = Math.round(((targetMean - mean) / targetMean) * 55);
        brightness = Math.max(-40, Math.min(40, brightness));
        // contrast: stretch if histogram is narrow
        const range = hi - lo;
        let contrast = Math.round((1 - range / 255) * 60);
        contrast = Math.max(0, Math.min(45, contrast));
        // saturation: lift if image is flat, ease back if already vivid
        let saturation = Math.round((0.42 - sat) * 70);
        saturation = Math.max(-15, Math.min(35, saturation));
        State.adjust.brightness = brightness;
        State.adjust.contrast = contrast;
        State.adjust.saturation = saturation;
        composite();
        syncAdjustUI();
        buildInspector();
        snapshot('Auto-enhance');
        toast('Auto-enhanced', iconCheck);
    }

    let _thumbSrc = null;

    function buildThumbSource() {
        // Composite just the visible layers (no adjustments) into a small canvas
        const tw = 60, th = 46;
        _thumbSrc = document.createElement('canvas');
        _thumbSrc.width = tw;
        _thumbSrc.height = th;
        const ctx = _thumbSrc.getContext('2d');
        // letterbox the doc into the thumb while covering
        const {w, h} = State.doc;
        const scale = Math.max(tw / w, th / h);
        const dw = w * scale, dh = h * scale, dx = (tw - dw) / 2, dy = (th - dh) / 2;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, tw, th);
        for (const l of State.layers) {
            if (!l.visible || l.opacity <= 0) continue;
            ctx.globalAlpha = l.opacity;
            ctx.globalCompositeOperation = blendMap(l.blend);
            ctx.drawImage(l.canvas, dx, dy, dw, dh);
        }
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
    }

    function renderFilterThumb(cv, key) {
        if (!_thumbSrc) buildThumbSource();
        const ctx = cv.getContext('2d', {willReadFrequently: true});
        ctx.clearRect(0, 0, cv.width, cv.height);
        ctx.drawImage(_thumbSrc, 0, 0, cv.width, cv.height);
        if (key !== 'none') {
            const id = ctx.getImageData(0, 0, cv.width, cv.height);
            const d = id.data;
            for (let i = 0; i < d.length; i += 4) {
                const [r, g, b] = applyFilterPixel(key, d[i], d[i + 1], d[i + 2]);
                d[i] = r;
                d[i + 1] = g;
                d[i + 2] = b;
            }
            ctx.putImageData(id, 0, 0);
        }
    }

    function setCropAspect(v) {
        if (v === 'free') {
            return;
        }
        const ratio = parseFloat(v);
        const {w, h} = State.doc;
        let cw = w * 0.8, ch = cw / ratio;
        if (ch > h * 0.9) {
            ch = h * 0.8;
            cw = ch * ratio;
        }
        State.crop = {x: (w - cw) / 2, y: (h - ch) / 2, w: cw, h: ch};
        drawOverlay();
        updateCropFields();
    }

    function moveLayer(dir) {
        const a = activeLayer();
        const i = State.layers.indexOf(a);
        const j = i + dir;
        if (j < 0 || j >= State.layers.length) return;
        State.layers.splice(i, 1);
        State.layers.splice(j, 0, a);
        composite();
        renderLayers();
        snapshot('Reorder layer');
    }

    function mergeDown() {
        const a = activeLayer();
        const i = State.layers.indexOf(a);
        if (i <= 0) {
            toast('Nothing below to merge into');
            return;
        }
        const below = State.layers[i - 1];
        const ctx = below.canvas.getContext('2d');
        ctx.globalAlpha = a.opacity;
        ctx.globalCompositeOperation = blendMap(a.blend);
        ctx.drawImage(a.canvas, 0, 0);
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
        below._thumbUrl = null;
        below._dirty = true;
        State.layers.splice(i, 1);
        State.activeId = below.id;
        composite();
        renderLayers();
        snapshot('Merge down');
    }

    function renderLayers() {
        const list = $('#layerList');
        if (!list) return;
        list.innerHTML = '';
        // top layer first in UI
        [...State.layers].reverse().forEach(l => {
            const row = document.createElement('div');
            row.className = 'layer' + (l.id === State.activeId ? ' sel' : '') + (l.visible ? '' : ' hidden');
            row.dataset.lid = l.id;
            row.innerHTML = `
      <span class="eye" data-act="eye">${l.visible ? eyeOpen : eyeClosed}</span>
      <div class="thumb" style="background-image:url(${layerThumbUrl(l)})"></div>
      <span class="lname">${escapeHtml(l.name)}</span>
      <span class="pct">${Math.round(l.opacity * 100)}%</span>`;
            row.onclick = e => {
                if (e.target.closest('[data-act=eye]')) {
                    l.visible = !l.visible;
                    composite();
                    renderLayers();
                    snapshot('Toggle layer');
                    return;
                }
                State.activeId = l.id;
                highlightActiveLayer();
                syncLayerControls();
            };
            // rename on dblclick
            row.querySelector('.lname').addEventListener('dblclick', ev => {
                ev.stopPropagation();
                const span = ev.currentTarget;
                const old = l.name;
                span.innerHTML = `<input value="${escapeHtml(old)}">`;
                const inp = span.querySelector('input');
                inp.focus();
                inp.select();
                const commit = () => {
                    l.name = inp.value || old;
                    renderLayers();
                    snapshot('Rename layer');
                };
                inp.addEventListener('blur', commit);
                inp.addEventListener('keydown', k => {
                    if (k.key === 'Enter') inp.blur();
                    if (k.key === 'Escape') {
                        l.name = old;
                        renderLayers();
                    }
                });
            });
            list.appendChild(row);
        });
        syncLayerControls();
    }

    function doExport(fmt, scale, quality) {

        out.width = Math.round(State.doc.w * scale);

        const ctx = out.getContext('2d');
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(full, 0, 0, out.width, out.height);
        const mime = 'image/' + fmt;
        const url = out.toDataURL(mime, quality);
        const a = document.createElement('a');
        a.download = 'darkroom-' + Date.now() + '.' + (fmt === 'jpeg' ? 'jpg' : fmt);
        a.href = url;
        a.click();
        toast('Exported ' + a.download, iconCheck);

    /* =========================================================================
       KEYBOARD
       ========================================================================= */
    let spaceDown = false;
    window.addEventListener('keydown', e => {
        const typing = /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName);
        if (e.code === 'Space' && !typing) {
            spaceDown = true;
            if (State.doc) stageScroll.style.cursor = 'grab';
        }
        if (typing) return;
        const mod = e.ctrlKey || e.metaKey;
        if (mod && e.key.toLowerCase() === 'z' && !e.shiftKey) {
            e.preventDefault();
            undo();
            return;
        }
        if (mod && (e.key.toLowerCase() === 'y' || (e.key.toLowerCase() === 'z' && e.shiftKey))) {
            e.preventDefault();
            redo();
            return;
        }
        if (mod && e.key.toLowerCase() === 's') {
            e.preventDefault();
            if (State.doc) buildExportSheet();
            return;
        }
        if (mod && e.key.toLowerCase() === 'a') {
            e.preventDefault();
            if (State.doc) {
                setTool('select');
                selectAll();
            }
            return;
        }
        if (mod) return;
        // Escape cancels any in-progress draft or clears a selection
        if (e.key === 'Escape') {
            if (State._shapeDraft) {
                State._shapeDraft = null;
                drawOverlay();
                return;
            }
            if (State._selDraft) {
                State._selDraft = null;
                drawOverlay();
                return;
            }
            if (State.sel) {
                clearSelection();
                return;
            }
        }
        const map = {v: 'move', c: 'crop', m: 'select', s: 'shape', b: 'brush', e: 'erase', t: 'text', i: 'eyedrop'};
        if (map[e.key.toLowerCase()]) {
            setTool(map[e.key.toLowerCase()]);
            return;
        }
        if (e.key === '0') {
            fitToScreen();
            return;
        }
        if (e.key === 'n' || e.key === 'N') {
            buildNewCanvasSheet();
            return;
        }
        if (e.key === '+' || e.key === '=') {
            setZoom(State.zoom * 1.25);
            return;
        }
        if (e.key === '-') {
            setZoom(State.zoom / 1.25);
            return;
        }
        if (e.key === '[') {
            State.brush.size = Math.max(1, State.brush.size - 4);
            refreshBrushSize();
        }
        if (e.key === ']') {
            State.brush.size = Math.min(300, State.brush.size + 4);
            refreshBrushSize();
        }
        if (e.key === 'Delete' || e.key === 'Backspace') {
            if (State.tool === 'crop' && State.crop) {
                State.crop = null;
                drawOverlay();
                updateCropFields();
                return;
            }
            if (State.sel) {
                clearSelectionPixels();
                return;
            }
        }
    });

            if (State.tool === 'move') stageScroll.style.cursor = '';

    function refreshBrushSize() {
        if ((State.tool === 'brush' || State.tool === 'erase')) {
            const s = $$('.ctrl .v')[0];// first slider value is size in brush panel
        }
        // simplest: rebuild brush panel value
        const sizeVal = document.querySelector('.insp-body .ctrl .v');
        buildInspector();
    }

    /* =========================================================================
       INIT
       ========================================================================= */
    buildInspector();
    window.addEventListener('resize', () => {
        if (State.doc && State.zoom <= fitZoom() * 1.02) fitToScreen();
    });

    function fitZoom() {
        const pad = 64;
        return Math.min((stageScroll.clientWidth - pad) / State.doc.w, (stageScroll.clientHeight - pad) / State.doc.h, 1);
    }

    setStatus('Ready — open an image to begin');

    /* Re-render filter thumbnails when develop tab is shown and image present */
    const _origBuild = buildInspector;
</script>
