<body>

    <div class="ml">

            <button class="btn btn-s" style="padding:5px 8px" onclick="clPrev()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>

            </button>

            </button>

                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">

<div class="ld" id="ld">
    <div class="sp"></div>
    <span id="lT">Processing…</span></div>
<div class="tt" id="tt"></div>
<div class="gd" id="gD"><span>Drop PDF here</span></div>
<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const {PDFDocument, degrees} = PDFLib;
    let doc = null, raw = null, pgs = [], sel = new Set(), pvI = -1, fName = '', lastSel = -1;
    const $ = id => document.getElementById(id);
    const uC = $('uC'), uZ = $('uZ'), fI = $('fI'), hA = $('hA'), tB = $('tB'), gC = $('gC'), pG = $('pG'),
        pI = $('pI'), sI = $('sI'), ld = $('ld'), lT = $('lT'), tt = $('tt'), pM = $('pM'), pC = $('pC'), pT = $('pT'),
        gD = $('gD');
    uZ.onclick = () => fI.click();
    fI.onchange = e => {
        if (e.target.files[0]) load(e.target.files[0])
    };
    uZ.ondragover = e => {
        e.preventDefault();
        uZ.classList.add('over')
    };
    uZ.ondragleave = () => uZ.classList.remove('over');
    uZ.ondrop = e => {
        e.preventDefault();
        uZ.classList.remove('over');
        if (e.dataTransfer.files[0]) load(e.dataTransfer.files[0])
    };
    let gdc = 0;
    document.addEventListener('dragenter', e => {
        e.preventDefault();
        gdc++;
        if (!uC.classList.contains('hid')) return;
        gD.classList.add('on')
    });
    document.addEventListener('dragleave', e => {
        e.preventDefault();
        gdc--;
        if (gdc <= 0) {
            gdc = 0;
            gD.classList.remove('on')
        }
    });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => {
        e.preventDefault();
        gdc = 0;
        gD.classList.remove('on');
        if (!uC.classList.contains('hid')) return;
        const f = e.dataTransfer.files[0];
        if (f) load(f)
    });

    function openFile() {
        fI.value = '';
        fI.click()
    }

    async function load(f) {
        if (f.type !== 'application/pdf' && !f.name.endsWith('.pdf')) {
            toast('Please select a PDF file');
            return
        }
        fName = f.name;
        sld('Loading PDF…');
        try {
            raw = await f.arrayBuffer();
            doc = await pdfjsLib.getDocument({data: raw.slice(0)}).promise;
            pgs = Array.from({length: doc.numPages}, () => ({r: 0}));
            sel.clear();
            lastSel = -1;
            uC.classList.add('hid');
            hA.classList.remove('hid');
            tB.classList.remove('hid');
            gC.classList.remove('hid');
            pI.textContent = `${doc.numPages} page${doc.numPages > 1 ? 's' : ''}`;
            await renderAll();
        } catch (e) {
            console.error(e);
            toast('Error loading PDF')
        }
        hld();
    }

    async function renderAll() {
        pG.innerHTML = '';
        const frg = document.createDocumentFragment();
        for (let i = 0; i < doc.numPages; i++) frg.appendChild(mkCard(i));
        pG.appendChild(frg);
        for (let i = 0; i < doc.numPages; i++) await rThumb(i);
    }

    function mkCard(i) {
        const c = document.createElement('div');
        c.className = 'pc';
        c.dataset.i = i;
        c.dataset.r = '0';
        c.innerHTML = `<div class="cb"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="pt"><canvas id="t${i}"></canvas><div class="rb" id="b${i}"></div></div><div class="pf"><span class="pn">Page ${i + 1}</span><div class="pcs"><button title="Rotate CCW"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.64-11.36L3 10"/></svg></button><button title="Rotate CW"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 11-5.64-11.36L21 10"/></svg></button></div></div>`;
        const btns = c.querySelectorAll('.pcs button');
        btns[0].onclick = e => {
            e.stopPropagation();
            rot(i, -90)
        };
        btns[1].onclick = e => {
            e.stopPropagation();
            rot(i, 90)
        };
        c.querySelector('.cb').onclick = e => {
            e.stopPropagation();
            tglSel(i, e)
        };
        c.querySelector('.pt').ondblclick = e => {
            e.stopPropagation();
            oPrev(i)
        };
        c.onclick = e => {
            if (!e.target.closest('.pcs')) tglSel(i, e)
        };
        return c;
    }

    async function rThumb(i) {
        const pg = await doc.getPage(i + 1);
        const r = pgs[i].r;
        const vp0 = pg.getViewport({scale: 1, rotation: r});
        const s = 200 / Math.max(vp0.width, vp0.height);
        const vp = pg.getViewport({scale: s, rotation: r});
        const cv = $(`t${i}`);
        cv.width = vp.width;
        cv.height = vp.height;
        await pg.render({canvasContext: cv.getContext('2d'), viewport: vp}).promise;
        const card = cv.closest('.pc');
        card.dataset.r = r;
        $(`b${i}`).textContent = r ? r + '°' : '';
    }

    function tglSel(i, e) {
        if (e && e.shiftKey && lastSel >= 0) {
            const lo = Math.min(lastSel, i), hi = Math.max(lastSel, i);
            for (let j = lo; j <= hi; j++) sel.add(j);
        } else {
            if (sel.has(i)) sel.delete(i); else sel.add(i);
        }
        lastSel = i;
        updSel();
    }

    function selAll() {
        for (let i = 0; i < pgs.length; i++) sel.add(i);
        updSel()
    }

    function desel() {
        sel.clear();
        updSel()
    }

    function updSel() {
        document.querySelectorAll('.pc').forEach((c, i) => c.classList.toggle('sel', sel.has(i)));
        sI.textContent = sel.size ? `${sel.size} selected` : '';
    }

    async function rot(i, d) {
        pgs[i].r = (pgs[i].r + d + 360) % 360;
        await rThumb(i);
        if (pvI === i) rPrev(i)
    }

    async function rotSel(d) {
        if (!sel.size) {
            toast('Select pages first');
            return
        }
        sld('Rotating…');
        for (const i of sel) {
            pgs[i].r = (pgs[i].r + d + 360) % 360;
            await rThumb(i)
        }
        if (sel.has(pvI)) rPrev(pvI);
        hld();
    }

    async function rotAllP(d) {
        sld('Rotating all…');
        for (let i = 0; i < pgs.length; i++) {
            pgs[i].r = (pgs[i].r + d + 360) % 360;
            await rThumb(i)
        }
        if (pvI >= 0) rPrev(pvI);
        hld();
    }

    async function resetAll() {
        for (let i = 0; i < pgs.length; i++) {
            pgs[i].r = 0;
            await rThumb(i)
        }
        toast('All rotations reset');
    }

    async function oPrev(i) {
        pvI = i;
        pM.classList.add('on');
        document.body.style.overflow = 'hidden';
        await rPrev(i)
    }

    async function rPrev(i) {
        const pg = await doc.getPage(i + 1);
        const r = pgs[i].r;
        const vp0 = pg.getViewport({scale: 1, rotation: r});
        const s = Math.min(800 / vp0.width, 600 / vp0.height, 2);
        const vp = pg.getViewport({scale: s, rotation: r});
        pC.width = vp.width;
        pC.height = vp.height;
        await pg.render({canvasContext: pC.getContext('2d'), viewport: vp}).promise;
        pT.textContent = `Page ${i + 1} of ${pgs.length}${pgs[i].r ? ' · ' + pgs[i].r + '°' : ''}`;
    }

    function clPrev() {
        pM.classList.remove('on');
        pvI = -1;
        document.body.style.overflow = ''
    }

    async function pNav(d) {
        const n = pvI + d;
        if (n < 0 || n >= pgs.length) return;
        pvI = n;
        await rPrev(pvI)
    }

    async function rotPP(d) {
        await rot(pvI, d)
    }

    async function dl() {
        sld('Generating PDF…');
        try {
            const pd = await PDFDocument.load(raw);
            const dps = pd.getPages();
            for (let i = 0; i < pgs.length; i++) {
                if (pgs[i].r) {
                    const cur = dps[i].getRotation().angle;
                    dps[i].setRotation(degrees((cur + pgs[i].r) % 360))
                }
            }
            const out = await pd.save();
            const b = new Blob([out], {type: 'application/pdf'});
            const u = URL.createObjectURL(b);
            const a = document.createElement('a');
            a.href = u;
            a.download = fName.replace(/\.pdf$/i, '') + '_rotated.pdf';
            a.click();
            URL.revokeObjectURL(u);
            toast('PDF downloaded!');
        } catch (e) {
            console.error(e);
            toast('Error generating PDF')
        }
        hld();
    }

    document.addEventListener('keydown', e => {
        if (pM.classList.contains('on')) {
            if (e.key === 'Escape') clPrev();
            if (e.key === 'ArrowLeft') pNav(-1);
            if (e.key === 'ArrowRight') pNav(1);
            return;
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'a' && !uC.classList.contains('hid') === false) {
            e.preventDefault();
            selAll()
        }
    });

    function sld(t) {
        lT.textContent = t;
        ld.classList.add('on')
    }

    function hld() {
        ld.classList.remove('on')
    }

    function toast(m) {
        tt.textContent = m;
        tt.classList.add('on');
        setTimeout(() => tt.classList.remove('on'), 2500)
    }
</script>
<script src="../logo.js"></script>
</body>
