<div id="blocker">

</div>

</div>

        <h2>Frame Settings</h2>
        <div id="preview-area">
            <canvas id="preview-canvas"></canvas>
            <span class="empty-msg">No image selected</span>
            <div id="preview-overlay">
                <span id="zoom-label">100%</span>
                <button id="reset-view-btn">Reset</button>
            </div>
            <div id="preview-hint" class="visible">Scroll to zoom · Drag to pan</div>
        </div>
        <label id="upload-btn">Choose Image<input type="file" id="file-input" accept="image/*"></label>
        <div class="form-row" style="margin-top:16px">
            <label>Title</label>
            <input type="text" id="title-input" placeholder="Artwork title" maxlength="60">
        </div>
        <div class="form-row">
            <label>Aspect Ratio <span class="range-val" id="ratio-val">5:4</span></label>
            <input type="range" id="ratio-slider" min="40" max="250" value="125" step="1">
        </div>
        <div class="form-row">
            <label>Frame Style</label>
            <div id="frame-colors">
                <button class="fc-btn active" data-color="dark" style="background:#2a2a2a"></button>
                <button class="fc-btn" data-color="white" style="background:#e0ddd8"></button>
                <button class="fc-btn" data-color="walnut" style="background:#654321"></button>
                <button class="fc-btn" data-color="gold" style="background:#c5a346"></button>
                <button class="fc-btn" data-color="none" style="background:var(--bg)">✕</button>
            </div>
        </div>
        <div class="modal-actions">
            <button id="remove-btn">Remove</button>
            <button id="cancel-btn">Cancel</button>
            <button id="apply-btn">Apply</button>

<script type="importmap">
    {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"}}

<script type="module">
    import *as THREE from 'three';
    import {PointerLockControls} from 'three/addons/controls/PointerLockControls.js';

    const RW = 8, WH = 4, SEG = 10, DEF_FW = 1.5, DEF_FH = 1.2, FB = 0.08, FS = 3, FSTART = 2, MAX_LEN = 100,
        CAM_H = 1.6, MOVE_SPD = 3, SPRINT_SPD = 5.5, NORMAL_FOV = 70, SPRINT_FOV = 80, GRAVITY = -14, JUMP_FORCE = 5.5,
        MAX_DIM = 1.8, MIN_DIM = 0.5, REF_AREA = DEF_FW * DEF_FH;
    const SAVE_KEY = 'artGallery_v2';
    const FRAME_STYLES = {
        dark: {color: 0x2a2a2a, roughness: 0.4, metalness: 0.1},
        white: {color: 0xe0ddd8, roughness: 0.5, metalness: 0.05},
        walnut: {color: 0x654321, roughness: 0.55, metalness: 0.05},
        gold: {color: 0xc5a346, roughness: 0.25, metalness: 0.5},
        none: null
    };
    let roomLen = SEG, appState = 'outside', frames = [], selectedFrame = null, clock = new THREE.Clock();
    let pendingImage = null, pendingScale = 1, pendingOffX = 0, pendingOffY = 0, pendingTitle = '',
        pendingRatio = DEF_FW / DEF_FH, pendingFrameColor = 'dark';
    let previewImg = null;
    let velocityY = 0, isGrounded = true, currentFov = NORMAL_FOV;
    let saveTimeout = null;
    let isDragging = false, dragStartX = 0, dragStartY = 0, dragStartOffX = 0, dragStartOffY = 0;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    const camera = new THREE.PerspectiveCamera(NORMAL_FOV, innerWidth / innerHeight, 0.05, 250);
    camera.position.set(0, CAM_H, 5);
    camera.lookAt(0, CAM_H, 0);
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);
    const controls = new PointerLockControls(camera, document.body);
    const wallMat = new THREE.MeshStandardMaterial({color: 0xf0f0f0, roughness: 0.95, metalness: 0});
    const ceilMat = new THREE.MeshStandardMaterial({color: 0xe8e8e8, roughness: 0.95, metalness: 0});
    const floorMat = new THREE.MeshStandardMaterial({color: 0xd0ccc8, roughness: 0.85, metalness: 0});
    const doorMat = new THREE.MeshStandardMaterial({color: 0x8B7355, roughness: 0.6, metalness: 0.05});
    const doorFrameMat = new THREE.MeshStandardMaterial({color: 0x5C4033, roughness: 0.5, metalness: 0.05});
    let plusTex = null;

    function makePlusTex() {
        const c = document.createElement('canvas');
        c.width = 256;
        c.height = 256;
        const x = c.getContext('2d');
        x.fillStyle = '#ebebeb';
        x.fillRect(0, 0, 256, 256);
        x.strokeStyle = '#ccc';
        x.lineWidth = 3;
        x.lineCap = 'round';
        x.beginPath();
        x.moveTo(112, 128);
        x.lineTo(144, 128);
        x.moveTo(128, 112);
        x.lineTo(128, 144);
        x.stroke();
        plusTex = new THREE.CanvasTexture(c);
        return plusTex;
    }

    makePlusTex();
    const structGroup = new THREE.Group();
    scene.add(structGroup);
    const lightGroup = new THREE.Group();
    scene.add(lightGroup);
    const frameGroup = new THREE.Group();
    scene.add(frameGroup);
    let doorMesh = null, doorFrameGroup = null;
    const DUST_COUNT = 400;
    const dustPositions = new Float32Array(DUST_COUNT * 3);
    const dustVelocities = [];

    function initDust() {
        for (let i = 0; i < DUST_COUNT; i++) {
            dustPositions[i * 3] = (Math.random() - 0.5) * RW * 0.9;
            dustPositions[i * 3 + 1] = Math.random() * WH;
            dustPositions[i * 3 + 2] = -Math.random() * roomLen;
            dustVelocities.push({
                x: (Math.random() - 0.5) * 0.08,
                y: (Math.random() - 0.5) * 0.03 + 0.01,
                z: (Math.random() - 0.5) * 0.08
            });
        }
    }

    initDust();
    const dustGeo = new THREE.BufferGeometry();
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
    const dustMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.012,
        transparent: true,
        opacity: 0.35,
        sizeAttenuation: true,
        depthWrite: false
    });
    const dustParticles = new THREE.Points(dustGeo, dustMat);
    scene.add(dustParticles);

    function updateDust(dt) {
        const pos = dustGeo.attributes.position.array;
        for (let i = 0; i < DUST_COUNT; i++) {
            const v = dustVelocities[i];
            pos[i * 3] += v.x * dt;
            pos[i * 3 + 1] += v.y * dt;
            pos[i * 3 + 2] += v.z * dt;
            v.x += ((Math.random() - 0.5) * 0.1 - v.x * 0.5) * dt;
            v.y += ((Math.random() - 0.5) * 0.05 - v.y * 0.3) * dt;
            v.z += ((Math.random() - 0.5) * 0.1 - v.z * 0.5) * dt;
            const hw = RW / 2 * 0.9;
            if (pos[i * 3] < -hw || pos[i * 3] > hw) {
                pos[i * 3] = Math.max(-hw, Math.min(hw, pos[i * 3]));
                v.x *= -0.5;
            }
            if (pos[i * 3 + 1] < 0 || pos[i * 3 + 1] > WH) {
                pos[i * 3 + 1] = Math.max(0, Math.min(WH, pos[i * 3 + 1]));
                v.y *= -0.5;
            }
            if (pos[i * 3 + 2] < -roomLen || pos[i * 3 + 2] > 0) {
                pos[i * 3 + 2] = Math.max(-roomLen, Math.min(0, pos[i * 3 + 2]));
                v.z *= -0.5;
            }
        }
        dustGeo.attributes.position.needsUpdate = true;
    }

    function respawnDust() {
        const pos = dustGeo.attributes.position.array;
        for (let i = 0; i < DUST_COUNT; i++) {
            if (pos[i * 3 + 2] < -roomLen + 1) pos[i * 3 + 2] = -Math.random() * roomLen;
        }
        dustGeo.attributes.position.needsUpdate = true;
    }

    function dimsFromRatio(ratio) {
        let h = Math.sqrt(REF_AREA / ratio);
        let w = ratio * h;
        w = Math.max(MIN_DIM, Math.min(MAX_DIM, w));
        h = Math.max(MIN_DIM, Math.min(MAX_DIM, h));
        return {fw: w, fh: h};
    }

    function ratioLabel(r) {
        const rats = [[1, 1], [5, 4], [4, 3], [3, 2], [16, 9], [2, 1], [16, 10], [4, 5], [3, 4], [2, 3], [9, 16], [1, 2]];
        let best = '1:1', bestD = Infinity;
        for (const [a, b] of rats) {
            const d = Math.abs(r - a / b);
            if (d < bestD) {
                bestD = d;
                best = `${a}:${b}`;
            }
        }
        if (bestD > 0.08) return r.toFixed(2) + ':1';
        return best;
    }

    function getFrameStyleMat(key) {
        const s = FRAME_STYLES[key];
        if (!s) return null;
        return new THREE.MeshStandardMaterial({color: s.color, roughness: s.roughness, metalness: s.metalness});
    }

    function buildEntrance() {
        const shape = new THREE.Shape();
        shape.moveTo(-RW / 2, 0);
        shape.lineTo(RW / 2, 0);
        shape.lineTo(RW / 2, WH);
        shape.lineTo(-RW / 2, WH);
        shape.closePath();
        const dw = 1.3, dh = 2.5;
        const hole = new THREE.Path();
        hole.moveTo(-dw / 2, 0);
        hole.lineTo(dw / 2, 0);
        hole.lineTo(dw / 2, dh);
        hole.lineTo(-dw / 2, dh);
        hole.closePath();
        shape.holes.push(hole);
        const geo = new THREE.ShapeGeometry(shape);
        const mesh = new THREE.Mesh(geo, wallMat);
        mesh.rotation.y = Math.PI;
        mesh.position.set(0, 0, 0);
        mesh.receiveShadow = true;
        structGroup.add(mesh);
        const outerMesh = mesh.clone();
        outerMesh.rotation.y = 0;
        outerMesh.position.z = 0.001;
        structGroup.add(outerMesh);
        doorFrameGroup = new THREE.Group();
        const dfDepth = 0.15, dfWidth = 0.08;
        const topBar = new THREE.Mesh(new THREE.BoxGeometry(dw + dfWidth * 2, dfWidth, dfDepth), doorFrameMat);
        topBar.position.set(0, dh + dfWidth / 2, 0);
        doorFrameGroup.add(topBar);
        const leftBar = new THREE.Mesh(new THREE.BoxGeometry(dfWidth, dh + dfWidth, dfDepth), doorFrameMat);
        leftBar.position.set(-dw / 2 - dfWidth / 2, (dh + dfWidth) / 2, 0);
        doorFrameGroup.add(leftBar);
        const rightBar = new THREE.Mesh(new THREE.BoxGeometry(dfWidth, dh + dfWidth, dfDepth), doorFrameMat);
        rightBar.position.set(dw / 2 + dfWidth / 2, (dh + dfWidth) / 2, 0);
        doorFrameGroup.add(rightBar);
        structGroup.add(doorFrameGroup);
        const doorGeo = new THREE.BoxGeometry(dw - 0.04, dh - 0.04, 0.06);
        doorMesh = new THREE.Mesh(doorGeo, doorMat);
        doorMesh.position.set(0, dh / 2, 0.04);
        doorMesh.castShadow = true;
        const handleGeo = new THREE.BoxGeometry(0.04, 0.15, 0.06);
        const handleMat = new THREE.MeshStandardMaterial({color: 0xc0a060, roughness: 0.3, metalness: 0.6});
        const handle = new THREE.Mesh(handleGeo, handleMat);
        handle.position.set(dw / 2 - 0.2, 0, 0.05);
        doorMesh.add(handle);
        structGroup.add(doorMesh);
    }

    function clearStruct() {
        while (structGroup.children.length) {
            const c = structGroup.children[0];
            structGroup.remove(c);
            if (c.geometry) c.geometry.dispose();
        }
        while (lightGroup.children.length) {
            const c = lightGroup.children[0];
            lightGroup.remove(c);
            if (c.dispose) c.dispose();
        }
    }

    function buildRoom() {
        clearStruct();
        buildEntrance();
        const fGeo = new THREE.PlaneGeometry(RW, roomLen);
        const floor = new THREE.Mesh(fGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(0, 0, -roomLen / 2);
        floor.receiveShadow = true;
        structGroup.add(floor);
        const ceil = new THREE.Mesh(new THREE.PlaneGeometry(RW, roomLen), ceilMat);
        ceil.rotation.x = Math.PI / 2;
        ceil.position.set(0, WH, -roomLen / 2);
        structGroup.add(ceil);
        const lw = new THREE.Mesh(new THREE.PlaneGeometry(roomLen, WH), wallMat);
        lw.rotation.y = Math.PI / 2;
        lw.position.set(-RW / 2, WH / 2, -roomLen / 2);
        lw.receiveShadow = true;
        structGroup.add(lw);
        const rw = new THREE.Mesh(new THREE.PlaneGeometry(roomLen, WH), wallMat);
        rw.rotation.y = -Math.PI / 2;
        rw.position.set(RW / 2, WH / 2, -roomLen / 2);
        rw.receiveShadow = true;
        structGroup.add(rw);
        const bw = new THREE.Mesh(new THREE.PlaneGeometry(RW, WH), wallMat);
        bw.position.set(0, WH / 2, -roomLen);
        bw.receiveShadow = true;
        structGroup.add(bw);
        const amb = new THREE.AmbientLight(0xffffff, 0.45);
        lightGroup.add(amb);
        const hemi = new THREE.HemisphereLight(0xffffff, 0xe0d8d0, 0.3);
        lightGroup.add(hemi);
        for (let z = -2.5; z >= -roomLen; z -= 5) {
            const pl = new THREE.PointLight(0xfff8f0, 0.8, 14, 1.5);
            pl.position.set(0, WH - 0.1, z);
            lightGroup.add(pl);
        }
        frames.forEach(f => {
            if (f.spotlight && f.spotlight.parent) lightGroup.remove(f.spotlight);
            const sp = new THREE.SpotLight(0xfff8f0, 2.5, 7, Math.PI / 5, 0.5, 1.2);
            sp.position.set(f.group.position.x * 0.3, WH - 0.1, f.zPos);
            sp.target.position.copy(f.group.position);
            lightGroup.add(sp);
            lightGroup.add(sp.target);
            f.spotlight = sp;
        });
    }

    function getFrameZs(len) {
        const zs = [];
        for(let z=-FSTART;z>=-(len-2);z-=FS)zs.push(z);
        return zs;
    }

    function createPlaqueTex(text) {
        const c = document.createElement('canvas');
        c.width = 512;
        c.height = 64;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, 512, 64);
        ctx.fillStyle = '#c8b89a';
        ctx.font = '300 22px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text.substring(0, 50), 256, 33);
        const tex = new THREE.CanvasTexture(c);
        tex.minFilter = THREE.LinearFilter;
        return tex;
    }

    function updatePlaque(fr) {
        if (fr.plaqueMesh) {
            fr.group.remove(fr.plaqueMesh);
            if (fr.plaqueMesh.material.map) fr.plaqueMesh.material.map.dispose();
            fr.plaqueMesh.material.dispose();
            fr.plaqueMesh.geometry.dispose();
            fr.plaqueMesh = null;
        }
        if (fr.title && fr.title.trim()) {
            const tex = createPlaqueTex(fr.title);
            const mat = new THREE.MeshStandardMaterial({map: tex, roughness: 0.3, metalness: 0.15});
            const geo = new THREE.PlaneGeometry(0.5, 0.06);
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(0, -fr.fh / 2 - FB - 0.08, 0.002);
            fr.group.add(mesh);
            fr.plaqueMesh = mesh;
        }
    }

    function rebuildFrameVisuals(fr) {
        const keep = [];
        fr.group.children.forEach(c => keep.push(c));
        keep.forEach(c => {
            fr.group.remove(c);
            if (c.geometry) c.geometry.dispose();
            if (c.material) {
                if (c.material.map && c.material.map !== plusTex && c.material.map !== fr.texture) c.material.map.dispose();
                c.material.dispose();
            }
        });
        fr.plaqueMesh = null;
        const fw = fr.fw, fh = fr.fh;
        const isNone = fr.frameColor === 'none';
        const fMat = isNone ? null : getFrameStyleMat(fr.frameColor);
        if (!isNone && fMat) {
            const outerW = fw + FB * 2, depth = 0.04;
            const top = new THREE.Mesh(new THREE.BoxGeometry(outerW, FB, depth), fMat);
            top.position.set(0, fh / 2 + FB / 2, 0);
            top.castShadow = true;
            fr.group.add(top);
            const bot = new THREE.Mesh(new THREE.BoxGeometry(outerW, FB, depth), fMat.clone());
            bot.position.set(0, -fh / 2 - FB / 2, 0);
            bot.castShadow = true;
            fr.group.add(bot);
            const lft = new THREE.Mesh(new THREE.BoxGeometry(FB, fh, depth), fMat.clone());
            lft.position.set(-fw / 2 - FB / 2, 0, 0);
            lft.castShadow = true;
            fr.group.add(lft);
            const rgt = new THREE.Mesh(new THREE.BoxGeometry(FB, fh, depth), fMat.clone());
            rgt.position.set(fw / 2 + FB / 2, 0, 0);
            rgt.castShadow = true;
            fr.group.add(rgt);
        }
        const backing = new THREE.Mesh(new THREE.PlaneGeometry(fw, fh), new THREE.MeshStandardMaterial({
            color: 0xe8e8e8,
            roughness: 0.9
        }));
        backing.position.z = -0.01;
        fr.group.add(backing);
        let imgMat;
        if (fr.texture) {
            imgMat = new THREE.MeshStandardMaterial({
                map: fr.texture,
                roughness: 0.2,
                metalness: 0,
                emissive: 0xffffff,
                emissiveMap: fr.texture,
                emissiveIntensity: 0.12
            });
        } else {
            imgMat = new THREE.MeshStandardMaterial({map: plusTex.clone(), roughness: 0.9});
        }
        const imgPlane = new THREE.Mesh(new THREE.PlaneGeometry(fw, fh), imgMat);
        imgPlane.position.z = 0.001;
        fr.group.add(imgPlane);
        fr.imgPlane = imgPlane;
        if (fr.texture) applyUV(fr);
        if (fr.title) updatePlaque(fr);
    }

    function createFrame(side, zPos) {
        const g = new THREE.Group();
        const x = side === 'left' ? -RW / 2 + 0.02 : RW / 2 - 0.02;
        g.position.set(x, WH / 2, zPos);
        g.rotation.y = side === 'left' ? Math.PI / 2 : -Math.PI / 2;
        const fObj = {
            group: g,
            imgPlane: null,
            side,
            zPos,
            imageData: null,
            scale: 1,
            offX: 0,
            offY: 0,
            title: '',
            texture: null,
            spotlight: null,
            plaqueMesh: null,
            fw: DEF_FW,
            fh: DEF_FH,
            frameColor: 'dark'
        };
        rebuildFrameVisuals(fObj);
        frameGroup.add(g);
        const sp = new THREE.SpotLight(0xfff8f0, 2.5, 7, Math.PI / 5, 0.5, 1.2);
        sp.position.set(x * 0.3, WH - 0.1, zPos);
        sp.target.position.set(x, WH / 2, zPos);
        lightGroup.add(sp);
        lightGroup.add(sp.target);
        fObj.spotlight = sp;
        frames.push(fObj);
        return fObj;
    }

    function initFrames() {
        const zs = getFrameZs(roomLen);
        zs.forEach(z => {
            createFrame('left', z);
            createFrame('right', z);
        });
    }

    function addNewFrames(oldLen, newLen) {
        const oldZs = new Set(getFrameZs(oldLen).map(z => z.toFixed(2)));
        const newZs = getFrameZs(newLen);
        newZs.forEach(z => {
            if (!oldZs.has(z.toFixed(2))) {
                createFrame('left', z);
                createFrame('right', z);
            }
        });
    }

    function expandRoom(amt) {
        const oldLen = roomLen;
        const newLen = Math.min(roomLen + amt, MAX_LEN);
        if (newLen === roomLen) return;
        roomLen = newLen;
        buildRoom();
        addNewFrames(oldLen, newLen);
        respawnDust();
        updateRoomInfo();
        updateExpandBtns();
        saveGallery();
    }

    function updateRoomInfo() {
        document.getElementById('room-info').textContent = `Room: ${RW}m × ${roomLen}m · ${frames.length} frames`;
    }

    function updateExpandBtns() {
        document.querySelectorAll('#expand-ui button').forEach(b => {
            b.disabled = roomLen + parseInt(b.dataset.amt) > MAX_LEN;
        });
    }

    function showSaveStatus(msg) {
        const el = document.getElementById('save-status');
        el.textContent = msg;
        el.classList.add('visible');
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => el.classList.remove('visible'), 2000);
    }

    function saveGallery() {
        const data = {
            roomLen, frames: frames.map(f => ({
                side: f.side,
                zPos: f.zPos,
                imageData: f.imageData,
                scale: f.scale,
                offX: f.offX,
                offY: f.offY,
                title: f.title || '',
                fw: f.fw,
                fh: f.fh,
                frameColor: f.frameColor
            }))
        };
        try {
            localStorage.setItem(SAVE_KEY, JSON.stringify(data));
            showSaveStatus('Gallery saved');
        } catch (e) {
            showSaveStatus('Save failed — storage full');
        }
    }

    function loadGallery() {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            if (data.roomLen && data.roomLen > SEG && data.roomLen <= MAX_LEN) {
                roomLen = data.roomLen;
            }
            buildRoom();
            frames = [];
            while (frameGroup.children.length) {
                const c = frameGroup.children[0];
                frameGroup.remove(c);
            }
            initFrames();
            if (data.frames) {
                data.frames.forEach(saved => {
                    const fr = frames.find(f => f.side === saved.side && Math.abs(f.zPos - saved.zPos) < 0.1);
                    if (!fr) return;
                    fr.scale = saved.scale || 1;
                    fr.offX = saved.offX || 0;
                    fr.offY = saved.offY || 0;
                    fr.title = saved.title || '';
                    fr.fw = saved.fw || DEF_FW;
                    fr.fh = saved.fh || DEF_FH;
                    fr.frameColor = saved.frameColor || 'dark';
                    if (saved.imageData) {
                        fr.imageData = saved.imageData;
                        const img = new Image();
                        img.onload = () => {
                            if (fr.texture) fr.texture.dispose();
                            const tex = new THREE.Texture(img);
                            tex.colorSpace = THREE.SRGBColorSpace;
                            tex.minFilter = THREE.LinearFilter;
                            tex.magFilter = THREE.LinearFilter;
                            tex.wrapS = THREE.ClampToEdgeWrapping;
                            tex.wrapT = THREE.ClampToEdgeWrapping;
                            tex.needsUpdate = true;
                            fr.texture = tex;
                            rebuildFrameVisuals(fr);
                        };
                        img.src = saved.imageData;
                    } else {
                        rebuildFrameVisuals(fr);
                    }
                });
            }
            updateRoomInfo();
            updateExpandBtns();
            return true;
        } catch (e) {
            return false;
        }
    }

    function applyUV(fr) {
        if (!fr.texture || !fr.texture.image) return;
        const img = fr.texture.image;
        const iA = img.width / img.height;
        const fA = fr.fw / fr.fh;
        let rx, ry;
        if (iA > fA) {
            ry = 1;
            rx = fA / iA;
        } else {
            rx = 1;
            ry = iA / fA;
        }
        rx /= fr.scale;
        ry /= fr.scale;
        fr.texture.repeat.set(rx, ry);
        fr.texture.offset.set((1 - rx) / 2 + fr.offX * rx, (1 - ry) / 2 + fr.offY * ry);
    }

    const previewCanvas = document.getElementById('preview-canvas');
    const previewCtx = previewCanvas.getContext('2d');
    const previewArea = document.getElementById('preview-area');

    function updatePreview() {
        const rect = previewCanvas.getBoundingClientRect();
        const dpr = Math.min(devicePixelRatio, 2);
        previewCanvas.width = rect.width * dpr;
        previewCanvas.height = rect.height * dpr;
        previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
        document.getElementById('zoom-label').textContent = Math.round(pendingScale * 100) + '%';
        previewArea.style.aspectRatio = `${pendingRatio}`;
        if (!previewImg) {
            previewCanvas.style.opacity = '0';
            document.querySelector('#preview-area .empty-msg').style.display = '';
            document.getElementById('preview-hint').classList.remove('visible');
            return;
        }
        previewCanvas.style.opacity = '1';
        document.querySelector('#preview-area .empty-msg').style.display = 'none';
        if (pendingScale <= 1 && pendingOffX === 0 && pendingOffY === 0) {
            document.getElementById('preview-hint').classList.add('visible');
        } else {
            document.getElementById('preview-hint').classList.remove('visible');
        }
        const iA = previewImg.width / previewImg.height;
        const fA = pendingRatio;
        let rx, ry;
        if (iA > fA) {
            ry = 1;
            rx = fA / iA;
        } else {
            rx = 1;
            ry = iA / fA;
        }
        rx /= pendingScale;
        ry /= pendingScale;
        const ox = (1 - rx) / 2 + pendingOffX * rx;
        const oy = (1 - ry) / 2 + pendingOffY * ry;
        const sx = ox * previewImg.width;
        const sy = (1 - oy - ry) * previewImg.height;
        const sw = rx * previewImg.width;
        const sh = ry * previewImg.height;
        previewCtx.drawImage(previewImg, sx, sy, sw, sh, 0, 0, previewCanvas.width, previewCanvas.height);
    }

    previewArea.addEventListener('mousedown', e => {
        if (!previewImg || e.target.id === 'reset-view-btn') return;
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        dragStartOffX = pendingOffX;
        dragStartOffY = pendingOffY;
        previewArea.classList.add('dragging');
        e.preventDefault();
    });
    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const rect = previewArea.getBoundingClientRect();
        const dx = (e.clientX - dragStartX) / rect.width;
        const dy = (e.clientY - dragStartY) / rect.height;
        const sens = 1.2 / pendingScale;
        pendingOffX = Math.max(-0.5, Math.min(0.5, dragStartOffX - dx * sens));
        pendingOffY = Math.max(-0.5, Math.min(0.5, dragStartOffY + dy * sens));
        updatePreview();
    });
    window.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false;
            previewArea.classList.remove('dragging');
        }
    });
    previewArea.addEventListener('wheel', e => {
        if (!previewImg) return;
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.05 : 0.05;
        pendingScale = Math.max(0.5, Math.min(3, pendingScale + delta));
        updatePreview();
    }, {passive: false});
    document.getElementById('reset-view-btn').addEventListener('click', e => {
        e.stopPropagation();
        pendingScale = 1;
        pendingOffX = 0;
        pendingOffY = 0;
        updatePreview();
    });
    if (!loadGallery()) {
        buildRoom();
        initFrames();
        updateRoomInfo();
    }
    const keys = {};
    document.addEventListener('keydown', e => {
        if (appState === 'modal') return;
        if (!e.repeat) keys[e.code] = true;
        if (e.code === 'Space' && appState === 'inside' && controls.isLocked) e.preventDefault();
    });
    document.addEventListener('keyup', e => {
        keys[e.code] = false;
    });
    controls.addEventListener('lock', () => {
        document.getElementById('crosshair').classList.add('visible');
        document.getElementById('click-hint').style.display = 'none';
    });
    controls.addEventListener('unlock', () => {
        document.getElementById('crosshair').classList.remove('visible');
        if (appState === 'inside') document.getElementById('click-hint').style.display = 'block';
    });
    const raycaster = new THREE.Raycaster();

    function onCanvasClick(e) {
        if (appState === 'inside') {
            if (controls.isLocked) {
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const planes = frames.map(f => f.imgPlane);
                const hits = raycaster.intersectObjects(planes);
                if (hits.length > 0) {
                    const hit = hits[0].object;
                    const fr = frames.find(f => f.imgPlane === hit);
                    if (fr) openModal(fr);
                }
            } else if (e.target === renderer.domElement) {
                controls.lock();
            }
        }
    }

    document.addEventListener('click', onCanvasClick);
    let enterAnim = null;

    function startEnter() {
        document.getElementById('blocker').classList.add('hidden');
        appState = 'entering';
        const startPos = camera.position.clone();
        const endPos = new THREE.Vector3(0, CAM_H, -2);
        const startTime = clock.getElapsedTime();
        enterAnim = {startPos, endPos, startTime, dur: 2.0};
    }

    document.getElementById('enter-btn').addEventListener('click', startEnter);

    function updateEnterAnim() {
        if (!enterAnim) return;
        const t = Math.min((clock.getElapsedTime() - enterAnim.startTime) / enterAnim.dur, 1);
        const ease = t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1;
        camera.position.lerpVectors(enterAnim.startPos, enterAnim.endPos, ease);
        camera.lookAt(0, CAM_H, -10);
        if (t >= 1) {
            enterAnim = null;
            appState = 'inside';
            if (doorMesh) doorMesh.visible = false;
            document.getElementById('expand-ui').style.display = 'flex';
            document.getElementById('bottom-left-ui').style.display = 'flex';
            document.getElementById('click-hint').style.display = 'block';
            setTimeout(() => document.getElementById('instructions').classList.add('hidden'), 5000);
        }
    }

    function updateMovement(dt) {
        if (appState !== 'inside' || !controls.isLocked) return;
        const sprinting = !!keys['ShiftLeft'] || !!keys['ShiftRight'];
        const moving = keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'] || keys['ArrowUp'] || keys['ArrowDown'] || keys['ArrowLeft'] || keys['ArrowRight'];
        const targetFov = sprinting && moving ? SPRINT_FOV : NORMAL_FOV;
        currentFov += (targetFov - currentFov) * Math.min(dt * 8, 1);
        camera.fov = currentFov;
        camera.updateProjectionMatrix();
        const spd = (sprinting ? SPRINT_SPD : MOVE_SPD) * dt;
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        dir.y = 0;
        dir.normalize();
        const right = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();
        if (keys['KeyW'] || keys['ArrowUp']) camera.position.addScaledVector(dir, spd);
        if (keys['KeyS'] || keys['ArrowDown']) camera.position.addScaledVector(dir, -spd);
        if (keys['KeyD'] || keys['ArrowRight']) camera.position.addScaledVector(right, spd);
        if (keys['KeyA'] || keys['ArrowLeft']) camera.position.addScaledVector(right, -spd);
        if (keys['Space'] && isGrounded) {
            velocityY = JUMP_FORCE;
            isGrounded = false;
        }
        velocityY += GRAVITY * dt;
        camera.position.y += velocityY * dt;
        if (camera.position.y <= CAM_H) {
            camera.position.y = CAM_H;
            velocityY = 0;
            isGrounded = true;
        }
        if (camera.position.y > WH - 0.2) {
            camera.position.y = WH - 0.2;
            velocityY = 0;
        }
        const pad = 0.35;
        camera.position.x = Math.max(-RW / 2 + pad, Math.min(RW / 2 - pad, camera.position.x));
        camera.position.z = Math.max(-roomLen + pad, Math.min(-0.3, camera.position.z));
    }

    function openModal(fr) {
        selectedFrame = fr;
        controls.unlock();
        appState = 'modal';
        document.getElementById('crosshair').classList.remove('visible');
        document.getElementById('click-hint').style.display = 'none';
        document.getElementById('modal-overlay').classList.add('open');
        pendingScale = fr.scale;
        pendingOffX = fr.offX;
        pendingOffY = fr.offY;
        pendingTitle = fr.title || '';
        pendingRatio = fr.fw / fr.fh;
        pendingFrameColor = fr.frameColor;
        document.getElementById('title-input').value = fr.title || '';
        document.getElementById('ratio-slider').value = Math.round(pendingRatio * 100);
        document.getElementById('ratio-val').textContent = ratioLabel(pendingRatio);
        document.querySelectorAll('.fc-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.color === pendingFrameColor);
        });
        pendingImage = fr.imageData;
        previewImg = null;
        if (fr.imageData) {
            const img = new Image();
            img.onload = () => {
                previewImg = img;
                updatePreview();
            };
            img.src = fr.imageData;
        } else {
            updatePreview();
        }
        document.getElementById('remove-btn').style.display = fr.imageData ? 'block' : 'none';
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('open');
        selectedFrame = null;
        pendingImage = null;
        previewImg = null;
        appState = 'inside';
    }

    document.getElementById('cancel-btn').addEventListener('click', closeModal);
    document.getElementById('file-input').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            pendingImage = ev.target.result;
            const img = new Image();
            img.onload = () => {
                previewImg = img;
                const imgRatio = img.width / img.height;
                pendingRatio = Math.max(0.4, Math.min(2.5, imgRatio));
                pendingScale = 1;
                pendingOffX = 0;
                pendingOffY = 0;
                document.getElementById('ratio-slider').value = Math.round(pendingRatio * 100);
                document.getElementById('ratio-val').textContent = ratioLabel(pendingRatio);
                updatePreview();
            };
            img.src = pendingImage;
            document.getElementById('remove-btn').style.display = 'block';
        };
        reader.readAsDataURL(file);
        e.target.value = '';
    });
    document.getElementById('ratio-slider').addEventListener('input', e => {
        pendingRatio = e.target.value / 100;
        document.getElementById('ratio-val').textContent = ratioLabel(pendingRatio);
        updatePreview();
    });
    document.getElementById('title-input').addEventListener('input', e => {
        pendingTitle = e.target.value;
    });
    document.querySelectorAll('.fc-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            pendingFrameColor = btn.dataset.color;
            document.querySelectorAll('.fc-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    function applyChanges() {
        if (!selectedFrame) return;
        const fr = selectedFrame;
        fr.scale = pendingScale;
        fr.offX = pendingOffX;
        fr.offY = pendingOffY;
        fr.title = pendingTitle;
        fr.frameColor = pendingFrameColor;
        const d = dimsFromRatio(pendingRatio);
        fr.fw = d.fw;
        fr.fh = d.fh;
        if (pendingImage) {
            fr.imageData = pendingImage;
            const img = new Image();
            img.onload = () => {
                if (fr.texture) fr.texture.dispose();
                const tex = new THREE.Texture(img);
                tex.colorSpace = THREE.SRGBColorSpace;
                tex.minFilter = THREE.LinearFilter;
                tex.magFilter = THREE.LinearFilter;
                tex.wrapS = THREE.ClampToEdgeWrapping;
                tex.wrapT = THREE.ClampToEdgeWrapping;
                tex.needsUpdate = true;
                fr.texture = tex;
                rebuildFrameVisuals(fr);
            };
            img.src = pendingImage;
        } else {
            rebuildFrameVisuals(fr);
        }
        closeModal();
        saveGallery();
    }

    document.getElementById('apply-btn').addEventListener('click', applyChanges);
    document.getElementById('remove-btn').addEventListener('click', () => {
        if (!selectedFrame) return;
        const fr = selectedFrame;
        fr.imageData = null;
        fr.scale = 1;
        fr.offX = 0;
        fr.offY = 0;
        fr.title = '';
        fr.fw = DEF_FW;
        fr.fh = DEF_FH;
        fr.frameColor = 'dark';
        if (fr.texture) {
            fr.texture.dispose();
            fr.texture = null;
        }
        rebuildFrameVisuals(fr);
        closeModal();
        saveGallery();
    });
    document.querySelectorAll('#expand-ui button').forEach(b => {
        b.addEventListener('click', () => expandRoom(parseInt(b.dataset.amt)));
    });
    document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', e => {
        if (e.code === 'Escape' && appState === 'modal') {
            closeModal();
            e.preventDefault();
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.05);
        if (appState === 'entering') updateEnterAnim();
        updateMovement(dt);
        if (appState === 'inside' || appState === 'entering') updateDust(dt);
        renderer.render(scene, camera);
    }

    animate();
    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });
</script>
</body>
</html>
