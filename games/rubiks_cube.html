    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:#0F0F0F;overflow:hidden;font-family:'Inter',sans-serif;color:#E5E5E5;touch-action:none;user-select:none;-webkit-user-select:none;width:100vw;height:100vh;position:relative}
        canvas{display:block;width:100%;height:100%}
        #ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
        #timer-display{position:absolute;top:24px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-weight:600;font-size:32px;color:#E5E5E5;letter-spacing:1px;opacity:0;transition:opacity 0.2s}
        #timer-display.visible{opacity:1}
        #move-counter{position:absolute;top:64px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-weight:400;font-size:14px;color:#737373;opacity:0;transition:opacity 0.2s}
        #move-counter.visible{opacity:1}
        #prompt-text{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);font-size:15px;font-weight:400;color:#E5E5E5;white-space:nowrap;pointer-events:auto;cursor:pointer}
        #difficulty-label{position:absolute;bottom:130px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:600;color:#6366F1;white-space:nowrap;letter-spacing:1px;opacity:0;transition:opacity 0.3s}
        #difficulty-label.visible{opacity:1}
        #pb-display{position:absolute;top:16px;right:16px;font-size:11px;color:#737373;opacity:0.3;transition:opacity 0.2s;text-align:right;line-height:1.7;pointer-events:auto;font-family:'JetBrains Mono',monospace}
        #pb-display:hover{opacity:1}
        #controls-bar{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:8px;pointer-events:auto}
        #controls-bar button{width:44px;height:44px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#E5E5E5;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;position:relative;font-family:'Inter',sans-serif}
        #controls-bar button:hover{background:rgba(255,255,255,0.1)}
        #controls-bar button:active{background:rgba(255,255,255,0.14)}
        .tooltip{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);font-size:11px;color:#E5E5E5;background:rgba(30,30,30,0.95);padding:4px 8px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.15s}
        #controls-bar button:hover .tooltip{opacity:1}
        #difficulty-btn{font-size:11px!important;font-weight:600;width:auto!important;padding:0 12px;letter-spacing:0.5px}
        #stats-panel{position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;transition:opacity 0.25s,transform 0.25s;text-align:center}
        #stats-panel.visible{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
        .stats-grid{display:flex;gap:24px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
        .stat{text-align:center}
        .stat-value{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:20px;color:#E5E5E5}
        .stat-value.pb{color:#10B981}
        .stat-label{font-size:11px;color:#737373;margin-top:2px}
        .stat-delta{font-size:11px;color:#10B981;margin-top:1px;font-family:'JetBrains Mono',monospace}
        .stat-delta.miss{color:#737373}
        .actions{display:flex;gap:8px;justify-content:center;margin-top:12px}
        .actions button{padding:8px 20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#E5E5E5;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.15s;pointer-events:auto;width:auto!important;height:auto!important}
        .actions button:hover{background:rgba(255,255,255,0.1)}
        .actions button.primary{background:#6366F1;border-color:#6366F1}
        .actions button.primary:hover{background:#5558E6}
        #pause-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,15,15,0.85);display:none;align-items:center;justify-content:center;z-index:20;cursor:pointer;pointer-events:auto}
        #pause-overlay.visible{display:flex}
        #pause-overlay span{font-size:28px;font-weight:700;color:#E5E5E5}
        #hint-overlay{position:absolute;top:50%;right:20px;transform:translateY(-50%);max-width:220px;padding:12px 16px;background:rgba(20,20,20,0.92);border:1px solid rgba(99,102,241,0.3);border-radius:8px;opacity:0;pointer-events:none;transition:opacity 0.2s;font-size:13px;line-height:1.5}
        #hint-overlay.visible{opacity:1;pointer-events:auto}
        .hint-stage{font-size:10px;color:#6366F1;letter-spacing:1px;font-weight:600;margin-bottom:4px}
        .hint-text{color:#999;font-size:12px;margin-bottom:8px;line-height:1.5}
        #hint-overlay button{padding:5px 12px;background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.4);border-radius:4px;color:#6366F1;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;width:auto!important;height:auto!important}
        #scramble-info{position:absolute;top:16px;left:16px;font-size:11px;color:#737373;opacity:0;transition:opacity 0.3s;font-family:'JetBrains Mono',monospace}
        #scramble-info.visible{opacity:0.5}
        #streak-display{font-size:12px;color:#6366F1;margin-top:6px;font-weight:600;font-family:'JetBrains Mono',monospace}
        @media(max-width:600px){
            #timer-display{font-size:26px;top:16px}
            #move-counter{top:50px;font-size:12px}
            #controls-bar{bottom:16px;gap:6px}
            #stats-panel{bottom:72px}
            .stats-grid{gap:14px}
            .stat-value{font-size:17px}
            #hint-overlay{right:10px;max-width:180px}
        }
    </style>

<body>
<div id="ui-layer">
    <div id="timer-display">00:00.00</div>
    <div id="move-counter">0 moves</div>
    <div id="scramble-info"></div>
    <div id="difficulty-label"></div>
    <div id="prompt-text">Click to scramble</div>
    <div id="pb-display"></div>
    <div id="controls-bar">
        <button id="undo-btn">↩<span class="tooltip">Undo · Ctrl+Z</span></button>
        <button id="hint-btn">?<span class="tooltip">Hint · H</span></button>
        <button id="reset-btn">⟲<span class="tooltip">Hold 1s to reset</span></button>
        <button id="difficulty-btn">EASY<span class="tooltip">Difficulty · Tab</span></button>
        <button id="mute-btn">♪<span class="tooltip">Mute · M</span></button>
    </div>
    <div id="stats-panel">
        <div class="stats-grid">
            <div class="stat"><div class="stat-value" id="stat-time">--</div><div class="stat-label">Time</div><div class="stat-delta" id="stat-time-delta"></div></div>
            <div class="stat"><div class="stat-value" id="stat-moves">--</div><div class="stat-label">Moves</div><div class="stat-delta" id="stat-moves-delta"></div></div>
            <div class="stat"><div class="stat-value" id="stat-eff">--</div><div class="stat-label">Efficiency</div></div>
            <div class="stat"><div class="stat-value" id="stat-tps">--</div><div class="stat-label">TPS</div></div>
            <div class="stat"><div class="stat-value" id="stat-hints">--</div><div class="stat-label">Hints</div></div>
        </div>
        <div id="streak-display"></div>
        <div class="actions">
            <button class="primary" id="same-btn">Same Difficulty</button>
            <button id="next-btn">Next Difficulty</button>
        </div>
    </div>
    <div id="pause-overlay"><span>Paused — click to resume</span></div>
    <div id="hint-overlay">
        <div class="hint-stage" id="hint-stage"></div>
        <div class="hint-text" id="hint-text"></div>
        <button id="hint-dismiss-btn">Got it</button>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
    (function(){'use strict';

        const COLORS={R:0xE63946,L:0xFF6B35,U:0xFFFFFF,D:0xFFD500,F:0x1D4ED8,B:0x16A34A};
        const FACES=['U','D','R','L','F','B'];
        const AXES={U:'y',D:'y',R:'x',L:'x',F:'z',B:'z'};
        const LAYERS={U:1,D:-1,R:1,L:-1,F:1,B:-1};
        const CW_SIGN={U:-1,D:1,R:-1,L:1,F:-1,B:1};
        const DIFFICULTY_CFG={EASY:{label:'EASY',min:5,max:8,desc:'5–8 moves'},MEDIUM:{label:'MED',min:12,max:15,desc:'12–15 moves'},HARD:{label:'HARD',min:20,max:25,desc:'20–25 moves'}};
        const DIFF_ORDER=['EASY','MEDIUM','HARD'];
        const SNAP_THRESHOLD=0.4;
        const COMMIT_MS=120;
        const REVERT_MS=90;
        const CUBIE_SIZE=0.92;
        const GAP=1.0;
        const STICKER_INSET=0.82;
        const CAM_DEFAULT_DIST=7.5;
        const CAM_DEFAULT_THETA=Math.PI*0.22;
        const CAM_DEFAULT_PHI=Math.PI*0.18;

// State
        const state={
            phase:'ready',
            moveCount:0,moveHistory:[],hintsUsed:0,streak:0,
            timer:{start:0,elapsed:0,running:false},
            scramble:{sequence:[],difficulty:'EASY',moveCount:0},
            momentum:{value:0,lastMoveTime:0},
            settings:{muted:false,difficulty:'EASY'},
            pb:{EASY:{time:Infinity,moves:Infinity},MEDIUM:{time:Infinity,moves:Infinity},HARD:{time:Infinity,moves:Infinity}},
            idleRotating:true,
            cameraTransition:null,
        };

        try{const s=JSON.parse(localStorage.getItem('rubiks_v3'));if(s){if(s.muted!==undefined)state.settings.muted=s.muted;if(s.difficulty)state.settings.difficulty=s.difficulty;if(s.pb)for(const d of DIFF_ORDER)if(s.pb[d])state.pb[d]=s.pb[d];}}catch(e){}
        function saveLS(){try{localStorage.setItem('rubiks_v3',JSON.stringify({muted:state.settings.muted,difficulty:state.settings.difficulty,pb:state.pb}));}catch(e){}}

// Audio
        let audioCtx=null;
        function aud(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

        function playClick(vol=0.08,freq=800){
            if(state.settings.muted)return;
            const c=aud(),t=c.currentTime;
            const bs=Math.floor(c.sampleRate*0.003),buf=c.createBuffer(1,bs,c.sampleRate),d=buf.getChannelData(0);
            for(let i=0;i<bs;i++)d[i]=Math.random()*2-1;
            const n=c.createBufferSource();n.buffer=buf;
            const ng=c.createGain();ng.gain.setValueAtTime(vol,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.012);
            n.connect(ng).connect(c.destination);n.start(t);
            const o=c.createOscillator();o.type='sine';o.frequency.value=freq;
            const og=c.createGain();og.gain.setValueAtTime(vol*0.5,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.008);
            o.connect(og).connect(c.destination);o.start(t);o.stop(t+0.015);
        }
        function playUndo(){
            if(state.settings.muted)return;
            const c=aud(),t=c.currentTime;
            const o=c.createOscillator();o.type='sine';o.frequency.value=500;
            const g=c.createGain();g.gain.setValueAtTime(0.04,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.02);
            o.connect(g).connect(c.destination);o.start(t);o.stop(t+0.025);
        }
        function playSolve(){
            if(state.settings.muted)return;
            const c=aud(),t=c.currentTime;
            [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
                const o=c.createOscillator();o.type='sine';o.frequency.value=f;
                const g=c.createGain();const s=t+i*0.07;
                g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(0.1,s+0.01);g.gain.exponentialRampToValueAtTime(0.001,s+0.3);
                o.connect(g).connect(c.destination);o.start(s);o.stop(s+0.35);
            });
        }
        function playPB(){
            if(state.settings.muted)return;
            setTimeout(()=>{
                const c=aud(),t=c.currentTime;
                [783.99,987.77].forEach(f=>{
                    const o=c.createOscillator();o.type='triangle';o.frequency.value=f;
                    const g=c.createGain();g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
                    o.connect(g).connect(c.destination);o.start(t);o.stop(t+0.3);
                });
            },500);
        }
        function playHintSound(){
            if(state.settings.muted)return;
            const c=aud(),t=c.currentTime;
            [659.25,523.25].forEach((f,i)=>{
                const o=c.createOscillator();o.type='sine';o.frequency.value=f;
                const g=c.createGain();g.gain.setValueAtTime(0.05,t+i*0.07);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.07+0.1);
                o.connect(g).connect(c.destination);o.start(t+i*0.07);o.stop(t+i*0.07+0.12);
            });
        }

// Three.js setup
        const scene=new THREE.Scene();
        const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,100);
        const renderer=new THREE.WebGLRenderer({antialias:true});
        renderer.setSize(window.innerWidth,window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
        renderer.setClearColor(0x0F0F0F);
        renderer.shadowMap.enabled=true;
        renderer.shadowMap.type=THREE.PCFSoftShadowMap;
        document.body.prepend(renderer.domElement);

        const ambientLight=new THREE.AmbientLight(0xB0B0C0,0.5);
        scene.add(ambientLight);
        const dirLight=new THREE.DirectionalLight(0xffffff,0.85);
        dirLight.position.set(-4,6,5);dirLight.castShadow=true;
        dirLight.shadow.mapSize.set(1024,1024);dirLight.shadow.camera.near=1;dirLight.shadow.camera.far=20;
        dirLight.shadow.camera.left=-4;dirLight.shadow.camera.right=4;dirLight.shadow.camera.top=4;dirLight.shadow.camera.bottom=-4;
        dirLight.shadow.radius=5;scene.add(dirLight);

        const ground=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.ShadowMaterial({opacity:0.12}));
        ground.rotation.x=-Math.PI/2;ground.position.y=-2.8;ground.receiveShadow=true;scene.add(ground);

        let camDist=CAM_DEFAULT_DIST,camTheta=CAM_DEFAULT_THETA,camPhi=CAM_DEFAULT_PHI;
        let orbitVelTheta=0,orbitVelPhi=0;
        function updateCamera(){
            camera.position.set(camDist*Math.cos(camPhi)*Math.sin(camTheta),camDist*Math.sin(camPhi),camDist*Math.cos(camPhi)*Math.cos(camTheta));
            camera.lookAt(0,0,0);
        }
        updateCamera();

// Cube
        const cubeGroup=new THREE.Group();scene.add(cubeGroup);
        const allCubies=[];
        const allStickerMeshes=[];
        const allStickerMaterials=[];

        function buildCube(){
            while(cubeGroup.children.length)cubeGroup.remove(cubeGroup.children[0]);
            allCubies.length=0;allStickerMeshes.length=0;allStickerMaterials.length=0;
            const stickerGeo=new THREE.PlaneGeometry(CUBIE_SIZE*STICKER_INSET,CUBIE_SIZE*STICKER_INSET);
            const bodyGeo=new THREE.BoxGeometry(CUBIE_SIZE,CUBIE_SIZE,CUBIE_SIZE);
            const bodyMat=new THREE.MeshStandardMaterial({color:0x1A1A1A,roughness:0.85});
            for(let x=-1;x<=1;x++)for(let y=-1;y<=1;y++)for(let z=-1;z<=1;z++){
                if(x===0&&y===0&&z===0)continue;
                const mesh=new THREE.Group();mesh.position.set(x*GAP,y*GAP,z*GAP);
                const body=new THREE.Mesh(bodyGeo,bodyMat);body.castShadow=true;mesh.add(body);
                const cubie={mesh,pos:{x,y,z},stickers:[]};
                const off=CUBIE_SIZE/2+0.005;
                const configs=[
                    {face:'R',cond:x===1,px:off,py:0,pz:0,rx:0,ry:Math.PI/2,rz:0},
                    {face:'L',cond:x===-1,px:-off,py:0,pz:0,rx:0,ry:-Math.PI/2,rz:0},
                    {face:'U',cond:y===1,px:0,py:off,pz:0,rx:-Math.PI/2,ry:0,rz:0},
                    {face:'D',cond:y===-1,px:0,py:-off,pz:0,rx:Math.PI/2,ry:0,rz:0},
                    {face:'F',cond:z===1,px:0,py:0,pz:off,rx:0,ry:0,rz:0},
                    {face:'B',cond:z===-1,px:0,py:0,pz:-off,rx:0,ry:Math.PI,rz:0},
                ];
                configs.forEach(c=>{
                    if(!c.cond)return;
                    const mat=new THREE.MeshStandardMaterial({color:COLORS[c.face],roughness:0.55,metalness:0.02,emissive:0x000000,emissiveIntensity:0});
                    const sm=new THREE.Mesh(stickerGeo,mat);
                    sm.position.set(c.px,c.py,c.pz);sm.rotation.set(c.rx,c.ry,c.rz);
                    sm.userData={cubie,face:c.face};
                    mesh.add(sm);
                    cubie.stickers.push({mesh:sm,localFace:c.face});
                    allStickerMeshes.push(sm);
                    allStickerMaterials.push(mat);
                });
                cubeGroup.add(mesh);allCubies.push(cubie);
            }
        }
        buildCube();

// Pivot
        const pivot=new THREE.Group();scene.add(pivot);
        let rotationBusy=false;

        function getCubiesForFace(face){return allCubies.filter(c=>c.pos[AXES[face]]===LAYERS[face]);}
        function getCubiesForLayer(axis,val){return allCubies.filter(c=>c.pos[axis]===val);}

        function attachToPivot(list){
            pivot.rotation.set(0,0,0);pivot.updateMatrixWorld(true);
            list.forEach(c=>{cubeGroup.remove(c.mesh);pivot.add(c.mesh);});
        }
        function detachFromPivot(list){
            pivot.updateMatrixWorld(true);
            list.forEach(c=>{
                const wp=new THREE.Vector3();c.mesh.getWorldPosition(wp);
                const wq=new THREE.Quaternion();c.mesh.getWorldQuaternion(wq);
                pivot.remove(c.mesh);cubeGroup.add(c.mesh);
                c.mesh.position.copy(wp);c.mesh.quaternion.copy(wq);
                c.pos.x=Math.round(wp.x/GAP);c.pos.y=Math.round(wp.y/GAP);c.pos.z=Math.round(wp.z/GAP);
                c.mesh.position.set(c.pos.x*GAP,c.pos.y*GAP,c.pos.z*GAP);
            });
            pivot.rotation.set(0,0,0);
        }
        function setPivotAngle(axis,angle){
            pivot.rotation.set(0,0,0);
            if(axis==='x')pivot.rotation.x=angle;
            else if(axis==='y')pivot.rotation.y=angle;
            else pivot.rotation.z=angle;
        }
        function applyMoveInstant(face,dir){
            const cubieList=getCubiesForFace(face);
            const axis=AXES[face];const angle=CW_SIGN[face]*dir*Math.PI/2;
            attachToPivot(cubieList);setPivotAngle(axis,angle);detachFromPivot(cubieList);
        }

// Animation queue
        const animQueue=[];
        let currentAnim=null;
        function enqueue(anim){animQueue.push(anim);}
        function tickAnimations(dt){
            if(currentAnim){
                currentAnim.elapsed+=dt;
                const t=Math.min(currentAnim.elapsed/currentAnim.duration,1);
                currentAnim.update(t);
                if(t>=1){if(currentAnim.complete)currentAnim.complete();currentAnim=null;}
            }
            if(!currentAnim&&animQueue.length>0){
                currentAnim=animQueue.shift();currentAnim.elapsed=0;
                if(currentAnim.start)currentAnim.start();
            }
        }
        function isAnimBusy(){return currentAnim!==null||animQueue.length>0;}

// Sticker flash system
        const flashingStickers=[];
        function flashStickers(face,intensity=0.3){
            const cubieList=getCubiesForFace(face);
            cubieList.forEach(c=>{
                c.stickers.forEach(s=>{
                    const sn=new THREE.Vector3(0,0,1);
                    sn.applyQuaternion(s.mesh.getWorldQuaternion(new THREE.Quaternion()));
                    const fn=faceNormal(face);
                    if(sn.dot(fn)>0.9){
                        const entry={mat:s.mesh.material,intensity,elapsed:0,duration:0.15};
                        s.mesh.material.emissiveIntensity=intensity;
                        s.mesh.material.emissive.setHex(s.mesh.material.color.getHex());
                        flashingStickers.push(entry);
                    }
                });
            });
        }
        function tickFlashes(dt){
            for(let i=flashingStickers.length-1;i>=0;i--){
                const f=flashingStickers[i];
                f.elapsed+=dt;
                const t=Math.min(f.elapsed/f.duration,1);
                const eased=1-Math.pow(1-t,3);
                // lerp toward momentum baseline
                const baseEmissive=state.momentum.value*0.06;
                f.mat.emissiveIntensity=f.intensity*(1-eased)+baseEmissive*eased;
                if(t>=1)flashingStickers.splice(i,1);
            }
        }

// Cube bounce/shrink
        let cubeScaleTarget=1,cubeScaleCurrent=1,cubeScalePhase=0,cubeScalePeak=1,cubeScaleTime=0,cubeScaleDurUp=0,cubeScaleDurDown=0;
        function triggerBounce(peak=1.008,upMs=40,downMs=100){
            cubeScalePeak=peak;cubeScalePhase=1;cubeScaleTime=0;cubeScaleDurUp=upMs/1000;cubeScaleDurDown=downMs/1000;
        }
        function tickCubeScale(dt){
            if(cubeScalePhase===1){
                cubeScaleTime+=dt;
                const t=Math.min(cubeScaleTime/cubeScaleDurUp,1);
                cubeScaleCurrent=1+(cubeScalePeak-1)*t;
                if(t>=1){cubeScalePhase=2;cubeScaleTime=0;}
            }else if(cubeScalePhase===2){
                cubeScaleTime+=dt;
                const t=Math.min(cubeScaleTime/cubeScaleDurDown,1);
                const eased=1-Math.pow(1-t,3);
                cubeScaleCurrent=cubeScalePeak+(1-cubeScalePeak)*eased;
                if(t>=1){cubeScalePhase=0;cubeScaleCurrent=1;}
            }
            cubeGroup.scale.setScalar(cubeScaleCurrent);
        }

// Magnetic snap easing: cubic ease-out with acceleration in last 10%
        function magneticEase(t){
            if(t<0.9){return 1-Math.pow(1-t,3);}
            const base=1-Math.pow(0.1,3);// value at t=0.9
            const localT=(t-0.9)/0.1;
            // steeper curve in last 10%: quadratic ease-in
            return base+(1-base)*(localT*localT);
        }

        function animateMove(face,dir,duration,onDone,clickVol,clickFreq){
            const axis=AXES[face];const targetAngle=CW_SIGN[face]*dir*Math.PI/2;
            let cubieList;
            enqueue({elapsed:0,duration:duration/1000,
                start(){cubieList=getCubiesForFace(face);attachToPivot(cubieList);},
                update(t){const e=magneticEase(t);setPivotAngle(axis,targetAngle*e);},
                complete(){
                    setPivotAngle(axis,targetAngle);detachFromPivot(cubieList);
                    playClick(clickVol!==undefined?clickVol:0.08,clickFreq||800);
                    if(onDone)onDone();
                }
            });
        }
        function parseMove(m){
            const face=m[0];let dir=1,count=1;
            if(m.includes("'")||m.includes('\u2019'))dir=-1;
            if(m.includes('2'))count=2;
            return{face,dir,count};
        }
        function invertNotation(m){
            if(m.includes('2'))return m;
            if(m.includes("'")||m.includes('\u2019'))return m[0];
            return m[0]+"'";
        }
        function executeMoveAnimated(notation,duration,onDone,vol,freq){
            const{face,dir,count}=parseMove(notation);
            for(let i=0;i<count;i++)animateMove(face,dir,duration,i===count-1?onDone:null,vol,freq);
        }
        function executeMoveInstant(notation){
            const{face,dir,count}=parseMove(notation);
            for(let i=0;i<count;i++)applyMoveInstant(face,dir);
        }

// Solve detection
        function isSolved(){
            for(const face of FACES){
                const normal=faceNormal(face);
                const ax=AXES[face],val=LAYERS[face];
                const faceCubies=allCubies.filter(c=>c.pos[ax]===val);
                let faceColor=null;
                for(const cubie of faceCubies){
                    for(const s of cubie.stickers){
                        const sn=new THREE.Vector3(0,0,1);
                        sn.applyQuaternion(s.mesh.getWorldQuaternion(new THREE.Quaternion()));
                        if(sn.dot(normal)>0.9){
                            const col=s.mesh.material.color.getHex();
                            if(faceColor===null)faceColor=col;
                            else if(col!==faceColor)return false;
                        }
                    }
                }
            }
            return true;
        }

// Scramble
        function genScramble(difficulty){
            const cfg=DIFFICULTY_CFG[difficulty];
            const n=cfg.min+Math.floor(Math.random()*(cfg.max-cfg.min+1));
            const faces=['U','D','R','L','F','B'];
            const moves=[];let last='',last2='';
            for(let i=0;i<n;i++){
                let avail=faces.filter(f=>f!==last);
                if(last&&last2&&AXES[last]===AXES[last2])avail=avail.filter(f=>AXES[f]!==AXES[last]);
                const face=avail[Math.floor(Math.random()*avail.length)];
                const suf=["","'","2"][Math.floor(Math.random()*3)];
                moves.push(face+suf);last2=last;last=face;
            }
            return moves;
        }

// Input
        const raycaster=new THREE.Raycaster();
        let inputState='idle';
        let dragInfo=null;
        let orbitLast={x:0,y:0};
        let activeDragCubies=null,activeDragAxis=null,activeDragAngleSign=1,activeDragLayerFace=null;
        let dragAngle=0,hasDragDirection=false;
        let lastClickTime=0,lastClickPos={x:0,y:0};
        const dragPlane = new THREE.Plane();
        let dragStartWorld = new THREE.Vector3();
        let dragFaceNormalDir = new THREE.Vector3();

        function screenToNDC(sx,sy){return new THREE.Vector2(sx/window.innerWidth*2-1,-(sy/window.innerHeight*2-1));}
        function castSticker(sx,sy){
            raycaster.setFromCamera(screenToNDC(sx,sy),camera);
            const hits=raycaster.intersectObjects(allStickerMeshes);
            return hits.length>0?hits[0]:null;
        }
        function faceNormal(f){
            if(f==='R')return new THREE.Vector3(1,0,0);if(f==='L')return new THREE.Vector3(-1,0,0);
            if(f==='U')return new THREE.Vector3(0,1,0);if(f==='D')return new THREE.Vector3(0,-1,0);
            if(f==='F')return new THREE.Vector3(0,0,1);return new THREE.Vector3(0,0,-1);
        }
        function hitToFace(hit){
            const sn=hit.face.normal.clone();sn.transformDirection(hit.object.matrixWorld);
            let best=null,bestD=-1;
            for(const f of FACES){const fn=faceNormal(f);const d=sn.dot(fn);if(d>bestD){bestD=d;best=f;}}
            return best;
        }
        function faceTangents(face){
            const ax=AXES[face];
            if(ax==='x')return['y','z'];if(ax==='y')return['x','z'];return['x','y'];
        }
        function axisToScreen(axis){
            const o=new THREE.Vector3(0,0,0).project(camera);
            const v=new THREE.Vector3(axis==='x'?1:0,axis==='y'?1:0,axis==='z'?1:0).project(camera);
            const dx=(v.x-o.x)*window.innerWidth/2;const dy=-(v.y-o.y)*window.innerHeight/2;
            const len=Math.sqrt(dx*dx+dy*dy)||1;
            return{x:dx/len,y:dy/len};
        }
        function determineDragRotation(face, cubie, screenDx, screenDy) {
            const tangents = faceTangents(face);
            const s0 = axisToScreen(tangents[0]);
            const s1 = axisToScreen(tangents[1]);

            const proj0 = screenDx * s0.x + screenDy * s0.y;
            const proj1 = screenDx * s1.x + screenDy * s1.y;

            let dragTangent, rotAxis, dragProjection;
            if (Math.abs(proj0) > Math.abs(proj1)) {
                dragTangent = tangents[0];
                rotAxis = tangents[1];
                dragProjection = proj0;
            } else {
                dragTangent = tangents[1];
                rotAxis = tangents[0];
                dragProjection = proj1;
            }

            const layerVal = cubie.pos[rotAxis];
            let layerFace = null;
            for (const f of FACES) {
                if (AXES[f] === rotAxis && LAYERS[f] === layerVal) { layerFace = f; break; }
            }
            if (!layerFace) {
                for (const f of FACES) {
                    if (AXES[f] === rotAxis && LAYERS[f] === 1) { layerFace = f; break; }
                }
            }

            // --- FIX: compute direction entirely in screen space ---
            // A small +rotation around rotAxis moves the drag tangent axis.
            // Project that movement to screen and compare with the drag direction.
            const epsilon = 0.01;
            const dragTangentVec = new THREE.Vector3(
                dragTangent === 'x' ? 1 : 0,
                dragTangent === 'y' ? 1 : 0,
                dragTangent === 'z' ? 1 : 0
            );
            const rotAxisVec = new THREE.Vector3(
                rotAxis === 'x' ? 1 : 0,
                rotAxis === 'y' ? 1 : 0,
                rotAxis === 'z' ? 1 : 0
            );
            // Rotating dragTangentVec by +epsilon around rotAxisVec gives a displaced point
            const displaced = dragTangentVec.clone().applyAxisAngle(rotAxisVec, epsilon);

            // Project both the original and displaced points to screen
            const orig2D = dragTangentVec.clone().project(camera);
            const disp2D = displaced.project(camera);
            const screenMoveX = (disp2D.x - orig2D.x) * window.innerWidth / 2;
            const screenMoveY = -(disp2D.y - orig2D.y) * window.innerHeight / 2;

            // Dot this screen-space movement with the drag tangent screen direction
            const dotWithDrag = screenMoveX * s0.x + screenMoveY * s0.y;
            // If dragTangent is tangents[1], use s1 instead
            const tangentScreenDir = (dragTangent === tangents[0]) ? s0 : s1;
            const correctedDot = screenMoveX * tangentScreenDir.x + screenMoveY * tangentScreenDir.y;

            // If correctedDot > 0, positive rotation moves stickers in the positive
            // screen-drag direction, so angleSign matches dragProjection sign.
            // If < 0, they're opposite, so flip.
            const angleSign = correctedDot > 0
                ? Math.sign(dragProjection)
                : -Math.sign(dragProjection);

            return { rotAxis, layerVal, layerFace, angleSign, dragMagnitude: Math.abs(dragProjection) };
        }

        function getPointerXY(e){
            if(e.touches)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
            return{x:e.clientX,y:e.clientY};
        }

        function onDown(e){
            if(state.phase==='scrambling')return;
            const pos=getPointerXY(e);
            const now=performance.now();

            // Double-click detection for camera reset
            const isOrbitArea=!castSticker(pos.x,pos.y);
            if(isOrbitArea&&(e.button===0||e.touches)&&!(e.touches&&e.touches.length>=2)){
                const dt=now-lastClickTime;
                const dd=Math.hypot(pos.x-lastClickPos.x,pos.y-lastClickPos.y);
                if(dt<400&&dd<30){
                    // Double click - reset camera
                    state.cameraTransition={startTheta:camTheta,startPhi:camPhi,startDist:camDist,
                        targetTheta:CAM_DEFAULT_THETA,targetPhi:CAM_DEFAULT_PHI,targetDist:CAM_DEFAULT_DIST,
                        elapsed:0,duration:0.4};
                    lastClickTime=0;
                    return;
                }
                lastClickTime=now;lastClickPos={x:pos.x,y:pos.y};
            }

            const isOrbit=e.button===2||(e.touches&&e.touches.length>=2);
            if(isOrbit){
                inputState='orbit';orbitLast={x:pos.x,y:pos.y};orbitVelTheta=0;orbitVelPhi=0;
                if(e.touches&&e.touches.length>=2){
                    const t=e.touches;
                    orbitLast={x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2,
                        pinchDist:Math.hypot(t[1].clientX-t[0].clientX,t[1].clientY-t[0].clientY)};
                }
                return;
            }

            if(state.phase==='ready'&&state.scramble.sequence.length===0){
                state.idleRotating=false;startScramble();return;
            }
            if(isAnimBusy()||rotationBusy)return;

            const hit=castSticker(pos.x,pos.y);
            if (hit) {
                inputState = 'faceDrag';
                const face = hitToFace(hit);
                const cubie = hit.object.userData.cubie;

                // Set up a mathematical plane at the hit face for world-space tracking
                const fn = faceNormal(face);
                dragPlane.setFromNormalAndCoplanarPoint(fn, hit.point);
                dragStartWorld.copy(hit.point);
                dragFaceNormalDir.copy(fn);

                dragInfo = { face, cubie, startX: pos.x, startY: pos.y };
                hasDragDirection = false;
                dragAngle = 0;
            }else{
                inputState='orbit';orbitLast=pos;orbitVelTheta=0;orbitVelPhi=0;
            }
        }

        function onMove(e){
            const pos=getPointerXY(e);
            if(inputState==='orbit'){
                let cx=pos.x,cy=pos.y;
                if(e.touches&&e.touches.length>=2){
                    cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
                    cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
                    const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
                    if(orbitLast.pinchDist){
                        const scale=d/orbitLast.pinchDist;
                        camDist=Math.max(CAM_DEFAULT_DIST*0.7,Math.min(CAM_DEFAULT_DIST*1.5,camDist/scale));
                        orbitLast.pinchDist=d;
                    }
                }
                const dx=cx-orbitLast.x,dy=cy-orbitLast.y;
                orbitVelTheta=-dx*0.005;orbitVelPhi=dy*0.005;
                camTheta+=orbitVelTheta;
                camPhi=Math.max(-75*Math.PI/180,Math.min(75*Math.PI/180,camPhi+orbitVelPhi));
                updateCamera();orbitLast={x:cx,y:cy,pinchDist:orbitLast.pinchDist};
                return;
            }
            if (inputState === 'faceDrag' && dragInfo) {
                // Raycast onto the drag plane to get current world-space point
                raycaster.setFromCamera(screenToNDC(pos.x, pos.y), camera);
                const worldPoint = new THREE.Vector3();
                const hit = raycaster.ray.intersectPlane(dragPlane, worldPoint);
                if (!hit) return;

                // World-space delta from drag start
                const worldDelta = new THREE.Vector3().subVectors(worldPoint, dragStartWorld);

                if (!hasDragDirection) {
                    // Need enough world-space movement to determine direction
                    if (worldDelta.length() < 0.15) return;

                    // Project delta onto the two tangent axes of the face
                    const tangents = faceTangents(dragInfo.face);
                    const t0Vec = new THREE.Vector3(
                        tangents[0] === 'x' ? 1 : 0,
                        tangents[0] === 'y' ? 1 : 0,
                        tangents[0] === 'z' ? 1 : 0
                    );
                    const t1Vec = new THREE.Vector3(
                        tangents[1] === 'x' ? 1 : 0,
                        tangents[1] === 'y' ? 1 : 0,
                        tangents[1] === 'z' ? 1 : 0
                    );

                    const proj0 = worldDelta.dot(t0Vec);
                    const proj1 = worldDelta.dot(t1Vec);

                    // The user is dragging along whichever tangent has larger projection.
                    // The rotation axis is the OTHER tangent.
                    if (Math.abs(proj0) > Math.abs(proj1)) {
                        activeDragAxis = tangents[1]; // rotate around tangent[1]
                    } else {
                        activeDragAxis = tangents[0]; // rotate around tangent[0]
                    }

                    const layerVal = dragInfo.cubie.pos[activeDragAxis];
                    activeDragLayerFace = null;
                    for (const f of FACES) {
                        if (AXES[f] === activeDragAxis && LAYERS[f] === layerVal) {
                            activeDragLayerFace = f; break;
                        }
                    }
                    if (!activeDragLayerFace) {
                        for (const f of FACES) {
                            if (AXES[f] === activeDragAxis && LAYERS[f] === 1) {
                                activeDragLayerFace = f; break;
                            }
                        }
                    }

                    activeDragCubies = getCubiesForLayer(activeDragAxis, layerVal);
                    attachToPivot(activeDragCubies);
                    rotationBusy = true;
                    hasDragDirection = true;
                }

                if (hasDragDirection) {
                    // Determine which tangent axis the user is dragging along
                    const tangents = faceTangents(dragInfo.face);
                    const dragTangent = tangents[0] === activeDragAxis ? tangents[1] : tangents[0];
                    const dragTangentVec = new THREE.Vector3(
                        dragTangent === 'x' ? 1 : 0,
                        dragTangent === 'y' ? 1 : 0,
                        dragTangent === 'z' ? 1 : 0
                    );

                    // Project world delta onto the drag tangent to get signed distance
                    const signedDist = worldDelta.dot(dragTangentVec);

                    // Now: which direction should +signedDist rotate the pivot?
                    // Cross product of face normal × drag tangent gives the rotation axis direction.
                    // If that matches the pivot axis direction, positive drag = positive rotation.
                    // If it's opposite, flip.
                    const cross = new THREE.Vector3().crossVectors(dragFaceNormalDir, dragTangentVec);
                    const axisVec = new THREE.Vector3(
                        activeDragAxis === 'x' ? 1 : 0,
                        activeDragAxis === 'y' ? 1 : 0,
                        activeDragAxis === 'z' ? 1 : 0
                    );
                    const crossDot = cross.dot(axisVec);
                    const sign = crossDot > 0 ? 1 : -1;

                    // Convert world-space distance to angle (GAP units to radians)
                    dragAngle = (signedDist / GAP) * (Math.PI / 2) * sign;
                    dragAngle = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, dragAngle));
                    setPivotAngle(activeDragAxis, dragAngle);
                }
            }
        }

        function onUp(e){
            if(inputState==='orbit'){inputState='idle';return;}
            if(inputState==='faceDrag'&&hasDragDirection&&activeDragCubies){
                const normalized=Math.abs(dragAngle)/(Math.PI/2);
                if(normalized>SNAP_THRESHOLD){
                    const targetAngle=Math.sign(dragAngle)*Math.PI/2;
                    const startAngle=dragAngle;
                    let dir=1;
                    if(activeDragLayerFace){
                        const cwAngle=CW_SIGN[activeDragLayerFace]*Math.PI/2;
                        dir=Math.sign(targetAngle)===Math.sign(cwAngle)?1:-1;
                    }
                    const snapDur=COMMIT_MS/1000;
                    currentAnim={elapsed:0,duration:snapDur,
                        update(t){const e=magneticEase(t);setPivotAngle(activeDragAxis,startAngle+(targetAngle-startAngle)*e);},
                        complete(){
                            setPivotAngle(activeDragAxis,targetAngle);detachFromPivot(activeDragCubies);
                            rotationBusy=false;playClick();
                            // Flash and bounce
                            if(activeDragLayerFace){flashStickers(activeDragLayerFace,0.3);}
                            triggerBounce(1.008,40,100);
                            onMoveComplete(activeDragLayerFace,dir);
                            activeDragCubies=null;
                        }
                    };
                }else{
                    const startAngle=dragAngle;
                    const snapDur=REVERT_MS/1000;
                    currentAnim={elapsed:0,duration:snapDur,
                        update(t){const e=1-Math.pow(1-t,3);setPivotAngle(activeDragAxis,startAngle*(1-e));},
                        complete(){setPivotAngle(activeDragAxis,0);detachFromPivot(activeDragCubies);rotationBusy=false;activeDragCubies=null;}
                    };
                }
            }
            inputState='idle';dragInfo=null;hasDragDirection=false;
        }

        function onMoveComplete(face,dir){
            if(!face)return;
            const notation=face+(dir===-1?"'":"");
            if(state.phase==='ready'&&state.scramble.sequence.length>0){
                state.phase='solving';state.timer.start=performance.now();state.timer.running=true;
                els.timer.classList.add('visible');els.moves.classList.add('visible');
            }
            if(state.phase==='solving'||state.phase==='ready'){
                state.moveCount++;state.moveHistory.push(notation);
                state.momentum.value=Math.min(1,state.momentum.value+0.08);
                state.momentum.lastMoveTime=performance.now();
                updateMoveCounter();
                if(state.phase==='solving')checkSolved();
            }
        }

        const canvas=renderer.domElement;
        canvas.addEventListener('pointerdown',onDown);
        canvas.addEventListener('pointermove',onMove);
        canvas.addEventListener('pointerup',onUp);
        canvas.addEventListener('pointercancel',onUp);
        canvas.addEventListener('pointerleave',onUp);
        canvas.addEventListener('contextmenu',e=>e.preventDefault());
        canvas.addEventListener('touchstart',e=>{
            if(e.touches.length===2){
                if(inputState==='faceDrag'&&hasDragDirection&&activeDragCubies){
                    setPivotAngle(activeDragAxis,0);detachFromPivot(activeDragCubies);rotationBusy=false;activeDragCubies=null;
                }
                inputState='orbit';
                const t=e.touches;
                orbitLast={x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2,
                    pinchDist:Math.hypot(t[1].clientX-t[0].clientX,t[1].clientY-t[0].clientY)};
                e.preventDefault();
            }
        },{passive:false});
        canvas.addEventListener('touchmove',e=>{if(e.touches.length>=2)e.preventDefault();},{passive:false});
        canvas.addEventListener('wheel',e=>{
            camDist=Math.max(CAM_DEFAULT_DIST*0.7,Math.min(CAM_DEFAULT_DIST*1.5,camDist+e.deltaY*0.008));
            updateCamera();e.preventDefault();
        },{passive:false});

// Scramble
        function startScramble(){
            const diff=state.settings.difficulty;
            const seq=genScramble(diff);
            state.scramble.sequence=seq;state.scramble.difficulty=diff;state.scramble.moveCount=seq.length;
            state.phase='scrambling';state.moveCount=0;state.moveHistory=[];state.hintsUsed=0;
            state.timer.elapsed=0;state.timer.running=false;
            state.momentum.value=0;state.momentum.lastMoveTime=0;
            try{window.location.hash='scramble='+seq.join('-');}catch(e){}
            els.prompt.style.display='none';els.diffLabel.classList.remove('visible');
            hideStats();hideHint();
            els.scrambleInfo.textContent=`${DIFFICULTY_CFG[diff].label} · ${seq.length} moves`;
            els.scrambleInfo.classList.add('visible');
            const moveTime=Math.max(50,Math.min(80,2000/seq.length));
            seq.forEach((move,i)=>{
                const isLast=i===seq.length-1;
                executeMoveAnimated(move,moveTime,isLast?()=>{
                    state.phase='ready';els.timer.textContent='00:00.00';
                    els.timer.classList.add('visible');els.moves.textContent='0 moves';els.moves.classList.add('visible');
                }:null,0.03,1200);
            });
        }

// Solve
        function checkSolved(){
            if(!isSolved())return;
            state.phase='solved';state.timer.running=false;
            state.timer.elapsed=performance.now()-state.timer.start;
            state.streak++;
            playSolve();
            const diff=state.scramble.difficulty;
            const time=state.timer.elapsed;const moves=state.moveCount;
            let isPB=false;
            if(state.hintsUsed===0){
                if(time<state.pb[diff].time){state.pb[diff].time=time;isPB=true;}
                if(moves<state.pb[diff].moves){state.pb[diff].moves=moves;isPB=true;}
            }
            if(isPB){playPB();saveLS();}
            setTimeout(()=>showStats(isPB),400);
            updatePBDisplay();
        }

// UI
        const els={
            timer:document.getElementById('timer-display'),
            moves:document.getElementById('move-counter'),
            prompt:document.getElementById('prompt-text'),
            diffLabel:document.getElementById('difficulty-label'),
            pbDisplay:document.getElementById('pb-display'),
            statsPanel:document.getElementById('stats-panel'),
            scrambleInfo:document.getElementById('scramble-info'),
            hintOverlay:document.getElementById('hint-overlay'),
            pauseOverlay:document.getElementById('pause-overlay'),
        };

        function formatTime(ms){
            const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),c=Math.floor((ms%1000)/10);
            return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(c).padStart(2,'0')}`;
        }
        function updateTimer(){if(!state.timer.running)return;els.timer.textContent=formatTime(performance.now()-state.timer.start);}
        function updateMoveCounter(){els.moves.textContent=state.moveCount+' move'+(state.moveCount!==1?'s':'');}

        function updateTimerColor(now){
            if(state.phase!=='solving'){els.timer.style.color='#E5E5E5';return;}
            const elapsed=now-state.timer.start;
            const diff=state.scramble.difficulty;
            const pb=state.pb[diff].time;
            if(pb===Infinity){els.timer.style.color='#E5E5E5';return;}
            if(elapsed<pb*0.7){els.timer.style.color='#10B981';}
            else if(elapsed<pb*0.95){els.timer.style.color='#E5E5E5';}
            else if(elapsed<pb){
                // Pulse between white and amber
                const pulse=Math.sin(now*0.00628)*0.5+0.5;// ~1Hz
                const r=Math.round(229+(245-229)*pulse);
                const g=Math.round(229+(158-229)*pulse);
                const b=Math.round(229+(11-229)*pulse);
                els.timer.style.color=`rgb(${r},${g},${b})`;
            }else{els.timer.style.color='#EF4444';}
        }

        function showStats(isPB){
            const t=state.timer.elapsed,m=state.moveCount;
            const tps=t>0?(m/(t/1000)).toFixed(2):'0';
            const eff=state.scramble.moveCount>0?(m/state.scramble.moveCount).toFixed(1):'--';
            document.getElementById('stat-time').textContent=formatTime(t);
            document.getElementById('stat-time').className='stat-value'+(isPB?' pb':'');
            document.getElementById('stat-moves').textContent=m;
            document.getElementById('stat-tps').textContent=tps;
            document.getElementById('stat-hints').textContent=state.hintsUsed;

            // Efficiency
            const effEl=document.getElementById('stat-eff');
            if(state.scramble.moveCount>0){
                const ratio=m/state.scramble.moveCount;
                effEl.textContent='×'+eff;
                if(ratio<1.5)effEl.style.color='#10B981';
                else if(ratio<=3)effEl.style.color='#E5E5E5';
                else effEl.style.color='#737373';
            }else{effEl.textContent='--';effEl.style.color='#E5E5E5';}

            const td=document.getElementById('stat-time-delta');
            const diff=state.scramble.difficulty;
            if(isPB)td.textContent='New PB!';
            else if(state.pb[diff].time<Infinity){
                const delta=t-state.pb[diff].time;
                td.textContent='+'+formatTime(delta);td.className='stat-delta miss';
            }else td.textContent='';

            document.getElementById('stat-moves-delta').textContent='';

            // Streak
            const streakEl=document.getElementById('streak-display');
            if(state.streak>=2)streakEl.textContent='Streak: '+state.streak;
            else streakEl.textContent='';

            const di=DIFF_ORDER.indexOf(diff);
            document.getElementById('next-btn').style.display=di<DIFF_ORDER.length-1?'':'none';
            els.statsPanel.classList.add('visible');
        }
        function hideStats(){els.statsPanel.classList.remove('visible');}
        function hideHint(){els.hintOverlay.classList.remove('visible');clearHighlightPulse();}

        function updatePBDisplay(){
            let h='';
            for(const d of DIFF_ORDER){
                if(state.pb[d].time<Infinity){
                    h+=`<div style="margin-bottom:2px"><span style="color:#525252">${d} </span>${formatTime(state.pb[d].time)} · ${state.pb[d].moves}m</div>`;
                }
            }
            els.pbDisplay.innerHTML=h;
        }
        function updateDifficultyBtn(){document.getElementById('difficulty-btn').textContent=DIFFICULTY_CFG[state.settings.difficulty].label;}
        function updateMuteBtn(){
            const btn=document.getElementById('mute-btn');
            btn.textContent=state.settings.muted?'✕':'♪';btn.style.opacity=state.settings.muted?'0.4':'1';
        }

        function fullReset(){
            buildCube();pivot.rotation.set(0,0,0);
            while(pivot.children.length)pivot.remove(pivot.children[0]);
            rotationBusy=false;currentAnim=null;animQueue.length=0;activeDragCubies=null;inputState='idle';
            flashingStickers.length=0;clearHighlightPulse();
        }

// Buttons
        document.getElementById('undo-btn').addEventListener('click',()=>{
            if(state.moveHistory.length===0||isAnimBusy()||rotationBusy)return;
            if(state.phase!=='solving'&&state.phase!=='ready')return;
            const last=state.moveHistory.pop();state.moveCount--;
            state.momentum.value=Math.max(0,state.momentum.value-0.2);
            const inv=invertNotation(last);
            const face=inv[0];
            animateMove(face,inv.includes("'")?-1:1,COMMIT_MS,()=>{
                playUndo();
                flashStickers(face,0.15);
                triggerBounce(0.994,40,100);
                updateMoveCounter();
            });
        });

// Hint system with cubie highlighting
        let highlightedStickers=[];
        let highlightPulseActive=false;

        function clearHighlightPulse(){
            highlightedStickers.forEach(mat=>{mat.emissiveIntensity=0;});
            highlightedStickers=[];highlightPulseActive=false;
        }
        function tickHighlightPulse(now){
            if(!highlightPulseActive)return;
            const pulse=Math.sin(now*0.00314)*0.5+0.5;// 0.5Hz
            highlightedStickers.forEach(mat=>{
                mat.emissiveIntensity=0.1+pulse*0.25;
            });
        }

        function getSimpleHint(){
            const uCubies=getCubiesForFace('U');
            let whiteOnU=0;const uNorm=faceNormal('U');
            for(const c of uCubies){
                for(const s of c.stickers){
                    const sn=new THREE.Vector3(0,0,1);
                    sn.applyQuaternion(s.mesh.getWorldQuaternion(new THREE.Quaternion()));
                    if(sn.dot(uNorm)>0.9&&s.mesh.material.color.getHex()===0xFFFFFF)whiteOnU++;
                }
            }
            if(whiteOnU<5){
                // Find a white edge not on U face
                const targets=[];
                allCubies.forEach(c=>{
                    const isEdge=Object.values(c.pos).filter(v=>v===0).length===1;
                    if(!isEdge)return;
                    c.stickers.forEach(s=>{
                        if(s.mesh.material.color.getHex()===0xFFFFFF){
                            const sn=new THREE.Vector3(0,0,1);
                            sn.applyQuaternion(s.mesh.getWorldQuaternion(new THREE.Quaternion()));
                            if(sn.dot(uNorm)<0.9)targets.push(s.mesh.material);
                        }
                    });
                });
                return{stage:'WHITE CROSS',text:'Find a white edge piece and bring it to the top face.',highlights:targets.slice(0,2)};
            }
            if(whiteOnU<9){
                const targets=[];
                allCubies.forEach(c=>{
                    const isCorner=Object.values(c.pos).filter(v=>v===0).length===0;
                    if(!isCorner)return;
                    c.stickers.forEach(s=>{
                        if(s.mesh.material.color.getHex()===0xFFFFFF){
                            const sn=new THREE.Vector3(0,0,1);
                            sn.applyQuaternion(s.mesh.getWorldQuaternion(new THREE.Quaternion()));
                            if(sn.dot(uNorm)<0.9)targets.push(s.mesh.material);
                        }
                    });
                });
                return{stage:'WHITE CORNERS',text:'Position this white corner below its home, then insert it.',highlights:targets.slice(0,2)};
            }

            // Check middle layer
            let midUnsolved=false;
            for(const face of['F','R','B','L']){
                const fc=getCubiesForFace(face);const fn=faceNormal(face);
                let centerColor=null;
                for(const c of fc){
                    if(Object.values(c.pos).filter(v=>v===0).length===2){
                        for(const s of c.stickers){
                            const sn=new THREE.Vector3(0,0,1);
                            sn.applyQuaternion(s.mesh.getWorldQuaternion(new THREE.Quaternion()));
                            if(sn.dot(fn)>0.9)centerColor=s.mesh.material.color.getHex();
                        }
                    }
                }
                if(!centerColor)continue;
                for(const c of fc){
                    if(c.pos.y!==0)continue;
                    for(const s of c.stickers){
                        const sn=new THREE.Vector3(0,0,1);
                        sn.applyQuaternion(s.mesh.getWorldQuaternion(new THREE.Quaternion()));
                        if(sn.dot(fn)>0.9&&s.mesh.material.color.getHex()!==centerColor)midUnsolved=true;
                    }
                }
            }
            if(midUnsolved){
                return{stage:'MIDDLE LAYER',text:'Find an edge on top without yellow and match it to its center.',highlights:[]};
            }

            const dCubies=getCubiesForFace('D');let yellowOnD=0;const dNorm=faceNormal('D');
            for(const c of dCubies){
                for(const s of c.stickers){
                    const sn=new THREE.Vector3(0,0,1);
                    sn.applyQuaternion(s.mesh.getWorldQuaternion(new THREE.Quaternion()));
                    if(sn.dot(dNorm)>0.9&&s.mesh.material.color.getHex()===0xFFD500)yellowOnD++;
                }
            }
            if(yellowOnD<5)return{stage:'YELLOW CROSS',text:'Orient the bottom to form a yellow cross pattern.',highlights:[]};
            if(yellowOnD<9)return{stage:'ORIENT LAST LAYER',text:'Turn all yellow corners to face downward.',highlights:[]};
            return{stage:'PERMUTE LAST LAYER',text:'Cycle the last layer pieces into their correct spots.',highlights:[]};
        }

        document.getElementById('hint-btn').addEventListener('click',()=>{
            if(state.phase!=='solving'&&state.phase!=='ready')return;
            if(!state.scramble.sequence.length)return;
            state.hintsUsed++;playHintSound();
            clearHighlightPulse();
            const hint=getSimpleHint();
            document.getElementById('hint-stage').textContent=hint.stage;
            document.getElementById('hint-text').textContent=hint.text;
            els.hintOverlay.classList.add('visible');
            if(hint.highlights&&hint.highlights.length>0){
                hint.highlights.forEach(mat=>{
                    mat.emissive.setHex(mat.color.getHex());
                    highlightedStickers.push(mat);
                });
                highlightPulseActive=true;
            }
        });
        document.getElementById('hint-dismiss-btn').addEventListener('click',hideHint);

// Reset hold
        let resetHolding=false,resetStart=0;
        const resetBtn=document.getElementById('reset-btn');
        resetBtn.addEventListener('pointerdown',()=>{
            if(state.phase!=='solving'&&state.phase!=='ready')return;
            if(!state.scramble.sequence.length)return;
            resetHolding=true;resetStart=performance.now();
            resetBtn.style.background='rgba(230,57,70,0.15)';
            function tick(){
                if(!resetHolding)return;
                const p=Math.min((performance.now()-resetStart)/1000,1);
                resetBtn.style.background=`linear-gradient(to top,rgba(230,57,70,0.25) ${p*100}%,rgba(255,255,255,0.06) ${p*100}%)`;
                if(p>=1){
                    resetHolding=false;resetBtn.style.background='';
                    fullReset();
                    state.scramble.sequence.forEach(m=>executeMoveInstant(m));
                    state.moveCount=0;state.moveHistory=[];state.hintsUsed=0;
                    state.timer.running=false;state.timer.elapsed=0;state.phase='ready';
                    state.momentum.value=0;
                    els.timer.textContent='00:00.00';updateMoveCounter();hideStats();hideHint();
                    return;
                }
                requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        });
        resetBtn.addEventListener('pointerup',()=>{resetHolding=false;resetBtn.style.background='';});
        resetBtn.addEventListener('pointerleave',()=>{resetHolding=false;resetBtn.style.background='';});

        document.getElementById('difficulty-btn').addEventListener('click',()=>{
            const i=DIFF_ORDER.indexOf(state.settings.difficulty);
            state.settings.difficulty=DIFF_ORDER[(i+1)%DIFF_ORDER.length];
            updateDifficultyBtn();
            els.diffLabel.textContent=DIFFICULTY_CFG[state.settings.difficulty].desc;
            els.diffLabel.classList.add('visible');
            setTimeout(()=>els.diffLabel.classList.remove('visible'),1500);
            saveLS();
        });
        document.getElementById('mute-btn').addEventListener('click',()=>{
            state.settings.muted=!state.settings.muted;updateMuteBtn();saveLS();
        });
        document.getElementById('same-btn').addEventListener('click',()=>{fullReset();hideStats();startScramble();});
        document.getElementById('next-btn').addEventListener('click',()=>{
            const i=DIFF_ORDER.indexOf(state.scramble.difficulty);
            if(i<DIFF_ORDER.length-1){state.settings.difficulty=DIFF_ORDER[i+1];updateDifficultyBtn();saveLS();}
            fullReset();hideStats();startScramble();
        });
        document.getElementById('prompt-text').addEventListener('click',()=>{state.idleRotating=false;startScramble();});

// Keyboard
        document.addEventListener('keydown',e=>{
            if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
            const key=e.key.toLowerCase();
            const faceKeys={u:'U',d:'D',l:'L',r:'R',f:'F',b:'B'};
            if(faceKeys[key]&&(state.phase==='solving'||state.phase==='ready')&&!isAnimBusy()&&!rotationBusy){
                if(!state.scramble.sequence.length)return;
                const face=faceKeys[key];const dir=e.shiftKey?-1:1;
                animateMove(face,dir,COMMIT_MS,()=>{
                    flashStickers(face,0.3);triggerBounce(1.008,40,100);
                    onMoveComplete(face,dir);
                });
                e.preventDefault();return;
            }
            if(key==='z'&&(e.ctrlKey||e.metaKey)){document.getElementById('undo-btn').click();e.preventDefault();}
            if(key==='h')document.getElementById('hint-btn').click();
            if(key==='m')document.getElementById('mute-btn').click();
            if(key==='tab'){document.getElementById('difficulty-btn').click();e.preventDefault();}
            if(key===' '&&(state.phase==='solved'||state.phase==='ready')){
                if(state.phase==='ready'&&state.scramble.sequence.length===0){state.idleRotating=false;}
                fullReset();hideStats();startScramble();e.preventDefault();
            }
        });

// Pause
        document.addEventListener('visibilitychange',()=>{
            if(document.hidden&&state.timer.running){
                state.timer.elapsed=performance.now()-state.timer.start;
                state.timer.running=false;els.pauseOverlay.classList.add('visible');
            }
        });
        els.pauseOverlay.addEventListener('click',()=>{
            els.pauseOverlay.classList.remove('visible');
            if(state.phase==='solving'){state.timer.start=performance.now()-state.timer.elapsed;state.timer.running=true;}
        });

// Resize
        window.addEventListener('resize',()=>{
            camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth,window.innerHeight);
        });

// Load from hash
        function loadFromHash(){
            const h=window.location.hash;
            if(h&&h.startsWith('#scramble=')){
                const seq=h.substring(9).split('-').filter(s=>s);
                if(seq.length>0){
                    state.scramble.sequence=seq;state.scramble.moveCount=seq.length;
                    state.scramble.difficulty=seq.length<=8?'EASY':seq.length<=15?'MEDIUM':'HARD';
                    seq.forEach(m=>executeMoveInstant(m));
                    state.phase='ready';state.idleRotating=false;
                    els.prompt.style.display='none';
                    els.timer.textContent='00:00.00';els.timer.classList.add('visible');els.moves.classList.add('visible');
                    els.scrambleInfo.textContent=`${state.scramble.difficulty} · ${seq.length} moves`;
                    els.scrambleInfo.classList.add('visible');
                }
            }
        }

// Momentum system
        let currentAmbientColor={r:0xB0/255,g:0xB0/255,b:0xC0/255};
        let currentAmbientIntensity=0.5;
        let currentBgR=0x0F/255,currentBgG=0x0F/255,currentBgB=0x0F/255;
        const targetAmbientCool={r:0xB0/255,g:0xB0/255,b:0xC0/255};
        const targetAmbientWarm={r:0xD4/255,g:0xC4/255,b:0xA0/255};
        const bgCool={r:0x0F/255,g:0x0F/255,b:0x0F/255};
        const bgWarm={r:0x14/255,g:0x14/255,b:0x18/255};

        function tickMomentum(dt,now){
            // Decay
            if(state.momentum.lastMoveTime>0){
                const inactivity=(now-state.momentum.lastMoveTime)/1000;
                if(inactivity>0.5){// grace period
                    state.momentum.value=Math.max(0,state.momentum.value-0.15*dt);
                }
            }
            const m=state.momentum.value;
            const lerpRate=0.03;

            // Ambient light
            const tR=targetAmbientCool.r+(targetAmbientWarm.r-targetAmbientCool.r)*m;
            const tG=targetAmbientCool.g+(targetAmbientWarm.g-targetAmbientCool.g)*m;
            const tB=targetAmbientCool.b+(targetAmbientWarm.b-targetAmbientCool.b)*m;
            currentAmbientColor.r+=(tR-currentAmbientColor.r)*lerpRate;
            currentAmbientColor.g+=(tG-currentAmbientColor.g)*lerpRate;
            currentAmbientColor.b+=(tB-currentAmbientColor.b)*lerpRate;
            ambientLight.color.setRGB(currentAmbientColor.r,currentAmbientColor.g,currentAmbientColor.b);
            const tI=0.5+0.2*m;
            currentAmbientIntensity+=(tI-currentAmbientIntensity)*lerpRate;
            ambientLight.intensity=currentAmbientIntensity;

            // Background
            const tbR=bgCool.r+(bgWarm.r-bgCool.r)*m;
            const tbG=bgCool.g+(bgWarm.g-bgCool.g)*m;
            const tbB=bgCool.b+(bgWarm.b-bgCool.b)*m;
            currentBgR+=(tbR-currentBgR)*lerpRate;
            currentBgG+=(tbG-currentBgG)*lerpRate;
            currentBgB+=(tbB-currentBgB)*lerpRate;
            renderer.setClearColor(new THREE.Color(currentBgR,currentBgG,currentBgB));

            // Sticker emissive baseline (only when not flashing)
            const baseEmissive=m*0.06;
            allStickerMaterials.forEach(mat=>{
                // Don't override if flashing or highlighted
                if(flashingStickers.some(f=>f.mat===mat))return;
                if(highlightedStickers.includes(mat))return;
                if(baseEmissive>0.001){
                    mat.emissive.setHex(mat.color.getHex());
                    mat.emissiveIntensity=baseEmissive;
                }else{
                    mat.emissiveIntensity=0;
                }
            });
        }

// Camera transition
        function tickCameraTransition(dt){
            const ct=state.cameraTransition;
            if(!ct)return;
            ct.elapsed+=dt;
            const t=Math.min(ct.elapsed/ct.duration,1);
            // ease-in-out
            const e=t<0.5?2*t*t:(1-Math.pow(-2*t+2,2)/2);
            camTheta=ct.startTheta+(ct.targetTheta-ct.startTheta)*e;
            camPhi=ct.startPhi+(ct.targetPhi-ct.startPhi)*e;
            camDist=ct.startDist+(ct.targetDist-ct.startDist)*e;
            updateCamera();
            if(t>=1)state.cameraTransition=null;
        }

// Main loop
        let lastFrame=performance.now();
        function loop(now){
            const dt=(now-lastFrame)/1000;
            lastFrame=now;

            // 1. Momentum
            tickMomentum(dt,now);

            // 2. Animations
            tickAnimations(dt);

            // 3. Flashes
            tickFlashes(dt);

            // 4. Cube scale
            tickCubeScale(dt);

            // 5. Highlight pulse
            tickHighlightPulse(now);

            // 6. Timer
            if(state.timer.running)updateTimer();
            updateTimerColor(now);

            // 7. Camera transition
            tickCameraTransition(dt);

            // 8. Idle rotation
            if(state.idleRotating&&state.phase==='ready'&&state.scramble.sequence.length===0){
                cubeGroup.rotation.y+=0.1*dt;
                const o=0.4+0.4*Math.sin(now*0.004);
                els.prompt.style.opacity=o;
            }else if(state.phase!=='ready'||state.scramble.sequence.length>0){
                cubeGroup.rotation.y=0;
            }

            // 9. Orbit momentum
            if(inputState!=='orbit'&&!state.cameraTransition){
                if(Math.abs(orbitVelTheta)>0.0001||Math.abs(orbitVelPhi)>0.0001){
                    camTheta+=orbitVelTheta;
                    camPhi=Math.max(-75*Math.PI/180,Math.min(75*Math.PI/180,camPhi+orbitVelPhi));
                    orbitVelTheta*=0.92;orbitVelPhi*=0.92;
                    updateCamera();
                }
            }

            // 10. Render
            renderer.render(scene,camera);
            requestAnimationFrame(loop);
        }

// Init
        updateDifficultyBtn();updateMuteBtn();updatePBDisplay();
        state.idleRotating=true;
        loadFromHash();
        if(state.phase==='ready'&&state.scramble.sequence.length>0)state.idleRotating=false;
        requestAnimationFrame(loop);

    })();
</script>
</body>
