<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>Simon Says</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2f;
            --text-primary: #ffffff;
            --text-secondary: #6b6b80;
            --accent: #00d2a0;
            --error: #ff4757;
            --green: #00d2a0;
            --red: #ff4757;
            --gold: #ffc048;
            --blue: #2e86de;
            --panel-idle-opacity: 0.35;
            --panel-gap: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 16px;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        .screen-flash {
            position: fixed;
            inset: 0;
            background: #ffffff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }
        .screen-flash.active {
            animation: screenFlash 150ms ease-out;
        }
        @keyframes screenFlash {
            0% { opacity: 0.06; }
            100% { opacity: 0; }
        }

        header {
            margin-bottom: 28px;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 0.95rem);
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 4px;
        }

        .game-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 28px 24px;
            position: relative;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }

        .info-item {
            background: var(--bg);
            padding: 12px 16px;
            border-radius: 12px;
            flex: 1;
            min-width: 0;
        }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
        }

        .info-value.level-val {
            color: var(--accent);
            font-size: 2.5rem;
            line-height: 1;
        }

        .info-value.score-val { color: var(--text-primary); }
        .info-value.best-val { color: var(--gold); }

        .info-value.pop {
            animation: scorePop 300ms cubic-bezier(0.2, 0, 0, 1);
        }
        @keyframes scorePop {
            0% { transform: scale(1); }
            40% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        .info-value.new-best-flash {
            animation: bestFlash 1200ms ease;
        }
        @keyframes bestFlash {
            0%, 100% { color: var(--gold); }
            16% { color: #ffffff; }
            33% { color: var(--gold); }
            50% { color: #ffffff; }
            66% { color: var(--gold); }
            83% { color: #ffffff; }
        }

        .status {
            background: var(--bg);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: color 0.2s ease;
        }

        .status.watching { color: #74b9ff; }
        .status.playing { color: var(--accent); }
        .status.game-over { color: var(--error); }
        .status.success { color: var(--accent); }

        .board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--panel-gap);
            margin-bottom: 24px;
            touch-action: manipulation;
            position: relative;
        }

        .panel {
            aspect-ratio: 1;
            border-radius: 16px;
            cursor: pointer;
            opacity: var(--panel-idle-opacity);
            border: 3px solid transparent;
            position: relative;
            transform: scale(1);
            transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s ease, border-color 0.15s ease;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
            overflow: visible;
        }

        .panel.green { background: var(--green); }
        .panel.red { background: var(--red); }
        .panel.gold { background: var(--gold); }
        .panel.blue { background: var(--blue); }

        .panel.disabled {
            cursor: default;
            pointer-events: none;
        }

        .panel.lit {
            opacity: 1;
            transform: scale(1.06);
            transition: opacity 0.03s ease, transform 0.12s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.1s ease;
        }
        .panel.lit.green { box-shadow: 0 0 30px rgba(0, 210, 160, 0.45); }
        .panel.lit.red { box-shadow: 0 0 30px rgba(255, 71, 87, 0.45); }
        .panel.lit.gold { box-shadow: 0 0 30px rgba(255, 192, 72, 0.45); }
        .panel.lit.blue { box-shadow: 0 0 30px rgba(46, 134, 222, 0.45); }

        .panel.pressed {
            opacity: 1;
            transform: scale(1.08);
            transition: opacity 0.01s, transform 0.12s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.05s ease;
        }
        .panel.pressed.green { box-shadow: 0 0 30px rgba(0, 210, 160, 0.45); }
        .panel.pressed.red { box-shadow: 0 0 30px rgba(255, 71, 87, 0.45); }
        .panel.pressed.gold { box-shadow: 0 0 30px rgba(255, 192, 72, 0.45); }
        .panel.pressed.blue { box-shadow: 0 0 30px rgba(46, 134, 222, 0.45); }

        .panel.releasing {
            transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.25, 0, 0.25, 1), box-shadow 0.25s ease;
        }

        .panel.burst {
            opacity: 1;
            transition: opacity 0.1s ease;
        }

        .panel.wrong {
            border-color: var(--error) !important;
            animation: panelShake 300ms ease;
        }
        @keyframes panelShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(4px); }
        }

        .board.error-dim .panel {
            opacity: 0.15 !important;
            transition: opacity 0.1s ease;
        }
        .board.error-dim .panel.wrong {
            opacity: 0.6 !important;
        }

        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border-radius: 16px;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: none;
            animation: pulseExpand 400ms ease-out forwards;
            z-index: 10;
        }
        .pulse-ring.streak { animation: pulseExpandStreak 400ms ease-out forwards; }

        @keyframes pulseExpand {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
        }
        @keyframes pulseExpandStreak {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.55; }
            100% { transform: translate(-50%, -50%) scale(1.35); opacity: 0; }
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            animation: particleFade 450ms ease-out forwards;
        }
        @keyframes particleFade {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        .btn {
            background: var(--accent);
            color: #0f0f1a;
            border: none;
            padding: 16px 36px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: transform 0.15s ease, opacity 0.15s ease;
            outline: none;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        .btn:active:not(:disabled) {
            transform: translateY(0) scale(0.97);
        }
        .btn:disabled {
            opacity: 0;
            pointer-events: none;
            cursor: default;
        }
        .btn.retry {
            background: var(--error);
            color: #ffffff;
            animation: retryPulse 1s ease-in-out infinite;
        }
        @keyframes retryPulse {
            0%, 100% { opacity: 0.85; }
            50% { opacity: 1; }
        }

        .tension-bg {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: -1;
            transition: background 0.5s ease;
        }

        @media (max-width: 500px) {
            .game-card { padding: 20px 16px; }
            .info-bar { gap: 8px; }
            .info-item { padding: 10px 12px; }
            .info-value.level-val { font-size: 2rem; }
            .info-value { font-size: 1.3rem; }
            .board { gap: 12px; }
            .btn { padding: 14px 28px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="tension-bg" id="tensionBg"></div>
<div class="screen-flash" id="screenFlash"></div>

<div class="container">
    <header>
        <h1>Simon Says</h1>
        <p class="subtitle">Watch, remember, repeat</p>
    </header>

    <div class="game-card">
        <div class="info-bar">
            <div class="info-item">
                <div class="info-label">Level</div>
                <div class="info-value level-val" id="levelVal">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Score</div>
                <div class="info-value score-val" id="scoreVal">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Best</div>
                <div class="info-value best-val" id="bestVal">0</div>
            </div>
        </div>

        <div class="status" id="status">Press Start to Begin</div>

        <div class="board" id="board">
            <div class="panel green" data-index="0"></div>
            <div class="panel red" data-index="1"></div>
            <div class="panel gold" data-index="2"></div>
            <div class="panel blue" data-index="3"></div>
        </div>

        <button class="btn" id="actionBtn">Start</button>
    </div>
</div>

<script>
    // ─── CONSTANTS ───
    const STATES = { IDLE: 0, SHOWING: 1, INPUT: 2, GAME_OVER: 3 };

    const PANEL_TONES = [329.63, 261.63, 392.00, 440.00]; // E4, C4, G4, A4
    const PANEL_COLORS = ['rgba(0,210,160,', 'rgba(255,71,87,', 'rgba(255,192,72,', 'rgba(46,134,222,'];

    const CHIME_FREQS = [523.25, 659.25, 783.99]; // C5, E5, G5
    const ERROR_FREQ = 130;

    const BASE_INTERVAL = 700;
    const INTERVAL_DECREASE = 35;
    const MIN_INTERVAL = 350;

    const BASE_FLASH_DUR = 450;
    const FLASH_DUR_DECREASE = 20;
    const MIN_FLASH_DUR = 250;

    const PRE_ROUND_DELAY = 800;
    const NEXT_ROUND_GAP = 600;

    // ─── DOM ───
    const panels = document.querySelectorAll('.panel');
    const board = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const levelVal = document.getElementById('levelVal');
    const scoreVal = document.getElementById('scoreVal');
    const bestVal = document.getElementById('bestVal');
    const actionBtn = document.getElementById('actionBtn');
    const screenFlash = document.getElementById('screenFlash');
    const tensionBg = document.getElementById('tensionBg');

    // ─── GAME STATE ───
    let audioCtx = null;
    let state = STATES.IDLE;
    let sequence = [];
    let playerIndex = 0;
    let level = 0;
    let score = 0;
    let highScore = 0;
    let prevHighScore = 0;
    let streak = 0;
    let tensionRAF = null;

    try { highScore = parseInt(localStorage.getItem('simonBest')) || 0; } catch(e) {}
    bestVal.textContent = highScore;

    // ─── AUDIO ───
    function ensureAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(freq, duration = 0.25, gain = 0.25, type = 'sine') {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(gain, now + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, now + duration);
        osc.start(now);
        osc.stop(now + duration + 0.01);
    }

    function playChime() {
        CHIME_FREQS.forEach((f, i) => {
            setTimeout(() => playTone(f, 0.15, 0.15), i * 80);
        });
    }

    function playError() {
        playTone(ERROR_FREQ, 0.25, 0.2, 'sawtooth');
    }

    // ─── HELPERS ───
    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    function getInterval() {
        return Math.max(BASE_INTERVAL - (level - 1) * INTERVAL_DECREASE, MIN_INTERVAL);
    }

    function getFlashDur() {
        return Math.max(BASE_FLASH_DUR - (level - 1) * FLASH_DUR_DECREASE, MIN_FLASH_DUR);
    }

    function setStatus(text, cls = '') {
        statusEl.textContent = text;
        statusEl.className = 'status' + (cls ? ' ' + cls : '');
    }

    function updateDisplay() {
        levelVal.textContent = level;
        scoreVal.textContent = score;
    }

    // ─── PULSE RING ───
    function spawnPulseRing(panel) {
        const ring = document.createElement('div');
        ring.className = 'pulse-ring' + (streak >= 3 ? ' streak' : '');
        const color = PANEL_COLORS[panel.dataset.index];
        ring.style.border = `3px solid ${color}0.5)`;
        panel.appendChild(ring);
        ring.addEventListener('animationend', () => ring.remove());
    }

    // ─── PARTICLES ───
    function spawnParticles(panel, count) {
        const rect = panel.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const color = PANEL_COLORS[panel.dataset.index] + '0.8)';

        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.background = color;
            p.style.left = cx + 'px';
            p.style.top = cy + 'px';
            p.style.position = 'fixed';

            const angle = Math.random() * Math.PI * 2;
            const dist = 30 + Math.random() * 50;
            const dx = Math.cos(angle) * dist;
            const dy = Math.sin(angle) * dist;

            document.body.appendChild(p);

            const start = performance.now();
            function animate(now) {
                const elapsed = now - start;
                const t = Math.min(elapsed / 450, 1);
                const ease = 1 - (1 - t) * (1 - t);
                p.style.transform = `translate(${dx * ease}px, ${dy * ease}px)`;
                if (t < 1) requestAnimationFrame(animate);
                else p.remove();
            }
            requestAnimationFrame(animate);
        }
    }

    // ─── TENSION BACKGROUND ───
    function startTensionPulse() {
        stopTensionPulse();
        if (level < 9) return;

        const intensity = level >= 13 ? 0.06 : 0.03;
        const baseR = 15, baseG = 15, baseB = 26;

        function pulse(now) {
            const t = Math.sin(now / 1000 * Math.PI);
            const factor = 1 + t * intensity;
            const r = Math.round(baseR * factor);
            const g = Math.round(baseG * factor);
            const b = Math.round(baseB * factor);
            tensionBg.style.background = `rgb(${r},${g},${b})`;
            tensionRAF = requestAnimationFrame(pulse);
        }
        tensionRAF = requestAnimationFrame(pulse);
    }

    function stopTensionPulse() {
        if (tensionRAF) { cancelAnimationFrame(tensionRAF); tensionRAF = null; }
        tensionBg.style.background = 'var(--bg)';
    }

    // ─── PANEL FLASH (observation) ───
    async function flashPanel(panel, dur) {
        panel.classList.add('lit');
        playTone(PANEL_TONES[panel.dataset.index]);
        await wait(dur);
        panel.classList.remove('lit');
    }

    // ─── SEQUENCE PLAYBACK ───
    async function playSequence() {
        state = STATES.SHOWING;
        panels.forEach(p => p.classList.add('disabled'));

        const interval = getInterval();
        const flashDur = getFlashDur();

        setStatus('Watch the sequence...', 'watching');

        for (let i = 0; i < sequence.length; i++) {
            if (i > 0) await wait(interval - flashDur);
            await flashPanel(sequence[i], flashDur);
        }

        panels.forEach(p => p.classList.remove('disabled'));
        state = STATES.INPUT;
        playerIndex = 0;
        setStatus('Your turn!', 'playing');
    }

    // ─── CELEBRATION ───
    async function celebrate() {
        screenFlash.classList.add('active');
        setTimeout(() => screenFlash.classList.remove('active'), 200);

        panels.forEach(p => p.classList.add('burst'));
        playChime();
        await wait(100);
        panels.forEach(p => p.classList.remove('burst'));
        await wait(200);

        score++;
        scoreVal.textContent = score;
        scoreVal.classList.add('pop');
        setTimeout(() => scoreVal.classList.remove('pop'), 350);

        setStatus('Correct!', 'success');

        if (score > highScore) {
            highScore = score;
            try { localStorage.setItem('simonBest', highScore); } catch(e) {}
            bestVal.textContent = highScore;
        }

        await wait(NEXT_ROUND_GAP);
    }

    // ─── GAME OVER ───
    async function gameOver(wrongPanel) {
        state = STATES.GAME_OVER;
        stopTensionPulse();
        streak = 0;

        wrongPanel.classList.add('wrong');
        playError();

        board.classList.add('error-dim');
        await wait(400);
        wrongPanel.classList.remove('wrong');
        await wait(100);
        board.classList.remove('error-dim');

        if (score > prevHighScore) {
            setStatus(`NEW BEST — ${score}!`, 'game-over');
            bestVal.classList.add('new-best-flash');
            setTimeout(() => bestVal.classList.remove('new-best-flash'), 1300);
        } else {
            setStatus(`Game Over — Score ${score}`, 'game-over');
        }

        actionBtn.textContent = 'Retry';
        actionBtn.className = 'btn retry';
        actionBtn.disabled = false;
    }

    // ─── NEXT ROUND ───
    async function nextRound() {
        level++;
        updateDisplay();
        sequence.push(panels[Math.floor(Math.random() * 4)]);
        startTensionPulse();
        await wait(PRE_ROUND_DELAY);
        await playSequence();
    }

    // ─── INPUT HANDLING ───
    function handlePanelPress(panel) {
        if (state !== STATES.INPUT) return;

        panel.classList.remove('releasing');
        panel.classList.add('pressed');
        playTone(PANEL_TONES[panel.dataset.index]);

        setTimeout(() => {
            panel.classList.remove('pressed');
            panel.classList.add('releasing');
            setTimeout(() => panel.classList.remove('releasing'), 250);
        }, 150);

        const expected = sequence[playerIndex];
        if (panel !== expected) {
            state = STATES.IDLE;
            setTimeout(() => gameOver(panel), 100);
            return;
        }

        spawnPulseRing(panel);

        if (streak >= 5) {
            spawnParticles(panel, 10);
        } else if (streak >= 3) {
            spawnParticles(panel, 5);
        }

        playerIndex++;

        if (playerIndex === sequence.length) {
            state = STATES.IDLE;
            streak++;
            panels.forEach(p => p.classList.add('disabled'));

            setTimeout(async () => {
                await celebrate();
                nextRound();
            }, 200);
        }
    }

    // ─── EVENT LISTENERS ───
    panels.forEach(panel => {
        panel.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            handlePanelPress(panel);
        });
    });

    actionBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
    });

    actionBtn.addEventListener('click', () => {
        ensureAudio();

        sequence = [];
        level = 0;
        score = 0;
        streak = 0;
        playerIndex = 0;
        prevHighScore = highScore;
        updateDisplay();

        actionBtn.disabled = true;
        actionBtn.className = 'btn';
        actionBtn.textContent = 'Start';

        nextRound();
    });

    board.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    document.addEventListener('touchmove', e => {
        if (state === STATES.INPUT || state === STATES.SHOWING) e.preventDefault();
    }, { passive: false });
</script>
<script src="../logo.js"></script>
</body>
</html>
