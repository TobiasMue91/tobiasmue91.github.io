<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>Emoji Horde</title>
    <style>* {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0a0a0f;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        color: #e0e0e0;
        touch-action: none;
    }

    canvas {
        display: block;
        cursor: none;
        touch-action: none;
    }

    #upgradeScreen {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0f;
        z-index: 100;
        flex-direction: column;
        overflow: hidden;
    }

    #upgradeScreen.active {
        display: flex;
    }

    #upgradeTopBar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        background: #111118;
        border-bottom: 1px solid #222;
        flex-shrink: 0;
    }

    #upgradeTopBar .currency {
        font-size: 18px;
        font-weight: 600;
    }

    #upgradeTopBar .currency span {
        margin-left: 4px;
    }

    #synergyBar {
        display: flex;
        gap: 6px;
        padding: 8px 16px;
        background: #0e0e14;
        border-bottom: 1px solid #1a1a22;
        flex-shrink: 0;
        justify-content: center;
        flex-wrap: wrap;
    }

    .synergy-diamond {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        background: #1a1a22;
        border: 1px solid #2a2a33;
        border-radius: 4px;
        opacity: 0.4;
        cursor: pointer;
        transition: opacity 0.2s, border-color 0.2s;
        position: relative;
    }

    .synergy-diamond.active {
        opacity: 1;
        border-color: #f0c040;
        background: #1a1a10;
    }

    .synergy-tooltip {
        display: none;
        position: absolute;
        bottom: 36px;
        left: 50%;
        transform: translateX(-50%);
        background: #1a1a22;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 11px;
        white-space: nowrap;
        z-index: 200;
        color: #ccc;
        pointer-events: none;
    }

    .synergy-diamond:hover .synergy-tooltip, .synergy-diamond:active .synergy-tooltip {
        display: block;
    }

    #tabBar {
        display: flex;
        background: #111118;
        border-bottom: 1px solid #222;
        flex-shrink: 0;
        overflow-x: auto;
    }

    .tab-btn {
        flex: 1;
        min-width: 60px;
        padding: 10px 6px;
        text-align: center;
        font-size: 13px;
        background: none;
        border: none;
        color: #777;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.2s, border-color 0.2s;
        white-space: nowrap;
    }

    .tab-btn.active {
        color: #e0e0e0;
        border-bottom-color: #4a9;
    }

    #upgradeContent {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        -webkit-overflow-scrolling: touch;
    }

    #upgradeGrid {
        display: grid;
        grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
        gap: 10px;
    }

    .upgrade-card {
        background: #13131a;
        border: 1px solid #222;
        border-radius: 8px;
        padding: 12px;
        transition: border-color 0.2s;
    }

    .upgrade-card.affordable {
        border-color: #2a7a4f;
    }

    .upgrade-card.maxed {
        border-color: #444;
        opacity: 0.7;
    }

    .upgrade-card.locked {
        opacity: 0.5;
    }

    .upgrade-card.star-card {
        border-color: #2a2a44;
    }

    .upgrade-card.star-card.affordable {
        border-color: #6b4fa0;
    }

    .uc-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
    }

    .uc-name {
        font-size: 14px;
        font-weight: 600;
    }

    .uc-level {
        font-size: 12px;
        color: #888;
    }

    .uc-desc {
        font-size: 12px;
        color: #999;
        margin-bottom: 8px;
        line-height: 1.4;
    }

    .uc-btn {
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, opacity 0.2s;
    }

    .uc-btn.gold-btn {
        background: #2a7a4f;
        color: #fff;
    }

    .uc-btn.gold-btn:disabled {
        background: #1a3a2a;
        color: #556;
        cursor: default;
    }

    .uc-btn.star-btn {
        background: #6b4fa0;
        color: #fff;
    }

    .uc-btn.star-btn:disabled {
        background: #2a1a3a;
        color: #556;
        cursor: default;
    }

    .uc-btn.maxed-btn {
        background: #333;
        color: #888;
        cursor: default;
    }

    .uc-btn.locked-btn {
        background: #222;
        color: #777;
        cursor: default;
    }

    #upgradeBottomBar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        background: #111118;
        border-top: 1px solid #222;
        flex-shrink: 0;
        gap: 8px;
    }

    #stageSelect {
        background: #1a1a22;
        color: #e0e0e0;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
        min-width: 140px;
    }

    #startRunBtn {
        background: #2a7a4f;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 12px 24px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        min-height: 48px;
        white-space: nowrap;
    }

    #startRunBtn:hover {
        background: #3a9a6f;
    }

    #resetBtn {
        background: none;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 6px 10px;
        color: #777;
        font-size: 12px;
        cursor: pointer;
    }

    #milestonePanel {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 200;
        overflow-y: auto;
        padding: 20px;
    }

    #milestonePanel.active {
        display: block;
    }

    #milestonePanel h2 {
        text-align: center;
        margin-bottom: 16px;
        font-size: 20px;
    }

    .milestone-item {
        background: #13131a;
        border: 1px solid #222;
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 8px;
    }

    .milestone-item.completed {
        border-color: #b8860b;
        background: #1a1810;
    }

    .mi-name {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
    }

    .mi-desc {
        font-size: 12px;
        color: #999;
    }

    .mi-progress {
        height: 4px;
        background: #222;
        border-radius: 2px;
        margin-top: 6px;
        overflow: hidden;
    }

    .mi-progress-fill {
        height: 100%;
        background: #4a9;
        border-radius: 2px;
        transition: width 0.3s;
    }

    #closeMilestones {
        position: fixed;
        top: 16px;
        right: 16px;
        background: #222;
        border: none;
        color: #e0e0e0;
        font-size: 20px;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        z-index: 210;
    }

    .toast {
        position: fixed;
        right: -300px;
        top: 60px;
        background: #1a1810;
        border: 1px solid #b8860b;
        border-radius: 8px;
        padding: 12px 16px;
        z-index: 300;
        transition: right 0.4s ease;
        font-size: 13px;
        max-width: 280px;
    }

    .toast.show {
        right: 16px;
    }</style>
</head>

    // ============================================================
    // SOUND MANAGER
    // ============================================================
    class SoundManager {
        constructor() {
            this.ctx = null;
            this.muted = false;
        }

        init() {
            if (!this.ctx) try {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
            }
        }

        play(type) {
            if (this.muted || !this.ctx) return;
            try {
                this._dispatch(type);
            } catch (e) {
            }
        }

        _dispatch(type) {
            const c = this.ctx;
            switch (type) {
                case 'hit':
                    this._sweep(c, 'square', 220, 110, 0.06, 0.12);
                    break;
                case 'kill':
                    this._sweep(c, 'sine', 440, 880, 0.1, 0.15);
                    break;
                case 'gold':
                    this._sweep(c, 'sine', 660, 880, 0.08, 0.12);
                    break;
                case 'heartDmg':
                    this._sweep(c, 'sawtooth', 150, 80, 0.2, 0.2);
                    break;
                case 'bossAppear':
                    this._sweep(c, 'sine', 110, 220, 0.5, 0.15);
                    break;
                case 'upgrade':
                    this._arpeggio(c, [440, 550, 660], 0.067, 0.12);
                    break;
                case 'milestone':
                    this._arpeggio(c, [330, 440, 660, 880], 0.1, 0.12);
                    break;
                case 'ability':
                    this._sweep(c, 'square', 880, 880, 0.05, 0.1);
                    break;
                case 'bossDefeat':
                    this._arpeggio(c, [220, 440, 660, 880, 1100], 0.12, 0.15);
                    break;
            }
        }

        _sweep(ctx, wave, f1, f2, dur, vol) {
            const o = ctx.createOscillator(), g = ctx.createGain();
            o.type = wave;
            o.frequency.setValueAtTime(f1, ctx.currentTime);
            o.frequency.linearRampToValueAtTime(f2, ctx.currentTime + dur);
            g.gain.setValueAtTime(vol, ctx.currentTime);
            g.gain.linearRampToValueAtTime(0, ctx.currentTime + dur);
            o.connect(g);
            g.connect(ctx.destination);
            o.start();
            o.stop(ctx.currentTime + dur + 0.01);
        }

        _arpeggio(ctx, freqs, noteDur, vol) {
            freqs.forEach((f, i) => {
                const o = ctx.createOscillator(), g = ctx.createGain();
                o.type = 'sine';
                o.frequency.value = f;
                const t = ctx.currentTime + i * noteDur;
                g.gain.setValueAtTime(vol, t);
                g.gain.linearRampToValueAtTime(0, t + noteDur);
                o.connect(g);
                g.connect(ctx.destination);
                o.start(t);
                o.stop(t + noteDur + 0.01);
            });
        }
    }

    // ============================================================
    // PARTICLE SYSTEM
    // ============================================================
    class ParticleSystem {
        constructor() {
            this.particles = [];
            for (let i = 0; i < CFG.maxParticles; i++) this.particles.push({active: false, priority: 0});
        }

        spawn(x, y, vx, vy, life, emoji, size, priority, grav, targetX, targetY) {
            let p = this.particles.find(p => !p.active);
            if (!p) {
                let lowest = null;
                for (const pp of this.particles) if (pp.active && pp.priority < priority && (!lowest || pp.priority < lowest.priority)) lowest = pp;
                if (lowest) p = lowest; else return null;
            }
            p.active = true;
            p.x = x;
            p.y = y;
            p.vx = vx;
            p.vy = vy;
            p.life = life;
            p.maxLife = life;
            p.emoji = emoji;
            p.size = size;
            p.priority = priority;
            p.alpha = 1;
            p.grav = grav || 0;
            p.targetX = targetX;
            p.targetY = targetY;
            p.startX = x;
            p.startY = y;
            p.isArc = targetX !== undefined;
            p.text = null;
            p.color = null;
            return p;
        }

        spawnText(x, y, text, color, size, life) {
            const p = this.spawn(x, y, 0, -60, life || 0.6, null, size || 16, 2);
            if (p) {
                p.text = text;
                p.color = color || '#fff';
            }
            return p;
        }

        update(dt) {
            for (const p of this.particles) {
                if (!p.active) continue;
                p.life -= dt;
                if (p.life <= 0) {
                    p.active = false;
                    continue;
                }
                const t = 1 - p.life / p.maxLife;
                p.alpha = p.life / p.maxLife;
                if (p.isArc) {
                    const cx = (p.startX + p.targetX) / 2, cy = Math.min(p.startY, p.targetY) - 60;
                    const t2 = t;
                    p.x = (1 - t2) * (1 - t2) * p.startX + 2 * (1 - t2) * t2 * cx + t2 * t2 * p.targetX;
                    p.y = (1 - t2) * (1 - t2) * p.startY + 2 * (1 - t2) * t2 * cy + t2 * t2 * p.targetY;
                } else {
                    p.vy += p.grav * dt;
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                }
            }
        }

        render(ctx) {
            for (const p of this.particles) {
                if (!p.active) continue;
                ctx.globalAlpha = p.alpha;
                if (p.text) {
                    ctx.font = `bold ${p.size}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#000';
                    ctx.fillText(p.text, p.x + 1, p.y + 1);
                    ctx.fillStyle = p.color;
                    ctx.fillText(p.text, p.x, p.y);
                } else if (p.emoji) {
                    ctx.font = `${p.size}px serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(p.emoji, p.x, p.y);
                }
            }
            ctx.globalAlpha = 1;
        }
    }
