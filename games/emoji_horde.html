                this.shakeY = (Math.random() - 0.5) * 6;
            } else {
                this.shakeX = 0;
                this.shakeY = 0;
            }
            if (this.redFlash > 0) this.redFlash -= dt;
            if (this.heartPulse > 0) this.heartPulse -= dt;
            if (this.invulnTimer > 0) this.invulnTimer -= dt;

            // Spawning
            if (!this.bossActive && !this.bossDefeated) {
                const stage = CFG.stages[this.endlessMode ? 4 : this.currentStage];
                const total = this.endlessMode ? Infinity : stage.totalEnemies;
                if (this.enemiesSpawned < total) {
                    this.spawnTimer -= dt;
                    if (this.spawnTimer <= 0) {
                        this.spawnEnemy();
                        this.enemiesSpawned++;
                        let interval = this.endlessMode ? this.endlessSpawnInterval : this.getSpawnInterval();
                        this.spawnTimer = interval;
                    }
                } else if (!this.endlessMode && this.getActiveEnemyCount() === 0 && !this.bossDefeated) {
                    this.startBoss();
                }
            }
            if (this.endlessMode) {
                this.endlessSpawnInterval = Math.max(0.08, 1 - Math.floor(this.runTime / 5) * 0.02) * BALANCE.spawnRateMult;
                this.endlessMultiplier = 1 + Math.floor(this.runTime / 30) * 0.1;
            }

            // Combat stats
            const atkR = this.getAttackRadius();
            const dmg = this.getDamage();
            const multiStrike = 1 + (this.upgradeLevels.multiStrike || 0);
            const critChance = (this.upgradeLevels.critHit || 0) * 0.03;
            const knockback = (this.upgradeLevels.knockback || 0) * 10;
            const freezeChance = (this.upgradeLevels.freezeEdge || 0) * 0.08;
            const magnetRadius = (this.upgradeLevels.magneticField || 0) > 0 ? 40 + (this.upgradeLevels.magneticField || 0) * 15 : 0;
            const magnetPull = this.hasSynergy(6) ? 0.6 : 0.3;

            // Update enemies
            for (const e of this.enemies) {
                if (!e.active) continue;
                if (e.phasing) {
                    e.phaseTimer -= dt;
                    if (e.phaseTimer <= 0) {
                        e.phaseVisible = !e.phaseVisible;
                        e.phaseTimer = e.phaseVisible ? CFG.enemies.phase.phaseOff : CFG.enemies.phase.phaseOn;
                    }
                }
                if (e.frozen > 0) e.frozen -= dt;

                // Determine target (decoy aware)
                let targetX = this.heartX, targetY = this.heartYPos;
                let goingToDecoy = false;
                if (this.decoyActive) {
                    const dd = Math.hypot(e.x - this.decoyX, e.y - this.decoyY);
                    if (dd < 150) {
                        targetX = this.decoyX;
                        targetY = this.decoyY;
                        goingToDecoy = true;
                    }
                }
                const toTargetX = targetX - e.x, toTargetY = targetY - e.y;
                const dist = Math.sqrt(toTargetX * toTargetX + toTargetY * toTargetY);

                if (dist > 1) {
                    const dirX = toTargetX / dist, dirY = toTargetY / dist;
                    let spd = e.speed * (e.frozen > 0 ? 0.5 : 1);

                    // Boss speed override
                    if (e.isBoss && e.bossData) {
                        if (e.bossData.charging) spd = e.bossData.chargeSpeed || e.speed * 2;
                        if (e.bossData.behavior === 'combined' && e.hp < e.maxHp * 0.2) spd = 100;
                        else if (e.bossData.behavior === 'teleportSummon') {
                            const hpRatio = e.hp / e.maxHp;
                            spd = e.speed + (1 - hpRatio) * 40;
                        }
                    }

                    // Magnet field
                    if (magnetRadius > 0 && !e.isBoss) {
                        const dHeart = Math.hypot(e.x - this.heartX, e.y - this.heartYPos);
                        if (dHeart < magnetRadius) spd *= (1 - magnetPull);
                    }

                    // Vortex pull (toward effective cursor)
                    if (this.vortexActive && !goingToDecoy && !e.isBoss) {
                        const dCursor = Math.hypot(e.x - this.effectiveCursorX, e.y - this.effectiveCursorY);
                        const vortexR = 80 + (this.upgradeLevels.vortexPull || 0) * 15;
                        if (dCursor < vortexR) {
                            const px = (this.effectiveCursorX - e.x) / dCursor * 40 * dt;
                            const py = (this.effectiveCursorY - e.y) / dCursor * 40 * dt;
                            e.x += px;
                            e.y += py;
                        }
                    }

                    // Movement pattern modifiers
                    if (!e.isBoss) {
                        e.patternTimer = (e.patternTimer || 0) + dt;
                        const pattern = e.pattern || "direct";
                        if (pattern === "wobble") {
                            const perpX = -dirY, perpY = dirX;
                            const w = Math.sin(e.patternTimer * Math.PI * 2 / (e.wobblePeriod || 1.5)) * (e.wobbleAmp || 50);
                            e.x += perpX * w * dt;
                            e.y += perpY * w * dt;
                        } else if (pattern === "zigzag") {
                            const perpX = -dirY, perpY = dirX;
                            const period = e.zigzagInterval || 0.6;
                            const phase = Math.floor(e.patternTimer / period) % 2;
                            const sign = phase === 0 ? 1 : -1;
                            e.x += perpX * sign * spd * 0.55 * dt;
                            e.y += perpY * sign * spd * 0.55 * dt;
                        } else if (pattern === "hopper") {
                            const interval = e.hopInterval || 1.0;
                            const t = e.patternTimer % interval;
                            const phase = t / interval;
                            const arcMul = phase < 0.4 ? 0 : Math.sin((phase - 0.4) / 0.6 * Math.PI) * 2.0;
                            spd *= arcMul;
                        } else if (pattern === "charger") {
                            const interval = e.chargeInterval || 2.0;
                            const t = e.patternTimer % interval;
                            const phase = t / interval;
                            // Long pause then rapid burst
                            if (phase < 0.7) spd *= 0.25;
                            else spd *= 2.4;
                        } else if (pattern === "orbit") {
                            // Approach until at orbit radius, then circle
                            const orbitR = e.orbitRadius || 100;
                            if (dist > orbitR + 5) {
                                // approach
                            } else {
                                // tangential motion (counter-clockwise)
                                const perpX = -dirY, perpY = dirX;
                                e.x += perpX * spd * 0.9 * dt;
                                e.y += perpY * spd * 0.9 * dt;
                                spd *= 0.05; // very slight inward drift to keep ring active
                            }
                        } else if (pattern === "teleport") {
                            const interval = e.teleportInterval || 3;
                            const t = e.patternTimer % interval;
                            if (t < dt && e.patternTimer > interval) {
                                // Teleport closer toward target by 25-40% of remaining distance
                                const jump = dist * (0.25 + Math.random() * 0.15);
                                e.x += dirX * jump;
                                e.y += dirY * jump;
                                this.particles.spawn(e.x, e.y, 0, 0, 0.3, '✨', 14, 1, 0);
                            }
                            spd *= 0.55;
                        }
                    }

                    e.x += dirX * spd * dt;
                    e.y += dirY * spd * dt;
                }

                // Boss AI
                if (e.isBoss && e.bossData) this.updateBoss(e, dt);

                // Hit detection (uses effective cursor)
                if (vel > CFG.minVelocity && e.lastSwingHit !== this.swingId && (!e.phasing || e.phaseVisible)) {
                    const d = Math.hypot(this.effectiveCursorX - e.x, this.effectiveCursorY - e.y);
                    if (d < atkR + e.size / 2) {
                        e.lastSwingHit = this.swingId;
                        for (let s = 0; s < multiStrike; s++) {
                            let hitDmg = dmg;
                            let isCrit = Math.random() < critChance;
                            if (isCrit) hitDmg *= 3;
                            e.hp -= hitDmg;
                            this.sound.play('hit');
                            const color = isCrit ? '#ffff00' : '#ffffff';
                            const txt = isCrit ? `${Math.round(hitDmg)} CRIT!` : `${Math.round(hitDmg)}`;
                            // Fan multi-strike numbers across the enemy with jitter so they don't overlap.
                            const slotFrac = multiStrike > 1 ? (s + 0.5) / multiStrike - 0.5 : 0;
                            const slotX = slotFrac * (e.size + 16) + (Math.random() - 0.5) * 8;
                            const slotY = -e.size / 2 - Math.abs(slotFrac) * 8 - Math.random() * 6;
                            const tp = this.particles.spawnText(e.x + slotX, e.y + slotY, txt, color, isCrit ? 18 : 14, 0.5 + Math.random() * 0.3);
                            if (tp) {
                                tp.vx = slotFrac * 35 + (Math.random() - 0.5) * 14;
                                tp.vy = -50 - Math.random() * 28;
                            }
                            if (freezeChance > 0 && Math.random() < freezeChance) e.frozen = 1.5;
                            if (this.hasSynergy(7) && Math.random() < 0.1) this.aoeHit(e.x, e.y, 50, 2);
                        }
                        if (knockback > 0 && dist > 1) {
                            // Bosses heavily resist knockback so they remain a real threat.
                            const kbMult = e.isBoss ? 0.12 : 1;
                            e.x -= (toTargetX / dist) * knockback * kbMult;
                            e.y -= (toTargetY / dist) * knockback * kbMult;
                        }
                        if (e.hp <= 0) {
                            this.killEnemy(e);
                            continue;
                        }
                    }
                }

                // Astral Aura
                if ((this.starLevels.astralAura || 0) > 0) {
                    const d = Math.hypot(this.effectiveCursorX - e.x, this.effectiveCursorY - e.y);
                    if (d < 40 && (!e.phasing || e.phaseVisible)) {
                        e.hp -= 0.5 * dt;
                        if (e.hp <= 0) {
                            this.killEnemy(e);
                            continue;
                        }
                    }
                }

                // Wall collision
                if (this.wallHp > 0 && !e.isBoss) {
                    const wallY = this.heartYPos - CFG.wallYOffset;
                    const wallW = this.W * CFG.wallWidthRatio;
                    const wallL = this.W / 2 - wallW / 2;
                    if (e.y > wallY - 10 && e.y < wallY + 20 && e.x > wallL && e.x < wallL + wallW) {
                        this.wallHp -= 1;
                        const thornDmg = this.upgradeLevels.wallThorns || 0;
                        if (thornDmg > 0) e.hp -= thornDmg;
                        if (e.hp <= 0) {
                            this.killEnemy(e);
                            continue;
                        } else {
                            e.y = wallY - 12;
                            continue;
                        }
                    }
                }

                // Shield collision
                if (this.shieldActive && !e.isBoss) {
                    const dHeart = Math.hypot(e.x - this.heartX, e.y - this.heartYPos);
                    if (dHeart < 80) {
                        e.active = false;
                        continue;
                    }
                }

                // Heart collision
                if (!e.isBoss) {
                    const dHeart = Math.hypot(e.x - this.heartX, e.y - this.heartYPos);
                    if (dHeart < 30) {
                        this.damageHeart(e);
                        e.active = false;
                        if (e.onDeath === 'explode') this.damageHeart(null);
                        continue;
                    }
                }
            }

            this.updateAbilities(dt);

            // Regen
            const regenLevel = this.upgradeLevels.heartRegen || 0;
            if (regenLevel > 0) {
                let interval = Math.max(12, 25 - regenLevel * 2);
                if (this.hasSynergy(8)) interval *= 0.7; // Battle Trance
                if (this.milestonesCompleted.surv120) interval *= 0.8;
                this.regenTimer += dt;
                if (this.regenTimer >= interval) {
                    this.regenTimer = 0;
                    if (this.hp < this.maxHp) this.hp++;
                }
            }

            // Passive income
            const incomeLevel = this.upgradeLevels.passiveIncome || 0;
            if (incomeLevel > 0) {
                let rate = incomeLevel * 2;
                if (this.milestonesCompleted.gold2000) rate *= 2;
                this.passiveIncomeTimer += dt;
                if (this.passiveIncomeTimer >= 2) {
                    this.passiveIncomeTimer = 0;
                    const amt = Math.floor(rate * 2 * BALANCE.goldIncomeMult);
                    this.addGold(amt);
                    this.particles.spawnText(this.W - 60, 30, `+${amt}`, '#aaffaa', 12, 0.8);
                }
            }

            // Star collector
            const starLevel = this.upgradeLevels.starCollector || 0;
            if (starLevel > 0) {
                const interval = Math.max(20, 60 - starLevel * 8);
                this.starCollectTimer += dt;
                if (this.starCollectTimer >= interval) {
                    this.starCollectTimer = 0;
                    this.addStars(1);
                }
            }

            // Shield
            const shieldLevel = this.upgradeLevels.heartShield || 0;
            if (shieldLevel > 0 && this.upgradeUnlocked.heartShield) {
                if (!this.shieldActive) {
                    this.shieldCooldown -= dt;
                    if (this.shieldCooldown <= 0) {
                        this.shieldActive = true;
                        this.shieldTimer = 2.5 + shieldLevel * 0.5;
                    }
                } else {
                    this.shieldTimer -= dt;
                    if (this.shieldTimer <= 0) {
                        this.shieldActive = false;
                        this.shieldCooldown = Math.max(10, 18 - shieldLevel);
                    }
                }
            }

            // Wall regen (Astral Wall)
            if ((this.starLevels.astralWall || 0) > 0 && this.wallMaxHp > 0 && this.wallHp < this.wallMaxHp) {
                this._wallRegenTimer = (this._wallRegenTimer || 0) + dt;
                if (this._wallRegenTimer >= 5) {
                    this._wallRegenTimer = 0;
                    this.wallHp = Math.min(this.wallMaxHp, this.wallHp + 1);
                }
            }

            this.particles.update(dt);
        }

        getSpawnInterval() {
            const stage = CFG.stages[this.currentStage];
            const curve = stage.spawnCurve;
            const t = this.runTime;
            for (let i = curve.length - 1; i >= 0; i--) {
                if (t >= curve[i][0]) return curve[i][1] * BALANCE.spawnRateMult;
            }
            return curve[0][1] * BALANCE.spawnRateMult;
        }

        getActiveEnemyCount() {
            let c = 0;
            for (const e of this.enemies) if (e.active && !e.isBoss) c++;
            return c;
        }

        spawnEnemy() {
            const stage = CFG.stages[this.endlessMode ? 4 : this.currentStage];
            const pool = stage.enemyPool;
            const total = Object.values(pool).reduce((a, b) => a + b, 0);
            const roll = Math.random() * total;
            let cum = 0, type = Object.keys(pool)[0];
            for (const [t, w] of Object.entries(pool)) {
                cum += w;
                if (roll < cum) {
                    type = t;
                    break;
                }
            }
            const base = CFG.enemies[type];
            const e = this.enemies.find(e => !e.active);
            if (!e) return;

            // Spawn off-edge
            const side = Math.random();
            if (side < 0.5) {
                e.x = Math.random() * this.W;
                e.y = -20;
            } else if (side < 0.75) {
                e.x = -20;
                e.y = Math.random() * this.H * 0.5;
            } else {
                e.x = this.W + 20;
                e.y = Math.random() * this.H * 0.5;
            }

            const hpMult = (this.endlessMode ? this.endlessMultiplier : 1) * stage.hpMult * BALANCE.enemyHpMult;
            const spdMult = stage.spdMult * (this.milestonesCompleted.stage3 ? 0.95 : 1) * BALANCE.enemySpeedMult;

            e.active = true;
            e.type = type;
            e.emoji = base.emoji;
            e.hp = Math.ceil(base.hp * hpMult);
            e.maxHp = e.hp;
            e.speed = base.speed * spdMult;
            e.size = base.size;
            e.gold = base.gold;
            e.lastSwingHit = -1;
            e.frozen = 0;
            e.phasing = base.phasing || false;
            e.phaseTimer = base.phasing ? base.phaseOff : 0;
            e.phaseVisible = true;
            e.pattern = base.pattern || "direct";
            e.patternTimer = Math.random() * 1.5;
            e.wobbleAmp = base.wobbleAmp || 50;
            e.wobblePeriod = base.wobblePeriod || 1.5;
            e.zigzagInterval = base.zigzagInterval || 0.6;
            e.hopInterval = base.hopInterval || 1.0;
            e.chargeInterval = base.chargeInterval || 2.0;
            e.orbitRadius = base.orbitRadius || 100;
            e.teleportInterval = base.teleportInterval || 3;
            e.onDeath = base.onDeath || null;
            e.isBoss = false;
            e.bossData = null;
            e.baseX = e.x;
        }

        startBoss() {
            const stage = CFG.stages[this.currentStage];
            const b = stage.boss;
            const e = this.enemies.find(e => !e.active);
            if (!e) return;
            this.bossActive = true;
            this.state = 'BOSS';
            this.sound.play('bossAppear');
            let bossHp = Math.floor(b.hp * BALANCE.bossHpMult);
            if (this.milestonesCompleted.boss10) bossHp = Math.floor(bossHp * 0.9);
            e.active = true;
            e.isBoss = true;
            e.emoji = b.emoji;
            e.hp = bossHp;
            e.maxHp = bossHp;
            e.speed = b.speed;
            e.size = b.size;
            e.gold = stage.bossGoldBase * (this.currentStage + 1);
            e.x = this.W / 2;
            e.y = -50;
            e.lastSwingHit = -1;
            e.frozen = 0;
            e.phasing = false;
            e.phaseVisible = true;
            e.pattern = "direct";
            e.patternTimer = 0;
            e.onDeath = null;
            e.bossData = {
                ...b,
                charging: false,
                chargeTimer: 0,
                summonTimer: 0,
                teleportTimer: 0,
                sweepDir: 1,
                chargeSpeed: b.chargeSpeed || b.speed * 2
            };
            this.boss = e;
        }

        updateBoss(e, dt) {
            const bd = e.bossData;
            if (!bd) return;
            switch (bd.behavior) {
                case 'charge':
                    bd.chargeTimer += dt;
                    if (!bd.charging && bd.chargeTimer >= (bd.chargeInterval || 8)) {
                        bd.charging = true;
                        bd.chargeTimer = 0;
                    }
                    if (bd.charging && bd.chargeTimer >= (bd.chargeDuration || 2)) {
                        bd.charging = false;
                        bd.chargeTimer = 0;
                    }
                    break;
                case 'sweepSummon':
                    e.x += bd.sweepDir * 80 * dt;
                    if (e.x > this.W - 40) bd.sweepDir = -1;
                    if (e.x < 40) bd.sweepDir = 1;
                    bd.summonTimer += dt;
                    if (bd.summonTimer >= (bd.summonInterval || 6)) {
                        bd.summonTimer = 0;
                        for (let i = 0; i < (bd.summonCount || 3); i++)
                            this.spawnBossMinion(e, bd.summonType || 'bat');
                    }
                    break;
                case 'chargePatrol':
                    bd.chargeTimer = (bd.chargeTimer || 0) + dt;
                    if (!bd.charging && bd.chargeTimer >= (bd.chargeCooldown || 4)) {
                        bd.charging = true;
                        bd.chargeTimer = 0;
                        bd.chargeSpeed = 220;
                    }
                    if (bd.charging && bd.chargeTimer >= (bd.chargeDuration || 1)) {
                        bd.charging = false;
                        bd.chargeTimer = 0;
                    }
                    bd.summonTimer = (bd.summonTimer || 0) + dt;
                    if (bd.summonTimer >= (bd.summonInterval || 10)) {
                        bd.summonTimer = 0;
                        for (let i = 0; i < (bd.summonCount || 2); i++)
                            this.spawnBossMinion(e, bd.summonType || 'shard');
                    }
                    break;
                case 'teleportSummon':
                    bd.teleportTimer = (bd.teleportTimer || 0) + dt;
                    if (bd.teleportTimer >= (bd.teleportInterval || 5)) {
                        bd.teleportTimer = 0;
                        e.x = 60 + Math.random() * (this.W - 120);
                        e.y = 60 + Math.random() * (this.H * 0.4);
                        for (let i = 0; i < (bd.summonCount || 4); i++)
                            this.spawnBossMinion(e, bd.summonType || 'firesprite');
                    }
                    break;
                case 'combined':
                    bd.chargeTimer = (bd.chargeTimer || 0) + dt;
                    bd.teleportTimer = (bd.teleportTimer || 0) + dt;
                    bd.summonTimer = (bd.summonTimer || 0) + dt;
                    if (!bd.charging && bd.chargeTimer >= (bd.chargeInterval || 6)) {
                        bd.charging = true;
                        bd.chargeTimer = 0;
                        bd.chargeSpeed = e.speed * 3;
                    }
                    if (bd.charging && bd.chargeTimer >= 1.5) {
                        bd.charging = false;
                        bd.chargeTimer = 0;
                    }
                    if (bd.teleportTimer >= (bd.teleportInterval || 8)) {
                        bd.teleportTimer = 0;
                        e.x = 60 + Math.random() * (this.W - 120);
                        e.y = 60 + Math.random() * (this.H * 0.3);
                    }
                    if (bd.summonTimer >= (bd.summonInterval || 10)) {
                        bd.summonTimer = 0;
                        const types = ['phase', 'eye', 'voidling', 'reaper'];
                        for (let i = 0; i < (bd.summonCount || 2); i++) {
                            const t = types[Math.floor(Math.random() * types.length)];
                            this.spawnBossMinion(e, t);
                        }
                    }
                    break;
            }
            const dh = Math.hypot(e.x - this.heartX, e.y - this.heartYPos);
            if (dh < 40) {
                this.damageHeart(null);
                e.y = Math.min(e.y, this.heartYPos - 60);
            }
        }

        spawnBossMinion(boss, type) {
            const base = CFG.enemies[type] || CFG.enemies.bug;
            const e = this.enemies.find(e => !e.active);
            if (!e) return;
            const stage = CFG.stages[this.endlessMode ? 4 : this.currentStage];
            e.active = true;
            e.type = type;
            e.emoji = base.emoji;
            e.hp = Math.ceil(base.hp * stage.hpMult * BALANCE.enemyHpMult);
            e.maxHp = e.hp;
            e.speed = base.speed * 1.3 * BALANCE.enemySpeedMult;
            e.size = base.size;
            e.gold = base.gold;
            e.x = boss.x + (Math.random() - 0.5) * 60;
            e.y = boss.y + (Math.random() - 0.5) * 40;
            e.lastSwingHit = -1;
            e.frozen = 0;
            e.phasing = base.phasing || false;
            e.phaseTimer = base.phasing ? base.phaseOff : 0;
            e.phaseVisible = true;
            e.pattern = base.pattern || "direct";
            e.patternTimer = 0;
            e.wobbleAmp = base.wobbleAmp || 50;
            e.wobblePeriod = base.wobblePeriod || 1.5;
            e.zigzagInterval = base.zigzagInterval || 0.6;
            e.hopInterval = base.hopInterval || 1.0;
            e.chargeInterval = base.chargeInterval || 2.0;
            e.orbitRadius = base.orbitRadius || 100;
            e.teleportInterval = base.teleportInterval || 3;
            e.onDeath = base.onDeath || null;
            e.isBoss = false;
            e.bossData = null;
        }

        damageHeart(enemy) {
            if (this.invulnTimer > 0) return;
            let dmg = 1;
            if (this.hasSynergy(5)) dmg = Math.max(1, Math.ceil(dmg * 0.5));
            this.hp -= dmg;
            this.shakeTimer = 0.2;
            this.redFlash = 0.1;
            this.heartPulse = 0.3;
            this.sound.play('heartDmg');
            if (this.hp <= 0) {
                const swLevel = this.starLevels.secondWind || 0;
                const maxWinds = swLevel >= 1 ? (swLevel >= 2 ? 2 : 1) : 0;
                if (this.secondWindsUsed < maxWinds) {
                    this.secondWindsUsed++;
                    this.hp = this.maxHp;
                    this.invulnTimer = swLevel >= 3 ? 3 : 0.5;
                    this.redFlash = 0;
                    for (const e of this.enemies) {
                        if (e.active && !e.isBoss) {
                            e.hp -= 3;
                            if (e.hp <= 0) this.killEnemy(e);
                        }
                    }
                    return;
                }
                this.die();
            }
        }

        die() {
            this.state = 'DEAD';
            this.sound.play('heartDmg');
            this.sound.stopBgm(false);
            this.updatePauseButtonVisibility();
            this.stats.bestSurvivalTime = Math.max(this.stats.bestSurvivalTime, Math.floor(this.runTime));
            let interestBonus = 0;
            const interestLevel = this.upgradeLevels.interest || 0;
            if (interestLevel > 0) {
                const rate = interestLevel * 0.02;
                interestBonus = Math.min(500, Math.floor(this.gold * rate));
                this.gold += interestBonus;
            }
            for (let i = 0; i < 8; i++) {
                this.particles.spawn(this.heartX, this.heartYPos,
                    (Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200,
                    0.8, '💔', 20, 3, 200);
            }
            this.deathStats = {
                time: Math.floor(this.runTime),
                kills: this.runKills,
                gold: this.runGold,
                interest: interestBonus,
                total: this.gold
            };
            this.checkMilestones();
            this.save();
        }

        killEnemy(e) {
            e.active = false;
            this.runKills++;
            this.stats.totalKills++;

            let goldValue = e.gold;
            goldValue *= this.getGoldMult();
            if (this.milestonesCompleted.kill200) goldValue += 1;
            const thLevel = this.upgradeLevels.treasureHunter || 0;
            let isGem = false;
            if (thLevel > 0 && Math.random() < thLevel * 0.04) {
                goldValue *= 3;
                isGem = true;
            }
            if (this.hasSynergy(3) && Math.random() < 0.1) goldValue *= 2;
            goldValue = Math.floor(goldValue);

            if (e.isBoss) {
                let bossGold = e.gold;
                bossGold *= 1 + (this.upgradeLevels.bossBounty || 0) * 0.5;
                if (this.milestonesCompleted.boss5) bossGold *= 1.25;
                bossGold *= this.getGoldMult();
                goldValue = Math.floor(bossGold);

                let starReward = 5 + 5 * (this.currentStage + 1);
                if ((this.starLevels.luckyStars || 0) > 0 && Math.random() < (this.starLevels.luckyStars || 0) * 0.15) starReward *= 2;
                if ((this.starLevels.astralBlessing || 0) > 0) starReward = Math.floor(starReward * (1 + (this.starLevels.astralBlessing || 0) * 0.2));
                this.addStars(starReward);

                this.stats.totalBossKills++;
                this.bossActive = false;
                this.bossDefeated = true;
                this.boss = null;
                this.sound.play('bossDefeat');

                const next = this.currentStage + 1;
                let newlyUnlocked = false;
                if (next < 5 && !this.unlockedStages.includes(next)) {
                    this.unlockedStages.push(next);
                    newlyUnlocked = true;
                    // Schedule auto-jump on next upgrade-screen entry
                    this._pendingAutoStage = next;
                    // First-time hint after second stage unlocks
                    if (next >= 1 && !this.olderStagesNotified) {
                        this.olderStagesNotified = true;
                        this._showOlderStagesNotice = true;
                    }
                }
                this.stats.stagesCleared = Math.max(this.stats.stagesCleared, this.currentStage + 1);
                this.state = 'STAGE_TRANSITION';
                this.sound.stopBgm(false);
                this.updatePauseButtonVisibility();
                this.checkMilestones();
                this.save();
            }

            this.addGold(goldValue);
            this.sound.play('kill');
            const emoji = isGem ? '💎' : '🪙';
            this.particles.spawn(e.x, e.y, 0, 0, CFG.goldArcDuration, emoji, 16, 5, 0, this.W - 40, 20);
            for (let i = 0; i < 3; i++) {
                this.particles.spawn(e.x, e.y,
                    (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100,
                    0.3, e.emoji, e.size * 0.5, 1, 100);
            }

            // Generic onDeath handlers
            if (e.onDeath === 'freeze') {
                for (const other of this.enemies) {
                    if (other.active && Math.hypot(other.x - e.x, other.y - e.y) < 50) other.frozen = 2;
                }
            } else if (e.onDeath === 'freezeAOE') {
                for (const other of this.enemies) {
                    if (other.active && Math.hypot(other.x - e.x, other.y - e.y) < 100) other.frozen = 3;
                }
                for (let i = 0; i < 6; i++) this.particles.spawn(e.x, e.y, (Math.random() - 0.5) * 80, (Math.random() - 0.5) * 80, 0.4, '❄️', 14, 2, 0);
            } else if (e.onDeath === 'explode') {
                this.aoeHit(e.x, e.y, 60, 1);
                for (let i = 0; i < 5; i++) this.particles.spawn(e.x, e.y, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100, 0.4, '🔥', 14, 2, 0);
            }

            if (this.upgradeUnlocked.chainLightning && (this.upgradeLevels.chainLightning || 0) > 0) {
                const lvl = this.upgradeLevels.chainLightning || 0;
                const proc = 0.15 + lvl * 0.05;
                if (Math.random() < proc) this.chainLightning(e.x, e.y, 2 + lvl, 100, 1 * BALANCE.abilityDamageMult);
            }
        }

        addGold(amount) {
            this.gold += amount;
            this.runGold += amount;
            this.stats.totalGoldEarned += amount;
            this.goldScaleTimer = 0.2;
            this.sound.play('gold');
        }

        addStars(amount) {
            if ((this.starLevels.astralBlessing || 0) > 0)
                amount = Math.floor(amount * (1 + (this.starLevels.astralBlessing || 0) * 0.2));
            this.stars += amount;
        }

        aoeHit(x, y, radius, damage) {
            const d = damage * BALANCE.abilityDamageMult;
            for (const e of this.enemies) {
                if (!e.active || (e.phasing && !e.phaseVisible)) continue;
                if (Math.hypot(e.x - x, e.y - y) < radius) {
                    e.hp -= d;
                    this.particles.spawnText(e.x, e.y - e.size / 2, `${Math.round(d)}`, '#ffaa00', 13);
                    if (e.hp <= 0) this.killEnemy(e);
                }
            }
        }

        chainLightning(x, y, chains, range, dmg) {
            let cx = x, cy = y;
            const hit = new Set();
            this.sound.play('ability');
            for (let i = 0; i < chains; i++) {
                let closest = null, closestD = range;
                for (const e of this.enemies) {
                    if (!e.active || hit.has(e) || (e.phasing && !e.phaseVisible)) continue;
                    const d = Math.hypot(e.x - cx, e.y - cy);
                    if (d < closestD) {
                        closest = e;
                        closestD = d;
                    }
                }
                if (!closest) break;
                hit.add(closest);
                this.particles.spawnText((cx + closest.x) / 2, (cy + closest.y) / 2, '⚡', '#ffff00', 16, 0.2);
                closest.hp -= dmg;
                if (closest.hp <= 0) this.killEnemy(closest);
                if (this.hasSynergy(4)) this.aoeHit(closest.x, closest.y, 30, 1);
                cx = closest.x;
                cy = closest.y;
            }
        }

        updateAbilities(dt) {
            const cdMult = this.getCooldownMult();

            // Energy Burst
            if (this.upgradeUnlocked.energyBurst && (this.upgradeLevels.energyBurst || 0) > 0) {
                const lvl = this.upgradeLevels.energyBurst || 0;
                const interval = Math.max(6, 12 - (lvl - 1) * 1.5) * cdMult;
                this.abilityTimers.energyBurst = (this.abilityTimers.energyBurst || 0) + dt;
                if (this.abilityTimers.energyBurst >= interval) {
                    this.abilityTimers.energyBurst = 0;
                    let bestX = this.cursorX, bestY = this.cursorY, bestCount = 0;
                    for (const e of this.enemies) {
                        if (!e.active) continue;
                        let count = 0;
                        for (const e2 of this.enemies) {
                            if (e2.active && Math.hypot(e.x - e2.x, e.y - e2.y) < 80) count++;
                        }
                        if (count > bestCount) {
                            bestCount = count;
                            bestX = e.x;
                            bestY = e.y;
                        }
                    }
                    const radius = 60 + lvl * 20;
                    this.aoeHit(bestX, bestY, radius, 2);
                    this.sound.play('ability');
                    for (let i = 0; i < 6; i++) {
                        const a = Math.PI * 2 * i / 6;
                        this.particles.spawn(bestX, bestY, Math.cos(a) * 80, Math.sin(a) * 80, 0.4, '💥', 14, 2, 0);
                    }
                }
            }

            // Orbiting Swords
            if (this.upgradeUnlocked.orbitSwords && (this.upgradeLevels.orbitSwords || 0) > 0) {
                const count = 1 + (this.upgradeLevels.orbitSwords || 0);
                this.orbitAngle += dt * Math.PI;
                const orbitR = 55;
                for (let i = 0; i < count; i++) {
                    const a = this.orbitAngle + (Math.PI * 2 * i / count);
                    const sx = this.cursorX + Math.cos(a) * orbitR;
                    const sy = this.cursorY + Math.sin(a) * orbitR;
                    for (const e of this.enemies) {
                        if (!e.active || (e.phasing && !e.phaseVisible)) continue;
                        if (Math.hypot(sx - e.x, sy - e.y) < e.size) {
                            if ((e._swordHitTimer || 0) <= 0) {
                                e.hp -= 1 * BALANCE.abilityDamageMult;
                                e._swordHitTimer = 0.5;
                                if (this.hasSynergy(1)) e.frozen = 1;
                                if (e.hp <= 0) this.killEnemy(e);
                            }
                        }
                        if (e._swordHitTimer > 0) e._swordHitTimer -= dt;
                    }
                }
            }

            // Vortex Pull
            if (this.upgradeUnlocked.vortexPull && (this.upgradeLevels.vortexPull || 0) > 0 && !this.disabledUpgrades.vortexPull) {
                const lvl = this.upgradeLevels.vortexPull || 0;
                const interval = Math.max(5, 10 - lvl) * cdMult;
                if (!this.vortexActive) {
                    this.vortexCooldownTimer += dt;
                    if (this.vortexCooldownTimer >= interval) {
                        this.vortexActive = true;
                        this.vortexTimer = 1.5;
                        this.vortexCooldownTimer = 0;
                    }
                } else {
                    this.vortexTimer -= dt;
                    if (this.vortexTimer <= 0) this.vortexActive = false;
                }
            } else if (this.disabledUpgrades.vortexPull) {
                this.vortexActive = false;
            }

            // Meteor Strike
            if (this.upgradeUnlocked.meteorStrike && (this.upgradeLevels.meteorStrike || 0) > 0) {
                const lvl = this.upgradeLevels.meteorStrike || 0;
                const interval = Math.max(10, 20 - (lvl - 1) * 2) * cdMult;
                this.abilityTimers.meteorStrike = (this.abilityTimers.meteorStrike || 0) + dt;
                if (this.abilityTimers.meteorStrike >= interval) {
                    this.abilityTimers.meteorStrike = 0;
                    let bestX = this.W / 2, bestY = this.H / 2, bestCount = 0;
                    for (const e of this.enemies) {
                        if (!e.active) continue;
                        let c = 0;
                        for (const e2 of this.enemies) {
                            if (e2.active && Math.hypot(e.x - e2.x, e.y - e2.y) < 70) c++;
                        }
                        if (c > bestCount) {
                            bestCount = c;
                            bestX = e.x;
                            bestY = e.y;
                        }
                    }
                    const dmg = 5 + (lvl - 1) * 2;
                    this.aoeHit(bestX, bestY, 70, dmg);
                    this.sound.play('ability');
                    this.shakeTimer = 0.15;
                    this.particles.spawn(bestX, bestY - 200, 0, 300, 0.5, '☄️', 32, 3, 0);
                    for (let i = 0; i < 8; i++) {
                        const a = Math.PI * 2 * i / 8;
                        this.particles.spawn(bestX, bestY, Math.cos(a) * 60, Math.sin(a) * 60, 0.4, '🔥', 12, 2, 0);
                    }
                    if (this.hasSynergy(9) && Math.random() < 0.3) this.addGold(10 * (this.currentStage + 1));
                }
            }

            // Decoy Heart
            if (this.upgradeUnlocked.decoyHeart && (this.upgradeLevels.decoyHeart || 0) > 0) {
                const lvl = this.upgradeLevels.decoyHeart || 0;
                const cooldown = Math.max(20, 30 - lvl * 2) * cdMult;
                const duration = 5 + lvl;
                if (this.decoyActive) {
                    this.decoyTimer -= dt;
                    if (this.decoyTimer <= 0) {
                        this.decoyActive = false;
                        this.abilityTimers.decoyHeart = 0;
                        if ((this.starLevels.abilityEvolution || 0) >= 2 && lvl >= CFG.goldUpgrades.find(u => u.id === 'decoyHeart').max)
                            this.aoeHit(this.decoyX, this.decoyY, 80, 5);
                        this.particles.spawn(this.decoyX, this.decoyY, 0, 0, 0.3, '💜', 24, 2, 0);
                    }
                } else {
                    this.abilityTimers.decoyHeart = (this.abilityTimers.decoyHeart || 0) + dt;
                    if (this.abilityTimers.decoyHeart >= cooldown) {
                        this.decoyActive = true;
                        this.decoyTimer = duration;
                        this.decoyX = this.W * (0.2 + Math.random() * 0.6);
                        this.decoyY = this.H * (0.3 + Math.random() * 0.3);
                    }
                }
            }
        }

        checkMilestones() {
            CFG.milestones.forEach(m => {
                if (this.milestonesCompleted[m.id]) return;
                const val = this.stats[m.stat] || 0;
                if (val >= m.threshold) {
                    this.milestonesCompleted[m.id] = true;
                    this.showToast(`🏆 ${m.name}: ${m.reward}`);
                    this.sound.play('milestone');
                    if (m.reward.includes('⭐×')) {
                        const match = m.reward.match(/⭐×(\d+)/);
                        if (match) this.stars += parseInt(match[1]);
                    }
                    if (m.id === 'gold10000') this.costReduction = 0.1;
                    this.save();
                }
            });
        }

        // ============================================================
        // RENDER
        // ============================================================
        _roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        render() {
            const ctx = this.ctx;
            const W = this.W, H = this.H;
            ctx.save();
            if (this.shakeTimer > 0) ctx.translate(this.shakeX, this.shakeY);

            const stageIdx = this.endlessMode ? 4 : this.currentStage;
            const bgColor = this.state === 'MENU' ? '#08080e' : (CFG.stages[stageIdx] ? CFG.stages[stageIdx].bg : '#08080e');
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, W, H);

            if (this.state !== 'MENU' && this.state !== 'UPGRADING') {
                const bgGrad = ctx.createRadialGradient(W / 2, H * 0.92, 30, W / 2, H * 0.5, Math.max(W, H) * 0.8);
                bgGrad.addColorStop(0, 'rgba(255,180,100,0.06)');
                bgGrad.addColorStop(0.3, 'rgba(255,100,80,0.02)');
                bgGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);
            }

            const vig = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.4, W / 2, H / 2, Math.max(W, H) * 0.78);
            vig.addColorStop(0, 'rgba(0,0,0,0)');
            vig.addColorStop(1, 'rgba(0,0,0,0.35)');
            ctx.fillStyle = vig;
            ctx.fillRect(0, 0, W, H);

            if (this.redFlash > 0) {
                ctx.fillStyle = `rgba(180,0,0,${this.redFlash * 4})`;
                ctx.fillRect(0, 0, W, H);
            }

            if (this.state === 'MENU') {
                this.renderMenu(ctx, W, H);
                ctx.restore();
                return;
            }
            if (this.state === 'UPGRADING') {
                ctx.restore();
                return;
            }

            // Ambient — layered so the world reads as horizon → ground → floating elements.
            // Subtle ground gradient gives the play field a sense of depth.
            const groundY = H * 0.55;
            const groundGrad = ctx.createLinearGradient(0, groundY, 0, H);
            groundGrad.addColorStop(0, 'rgba(0,0,0,0)');
            groundGrad.addColorStop(1, 'rgba(0,0,0,0.20)');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, groundY, W, H - groundY);
            // Faint horizon line.
            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(W, groundY);
            ctx.stroke();

            const tNow = Date.now() / 1000;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (const a of this.ambientEmojis) {
                ctx.globalAlpha = a.alpha;
                ctx.font = `${a.size}px serif`;
                let drawX = a.x, drawY = a.y;
                if (a.layer === 'floating') {
                    // Slow horizontal drift with wrap, plus gentle vertical sway.
                    const span = W + 120;
                    drawX = ((a.x + (a.drift || 0) * tNow) % span + span) % span - 60;
                    drawY = a.y + Math.cos(tNow * (a.swaySpd || 0.6) + a.sway) * 4;
                } else if (a.layer === 'ground') {
                    drawX = a.x + Math.sin(tNow * (a.swaySpd || 0.3) + a.sway) * 1.5;
                }
                ctx.fillText(a.emoji, drawX, drawY);
            }
            ctx.globalAlpha = 1;

            // Wall
            if (this.wallMaxHp > 0) {
                const wallY = this.heartYPos - CFG.wallYOffset;
                const wallW = W * CFG.wallWidthRatio;
                const wallL = W / 2 - wallW / 2;
                const bricks = Math.ceil(wallW / 30);
                ctx.font = '20px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.globalAlpha = this.wallHp > 0 ? 0.8 : 0.2;
                for (let i = 0; i < bricks; i++) ctx.fillText('🧱', wallL + i * 30 + 15, wallY);
                ctx.globalAlpha = 1;
                if (this.wallHp > 0) {
                    const barW = wallW, barH = 4;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(wallL, wallY + 14, barW, barH);
                    const wallGrad = ctx.createLinearGradient(wallL, 0, wallL + barW * (this.wallHp / this.wallMaxHp), 0);
                    wallGrad.addColorStop(0, '#44aa44');
                    wallGrad.addColorStop(1, '#66cc66');
                    ctx.fillStyle = wallGrad;
                    ctx.fillRect(wallL, wallY + 14, barW * (this.wallHp / this.wallMaxHp), barH);
                }
            }

            // Shield
            if (this.shieldActive) {
                const sa = Date.now() / 500;
                const shieldAlpha = 0.25 + Math.sin(sa * 2) * 0.1;
                ctx.strokeStyle = `rgba(100,150,255,${shieldAlpha})`;
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(this.heartX, this.heartYPos, 80, 0, Math.PI * 2);
                ctx.stroke();
                ctx.strokeStyle = `rgba(100,150,255,${shieldAlpha * 0.4})`;
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.arc(this.heartX, this.heartYPos, 80, 0, Math.PI * 2);
                ctx.stroke();
                ctx.font = '20px serif';
                ctx.fillText('🛡️', this.heartX + Math.cos(sa) * 70, this.heartYPos + Math.sin(sa) * 70);
            }

            // Decoy
            if (this.decoyActive) {
                ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 200) * 0.2;
                ctx.font = '32px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💜', this.decoyX, this.decoyY);
                ctx.globalAlpha = 1;
            }

            // Enemies
            ctx.globalAlpha = 1;
            for (const e of this.enemies) {
                if (!e.active || e.isBoss) continue;
                const isPhaseHidden = e.phasing && !e.phaseVisible;
                ctx.globalAlpha = isPhaseHidden ? 0.2 : 1;
                if (!isPhaseHidden) {
                    ctx.fillStyle = 'rgba(0,0,0,0.25)';
                    ctx.beginPath();
                    ctx.ellipse(e.x, e.y + e.size * 0.4, e.size * 0.4, e.size * 0.15, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                if (e.frozen > 0) {
                    ctx.fillStyle = 'rgba(100,150,255,0.25)';
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.size * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = '#fff';
                ctx.font = `${e.size}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(e.emoji, e.x, e.y);
                if (e.hp < e.maxHp) {
                    const bw = e.size + 4, bh = 4;
                    const bx = e.x - bw / 2, by = e.y - e.size / 2 - 10;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    this._roundRect(ctx, bx - 1, by - 1, bw + 2, bh + 2, 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255,50,50,0.25)';
                    this._roundRect(ctx, bx, by, bw, bh, 1.5);
                    ctx.fill();
                    const hpGrad = ctx.createLinearGradient(bx, 0, bx + bw * Math.max(0, e.hp / e.maxHp), 0);
                    hpGrad.addColorStop(0, '#ff4444');
                    hpGrad.addColorStop(1, '#ff6666');
                    ctx.fillStyle = hpGrad;
                    this._roundRect(ctx, bx, by, bw * Math.max(0, e.hp / e.maxHp), bh, 1.5);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            // Boss
            if (this.boss && this.boss.active) {
                const b = this.boss;
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(b.x, b.y + b.size * 0.45, b.size * 0.5, b.size * 0.18, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.save();
                ctx.shadowColor = 'rgba(255,50,50,0.4)';
                ctx.shadowBlur = 20;
                ctx.font = `${b.size}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(b.emoji, b.x, b.y);
                ctx.restore();

                const barX = 20, barY = 16, barW = W - 40, barH = 14;
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                this._roundRect(ctx, barX - 2, barY - 2, barW + 4, barH + 4, 5);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,0,0,0.15)';
                this._roundRect(ctx, barX, barY, barW, barH, 4);
                ctx.fill();
                const hpRatio = Math.max(0, b.hp / b.maxHp);
                const bossGrad = ctx.createLinearGradient(barX, 0, barX + barW * hpRatio, 0);
                bossGrad.addColorStop(0, hpRatio < 0.3 ? '#ff4400' : '#cc2222');
                bossGrad.addColorStop(1, hpRatio < 0.3 ? '#ff8800' : '#ff4444');
                ctx.fillStyle = bossGrad;
                this._roundRect(ctx, barX, barY, barW * hpRatio, barH, 4);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                this._roundRect(ctx, barX, barY, barW * hpRatio, barH / 2, 4);
                ctx.fill();

                ctx.font = 'bold 13px sans-serif';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${b.bossData.name} — ${Math.ceil(b.hp)}/${b.maxHp}`, W / 2, barY + barH + 14);
            }

            // Heart — visual heartbeat pulse synced with the audio thump.
            // Use time since last beat so the lub-DUB visual stays aligned with the audio
            // regardless of current BPM.
            const tSinceBeat = this.heartbeatLastBeat >= 0 ? Math.max(0, this.runTime - this.heartbeatLastBeat) : 999;
            const lub = Math.exp(-Math.pow(tSinceBeat * 9, 2));
            const dub = Math.exp(-Math.pow((tSinceBeat - 0.12) * 9, 2)) * 0.55;
            const beatScale = 1 + 0.18 * (lub + dub);
            const dmgScale = this.heartPulse > 0 ? 1 + 0.3 * (this.heartPulse / 0.3) : 1;
            const heartScale = Math.max(beatScale, dmgScale);
            const hs = CFG.heartSize * heartScale;
            ctx.save();
            // Glow pulses with the heartbeat — brighter when low HP.
            const hpRatio = this.maxHp > 0 ? this.hp / this.maxHp : 1;
            const glowPulse = 18 + (lub + dub) * 14 + (1 - hpRatio) * 8;
            ctx.shadowColor = `rgba(255,60,90,${0.5 + (1 - hpRatio) * 0.3})`;
            ctx.shadowBlur = glowPulse;
            ctx.font = `${hs}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('❤️', this.heartX, this.heartYPos);
            ctx.restore();

            ctx.font = '18px serif';
            ctx.textAlign = 'center';
            let hpStr = '';
            for (let i = 0; i < this.maxHp; i++) hpStr += i < this.hp ? '❤️' : '🖤';
            ctx.fillText(hpStr, this.heartX, this.heartYPos + 30);

            // Cursor trail
            const now = Date.now();
            for (let i = 0; i < this.cursorTrail.length - 1; i++) {
                const trail = this.cursorTrail[i];
                const age = (now - trail.t) / 120;
                if (age > 1) continue;
                ctx.globalAlpha = 0.12 * (1 - age);
                ctx.font = `${CFG.cursorSize * 0.6}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⚔️', trail.x, trail.y);
            }
            ctx.globalAlpha = 1;

            // Cursor
            const atkR = this.getAttackRadius();

            // Attack radius ring (around effective sword position)
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.arc(this.effectiveCursorX, this.effectiveCursorY, atkR, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Auto-Swing trail indicator: small dotted line showing oscillation range
            const autoSwingActive = (this.upgradeLevels.autoSwing || 0) > 0 && !this.disabledUpgrades.autoSwing;
            if (autoSwingActive) {
                const lvl = this.upgradeLevels.autoSwing;
                const amp = 20 + lvl * 5;
                ctx.strokeStyle = 'rgba(180,200,255,0.18)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([2, 4]);
                ctx.beginPath();
                ctx.moveTo(this.cursorX - amp, this.cursorY);
                ctx.lineTo(this.cursorX + amp, this.cursorY);
                ctx.stroke();
                ctx.setLineDash([]);

                // Real mouse position dot — helps players keep track of where their cursor truly is
                // while the sword auto-oscillates around it.
                ctx.fillStyle = 'rgba(255,255,255,0.92)';
                ctx.beginPath();
                ctx.arc(this.cursorX, this.cursorY, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.45)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(this.cursorX, this.cursorY, 2.5, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Orbiting swords (around real cursor — keeps user control intuitive)
            if (this.upgradeUnlocked.orbitSwords && (this.upgradeLevels.orbitSwords || 0) > 0) {
                const count = 1 + (this.upgradeLevels.orbitSwords || 0);
                ctx.font = '20px serif';
                for (let i = 0; i < count; i++) {
                    const a = this.orbitAngle + (Math.PI * 2 * i / count);
                    ctx.fillText('🗡️', this.cursorX + Math.cos(a) * 55, this.cursorY + Math.sin(a) * 55);
                }
            }

            // Sword (rendered at effective position)
            ctx.save();
            ctx.shadowColor = 'rgba(200,200,255,0.3)';
            ctx.shadowBlur = 12;
            ctx.font = `${CFG.cursorSize}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚔️', this.effectiveCursorX, this.effectiveCursorY);
            ctx.restore();

            // Vortex ring
            if (this.vortexActive) {
                const vr = 80 + (this.upgradeLevels.vortexPull || 0) * 15;
                const va = 0.2 + Math.sin(Date.now() / 200) * 0.1;
                ctx.strokeStyle = `rgba(150,100,255,${va})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.effectiveCursorX, this.effectiveCursorY, vr, 0, Math.PI * 2);
                ctx.stroke();
            }

            this.particles.render(ctx);
            this.renderHUD(ctx, W, H);

            // Tutorial
            if (this.showTutorial) {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0, 0, W, H);
                const pw = Math.min(400, W - 40), ph = 200, px = (W - pw) / 2, py = (H - ph) / 2;
                ctx.fillStyle = 'rgba(16,16,28,0.95)';
                this._roundRect(ctx, px, py, pw, ph, 14);
                ctx.fill();
                ctx.strokeStyle = 'rgba(91,184,154,0.3)';
                ctx.lineWidth = 1;
                this._roundRect(ctx, px, py, pw, ph, 14);
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = 'bold 22px Cinzel,Georgia,serif';
                ctx.fillText('⚔️ Defend the Heart! ❤️', W / 2, py + 50);
                ctx.font = '15px sans-serif';
                ctx.fillStyle = '#aaa';
                ctx.fillText('Swipe through enemies to destroy them.', W / 2, py + 90);
                ctx.fillText('Change direction quickly to attack faster!', W / 2, py + 115);
                ctx.font = 'bold 16px sans-serif';
                ctx.fillStyle = '#5bb89a';
                ctx.fillText('[ Tap to Begin ]', W / 2, py + 160);
            }

            if (this.state === 'DEAD') {
                ctx.fillStyle = 'rgba(0,0,0,0.88)';
                ctx.fillRect(0, 0, W, H);
                const pw = Math.min(380, W - 32), ph = this.deathStats.interest > 0 ? 290 : 260, px = (W - pw) / 2,
                    py = (H - ph) / 2;
                const panelGrad = ctx.createLinearGradient(px, py, px, py + ph);
                panelGrad.addColorStop(0, '#1c1828');
                panelGrad.addColorStop(1, '#12111f');
                ctx.fillStyle = panelGrad;
                this._roundRect(ctx, px, py, pw, ph, 14);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,60,60,0.25)';
                ctx.lineWidth = 1;
                this._roundRect(ctx, px, py, pw, ph, 14);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(px + 30, py);
                ctx.lineTo(px + pw - 30, py);
                ctx.strokeStyle = 'rgba(255,60,60,0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.textAlign = 'center';
                ctx.font = 'bold 26px Cinzel,Georgia,serif';
                ctx.save();
                ctx.shadowColor = 'rgba(255,60,60,0.4)';
                ctx.shadowBlur = 16;
                ctx.fillStyle = '#ff4444';
                ctx.fillText('💔 You Fell!', W / 2, py + 45);
                ctx.restore();
                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(px + 24, py + 65);
                ctx.lineTo(px + pw - 24, py + 65);
                ctx.stroke();
                ctx.font = '14px sans-serif';
                ctx.fillStyle = '#888';
                let sy = py + 92;
                ctx.fillText(`⏱ Survived: ${this.deathStats.time}s`, W / 2, sy);
                sy += 28;
                ctx.fillText(`🔪 Enemies defeated: ${this.deathStats.kills}`, W / 2, sy);
                sy += 28;
                ctx.fillStyle = '#cc9900';
                ctx.fillText(`🪙 Gold earned: ${this.deathStats.gold}`, W / 2, sy);
                sy += 28;
                if (this.deathStats.interest > 0) {
                    ctx.fillText(`📈 Interest: ${this.deathStats.interest}`, W / 2, sy);
                    sy += 28;
                }
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px sans-serif';
                ctx.fillText(`Total: 🪙 ${this.deathStats.total}`, W / 2, sy);
                const ctaAlpha = 0.4 + Math.sin(Date.now() / 500) * 0.3;
                ctx.globalAlpha = ctaAlpha;
                ctx.font = 'bold 15px sans-serif';
                ctx.fillStyle = '#5bb89a';
                ctx.fillText('[ Tap to Upgrade & Retry ]', W / 2, py + ph - 22);
                ctx.globalAlpha = 1;
            }

            if (this.state === 'STAGE_TRANSITION') {
                ctx.fillStyle = 'rgba(0,0,0,0.88)';
                ctx.fillRect(0, 0, W, H);
                const pw = Math.min(380, W - 32), ph = 180, px = (W - pw) / 2, py = (H - ph) / 2;
                const panelGrad = ctx.createLinearGradient(px, py, px, py + ph);
                panelGrad.addColorStop(0, '#1c1820');
                panelGrad.addColorStop(1, '#14121a');
                ctx.fillStyle = panelGrad;
                this._roundRect(ctx, px, py, pw, ph, 14);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,221,68,0.25)';
                ctx.lineWidth = 1;
                this._roundRect(ctx, px, py, pw, ph, 14);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(px + 30, py);
                ctx.lineTo(px + pw - 30, py);
                ctx.strokeStyle = 'rgba(255,221,68,0.35)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.textAlign = 'center';
                ctx.save();
                ctx.shadowColor = 'rgba(255,221,68,0.4)';
                ctx.shadowBlur = 16;
                ctx.font = 'bold 24px Cinzel,Georgia,serif';
                ctx.fillStyle = '#ffdd44';
                ctx.fillText('⭐ Stage Complete! ⭐', W / 2, py + 50);
                ctx.restore();
                ctx.font = '15px sans-serif';
                ctx.fillStyle = '#999';
                ctx.fillText(`${CFG.stages[this.currentStage].name} cleared!`, W / 2, py + 90);
                const ctaAlpha = 0.4 + Math.sin(Date.now() / 500) * 0.3;
                ctx.globalAlpha = ctaAlpha;
                ctx.font = 'bold 15px sans-serif';
                ctx.fillStyle = '#5bb89a';
                ctx.fillText('[ Tap to Continue ]', W / 2, py + 150);
                ctx.globalAlpha = 1;
            }
            ctx.restore();
        }

        renderMenu(ctx, W, H) {
            const t = Date.now() / 1000;
            const emojis = ['⚔️', '🛡️', '❤️', '🪙', '⭐', '👹', '🔥', '❄️', '💀', '🌟', '🗡️', '💎'];
            for (let i = 0; i < 18; i++) {
                const seed = i * 137.508;
                const x = ((seed * 7.3 + t * 12 * (0.4 + (i % 3) * 0.25)) % (W + 120)) - 60;
                const y = ((seed * 3.7 + t * 8 * (0.3 + (i % 4) * 0.15)) % (H + 120)) - 60;
                ctx.globalAlpha = 0.06 + Math.sin(t * 0.8 + i) * 0.03;
                ctx.font = `${20 + i % 3 * 4}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(emojis[i % emojis.length], x, y);
            }
            ctx.globalAlpha = 1;
            const pulse = 1 + Math.sin(this.menuPulse * 2) * 0.015;
            ctx.save();
            ctx.translate(W / 2, H / 2 - 50);
            ctx.scale(pulse, pulse);
            ctx.font = '900 46px Cinzel,Georgia,serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#5bb89a';
            ctx.shadowBlur = 50;
            ctx.fillStyle = 'rgba(91,184,154,0.15)';
            ctx.fillText('EMOJI HORDE', 0, 0);
            ctx.shadowBlur = 25;
            ctx.fillStyle = 'rgba(91,184,154,0.3)';
            ctx.fillText('EMOJI HORDE', 0, 0);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#e8e8f0';
            ctx.fillText('EMOJI HORDE', 0, 0);
            ctx.restore();
            ctx.font = '14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#555';
            ctx.fillText('A Roguelike Survival Game', W / 2, H / 2 - 2);
            ctx.save();
            ctx.shadowColor = 'rgba(200,200,255,0.2)';
            ctx.shadowBlur = 15;
            ctx.font = '52px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚔️', W / 2, H / 2 + 40);
            ctx.restore();
            const ctaAlpha = 0.35 + Math.sin(this.menuPulse * 3) * 0.3;
            ctx.globalAlpha = ctaAlpha;
            ctx.font = 'bold 18px sans-serif';
            ctx.fillStyle = '#5bb89a';
            ctx.textAlign = 'center';
            ctx.fillText('[ TAP TO START ]', W / 2, H / 2 + 105);
            ctx.globalAlpha = 1;
        }

        renderHUD(ctx, W, H) {
            const stageIdx = this.endlessMode ? 4 : this.currentStage;
            const stage = CFG.stages[stageIdx];
            const stageLabel = this.endlessMode ? `♾️ Endless — ${Math.floor(this.runTime)}s` : `${stage.emoji} ${stage.name}`;
            let enemyInfo = '';
            if (!this.endlessMode && !this.bossActive) enemyInfo = ` ${this.enemiesSpawned}/${stage.totalEnemies} 🔪`;
            const hudText = `${stageLabel}${enemyInfo}`;
            ctx.font = '13px sans-serif';
            const textW = ctx.measureText(hudText).width + 20;
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            this._roundRect(ctx, 8, 8, textW, 30, 6);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 1;
            this._roundRect(ctx, 8, 8, textW, 30, 6);
            ctx.stroke();
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#bbb';
            ctx.font = '13px sans-serif';
            ctx.fillText(hudText, 18, 23);

            const goldText = `🪙 ${this.gold}`;
            ctx.font = 'bold 15px sans-serif';
            ctx.textAlign = 'right';
            const goldW = ctx.measureText(goldText).width + 20;
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            this._roundRect(ctx, W - goldW - 16, 8, goldW + 8, 30, 6);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 1;
            this._roundRect(ctx, W - goldW - 16, 8, goldW + 8, 30, 6);
            ctx.stroke();
            ctx.save();
            ctx.translate(W - 16, 23);
            ctx.scale(this.goldScale, this.goldScale);
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffcc00';
            ctx.font = 'bold 15px sans-serif';
            ctx.fillText(goldText, 0, 0);
            ctx.restore();
        }
    }

    const game = new Game();
</script>
</body>
