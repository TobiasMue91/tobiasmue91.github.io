        _makeEnemy() {
            return {
                active: false,
                x: 0,
                y: 0,
                hp: 1,
                maxHp: 1,
                speed: 60,
                size: 28,
                emoji: '😠',
                gold: 2,
                type: 'grunt',
                lastSwingHit: -1,
                burning: 0,
                burnDmgTimer: 0,
                frozen: 0,
                phasing: false,
                phaseTimer: 0,
                phaseVisible: true,
                wobbleOffset: 0,
                isBoss: false,
                bossData: null,
                baseX: 0
            };
        }

        resize() {
            const dpr = window.devicePixelRatio || 1;
            this.W = window.innerWidth;
            this.H = window.innerHeight;
            this.canvas.width = this.W * dpr;
            this.canvas.height = this.H * dpr;
            this.canvas.style.width = this.W + 'px';
            this.canvas.style.height = this.H + 'px';
            this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            this.heartX = this.W / 2;
            this.heartYPos = this.H * CFG.heartY;
            this.generateAmbient();
        }

        generateAmbient() {
            this.ambientEmojis = [];
            if (this.currentStage >= CFG.stages.length) return;
            const s = CFG.stages[this.endlessMode ? 4 : this.currentStage];
            for (let i = 0; i < 12; i++) {
                this.ambientEmojis.push({
                    emoji: s.ambient[i % s.ambient.length],
                    x: Math.random() * this.W,
                    y: this.H * (0.7 + Math.random() * 0.25),
                    size: 14 + Math.random() * 4,
                    alpha: 0.15 + Math.random() * 0.1
                });
            }
        }

        save() {
            const data = {
                gold: this.gold,
                stars: this.stars,
                upgradeLevels: this.upgradeLevels,
                upgradeUnlocked: this.upgradeUnlocked,
                starLevels: this.starLevels,
                milestonesCompleted: this.milestonesCompleted,
                unlockedStages: this.unlockedStages,
                currentStage: this.currentStage,
                endlessBest: this.endlessBest,
                stats: this.stats,
                costReduction: this.costReduction
            };
            try {
                localStorage.setItem('emojiHorde', JSON.stringify(data));
            } catch (e) {
            }
        }

        loadSave() {
            try {
                const d = JSON.parse(localStorage.getItem('emojiHorde'));
                if (!d) return;
                this.gold = d.gold || 0;
                this.stars = d.stars || 0;
                this.upgradeLevels = d.upgradeLevels || {};
                this.upgradeUnlocked = d.upgradeUnlocked || {};
                this.starLevels = d.starLevels || {};
                this.milestonesCompleted = d.milestonesCompleted || {};
                this.unlockedStages = d.unlockedStages || [0];
                this.currentStage = d.currentStage || 0;
                this.endlessBest = d.endlessBest || 0;
                this.stats = {
                    ...{
                        totalKills: 0,
                        totalBossKills: 0,
                        totalGoldEarned: 0,
                        bestSurvivalTime: 0,
                        stagesCleared: 0
                    }, ...d.stats
                };
                this.costReduction = d.costReduction || 0;
            } catch (e) {
            }
        }

        resetProgress() {
            if (!confirm('Reset ALL progress? This cannot be undone.')) return;
            localStorage.removeItem('emojiHorde');
            location.reload();
        }

        setupInput() {
            window.addEventListener('resize', () => this.resize());
            const updateCursor = (x, y) => {
                this.cursorX = x;
                this.cursorY = y;
                this.inputActive = true;
            };
            this.canvas.addEventListener('mousemove', e => updateCursor(e.clientX, e.clientY));
            this.canvas.addEventListener('mousedown', e => {
                this.sound.init();
                this.inputActive = true;
                updateCursor(e.clientX, e.clientY);
                this.handleClick();
            });
            this.canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                this.sound.init();
                const t = e.touches[0];
                updateCursor(t.clientX, t.clientY);
                this.inputActive = true;
                this.handleClick();
            }, {passive: false});
            this.canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                const t = e.touches[0];
                updateCursor(t.clientX, t.clientY);
            }, {passive: false});
            this.canvas.addEventListener('touchend', e => {
                e.preventDefault();
            }, {passive: false});
        }

        handleClick() {
            if (this.state === 'MENU') {
                this.showUpgradeScreen();
            } else if (this.showTutorial) {
                this.showTutorial = false;
                this.tutorialShown = true;
            } else if (this.state === 'DEAD' || this.state === 'STAGE_TRANSITION') {
                this.showUpgradeScreen();
            }
        }

        setupUI() {
            const tabNames = [{id: 'combat', label: '⚔️ Combat'}, {id: 'defense', label: '🛡️ Defense'}, {
                id: 'economy',
                label: '💰 Economy'
            }, {id: 'abilities', label: '✨ Abilities'}, {id: 'astral', label: '⭐ Astral'}];
            const tabBar = document.getElementById('tabBar');
            tabNames.forEach((t, i) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
                btn.textContent = t.label;
                btn.dataset.tab = t.id;
                btn.onclick = () => {
                    tabBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    this.renderUpgradeCards(t.id);
                };
                tabBar.appendChild(btn);
            });
            document.getElementById('startRunBtn').onclick = () => this.startRun();
            document.getElementById('resetBtn').onclick = () => this.resetProgress();
            document.getElementById('milestoneBtn').onclick = () => this.showMilestones();
            document.getElementById('closeMilestones').onclick = () => document.getElementById('milestonePanel').classList.remove('active');
            this.renderSynergyBar();
        }

        renderSynergyBar() {
            const bar = document.getElementById('synergyBar');
            bar.innerHTML = '';
            this.evaluateSynergies();
            CFG.synergies.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = 'synergy-diamond' + (this.activeSynergies.has(i) ? ' active' : '');
                d.innerHTML = `${s.icon}<div class="synergy-tooltip"><b>${s.name}</b><br>${s.effect}</div>`;
                bar.appendChild(d);
            });
        }

        evaluateSynergies() {
            this.activeSynergies.clear();
            CFG.synergies.forEach((s, i) => {
                let met = true;
                for (const [k, v] of Object.entries(s.cond)) {
                    const isAbility = ['chainLightning', 'energyBurst', 'orbitSwords', 'vortexPull', 'meteorStrike', 'decoyHeart'].includes(k);
                    const isStar = CFG.starUpgrades.find(su => su.id === k);
                    if (isStar) {
                        if ((this.starLevels[k] || 0) < v) {
                            met = false;
                            break;
                        }
                    } else if (isAbility && v === 0) {
                        if (!this.upgradeUnlocked[k]) {
                            met = false;
                            break;
                        }
                    } else {
                        if ((this.upgradeLevels[k] || 0) < v) {
                            met = false;
                            break;
                        }
                    }
                }
                if (met) this.activeSynergies.add(i);
            });
        }

        hasSynergy(index) {
            return this.activeSynergies.has(index);
        }

        getUpgradeCost(u) {
            const level = this.upgradeLevels[u.id] || 0;
            if (level >= u.max) return Infinity;
            let cost = Math.floor(u.base * Math.pow(u.mult, level));
            // Apply BALANCE cost multiplier
            cost = Math.floor(cost * BALANCE.upgradeCostMult);
            if (this.costReduction > 0) cost = Math.floor(cost * (1 - this.costReduction));
            return cost;
        }

        getStarCost(u) {
            const level = this.starLevels[u.id] || 0;
            if (level >= u.max) return Infinity;
            if (u.costBase) return u.costBase[level];
            return u.costPerLevel * (level + 1);
        }

        showUpgradeScreen() {
            this.state = 'UPGRADING';
            document.getElementById('upgradeScreen').classList.add('active');
            this.refreshUpgradeScreen();
        }

        hideUpgradeScreen() {
            document.getElementById('upgradeScreen').classList.remove('active');
        }

        refreshUpgradeScreen() {
            document.getElementById('goldDisplay').querySelector('span').textContent = this.gold;
            document.getElementById('starDisplay').querySelector('span').textContent = this.stars;
            this.renderSynergyBar();
            this.renderStageSelect();
            const activeTab = document.querySelector('.tab-btn.active');
            this.renderUpgradeCards(activeTab ? activeTab.dataset.tab : 'combat');
        }

        renderStageSelect() {
            const sel = document.getElementById('stageSelect');
            sel.innerHTML = '';
            CFG.stages.forEach((s, i) => {
                if (this.unlockedStages.includes(i)) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = `${i + 1}. ${s.emoji} ${s.name}`;
                    if (i === this.currentStage && !this.endlessMode) opt.selected = true;
                    sel.appendChild(opt);
                }
            });
            if (this.milestonesCompleted['stage5']) {
                const opt = document.createElement('option');
                opt.value = 'endless';
                opt.textContent = `♾️ Endless — Best:${this.endlessBest}s`;
                if (this.endlessMode) opt.selected = true;
                sel.appendChild(opt);
            }
            sel.onchange = () => {
                if (sel.value === 'endless') {
                    this.endlessMode = true;
                    this.currentStage = 4;
                } else {
                    this.endlessMode = false;
                    this.currentStage = parseInt(sel.value);
                }
            };
        }

        renderUpgradeCards(tab) {
            const grid = document.getElementById('upgradeGrid');
            grid.innerHTML = '';
            if (tab === 'astral') {
                CFG.starUpgrades.forEach(u => {
                    const level = this.starLevels[u.id] || 0;
                    const maxed = level >= u.max;
                    const cost = maxed ? 0 : this.getStarCost(u);
                    const affordable = !maxed && this.stars >= cost;
                    let locked = false;
                    if (u.requires && (this.upgradeLevels[u.requires] || 0) < 1) locked = true;
                    const card = document.createElement('div');
                    card.className = `upgrade-card star-card ${maxed ? 'maxed' : ''} ${affordable ? 'affordable' : ''} ${locked ? 'locked' : ''}`;
                    card.innerHTML = `<div class="uc-header"><span class="uc-name">${u.emoji} ${u.name}</span><span class="uc-level">Lv.${level}/${u.max}</span></div><div class="uc-desc">${u.desc}</div><button class="uc-btn ${maxed ? 'maxed-btn' : 'star-btn'}" ${!affordable || locked || maxed ? 'disabled' : ''}>${locked ? '🔒 Requires upgrade' : maxed ? 'MAXED' : `⭐ ${cost}`}</button>`;
                    if (!locked && !maxed && affordable) {
                        card.querySelector('.uc-btn').onclick = () => {
                            this.stars -= cost;
                            this.starLevels[u.id] = (this.starLevels[u.id] || 0) + 1;
                            this.sound.play('upgrade');
                            this.save();
                            this.refreshUpgradeScreen();
                        };
                    }
                    grid.appendChild(card);
                });
                return;
            }
            const upgrades = CFG.goldUpgrades.filter(u => u.cat === tab);
            upgrades.forEach(u => {
                const level = this.upgradeLevels[u.id] || 0;
                const unlocked = u.unlock ? this.upgradeUnlocked[u.id] : true;
                const maxed = level >= u.max;
                const cost = unlocked ? this.getUpgradeCost(u) : (u.unlock || 0);
                const affordable = this.gold >= cost;
                let gated = false;
                if (u.gate) {
                    if (!this.milestonesCompleted[u.gate]) gated = true;
                }
                let prereqMet = true;
                if (u.requires) {
                    if ((this.upgradeLevels[u.requires.id] || 0) < u.requires.level) prereqMet = false;
                }
                const card = document.createElement('div');
                let cls = 'upgrade-card';
                if (maxed) cls += ' maxed'; else if (gated || !prereqMet) cls += ' locked'; else if (affordable && unlocked) cls += ' affordable';
                card.className = cls;
                let btnText, btnCls;
                if (gated) {
                    btnText = `🔒 ${u.gate === 'stage1' ? 'Clear Stage 1' : 'Clear Stage 2'}`;
                    btnCls = 'locked-btn';
                } else if (!prereqMet) {
                    btnText = `🔒 Requires ${u.requires.id} Lv.${u.requires.level}`;
                    btnCls = 'locked-btn';
                } else if (!unlocked) {
                    btnText = `🔒 Unlock: 🪙 ${u.unlock}`;
                    btnCls = 'gold-btn';
                } else if (maxed) {
                    btnText = 'MAXED';
                    btnCls = 'maxed-btn';
                } else {
                    btnText = `🪙 ${cost}`;
                    btnCls = 'gold-btn';
                }
                const canBuy = !gated && prereqMet && affordable && !maxed;
                card.innerHTML = `<div class="uc-header"><span class="uc-name">${u.emoji} ${u.name}</span><span class="uc-level">${unlocked ? `Lv.${level}/${u.max}` : '🔒'}</span></div><div class="uc-desc">${u.desc}</div><button class="uc-btn ${btnCls}" ${!canBuy ? 'disabled' : ''}>${btnText}</button>`;
                if (canBuy) {
                    card.querySelector('.uc-btn').onclick = () => {
                        if (!unlocked) {
                            this.gold -= u.unlock;
                            this.upgradeUnlocked[u.id] = true;
                        } else {
                            this.gold -= cost;
                            this.upgradeLevels[u.id] = level + 1;
                        }
                        this.sound.play('upgrade');
                        this.save();
                        this.refreshUpgradeScreen();
                    };
                }
                grid.appendChild(card);
            });
        }

        showMilestones() {
            const panel = document.getElementById('milestonePanel');
            panel.classList.add('active');
            const list = document.getElementById('milestoneList');
            list.innerHTML = '';
            CFG.milestones.forEach(m => {
                const completed = this.milestonesCompleted[m.id];
                const current = this.stats[m.stat] || 0;
                const progress = Math.min(1, current / m.threshold);
                const item = document.createElement('div');
                item.className = 'milestone-item' + (completed ? ' completed' : '');
                item.innerHTML = `<div class="mi-name">${completed ? '🏆' : '○'} ${m.name}</div><div class="mi-desc">${m.stat}: ${current}/${m.threshold} — Reward: ${m.reward}</div>${completed ? '' : `<div class="mi-progress"><div class="mi-progress-fill" style="width:${progress * 100}%"></div></div>`}`;
                list.appendChild(item);
            });
        }

        showToast(text) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = text;
            document.body.appendChild(t);
            requestAnimationFrame(() => t.classList.add('show'));
            setTimeout(() => {
                t.classList.remove('show');
                setTimeout(() => t.remove(), 500);
            }, 3000);
        }

// ---- COMPUTED STATS (BALANCE applied here) ----
        getAttackRadius() {
            let r = CFG.baseAttackRadius + (this.upgradeLevels.atkRadius || 0) * CFG.atkRadiusPerLevel; // uses CFG constant
            r *= Math.pow(1.15, this.starLevels.astralReach || 0);
            if (this.milestonesCompleted.kill2500) r *= 1.1;
            return r;
        }

        getDamage() {
            let d = CFG.baseDamage + (this.upgradeLevels.swingPower || 0);
            d *= Math.pow(1.25, this.starLevels.astralMight || 0);
            if (this.hasSynergy(0)) d *= 1.15;
            if (this.milestonesCompleted.kill1000) d *= 1.05;
            d *= BALANCE.playerDamageMult;          // BALANCE applied
            return d;
        }

        getMaxHp() {
            let hp = CFG.baseHP + (this.upgradeLevels.maxHealth || 0);
            if (this.milestonesCompleted.kill50) hp += 1;
            if (this.milestonesCompleted.surv30) hp += 1;
            hp = Math.floor(hp * Math.pow(1.2, this.starLevels.astralFortitude || 0));
            return hp;
        }

        getGoldMult() {
            let m = 1 + (this.upgradeLevels.goldMult || 0) * 0.2;
            m *= Math.pow(1.3, this.starLevels.astralWealth || 0);
            m *= BALANCE.goldIncomeMult;             // BALANCE applied
            return m;
        }

        getCooldownMult() {
            let m = Math.pow(0.92, this.starLevels.astralTempo || 0);
            if (this.milestonesCompleted.kill10000) m *= 0.9;
            return m;
        }

        getWallMaxHp() {
            let hp = (this.upgradeLevels.fortifyWalls || 0) * 5;
            hp += (this.starLevels.astralWall || 0) * 10;
            if (this.milestonesCompleted.surv60) hp += 5;
            return hp;
        }

// ---- START RUN ----
        startRun() {
            this.hideUpgradeScreen();
            this.state = 'PLAYING';
            this.runTime = 0;
            this.runKills = 0;
            this.runGold = 0;
            this.enemiesSpawned = 0;
            this.spawnTimer = 0;
            this.bossActive = false;
            this.boss = null;
            this.bossDefeated = false;
            this.swingId = 0;
            this.maxHp = this.getMaxHp();
            this.hp = this.maxHp;
            this.heartPulse = 0;
            this.shakeTimer = 0;
            this.redFlash = 0;
            this.invulnTimer = this.milestonesCompleted.surv180 ? 3 : 0;
            this.secondWindsUsed = 0;
            this.wallMaxHp = this.getWallMaxHp();
            this.wallHp = this.wallMaxHp;
            this.shieldTimer = 0;
            this.shieldCooldown = 0;
            this.shieldActive = false;
            this.regenTimer = 0;
            this.passiveIncomeTimer = 0;
            this.starCollectTimer = 0;
            this.abilityTimers = {
                chainLightning: 0,
                energyBurst: 0,
                orbitSwords: 0,
                vortexPull: 0,
                meteorStrike: 0,
                decoyHeart: 0
            };
            this.decoyActive = false;
            this.vortexActive = false;
            this.vortexTimer = 0;
            this.vortexCooldownTimer = 0;
            this.orbitAngle = 0;
            this.endlessMultiplier = 1;
            this.endlessSpawnInterval = 1;
            this.enemies.forEach(e => e.active = false);
            this.particles.particles.forEach(p => p.active = false);
            this.generateAmbient();
            const startGold = (this.starLevels.startingGold || 0) * 10;
            if (startGold > 0) this.addGold(startGold);
            if (this.firstRun && !this.tutorialShown) {
                this.showTutorial = true;
            }
            this.firstRun = false;
        }

// ---- GAME LOOP ----
        loop(time) {
            const dt = Math.min(time - this.lastTime, 100);
            this.lastTime = time;
            this.accumulator += dt;
            const step = 1000 / 60;
            while (this.accumulator >= step) {
                this.update(step / 1000);
                this.accumulator -= step;
            }
            this.render();
            requestAnimationFrame(t => this.loop(t));
        }

        update(dt) {
            this.menuPulse += dt;
            if (this.goldScaleTimer > 0) {
                this.goldScaleTimer -= dt;
                this.goldScale = 1 + 0.15 * Math.max(0, this.goldScaleTimer / 0.2);
            } else this.goldScale = 1;
            if (this.state !== 'PLAYING' && this.state !== 'BOSS') {
                this.particles.update(dt);
                return;
            }
            if (this.showTutorial) return;
            this.runTime += dt;

            // Cursor velocity & swing detection
            const dx = this.cursorX - this.lastCursorX;
            const dy = this.cursorY - this.lastCursorY;
            const vel = Math.sqrt(dx * dx + dy * dy);
            if (vel > CFG.minVelocity) {
                const dirX = dx / vel, dirY = dy / vel;
                const dot = dirX * this.lastDirX + dirY * this.lastDirY;
                if (dot < Math.cos(CFG.swingAngleThreshold)) {
                    this.swingId++;
                }
                this.lastDirX = dirX;
                this.lastDirY = dirY;
            }
            this.lastCursorX = this.cursorX;
            this.lastCursorY = this.cursorY;

            // Timers
            if (this.shakeTimer > 0) {
                this.shakeTimer -= dt;
                this.shakeX = (Math.random() - 0.5) * 6;
                this.shakeY = (Math.random() - 0.5) * 6;
            } else {
                this.shakeX = 0;
                this.shakeY = 0;
            }
            if (this.redFlash > 0) this.redFlash -= dt;
            if (this.heartPulse > 0) this.heartPulse -= dt;
            if (this.invulnTimer > 0) this.invulnTimer -= dt;

            // Spawning
            if (!this.bossActive && !this.bossDefeated) {
                const stage = CFG.stages[this.endlessMode ? 4 : this.currentStage];
                const total = this.endlessMode ? Infinity : stage.totalEnemies;
                if (this.enemiesSpawned < total) {
                    this.spawnTimer -= dt;
                    if (this.spawnTimer <= 0) {
                        this.spawnEnemy();
                        this.enemiesSpawned++;
                        let interval = this.endlessMode ? this.endlessSpawnInterval : this.getSpawnInterval();
                        this.spawnTimer = interval;
                    }
                } else if (!this.endlessMode && this.getActiveEnemyCount() === 0 && !this.bossDefeated) {
                    this.startBoss();
                }
            }

            // Endless mode scaling
            if (this.endlessMode) {
                this.endlessSpawnInterval = Math.max(0.08, 1 - Math.floor(this.runTime / 5) * 0.02) * BALANCE.spawnRateMult; // BALANCE applied
                this.endlessMultiplier = 1 + Math.floor(this.runTime / 30) * 0.1;
            }

            // Combat stats (computed once per frame)
            const atkR = this.getAttackRadius();
            const dmg = this.getDamage();
            const multiStrike = 1 + (this.upgradeLevels.multiStrike || 0);
            const critChance = (this.upgradeLevels.critHit || 0) * 0.03;     // NERFED: was 0.05
            const knockback = (this.upgradeLevels.knockback || 0) * 10;       // NERFED: was 15
            const burnChance = (this.upgradeLevels.burnBlade || 0) * 0.1;
            const burnDuration = 1 + (this.upgradeLevels.burnBlade || 0) * 0.5;
            const freezeChance = (this.upgradeLevels.freezeEdge || 0) * 0.08;
            const magnetRadius = (this.upgradeLevels.magneticField || 0) > 0 ? 40 + (this.upgradeLevels.magneticField || 0) * 15 : 0;
            const magnetPull = this.hasSynergy(6) ? 0.6 : 0.3;

            // Update enemies
            for (const e of this.enemies) {
                if (!e.active) continue;

                // Phasing
                if (e.phasing) {
                    e.phaseTimer -= dt;
                    if (e.phaseTimer <= 0) {
                        e.phaseVisible = !e.phaseVisible;
                        e.phaseTimer = e.phaseVisible ? CFG.enemies.phase.phaseOff : CFG.enemies.phase.phaseOn;
                    }
                }

                // Status effects
                if (e.burning > 0) {
                    e.burning -= dt;
                    e.burnDmgTimer -= dt;
                    if (e.burnDmgTimer <= 0) {
                        e.hp -= 1;
                        e.burnDmgTimer = 1;
                        if (e.hp <= 0) {
                            this.killEnemy(e);
                            continue;
                        }
                    }
                }
                if (e.frozen > 0) e.frozen -= dt;

                // Movement
                let targetX = this.heartX, targetY = this.heartYPos;
                let goingToDecoy = false;
                if (this.decoyActive) {
                    const dd = Math.hypot(e.x - this.decoyX, e.y - this.decoyY);
                    if (dd < 150) {
                        targetX = this.decoyX;
                        targetY = this.decoyY;
                        goingToDecoy = true;
                    }
                }
                const toTargetX = targetX - e.x, toTargetY = targetY - e.y;
                const dist = Math.sqrt(toTargetX * toTargetX + toTargetY * toTargetY);
                if (dist > 1) {
                    let spd = e.speed * (e.frozen > 0 ? 0.5 : 1);
                    if (e.isBoss && e.bossData) {
                        if (e.bossData.charging) spd = e.bossData.chargeSpeed || e.speed * 2;
                        if (e.bossData.behavior === 'combined' && e.hp < e.maxHp * 0.2) spd = 100;
                        else if (e.bossData.behavior === 'teleportSummon') {
                            const hpRatio = e.hp / e.maxHp;
                            spd = e.speed + (1 - hpRatio) * 40;
                        }
                    }
                    if (magnetRadius > 0 && !e.isBoss) {
                        const dHeart = Math.hypot(e.x - this.heartX, e.y - this.heartYPos);
                        if (dHeart < magnetRadius) spd *= (1 - magnetPull);
                    }
                    if (this.vortexActive && !goingToDecoy && !e.isBoss) {
                        const dCursor = Math.hypot(e.x - this.cursorX, e.y - this.cursorY);
                        const vortexR = 80 + (this.upgradeLevels.vortexPull || 0) * 15;
                        if (dCursor < vortexR) {
                            const px = (this.cursorX - e.x) / dCursor * 40 * dt;
                            const py = (this.cursorY - e.y) / dCursor * 40 * dt;
                            e.x += px;
                            e.y += py;
                        }
                    }
                    e.x += (toTargetX / dist) * spd * dt;
                    e.y += (toTargetY / dist) * spd * dt;
                    if (e.wobbleOffset !== undefined && !e.isBoss && e.type === 'bat') {
                        e.wobbleOffset += dt;
                        e.x += Math.sin(e.wobbleOffset * Math.PI * 2 / 1.5) * 40 * dt;
                    }
                }

                // Boss behaviors
                if (e.isBoss && e.bossData) this.updateBoss(e, dt);

                // Hit detection (cursor swing)
                if (vel > CFG.minVelocity && e.lastSwingHit !== this.swingId && (!e.phasing || e.phaseVisible)) {
                    const d = Math.hypot(this.cursorX - e.x, this.cursorY - e.y);
                    if (d < atkR + e.size / 2) {
                        e.lastSwingHit = this.swingId;
                        for (let s = 0; s < multiStrike; s++) {
                            let hitDmg = dmg;
                            let isCrit = Math.random() < critChance;
                            if (isCrit) hitDmg *= 3;
                            e.hp -= hitDmg;
                            this.sound.play('hit');
                            const color = isCrit ? '#ffff00' : '#ffffff';
                            const txt = isCrit ? `${Math.round(hitDmg)} CRIT!` : `${Math.round(hitDmg)}`;
                            this.particles.spawnText(e.x + (Math.random() - 0.5) * 10, e.y - e.size / 2, txt, color, isCrit ? 18 : 14);
                            if (burnChance > 0 && Math.random() < burnChance) {
                                e.burning = burnDuration;
                                e.burnDmgTimer = 1;
                            }
                            if (freezeChance > 0 && Math.random() < freezeChance) {
                                e.frozen = 1.5;
                            }
                            if (this.hasSynergy(7) && Math.random() < 0.1) {
                                this.aoeHit(e.x, e.y, 50, 2);
                            }
                        }
                        if (knockback > 0 && dist > 1) {
                            const kx = -(toTargetX / dist) * knockback;
                            const ky = -(toTargetY / dist) * knockback;
                            e.x += kx;
                            e.y += ky;
                        }
                        if (e.hp <= 0) {
                            this.killEnemy(e);
                            continue;
                        }
                    }
                }

                // Astral Aura
                if ((this.starLevels.astralAura || 0) > 0) {
                    const d = Math.hypot(this.cursorX - e.x, this.cursorY - e.y);
                    if (d < 40 && (!e.phasing || e.phaseVisible)) {
                        e.hp -= 0.5 * dt;
                        if (e.hp <= 0) {
                            this.killEnemy(e);
                            continue;
                        }
                    }
                }

                // Wall collision
                if (this.wallHp > 0 && !e.isBoss) {
                    const wallY = this.heartYPos - CFG.wallYOffset;
                    const wallW = this.W * CFG.wallWidthRatio;
                    const wallL = this.W / 2 - wallW / 2;
                    if (e.y > wallY - 10 && e.y < wallY + 20 && e.x > wallL && e.x < wallL + wallW) {
                        this.wallHp -= 1;
                        const thornDmg = this.upgradeLevels.wallThorns || 0;
                        if (thornDmg > 0) e.hp -= thornDmg;
                        if (this.hasSynergy(2)) {
                            e.burning = 2;
                            e.burnDmgTimer = 0.5;
                        }
                        if (e.hp <= 0) {
                            this.killEnemy(e);
                            continue;
                        } else {
                            e.y = wallY - 12;
                            continue;
                        }
                    }
                }

                // FIX: Shield collision — now checked at actual shield radius (80px), BEFORE heart collision
                if (this.shieldActive && !e.isBoss) {
                    const dHeart = Math.hypot(e.x - this.heartX, e.y - this.heartYPos);
                    const shieldR = 80;
                    if (dHeart < shieldR) {
                        e.active = false;
                        continue;
                    }
                }

                // Heart collision
                if (!e.isBoss) {
                    const dHeart = Math.hypot(e.x - this.heartX, e.y - this.heartYPos);
                    if (dHeart < 30) {
                        this.damageHeart(e);
                        e.active = false;
                        if (e.type === 'exploder') this.damageHeart(null);
                        continue;
                    }
                }
            }

            // Abilities
            this.updateAbilities(dt);

            // Regen — NERFED: slower base interval
            const regenLevel = this.upgradeLevels.heartRegen || 0;
            if (regenLevel > 0) {
                let interval = Math.max(12, 25 - regenLevel * 2);  // was max(8,20-lvl*2)
                if (this.hasSynergy(8)) interval *= 0.7;
                if (this.milestonesCompleted.surv120) interval *= 0.8;
                this.regenTimer += dt;
                if (this.regenTimer >= interval) {
                    this.regenTimer = 0;
                    if (this.hp < this.maxHp) {
                        this.hp++;
                    }
                }
            }

            // Passive income
            const incomeLevel = this.upgradeLevels.passiveIncome || 0;
            if (incomeLevel > 0) {
                let rate = incomeLevel * 2;
                if (this.milestonesCompleted.gold2000) rate *= 2;
                this.passiveIncomeTimer += dt;
                if (this.passiveIncomeTimer >= 2) {
                    this.passiveIncomeTimer = 0;
                    const amt = Math.floor(rate * 2 * BALANCE.goldIncomeMult); // BALANCE applied
                    this.addGold(amt);
                    this.particles.spawnText(this.W - 60, 30, `+${amt}`, '#aaffaa', 12, 0.8);
                }
            }

            // Star collector
            const starLevel = this.upgradeLevels.starCollector || 0;
            if (starLevel > 0) {
                const interval = Math.max(20, 60 - starLevel * 8);
                this.starCollectTimer += dt;
                if (this.starCollectTimer >= interval) {
                    this.starCollectTimer = 0;
                    this.addStars(1);
                }
            }

            // Shield
            const shieldLevel = this.upgradeLevels.heartShield || 0;
            if (shieldLevel > 0 && this.upgradeUnlocked.heartShield) {
                if (!this.shieldActive) {
                    this.shieldCooldown -= dt;
                    if (this.shieldCooldown <= 0) {
                        this.shieldActive = true;
                        this.shieldTimer = 2.5 + shieldLevel * 0.5;
                    }
                } else {
                    this.shieldTimer -= dt;
                    if (this.shieldTimer <= 0) {
                        this.shieldActive = false;
                        this.shieldCooldown = Math.max(10, 18 - shieldLevel);
                    }
                }
            }

            // Wall regen (astral)
            if ((this.starLevels.astralWall || 0) > 0 && this.wallMaxHp > 0 && this.wallHp < this.wallMaxHp) {
                this._wallRegenTimer = (this._wallRegenTimer || 0) + dt;
                if (this._wallRegenTimer >= 5) {
                    this._wallRegenTimer = 0;
                    this.wallHp = Math.min(this.wallMaxHp, this.wallHp + 1);
                }
            }

            this.particles.update(dt);
        }

        getSpawnInterval() {
            const stage = CFG.stages[this.currentStage];
            const curve = stage.spawnCurve;
            const t = this.runTime;
            for (let i = curve.length - 1; i >= 0; i--) {
                if (t >= curve[i][0]) return curve[i][1] * BALANCE.spawnRateMult; // BALANCE applied
            }
            return curve[0][1] * BALANCE.spawnRateMult;
        }

        getActiveEnemyCount() {
            let c = 0;
            for (const e of this.enemies) if (e.active && !e.isBoss) c++;
            return c;
        }

        spawnEnemy() {
            const stage = CFG.stages[this.endlessMode ? 4 : this.currentStage];
            const pool = stage.enemyPool;
            const roll = Math.random() * 100;
            let cum = 0, type = 'grunt';
            for (const [t, w] of Object.entries(pool)) {
                cum += w;
                if (roll < cum) {
                    type = t;
                    break;
                }
            }
            const base = CFG.enemies[type];
            const e = this.enemies.find(e => !e.active);
            if (!e) return;

            const side = Math.random();
            if (side < 0.5) {
                e.x = Math.random() * this.W;
                e.y = -20;
            } else if (side < 0.75) {
                e.x = -20;
                e.y = Math.random() * this.H * 0.5;
            } else {
                e.x = this.W + 20;
                e.y = Math.random() * this.H * 0.5;
            }

            // BALANCE applied to HP and speed
            const hpMult = (this.endlessMode ? this.endlessMultiplier : 1) * stage.hpMult * BALANCE.enemyHpMult;
            const spdMult = stage.spdMult * (this.milestonesCompleted.stage3 ? 0.95 : 1) * BALANCE.enemySpeedMult;

            e.active = true;
            e.type = type;
            e.emoji = base.emoji;
            e.hp = Math.ceil(base.hp * hpMult);
            e.maxHp = e.hp;
            e.speed = base.speed * spdMult;
            e.size = base.size;
            e.gold = base.gold;
            e.lastSwingHit = -1;
            e.burning = 0;
            e.frozen = 0;
            e.burnDmgTimer = 0;
            e.phasing = base.phasing || false;
            e.phaseTimer = base.phasing ? base.phaseOff : 0;
            e.phaseVisible = true;
            e.wobbleOffset = base.wobble ? Math.random() * 10 : 0;
            e.isBoss = false;
            e.bossData = null;
            e.baseX = e.x;
        }

        startBoss() {
            const stage = CFG.stages[this.currentStage];
            const b = stage.boss;
            const e = this.enemies.find(e => !e.active);
            if (!e) return;
            this.bossActive = true;
            this.state = 'BOSS';
            this.sound.play('bossAppear');
            let bossHp = Math.floor(b.hp * BALANCE.bossHpMult); // BALANCE applied
            if (this.milestonesCompleted.boss10) bossHp = Math.floor(bossHp * 0.9);
            e.active = true;
            e.isBoss = true;
            e.emoji = b.emoji;
            e.hp = bossHp;
            e.maxHp = bossHp;
            e.speed = b.speed;
            e.size = b.size;
            e.gold = stage.bossGoldBase * (this.currentStage + 1);
            e.x = this.W / 2;
            e.y = -50;
            e.lastSwingHit = -1;
            e.burning = 0;
            e.frozen = 0;
            e.phasing = false;
            e.phaseVisible = true;
            e.bossData = {
                ...b,
                charging: false,
                chargeTimer: 0,
                summonTimer: 0,
                teleportTimer: 0,
                sweepDir: 1,
                chargeSpeed: b.chargeSpeed || b.speed * 2
            };
            this.boss = e;
        }

        updateBoss(e, dt) {
            const bd = e.bossData;
            if (!bd) return;
            switch (bd.behavior) {
                case 'charge':
                    bd.chargeTimer += dt;
                    if (!bd.charging && bd.chargeTimer >= (bd.chargeInterval || 8)) {
                        bd.charging = true;
                        bd.chargeTimer = 0;
                    }
                    if (bd.charging && bd.chargeTimer >= (bd.chargeDuration || 2)) {
                        bd.charging = false;
                        bd.chargeTimer = 0;
                    }
                    break;
                case 'sweepSummon':
                    e.x += bd.sweepDir * 80 * dt;
                    if (e.x > this.W - 40) bd.sweepDir = -1;
                    if (e.x < 40) bd.sweepDir = 1;
                    bd.summonTimer += dt;
                    if (bd.summonTimer >= (bd.summonInterval || 6)) {
                        bd.summonTimer = 0;
                        for (let i = 0; i < (bd.summonCount || 3); i++) this.spawnBossMinion(e, 'exploder');
                    }
                    break;
                case 'chargePatrol':
                    bd.chargeTimer = (bd.chargeTimer || 0) + dt;
                    if (!bd.charging && bd.chargeTimer >= (bd.chargeCooldown || 4)) {
                        bd.charging = true;
                        bd.chargeTimer = 0;
                        bd.chargeSpeed = 200;
                    }
                    if (bd.charging && bd.chargeTimer >= (bd.chargeDuration || 1)) {
                        bd.charging = false;
                        bd.chargeTimer = 0;
                    }
                    bd.summonTimer = (bd.summonTimer || 0) + dt;
                    if (bd.summonTimer >= (bd.summonInterval || 10)) {
                        bd.summonTimer = 0;
                        for (let i = 0; i < (bd.summonCount || 2); i++) this.spawnBossMinion(e, bd.summonType || 'freezer');
                    }
                    break;
                case 'teleportSummon':
                    bd.teleportTimer = (bd.teleportTimer || 0) + dt;
                    if (bd.teleportTimer >= (bd.teleportInterval || 5)) {
                        bd.teleportTimer = 0;
                        e.x = 60 + Math.random() * (this.W - 120);
                        e.y = 60 + Math.random() * (this.H * 0.4);
                        for (let i = 0; i < (bd.summonCount || 4); i++) this.spawnBossMinion(e, 'exploder');
                    }
                    break;
                case 'combined':
                    bd.chargeTimer = (bd.chargeTimer || 0) + dt;
                    bd.teleportTimer = (bd.teleportTimer || 0) + dt;
                    bd.summonTimer = (bd.summonTimer || 0) + dt;
                    if (!bd.charging && bd.chargeTimer >= (bd.chargeInterval || 6)) {
                        bd.charging = true;
                        bd.chargeTimer = 0;
                        bd.chargeSpeed = e.speed * 3;
                    }
                    if (bd.charging && bd.chargeTimer >= 1.5) {
                        bd.charging = false;
                        bd.chargeTimer = 0;
                    }
                    if (bd.teleportTimer >= (bd.teleportInterval || 8)) {
                        bd.teleportTimer = 0;
                        e.x = 60 + Math.random() * (this.W - 120);
                        e.y = 60 + Math.random() * (this.H * 0.3);
                    }
                    if (bd.summonTimer >= (bd.summonInterval || 10)) {
                        bd.summonTimer = 0;
                        const types = ['grunt', 'runner', 'bat', 'freezer', 'exploder'];
                        for (let i = 0; i < (bd.summonCount || 2); i++) {
                            const t = e.hp < e.maxHp * 0.3 ? 'phase' : types[Math.floor(Math.random() * types.length)];
                            this.spawnBossMinion(e, t);
                        }
                    }
                    break;
            }
            const dh = Math.hypot(e.x - this.heartX, e.y - this.heartYPos);
            if (dh < 40) {
                this.damageHeart(null);
                e.y = Math.min(e.y, this.heartYPos - 60);
            }
        }

        spawnBossMinion(boss, type) {
            const base = CFG.enemies[type] || CFG.enemies.grunt;
            const e = this.enemies.find(e => !e.active);
            if (!e) return;
            const stage = CFG.stages[this.endlessMode ? 4 : this.currentStage];
            e.active = true;
            e.type = type;
            e.emoji = base.emoji;
            e.hp = Math.ceil(base.hp * stage.hpMult * BALANCE.enemyHpMult);  // BALANCE applied to minions too
            e.maxHp = e.hp;
            e.speed = base.speed * 1.3 * BALANCE.enemySpeedMult;              // BALANCE applied
            e.size = base.size;
            e.gold = base.gold;
            e.x = boss.x + (Math.random() - 0.5) * 60;
            e.y = boss.y + (Math.random() - 0.5) * 40;
            e.lastSwingHit = -1;
            e.burning = 0;
            e.frozen = 0;
            e.phasing = base.phasing || false;
            e.phaseTimer = base.phasing ? base.phaseOff : 0;
            e.phaseVisible = true;
            e.wobbleOffset = 0;
            e.isBoss = false;
            e.bossData = null;
        }

        damageHeart(enemy) {
            if (this.invulnTimer > 0) return;
            let dmg = 1;
            if (this.hasSynergy(5)) dmg = Math.max(1, Math.ceil(dmg * 0.5));
            this.hp -= dmg;
            this.shakeTimer = 0.2;
            this.redFlash = 0.1;
            this.heartPulse = 0.3;
            this.sound.play('heartDmg');
            if (this.hp <= 0) {
                const swLevel = this.starLevels.secondWind || 0;
                const maxWinds = swLevel >= 1 ? (swLevel >= 2 ? 2 : 1) : 0;
                if (this.secondWindsUsed < maxWinds) {
                    this.secondWindsUsed++;
                    this.hp = this.maxHp;
                    this.invulnTimer = swLevel >= 3 ? 3 : 0.5;
                    this.redFlash = 0;
                    for (const e of this.enemies) {
                        if (e.active && !e.isBoss) {
                            e.hp -= 3;
                            if (e.hp <= 0) this.killEnemy(e);
                        }
                    }
                    return;
                }
                this.die();
            }
        }

        die() {
            this.state = 'DEAD';
            this.sound.play('heartDmg');
            this.stats.bestSurvivalTime = Math.max(this.stats.bestSurvivalTime, Math.floor(this.runTime));
            let interestBonus = 0;
            const interestLevel = this.upgradeLevels.interest || 0;
            if (interestLevel > 0) {
                const rate = interestLevel * 0.02;
                interestBonus = Math.min(500, Math.floor(this.gold * rate));
                this.gold += interestBonus;
            }
            for (let i = 0; i < 8; i++) {
                this.particles.spawn(this.heartX, this.heartYPos, (Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200, 0.8, '💔', 20, 3, 200);
            }
            this.deathStats = {
                time: Math.floor(this.runTime),
                kills: this.runKills,
                gold: this.runGold,
                interest: interestBonus,
                total: this.gold
            };
            this.checkMilestones();
            this.save();
        }

        killEnemy(e) {
            e.active = false;
            this.runKills++;
            this.stats.totalKills++;
            let goldValue = e.gold;
            goldValue *= this.getGoldMult(); // already includes BALANCE.goldIncomeMult
            if (this.milestonesCompleted.kill200) goldValue += 1;
            const thLevel = this.upgradeLevels.treasureHunter || 0;
            let isGem = false;
            if (thLevel > 0 && Math.random() < thLevel * 0.04) {
                goldValue *= 3;
                isGem = true;
            }
            if (this.hasSynergy(3) && Math.random() < 0.1) goldValue *= 2;
            goldValue = Math.floor(goldValue);
            if (e.isBoss) {
                let bossGold = e.gold;
                bossGold *= 1 + (this.upgradeLevels.bossBounty || 0) * 0.5;
                if (this.milestonesCompleted.boss5) bossGold *= 1.25;
                bossGold *= this.getGoldMult();
                goldValue = Math.floor(bossGold);
                let starReward = 5 + 5 * (this.currentStage + 1);
                if ((this.starLevels.luckyStars || 0) > 0 && Math.random() < (this.starLevels.luckyStars || 0) * 0.15) starReward *= 2;
                if ((this.starLevels.astralBlessing || 0) > 0) starReward = Math.floor(starReward * (1 + (this.starLevels.astralBlessing || 0) * 0.2));
                this.addStars(starReward);
                this.stats.totalBossKills++;
                this.bossActive = false;
                this.bossDefeated = true;
                this.boss = null;
                this.sound.play('bossDefeat');
                const next = this.currentStage + 1;
                if (next < 5 && !this.unlockedStages.includes(next)) this.unlockedStages.push(next);
                this.stats.stagesCleared = Math.max(this.stats.stagesCleared, this.currentStage + 1);
                this.state = 'STAGE_TRANSITION';
                this.checkMilestones();
                this.save();
            }
            this.addGold(goldValue);
            this.sound.play('kill');
            const emoji = isGem ? '💎' : '🪙';
            this.particles.spawn(e.x, e.y, 0, 0, CFG.goldArcDuration, emoji, 16, 5, 0, this.W - 40, 20);
            for (let i = 0; i < 3; i++) {
                this.particles.spawn(e.x, e.y, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100, 0.3, e.emoji, e.size * 0.5, 1, 100);
            }
            if (e.type === 'freezer') {
                for (const other of this.enemies) {
                    if (other.active && Math.hypot(other.x - e.x, other.y - e.y) < 50) other.frozen = 2;
                }
            }
            if (this.upgradeUnlocked.chainLightning && (this.upgradeLevels.chainLightning || 0) > 0) {
                const lvl = this.upgradeLevels.chainLightning || 0;
                const proc = 0.15 + lvl * 0.05;
                if (Math.random() < proc) {
                    this.chainLightning(e.x, e.y, 2 + lvl, 100, 1 * BALANCE.abilityDamageMult);
                } // BALANCE applied
            }
        }

        addGold(amount) {
            this.gold += amount;
            this.runGold += amount;
            this.stats.totalGoldEarned += amount;
            this.goldScaleTimer = 0.2;
            this.sound.play('gold');
        }

        addStars(amount) {
            if ((this.starLevels.astralBlessing || 0) > 0) amount = Math.floor(amount * (1 + (this.starLevels.astralBlessing || 0) * 0.2));
            this.stars += amount;
        }

        aoeHit(x, y, radius, damage) {
            const d = damage * BALANCE.abilityDamageMult; // BALANCE applied
            for (const e of this.enemies) {
                if (!e.active || (e.phasing && !e.phaseVisible)) continue;
                if (Math.hypot(e.x - x, e.y - y) < radius) {
                    e.hp -= d;
                    this.particles.spawnText(e.x, e.y - e.size / 2, `${Math.round(d)}`, '#ffaa00', 13);
                    if (e.hp <= 0) this.killEnemy(e);
                }
            }
        }

        chainLightning(x, y, chains, range, dmg) {
            let cx = x, cy = y;
            const hit = new Set();
            this.sound.play('ability');
            for (let i = 0; i < chains; i++) {
                let closest = null, closestD = range;
                for (const e of this.enemies) {
                    if (!e.active || hit.has(e) || (e.phasing && !e.phaseVisible)) continue;
                    const d = Math.hypot(e.x - cx, e.y - cy);
                    if (d < closestD) {
                        closest = e;
                        closestD = d;
                    }
                }
                if (!closest) break;
                hit.add(closest);
                this.particles.spawnText((cx + closest.x) / 2, (cy + closest.y) / 2, '⚡', '#ffff00', 16, 0.2);
                closest.hp -= dmg;
                if (closest.hp <= 0) this.killEnemy(closest);
                if (this.hasSynergy(4)) this.aoeHit(closest.x, closest.y, 30, 1);
                cx = closest.x;
                cy = closest.y;
            }
        }

        updateAbilities(dt) {
            const cdMult = this.getCooldownMult();

            // Energy Burst
            if (this.upgradeUnlocked.energyBurst && (this.upgradeLevels.energyBurst || 0) > 0) {
                const lvl = this.upgradeLevels.energyBurst || 0;
                const interval = Math.max(6, 12 - (lvl - 1) * 1.5) * cdMult;
                this.abilityTimers.energyBurst = (this.abilityTimers.energyBurst || 0) + dt;
                if (this.abilityTimers.energyBurst >= interval) {
                    this.abilityTimers.energyBurst = 0;
                    let bestX = this.cursorX, bestY = this.cursorY, bestCount = 0;
                    for (const e of this.enemies) {
                        if (!e.active) continue;
                        let count = 0;
                        for (const e2 of this.enemies) {
                            if (e2.active && Math.hypot(e.x - e2.x, e.y - e2.y) < 80) count++;
                        }
                        if (count > bestCount) {
                            bestCount = count;
                            bestX = e.x;
                            bestY = e.y;
                        }
                    }
                    const radius = 60 + lvl * 20;
                    this.aoeHit(bestX, bestY, radius, 2); // aoeHit already applies BALANCE
                    this.sound.play('ability');
                    for (let i = 0; i < 6; i++) {
                        const a = Math.PI * 2 * i / 6;
                        this.particles.spawn(bestX, bestY, Math.cos(a) * 80, Math.sin(a) * 80, 0.4, '💥', 14, 2, 0);
                    }
                }
            }

            // Orbiting Swords
            if (this.upgradeUnlocked.orbitSwords && (this.upgradeLevels.orbitSwords || 0) > 0) {
                const count = 1 + (this.upgradeLevels.orbitSwords || 0);
                this.orbitAngle += dt * Math.PI;
                const orbitR = 55;
                for (let i = 0; i < count; i++) {
                    const a = this.orbitAngle + (Math.PI * 2 * i / count);
                    const sx = this.cursorX + Math.cos(a) * orbitR;
                    const sy = this.cursorY + Math.sin(a) * orbitR;
                    for (const e of this.enemies) {
                        if (!e.active || (e.phasing && !e.phaseVisible)) continue;
                        if (Math.hypot(sx - e.x, sy - e.y) < e.size) {
                            if ((e._swordHitTimer || 0) <= 0) {
                                e.hp -= 1 * BALANCE.abilityDamageMult; // BALANCE applied
                                e._swordHitTimer = 0.5;
                                if (this.hasSynergy(1)) e.frozen = 1;
                                if (e.hp <= 0) this.killEnemy(e);
                            }
                        }
                        if (e._swordHitTimer > 0) e._swordHitTimer -= dt;
                    }
                }
            }

            // Vortex Pull
            if (this.upgradeUnlocked.vortexPull && (this.upgradeLevels.vortexPull || 0) > 0) {
                const lvl = this.upgradeLevels.vortexPull || 0;
                const interval = Math.max(5, 10 - lvl) * cdMult;
                if (!this.vortexActive) {
                    this.vortexCooldownTimer += dt;
                    if (this.vortexCooldownTimer >= interval) {
                        this.vortexActive = true;
                        this.vortexTimer = 1.5;
                        this.vortexCooldownTimer = 0;
                    }
                } else {
                    this.vortexTimer -= dt;
                    if (this.vortexTimer <= 0) this.vortexActive = false;
                }
            }

            // Meteor Strike
            if (this.upgradeUnlocked.meteorStrike && (this.upgradeLevels.meteorStrike || 0) > 0) {
                const lvl = this.upgradeLevels.meteorStrike || 0;
                const interval = Math.max(10, 20 - (lvl - 1) * 2) * cdMult;
                this.abilityTimers.meteorStrike = (this.abilityTimers.meteorStrike || 0) + dt;
                if (this.abilityTimers.meteorStrike >= interval) {
                    this.abilityTimers.meteorStrike = 0;
                    let bestX = this.W / 2, bestY = this.H / 2, bestCount = 0;
                    for (const e of this.enemies) {
                        if (!e.active) continue;
                        let c = 0;
                        for (const e2 of this.enemies) {
                            if (e2.active && Math.hypot(e.x - e2.x, e.y - e2.y) < 70) c++;
                        }
                        if (c > bestCount) {
                            bestCount = c;
                            bestX = e.x;
                            bestY = e.y;
                        }
                    }
                    const dmg = 5 + (lvl - 1) * 2;
                    this.aoeHit(bestX, bestY, 70, dmg); // aoeHit already applies BALANCE
                    this.sound.play('ability');
                    this.shakeTimer = 0.15;
                    this.particles.spawn(bestX, bestY - 200, 0, 300, 0.5, '☄️', 32, 3, 0);
                    for (let i = 0; i < 8; i++) {
                        const a = Math.PI * 2 * i / 8;
                        this.particles.spawn(bestX, bestY, Math.cos(a) * 60, Math.sin(a) * 60, 0.4, '🔥', 12, 2, 0);
                    }
                    if (this.hasSynergy(9) && Math.random() < 0.3) {
                        this.addGold(10 * (this.currentStage + 1));
                    }
                }
            }

            // Decoy Heart
            if (this.upgradeUnlocked.decoyHeart && (this.upgradeLevels.decoyHeart || 0) > 0) {
                const lvl = this.upgradeLevels.decoyHeart || 0;
                const cooldown = Math.max(20, 30 - lvl * 2) * cdMult;
                const duration = 5 + lvl;
                if (this.decoyActive) {
                    this.decoyTimer -= dt;
                    if (this.decoyTimer <= 0) {
                        this.decoyActive = false;
                        this.abilityTimers.decoyHeart = 0;
                        if ((this.starLevels.abilityEvolution || 0) >= 2 && lvl >= CFG.goldUpgrades.find(u => u.id === 'decoyHeart').max) {
                            this.aoeHit(this.decoyX, this.decoyY, 80, 5);
                        }
                        this.particles.spawn(this.decoyX, this.decoyY, 0, 0, 0.3, '💜', 24, 2, 0);
                    }
                } else {
                    this.abilityTimers.decoyHeart = (this.abilityTimers.decoyHeart || 0) + dt;
                    if (this.abilityTimers.decoyHeart >= cooldown) {
                        this.decoyActive = true;
                        this.decoyTimer = duration;
                        this.decoyX = this.W * (0.2 + Math.random() * 0.6);
                        this.decoyY = this.H * (0.3 + Math.random() * 0.3);
                    }
                }
            }
        }

        checkMilestones() {
            CFG.milestones.forEach(m => {
                if (this.milestonesCompleted[m.id]) return;
                const val = this.stats[m.stat] || 0;
                if (val >= m.threshold) {
                    this.milestonesCompleted[m.id] = true;
                    this.showToast(`🏆 ${m.name}: ${m.reward}`);
                    this.sound.play('milestone');
                    if (m.reward.includes('⭐×')) {
                        const match = m.reward.match(/⭐×(\d+)/);
                        if (match) this.stars += parseInt(match[1]);
                    }
                    if (m.id === 'gold10000') this.costReduction = 0.1;
                    this.save();
                }
            });
        }

// ---- RENDER ----
        render() {
            const ctx = this.ctx;
            const W = this.W, H = this.H;
            ctx.save();
            if (this.shakeTimer > 0) ctx.translate(this.shakeX, this.shakeY);
            const stageIdx = this.endlessMode ? 4 : this.currentStage;
            const bgColor = this.state === 'MENU' ? '#0a0a0f' : (CFG.stages[stageIdx] ? CFG.stages[stageIdx].bg : '#0a0a0f');
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, W, H);
            if (this.redFlash > 0) {
                ctx.fillStyle = `rgba(255,0,0,${this.redFlash * 3})`;
                ctx.fillRect(0, 0, W, H);
            }
            if (this.state === 'MENU') {
                this.renderMenu(ctx, W, H);
                ctx.restore();
                return;
            }
            if (this.state === 'UPGRADING') {
                ctx.restore();
                return;
            }

            // Ambient
            for (const a of this.ambientEmojis) {
                ctx.globalAlpha = a.alpha;
                ctx.font = `${a.size}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(a.emoji, a.x, a.y);
            }
            ctx.globalAlpha = 1;

            // Wall
            if (this.wallMaxHp > 0) {
                const wallY = this.heartYPos - CFG.wallYOffset;
                const wallW = W * CFG.wallWidthRatio;
                const wallL = W / 2 - wallW / 2;
                const bricks = Math.ceil(wallW / 30);
                ctx.font = '20px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.globalAlpha = this.wallHp > 0 ? 0.8 : 0.2;
                for (let i = 0; i < bricks; i++) {
                    ctx.fillText('🧱', wallL + i * 30 + 15, wallY);
                }
                ctx.globalAlpha = 1;
                if (this.wallHp > 0) {
                    const barW = wallW, barH = 3;
                    ctx.fillStyle = 'rgba(255,0,0,0.3)';
                    ctx.fillRect(wallL, wallY + 14, barW, barH);
                    ctx.fillStyle = '#44aa44';
                    ctx.fillRect(wallL, wallY + 14, barW * (this.wallHp / this.wallMaxHp), barH);
                }
            }

            // Shield
            if (this.shieldActive) {
                ctx.strokeStyle = 'rgba(100,150,255,0.4)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.heartX, this.heartYPos, 80, 0, Math.PI * 2);
                ctx.stroke();
                const sa = Date.now() / 500;
                ctx.font = '20px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🛡️', this.heartX + Math.cos(sa) * 70, this.heartYPos + Math.sin(sa) * 70);
            }

            // Decoy heart
            if (this.decoyActive) {
                ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 200) * 0.2;
                ctx.font = '32px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💜', this.decoyX, this.decoyY);
                ctx.globalAlpha = 1;
            }

            // Enemies
            for (const e of this.enemies) {
                if (!e.active || e.isBoss) continue;
                ctx.globalAlpha = (e.phasing && !e.phaseVisible) ? 0.3 : 1;
                if (e.frozen > 0) {
                    ctx.fillStyle = 'rgba(100,150,255,0.3)';
                    ctx.fillRect(e.x - e.size / 2, e.y - e.size / 2, e.size, e.size);
                }
                ctx.font = `${e.size}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(e.emoji, e.x, e.y);
                if (e.burning > 0) {
                    ctx.font = '12px serif';
                    ctx.fillText('🔥', e.x + e.size / 2, e.y - e.size / 2);
                }
                if (e.hp < e.maxHp) {
                    const bw = e.size, bh = 3;
                    const bx = e.x - bw / 2, by = e.y - e.size / 2 - 8;
                    ctx.fillStyle = 'rgba(255,0,0,0.3)';
                    ctx.fillRect(bx, by, bw, bh);
                    ctx.fillStyle = '#ff3333';
                    ctx.fillRect(bx, by, bw * Math.max(0, e.hp / e.maxHp), bh);
                }
                ctx.globalAlpha = 1;
            }

            // Boss
            if (this.boss && this.boss.active) {
                const b = this.boss;
                ctx.font = `${b.size}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(b.emoji, b.x, b.y);
                const barX = 20, barY = 20, barW = W - 40, barH = 12;
                ctx.fillStyle = '#333';
                ctx.fillRect(barX, barY, barW, barH);
                const hpRatio = Math.max(0, b.hp / b.maxHp);
                ctx.fillStyle = hpRatio < 0.3 ? '#ff6600' : '#ff3333';
                ctx.fillRect(barX, barY, barW * hpRatio, barH);
                ctx.font = '14px sans-serif';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.fillText(`${b.bossData.name} — ${Math.ceil(b.hp)}/${b.maxHp}`, W / 2, barY + barH + 16);
            }

            // Heart
            const heartScale = this.heartPulse > 0 ? 1 + 0.3 * (this.heartPulse / 0.3) : 1;
            const hs = CFG.heartSize * heartScale;
            ctx.font = `${hs}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('❤️', this.heartX, this.heartYPos);
            ctx.font = '18px serif';
            ctx.textAlign = 'center';
            let hpStr = '';
            for (let i = 0; i < this.maxHp; i++) hpStr += i < this.hp ? '❤️' : '🖤';
            ctx.fillText(hpStr, this.heartX, this.heartYPos + 30);

            // Cursor
            const atkR = this.getAttackRadius();
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(this.cursorX, this.cursorY, atkR, 0, Math.PI * 2);
            ctx.stroke();
            if (this.upgradeUnlocked.orbitSwords && (this.upgradeLevels.orbitSwords || 0) > 0) {
                const count = 1 + (this.upgradeLevels.orbitSwords || 0);
                ctx.font = '20px serif';
                for (let i = 0; i < count; i++) {
                    const a = this.orbitAngle + (Math.PI * 2 * i / count);
                    ctx.fillText('🗡️', this.cursorX + Math.cos(a) * 55, this.cursorY + Math.sin(a) * 55);
                }
            }
            ctx.font = `${CFG.cursorSize}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚔️', this.cursorX, this.cursorY);
            if (this.vortexActive) {
                ctx.strokeStyle = 'rgba(150,100,255,0.3)';
                ctx.lineWidth = 1;
                const vr = 80 + (this.upgradeLevels.vortexPull || 0) * 15;
                ctx.beginPath();
                ctx.arc(this.cursorX, this.cursorY, vr, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Particles
            this.particles.render(ctx);

            // HUD
            this.renderHUD(ctx, W, H);

            // Tutorial overlay
            if (this.showTutorial) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = 'bold 24px sans-serif';
                ctx.fillText('⚔️ Defend the Heart! ❤️', W / 2, H / 2 - 60);
                ctx.font = '16px sans-serif';
                ctx.fillStyle = '#ccc';
                ctx.fillText('Swipe through enemies to destroy them.', W / 2, H / 2 - 20);
                ctx.fillText('Change direction quickly to attack faster!', W / 2, H / 2 + 10);
                ctx.font = 'bold 18px sans-serif';
                ctx.fillStyle = '#4a9';
                ctx.fillText('[Tap to Begin]', W / 2, H / 2 + 60);
            }

            // Death screen
            if (this.state === 'DEAD') {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0, 0, W, H);
                ctx.textAlign = 'center';
                ctx.font = 'bold 32px sans-serif';
                ctx.fillStyle = '#ff4444';
                ctx.fillText('💔 You Fell!', W / 2, H / 2 - 100);
                ctx.font = '16px sans-serif';
                ctx.fillStyle = '#ccc';
                ctx.fillText(`Survived: ${this.deathStats.time}s`, W / 2, H / 2 - 50);
                ctx.fillText(`Enemies defeated: ${this.deathStats.kills}`, W / 2, H / 2 - 25);
                ctx.fillText(`Gold earned: 🪙 ${this.deathStats.gold}`, W / 2, H / 2);
                if (this.deathStats.interest > 0) ctx.fillText(`Interest: 🪙 ${this.deathStats.interest}`, W / 2, H / 2 + 25);
                ctx.fillText(`Total gold: 🪙 ${this.deathStats.total}`, W / 2, H / 2 + 50);
                ctx.font = 'bold 18px sans-serif';
                ctx.fillStyle = '#4a9';
                ctx.fillText('[Tap to Upgrade & Retry]', W / 2, H / 2 + 100);
            }

            // Stage transition
            if (this.state === 'STAGE_TRANSITION') {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0, 0, W, H);
                ctx.textAlign = 'center';
                ctx.font = 'bold 28px sans-serif';
                ctx.fillStyle = '#ffdd44';
                ctx.fillText('⭐ Stage Complete! ⭐', W / 2, H / 2 - 40);
                ctx.font = '16px sans-serif';
                ctx.fillStyle = '#ccc';
                ctx.fillText(`${CFG.stages[this.currentStage].name} cleared!`, W / 2, H / 2);
                ctx.font = 'bold 18px sans-serif';
                ctx.fillStyle = '#4a9';
                ctx.fillText('[Tap to Continue]', W / 2, H / 2 + 60);
            }

            ctx.restore();
        }

        renderMenu(ctx, W, H) {
            const pulse = 1 + Math.sin(this.menuPulse * 2) * 0.03;
            ctx.save();
            ctx.translate(W / 2, H / 2 - 40);
            ctx.scale(pulse, pulse);
            ctx.font = 'bold 42px sans-serif';
            ctx.fillStyle = '#e0e0e0';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('EMOJI HORDE', 0, 0);
            ctx.restore();
            ctx.font = '48px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚔️🛡️', W / 2, H / 2 + 30);
            ctx.font = 'bold 20px sans-serif';
            ctx.fillStyle = '#4a9';
            ctx.fillText('[Tap to Start]', W / 2, H / 2 + 90);
        }

        renderHUD(ctx, W, H) {
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            const stageIdx = this.endlessMode ? 4 : this.currentStage;
            const stage = CFG.stages[stageIdx];
            ctx.font = '14px sans-serif';
            ctx.fillStyle = '#aaa';
            const stageLabel = this.endlessMode ? `♾️ Endless — ${Math.floor(this.runTime)}s` : `${stage.emoji} ${stage.name}`;
            let enemyInfo = '';
            if (!this.endlessMode && !this.bossActive) {
                enemyInfo = ` ${this.enemiesSpawned}/${stage.totalEnemies} 🔪`;
            }
            ctx.fillText(`${stageLabel}${enemyInfo}`, 10, 10);
            ctx.font = '20px serif';
            ctx.textAlign = 'left';
            ctx.fillText(this.sound.muted ? '🔇' : '🔊', 10, 30);
            ctx.textAlign = 'right';
            ctx.save();
            ctx.translate(W - 10, 10);
            ctx.scale(this.goldScale, this.goldScale);
            ctx.font = 'bold 16px sans-serif';
            ctx.fillStyle = '#ffcc00';
            ctx.fillText(`🪙 ${this.gold}`, 0, 0);
            ctx.restore();
        }
    }

    // Mute toggle
    document.getElementById('gameCanvas').addEventListener('click', function (e) {
        if (e.clientX < 50 && e.clientY > 25 && e.clientY < 55) {
            game.sound.muted = !game.sound.muted;
        }
    });

    const game = new Game();
</script>
</body>
</html>
