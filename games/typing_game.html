            "hold home hope horse hot hour house how however human hundred ice idea if imagine important in include " +
            "increase indeed inside instead interest into iron island it job join jump just keep key kind king know land " +
            "language large last late laugh law lead learn leave left leg less let letter level lie life light like line " +
            "list listen little live long look lose lot loud love low machine main make man many map mark market matter " +
            "may mean measure meet member memory men middle might mile milk mind minute miss model moment money month " +
            "moon more morning most mother mountain mouth move much music must name nation nature near need never new " +
            "next night nine no north note nothing notice now number object ocean of off offer office often oh oil old " +
            "on once one only open or order other our out over own page paint pair paper part pass past pattern pay " +
            "people perhaps person pick picture piece place plan plant play please point poor power practice prepare " +
            "present press pretty probably problem produce promise prove provide pull push put question quick quiet " +
            "quite race rain raise rather reach read ready real reason receive record red remember rest result return " +
            "rich ride right ring rise river road rock roll room round rule run safe said same save say school science " +
            "sea season seat second see seem self sell send sense sentence serve set seven several shall shape share she " +
            "ship short should shoulder show side sign simple since sing sister sit six size skill sky sleep slow small " +
            "smile snow so soft some song soon sound south space speak special spell spend spread spring stand star " +
            "start state stay step still stone stop store story street strong study subject such summer sun supply sure " +
            "surface system table take talk teach team tell ten than that the their them then there these they thing " +
            "think third this those though thought thousand three through time to today together too top total touch " +
            "toward town travel tree true try turn twenty two under understand unit until up upon use usual value very " +
            "view visit voice wait walk want warm watch water wave way we wear weather week well west what wheel when " +
            "where which while white who whole why wide wife wild will win wind window winter wish with within without " +
            "woman wonder wood word work world would write year yes yet you young").split(" ");

        /* ==================================================================
           Safe storage wrapper — localStorage when available, in-memory
           fallback when it isn't (private browsing, sandboxed previews, …).
           ================================================================== */
        var store = {
            mem: {},
            get: function (k) {
                try { var v = localStorage.getItem(k); return v === null ? (k in this.mem ? this.mem[k] : null) : v; }
                catch (e) { return k in this.mem ? this.mem[k] : null; }
            },
            set: function (k, v) {
                this.mem[k] = v;
                try { localStorage.setItem(k, v); } catch (e) { /* memory only */ }
            }
        };

        function loadJSON(k, fallback) {
            var raw = store.get(k);
            if (raw === null) return fallback;
            try { return JSON.parse(raw); } catch (e) { return fallback; }
        }

        /* ==================================================================
           Seeded randomness — every test has a seed, so any run can be
           repeated exactly or shared as a race link. Daily flights are the
           seed "daily-YYYY-MM-DD", identical for everyone on Earth.
           ================================================================== */
        function xmur3(str) {
            var h = 1779033703 ^ str.length;
            for (var i = 0; i < str.length; i++) {
                h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
                h = (h << 13) | (h >>> 19);
            }
            return function () {
                h = Math.imul(h ^ (h >>> 16), 2246822507);
                h = Math.imul(h ^ (h >>> 13), 3266489909);
                return (h ^= h >>> 16) >>> 0;
            };
        }
        function mulberry32(a) {
            return function () {
                var t = (a += 0x6D2B79F5);
                t = Math.imul(t ^ (t >>> 15), t | 1);
                t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }
        function seededRand(seed) { return mulberry32(xmur3(seed)()); }
        function randomSeed() {
            return Math.random().toString(36).slice(2, 8) + Math.random().toString(36).slice(2, 4);
        }
        function utcDateStr() {
            var d = new Date();
            var p = function (n) { return (n < 10 ? "0" : "") + n; };
            return d.getUTCFullYear() + "-" + p(d.getUTCMonth() + 1) + "-" + p(d.getUTCDate());
        }

        var session = { race: null }; /* {seed, daily, label} while a seeded run is active */

        /* ==================================================================
           Config
           ================================================================== */
        var TIME_OPTIONS = [15, 30, 60, 120];
        var WORD_OPTIONS = [10, 25, 50, 100];
        var EXTRA_CAP = 8;

        var config = loadJSON("tg:config", {});
        if (config.mode !== "time" && config.mode !== "words" && config.mode !== "zen") config.mode = "time";
        if (TIME_OPTIONS.indexOf(config.time) === -1) config.time = 30;
        if (WORD_OPTIONS.indexOf(config.words) === -1) config.words = 25;
        config.punct = !!config.punct;
        config.nums = !!config.nums;
        config.sound = !!config.sound;

        function saveConfig() { store.set("tg:config", JSON.stringify(config)); }

        /* ------------------------------------------------------------------
           Readability & motion settings — personal comfort, stored apart
           from the test config so race links and presets never touch them.
           ------------------------------------------------------------------ */
        var settings = loadJSON("tg:settings", {});
        settings.spread = typeof settings.spread === "number" &&
        settings.spread >= 0.3 && settings.spread <= 1.5 ? settings.spread : 1;
        settings.fog = { clear: 1, classic: 1, deep: 1 }[settings.fog] ? settings.fog : "classic";
        settings.tsize = [0.85, 1, 1.15].indexOf(settings.tsize) !== -1 ? settings.tsize : 1;
        settings.motion = { full: 1, steady: 1, minimal: 1 }[settings.motion] ? settings.motion : "full";
        function saveSettings() { store.set("tg:settings", JSON.stringify(settings)); }

        /* opacity of words 1..5 ahead, per fog preset */
        var FOG_PRESETS = {
            clear:   [0.95, 0.8, 0.6, 0.38, 0.2],
            classic: [0.85, 0.62, 0.42, 0.25, 0.12],
            deep:    [0.6, 0.35, 0.2, 0.1, 0.05]
        };

        var motionOK = true;
        try { motionOK = !(window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches); }
        catch (e) { /* keep default */ }
        /* 1 = full flight, 0.45 = steady, 0 = minimal; OS reduced-motion wins */
        var motionK = motionOK ? 1 : 0;

        /* ==================================================================
           DOM handles
           ================================================================== */
        var $ = function (id) { return document.getElementById(id); };
        var sceneEl = $("scene"), rigEl = $("rig"), worldEl = $("world"), floorEl = $("floor"),
            starsEl = $("stars"), wordsEl = $("words"), introEl = $("intro"), paceEl = $("pace"),
            streaksEl = $("streaks"), flashEl = $("flash"), ghost = $("ghost"),
            nebulaEl = $("nebula"), goldEl = $("gold"), cometEl = $("comet"),
            liveEl = $("live"), liveWpm = $("live-wpm"), liveAcc = $("live-acc"),
            liveProgress = $("live-progress"),
            liveHint = $("live-hint"), streakBox = $("streakbox"), liveStreak = $("live-streak"),
            capsEl = $("caps"), resultsEl = $("results"), configEl = $("config"),
            valueGroup = $("value-group"), punctBtn = $("punct-toggle"), numsBtn = $("nums-toggle"),
            dailyBtn = $("daily-btn"), raceBadge = $("race-badge"),
            rWpm = $("r-wpm"), rAcc = $("r-acc"), rChart = $("r-chart"), rSub = $("r-sub"),
            rTrend = $("r-trend"), rKeys = $("r-keys"), rShare = $("r-share"),
            settingsBtn = $("settings-toggle"), settingsPanel = $("settings"),
            spreadInput = $("set-spread"), spreadVal = $("set-spread-val");

        /* ==================================================================
           Sound — synthesised blips plus a velocity-following engine hum.
           Off by default; everything is lazy and guarded.
           ================================================================== */
        var audio = { ctx: null, hum: null, humGain: null };
        function audioCtx() {
            var AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return null;
            if (!audio.ctx) audio.ctx = new AC();
            if (audio.ctx.state === "suspended") audio.ctx.resume();
            return audio.ctx;
        }
        function beep(type, freq, dur, gain, slide) {
            if (!config.sound) return;
            try {
                var ctx = audioCtx();
                if (!ctx) return;
                var t = ctx.currentTime;
                var o = ctx.createOscillator(), g = ctx.createGain();
                o.type = type;
                o.frequency.setValueAtTime(freq, t);
                if (slide) o.frequency.exponentialRampToValueAtTime(slide, t + dur);
                g.gain.setValueAtTime(gain, t);
                g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
                o.connect(g).connect(ctx.destination);
                o.start(t);
                o.stop(t + dur + 0.02);
            } catch (e) { /* audio unavailable */ }
        }
        function humStart() {
            if (!config.sound || motionK === 0 || audio.hum) return;
            try {
                var ctx = audioCtx();
                if (!ctx) return;
                var o = ctx.createOscillator(), g = ctx.createGain();
                o.type = "triangle";
                o.frequency.value = 52;
                g.gain.value = 0.0001;
                g.gain.linearRampToValueAtTime(0.014, ctx.currentTime + 0.6);
                o.connect(g).connect(ctx.destination);
                o.start();
                audio.hum = o; audio.humGain = g;
            } catch (e) { /* audio unavailable */ }
        }
        function humStop() {
            if (!audio.hum) return;
            try {
                var ctx = audio.ctx, t = ctx.currentTime;
                audio.humGain.gain.linearRampToValueAtTime(0.0001, t + 0.4);
                audio.hum.stop(t + 0.5);
            } catch (e) { /* ignore */ }
            audio.hum = null; audio.humGain = null;
        }
        function humPitch(speedNorm) {
            if (!audio.hum) return;
            try { audio.hum.frequency.value = 52 + speedNorm * 75; } catch (e) { /* ignore */ }
        }
        /* Each perfect word climbs a pentatonic scale; an error resets the melody. */
        var SCALE = [220, 261.63, 293.66, 329.63, 392, 440, 523.25, 587.33, 659.25, 783.99];
        var sfx = {
            click: function () { beep("triangle", 520 + Math.random() * 140, 0.04, 0.04); },
            err:   function () { beep("square", 150, 0.07, 0.05); },
            woosh: function () { beep("sine", 240, 0.18, 0.03, 70); },
            note:  function (step) {
                var f = SCALE[Math.max(0, Math.min(SCALE.length - 1, step - 1))];
                beep("sine", f, 0.14, 0.05);
                beep("triangle", f * 2, 0.07, 0.012);
            },
            gold:  function () { beep("sine", 523.25, 0.22, 0.05, 1046.5); beep("sine", 659.25, 0.3, 0.035, 1318.5); },
            done:  function () { beep("sine", 660, 0.16, 0.05, 990); }
        };

        /* ==================================================================
           Word generation
           ================================================================== */
        function rng() { return Math.random(); } /* visuals only — never word generation */

        function randomNumberWord(rand) {
            var len = 2 + Math.floor(rand() * 3);
            var s = String(1 + Math.floor(rand() * 9));
            while (s.length < len) s += Math.floor(rand() * 10);
            return s;
        }

        function makeWordGen(rand) {
            var prev = null;
            var capitalizeNext = config.punct;
            return function next() {
                var w;
                if (config.nums && rand() < 0.12) {
                    w = randomNumberWord(rand);
                } else {
                    w = WORDS[Math.floor(rand() * WORDS.length)];
                    if (w === prev) w = WORDS[Math.floor(rand() * WORDS.length)];
                }
                prev = w;
                if (config.punct) {
                    if (capitalizeNext && /^[a-z]/.test(w)) w = w.charAt(0).toUpperCase() + w.slice(1);
                    capitalizeNext = false;
                    var r = rand();
                    if (r < 0.1) { w += ".?!".charAt(Math.floor(rand() * 3)); capitalizeNext = true; }
                    else if (r < 0.17) w += ",";
                    else if (r < 0.195) w += rand() < 0.5 ? ";" : ":";
                    else if (r < 0.225) w = '"' + w + '"';
                    else if (r < 0.245) w = "(" + w + ")";
                    else if (r < 0.27 && /[a-z]$/.test(w) && !/s$/.test(w)) w += "'s";
                }
                return w;
            };
        }

        /* ==================================================================
           The flight path — pure math, no DOM measurement anywhere.
           Word i lives at posOf(i); the camera springs between stops.
           A wide spiral winds the words around the flight axis so each one
           gets its own patch of sky — tuned by a player in the field, then
           made adjustable: settings.spread scales the whole helix.
           ================================================================== */
        var SPAN_Z = 300;   /* distance between words */
        var CAM_BACK = 250; /* how far behind the active word the camera flies */
        var CAM_LIFT = -14; /* camera slightly above the path */

        function posOf(i) {
            return {
                x: Math.sin(i * 0.21) * 530 * settings.spread,
                y: Math.sin(i * 0.63) * 130 * settings.spread,
                z: -i * SPAN_Z
            };
        }

        var cam = {
            x: 0, y: 0, z: 0,
            vx: 0, vy: 0, vz: 0,
            flash: 0,          /* error vignette intensity */
            speedNorm: 0,      /* 0..1, smoothed wpm/140 */
            spin: 0            /* streak overlay rotation */
        };

        function camTarget() {
            var p = posOf(test ? test.idx : 0);
            return { x: p.x, y: p.y + CAM_LIFT, z: p.z + CAM_BACK };
        }

        function snapCamera() {
            var t = camTarget();
            cam.x = t.x; cam.y = t.y; cam.z = t.z;
            cam.vx = cam.vy = cam.vz = 0;
            cam.flash = 0;
            cam.speedNorm = 0;
            applyCamera();
        }

        function applyCamera() {
            worldEl.style.transform =
                "translate3d(" + (-cam.x).toFixed(2) + "px," + (-cam.y).toFixed(2) + "px," + (-cam.z).toFixed(2) + "px)";
            var roll = motionK ? Math.max(-3.5, Math.min(3.5, -cam.vx * 0.012 * motionK)) : 0;
            var pitch = motionK ? Math.max(-2, Math.min(2, -1 + cam.vz * 0.0011 * motionK)) : -1;
            rigEl.style.transform = "rotateX(" + pitch.toFixed(2) + "deg) rotateZ(" + roll.toFixed(2) + "deg)";
            /* the graph-paper floor scrolls with flight */
            floorEl.style.backgroundPosition =
                (-cam.x * 0.85).toFixed(1) + "px " + (-cam.z * 0.85).toFixed(1) + "px, " +
                (-cam.x * 0.85).toFixed(1) + "px " + (-cam.z * 0.85).toFixed(1) + "px";
            nebulaEl.style.transform =
                "translate(" + (-cam.x * 0.016).toFixed(1) + "px," + (-cam.y * 0.012).toFixed(1) + "px)";
        }

        /* ------------------------------------------------------------------
           Starfield — children of #world with fixed coordinates; the moving
           world flies past them. Recycled ahead once the camera passes them.
           ------------------------------------------------------------------ */
        var STAR_RANGE = 5200;
        var stars = [];

        function initStars() {
            var count = (window.innerWidth || 1200) < 640 ? 55 : 110;
            var h = "";
            for (var i = 0; i < count; i++) h += '<i class="star' + (rng() < 0.16 ? " b" : "") + '"></i>';
            starsEl.innerHTML = h;
            stars = [];
            var els = starsEl.children;
            for (var j = 0; j < els.length; j++) {
                var s = {
                    el: els[j],
                    x: (rng() - 0.5) * 2000,
                    y: (rng() - 0.5) * 1100,
                    z: -rng() * STAR_RANGE
                };
                placeStar(s);
                stars.push(s);
            }
        }
        function placeStar(s) {
            var size = (0.18 - s.z / STAR_RANGE).toFixed(2);
            s.el.style.transform = "translate3d(" + s.x.toFixed(0) + "px," + s.y.toFixed(0) + "px," +
                s.z.toFixed(0) + "px) scale(" + Math.max(0.5, Math.min(2, 1 + +size)) + ")";
        }
        function recycleStars() {
            for (var i = 0; i < stars.length; i++) {
                var s = stars[i];
                if (s.z > cam.z + 240) {
                    s.z -= STAR_RANGE;
                    s.x = cam.x + (rng() - 0.5) * 2000;
                    s.y = cam.y + (rng() - 0.5) * 1100;
                    placeStar(s);
                }
            }
        }

        /* ==================================================================
           Test state
           ================================================================== */
        var test = null;

        function blankTest(words) {
            return {
                words: words,
                typed: [],
                commitChars: [],
                idx: 0,
                cur: "",
                gen: null,
                seed: "",
                started: false,
                finished: false,
                startTime: 0,
                endTime: 0,
                netChars: 0,
                rawChars: 0,
                ksCorrect: 0,
                ksWrong: 0,
                streak: 0,
                bestStreak: 0,
                marks: [],           /* elapsed seconds at each word commit (for replay ghosts) */
                keys: {},            /* per-expected-character {o, b} outcomes */
                samples: [],
                _lastSampleSec: 0,
                _lastRaw: 0,
                _lastErr: 0,
                timerId: 0,
                pbPace: null,        /* wpm of the stored PB for this config, if any */
                pbMarks: null,       /* commit timeline of the PB run, if recorded */
                _ghostPtr: 0,
                _passedGhost: false
            };
        }

        function wordCountTarget() { return config.mode === "words" ? config.words : 80; }

        /* Words are always generated from the test's seed, so "repeat" (Esc),
           race links, and daily flights are all exactly reproducible —
           including the words a time/zen run appends mid-flight. */
        function buildWords(reuse) {
            var seed = reuse && test ? test.seed
                : session.race ? session.race.seed
                    : randomSeed();
            var gen = makeWordGen(seededRand(seed));
            var n = wordCountTarget();
            var out = [];
            for (var i = 0; i < n; i++) out.push(gen());
            out._gen = gen;
            out._seed = seed;
            return out;
        }

        /* ==================================================================
           Word rendering in space
           ================================================================== */
        function esc(s) {
            return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        function wordTransform(i) {
            var p = posOf(i);
            return "translate(-50%, -50%) translate3d(" + p.x + "px," + p.y + "px," + p.z + "px)";
        }

        function spawnWords(from, to) {
            var h = "";
            for (var i = from; i < to; i++) {
                var ahead = i - test.idx;
                var fog = ahead >= 0 ? " f" + Math.min(5, ahead) : "";
                h += '<span class="word' + fog + '" style="transform:' + wordTransform(i) + '"><span class="wbox">';
                var w = test.words[i];
                for (var j = 0; j < w.length; j++) h += '<span class="ch">' + esc(w.charAt(j)) + "</span>";
                h += "</span></span>";
            }
            wordsEl.insertAdjacentHTML("beforeend", h);
        }

        function activeWordEl() { return wordsEl.children[test.idx]; }
        function boxOf(el) { return el.firstChild; }

        /* Repaint one word's characters against what was typed for it.
           `cursor` marks the glyph the player is on — the caret, reborn. */
        function paintWord(el, target, typed, cursor) {
            var h = "", i;
            for (i = 0; i < target.length; i++) {
                var cls = "";
                if (i < typed.length) cls = typed.charAt(i) === target.charAt(i) ? " ok" : " bad";
                if (cursor && i === typed.length) cls += " cur";
                h += '<span class="ch' + cls + '">' + esc(target.charAt(i)) + "</span>";
            }
            for (i = target.length; i < typed.length; i++) {
                h += '<span class="ch extra">' + esc(typed.charAt(i)) + "</span>";
            }
            boxOf(el).innerHTML = h;
            el.classList.toggle("tail-cur", !!cursor && typed.length >= target.length);
        }

        /* depth fog: opacity by distance ahead, updated only around commits */
        function updateFog() {
            var els = wordsEl.children;
            var from = Math.max(0, test.idx - 2), to = Math.min(els.length, test.idx + 9);
            for (var i = from; i < to; i++) {
                var el = els[i];
                if (el.classList.contains("past")) continue;
                el.className = el.className.replace(/\bf[0-5]\b\s*/g, "");
                var ahead = i - test.idx;
                if (ahead >= 0) el.classList.add("f" + Math.min(5, ahead));
            }
        }

        /* a committed word flies past the camera */
        function flyPast(el, i, perfect) {
            var p = posOf(i);
            el.classList.add("past");
            if (!perfect) el.classList.add("flawed");
            if (motionK > 0) {
                var side = p.x >= 0 ? 1 : -1;
                el.style.transform = "translate(-50%, -50%) translate3d(" +
                    (p.x + side * 340) + "px," + (p.y + 90) + "px," + (p.z + CAM_BACK + 480) + "px)" +
                    (perfect ? "" : " rotateZ(" + side * 24 + "deg)");
            }
            el._byeTimer = setTimeout(function () { el.style.visibility = "hidden"; }, 750);
        }

        /* backspacing into a flawed word recalls it from the void */
        function recall(el, i) {
            clearTimeout(el._byeTimer);
            el.style.visibility = "";
            el.classList.remove("past", "flawed", "tail-cur");
            el.style.transform = wordTransform(i);
        }

        /* a small brass burst at a word's position — streak milestones,
           overtaking your pb ghost */
        function burst(i, n) {
            if (motionK < 1) return;
            var p = posOf(Math.max(0, Math.min(i, test.words.length - 1)));
            for (var k = 0; k < n; k++) {
                (function () {
                    var d = document.createElement("i");
                    d.className = "burst-dot";
                    d.style.transform = "translate3d(" + p.x + "px," + p.y + "px," + p.z + "px)";
                    worldEl.appendChild(d);
                    requestAnimationFrame(function () {
                        var a = Math.random() * Math.PI * 2, r = 70 + Math.random() * 130;
                        d.style.transform = "translate3d(" + (p.x + Math.cos(a) * r).toFixed(0) + "px," +
                            (p.y + Math.sin(a) * r * 0.7 - 30).toFixed(0) + "px," +
                            (p.z + 60 + Math.random() * 130).toFixed(0) + "px)";
                        d.style.opacity = "0";
                    });
                    setTimeout(function () { if (d.parentNode) d.parentNode.removeChild(d); }, 720);
                })();
            }
        }

        /* ==================================================================
           Stats (identical engine to the 2D version — fully test-covered)
           ================================================================== */
        function matchCount(typed, target) {
            var n = Math.min(typed.length, target.length), c = 0;
            for (var i = 0; i < n; i++) if (typed.charAt(i) === target.charAt(i)) c++;
            return c;
        }

        function elapsedSec() {
            var end = test.finished ? test.endTime : performance.now();
            return Math.max(0.001, (end - test.startTime) / 1000);
        }

        function netWpmNow() {
            var chars = test.netChars + matchCount(test.cur, test.words[test.idx] || "");
            return (chars / 5) / (elapsedSec() / 60);
        }

        function accuracyNow() {
            var total = test.ksCorrect + test.ksWrong;
            return total === 0 ? null : (test.ksCorrect / total) * 100;
        }

        function pushSamplesUpTo(sec) {
            while (test._lastSampleSec < sec) {
                test._lastSampleSec++;
                var s = test._lastSampleSec;
                var chars = test.netChars + matchCount(test.cur, test.words[test.idx] || "");
                test.samples.push({
                    t: s,
                    dur: 1,
                    raw: test.rawChars - test._lastRaw,
                    err: test.ksWrong - test._lastErr,
                    net: (chars / 5) / (s / 60)
                });
                test._lastRaw = test.rawChars;
                test._lastErr = test.ksWrong;
            }
        }

        /* ==================================================================
           HUD
           ================================================================== */
        function updateLive() {
            if (!test.started) {
                liveProgress.textContent = config.mode === "time" ? config.time + "s"
                    : config.mode === "words" ? "0/" + config.words : "∞";
                liveWpm.textContent = "0";
                liveAcc.textContent = "–";
                liveHint.textContent = "start typing to launch";
                streakBox.classList.remove("on");
                return;
            }
            liveHint.textContent = config.mode === "zen" ? "enter to land" : "";
            var el = elapsedSec();
            liveProgress.textContent = config.mode === "time"
                ? Math.max(0, Math.ceil(config.time - el)) + "s"
                : config.mode === "words"
                    ? test.idx + "/" + config.words
                    : fmtTime(el) + " · " + test.idx + "w";
            liveWpm.textContent = el >= 2 ? String(Math.round(netWpmNow())) : "–";
            var acc = accuracyNow();
            liveAcc.textContent = acc === null ? "–" : Math.round(acc) + "%";
            var showStreak = test.streak >= 5;
            streakBox.classList.toggle("on", showStreak);
            if (showStreak) liveStreak.textContent = String(test.streak);
        }

        /* ==================================================================
           Test lifecycle
           ================================================================== */
        function newTest(reuseWords) {
            if (test && test.timerId) clearInterval(test.timerId);
            humStop();
            var words = buildWords(reuseWords);
            test = blankTest(words);
            test.gen = words._gen;
            test.seed = words._seed;

            var pbs = loadJSON("tg:pb", {});
            var pb = pbs[pbKey()];
            test.pbPace = pb ? pb.wpm : null;
            var mk = pb && pb.marks && pb.marks.length ? pb.marks : null;
            if (mk) {
                /* a replay averaging >5 word-commits per second is not a typing
                   run — ignore the timeline and fall back to constant pace */
                var lastT = mk[mk.length - 1];
                if (!(lastT > 0) || mk.length / lastT > 5) mk = null;
            }
            test.pbMarks = mk;

            wordsEl.innerHTML = "";
            spawnWords(0, test.words.length);
            paintWord(activeWordEl(), test.words[0], "", true);
            updateFog();

            introEl.classList.remove("gone");
            introEl.style.visibility = "";
            introEl.style.transform = "translate(-50%, -50%) translate3d(0px, -150px, -430px)";
            paceEl.classList.remove("on", "behind");

            resultsEl.classList.add("hide");
            resultsEl.classList.remove("show");
            document.body.classList.remove("typing", "warp");
            liveEl.classList.remove("hide");
            ghost.value = "";
            ghost.disabled = false;

            snapCamera();
            updateLive();
            focusGhost();
        }

        function launchIntro() {
            if (introEl.classList.contains("gone")) return;
            introEl.classList.add("gone");
            if (motionK > 0) {
                introEl.style.transform =
                    "translate(-50%, -50%) translate3d(0px, -640px, -190px) rotateX(38deg)";
            }
            setTimeout(function () { introEl.style.visibility = "hidden"; }, 1000);
        }

        function startClock() {
            test.started = true;
            test.startTime = performance.now();
            test.timerId = setInterval(tick, 250);
            document.body.classList.add("typing");
            launchIntro();
            humStart();
            updateLive();
        }

        function tick() {
            if (!test.started || test.finished) return;
            var el = elapsedSec();
            pushSamplesUpTo(Math.floor(el));
            if (config.mode === "time" && el >= config.time) {
                finishTest(test.startTime + config.time * 1000);
                return;
            }
            updateLive();
            updatePace(el);
        }

        /* PB pace ghost — replays your best run's actual commit timeline.
           Falls back to constant pace for PBs recorded without a timeline. */
        function ghostIndexAt(elapsed) {
            var marks = test.pbMarks;
            if (marks) {
                var p = test._ghostPtr;
                while (p < marks.length && marks[p] <= elapsed) p++;
                test._ghostPtr = p;
                var prevT = p === 0 ? 0 : marks[p - 1];
                var nextT;
                if (p < marks.length) {
                    nextT = marks[p];
                } else {
                    /* past the recording: keep marching at the run's closing rhythm */
                    var gap = marks.length >= 4
                        ? (marks[marks.length - 1] - marks[marks.length - 4]) / 3
                        : Math.max(0.3, marks[0] || 0.6);
                    if (gap <= 0.05) gap = 0.4;
                    var extra = Math.floor((elapsed - prevT) / gap);
                    p += extra;
                    prevT += extra * gap;
                    nextT = prevT + gap;
                }
                var frac = Math.min(1, Math.max(0, (elapsed - prevT) / Math.max(0.05, nextT - prevT)));
                return p + frac;
            }
            var charsExpected = (test.pbPace * 5 / 60) * elapsed;
            var fi = 0, acc = 0;
            while (fi < test.words.length - 1) {
                var step = test.words[fi].length + 1;
                if (acc + step > charsExpected) break;
                acc += step;
                fi++;
            }
            var f = Math.min(1, Math.max(0, (charsExpected - acc) / (test.words[fi].length + 1)));
            return fi + f;
        }

        function updatePace(elapsed) {
            if (test.pbPace === null) { paceEl.classList.remove("on"); return; }
            var gi = ghostIndexAt(elapsed);
            var i0 = Math.max(0, Math.min(test.words.length - 2, Math.floor(gi)));
            var frac = Math.max(0, Math.min(1, gi - i0));
            var a = posOf(i0), b = posOf(i0 + 1);
            var x = a.x + (b.x - a.x) * frac, y = a.y + (b.y - a.y) * frac + 72, z = a.z + (b.z - a.z) * frac;
            paceEl.style.transform = "translate(-50%, -50%) translate3d(" + x.toFixed(1) + "px," +
                y.toFixed(1) + "px," + (z + 8).toFixed(1) + "px)";
            paceEl.classList.add("on");

            var passed = test.idx > gi;
            if (passed && !test._passedGhost) {
                test._passedGhost = true;
                if (motionK > 0) {
                    goldEl.classList.remove("pop");
                    void goldEl.offsetWidth;
                    goldEl.classList.add("pop");
                }
                burst(test.idx, 14);
                sfx.gold();
            }
            paceEl.classList.toggle("behind", passed);
        }

        function maybeExtendWords() {
            if (config.mode === "words") return;
            if (test.idx <= test.words.length - 25) return;
            var from = test.words.length;
            var add = [];
            for (var i = 0; i < 40; i++) add.push(test.gen());
            test.words = test.words.concat(add);
            spawnWords(from, test.words.length);
        }

        function commitWord(viaSpace) {
            var target = test.words[test.idx];
            var typed = test.cur;
            var el = activeWordEl();
            paintWord(el, target, typed, false);
            var perfect = typed === target;
            if (perfect) {
                test.streak++;
                if (test.streak > test.bestStreak) test.bestStreak = test.streak;
                sfx.note(test.streak);
                if (test.streak > 0 && test.streak % 10 === 0) burst(test.idx, 10);
            } else {
                test.streak = 0;
                sfx.woosh();
            }
            flyPast(el, test.idx, perfect);
            if (test.started) test.marks.push(elapsedSec());

            var credit = matchCount(typed, target) + (perfect && viaSpace ? 1 : 0);
            test.typed[test.idx] = typed;
            test.commitChars[test.idx] = credit;
            test.netChars += credit;
            test.idx++;
            test.cur = "";
            ghost.value = "";
            updateFog();
            /* only a clean commit earns the lunge — sloppy ones barely nudge */
            if (motionK) cam.vz -= (perfect ? 240 : 50) * motionK;
        }

        function backToPreviousWord(clearIt) {
            if (test.idx === 0 || test.finished) return;
            var prevTyped = test.typed[test.idx - 1];
            var prevTarget = test.words[test.idx - 1];
            if (prevTyped === prevTarget) return; /* perfect words are locked */
            test.idx--;
            test.netChars -= test.commitChars[test.idx] || 0;
            if (test.marks.length) test.marks.pop();
            test.cur = clearIt ? "" : prevTyped;
            ghost.value = test.cur;
            var el = activeWordEl();
            recall(el, test.idx);
            paintWord(el, prevTarget, test.cur, true);
            updateFog();
        }

        function finishTest(endTimeMs) {
            if (test.finished) return;
            test.finished = true;
            test.endTime = endTimeMs || performance.now();
            clearInterval(test.timerId);
            test.timerId = 0;
            humStop();

            var el = elapsedSec();
            pushSamplesUpTo(Math.floor(el));
            var frac = el - Math.floor(el);
            if (frac > 0.25 || test.samples.length === 0) {
                test.samples.push({
                    t: el,
                    dur: frac || el,
                    raw: test.rawChars - test._lastRaw,
                    err: test.ksWrong - test._lastErr,
                    net: netWpmNow()
                });
            }

            ghost.blur();
            ghost.disabled = true;
            sceneEl.classList.remove("unfocused");
            document.body.classList.remove("typing", "warp");
            liveEl.classList.add("hide");
            paceEl.classList.remove("on");
            test._cruiseStart = performance.now();
            sfx.done();
            showResults();
        }

        /* ==================================================================
           Results
           ================================================================== */
        function pbKey() {
            if (session.race && session.race.daily) return "daily:" + session.race.seed.slice(6);
            var v = config.mode === "time" ? config.time : config.mode === "words" ? config.words : "∞";
            return config.mode + ":" + v + ":" + (config.punct ? 1 : 0) + (config.nums ? 1 : 0);
        }

        /* daily flights share one history thread so the sparkline spans days */
        function histKey() {
            return session.race && session.race.daily ? "daily" : pbKey();
        }

        function charStats() {
            var ok = 0, bad = 0, extra = 0, missed = 0, i, j;
            for (i = 0; i < test.idx; i++) {
                var w = test.words[i], t = test.typed[i] || "";
                var n = Math.min(w.length, t.length);
                for (j = 0; j < n; j++) (t.charAt(j) === w.charAt(j)) ? ok++ : bad++;
                if (t.length > w.length) extra += t.length - w.length;
                if (w.length > t.length) missed += w.length - t.length;
            }
            var curT = test.cur, curW = test.words[test.idx] || "";
            var m = Math.min(curT.length, curW.length);
            for (j = 0; j < m; j++) (curT.charAt(j) === curW.charAt(j)) ? ok++ : bad++;
            if (curT.length > curW.length) extra += curT.length - curW.length;
            return { ok: ok, bad: bad, extra: extra, missed: missed };
        }

        function consistency() {
            var vals = [];
            for (var i = 0; i < test.samples.length; i++) {
                var s = test.samples[i];
                if (s.dur >= 0.5) vals.push((s.raw / 5) * (60 / s.dur));
            }
            if (vals.length < 2) return null;
            var mean = vals.reduce(function (a, b) { return a + b; }, 0) / vals.length;
            if (mean <= 0) return null;
            var varSum = vals.reduce(function (a, b) { return a + (b - mean) * (b - mean); }, 0);
            var cv = Math.sqrt(varSum / vals.length) / mean;
            return Math.max(0, Math.min(100, Math.round((1 - cv) * 100)));
        }

        function fmtTime(sec) {
            if (sec < 60) return (Math.round(sec * 10) / 10) + "s";
            var m = Math.floor(sec / 60), s = Math.round(sec % 60);
            return m + ":" + (s < 10 ? "0" : "") + s;
        }

        function showResults() {
            var el = elapsedSec();
            var minutes = el / 60;
            var net = Math.round((test.netChars + matchCount(test.cur, test.words[test.idx] || "")) / 5 / minutes);
            var raw = Math.round(test.rawChars / 5 / minutes);
            var acc = accuracyNow();
            var accR = acc === null ? 0 : Math.round(acc);
            var cons = consistency();
            var cs = charStats();

            rWpm.textContent = String(net);
            rAcc.textContent = accR + "%";

            /* Runs below 70% accuracy are unranked: they can't set a PB, feed
               the ghost a timeline, or pollute the trend — spamming through
               words is its own reward and nothing more. */
            var ranked = acc !== null && acc >= 70;

            var pbs = loadJSON("tg:pb", {});
            var key = pbKey();
            var old = pbs[key];
            var isNew = ranked && (!old || net > old.wpm);
            if (isNew) {
                var entry = { wpm: net, acc: accR, t: Date.now() };
                if (test.marks.length && test.marks.length <= 240) {
                    entry.marks = test.marks.map(function (m) { return Math.round(m * 10) / 10; });
                }
                pbs[key] = entry;
                store.set("tg:pb", JSON.stringify(pbs));
            }

            if (ranked) {
                /* progress history (for the sparkline) */
                var hist = loadJSON("tg:hist", []);
                hist.push({ k: histKey(), w: net, a: accR, t: Date.now() });
                if (hist.length > 90) hist = hist.slice(-90);
                store.set("tg:hist", JSON.stringify(hist));

                /* lifetime per-key stats (for the all-time heatmap view) */
                var lifetime = loadJSON("tg:keys", {});
                for (var kc in test.keys) {
                    var src = test.keys[kc];
                    var dst = lifetime[kc] || (lifetime[kc] = { o: 0, b: 0 });
                    dst.o += src.o;
                    dst.b += src.b;
                }
                store.set("tg:keys", JSON.stringify(lifetime));
            }

            var modeStr = config.mode === "time" ? "time " + config.time + "s"
                : config.mode === "words" ? "words " + config.words : "zen";
            if (config.punct) modeStr += " · punctuation";
            if (config.nums) modeStr += " · numbers";

            var crown = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">' +
                '<path d="M3 8l4.5 4L12 5l4.5 7L21 8l-1.6 10H4.6L3 8z"/></svg>';
            var pbHTML = !ranked
                ? '<span title="Flights under 70% accuracy don\'t set records">unranked · accuracy &lt; 70%</span>'
                : isNew
                    ? '<span class="pb-new">' + crown + " new best</span>"
                    : old
                        ? "best <b>" + old.wpm + "</b>"
                        : "";

            rSub.innerHTML =
                (session.race ? '<span class="pb-new">' + esc(session.race.label) + "</span>" : "") +
                "<span>raw <b>" + raw + "</b></span>" +
                "<span>consistency <b>" + (cons === null ? "–" : cons + "%") + "</b></span>" +
                '<span title="correct / incorrect / extra / missed">chars <b>' +
                cs.ok + "/" + cs.bad + "/" + cs.extra + "/" + cs.missed + "</b></span>" +
                "<span>streak <b>" + test.bestStreak + "</b></span>" +
                "<span>time <b>" + fmtTime(el) + "</b></span>" +
                "<span>" + modeStr + "</span>" +
                "<span>" + pbHTML + "</span>";

            if (ranked) {
                renderTrend();
            } else {
                rTrend.innerHTML = '<div class="tr-cap">unranked flight — not counted in your trend</div>';
            }
            kbScope = "flight";
            renderKeys();
            rShare.textContent = "copy race link";
            var oldUrl = resultsEl.querySelector(".r-url");
            if (oldUrl) oldUrl.remove();

            rChart.innerHTML = buildChart();
            resultsEl.classList.remove("hide");
            resultsEl.classList.add("show");
        }

        /* ------------------------------------------------------------------
           Progress sparkline — your recent flights on this exact setup
           ------------------------------------------------------------------ */
        function renderTrend() {
            var key = histKey();
            var all = loadJSON("tg:hist", []).filter(function (e) { return e.k === key; });
            var recent = all.slice(-12);
            if (recent.length < 2) {
                rTrend.innerHTML = '<div class="tr-cap">first flight on this setup — baseline set</div>';
                return;
            }
            var prev = recent.slice(0, -1);
            var avg = prev.reduce(function (a, e) { return a + e.w; }, 0) / prev.length;
            var delta = Math.round(recent[recent.length - 1].w - avg);
            var lo = Infinity, hi = -Infinity;
            recent.forEach(function (e) { lo = Math.min(lo, e.w); hi = Math.max(hi, e.w); });
            if (hi - lo < 6) { hi += 3; lo -= 3; }
            var W = 260, H = 44, P = 5;
            function px(i) { return P + (i / (recent.length - 1)) * (W - 2 * P); }
            function py(w) { return H - P - ((w - lo) / (hi - lo)) * (H - 2 * P); }
            var pts = recent.map(function (e, i) { return px(i).toFixed(1) + "," + py(e.w).toFixed(1); });
            var s = '<svg viewBox="0 0 ' + W + " " + H + '" role="img" aria-label="recent wpm trend">' +
                '<polyline points="' + pts.join(" ") + '" fill="none" stroke="var(--brass)" ' +
                'stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>';
            recent.forEach(function (e, i) {
                var last = i === recent.length - 1;
                s += '<circle cx="' + px(i).toFixed(1) + '" cy="' + py(e.w).toFixed(1) + '" r="' +
                    (last ? 3.4 : 2) + '" fill="var(--brass)"' + (last ? "" : ' opacity="0.55"') + "/>";
            });
            s += "</svg>";
            var dCls = delta >= 0 ? "up" : "dn";
            var dTxt = (delta >= 0 ? "+" : "") + delta;
            rTrend.innerHTML = s +
                '<div class="tr-cap">last <b>' + recent.length + '</b> flights · <span class="' + dCls + '">' +
                dTxt + "</span> vs your average</div>";
        }

        /* ------------------------------------------------------------------
           Trouble keys — a heatmap of where errors actually happen.
           Click the caption to switch between this flight and all-time.
           ------------------------------------------------------------------ */
        var KB_ROWS = ["qwertyuiop", "asdfghjkl", "zxcvbnm"];
        var kbScope = "flight";

        function keyCell(label, d, extraCls) {
            var o = d ? d.o : 0, b = d ? d.b : 0, n = o + b;
            var rate = n ? b / n : 0;
            var bg = n && rate > 0 ? ' style="background-color:rgba(216,82,92,' + (rate * 0.85).toFixed(2) + ')"' : "";
            var title = n
                ? label + " — " + Math.round((1 - rate) * 100) + "% over " + n + (n === 1 ? " press" : " presses")
                : label + " — not typed";
            return '<span class="kb-key' + (n ? "" : " mute") + (extraCls ? " " + extraCls : "") + '"' +
                bg + ' title="' + esc(title) + '">' + esc(label) + "</span>";
        }

        function renderKeys() {
            var data = kbScope === "all" ? loadJSON("tg:keys", {}) : test.keys;
            var h = "";
            for (var r = 0; r < KB_ROWS.length; r++) {
                h += '<div class="kb-row">';
                for (var i = 0; i < KB_ROWS[r].length; i++) {
                    var c = KB_ROWS[r].charAt(i);
                    h += keyCell(c, data[c]);
                }
                h += "</div>";
            }
            h += '<div class="kb-row">' + keyCell("␣", data["␣"], "kb-space") + "</div>";
            var extras = [];
            for (var k in data) {
                if (k !== "␣" && !/^[a-z]$/.test(k)) extras.push(k);
            }
            if (extras.length) {
                extras.sort(function (a, b) {
                    return (data[b].o + data[b].b) - (data[a].o + data[a].b);
                });
                h += '<div class="kb-row">';
                for (var x = 0; x < Math.min(9, extras.length); x++) h += keyCell(extras[x], data[extras[x]]);
                h += "</div>";
            }
            h += '<button class="kb-cap" id="kb-toggle">trouble keys · ' +
                (kbScope === "all" ? "all-time" : "this flight") + " — click to switch</button>";
            rKeys.innerHTML = h;
            $("kb-toggle").addEventListener("click", function () {
                kbScope = kbScope === "all" ? "flight" : "all";
                renderKeys();
            });
        }

        /* ------------------------------------------------------------------
           Chart — brass net-wpm line and dim raw line on graph paper,
           red ✕ marks where errors happened.
           ------------------------------------------------------------------ */
        function smoothPath(pts) {
            if (pts.length === 0) return "";
            if (pts.length === 1) return "M" + pts[0][0] + " " + pts[0][1];
            var d = "M" + pts[0][0] + " " + pts[0][1];
            for (var i = 0; i < pts.length - 1; i++) {
                var p0 = pts[Math.max(0, i - 1)], p1 = pts[i], p2 = pts[i + 1],
                    p3 = pts[Math.min(pts.length - 1, i + 2)];
                var c1x = p1[0] + (p2[0] - p0[0]) / 6, c1y = p1[1] + (p2[1] - p0[1]) / 6;
                var c2x = p2[0] - (p3[0] - p1[0]) / 6, c2y = p2[1] - (p3[1] - p1[1]) / 6;
                d += "C" + c1x.toFixed(1) + " " + c1y.toFixed(1) + "," +
                    c2x.toFixed(1) + " " + c2y.toFixed(1) + "," + p2[0] + " " + p2[1];
            }
            return d;
        }

        function buildChart() {
            var samples = test.samples;
            if (samples.length === 0) return "";

            var pts = samples.map(function (s) {
                return { x: s.t, net: s.net, raw: (s.raw / 5) * (60 / Math.max(0.2, s.dur)), err: s.err };
            });
            if (pts.length === 1) pts.unshift({ x: 0, net: pts[0].net, raw: pts[0].raw, err: 0 });

            var W = 760, H = 230, L = 46, R = 14, T = 14, B = 30;
            var iw = W - L - R, ih = H - T - B;
            var maxX = pts[pts.length - 1].x;
            var maxV = 10;
            pts.forEach(function (p) { maxV = Math.max(maxV, p.net, p.raw); });
            var maxY = Math.ceil((maxV * 1.08) / 20) * 20;
            if (maxY <= 40) maxY = Math.ceil((maxV * 1.08) / 10) * 10;

            function X(v) { return +(L + (v / maxX) * iw).toFixed(1); }
            function Y(v) { return +(T + ih - (v / maxY) * ih).toFixed(1); }

            var s = '<svg viewBox="0 0 ' + W + " " + H + '" role="img" aria-label="wpm over time">';

            var ySteps = 4;
            for (var i = 0; i <= ySteps; i++) {
                var val = Math.round((maxY / ySteps) * i);
                var y = Y(val);
                s += '<line x1="' + L + '" y1="' + y + '" x2="' + (W - R) + '" y2="' + y +
                    '" stroke="var(--edge)" stroke-width="1"/>';
                s += '<text x="' + (L - 8) + '" y="' + (y + 3.5) + '" text-anchor="end" font-size="10" ' +
                    'fill="var(--dim-solid)" font-family="inherit">' + val + "</text>";
            }
            var xTicks = Math.min(8, Math.max(2, Math.round(maxX)));
            for (var j = 0; j <= xTicks; j++) {
                var tv = (maxX / xTicks) * j;
                var x = X(tv);
                s += '<line x1="' + x + '" y1="' + T + '" x2="' + x + '" y2="' + (T + ih) +
                    '" stroke="var(--edge)" stroke-width="0.5" opacity="0.55"/>';
                s += '<text x="' + x + '" y="' + (H - 9) + '" text-anchor="middle" font-size="10" ' +
                    'fill="var(--dim-solid)" font-family="inherit">' + (Math.round(tv * 10) / 10) + "</text>";
            }
            s += '<text x="' + (W - R) + '" y="' + (H - 9) + '" text-anchor="end" font-size="10" ' +
                'fill="var(--faint)" font-family="inherit">seconds</text>';

            var rawPts = pts.map(function (p) { return [X(p.x), Y(Math.min(p.raw, maxY))]; });
            var netPts = pts.map(function (p) { return [X(p.x), Y(Math.min(p.net, maxY))]; });

            s += '<path d="' + smoothPath(netPts) + " L" + netPts[netPts.length - 1][0] + " " + (T + ih) +
                " L" + netPts[0][0] + " " + (T + ih) + ' Z" fill="var(--brass)" opacity="0.07"/>';
            s += '<path d="' + smoothPath(rawPts) + '" fill="none" stroke="var(--faint)" stroke-width="1.6"/>';
            s += '<path d="' + smoothPath(netPts) + '" fill="none" stroke="var(--brass)" stroke-width="2.4" ' +
                'stroke-linecap="round"/>';

            pts.forEach(function (p, idx) {
                if (!p.err) return;
                var x = rawPts[idx][0], y = rawPts[idx][1], r = p.err > 1 ? 4 : 3;
                s += '<path d="M' + (x - r) + " " + (y - r) + "L" + (x + r) + " " + (y + r) +
                    "M" + (x + r) + " " + (y - r) + "L" + (x - r) + " " + (y + r) +
                    '" stroke="var(--miss)" stroke-width="1.6" stroke-linecap="round"/>';
            });

            s += '<g font-size="10" font-family="inherit">' +
                '<circle cx="' + (W - 150) + '" cy="' + (T + 4) + '" r="3" fill="var(--brass)"/>' +
                '<text x="' + (W - 142) + '" y="' + (T + 7.5) + '" fill="var(--dim-solid)">wpm</text>' +
                '<circle cx="' + (W - 104) + '" cy="' + (T + 4) + '" r="3" fill="var(--faint)"/>' +
                '<text x="' + (W - 96) + '" y="' + (T + 7.5) + '" fill="var(--dim-solid)">raw</text>' +
                '<text x="' + (W - 62) + '" y="' + (T + 7.5) + '" fill="var(--miss)">✕</text>' +
                '<text x="' + (W - 52) + '" y="' + (T + 7.5) + '" fill="var(--dim-solid)">errors</text></g>';

            return s + "</svg>";
        }

        /* ==================================================================
           Input handling (same proven engine as the 2D version)
           ================================================================== */
        function focusGhost() {
            if (test && test.finished) return;
            try { ghost.focus({ preventScroll: true }); } catch (e) { ghost.focus(); }
            sceneEl.classList.toggle("unfocused", document.activeElement !== ghost);
        }

        function errorFeedback() {
            cam.flash = 1;
            if (motionK > 0) {
                cam.vz *= 0.6; /* mistakes bleed speed */
                var box = boxOf(activeWordEl());
                if (box) {
                    box.classList.remove("shake");
                    void box.offsetWidth;
                    box.classList.add("shake");
                }
            }
            sfx.err();
        }

        /* per-key outcome tracking for the trouble-keys heatmap */
        function recKey(chr, ok) {
            if (chr === " ") chr = "␣";
            else if (/^[A-Z]$/.test(chr)) chr = chr.toLowerCase();
            var d = test.keys[chr] || (test.keys[chr] = { o: 0, b: 0 });
            if (ok) d.o++; else d.b++;
        }

        function appendChar(c) {
            var target = test.words[test.idx];
            if (test.cur.length - target.length >= EXTRA_CAP) return;

            if (!test.started) startClock();

            test.rawChars++;
            var pos = test.cur.length;
            var correct = pos < target.length && target.charAt(pos) === c;
            if (pos < target.length) recKey(target.charAt(pos), correct);
            if (correct) {
                test.ksCorrect++;
                sfx.click();
                if (motionK) cam.vz -= 70 * motionK; /* every keystroke is thrust */
            } else {
                test.ksWrong++;
                errorFeedback();
            }
            test.cur += c;
        }

        function handleSpace() {
            if (test.cur.length === 0) return;
            if (!test.started) startClock();
            test.rawChars++;
            var perfect = test.cur === test.words[test.idx];
            recKey(" ", perfect);
            if (perfect) { test.ksCorrect++; sfx.click(); } else { test.ksWrong++; errorFeedback(); }
            commitWord(true);
            if (config.mode === "words" && test.idx >= config.words) {
                finishTest();
                return;
            }
            maybeExtendWords();
        }

        function syncFromInput() {
            if (!test || test.finished) { ghost.value = ""; return; }
            var val = ghost.value;

            if (val.length < test.cur.length) {
                test.cur = val;
            } else {
                for (var i = test.cur.length; i < val.length; i++) {
                    var c = val.charAt(i);
                    if (c === " ") {
                        handleSpace();
                        if (test.finished) return;
                    } else {
                        appendChar(c);
                    }
                }
            }
            if (ghost.value !== test.cur) ghost.value = test.cur;

            var el = activeWordEl();
            if (el) {
                paintWord(el, test.words[test.idx], test.cur, true);
                if (config.mode === "words" && test.idx === config.words - 1 &&
                    test.cur === test.words[test.idx]) {
                    commitWord(false);
                    finishTest();
                    return;
                }
            }
            updateLive();
        }

        ghost.addEventListener("input", function () { syncFromInput(); });
        ghost.addEventListener("paste", function (e) { e.preventDefault(); });
        ghost.addEventListener("drop", function (e) { e.preventDefault(); });

        ghost.addEventListener("keydown", function (e) {
            if (e.key === "Backspace" && ghost.value === "") {
                e.preventDefault();
                backToPreviousWord(e.ctrlKey || e.altKey || e.metaKey);
                return;
            }
            if (e.key === "ArrowLeft" || e.key === "ArrowRight" || e.key === "ArrowUp" ||
                e.key === "ArrowDown" || e.key === "Home" || e.key === "End") {
                e.preventDefault();
            }
        });

        ghost.addEventListener("focus", function () { sceneEl.classList.remove("unfocused"); });
        ghost.addEventListener("blur", function () {
            if (test && !test.finished) sceneEl.classList.add("unfocused");
        });

        sceneEl.addEventListener("mousedown", function (e) { e.preventDefault(); focusGhost(); });

        document.addEventListener("keydown", function (e) {
            if (e.getModifierState) capsEl.classList.toggle("on", e.getModifierState("CapsLock"));

            if (panelOpen() && e.key === "Escape") {
                e.preventDefault();
                setPanel(false);
                return;
            }

            if (e.key === "Tab") {
                /* Shift+Tab always navigates natively, and plain Tab navigates when
                   focus is already on a button or link — keyboard users can reach
                   the whole UI. Tab restarts only from the typing flow itself. */
                if (e.shiftKey) return;
                if (panelOpen()) return;
                var ae = document.activeElement;
                if (ae && ae !== ghost && ae !== document.body &&
                    (ae.tagName === "BUTTON" || ae.tagName === "A" || ae.tagName === "INPUT")) return;
                e.preventDefault();
                clearRace();
                newTest(false);
                return;
            }
            if (e.key === "Escape") {
                e.preventDefault();
                newTest(true);
                return;
            }
            if (test && !test.finished && test.started && config.mode === "zen" && e.key === "Enter") {
                e.preventDefault();
                finishTest();
                return;
            }
            if (test && test.finished && e.key === "Enter") {
                e.preventDefault();
                clearRace();
                newTest(false);
                return;
            }
            if (test && !test.finished && document.activeElement !== ghost && !panelOpen() &&
                e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                var tag = (e.target && e.target.tagName) || "";
                if (tag === "INPUT" || tag === "TEXTAREA" || tag === "BUTTON" || tag === "A") return;
                e.preventDefault();
                focusGhost();
                ghost.value += e.key;
                syncFromInput();
            }
        });

        document.addEventListener("keyup", function (e) {
            if (e.getModifierState) capsEl.classList.toggle("on", e.getModifierState("CapsLock"));
        });

        /* ==================================================================
           The flight loop — one world transform per frame, math only.
           ================================================================== */
        var lastFrame = 0, rafId = 0;
        var warpOn = false;
        var BASE_PERSP = (window.innerWidth || 1200) < 640 ? 760 : 950;
        var curPersp = BASE_PERSP;

        function frame(now) {
            rafId = requestAnimationFrame(frame);
            if (!lastFrame) { lastFrame = now; return; }
            var dt = Math.min(0.05, (now - lastFrame) / 1000);
            lastFrame = now;
            if (!test) return;

            var t = camTarget();
            if (test.finished && motionK > 0 && test._cruiseStart) {
                t.z -= (now - test._cruiseStart) * 0.045; /* dreamy idle cruise behind results */
            }

            /* critically-damped-ish spring toward the active word */
            var K = motionK > 0 ? 26 : 90, D = motionK > 0 ? 9.5 : 22;
            cam.vx += ((t.x - cam.x) * K - cam.vx * D) * dt;
            cam.vy += ((t.y - cam.y) * K - cam.vy * D) * dt;
            cam.vz += ((t.z - cam.z) * K - cam.vz * D) * dt;
            cam.x += cam.vx * dt;
            cam.y += cam.vy * dt;
            cam.z += cam.vz * dt;
            /* terminal velocity — even word-spam can't break the camera */
            if (cam.vz < -3200) cam.vz = -3200;
            else if (cam.vz > 3200) cam.vz = 3200;

            /* speed sense: blend live wpm with instantaneous velocity */
            var wpmNorm = test.started && !test.finished ? Math.min(1, netWpmNow() / 140) : 0;
            var velNorm = Math.min(1, Math.abs(cam.vz) / 900);
            var target = Math.max(wpmNorm * 0.8, velNorm);
            cam.speedNorm += (target - cam.speedNorm) * Math.min(1, dt * 4);

            applyCamera();
            recycleStars();

            if (motionK > 0) {
                cam.spin += cam.speedNorm * dt * 14 * motionK;
                streaksEl.style.opacity = Math.max(0, cam.speedNorm - 0.32) * 0.85 * motionK;
                streaksEl.style.transform = "rotate(" + cam.spin.toFixed(1) + "deg)";
            }
            if (motionK === 1) {
                /* warp: chromatic shift on the active word + a touch of FOV pull */
                if (!warpOn && cam.speedNorm > 0.78) { warpOn = true; document.body.classList.add("warp"); }
                else if (warpOn && cam.speedNorm < 0.7) { warpOn = false; document.body.classList.remove("warp"); }
                var targetPersp = BASE_PERSP - Math.max(0, cam.speedNorm - 0.55) * 420;
                if (Math.abs(targetPersp - curPersp) > 4) {
                    curPersp = targetPersp;
                    sceneEl.style.perspective = curPersp.toFixed(0) + "px";
                }
            }
            cam.flash *= Math.exp(-dt * 7);
            flashEl.style.opacity = (cam.flash * 0.5).toFixed(3);
            humPitch(cam.speedNorm);
        }

        function startLoop() {
            if (!rafId && typeof requestAnimationFrame === "function") {
                lastFrame = 0;
                rafId = requestAnimationFrame(frame);
            }
        }
        function stopLoop() {
            if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
        }

        document.addEventListener("visibilitychange", function () {
            if (document.hidden) { stopLoop(); humStop(); }
            else { startLoop(); if (test && test.started && !test.finished) humStart(); }
        });

        /* ==================================================================
           Config UI
           ================================================================== */
        function renderConfig() {
            var modeBtns = configEl.querySelectorAll("[data-mode]");
            for (var i = 0; i < modeBtns.length; i++) {
                modeBtns[i].setAttribute("aria-pressed", String(modeBtns[i].dataset.mode === config.mode));
            }
            var opts = config.mode === "time" ? TIME_OPTIONS
                : config.mode === "words" ? WORD_OPTIONS : null;
            var h = "";
            if (opts) {
                var current = config.mode === "time" ? config.time : config.words;
                for (var j = 0; j < opts.length; j++) {
                    h += '<button class="cfg-btn" data-value="' + opts[j] + '" aria-pressed="' +
                        (opts[j] === current) + '">' + opts[j] + "</button>";
                }
            } else {
                /* zen has no target — fly until you land */
                h = '<span class="cfg-btn" style="pointer-events:none;color:var(--faint)" aria-hidden="true">∞</span>';
            }
            valueGroup.innerHTML = h;
            punctBtn.setAttribute("aria-pressed", String(config.punct));
            numsBtn.setAttribute("aria-pressed", String(config.nums));
        }

        /* ------------------------------------------------------------------
           Seeded races & the daily flight
           ------------------------------------------------------------------ */
        function updateBadge() {
            raceBadge.classList.toggle("hide", !session.race);
            raceBadge.textContent = session.race ? session.race.label : "";
            dailyBtn.setAttribute("aria-pressed", String(!!(session.race && session.race.daily)));
        }

        function clearRace() {
            if (!session.race) return;
            session.race = null;
            updateBadge();
            try { history.replaceState(null, "", location.pathname + location.search); }
            catch (e) { /* sandboxed contexts may forbid this */ }
        }

        /* A race link pins the seed and the ruleset, so everyone who opens it
           flies the identical word sequence. Applied in-memory only — opening
           someone's race never overwrites your saved preferences. */
        function parseRace() {
            var m = /^#race=([A-Za-z0-9\-]{1,40})\.(time|words|zen)\.(\d+)\.([01])\.([01])$/
                .exec(location.hash || "");
            if (!m) return;
            config.mode = m[2];
            var v = parseInt(m[3], 10);
            if (m[2] === "time" && TIME_OPTIONS.indexOf(v) !== -1) config.time = v;
            if (m[2] === "words" && WORD_OPTIONS.indexOf(v) !== -1) config.words = v;
            config.punct = m[4] === "1";
            config.nums = m[5] === "1";
            var daily = m[1].indexOf("daily-") === 0;
            session.race = {
                seed: m[1],
                daily: daily,
                label: daily ? "★ daily flight · " + m[1].slice(6) : "⚑ race · " + m[1]
            };
        }

        function raceURL() {
            var v = config.mode === "time" ? config.time : config.mode === "words" ? config.words : 0;
            var origin = location.origin && location.origin !== "null" ? location.origin : "";
            return origin + location.pathname + "#race=" + test.seed + "." + config.mode + "." + v +
                "." + (config.punct ? 1 : 0) + "." + (config.nums ? 1 : 0);
        }

        dailyBtn.addEventListener("click", function () {
            var date = utcDateStr();
            session.race = { seed: "daily-" + date, daily: true, label: "★ daily flight · " + date };
            config.mode = "words";
            config.words = 50;
            config.punct = false;
            config.nums = false;
            /* a transient preset — deliberately not saved over your own settings */
            renderConfig();
            updateBadge();
            dailyBtn.blur();
            newTest(false);
        });

        configEl.addEventListener("click", function (e) {
            var btn = e.target.closest ? e.target.closest("button") : null;
            if (!btn) return;
            if (btn.dataset.mode) {
                config.mode = btn.dataset.mode;
            } else if (btn.dataset.value) {
                var v = parseInt(btn.dataset.value, 10);
                if (config.mode === "time") config.time = v; else config.words = v;
            } else if (btn === punctBtn) {
                config.punct = !config.punct;
            } else if (btn === numsBtn) {
                config.nums = !config.nums;
            } else {
                return; /* daily button has its own handler */
            }
            clearRace(); /* changing the ruleset leaves the race */
            saveConfig();
            renderConfig();
            btn.blur();
            newTest(false);
        });

        /* ==================================================================
           Settings panel — everything applies live, mid-flight, no restart
           ================================================================== */
        function relayoutWords() {
            if (!test) return;
            var els = wordsEl.children;
            for (var i = 0; i < els.length; i++) {
                if (!els[i].classList.contains("past")) els[i].style.transform = wordTransform(i);
            }
        }

        function paintGroup(id, v) {
            var btns = $(id).querySelectorAll("button");
            for (var i = 0; i < btns.length; i++) {
                btns[i].setAttribute("aria-pressed", String(btns[i].dataset.v === v));
            }
        }

        function applySettings() {
            var F = FOG_PRESETS[settings.fog];
            var rs = document.documentElement.style;
            for (var i = 0; i < 5; i++) rs.setProperty("--f" + (i + 1), String(F[i]));
            rs.setProperty("--wsize", String(settings.tsize));

            motionK = !motionOK ? 0
                : settings.motion === "full" ? 1
                    : settings.motion === "steady" ? 0.45 : 0;
            if (motionK < 1) {
                /* leave warp cleanly if effects were just turned down */
                warpOn = false;
                document.body.classList.remove("warp");
                curPersp = BASE_PERSP;
                sceneEl.style.perspective = BASE_PERSP + "px";
            }

            relayoutWords();

            spreadInput.value = String(settings.spread);
            spreadVal.textContent = settings.spread.toFixed(2) + "×";
            paintGroup("set-fog", settings.fog);
            paintGroup("set-tsize", String(settings.tsize));
            paintGroup("set-motion", settings.motion);
        }

        function panelOpen() { return !settingsPanel.classList.contains("hide"); }
        function setPanel(open) {
            settingsPanel.classList.toggle("hide", !open);
            settingsBtn.setAttribute("aria-expanded", String(open));
            if (!open) focusGhost();
        }

        settingsBtn.addEventListener("click", function () { setPanel(!panelOpen()); });

        settingsPanel.addEventListener("click", function (e) {
            var btn = e.target.closest ? e.target.closest("button") : null;
            if (!btn) return;
            if (btn.id === "set-reset") {
                settings.spread = 1;
                settings.fog = "classic";
                settings.tsize = 1;
                settings.motion = "full";
            } else if (btn.dataset.v) {
                var group = btn.parentNode.id;
                if (group === "set-fog") settings.fog = btn.dataset.v;
                else if (group === "set-tsize") settings.tsize = parseFloat(btn.dataset.v);
                else if (group === "set-motion") settings.motion = btn.dataset.v;
                else return;
            } else {
                return;
            }
            saveSettings();
            applySettings();
        });

        spreadInput.addEventListener("input", function () {
            var v = parseFloat(spreadInput.value);
            if (!(v >= 0.3 && v <= 1.5)) v = 1;
            settings.spread = v;
            saveSettings();
            applySettings();
        });

        /* Chrome buttons must never steal focus from the typing input: a
           focus shift on mousedown summons the focus overlay mid-press and
           the button's click is retargeted away. preventDefault keeps focus
           where it is; the click still fires. (Inputs like the spread slider
           are deliberately untouched — they need default mousedown to drag.) */
        document.addEventListener("mousedown", function (e) {
            var btn = e.target.closest ? e.target.closest("button") : null;
            if (btn) e.preventDefault();
            if (!panelOpen()) return;
            if (settingsPanel.contains(e.target) || settingsBtn.contains(e.target)) return;
            setPanel(false);
        });

        /* ==================================================================
           Theme & sound toggles
           ================================================================== */
        var themeBtn = $("theme-toggle"), soundBtn = $("sound-toggle");

        function paintTheme() {
            var light = document.documentElement.dataset.theme === "light";
            themeBtn.querySelector(".ic-moon").style.display = light ? "none" : "";
            themeBtn.querySelector(".ic-sun").style.display = light ? "" : "none";
        }
        themeBtn.addEventListener("click", function () {
            var next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
            document.documentElement.dataset.theme = next;
            store.set("tg:theme", next);
            paintTheme();
            themeBtn.blur();
            focusGhost();
        });

        function paintSound() {
            soundBtn.setAttribute("aria-pressed", String(config.sound));
            soundBtn.querySelector(".snd-x").style.display = config.sound ? "none" : "";
        }
        soundBtn.addEventListener("click", function () {
            config.sound = !config.sound;
            saveConfig();
            paintSound();
            if (config.sound) {
                sfx.click();
                if (test && test.started && !test.finished) humStart();
            } else {
                humStop();
            }
            soundBtn.blur();
            focusGhost();
        });

        $("r-next").addEventListener("click", function () { clearRace(); newTest(false); });
        $("r-repeat").addEventListener("click", function () { newTest(true); });

        rShare.addEventListener("click", function () {
            var url = raceURL();
            function done() {
                rShare.textContent = "copied ✓";
                setTimeout(function () { rShare.textContent = "copy race link"; }, 1600);
            }
            function fallback() {
                var card = resultsEl.querySelector(".r-card");
                var old = card.querySelector(".r-url");
                if (old) old.remove();
                var inp = document.createElement("input");
                inp.className = "r-url";
                inp.readOnly = true;
                inp.value = url;
                card.appendChild(inp);
                inp.select();
                var ok = false;
                try { ok = document.execCommand("copy"); } catch (e) { /* manual copy remains */ }
                if (ok) { done(); inp.remove(); }
            }
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url).then(done, fallback);
                } else {
                    fallback();
                }
            } catch (e) { fallback(); }
        });

        /* an occasional comet, because the void should feel alive */
        function scheduleComet() {
            setTimeout(function () {
                if (!document.hidden && motionK === 1) {
                    cometEl.style.top = (8 + Math.random() * 35).toFixed(1) + "%";
                    cometEl.style.left = (10 + Math.random() * 55).toFixed(1) + "%";
                    cometEl.style.setProperty("--ca", (14 + Math.random() * 30).toFixed(0) + "deg");
                    cometEl.style.setProperty("--cd", (240 + Math.random() * 260).toFixed(0) + "px");
                    cometEl.classList.remove("go");
                    void cometEl.offsetWidth;
                    cometEl.classList.add("go");
                }
                scheduleComet();
            }, 9000 + Math.random() * 8000);
        }

        /* ==================================================================
           Boot
           ================================================================== */
        parseRace();
        paintTheme();
        paintSound();
        renderConfig();
        updateBadge();
        applySettings();
        initStars();
        newTest(false);
        startLoop();
        scheduleComet();

        /* Debug/test handle — handy for tinkering and automated tests. */
        window.__tg = {
            get test() { return test; },
            get session() { return session; },
            config: config,
            settings: settings,
            cam: cam,
            posOf: posOf,
            applySettings: applySettings,
            newTest: newTest,
            finishTest: finishTest,
            store: store
        };

    })();
</script>
</body>
</html>
