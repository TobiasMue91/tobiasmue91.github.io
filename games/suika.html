<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍉</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description"
          content="Experience the thrill of Suika, a dynamic fruit matching game. Engage in a fun and challenging adventure, perfect for all ages!">
    <title>Suika Game</title>

    <!-- Canonical + social cards (added; none existed before) -->
    <link rel="canonical" href="suika.html">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Suika Game">
    <meta property="og:description"
          content="Experience the thrill of Suika, a dynamic fruit matching game. Engage in a fun and challenging adventure, perfect for all ages!">
    <meta property="og:url" content="suika.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Suika Game">
    <meta name="twitter:description"
          content="Experience the thrill of Suika, a dynamic fruit matching game. Engage in a fun and challenging adventure, perfect for all ages!">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p2.js/0.7.1/p2.min.js"></script>

    <style>
        :root {
            --bg: #fdf6ec;
            --panel: #ffffff;
            --ink: #2b2b3a;
            --muted: #6b6b7b;
            --accent: #ff7043;
            --accent-deep: #e8551c;
            --header: #1e3a8a;
            --line: #e7e2d8;
            --shadow: 0 10px 30px rgba(40, 30, 20, 0.12);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 20% 0%, #fff4e0 0%, transparent 45%),
            radial-gradient(circle at 90% 100%, #ffe9ef 0%, transparent 40%),
            var(--bg);
            color: var(--ink);
            font-family: 'Fredoka', system-ui, -apple-system, sans-serif;
            min-height: 100%;
        }

        header {
            padding: 14px 16px;
            text-align: center;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: #fff;
            box-shadow: 0 4px 18px rgba(30, 58, 138, 0.35);
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 700;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.16);
            border: none;
            color: #fff;
            font-size: 1.1rem;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(20deg);
        }

        .icon-btn:active {
            transform: scale(0.92);
        }

        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 18px 12px 40px;
        }

        @media (min-width: 860px) {
            .stage {
                flex-direction: row;
                align-items: flex-start;
                justify-content: center;
            }
        }

        .board-wrap {
            position: relative;
            order: 2;
        }

        #gameCanvas {
            display: block;
            border-radius: var(--radius);
            border: 3px solid rgba(40, 30, 20, 0.15);
            box-shadow: var(--shadow);
            background: #cdedf6;
            max-width: 100%;
            height: auto;
            touch-action: none;
            cursor: pointer;
        }

        .side {
            order: 1;
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        @media (min-width: 860px) {
            .side {
                width: 280px;
            }
        }

        .card {
            background: var(--panel);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
        }

        .scoreline {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
        }

        .scoreline + .scoreline {
            margin-top: 6px;
        }

        .scoreline .label {
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .scoreline .val {
            font-size: 1.6rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .scoreline .val.best {
            font-size: 1.2rem;
            color: var(--accent-deep);
        }

        .hint {
            font-size: 0.85rem;
            color: var(--muted);
            text-align: center;
            margin: 2px 0 0;
            font-weight: 500;
        }

        .legend-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin: 0 0 10px;
            font-weight: 600;
        }

        #valueGrid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 8px;
            align-items: center;
            font-size: 0.95rem;
        }

        #valueGrid .swatch {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            line-height: 1;
            box-shadow: inset 0 -2px 4px rgba(0, 0, 0, 0.18);
        }

        #valueGrid .pts {
            text-align: right;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* Overlays */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 30;
            background: rgba(20, 16, 12, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(3px);
        }

        .overlay.hidden {
            display: none;
        }

        .modal {
            background: var(--panel);
            border-radius: 22px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 28px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            animation: pop-in 0.22s ease-out;
        }

        @keyframes pop-in {
            from {
                transform: scale(0.85);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal h2 {
            margin: 0 0 6px;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .modal .big-score {
            font-size: 2.6rem;
            font-weight: 700;
            color: var(--accent-deep);
            margin: 6px 0;
        }

        .modal .best-note {
            font-size: 1rem;
            color: var(--muted);
            margin: 0 0 18px;
            min-height: 1.2em;
        }

        .modal .best-note.newbest {
            color: #16a34a;
            font-weight: 600;
        }

        .btn {
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            border-radius: 12px;
            padding: 12px 22px;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff8a5b, var(--accent-deep));
            color: #fff;
            box-shadow: 0 6px 16px rgba(232, 85, 28, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 9px 20px rgba(232, 85, 28, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-ghost {
            background: #f1ede4;
            color: var(--ink);
        }

        .btn-ghost:hover {
            background: #e7e2d8;
        }

        .modal-left {
            text-align: left;
        }

        .field {
            margin-bottom: 18px;
        }

        .field > label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
        }

        select, input[type="range"] {
            font-family: inherit;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1.5px solid var(--line);
            background: #fff;
            font-size: 1rem;
            color: var(--ink);
        }

        .range-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .range-row .readout {
            font-weight: 600;
            min-width: 56px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .check {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 14px;
        }

        .check input {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 8px;
        }

        .sound-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .sound-toggle button {
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1.5px solid var(--line);
            background: #fff;
            color: var(--ink);
            border-radius: 10px;
            padding: 8px 14px;
            cursor: pointer;
        }

        .sound-toggle button.on {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
    </style>
</head>
<body>
<header>
    <h1>
        Welcome to the Suika Game
        <button id="settingsButton" onclick="openSettingsModal()" class="icon-btn" title="Settings"
                aria-label="Settings">⚙️
        </button>
    </h1>
</header>

<div class="stage">
    <div class="board-wrap">
        <canvas id="gameCanvas" width="450" height="800"></canvas>
    </div>

    <div class="side">
        <div class="card">
            <div class="scoreline">
                <span class="label">Score</span>
                <span class="val" id="scoreValue">0</span>
            </div>
            <div class="scoreline">
                <span class="label">Best <span id="bestSkinLabel">(fruits)</span></span>
                <span class="val best" id="bestValue">0</span>
            </div>
            <p class="hint">Drop and match to merge!</p>
        </div>

        <div class="card">
            <div class="sound-toggle">
                <span>Sound</span>
                <button id="soundToggleBtn" class="on" onclick="toggleSound()">🔊 On</button>
            </div>
        </div>

        <div class="card">
            <p class="legend-title">Merge chart</p>
            <div id="valueGrid"></div>
        </div>
    </div>
</div>

<div id="gameOverOverlay" class="overlay hidden">
    <div class="modal">
        <h2>Game Over!</h2>
        <div class="big-score" id="finalScore">0</div>
        <p class="best-note" id="bestNote"></p>
        <button id="restartButton" onclick="restartGame()" class="btn btn-primary">Play Again</button>
    </div>
</div>

<div id="settingsModal" class="overlay hidden">
    <div class="modal modal-left">
        <h2 style="text-align:center;">Settings</h2>
        <div class="field">
            <label for="skinSelect">Choose a skin</label>
            <select id="skinSelect">
                <option value="fruits">🍉 Fruits</option>
                <option value="jungleAnimals">🐅 Jungle Animals</option>
                <option value="underwater">🐠 Underwater</option>
                <option value="musicalInstruments">🎸 Musical Instruments</option>
                <option value="ancientCivilizations">🗿 Ancient Civilizations</option>
                <option value="winter">❄️ Winter</option>
                <option value="garden">🌿 Garden</option>
                <option value="dessert">🍰 Dessert</option>
                <option value="sports">⚽ Sports</option>
                <option value="vehicles">🚗 Vehicles</option>
            </select>
        </div>
        <div class="field">
            <label for="fruitSpawnDelay">Spawn Delay (ms)</label>
            <div class="range-row">
                <input type="range" id="fruitSpawnDelay" name="fruitSpawnDelay" min="0" max="1000" value="600">
                <span class="readout"><span id="fruitSpawnDelayValue">600</span> ms</span>
            </div>
        </div>
        <label class="check" for="useSystemFontCheckbox">
            <input type="checkbox" id="useSystemFontCheckbox" name="useSystemFont">
            <span>Use System Font</span>
        </label>
        <label class="check" for="gameOverEnabledCheckbox">
            <input type="checkbox" checked id="gameOverEnabledCheckbox" name="gameOverEnabled">
            <span>Game Over Enabled</span>
        </label>
        <div class="modal-actions">
            <button onclick="applySettings()" class="btn btn-primary">Apply</button>
            <button onclick="closeSettingsModal()" class="btn btn-ghost">Close</button>
        </div>
    </div>
</div>

<script>
    /* ============================================================
       Suika Game — single-file build
       Physics: p2.js (kept). Fixed step 1/60 with accumulator.
       Rendering: flat colored discs + centered emoji glyph.
       ============================================================ */

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const skins = {
        fruits: ['🍒', '🍓', '🍇', '🍋', '🍊', '🍎', '🍐', '🍑', '🍍', '🍈', '🍉'],
        jungleAnimals: ['🐸', '🐍', '🦜', '🦥', '🦧', '🐅', '🦓', '🦒', '🐘', '🦏', '🦍'],
        underwater: ['🐠', '🐟', '🐡', '🦑', '🐙', '🦈', '🐬', '🐋', '🦭', '🦞', '🐳'],
        musicalInstruments: ['🪘', '🪕', '🎷', '🎺', '🎸', '🎻', '🪗', '🥁', '🎹', '🎼', '📯'],
        ancientCivilizations: ['🏺', '🪔', '⚱️', '🗿', '🛕', '🕌', '🕍', '🏰', '🏯', '🎎', '🏛️'],
        winter: ['❄️', '🧣', '🧤', '🥶', '⛷️', '⛸️', '🛷', '☃️', '🏔️', '🌨️', '🎿'],
        garden: ['🌱', '🌿', '🍄', '🌷', '🌻', '🌼', '🌺', '🌸', '🌹', '🥀', '🌲'],
        dessert: ['🍪', '🧁', '🍩', '🍨', '🍰', '🎂', '🍮', '🍦', '🍧', '🍫', '🍬'],
        sports: ['🏀', '⚽', '🏈', '⚾', '🏐', '🥎', '🏉', '🎾', '🏓', '🏑', '🏆'],
        vehicles: ['🚲', '🛴', '🛵', '🚗', '🚚', '🚜', '🚂', '🛶', '🚤', '🛳️', '✈️']
    };

    // 11 tier colors: cool/light -> warm/saturated
    const TIER_COLORS = [
        '#A8E6CF', '#C5E1A5', '#FFF59D', '#FFE082', '#FFCC80',
        '#FFB74D', '#FF8A65', '#FF7043', '#F4511E', '#E53935', '#C62828'
    ];
    const TIER_COLORS_DARK = [
        '#7fcaa8', '#a3c275', '#e8de6a', '#e8c45a', '#e8a85a',
        '#e89030', '#e06a45', '#e05525', '#c43c12', '#bb2a28', '#9e1f1f'
    ];

    let currentSkinName = 'fruits';
    let currentSkin = skins.fruits;

    let currentFruitIndex = 0;
    let currentFruitX = canvas.width / 2;
    let nextFruitIndex = selectNextFruit();
    let score = 0;
    let bestScores = {};        // { skinName: bestScore }
    let currentFruitBody = null;
    let isFruitDropped = false;
    let currentFruitSpawnDelay = 600;
    let useSystemFont = false;
    let gameOverEnabled = true;
    let soundOn = true;
    let world;
    let isGameOver = false;

    const Y_OFFSET = 10;
    const X_OFFSET = 5;
    const INITIAL_VELOCITY = 0;

    // Danger line (canvas y, from top). Settled tokens crossing this trigger warning.
    const DANGER_Y = 110;
    let dangerActive = false;     // a token currently sits past the line
    let dangerPulse = 0;          // 0..1 animated pulse

    // Combo / cascade state
    let lastMergeTime = 0;
    let chainCount = 0;
    const CHAIN_WINDOW = 500;     // ms

    // Visual effect pools
    let particles = [];
    let floaters = [];
    let shake = {mag: 0, until: 0};
    let flash = {alpha: 0};

    // uid for bodies (merge-lock & spawn animation tracking)
    let bodyUid = 0;

    initialize();

    function initialize() {
        score = 0;
        isGameOver = false;
        chainCount = 0;
        lastMergeTime = 0;
        particles = [];
        floaters = [];
        dangerActive = false;
        currentFruitBody = null;
        isFruitDropped = false;
        currentFruitX = canvas.width / 2;

        if (world) {
            // Remove all bodies but keep listeners bound.
            const bodies = world.bodies.slice();
            bodies.forEach(b => world.removeBody(b));
        } else {
            world = new p2.World({gravity: [0, -1200]});
            // Allow settled bodies to sleep so they stop micro-jittering at rest.
            world.sleepMode = p2.World.BODY_SLEEPING;
            bindCollision();
        }

        createCanvasBorders();
        currentFruitIndex = selectNextFruit();
        nextFruitIndex = selectNextFruit();
        updateScoreUI();
    }

    /* ---------------- Geometry ---------------- */

    function calculateFruitHitboxRadius(index) {
        return 14 + index * 7;
    }

    // Visual disc matches the physics circle exactly (minus 1px so the stroke sits inside).
    function calculateFruitVisualRadius(index) {
        return calculateFruitHitboxRadius(index) - 1;
    }

    function clampDropX(x, index) {
        const r = calculateFruitHitboxRadius(index);
        return Math.max(r, Math.min(canvas.width - r, x));
    }

    /* ---------------- Rendering ---------------- */

    function drawBackground() {
        if (backgroundImage.loaded) {
            ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
        } else {
            // Fallback: soft vertical gradient.
            const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
            g.addColorStop(0, '#dff1fb');
            g.addColorStop(1, '#bfe3f0');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }

    function drawToken(cx, cy, radius, tier, scale = 1) {
        // Raw emoji glyph (varied silhouettes). fontSize ~= diameter so the glyph
        // roughly fills the collision circle.
        const fontSize = radius * scale * 2;
        ctx.font = useSystemFont
            ? `${fontSize}px system-ui, sans-serif`
            : `${fontSize}px "Noto Emoji", "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(currentSkin[tier], cx, cy);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
    }

    function drawFruits() {
        const now = performance.now();
        world.bodies.forEach(body => {
            if (body.fruitType === undefined) return;
            const visualRadius = calculateFruitVisualRadius(body.fruitType);
            const cx = body.position[0];
            const cy = canvas.height - body.position[1];

            // spawn scale animation 0.6 -> 1.0 over 120ms ease-out
            let scale = 1;
            if (body.spawnAt !== undefined) {
                const t = (now - body.spawnAt) / 120;
                if (t < 1) {
                    const e = 1 - Math.pow(1 - t, 3);
                    scale = 0.6 + 0.4 * e;
                } else {
                    body.spawnAt = undefined;
                }
            }
            drawToken(cx, cy, visualRadius, body.fruitType, scale);
        });

        // Held token (only before drop, not on game over)
        if (!isFruitDropped && !isGameOver) {
            const visualRadius = calculateFruitVisualRadius(currentFruitIndex);
            drawToken(currentFruitX, 50, visualRadius, currentFruitIndex, 1);

            // guide line
            ctx.save();
            ctx.setLineDash([5, 8]);
            ctx.strokeStyle = 'rgba(0,0,0,0.18)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(currentFruitX, 50 + visualRadius);
            ctx.lineTo(currentFruitX, canvas.height);
            ctx.stroke();
            ctx.restore();
        }

        // Next preview
        ctx.save();
        ctx.globalAlpha = 0.95;
        drawToken(405, 52, 20, nextFruitIndex, 1);
        ctx.font = '12px Fredoka, sans-serif';
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.textAlign = 'center';
        ctx.fillText('NEXT', 405, 90);
        ctx.textAlign = 'left';
        ctx.restore();
    }

    function drawDangerLine() {
        if (!gameOverEnabled) return;     // zen mode: no danger line
        const pulse = dangerActive ? (0.4 + 0.6 * Math.abs(Math.sin(dangerPulse))) : 0.22;
        ctx.save();
        ctx.setLineDash([10, 6]);
        ctx.lineWidth = 2;
        ctx.strokeStyle = dangerActive
            ? `rgba(229, 57, 53, ${pulse})`
            : `rgba(229, 57, 53, 0.22)`;
        ctx.beginPath();
        ctx.moveTo(0, DANGER_Y);
        ctx.lineTo(canvas.width, DANGER_Y);
        ctx.stroke();
        ctx.restore();
    }

    function drawParticles() {
        particles.forEach(p => {
            ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
        });
        ctx.globalAlpha = 1;
    }

    function drawFloaters() {
        floaters.forEach(f => {
            ctx.globalAlpha = Math.max(0, f.life / f.maxLife);
            ctx.font = `${f.size}px Fredoka, sans-serif`;
            ctx.fillStyle = f.color;
            ctx.textAlign = 'center';
            ctx.fillText(f.text, f.x, f.y);
        });
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';
    }

    /* ---------------- Effects ---------------- */

    function spawnParticles(x, y, tier) {
        const color = TIER_COLORS_DARK[tier] || TIER_COLORS_DARK[TIER_COLORS_DARK.length - 1];
        const count = 7 + Math.floor(Math.random() * 4); // 7-10
        for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2;
            const sp = 1.5 + Math.random() * 3.5;
            particles.push({
                x, y,
                vx: Math.cos(a) * sp,
                vy: Math.sin(a) * sp - 1.5,
                r: 2.5 + Math.random() * 3,
                color,
                life: 400, maxLife: 400
            });
        }
        // hard cap
        if (particles.length > 160) particles.splice(0, particles.length - 160);
    }

    function spawnFloater(x, y, text, big) {
        floaters.push({
            x, y, text,
            size: big ? 30 : 20,
            color: big ? '#e8551c' : '#2b2b3a',
            vy: -0.6,
            life: 700, maxLife: 700
        });
    }

    function triggerFlash() {
        flash.alpha = 0.35;
    }

    function triggerShake(mag) {
        shake.mag = mag;
        shake.until = performance.now() + 220;
    }

    function updateEffects(dt) {
        // particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.15;
            p.life -= dt;
            if (p.life <= 0) particles.splice(i, 1);
        }
        // floaters
        for (let i = floaters.length - 1; i >= 0; i--) {
            const f = floaters[i];
            f.y += f.vy;
            f.life -= dt;
            if (f.life <= 0) floaters.splice(i, 1);
        }
        // flash
        if (flash.alpha > 0) flash.alpha = Math.max(0, flash.alpha - dt / 350);
        // danger pulse
        dangerPulse += dt / 120;
    }

    /* ---------------- Audio (Web Audio API) ---------------- */

    let audioCtx = null;

    function ensureAudio() {
        if (!audioCtx) {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                audioCtx = null;
            }
        }
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }

    function tone(freq, durMs, type = 'sine', gainPeak = 0.12, attackMs = 6) {
        if (!soundOn || !audioCtx) return;
        const t0 = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, t0);
        g.gain.linearRampToValueAtTime(gainPeak, t0 + attackMs / 1000);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + durMs / 1000);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start(t0);
        osc.stop(t0 + durMs / 1000 + 0.02);
    }

    function soundMergePop(tier, chain) {
        // base pitch rises with tier 300->600Hz, plus chain step
        const base = 300 + (tier / 10) * 300;
        const pitch = base + Math.max(0, chain - 1) * 60;
        tone(pitch, 80, 'sine', 0.13, 4);
    }

    function soundLandingTick() {
        tone(150, 30, 'sine', 0.05, 2);
    }

    function soundDanger() {
        tone(110, 180, 'triangle', 0.07, 8);
    }

    function soundNewBest() {
        if (!soundOn || !audioCtx) return;
        [523, 659, 784].forEach((f, i) => setTimeout(() => tone(f, 140, 'triangle', 0.12, 5), i * 110));
    }

    /* ---------------- Score UI ---------------- */

    function updateScoreUI() {
        document.getElementById('scoreValue').textContent = score;
        document.getElementById('bestValue').textContent = bestScores[currentSkinName] || 0;
        document.getElementById('bestSkinLabel').textContent = '(' + currentSkinName + ')';
    }

    /* ---------------- Game over ---------------- */

    function gameOver() {
        if (isGameOver) return;
        isGameOver = true;
        currentFruitBody = null;

        const prevBest = bestScores[currentSkinName] || 0;
        const isNewBest = score > prevBest;
        if (isNewBest) {
            bestScores[currentSkinName] = score;
            saveBestScores();
            soundNewBest();
            triggerFlash();
        }

        document.getElementById('finalScore').textContent = score;
        const note = document.getElementById('bestNote');
        if (isNewBest) {
            note.textContent = '🎉 New best! (' + currentSkinName + ')';
            note.classList.add('newbest');
        } else {
            note.textContent = 'Best: ' + (bestScores[currentSkinName] || 0) + ' (' + currentSkinName + ')';
            note.classList.remove('newbest');
        }
        document.getElementById('gameOverOverlay').classList.remove('hidden');
        updateScoreUI();
    }

    function restartGame() {
        document.getElementById('gameOverOverlay').classList.add('hidden');
        initialize();
    }

    /* ---------------- Main loop (fixed 1/60 step) ---------------- */

    const FIXED_DT = 1 / 60;
    let accumulator = 0;
    let lastFrame = performance.now();

    function gameLoop(nowMs) {
        const now = nowMs || performance.now();
        let frameDt = (now - lastFrame) / 1000;
        lastFrame = now;
        if (frameDt > 0.25) frameDt = 0.25; // avoid spiral after tab blur

        if (!isGameOver) {
            accumulator += frameDt;
            while (accumulator >= FIXED_DT) {
                world.step(FIXED_DT);
                accumulator -= FIXED_DT;
            }
        }
        updateEffects(frameDt * 1000);
        checkDanger();

        // ---- render ----
        ctx.save();
        if (shake.mag > 0 && now < shake.until) {
            const dx = (Math.random() - 0.5) * shake.mag;
            const dy = (Math.random() - 0.5) * shake.mag;
            ctx.translate(dx, dy);
        } else {
            shake.mag = 0;
        }

        drawBackground();
        drawDangerLine();
        drawFruits();
        drawParticles();
        drawFloaters();

        if (flash.alpha > 0) {
            ctx.fillStyle = `rgba(255,255,255,${flash.alpha})`;
            ctx.fillRect(-30, -30, canvas.width + 60, canvas.height + 60);
        }
        ctx.restore();

        requestAnimationFrame(gameLoop);
    }

    /* ---------------- Danger detection ---------------- */

    function checkDanger() {
        if (!gameOverEnabled) {
            dangerActive = false;
            return;
        }
        let danger = false;
        let topOut = false;
        for (const body of world.bodies) {
            if (body.fruitType === undefined) continue;
            const vr = calculateFruitVisualRadius(body.fruitType);
            const topCanvasY = (canvas.height - body.position[1]) - vr;
            const speed = Math.hypot(body.velocity[0], body.velocity[1]);
            // Only a genuinely settled token counts: sleeping, or barely moving.
            // A falling/just-dropped token is always faster than this, so dropping
            // never trips the warning.
            const settled = body.sleepState === p2.Body.SLEEPING || speed < 18;
            if (settled && topCanvasY < DANGER_Y) danger = true;
            if (body.position[1] > canvas.height + 20) topOut = true;
        }
        if (danger && !dangerActive) soundDanger();
        dangerActive = danger;
        if (topOut) gameOver();
    }

    /* ---------------- Input (single tap = single drop) ---------------- */

    let lastInputTs = 0;
    const INPUT_DEBOUNCE = 250; // ms

    function pointerToCanvasX(clientX) {
        const rect = canvas.getBoundingClientRect();
        return (clientX - rect.left) / (rect.right - rect.left) * canvas.width;
    }

    function moveHeld(clientX) {
        currentFruitX = clampDropX(pointerToCanvasX(clientX), currentFruitIndex);
    }

    canvas.addEventListener('mousemove', (e) => moveHeld(e.clientX));

    const onTouchMove = (e) => {
        e.preventDefault();
        if (e.touches.length > 0) moveHeld(e.touches[0].clientX);
    };
    canvas.addEventListener('touchmove', onTouchMove, {passive: false});
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (e.touches.length > 0) moveHeld(e.touches[0].clientX);
    }, {passive: false});

    function doDrop() {
        ensureAudio();
        const now = performance.now();
        if (now - lastInputTs < INPUT_DEBOUNCE) return; // debounce double-fire
        lastInputTs = now;
        if (isFruitDropped || isGameOver) return;

        isFruitDropped = true;
        currentFruitX = clampDropX(currentFruitX, currentFruitIndex);
        currentFruitBody = createFruit(currentFruitIndex, currentFruitX, 50);

        const delay = currentFruitSpawnDelay;
        setTimeout(() => {
            currentFruitIndex = nextFruitIndex;
            nextFruitIndex = selectNextFruit();
            currentFruitX = clampDropX(currentFruitX, currentFruitIndex);
            isFruitDropped = false;          // lock always releases
        }, delay);
    }

    // touchend handled separately and guarded; click also guarded by same debounce.
    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        doDrop();
    }, {passive: false});
    canvas.addEventListener('click', () => doDrop());

    function selectNextFruit() {
        return Math.floor(Math.random() * 5);
    }

    /* ---------------- Physics bodies ---------------- */

    function createFruit(index, x, y, vx, vy) {
        const hitboxRadius = calculateFruitHitboxRadius(index);
        const mass = 1 + index * 0.5;
        const fruitBody = new p2.Body({
            mass: mass,
            position: [x, canvas.height - y],
            velocity: [vx !== undefined ? vx : 0, vy !== undefined ? vy : INITIAL_VELOCITY],
            angularVelocity: 0
        });
        // Light damping + sleep thresholds so tokens settle still instead of jittering.
        fruitBody.damping = 0.2;
        fruitBody.angularDamping = 0.6;
        fruitBody.sleepSpeedLimit = 12;
        fruitBody.sleepTimeLimit = 0.4;
        fruitBody.addShape(new p2.Circle({radius: hitboxRadius}));
        fruitBody.fruitType = index;
        fruitBody.uid = ++bodyUid;
        fruitBody.merging = false;
        fruitBody.spawnAt = performance.now();
        fruitBody.hasLanded = false;
        world.addBody(fruitBody);
        return fruitBody;
    }

    function createCanvasBorders() {
        const wallThickness = 50;
        const wallOptions = {type: p2.Body.STATIC};

        const bottomWall = new p2.Body({position: [canvas.width / 2, -wallThickness / 2], ...wallOptions});
        bottomWall.addShape(new p2.Box({width: canvas.width, height: wallThickness}));
        world.addBody(bottomWall);

        const leftWall = new p2.Body({position: [-wallThickness / 2, canvas.height / 2], ...wallOptions});
        leftWall.addShape(new p2.Box({width: wallThickness, height: canvas.height * 4}));
        world.addBody(leftWall);

        const rightWall = new p2.Body({position: [canvas.width + wallThickness / 2, canvas.height / 2], ...wallOptions});
        rightWall.addShape(new p2.Box({width: wallThickness, height: canvas.height * 4}));
        world.addBody(rightWall);
    }

    /* ---------------- Collision + merge ---------------- */

    function bindCollision() {
        world.on('beginContact', (event) => {
            const a = event.bodyA, b = event.bodyB;

            // Landing tick: a falling fruit first touches anything.
            [a, b].forEach(body => {
                if (body && body.fruitType !== undefined && !body.hasLanded) {
                    body.hasLanded = true;
                    soundLandingTick();
                }
            });

            if (a.fruitType === undefined || b.fruitType === undefined) return;
            if (a.fruitType !== b.fruitType) return;
            // merge-lock: ignore if either already merging this step
            if (a.merging || b.merging) return;

            const tier = a.fruitType;
            const mergedTier = tier + 1;
            if (mergedTier >= currentSkin.length) return; // top tier: no-op (existing behavior)

            // lock both immediately
            a.merging = true;
            b.merging = true;

            const avgX = (a.position[0] + b.position[0]) / 2;
            const avgY = (a.position[1] + b.position[1]) / 2;
            // inherit combined momentum (averaged) so it doesn't teleport-overlap
            const vx = (a.velocity[0] + b.velocity[0]) / 2;
            const vy = (a.velocity[1] + b.velocity[1]) / 2;

            world.removeBody(a);
            world.removeBody(b);

            const newRadius = calculateFruitHitboxRadius(mergedTier);
            // nudge spawn slightly upward to reduce deep overlap with a third body
            const spawnCanvasY = (canvas.height - avgY) - 2;
            const merged = createFruit(mergedTier, avgX, spawnCanvasY, vx, vy);

            // --- scoring with combo multiplier ---
            const nowMs = performance.now();
            if (nowMs - lastMergeTime <= CHAIN_WINDOW) chainCount++;
            else chainCount = 1;
            lastMergeTime = nowMs;
            const multiplier = chainCount;
            const base = mergedTier * 2;
            const gained = base * multiplier;
            score += gained;

            // --- feedback ---
            const fx = avgX;
            const fy = canvas.height - avgY;
            spawnParticles(fx, fy, mergedTier);
            spawnFloater(fx, fy, '+' + gained, false);
            soundMergePop(mergedTier, chainCount);

            if (chainCount >= 2) {
                triggerFlash();
                spawnFloater(fx, fy - 26, 'x' + chainCount + '!', true);
            }
            // top-tier creation (the biggest token) => screen shake
            if (mergedTier === currentSkin.length - 1) {
                triggerShake(10);
            }

            // live-best beat celebration (during play, not just at game over)
            const prevBest = bestScores[currentSkinName] || 0;
            if (score > prevBest && prevBest > 0) {
                bestScores[currentSkinName] = score;
            }
            updateScoreUI();
        });
    }

    /* ---------------- Background image ---------------- */

    const backgroundImage = new Image();
    backgroundImage.loaded = false;
    backgroundImage.onload = () => {
        backgroundImage.loaded = true;
    };
    backgroundImage.onerror = () => {
        backgroundImage.loaded = false;
    };
    backgroundImage.src = 'img/background/suikabg.webp';

    /* ---------------- Settings ---------------- */

    function applySkin(selectedSkin) {
        if (!skins[selectedSkin]) return;
        currentSkinName = selectedSkin;
        currentSkin = skins[selectedSkin];
        rebuildValueGrid();
        updateScoreUI();
    }

    function rebuildValueGrid() {
        const valueGrid = document.getElementById('valueGrid');
        valueGrid.innerHTML = '';
        currentSkin.forEach((emoji, index) => {
            const swatch = document.createElement('span');
            swatch.className = 'swatch';
            swatch.style.background = TIER_COLORS[index];
            swatch.textContent = emoji;

            const pts = document.createElement('div');
            pts.className = 'pts';
            pts.textContent = (index + 1) * 2;

            valueGrid.appendChild(swatch);
            valueGrid.appendChild(pts);
        });
    }

    function applyFruitSpawnDelay(v) {
        currentFruitSpawnDelay = parseInt(v, 10) || 0;
    }

    function applySystemFontSetting(v) {
        useSystemFont = !!v;
    }

    function applyGameOver(v) {
        gameOverEnabled = !!v;
    }

    function applySettings() {
        const selectedSkin = document.getElementById('skinSelect').value;
        const fruitSpawnDelay = document.getElementById('fruitSpawnDelay').value;
        const sysFont = document.getElementById('useSystemFontCheckbox').checked;
        const goEnabled = document.getElementById('gameOverEnabledCheckbox').checked;

        applyFruitSpawnDelay(fruitSpawnDelay);
        applySystemFontSetting(sysFont);
        applySkin(selectedSkin);          // applies instantly mid-game
        applyGameOver(goEnabled);
        closeSettingsModal();

        localStorage.setItem('settings', JSON.stringify({
            selectedSkin,
            fruitSpawnDelay,
            useSystemFont: sysFont,
            gameOverEnabled: goEnabled
        }));
    }

    function openSettingsModal() {
        document.getElementById('settingsModal').classList.remove('hidden');
    }

    function closeSettingsModal() {
        document.getElementById('settingsModal').classList.add('hidden');
    }

    function toggleSound() {
        soundOn = !soundOn;
        const btn = document.getElementById('soundToggleBtn');
        btn.textContent = soundOn ? '🔊 On' : '🔇 Off';
        btn.classList.toggle('on', soundOn);
        if (soundOn) ensureAudio();
    }

    /* ---------------- Best score persistence (new key) ---------------- */

    function loadBestScores() {
        try {
            bestScores = JSON.parse(localStorage.getItem('suikaBest')) || {};
        } catch (e) {
            bestScores = {};
        }
    }

    function saveBestScores() {
        localStorage.setItem('suikaBest', JSON.stringify(bestScores));
    }

    /* ---------------- Responsive scroll (simplified) ---------------- */

    function scrollToHeaderHeight() {
        const header = document.querySelector('header');
        if (header) {
            const h = header.offsetHeight;
            setTimeout(() => window.scrollTo({top: h, behavior: 'smooth'}), 800);
        }
    }

    function scrollOnMobile() {
        const check = () => {
            if (window.innerWidth < 500) scrollToHeaderHeight();
        };
        check();
        window.addEventListener('resize', check);
    }

    /* ---------------- Boot ---------------- */

    document.getElementById('fruitSpawnDelay').addEventListener('input', function () {
        document.getElementById('fruitSpawnDelayValue').textContent = this.value;
    });

    document.addEventListener('DOMContentLoaded', () => {
        loadBestScores();

        const saved = JSON.parse(localStorage.getItem('settings') || 'null');
        if (saved) {
            if (saved.selectedSkin) document.getElementById('skinSelect').value = saved.selectedSkin;
            if (saved.fruitSpawnDelay !== undefined) document.getElementById('fruitSpawnDelay').value = saved.fruitSpawnDelay;
            document.getElementById('useSystemFontCheckbox').checked = !!saved.useSystemFont;
            document.getElementById('gameOverEnabledCheckbox').checked = saved.gameOverEnabled !== false;
            document.getElementById('fruitSpawnDelayValue').textContent = saved.fruitSpawnDelay;

            applyFruitSpawnDelay(saved.fruitSpawnDelay);
            applySystemFontSetting(saved.useSystemFont);
            applySkin(saved.selectedSkin || 'fruits');
            applyGameOver(saved.gameOverEnabled !== false);
        } else {
            applySkin('fruits');
        }

        updateScoreUI();
        scrollOnMobile();
        requestAnimationFrame(gameLoop);
    });
</script>
<script src="../logo.js"></script>
</body>
