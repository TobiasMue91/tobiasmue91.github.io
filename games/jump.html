<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <title>Joodle Dump!</title>
    <meta name="description"
          content="Play Joodle Dump!, a fun and addictive clone of Doodle Jump. Jump your way to a high score while avoiding obstacles and collecting points. With touch controls and a responsive design, Joodle Dump! is perfect for all ages.">
    <meta name="keywords"
          content="Joodle Dump!, Doodle Jump, game, touch controls, responsive design, high score, obstacles, points, addictive, fun, all ages">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        :root {
            --ink: #2b2b33;
            --paper: #fbf7ec;
            --grid: #bcd6e4;
            --accent: #59a832;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 10px 0 20px;
            text-align: center;
            background: #e8e2d2;
            font-family: "Comic Sans MS", "Chalkboard SE", "Segoe Print", cursive;
            color: var(--ink);
            -webkit-tap-highlight-color: transparent;
        }

        #wrapper {
            margin: 0 auto;
            position: relative;
            width: min(500px, 100vw - 12px);
            user-select: none;
            -webkit-user-select: none;
        }

        #game {
            display: block;
            width: 100%;
            aspect-ratio: 5 / 8;
            border: 3px solid var(--ink);
            border-radius: 6px;
            box-shadow: 3px 4px 0 rgba(43, 43, 51, .25);
            background: var(--paper);
            touch-action: none;
            cursor: pointer;
        }

        /* overlay card (start / game over) */
        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: rgba(251, 247, 236, .82);
            border-radius: 6px;
            z-index: 5;
        }

        #overlay.hidden {
            display: none;
        }

        #overlay h1 {
            font-size: clamp(34px, 9vw, 52px);
            margin: 0;
            transform: rotate(-2deg);
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 rgba(89, 168, 50, .35);
        }

        #overlay .sub {
            font-size: clamp(15px, 4vw, 19px);
            margin: 0;
            max-width: 85%;
            line-height: 1.45;
        }

        #overlay .final-score {
            font-size: clamp(20px, 5.5vw, 28px);
            margin: 0;
        }

        #overlay .new-best {
            color: var(--accent);
            font-weight: bold;
            animation: wob 0.8s ease-in-out infinite alternate;
        }

        @keyframes wob {
            from {
                transform: rotate(-2deg) scale(1);
            }
            to {
                transform: rotate(2deg) scale(1.06);
            }
        }

        button#start-game {
            padding: 14px 34px;
            background: var(--accent);
            border-radius: 40px;
            border: 3px solid var(--ink);
            box-shadow: 3px 3px 0 var(--ink);
            color: #fff;
            font-family: inherit;
            font-size: 21px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transform: rotate(-1.5deg);
            transition: transform .12s, box-shadow .12s;
        }

        button#start-game:hover {
            transform: rotate(-1.5deg) translate(1px, 1px);
            box-shadow: 2px 2px 0 var(--ink);
        }

        button#start-game:active {
            transform: rotate(-1.5deg) translate(3px, 3px);
            box-shadow: 0 0 0 var(--ink);
        }

        #mute-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 6;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--ink);
            background: rgba(251, 247, 236, .85);
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
        }

        @media (prefers-reduced-motion: reduce) {
            #overlay .new-best {
                animation: none;
            }
        }
    </style>
</head>
<body>
<div id="wrapper">
    <canvas id="game" width="500" height="800"></canvas>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <div id="overlay">
        <h1 id="overlay-title">Joodle Dump!</h1>
        <p class="final-score" id="overlay-score" style="display:none"></p>
        <p class="sub" id="overlay-sub">Bounce up forever! 🐇<br>← → / A D move &nbsp;·&nbsp; ↑ / W / Space shoot<br>Touch:
            hold a side to move, quick tap to shoot<br>Stomp or shoot the doodle monsters!</p>
        <button id="start-game">Start Game</button>
    </div>
</div>

<script>
    (() => {
        "use strict";

        // roundRect polyfill (Safari < 16, Firefox < 112)
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                r = Math.min(r, w / 2, h / 2);
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
            };
        }

        // ---------- constants ----------
        const W = 500, H = 800;
        const GRAVITY = 1900;          // px/s²
        const JUMP_V = -880;           // px/s  → max jump height ≈ 204px
        const SPRING_V = -1500;        // px/s  → ≈ 592px
        const MOVE_ACCEL = 3400;       // px/s²
        const MOVE_MAX = 420;          // px/s
        const AIR_FRICTION = 6.5;      // exponential decay when no input
        const CAMERA_LINE = 320;       // player is kept above this screen y
        const PLAYER_W = 46, PLAYER_H = 46;
        const PLAT_W = 92, PLAT_H = 16;
        const DT = 1 / 120;            // fixed physics step

        // ---------- elements ----------
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const overlayTitle = document.getElementById("overlay-title");
        const overlayScore = document.getElementById("overlay-score");
        const overlaySub = document.getElementById("overlay-sub");
        const startBtn = document.getElementById("start-game");
        const muteBtn = document.getElementById("mute-btn");

        // crisp canvas on high-DPI screens
        function fitCanvas() {
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        fitCanvas();
        window.addEventListener("resize", fitCanvas);

        // ---------- audio (tiny synth, no files) ----------
        let audioCtx = null;
        let muted = localStorage.getItem("joodleMuted") === "1";
        muteBtn.textContent = muted ? "🔇" : "🔊";
        muteBtn.addEventListener("click", () => {
            muted = !muted;
            localStorage.setItem("joodleMuted", muted ? "1" : "0");
            muteBtn.textContent = muted ? "🔇" : "🔊";
        });

        function ensureAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) { /* no audio */
                }
            }
            if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
        }

        function blip(freq, dur, type = "square", vol = 0.05, slideTo = null) {
            if (muted || !audioCtx) return;
            const t = audioCtx.currentTime;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type;
            o.frequency.setValueAtTime(freq, t);
            if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
            o.connect(g).connect(audioCtx.destination);
            o.start(t);
            o.stop(t + dur + 0.02);
        }

        const sJump = () => blip(320, 0.12, "square", 0.045, 520);
        const sSpring = () => blip(300, 0.3, "sawtooth", 0.05, 1150);
        const sBreak = () => blip(190, 0.18, "triangle", 0.06, 70);
        const sOver = () => blip(420, 0.6, "sawtooth", 0.05, 60);
        const sShoot = () => blip(900, 0.08, "square", 0.035, 500);
        const sStomp = () => blip(180, 0.15, "square", 0.06, 420);
        const sPickup = () => blip(520, 0.25, "triangle", 0.05, 1040);

        // ---------- input ----------
        const keys = {left: false, right: false};

        document.addEventListener("keydown", (e) => {
            if (e.code === "ArrowLeft" || e.code === "KeyA") {
                keys.left = true;
                e.preventDefault();
            }
            if (e.code === "ArrowRight" || e.code === "KeyD") {
                keys.right = true;
                e.preventDefault();
            }
            if ((e.code === "Space" || e.code === "Enter") && state !== "playing") {
                startBtn.click();
                e.preventDefault();
            }
            if ((e.code === "ArrowUp" || e.code === "KeyW" || e.code === "Space") && state === "playing") {
                shoot();
                e.preventDefault();
            }
        });
        document.addEventListener("keyup", (e) => {
            if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
            if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
        });

        // touch: hold left / right half of the canvas
        const activeTouches = new Map();

        function touchSide(t) {
            const rect = canvas.getBoundingClientRect();
            return (t.clientX - rect.left) < rect.width / 2 ? "left" : "right";
        }

        function refreshTouchKeys() {
            keys.left = false;
            keys.right = false;
            activeTouches.forEach(side => {
                keys[side] = true;
            });
        }

        const touchTimes = new Map();
        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            ensureAudio();
            for (const t of e.changedTouches) {
                activeTouches.set(t.identifier, touchSide(t));
                touchTimes.set(t.identifier, performance.now());
            }
            refreshTouchKeys();
        }, {passive: false});
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            for (const t of e.changedTouches) if (activeTouches.has(t.identifier)) activeTouches.set(t.identifier, touchSide(t));
            refreshTouchKeys();
        }, {passive: false});
        const clearTouch = (e) => {
            for (const t of e.changedTouches) {
                activeTouches.delete(t.identifier);
                const started = touchTimes.get(t.identifier);
                touchTimes.delete(t.identifier);
                if (started && performance.now() - started < 150) shoot();
            }
            refreshTouchKeys();
        };
        canvas.addEventListener("touchend", clearTouch);
        canvas.addEventListener("touchcancel", clearTouch);

        // ---------- game state ----------
        let state = "menu";            // menu | playing | over
        let player, platforms, particles, monsters, bullets, cameraY, score, lastGenY, startY, lastMonsterY, fireCd;
        let highScore = parseInt(localStorage.getItem("joodleHighScore") || "0", 10);
        let squash = 0;                // >0 squashed (landing), <0 stretched (spring)
        let time = 0;

        function rand(a, b) {
            return a + Math.random() * (b - a);
        }

        function clamp(v, a, b) {
            return Math.max(a, Math.min(b, v));
        }

        // ---------- platform generation ----------
        // Difficulty scales with height climbed (score). Gaps NEVER exceed jump reach.
        function maxGap() {
            return clamp(95 + score / 14, 95, 168);
        }   // jump height ≈ 204
        function movingChance() {
            return clamp((score - 150) / 2200, 0, 0.42);
        }

        function extraBreakChance() {
            return clamp((score - 60) / 900, 0, 0.38);
        }

        function springChance() {
            return score < 30 ? 0 : 0.075;
        }

        function makePlatform(x, y, type) {
            return {
                x, y, w: PLAT_W, h: PLAT_H, type,                    // normal | moving | breaking
                vx: type === "moving" ? (Math.random() < 0.5 ? -1 : 1) * rand(70, 130) : 0,
                spring: type !== "breaking" && Math.random() < springChance(),
                springX: rand(12, PLAT_W - 34),
                springT: 0,                                          // spring bounce animation
                state: "solid",                                      // solid | crumbling
                crumbleT: 0,
                wobble: rand(0, Math.PI * 2),                        // hand-drawn jitter seed
            };
        }

        function monsterChance() {
            return score < 250 ? 0 : clamp((score - 250) / 2600, 0.04, 0.13);
        }

        function generateUpTo(targetY) {
            while (lastGenY > targetY) {
                const gap = rand(62, maxGap());
                const newY = lastGenY - gap;
                const type = Math.random() < movingChance() ? "moving" : "normal";
                const plat = makePlatform(rand(6, W - PLAT_W - 6), newY, type);

                // powerups sit on solid, springless platforms
                if (!plat.spring && type !== "breaking") {
                    const r = Math.random();
                    if (score > 400 && r < 0.012) plat.powerup = "jetpack";
                    else if (score > 100 && r < 0.035) plat.powerup = "propeller";
                }
                platforms.push(plat);

                // breaking platforms are BONUS extras between solid ones — never the only path
                if (gap > 85 && Math.random() < extraBreakChance()) {
                    platforms.push(makePlatform(rand(6, W - PLAT_W - 6), newY + gap * rand(0.35, 0.6), "breaking"));
                }

                // monsters: well-spaced, stompable or shootable
                if (newY < lastMonsterY - 650 && Math.random() < monsterChance()) {
                    monsters.push({
                        x: rand(30, W - 84), y: newY - rand(70, 130), w: 54, h: 40,
                        vx: (Math.random() < 0.5 ? -1 : 1) * rand(45, 95),
                        t: rand(0, 6), dead: false, deadT: 0,
                    });
                    lastMonsterY = newY;
                }
                lastGenY = newY;
            }
        }

        // ---------- init / reset ----------
        function reset() {
            platforms = [];
            particles = [];
            monsters = [];
            bullets = [];
            lastMonsterY = Infinity;
            fireCd = 0;
            score = 0;
            cameraY = 0;
            squash = 0;
            time = 0;
            startY = H - 120;
            player = {
                x: W / 2 - PLAYER_W / 2,
                y: startY - PLAYER_H,
                vx: 0,
                vy: JUMP_V,
                dir: 1,
                minY: startY,
                power: null
            };

            // guaranteed platform right under the player, then a dense friendly opening
            platforms.push(makePlatform(W / 2 - PLAT_W / 2, startY, "normal"));
            lastGenY = startY;
            // dense early platforms so the start never feels unfair
            let y = startY;
            for (let i = 0; i < 8; i++) {
                y -= rand(62, 92);
                platforms.push(makePlatform(rand(6, W - PLAT_W - 6), y, "normal"));
            }
            lastGenY = y;
            generateUpTo(cameraY - 200);
        }

        // ---------- physics ----------
        function physicsStep(dt) {
            time += dt;

            // horizontal: acceleration + exponential friction + screen wrap
            let ax = 0;
            if (keys.left) {
                ax -= MOVE_ACCEL;
                player.dir = -1;
            }
            if (keys.right) {
                ax += MOVE_ACCEL;
                player.dir = 1;
            }
            player.vx += ax * dt;
            if (!keys.left && !keys.right) player.vx *= Math.exp(-AIR_FRICTION * dt);
            player.vx = clamp(player.vx, -MOVE_MAX, MOVE_MAX);
            player.x += player.vx * dt;
            if (player.x + PLAYER_W / 2 < 0) player.x += W;
            if (player.x + PLAYER_W / 2 > W) player.x -= W;

            // vertical (powerup flight overrides gravity)
            const prevBottom = player.y + PLAYER_H;
            player.vy += GRAVITY * dt;
            if (player.power) {
                player.power.t -= dt;
                if (player.power.t > 0) {
                    player.vy = player.power.type === "jetpack" ? -1050 : -680;
                    if (player.power.type === "jetpack" && Math.random() < 0.5) {
                        particles.push({
                            x: player.x + PLAYER_W / 2 + rand(-6, 6),
                            y: player.y + PLAYER_H,
                            vx: rand(-40, 40),
                            vy: rand(120, 260),
                            life: rand(0.2, 0.4),
                            rot: 0,
                            vr: 0,
                            kind: "flame"
                        });
                    }
                } else {
                    player.power = null;
                    player.vy = -150; // gentle handover back to gravity
                }
            }
            player.y += player.vy * dt;
            const bottom = player.y + PLAYER_H;

            // one-way swept collision: only while falling, feet must CROSS the platform top
            if (player.vy > 0) {
                for (const p of platforms) {
                    if (p.state !== "solid") continue;
                    if (prevBottom <= p.y + 1 && bottom >= p.y) {
                        const overlap = player.x + PLAYER_W - 12 > p.x && player.x + 12 < p.x + p.w;
                        if (!overlap) continue;

                        if (p.type === "breaking") {
                            p.state = "crumbling";
                            p.crumbleT = 0;
                            sBreak();
                            spawnCrumbs(p);
                            continue; // fall straight through — brown platforms don't bounce
                        }

                        player.y = p.y - PLAYER_H;

                        if (p.powerup) {
                            player.power = {type: p.powerup, t: p.powerup === "jetpack" ? 2.1 : 1.4};
                            p.powerup = null;
                            sPickup();
                            spawnStars(player.x + PLAYER_W / 2, p.y);
                        }

                        const springHit = p.spring &&
                            player.x + PLAYER_W / 2 > p.x + p.springX - 8 &&
                            player.x + PLAYER_W / 2 < p.x + p.springX + 30;

                        if (springHit) {
                            player.vy = SPRING_V;
                            p.springT = 0.35;
                            squash = -1;           // stretch
                            sSpring();
                            spawnStars(player.x + PLAYER_W / 2, p.y);
                        } else {
                            player.vy = JUMP_V;
                            squash = 1;            // squash
                            sJump();
                        }
                        break;
                    }
                }
            }

            // moving platforms
            for (const p of platforms) {
                if (p.type === "moving") {
                    p.x += p.vx * dt;
                    if (p.x < 4) {
                        p.x = 4;
                        p.vx *= -1;
                    }
                    if (p.x + p.w > W - 4) {
                        p.x = W - 4 - p.w;
                        p.vx *= -1;
                    }
                }
                if (p.state === "crumbling") p.crumbleT += dt;
                if (p.springT > 0) p.springT -= dt;
            }

            // bullets
            fireCd -= dt;
            for (const b of bullets) b.y += -1300 * dt;
            bullets = bullets.filter(b => b.y > cameraY - 40);

            // monsters: patrol + bob; stomp bounces, shot kills, touch kills YOU
            for (const m of monsters) {
                if (m.dead) {
                    m.deadT += dt;
                    m.y += 700 * dt;
                    continue;
                }
                m.t += dt;
                m.x += m.vx * dt;
                if (m.x < 6) {
                    m.x = 6;
                    m.vx *= -1;
                }
                if (m.x + m.w > W - 6) {
                    m.x = W - 6 - m.w;
                    m.vx *= -1;
                }

                // bullet hits
                for (const b of bullets) {
                    if (b.x > m.x && b.x < m.x + m.w && b.y > m.y && b.y < m.y + m.h) {
                        m.dead = true;
                        b.y = -1e9; // cull
                        sStomp();
                        spawnStars(m.x + m.w / 2, m.y + m.h / 2);
                    }
                }
                if (m.dead) continue;

                // player collision (forgiving 8px inset); powerup flight passes through
                if (!player.power &&
                    player.x + PLAYER_W - 8 > m.x && player.x + 8 < m.x + m.w &&
                    player.y + PLAYER_H - 6 > m.y && player.y + 6 < m.y + m.h) {
                    if (player.vy > 0 && prevBottom <= m.y + 14) {
                        m.dead = true;                    // stomp!
                        player.vy = JUMP_V * 0.9;
                        squash = 1;
                        sStomp();
                        spawnStars(m.x + m.w / 2, m.y);
                    } else {
                        gameOver();
                        return;
                    }
                }
            }
            monsters = monsters.filter(m => m.y < cameraY + H + 80 && m.deadT < 1);

            // camera: instantly track the player above the camera line (this is the Doodle Jump feel)
            const targetCam = player.y - CAMERA_LINE;
            if (targetCam < cameraY) cameraY = targetCam;

            // score = max height climbed
            if (player.y < player.minY) {
                player.minY = player.y;
                score = Math.floor((startY - player.minY) / 10);
            }

            // cleanup + generation
            platforms = platforms.filter(p => p.y < cameraY + H + 60 && !(p.state === "crumbling" && p.crumbleT > 0.7));
            generateUpTo(cameraY - 200);

            // particles
            for (const pt of particles) {
                pt.vy += 1400 * dt;
                pt.x += pt.vx * dt;
                pt.y += pt.vy * dt;
                pt.life -= dt;
                pt.rot += pt.vr * dt;
            }
            particles = particles.filter(pt => pt.life > 0);

            // squash decay
            squash *= Math.exp(-9 * dt);

            // death: fell below the screen
            if (player.y > cameraY + H + 40) gameOver();
        }

        function shoot() {
            if (state !== "playing" || !player || fireCd > 0) return;
            fireCd = 0.22;
            bullets.push({x: player.x + PLAYER_W / 2, y: player.y + 4});
            sShoot();
        }

        function spawnStars(x, y) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x,
                    y,
                    vx: rand(-220, 220),
                    vy: rand(-420, -120),
                    life: rand(0.4, 0.7),
                    rot: rand(0, 6),
                    vr: rand(-8, 8),
                    kind: "star"
                });
            }
        }

        function spawnCrumbs(p) {
            for (let i = 0; i < 6; i++) {
                particles.push({
                    x: p.x + rand(0, p.w),
                    y: p.y + rand(0, p.h),
                    vx: rand(-90, 90),
                    vy: rand(-60, 120),
                    life: rand(0.35, 0.6),
                    rot: rand(0, 6),
                    vr: rand(-10, 10),
                    kind: "crumb"
                });
            }
        }

        // ---------- drawing ----------
        function wobblyLine(x1, y1, x2, y2, seed) {
            // hand-drawn line: slight midpoint jitter, stable per platform (seeded by wobble)
            const mx = (x1 + x2) / 2 + Math.sin(seed * 7.3) * 1.6;
            const my = (y1 + y2) / 2 + Math.cos(seed * 5.1) * 1.6;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.quadraticCurveTo(mx, my, x2, y2);
            ctx.stroke();
        }

        function drawBackground() {
            ctx.fillStyle = "#fbf7ec";
            ctx.fillRect(0, 0, W, H);

            // graph paper with parallax (background scrolls at 30% of camera speed)
            const grid = 34;
            const off = (-cameraY * 0.3) % grid;
            ctx.strokeStyle = "rgba(120, 170, 200, 0.28)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = 0.5; x <= W; x += grid) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
            }
            for (let y = off - grid; y <= H; y += grid) {
                ctx.moveTo(0, y + 0.5);
                ctx.lineTo(W, y + 0.5);
            }
            ctx.stroke();

            // red margin line, notebook style
            ctx.strokeStyle = "rgba(220, 90, 90, 0.35)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(42.5, 0);
            ctx.lineTo(42.5, H);
            ctx.stroke();
        }

        function drawPlatform(p) {
            const sy = p.y - cameraY;
            if (sy < -40 || sy > H + 40) return;

            ctx.save();
            let fill, edge;
            if (p.type === "moving") {
                fill = "#7ec8e3";
                edge = "#25607e";
            } else if (p.type === "breaking") {
                fill = "#c9976b";
                edge = "#6e4a26";
            } else {
                fill = "#8fd15f";
                edge = "#3c7a1e";
            }

            if (p.state === "crumbling") {
                // two halves tilt apart and drop — like torn paper
                const t = p.crumbleT;
                ctx.globalAlpha = clamp(1 - t * 1.6, 0, 1);
                for (const side of [-1, 1]) {
                    ctx.save();
                    ctx.translate(p.x + p.w / 2 + side * p.w / 4, sy + p.h / 2 + t * t * 900);
                    ctx.rotate(side * t * 2.4);
                    ctx.fillStyle = fill;
                    ctx.fillRect(-p.w / 4, -p.h / 2, p.w / 2, p.h);
                    ctx.strokeStyle = edge;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(-p.w / 4, -p.h / 2, p.w / 2, p.h);
                    ctx.restore();
                }
                ctx.restore();
                return;
            }

            // body: rounded, hand-drawn double stroke
            ctx.fillStyle = fill;
            ctx.strokeStyle = edge;
            ctx.lineWidth = 2.5;
            const r = 8;
            ctx.beginPath();
            ctx.roundRect(p.x, sy, p.w, p.h, r);
            ctx.fill();
            ctx.stroke();
            // sketchy second stroke, slightly offset — the doodle signature
            ctx.globalAlpha = 0.45;
            ctx.beginPath();
            ctx.roundRect(p.x + Math.sin(p.wobble) * 1.5, sy + Math.cos(p.wobble) * 1.2, p.w, p.h, r);
            ctx.stroke();
            ctx.globalAlpha = 1;

            // crack hint on breaking platforms
            if (p.type === "breaking") {
                ctx.strokeStyle = edge;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(p.x + p.w * 0.45, sy + 1);
                ctx.lineTo(p.x + p.w * 0.52, sy + p.h * 0.5);
                ctx.lineTo(p.x + p.w * 0.44, sy + p.h - 1);
                ctx.stroke();
            }

            // powerup icon on the platform
            if (p.powerup) {
                const px = p.x + p.w / 2, py = sy - 12;
                if (p.powerup === "propeller") {
                    // little red cap with a spinning blade
                    ctx.fillStyle = "#d64545";
                    ctx.strokeStyle = "#7c1f1f";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(px, py + 4, 10, Math.PI, 0);
                    ctx.fill();
                    ctx.stroke();
                    ctx.strokeStyle = "#444";
                    ctx.lineWidth = 3;
                    const spin = Math.sin(time * 10 + p.wobble) * 12;
                    ctx.beginPath();
                    ctx.moveTo(px - spin, py - 8);
                    ctx.lineTo(px + spin, py - 8);
                    ctx.moveTo(px, py - 8);
                    ctx.lineTo(px, py - 4);
                    ctx.stroke();
                } else {
                    // jetpack: gray tank + red nozzle
                    ctx.fillStyle = "#9aa2ab";
                    ctx.strokeStyle = "#4a5158";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(px - 9, py - 12, 18, 22, 6);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = "#d64545";
                    ctx.beginPath();
                    ctx.roundRect(px - 5, py + 8, 10, 5, 2);
                    ctx.fill();
                }
            }

            // spring
            if (p.spring) {
                const ext = p.springT > 0 ? 10 : 0;
                const sx = p.x + p.springX;
                ctx.strokeStyle = "#555";
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                const coils = 3;
                const hgt = 8 + ext;
                for (let i = 0; i <= coils * 2; i++) {
                    const yy = sy - (hgt * i / (coils * 2));
                    const xx = sx + (i % 2 === 0 ? 2 : 18);
                    i === 0 ? ctx.moveTo(xx, yy) : ctx.lineTo(xx, yy);
                }
                ctx.stroke();
                ctx.fillStyle = "#d64545";
                ctx.strokeStyle = "#7c1f1f";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(sx - 2, sy - hgt - 8, 26, 8, 3);
                ctx.fill();
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawPlayer() {
            const sy = player.y - cameraY;
            const cx = player.x + PLAYER_W / 2;
            const cy = sy + PLAYER_H / 2;
            const sqX = 1 + squash * 0.28;   // squash>0: wide+flat, squash<0: tall+thin
            const sqY = 1 - squash * 0.34;

            const drawAt = (x) => {
                ctx.save();
                ctx.translate(x, cy + squash * 7);
                ctx.scale(player.dir === 1 ? -sqX : sqX, sqY); // 🐇 faces left natively; flip for right
                ctx.font = "44px serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowColor = "rgba(43,43,51,.6)";
                ctx.shadowBlur = 1;
                ctx.fillText("🐇", 0, 0);
                ctx.restore();
            };

            drawAt(cx);
            // draw wrap ghost when crossing the edge
            if (player.x < 0) drawAt(cx + W);
            if (player.x + PLAYER_W > W) drawAt(cx - W);

            // active powerup gear
            if (player.power && player.power.t > 0) {
                ctx.save();
                ctx.translate(cx, cy + squash * 7);
                if (player.power.type === "propeller") {
                    ctx.fillStyle = "#d64545";
                    ctx.strokeStyle = "#7c1f1f";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, -24, 11, Math.PI, 0);
                    ctx.fill();
                    ctx.stroke();
                    ctx.strokeStyle = "#444";
                    ctx.lineWidth = 3.5;
                    const spin = Math.sin(time * 26) * 17;
                    ctx.beginPath();
                    ctx.moveTo(-spin, -33);
                    ctx.lineTo(spin, -33);
                    ctx.moveTo(0, -33);
                    ctx.lineTo(0, -28);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = "#9aa2ab";
                    ctx.strokeStyle = "#4a5158";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(-player.dir * 30 - 8, -12, 16, 28, 6);
                    ctx.fill();
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        function drawParticles() {
            for (const pt of particles) {
                ctx.save();
                ctx.translate(pt.x, pt.y - cameraY);
                ctx.rotate(pt.rot);
                ctx.globalAlpha = clamp(pt.life * 2.2, 0, 1);
                if (pt.kind === "star") {
                    ctx.fillStyle = "#f2b632";
                    ctx.font = "14px serif";
                    ctx.textAlign = "center";
                    ctx.fillText("✦", 0, 0);
                } else if (pt.kind === "flame") {
                    ctx.fillStyle = Math.random() < 0.5 ? "#f2b632" : "#e06a2b";
                    ctx.beginPath();
                    ctx.arc(0, 0, 4, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = "#a97346";
                    ctx.fillRect(-4, -3, 8, 6);
                }
                ctx.restore();
            }
        }

        function drawMonster(m) {
            const sy = m.y - cameraY;
            if (sy < -60 || sy > H + 60) return;
            const bob = Math.sin(m.t * 3.4) * 4;
            ctx.save();
            ctx.translate(m.x + m.w / 2, sy + m.h / 2 + bob);
            if (m.dead) {
                ctx.rotate(m.deadT * 5);
                ctx.globalAlpha = clamp(1 - m.deadT * 1.4, 0, 1);
            }
            // wobbly doodle blob
            ctx.fillStyle = "#a06bd1";
            ctx.strokeStyle = "#553083";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            for (let i = 0; i <= 16; i++) {
                const a = (i / 16) * Math.PI * 2;
                const rr = (m.w / 2) * (1 + Math.sin(a * 3 + m.t * 2.2) * 0.09);
                const xx = Math.cos(a) * rr;
                const yy = Math.sin(a) * rr * (m.h / m.w);
                i === 0 ? ctx.moveTo(xx, yy) : ctx.lineTo(xx, yy);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            // angry eyes
            const look = Math.sign(m.vx) * 3;
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.ellipse(-9, -4, 7, 8, 0, 0, Math.PI * 2);
            ctx.ellipse(9, -4, 7, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#2b2b33";
            ctx.beginPath();
            ctx.arc(-9 + look, -3, 3, 0, Math.PI * 2);
            ctx.arc(9 + look, -3, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#2b2b33";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(-15, -13);
            ctx.lineTo(-4, -9);
            ctx.moveTo(15, -13);
            ctx.lineTo(4, -9);
            ctx.stroke();
            ctx.restore();
        }

        function drawBullets() {
            ctx.save();
            ctx.fillStyle = "#2b2b33";
            for (const b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y - cameraY, 5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function drawHUD() {
            ctx.save();
            ctx.fillStyle = "rgba(251,247,236,.75)";
            ctx.fillRect(0, 0, W, 44);
            ctx.strokeStyle = "rgba(43,43,51,.5)";
            ctx.lineWidth = 2;
            wobblyLine(0, 44, W, 44, time * 0.13);

            ctx.fillStyle = "#2b2b33";
            ctx.font = "bold 24px 'Comic Sans MS', 'Chalkboard SE', cursive";
            ctx.textAlign = "left";
            ctx.textBaseline = "middle";
            ctx.fillText(`Score: ${score}`, 14, 24);
            ctx.textAlign = "right";
            ctx.font = "18px 'Comic Sans MS', 'Chalkboard SE', cursive";
            ctx.fillStyle = "rgba(43,43,51,.75)";
            ctx.fillText(`Best: ${Math.max(highScore, score)}`, W - 60, 24);
            ctx.restore();
        }

        function draw() {
            drawBackground();
            for (const p of platforms) drawPlatform(p);
            for (const m of monsters) drawMonster(m);
            drawBullets();
            drawParticles();
            if (player) drawPlayer();
            drawHUD();
        }

        // ---------- main loop (fixed timestep, decoupled render) ----------
        let lastTime = 0, accumulator = 0, rafId = null;

        function frame(now) {
            if (state !== "playing") return;
            if (!lastTime) lastTime = now;
            let elapsed = (now - lastTime) / 1000;
            lastTime = now;
            if (elapsed > 0.1) elapsed = 0.1;  // tab switch protection

            accumulator += elapsed;
            while (accumulator >= DT) {
                physicsStep(DT);
                accumulator -= DT;
                if (state !== "playing") break;
            }
            draw();
            rafId = requestAnimationFrame(frame);
        }

        // ---------- flow ----------
        function start() {
            ensureAudio();
            reset();
            state = "playing";
            overlay.classList.add("hidden");
            lastTime = 0;
            accumulator = 0;
            if (rafId) cancelAnimationFrame(rafId);
            rafId = requestAnimationFrame(frame);
        }

        function gameOver() {
            state = "over";
            sOver();
            const isBest = score > highScore;
            if (isBest) {
                highScore = score;
                localStorage.setItem("joodleHighScore", String(highScore));
            }
            overlayTitle.textContent = "Game Over!";
            overlayScore.style.display = "";
            overlayScore.innerHTML = isBest
                ? `Score: <b>${score}</b> — <span class="new-best">NEW BEST!</span>`
                : `Score: <b>${score}</b> &nbsp;·&nbsp; Best: <b>${highScore}</b>`;
            overlaySub.innerHTML = "Tap or press <b>Space</b> to jump again";
            startBtn.textContent = "Play Again";
            overlay.classList.remove("hidden");
            draw(); // final frame behind the overlay
        }

        startBtn.addEventListener("click", start);
        overlay.addEventListener("click", (e) => {
            if (state === "over" && e.target === overlay) start();
        });

        // initial scene behind the start overlay
        reset();
        draw();
        player = null; // don't show the bunny frozen mid-air on the menu
        draw();
    })();
</script>
<script src="../logo.js"></script>
</body>
</html>
