    <style>:root {
        --bg: #0a0a0f;
        --bg-light: #12121a;
        --bg-card: #16161f;
        --border: #2a2a3a;
        --text: #c8c8d4;
        --text-dim: #5a5a6e;
        --text-bright: #eeeef4;
        --green: #4ade80;
        --red: #f87171;
        --gold: #fbbf24;
        --gold-dim: #92710a;
        --cyan: #22d3ee;
        --orange: #fb923c;
        --purple: #a78bfa;
        --nuke: #e879f9;
        --danger: #dc2626;
        --hp-bar: #22c55e;
        --hp-bg: #1a1a2a;
        --freeze: #7dd3fc;
        --split: #bef264
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Courier New', Courier, monospace;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
        user-select: none;
        -webkit-user-select: none;
        transition: background-color 2s ease
    }

    #combat-screen {
        display: none;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        position: relative
    }

    #stats-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
        background: var(--bg-light);
        border-bottom: 1px solid var(--border);
        z-index: 10;
        height: 48px;
        flex-shrink: 0;
        flex-wrap: wrap;
        gap: 4px
    }

    .stat {
        font-size: 13px;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        gap: 6px
    }

    .stat-label {
        color: var(--text-dim)
    }

    .stat-value {
        color: var(--text-bright);
        font-weight: bold;
        display: inline-block
    }

    .stat-gold .stat-value {
        color: var(--gold)
    }

    .stat-streak .stat-value {
        color: var(--cyan);
        transition: text-shadow 0.3s
    }

    .stat-streak .stat-value.streak-fire {
        text-shadow: 0 0 8px rgba(251, 191, 36, 0.6), 0 0 16px rgba(251, 191, 36, 0.3);
        color: var(--gold)
    }

    .stat-streak .stat-value.streak-inferno {
        text-shadow: 0 0 12px rgba(248, 113, 113, 0.7), 0 0 24px rgba(251, 146, 60, 0.5), 0 0 36px rgba(251, 191, 36, 0.3);
        color: var(--red);
        animation: infernoFlicker 0.4s ease-in-out infinite alternate
    }

    @keyframes infernoFlicker {
        0% {
            text-shadow: 0 0 12px rgba(248, 113, 113, 0.7), 0 0 24px rgba(251, 146, 60, 0.5)
        }
        100% {
            text-shadow: 0 0 16px rgba(248, 113, 113, 0.9), 0 0 30px rgba(251, 146, 60, 0.7), 0 0 40px rgba(251, 191, 36, 0.4)
        }
    }

    .stat-gold .stat-value.gold-flash {
        animation: goldPulse 0.35s ease
    }

    @keyframes goldPulse {
        0% {
            transform: scale(1)
        }
        40% {
            transform: scale(1.25);
            color: #fff
        }
        100% {
            transform: scale(1);
            color: var(--gold)
        }
    }

    #hp-container {
        display: flex;
        align-items: center;
        gap: 8px
    }

    #hp-bar-outer {
        width: 120px;
        height: 16px;
        background: var(--hp-bg);
        border: 1px solid var(--border);
        position: relative;
        overflow: hidden
    }

    #hp-bar-inner {
        height: 100%;
        background: var(--hp-bar);
        transition: width 0.3s ease
    }

    #hp-text {
        font-size: 13px;
        color: var(--text-bright);
        min-width: 50px
    }

    #hp-container.hp-shake {
        animation: hpShake 0.3s ease
    }

    @keyframes hpShake {
        0%, 100% {
            transform: translateX(0)
        }
        20% {
            transform: translateX(-4px)
        }
        40% {
            transform: translateX(4px)
        }
        60% {
            transform: translateX(-3px)
        }
        80% {
            transform: translateX(2px)
        }
    }

    #game-area {
        flex: 1;
        position: relative;
        overflow: hidden
    }

    #danger-zone {
        position: absolute;
        bottom: 60px;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--danger);
        opacity: 0.6;
        z-index: 5;
        transition: opacity 0.5s, height 0.5s
    }

    #danger-label {
        position: absolute;
        bottom: 64px;
        right: 16px;
        font-size: 10px;
        color: var(--danger);
        opacity: 0.5;
        letter-spacing: 2px;
        z-index: 5
    }

    #input-display {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 56px;
        background: var(--bg-light);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        letter-spacing: 4px;
        z-index: 10
    }

    #input-display .typed {
        color: var(--green)
    }

    #input-display .typed-auto {
        color: var(--cyan)
    }

    #input-display .pending {
        color: var(--text-dim)
    }

    #input-display .cursor {
        display: inline-block;
        width: 2px;
        height: 24px;
        background: var(--text-bright);
        animation: blink 0.8s step-end infinite;
        vertical-align: middle;
        margin-left: 1px
    }

    @keyframes blink {
        50% {
            opacity: 0
        }
    }

    #wpm-display {
        position: absolute;
        bottom: 62px;
        left: 16px;
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 1px;
        z-index: 10;
        opacity: 0.6
    }

    #keybind-hint {
        position: absolute;
        bottom: 74px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 1px;
        z-index: 10;
        opacity: 0;
        animation: hintFade 8s ease forwards;
        white-space: nowrap
    }

    @keyframes hintFade {
        0% {
            opacity: 0
        }
        8% {
            opacity: 0.7
        }
        75% {
            opacity: 0.7
        }
        100% {
            opacity: 0
        }
    }

    .word-entity {
        position: absolute;
        font-size: 18px;
        letter-spacing: 2px;
        padding: 4px 10px;
        border: 1px solid var(--border);
        background: var(--bg-card);
        white-space: nowrap;
        transition: border-color 0.15s, box-shadow 0.15s;
        z-index: 2;
        pointer-events: none;
        animation: wordSpawn 0.18s ease-out
    }

    .word-entity.targeted {
        border-color: var(--green);
        box-shadow: 0 0 8px rgba(74, 222, 128, 0.2)
    }

    .word-entity.auto-targeted {
        border-color: var(--cyan);
        box-shadow: 0 0 6px rgba(34, 211, 238, 0.15)
    }

    .word-entity .char-typed {
        color: var(--green)
    }

    .word-entity .char-auto {
        color: var(--cyan)
    }

    .word-entity .char-pending {
        color: var(--text)
    }

    .word-entity.bomb {
        border-color: var(--orange);
        box-shadow: 0 0 10px rgba(251, 146, 60, 0.25);
        animation: wordSpawn 0.18s ease-out, bombPulse 1.2s ease-in-out 0.18s infinite
    }

    .word-entity.nuke {
        border-color: var(--nuke);
        box-shadow: 0 0 12px rgba(232, 121, 249, 0.3);
        animation: wordSpawn 0.18s ease-out, nukePulse 0.9s ease-in-out 0.18s infinite
    }

    .word-entity.freeze {
        border-color: var(--freeze);
        box-shadow: 0 0 10px rgba(125, 211, 252, 0.25);
        animation: wordSpawn 0.18s ease-out, freezePulse 1.5s ease-in-out 0.18s infinite
    }

    .word-entity.split {
        border-color: var(--split);
        border-style: dashed;
        box-shadow: 0 0 8px rgba(190, 242, 100, 0.2);
        animation: wordSpawn 0.18s ease-out
    }

    .word-entity.fast-word {
        border-style: double;
        border-width: 3px
    }

    .word-entity.frozen-state {
        border-color: var(--freeze) !important;
        box-shadow: 0 0 12px rgba(125, 211, 252, 0.35) !important
    }

    .word-progress {
        position: absolute;
        bottom: -3px;
        left: 0;
        height: 2px;
        background: var(--green);
        transition: width 0.08s ease;
        border-radius: 0 0 1px 1px
    }

    .word-entity.bomb .word-progress {
        background: var(--orange)
    }

    .word-entity.nuke .word-progress {
        background: var(--nuke)
    }

    .word-entity.freeze .word-progress {
        background: var(--freeze)
    }

    .word-entity.split .word-progress {
        background: var(--split)
    }

    @keyframes wordSpawn {
        from {
            opacity: 0;
            transform: translateY(-10px)
        }
        to {
            opacity: 1;
            transform: translateY(0)
        }
    }

    @keyframes bombPulse {
        0%, 100% {
            box-shadow: 0 0 6px rgba(251, 146, 60, 0.2)
        }
        50% {
            box-shadow: 0 0 14px rgba(251, 146, 60, 0.45)
        }
    }

    @keyframes nukePulse {
        0%, 100% {
            box-shadow: 0 0 8px rgba(232, 121, 249, 0.25)
        }
        50% {
            box-shadow: 0 0 18px rgba(232, 121, 249, 0.5)
        }
    }

    @keyframes freezePulse {
        0%, 100% {
            box-shadow: 0 0 6px rgba(125, 211, 252, 0.2)
        }
        50% {
            box-shadow: 0 0 14px rgba(125, 211, 252, 0.4)
        }
    }

    .word-entity.destroying {
        animation: wordDestroy 0.35s ease-out forwards
    }

    @keyframes wordDestroy {
        0% {
            transform: scale(1);
            opacity: 1
        }
        50% {
            transform: scale(1.2);
            opacity: 0.6
        }
        100% {
            transform: scale(0.3);
            opacity: 0
        }
    }

    .word-entity.fell {
        animation: wordFell 0.3s ease forwards
    }

    @keyframes wordFell {
        to {
            opacity: 0;
            transform: translateY(20px)
        }
    }

    .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        pointer-events: none;
        z-index: 20;
        animation: particleFly 0.45s ease-out forwards
    }

    @keyframes particleFly {
        0% {
            opacity: 1;
            transform: translate(0, 0) scale(1)
        }
        100% {
            opacity: 0;
            transform: translate(var(--px), var(--py)) scale(0.2)
        }
    }

    .bomb-shockwave {
        position: absolute;
        border-radius: 50%;
        border: 2px solid var(--orange);
        pointer-events: none;
        z-index: 20;
        animation: shockwave 0.5s ease-out forwards
    }

    @keyframes shockwave {
        0% {
            width: 0;
            height: 0;
            opacity: 1
        }
        100% {
            width: 300px;
            height: 300px;
            opacity: 0;
            margin-left: -150px;
            margin-top: -150px
        }
    }

    .nuke-flash {
        position: fixed;
        inset: 0;
        background: var(--nuke);
        opacity: 0;
        z-index: 100;
        pointer-events: none;
        animation: nukeFlash 0.6s ease-out forwards
    }

    @keyframes nukeFlash {
        0% {
            opacity: 0.5
        }
        100% {
            opacity: 0
        }
    }

    .freeze-flash {
        position: fixed;
        inset: 0;
        background: var(--freeze);
        opacity: 0;
        z-index: 100;
        pointer-events: none;
        animation: freezeFlash 0.5s ease-out forwards
    }

    @keyframes freezeFlash {
        0% {
            opacity: 0.25
        }
        100% {
            opacity: 0
        }
    }

    .gold-popup {
        position: absolute;
        color: var(--gold);
        font-size: 14px;
        font-weight: bold;
        pointer-events: none;
        z-index: 15;
        animation: goldFloat 0.8s ease-out forwards
    }

    @keyframes goldFloat {
        0% {
            opacity: 1;
            transform: translateY(0)
        }
        100% {
            opacity: 0;
            transform: translateY(-40px)
        }
    }

    .combo-popup {
        position: absolute;
        left: 50%;
        top: 40%;
        transform: translateX(-50%);
        font-size: 28px;
        font-weight: bold;
        pointer-events: none;
        z-index: 25;
        letter-spacing: 4px;
        animation: comboFloat 1s ease-out forwards
    }

    @keyframes comboFloat {
        0% {
            opacity: 0;
            transform: translateX(-50%) scale(0.5)
        }
        15% {
            opacity: 1;
            transform: translateX(-50%) scale(1.1)
        }
        30% {
            transform: translateX(-50%) scale(1)
        }
        100% {
            opacity: 0;
            transform: translateX(-50%) translateY(-60px)
        }
    }

    .crit-flash {
        position: absolute;
        font-size: 16px;
        color: var(--gold);
        font-weight: bold;
        pointer-events: none;
        z-index: 25;
        letter-spacing: 3px;
        animation: critPop 0.6s ease-out forwards
    }

    @keyframes critPop {
        0% {
            opacity: 0;
            transform: scale(0.3)
        }
        20% {
            opacity: 1;
            transform: scale(1.3)
        }
        40% {
            transform: scale(1)
        }
        100% {
            opacity: 0;
            transform: translateY(-30px)
        }
    }

    .damage-flash {
        position: fixed;
        inset: 0;
        background: var(--red);
        opacity: 0;
        z-index: 50;
        pointer-events: none;
        animation: dmgFlash 0.3s ease-out forwards
    }

    @keyframes dmgFlash {
        0% {
            opacity: 0.15
        }
        100% {
            opacity: 0
        }
    }

    #input-display.shake {
        animation: inputShake 0.25s ease
    }

    @keyframes inputShake {
        0%, 100% {
            transform: translateX(0)
        }
        20% {
            transform: translateX(-4px)
        }
        40% {
            transform: translateX(4px)
        }
        60% {
            transform: translateX(-3px)
        }
        80% {
            transform: translateX(3px)
        }
    }

    #round-over {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10, 10, 15, 0.92);
        z-index: 200;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px
    }

    #round-over h1 {
        font-size: 36px;
        color: var(--red);
        letter-spacing: 6px;
        margin-bottom: 8px
    }

    #round-over .new-record {
        font-size: 12px;
        color: var(--gold);
        letter-spacing: 2px;
        margin-top: -16px;
        margin-bottom: 4px;
        min-height: 18px
    }

    #round-summary {
        display: flex;
        gap: 32px;
        font-size: 15px
    }

    #round-summary .sum-item {
        text-align: center
    }

    #round-summary .sum-value {
        font-size: 24px;
        color: var(--text-bright);
        display: block;
        margin-bottom: 4px
    }

    #round-summary .sum-label {
        color: var(--text-dim);
        font-size: 11px;
        letter-spacing: 1px
    }

    .sum-value.record {
        color: var(--gold) !important
    }

    #round-gold {
        font-size: 22px;
        color: var(--gold);
        margin-top: 8px
    }

    #round-buttons {
        display: flex;
        gap: 16px;
        margin-top: 16px
    }

    .btn {
        font-family: 'Courier New', Courier, monospace;
        font-size: 15px;
        padding: 12px 28px;
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text-bright);
        cursor: pointer;
        letter-spacing: 2px;
        transition: background 0.15s, border-color 0.15s, color 0.15s
    }

    .btn:hover {
        background: var(--border);
        border-color: var(--text-dim)
    }

    .btn-primary {
        border-color: var(--gold-dim);
        color: var(--gold)
    }

    .btn-primary:hover {
        background: rgba(251, 191, 36, 0.1);
        border-color: var(--gold)
    }

    .btn-play {
        border-color: var(--green);
        color: var(--green);
        font-size: 18px;
        padding: 14px 48px
    }

    .btn-play:hover {
        background: rgba(74, 222, 128, 0.1)
    }

    #shop-screen {
        display: none;
        flex-direction: column;
        height: 100vh;
        width: 100vw
    }

    #shop-header {
        text-align: center;
        padding: 24px 20px 16px;
        border-bottom: 1px solid var(--border)
    }

    #shop-header h1 {
        font-size: 14px;
        letter-spacing: 4px;
        color: var(--text-dim);
        margin-bottom: 12px
    }

    #shop-gold {
        font-size: 32px;
        color: var(--gold);
        letter-spacing: 2px
    }

    #shop-gold span {
        font-size: 14px;
        color: var(--text-dim)
    }

    #op-display {
        font-size: 14px;
        color: var(--purple);
        margin-top: 8px;
        letter-spacing: 1px
    }

    #op-display span {
        color: var(--text-dim);
        font-size: 11px
    }

    #next-goal {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 10px;
        letter-spacing: 0.5px;
        min-height: 16px
    }

    #shop-upgrades {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 600px;
        margin: 0 auto;
        width: 100%
    }

    .upgrade-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        transition: border-color 0.15s
    }

    .upgrade-card:hover {
        border-color: var(--text-dim)
    }

    .upgrade-left {
        flex: 1
    }

    .upgrade-name {
        font-size: 14px;
        color: var(--text-bright);
        letter-spacing: 1px;
        margin-bottom: 4px
    }

    .upgrade-name .level {
        color: var(--text-dim);
        font-size: 12px;
        margin-left: 8px
    }

    .upgrade-name .maxed {
        color: var(--green);
        font-size: 11px;
        margin-left: 8px
    }

    .upgrade-desc {
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 0.5px
    }

    .upgrade-preview {
        font-size: 10px;
        color: var(--cyan);
        letter-spacing: 0.5px;
        margin-top: 3px;
        opacity: 0.7
    }

    .upgrade-buy {
        font-family: 'Courier New', Courier, monospace;
        font-size: 13px;
        padding: 8px 16px;
        border: 1px solid var(--gold-dim);
        background: transparent;
        color: var(--gold);
        cursor: pointer;
        letter-spacing: 1px;
        transition: background 0.15s, border-color 0.15s;
        white-space: nowrap
    }

    .upgrade-buy:hover:not(:disabled) {
        background: rgba(251, 191, 36, 0.1);
        border-color: var(--gold)
    }

    .upgrade-buy:disabled {
        opacity: 0.3;
        cursor: not-allowed
    }

    .upgrade-buy.maxed-btn {
        border-color: var(--text-dim);
        color: var(--text-dim)
    }

    .upgrade-card.just-bought {
        animation: buyFlash 0.4s ease
    }

    @keyframes buyFlash {
        0% {
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.3)
        }
        100% {
            border-color: var(--border);
            box-shadow: none
        }
    }

    #prestige-section {
        padding: 12px 20px;
        max-width: 600px;
        margin: 0 auto;
        width: 100%
    }

    #prestige-card {
        padding: 16px;
        border: 1px solid var(--purple);
        background: var(--bg-card);
        text-align: center;
        animation: prestigePulse 2s ease-in-out infinite
    }

    @keyframes prestigePulse {
        0%, 100% {
            box-shadow: 0 0 8px rgba(167, 139, 250, 0.15)
        }
        50% {
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.35)
        }
    }

    #prestige-card h2 {
        font-size: 16px;
        color: var(--purple);
        letter-spacing: 3px;
        margin-bottom: 8px
    }

    #prestige-card p {
        font-size: 11px;
        color: var(--text-dim);
        margin-bottom: 6px;
        line-height: 1.5
    }

    #prestige-card .prestige-bonus {
        color: var(--purple);
        font-size: 12px;

let audioCtx = null, soundMuted = false;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
}

function playTone(freq, dur, type = 'sine', vol = 0.08) {
    if (soundMuted || !audioCtx) return;
    try {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start();
        o.stop(audioCtx.currentTime + dur)
    } catch (e) {
    }
}

let musicInterval = null;
const PENTA_CALM = [261.6, 293.7, 329.6, 392.0, 440.0, 523.3, 587.3, 659.3];
const PENTA_TENSE = [261.6, 311.1, 349.2, 392.0, 466.2, 523.3, 622.3, 698.5];
let musicStep = 0;

function playMusicNote() {
    if (soundMuted || !audioCtx || !combat || !combat.running) return;
    const hpRatio = combat.hp / combat.maxHP;
    const scale = hpRatio < 0.35 ? PENTA_TENSE : PENTA_CALM;
    const intensity = Math.min(1, combat.elapsed / 120);
    const vol = 0.02 + intensity * 0.015;
    const noteCount = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < noteCount; i++) {
        const idx = (musicStep + i * 2) % scale.length;
        const octaveShift = Math.random() < 0.3 ? 2 : 1;
        const freq = scale[idx] * octaveShift;
        const dur = 0.3 + Math.random() * 0.5;
        setTimeout(() => playTone(freq, dur, 'sine', vol * (0.6 + Math.random() * 0.4)), i * 150)
    }
    musicStep = (musicStep + 1) % scale.length
}

function startMusic() {
    stopMusic();
    if (soundMuted) return;
    musicStep = 0;
    playMusicNote();
    musicInterval = setInterval(() => {
        if (!combat || !combat.running) {
            stopMusic();
            return
        }
        playMusicNote()
    }, 2200 + Math.random() * 800)
}

function stopMusic() {
    if (musicInterval) {
        clearInterval(musicInterval);
        musicInterval = null

}

    return gl('nukeWords') * 0.015
}

function getFreezeCh() {
    return gl('cryoPulse') * 0.03
}

function getAutoSpeed() {
    return gl('autoTyper')
}

function getGoldBonus() {
    return gl('goldRush') * 0.3
}

function getStreakShield() {
    return gl('streakShield')
}

function getCritCh() {
    return gl('critStrike') * 0.05
}

function getMagnetSlow() {
    return gl('wordMagnet') * 0.08
}

function getDoubleGoldCh() {
    return gl('doubleGold') * 0.06
}

function getStreakThresholds() {
    const l = gl('comboMaster');
    return [Math.max(2, 5 - l), Math.max(4, 10 - l * 2), Math.max(8, 20 - l * 3)]
}

function getSplitCh(elapsed) {
    if (elapsed < 45) return 0;
    return Math.min(0.08, 0.02 + (elapsed - 45) / 75 * 0.06)
}

function getFastWordCh(elapsed) {
    if (elapsed < 90) return 0;
    return Math.min(0.35, 0.15 + (elapsed - 90) / 60 * 0.2)
}

function createCombat() {
    const mhp = getMaxHP();
    return {
        hp: mhp,
        maxHP: mhp,
        gold: 0,
        wordsDestroyed: 0,
        streak: 0,
        bestStreak: 0,
        streakMissBuffer: 0,
        correctKeys: 0,
        totalKeys: 0,
        startTime: 0,
        elapsed: 0,
        words: [],
        targetId: null,
        autoTargetId: null,
        autoTimer: 0,
        nextSpawnTime: 0,
        wordIdCounter: 0,
        running: false,
        animFrame: null,
        lastTime: 0,
        freezeUntil: 0,
        wpmTimestamps: [],
        lastGold: 0,
        lastComboThreshold: 0,
        phase: ''
    }
}

function getDiff(t) {
    const si = t > 120 ? Math.max(0.25, 2.5 - t * 0.025) : Math.max(0.4, 2.5 - t * 0.025);
    const bfs = 25 + t * 0.8;
    const fs = bfs * getFallMult();
    const mn = 3;
    const rmx = Math.min(10, 4 + Math.floor(t / 20));
    const mx = Math.max(mn, Math.round(rmx - getMaxLenReduc()));
    const baseMa = Math.min(12, 2 + Math.floor(t / 12));
    const ma = t > 150 ? Math.min(16, baseMa + Math.floor((t - 150) / 30)) : baseMa;
    return {spawnInterval: si, fallSpeed: fs, minLen: mn, maxLen: mx, maxActive: ma}
}

function calcGold(base, isSplit) {
    const bonus = getGoldBonus();
    const th = getStreakThresholds();
    let sb = 0;
    if (combat.streak >= th[2]) sb = 3; else if (combat.streak >= th[1]) sb = 2; else if (combat.streak >= th[0]) sb = 1;
    let total = (base + (isSplit ? 2 : 0) + bonus + sb) * getOPMult();
    if (Math.random() < getDoubleGoldCh()) total *= 2;
    return total
}

const COMBO_MESSAGES = [{threshold: 5, text: 'NICE', color: 'var(--cyan)'}, {
    threshold: 10,
    text: 'GREAT',
    color: 'var(--green)'
}, {threshold: 20, text: 'ON FIRE', color: 'var(--gold)'}, {
    threshold: 35,
    text: 'UNSTOPPABLE',
    color: 'var(--orange)'
}, {threshold: 50, text: 'GODLIKE', color: 'var(--nuke)'}];

function checkComboPopup() {
    let highest = 0;
    for (const cm of COMBO_MESSAGES) {
        if (combat.streak >= cm.threshold) highest = cm.threshold
    }
    if (highest > combat.lastComboThreshold) {
        combat.lastComboThreshold = highest;
        const msg = COMBO_MESSAGES.find(m => m.threshold === highest);
        if (msg) showComboPopup(msg.text, msg.color)
    }
}

function showComboPopup(text, color) {
    const el = document.createElement('div');
    el.className = 'combo-popup';
    el.textContent = text;
    el.style.color = color;
    $gameArea.appendChild(el);
    setTimeout(() => el.remove(), 1100)
}

const $start = document.getElementById('start-screen'), $combat = document.getElementById('combat-screen'),
    $shop = document.getElementById('shop-screen'), $roundOver = document.getElementById('round-over'),
    $gameArea = document.getElementById('game-area'), $input = document.getElementById('input-display'),
    $hpInner = document.getElementById('hp-bar-inner'), $hpText = document.getElementById('hp-text'),
    $hpContainer = document.getElementById('hp-container'), $cGold = document.getElementById('combat-gold'),
    $cStreak = document.getElementById('combat-streak'), $cWords = document.getElementById('combat-words'),
    $cTimer = document.getElementById('combat-timer'), $wpmDisplay = document.getElementById('wpm-display'),
    $dangerZone = document.getElementById('danger-zone'), $phaseLabel = document.getElementById('phase-label');

function showScreen(id) {
    $start.style.display = 'none';
    $combat.style.display = 'none';
    $shop.style.display = 'none';
    $roundOver.style.display = 'none';
    if (id === 'start') {

        const opInfo = document.getElementById('start-op-info');
        opInfo.textContent = state.overclock > 0 ? `OVERCLOCK ×${state.overclock} — +${((getOPMult() - 1) * 100).toFixed(0)}% gold, +${state.overclock} HP` : ''
    } else if (id === 'combat') $combat.style.display = 'flex'; else if (id === 'shop') {
        $shop.style.display = 'flex';
        renderShop()
    } else if (id === 'roundover') $roundOver.style.display = 'flex'
}

function updateHP() {
    const p = (combat.hp / combat.maxHP) * 100;
    $hpInner.style.width = p + '%';
    $hpInner.style.background = p > 40 ? 'var(--hp-bar)' : p > 20 ? 'var(--orange)' : 'var(--red)';
    $hpText.textContent = `${combat.hp}/${combat.maxHP}`
}

function updateStats() {
    const newGold = Math.floor(combat.gold);
    if (newGold > combat.lastGold) {
        combat.lastGold = newGold;
        $cGold.classList.remove('gold-flash');
        void $cGold.offsetWidth;
        $cGold.classList.add('gold-flash')
    }
    $cGold.textContent = newGold;
    $cStreak.textContent = combat.streak;
    $cStreak.classList.remove('streak-fire', 'streak-inferno');
    if (combat.streak >= 20) $cStreak.classList.add('streak-inferno'); else if (combat.streak >= 10) $cStreak.classList.add('streak-fire');
    $cWords.textContent = combat.wordsDestroyed;
    $cTimer.textContent = Math.floor(combat.elapsed) + 's'
}

function updateDangerZone() {
    if (!combat) return;
    let nearCount = 0;
    const dangerY = $gameArea.clientHeight - 62;
    const warnY = dangerY * 0.65;
    combat.words.forEach(w => {
        if (!w.destroyed && w.y > warnY) nearCount++
    });
    const intensity = Math.min(1, nearCount / 4);
    $dangerZone.style.opacity = 0.3 + intensity * 0.7;
    $dangerZone.style.height = (2 + intensity * 3) + 'px'
}

function updatePhaseLabel() {
    if (!combat) return;
    let phase = '';
    const t = combat.elapsed;
    if (t < 20) phase = 'WARM UP'; else if (t < 45) phase = 'STEADY'; else if (t < 90) phase = 'RISING'; else if (t < 120) phase = 'INTENSE'; else if (t < 150) phase = 'CRITICAL'; else phase = 'OVERDRIVE';
    if (phase !== combat.phase) {
        combat.phase = phase;
        $phaseLabel.textContent = phase;
        $phaseLabel.style.opacity = '0.6';
        setTimeout(() => {
            if ($phaseLabel.textContent === phase) $phaseLabel.style.opacity = '0.3'
        }, 1500)
    }
}

function calcWPM() {
    if (!combat) return 0;
    const now = combat.elapsed;
    const cutoff = now - 15;
    const recent = combat.wpmTimestamps.filter(t => t > cutoff);
    const elapsed = Math.min(15, now);
    if (elapsed < 1) return 0;
    return Math.round((recent.length / 5) / (elapsed / 60))
}

function renderInput() {
    const t = combat.words.find(w => w.id === combat.targetId);
    if (!t) {
        $input.innerHTML = '<span class="cursor"></span>';
        return
    }
    let h = '';
    for (let i = 0; i < t.text.length; i++) {
        if (i < t.typedIndex) {
            h += `<span class="${t.autoTypedChars.has(i) ? 'typed-auto' : 'typed'}">${t.text[i]}</span>`
        } else if (i === t.typedIndex) {
            h += `<span class="cursor"></span><span class="pending">${t.text[i]}</span>`
        } else {
            h += `<span class="pending">${t.text[i]}</span>`
        }
    }
    $input.innerHTML = h
}

function renderWord(w) {
    if (!w.el) {
        w.el = document.createElement('div');
        w.el.className = 'word-entity';
        if (w.type === 'bomb') w.el.classList.add('bomb');
        if (w.type === 'nuke') w.el.classList.add('nuke');
        if (w.type === 'freeze') w.el.classList.add('freeze');
        if (w.type === 'split') w.el.classList.add('split');
        if (w.fast) w.el.classList.add('fast-word');
        $gameArea.appendChild(w.el)
    }
    w.el.style.left = w.x + 'px';
    w.el.style.top = w.y + 'px';
    const isFrozen = combat && combat.freezeUntil > combat.elapsed;
    w.el.classList.toggle('frozen-state', isFrozen && w.type !== 'freeze');
    w.el.classList.toggle('targeted', w.id === combat.targetId);
    w.el.classList.toggle('auto-targeted', w.id === combat.autoTargetId && w.id !== combat.targetId);
    let h = '';
    for (let i = 0; i < w.text.length; i++) {
        if (i < w.typedIndex) {
            h += `<span class="${w.autoTypedChars.has(i) && !w.playerTypedChars.has(i) ? 'char-auto' : 'char-typed'}">${w.text[i]}</span>`
        } else {
            h += `<span class="char-pending">${w.text[i]}</span>`
        }
    }
    if (w.id === combat.autoTargetId && w.id !== combat.targetId) h += '<span class="auto-indicator">BOT</span>';
    const prog = w.text.length > 0 ? (w.typedIndex / w.text.length) * 100 : 0;
    if (prog > 0 && prog < 100) h += `<div class="word-progress" style="width:${prog}%"></div>`;
    w.el.innerHTML = h
}

function removeWordEl(w, anim) {
    if (w.el) {
        if (anim) {
            w.el.classList.add(anim);
            setTimeout(() => w.el.remove(), 400)
        } else w.el.remove()
    }
}

function emitParticles(x, y, color, count) {
    count = count || 8;
    for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.background = color;
        p.style.left = (x + Math.random() * 40) + 'px';
        p.style.top = (y + Math.random() * 20) + 'px';
        const angle = Math.random() * Math.PI * 2;
        const dist = 30 + Math.random() * 60;
        p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
        $gameArea.appendChild(p);
        setTimeout(() => p.remove(), 500)
    }
}

function screenShake(intensity, duration) {
    const start = performance.now();

    function shake(now) {
        const el = now - start;
        if (el > duration) {
            $gameArea.style.transform = '';
            return
        }
        const decay = 1 - el / duration;
        const sx = (Math.random() - 0.5) * 2 * intensity * decay;
        const sy = (Math.random() - 0.5) * 2 * intensity * decay;
        $gameArea.style.transform = `translate(${sx}px,${sy}px)`;
        requestAnimationFrame(shake)
    }

    requestAnimationFrame(shake)
}

function goldPopup(x, y, amt) {

    el.className = 'gold-popup';
    el.textContent = `+${amt.toFixed(1)}g`;

    el.style.top = y + 'px';

}

function bombExplode(w) {
    const el = document.createElement('div');
    el.className = 'bomb-shockwave';

    screenShake(4, 200);
    emitParticles(w.x + 20, w.y, '#fb923c', 10);

    combat.words.forEach(o => {
        if (o.id === w.id || o.destroyed) return;
        const dx = (o.x + 40) - cx, dy = (o.y + 10) - cy;

            o.destroyed = true;
            removeWordEl(o, 'destroying');
            emitParticles(o.x, o.y, '#fb923c', 6);
            const ge = calcGold(1);
            combat.gold += ge;

        }
    });

}

function nukeExplode() {
    const el = document.createElement('div');
    el.className = 'nuke-flash';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 700);
    sndNuke();
    screenShake(7, 300);
    combat.words.forEach(w => {
        if (!w.destroyed) {

            removeWordEl(w, 'destroying');

            combat.gold += ge;
            combat.wordsDestroyed++
        }

function freezeActivate() {
    const el = document.createElement('div');
    el.className = 'freeze-flash';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 600);
    sndFreeze();
    combat.freezeUntil = combat.elapsed + 3;

        if (w.el) renderWord(w)
    })
}

function splitWord(w) {
    const half = Math.ceil(w.text.length / 2);
    const diff = getDiff(combat.elapsed);
    const w1text = randWord(Math.max(3, half - 1), half + 1);
    const w2text = randWord(Math.max(3, half - 1), half + 1);
    const aw = $gameArea.clientWidth;
    [{text: w1text, xOff: -30}, {text: w2text, xOff: 30}].forEach(s => {
        const nx = Math.max(10, Math.min(aw - s.text.length * 14 - 30, w.x + s.xOff));
        combat.words.push({
            id: ++combat.wordIdCounter,
            text: s.text,
            type: 'normal',
            x: nx,
            y: w.y,
            typedIndex: 0,
            autoTypedChars: new Set(),
            playerTypedChars: new Set(),
            fallSpeed: diff.fallSpeed,
            el: null,
            destroyed: false,
            fast: false,
            critChecked: true
        })
    })
}

function spawnWord() {
    const diff = getDiff(combat.elapsed);
    if (combat.words.length >= diff.maxActive) return;
    let type = 'normal', text;
    const r = Math.random();
    if (getNukeCh() > 0 && r < getNukeCh()) {
        type = 'nuke';
        text = NUKE_WORDS[Math.floor(Math.random() * NUKE_WORDS.length)]
    } else if (getFreezeCh() > 0 && r < getNukeCh() + getFreezeCh()) {
        type = 'freeze';
        text = FREEZE_WORDS[Math.floor(Math.random() * FREEZE_WORDS.length)]
    } else if (getBombCh() > 0 && r < getNukeCh() + getFreezeCh() + getBombCh()) {
        type = 'bomb';
        text = randWord(5, 7)
    } else if (getSplitCh(combat.elapsed) > 0 && Math.random() < getSplitCh(combat.elapsed)) {
        type = 'split';
        text = randWord(5, 8)
    } else {
        text = randWord(diff.minLen, diff.maxLen)
    }
    const aw = $gameArea.clientWidth;
    const mx = Math.max(10, aw - text.length * 14 - 30);
    const isFast = type === 'normal' && Math.random() < getFastWordCh(combat.elapsed);
    const newWord = {
        id: ++combat.wordIdCounter,
        text,
        type,
        x: 10 + Math.random() * mx,
        y: -20,
        typedIndex: 0,
        autoTypedChars: new Set(),
        playerTypedChars: new Set(),
        fallSpeed: isFast ? diff.fallSpeed * 1.8 : diff.fallSpeed,
        el: null,
        destroyed: false,
        fast: isFast,
        critChecked: false
    };
    combat.words.push(newWord)
}

function findTarget(ch, excludeId) {
    let best = null, bestY = -Infinity;
    for (const w of combat.words) {
        if (w.destroyed || w.id === excludeId) continue;
        if (w.text[w.typedIndex] === ch) {
            if (w.y > bestY) {
                bestY = w.y;
                best = w
            }
        }
    }
    return best
}

function findPrefixSwitch(typedPrefix, ch, excludeId) {
    const full = typedPrefix + ch;
    let best = null, bestY = -Infinity;
    for (const w of combat.words) {
        if (w.destroyed || w.id === excludeId) continue;
        if (w.typedIndex > 0) continue;
        if (w.text.length >= full.length && w.text.startsWith(full)) {
            if (w.y > bestY) {
                bestY = w.y;
                best = w
            }
        }
    }
    return best
}

function handleKey(e) {
    if (!combat || !combat.running) return;
    if (e.key === 'Escape') {
        combat.targetId = null;
        renderInput();
        return
    }
    if (e.key === 'Backspace') {
        const t = combat.words.find(w => w.id === combat.targetId);
        if (t && t.typedIndex > 0) {
            t.typedIndex--;
            t.playerTypedChars.delete(t.typedIndex);
            t.autoTypedChars.delete(t.typedIndex);
            renderWord(t);
            renderInput()
        }
        e.preventDefault();
        return
    }
    if (e.key.length !== 1) return;
    const ch = e.key.toLowerCase();
    if (!/^[a-z]$/.test(ch)) return;
    combat.totalKeys++;
    let t = combat.words.find(w => w.id === combat.targetId);
    if (t && t.destroyed) {
        combat.targetId = null;
        t = null
    }
    if (t) {
        if (t.text[t.typedIndex] === ch) {
            combat.correctKeys++;
            combat.wpmTimestamps.push(combat.elapsed);
            t.playerTypedChars.add(t.typedIndex);
            t.typedIndex++;
            sndType();
            renderWord(t);
            renderInput();
            if (t.typedIndex >= t.text.length) completeWord(t);
            return
        }
        const typedSoFar = t.text.substring(0, t.typedIndex);
        const prefixAlt = findPrefixSwitch(typedSoFar, ch, t.id);
        if (prefixAlt) {
            combat.targetId = prefixAlt.id;
            if (combat.autoTargetId === prefixAlt.id) combat.autoTargetId = null;
            const newIdx = t.typedIndex + 1;
            for (let i = 0; i < newIdx; i++) prefixAlt.playerTypedChars.add(i);
            prefixAlt.typedIndex = newIdx;
            combat.correctKeys++;
            combat.wpmTimestamps.push(combat.elapsed);
            sndType();
            renderWord(prefixAlt);
            renderWord(t);
            renderInput();
            if (prefixAlt.typedIndex >= prefixAlt.text.length) completeWord(prefixAlt);
            return
        }
        const alt = findTarget(ch, t.id);
        if (alt) {
            combat.targetId = alt.id;
            if (combat.autoTargetId === alt.id) combat.autoTargetId = null;
            combat.correctKeys++;
            combat.wpmTimestamps.push(combat.elapsed);
            alt.playerTypedChars.add(alt.typedIndex);
            alt.typedIndex++;
            sndType();
            renderWord(alt);
            renderInput();
            if (alt.typedIndex >= alt.text.length) completeWord(alt);
            return
        }
        $input.classList.remove('shake');
        void $input.offsetWidth;
        $input.classList.add('shake');
        sndError();
        return
    }
    const best = findTarget(ch, null);
    if (best) {
        combat.targetId = best.id;
        if (combat.autoTargetId === best.id) combat.autoTargetId = null;
        combat.correctKeys++;
        combat.wpmTimestamps.push(combat.elapsed);
        best.playerTypedChars.add(best.typedIndex);
        best.typedIndex++;
        sndType();
        renderWord(best);
        renderInput();
        if (best.typedIndex >= best.text.length) completeWord(best)
    }
}

function completeWord(w) {
    w.destroyed = true;
    const isSplit = w.type === 'split';
    const ge = calcGold(isSplit ? 3 : 1);
    combat.gold += ge;
    combat.wordsDestroyed++;
    combat.streak++;
    if (combat.streak > combat.bestStreak) combat.bestStreak = combat.streak;
    combat.streakMissBuffer = 0;
    checkComboPopup();
    const $s = $cStreak;
    $s.classList.remove('streak-pulse');
    void $s.offsetWidth;
    $s.classList.add('streak-pulse');
    goldPopup(w.x, w.y, ge);
    sndComplete();
    const colorMap = {normal: '#4ade80', bomb: '#fb923c', nuke: '#e879f9', freeze: '#7dd3fc', split: '#bef264'};
    emitParticles(w.x, w.y, colorMap[w.type] || '#4ade80', 8);
    if (w.type === 'bomb') bombExplode(w); else if (w.type === 'nuke') nukeExplode(); else if (w.type === 'freeze') freezeActivate(); else if (w.type === 'split') splitWord(w);
    removeWordEl(w, 'destroying');
    combat.words = combat.words.filter(ww => ww.id !== w.id);
    if (combat.targetId === w.id) combat.targetId = null;
    if (combat.autoTargetId === w.id) combat.autoTargetId = null;
    renderInput();
    updateStats()
}

function wordHitBottom(w) {
    w.destroyed = true;
    removeWordEl(w, 'fell');
    combat.hp--;
    flashDamage();
    sndDamage();
    screenShake(2, 120);
    $hpContainer.classList.remove('hp-shake');
    void $hpContainer.offsetWidth;
    $hpContainer.classList.add('hp-shake');
    updateHP();
    if (combat.streak > 0) {
        combat.streakMissBuffer++;
        if (combat.streakMissBuffer > getStreakShield()) {
            combat.streak = 0;
            combat.streakMissBuffer = 0;
            combat.lastComboThreshold = 0
        }
    }
    if (w.id === combat.targetId) {
        combat.targetId = null;
        renderInput()
    }
    if (w.id === combat.autoTargetId) combat.autoTargetId = null;
    combat.words = combat.words.filter(ww => ww.id !== w.id);
    if (combat.hp <= 0) endRound()
}

function autoTyperTick(dt) {
    const speed = getAutoSpeed();
    if (speed <= 0) return;
    combat.autoTimer += dt;
    const interval = 2 / speed;
    while (combat.autoTimer >= interval) {
        combat.autoTimer -= interval;
        let cands = combat.words.filter(w => w.id !== combat.targetId && !w.destroyed);
        if (cands.length === 0) return;
        cands.sort((a, b) => b.y - a.y);
        const tgt = cands[0];
        combat.autoTargetId = tgt.id;
        if (tgt.typedIndex < tgt.text.length) {
            tgt.autoTypedChars.add(tgt.typedIndex);
            tgt.typedIndex++;
            renderWord(tgt);
            if (tgt.typedIndex >= tgt.text.length) {
                tgt.destroyed = true;
                const ge = calcGold(1);
                combat.gold += ge;
                combat.wordsDestroyed++;
                combat.streak++;
                if (combat.streak > combat.bestStreak) combat.bestStreak = combat.streak;
                checkComboPopup();
                goldPopup(tgt.x, tgt.y, ge);
                emitParticles(tgt.x, tgt.y, '#22d3ee', 6);
                removeWordEl(tgt, 'destroying');
                combat.words = combat.words.filter(ww => ww.id !== tgt.id);
                combat.autoTargetId = null;
                updateStats()
            }
        }
    }
}

function updateBgIntensity() {
    if (!combat) return;
    const t = Math.min(combat.elapsed / 120, 1);
    const r = 10 + Math.round(t * 8);
    const g = 10 - Math.round(t * 2);
    const b = 15 - Math.round(t * 4);
    document.body.style.backgroundColor = `rgb(${r},${g},${Math.max(8, b)})`
}

function gameLoop(now) {
    if (!combat || !combat.running) return;
    combat.animFrame = requestAnimationFrame(gameLoop);
    if (combat.lastTime === 0) combat.lastTime = now;
    const dt = Math.min((now - combat.lastTime) / 1000, 0.1);
    combat.lastTime = now;
    combat.elapsed += dt;
    const diff = getDiff(combat.elapsed);
    const dangerY = $gameArea.clientHeight - 62;
    const magnetZone = dangerY * 0.7;
    const isFrozen = combat.freezeUntil > combat.elapsed;
    combat.nextSpawnTime -= dt;
    if (combat.nextSpawnTime <= 0) {
        spawnWord();
        combat.nextSpawnTime = diff.spawnInterval
    }
    for (let i = combat.words.length - 1; i >= 0; i--) {
        const w = combat.words[i];
        if (w.destroyed) continue;
        if (!w.critChecked && getCritCh() > 0 && w.typedIndex === 0) {
            w.critChecked = true;
            if (Math.random() < getCritCh()) {
                for (let j = 0; j < w.text.length; j++) w.playerTypedChars.add(j);
                w.typedIndex = w.text.length;
                showCritFlash(w.x, w.y);
                completeWord(w);
                if (!combat.running) return;
                continue
            }
        }
        if (!isFrozen) {
            let spd = w.fallSpeed;
            if (getMagnetSlow() > 0 && w.y > magnetZone) spd *= (1 - getMagnetSlow());
            w.y += spd * dt
        }
        renderWord(w);
        if (w.y >= dangerY) {
            wordHitBottom(w);
            if (!combat.running) return
        }
    }
    autoTyperTick(dt);
    updateStats();
    updateBgIntensity();
    updateDangerZone();
    updatePhaseLabel();
    const wpm = calcWPM();
    $wpmDisplay.textContent = wpm + ' WPM';
    combat.wpmTimestamps = combat.wpmTimestamps.filter(t => t > combat.elapsed - 15)
}

function startRound() {
    $gameArea.querySelectorAll('.word-entity,.gold-popup,.bomb-shockwave,.particle,.combo-popup,.crit-flash').forEach(e => e.remove());
    combat = createCombat();
    combat.running = true;
    combat.lastTime = 0;
    combat.nextSpawnTime = 1.0;
    state.totalRounds++;
    saveState();
    initAudio();
    showScreen('combat');
    updateHP();
    updateStats();
    renderInput();
    document.body.style.backgroundColor = '';
    $phaseLabel.textContent = '';
    startMusic();
    if (state.totalRounds === 1) {
        const hint = document.createElement('div');
        hint.id = 'keybind-hint';
        hint.textContent = 'Type to destroy words · ESC to deselect · Backspace to undo';
        $gameArea.appendChild(hint);
        setTimeout(() => {
            const h = document.getElementById('keybind-hint');
            if (h) h.remove()
        }, 8500)
    }
    combat.animFrame = requestAnimationFrame(gameLoop)
}

function endRound() {
    combat.running = false;
    if (combat.animFrame) cancelAnimationFrame(combat.animFrame);
    stopMusic();
    document.body.style.backgroundColor = '';
    const ts = combat.elapsed, tb = Math.floor(ts / 10), tg = Math.floor(combat.gold + tb);
    state.gold += tg;
    let records = [];
    if (ts > state.bestTime) {
        state.bestTime = ts;
        records.push('TIME')
    }
    if (combat.wordsDestroyed > state.bestWords) {
        state.bestWords = combat.wordsDestroyed;
        records.push('WORDS')
    }
    const wpm = calcWPM();
    if (wpm > state.bestWPM) {
        state.bestWPM = wpm;
        records.push('WPM')
    }
    saveState();
    const $sumTime = document.getElementById('sum-time');
    $sumTime.textContent = Math.floor(ts) + 's';
    $sumTime.classList.toggle('record', records.includes('TIME'));
    const $sumWords = document.getElementById('sum-words');
    $sumWords.textContent = combat.wordsDestroyed;
    $sumWords.classList.toggle('record', records.includes('WORDS'));
    const $sumWpm = document.getElementById('sum-wpm');
    $sumWpm.textContent = wpm;
    $sumWpm.classList.toggle('record', records.includes('WPM'));
    const acc = combat.totalKeys > 0 ? Math.round((combat.correctKeys / combat.totalKeys) * 100) : 0;
    document.getElementById('sum-accuracy').textContent = acc + '%';
    document.getElementById('round-gold').textContent = `+${tg} GOLD`;
    const $rec = document.getElementById('round-record');
    $rec.textContent = records.length > 0 ? 'NEW RECORD: ' + records.join(', ') : '';
    if (combat.bestStreak >= 5) {
        $rec.textContent += ($rec.textContent ? ' · ' : '') + 'Best Streak: ' + combat.bestStreak
    }
    setTimeout(() => showScreen('roundover'), 300)
}

function canPrestige() {
    const maxedCount = UPGRADES.filter(u => gl(u.id) >= u.maxLevel).length;
    return state.totalRounds >= 20 && maxedCount >= 3
}

function doPrestige() {
    state.upgrades = {};
    state.gold = 0;
    state.overclock = (state.overclock || 0) + 1;
    saveState();
    initAudio();
    sndPrestige();
    const fl = document.createElement('div');
    fl.className = 'prestige-flash';
    document.body.appendChild(fl);
    setTimeout(() => fl.remove(), 900);
    setTimeout(() => renderShop(), 400)
}

function renderShop() {
    document.getElementById('shop-gold').innerHTML = `${Math.floor(state.gold)}<span> GOLD</span>`;
    const $op = document.getElementById('op-display');
    if (state.overclock > 0) {
        $op.innerHTML = `OVERCLOCK ×${state.overclock} <span>— +${((getOPMult() - 1) * 100).toFixed(0)}% gold, +${state.overclock} HP</span>`
    } else $op.textContent = '';
    const $ng = document.getElementById('next-goal');
    let cheapest = null, cheapCost = Infinity;
    UPGRADES.forEach(u => {
        const c = upgCost(u);
        if (c > state.gold && c < cheapCost) {
            cheapCost = c;
            cheapest = u
        }
    });
    if (cheapest) {
        const need = cheapCost - Math.floor(state.gold);
        $ng.textContent = `Next: ${cheapest.name} Lv ${gl(cheapest.id) + 1} — need ${need} more gold`
    } else if (UPGRADES.every(u => gl(u.id) >= u.maxLevel)) {
        $ng.textContent = 'All upgrades maxed!'
    } else $ng.textContent = '';
    const $ps = document.getElementById('prestige-section');
    if (canPrestige()) {
        $ps.innerHTML = `<div id="prestige-card"><h2>⚡ OVERCLOCK</h2><p>Reset all upgrades and gold.<br>Gain +1 Overclock Point permanently.</p><p class="prestige-bonus">Current: ×${state.overclock} → ×${state.overclock + 1} (+5% gold, +1 HP)</p><button class="btn-prestige" id="prestige-btn">OVERCLOCK</button></div>`;
        document.getElementById('prestige-btn').addEventListener('click', () => {
            if (confirm('OVERCLOCK: Reset ALL upgrades and gold?\n\nYou will gain +1 Overclock Point:\n• Permanent +5% gold multiplier\n• Permanent +1 starting HP\n\nThis cannot be undone.')) {
                doPrestige()
            }
        })
    } else $ps.innerHTML = '';
    const $l = document.getElementById('shop-upgrades');
    $l.innerHTML = '';
    UPGRADES.forEach(u => {
        const lvl = gl(u.id), cost = upgCost(u), maxed = lvl >= u.maxLevel, canBuy = !maxed && state.gold >= cost;
        const card = document.createElement('div');
        card.className = 'upgrade-card';
        const left = document.createElement('div');
        left.className = 'upgrade-left';
        const nm = document.createElement('div');
        nm.className = 'upgrade-name';
        nm.innerHTML = u.name + (maxed ? '<span class="maxed">MAX</span>' : `<span class="level">Lv ${lvl}</span>`);
        const desc = document.createElement('div');
        desc.className = 'upgrade-desc';
        if (lvl > 0 && !maxed) {
            desc.textContent = u.desc(lvl) + ' → ' + u.desc(lvl + 1)
        } else if (lvl > 0 && maxed) {
            desc.textContent = u.desc(lvl)
        } else desc.textContent = u.fx;
        left.appendChild(nm);
        left.appendChild(desc);
        if (lvl > 0 && !maxed) {
            const preview = document.createElement('div');
            preview.className = 'upgrade-preview';
            preview.textContent = `Next: ${u.fx}`;
            left.appendChild(preview)
        }
        const btn = document.createElement('button');
        btn.className = 'upgrade-buy' + (maxed ? ' maxed-btn' : '');
        btn.textContent = maxed ? 'MAXED' : `${cost}g`;
        btn.disabled = !canBuy;
        if (!maxed) btn.addEventListener('click', () => {
            if (state.gold >= cost) {
                state.gold -= cost;
                state.upgrades[u.id] = (state.upgrades[u.id] || 0) + 1;
                saveState();
                card.classList.remove('just-bought');
                void card.offsetWidth;
                card.classList.add('just-bought');
                initAudio();
                sndBuy();
                renderShop()
            }
        });
        card.appendChild(left);
        card.appendChild(btn);
        $l.appendChild(card)
    });
    document.getElementById('shop-stats').textContent = `Best: ${Math.floor(state.bestTime)}s | ${state.bestWords} words | ${state.bestWPM} WPM | Round #${state.totalRounds}`
}

document.addEventListener('keydown', handleKey);
document.addEventListener('keydown', e => {
    if (e.key === ' ' && combat && combat.running) e.preventDefault()
});
document.getElementById('start-btn').addEventListener('click', startRound);
document.getElementById('btn-upgrade').addEventListener('click', () => showScreen('shop'));
document.getElementById('btn-play-again').addEventListener('click', startRound);
document.getElementById('shop-play-btn').addEventListener('click', startRound);
document.getElementById('reset-btn').addEventListener('click', () => {
    if (confirm('Reset all progress including Overclock? This cannot be undone.')) {
        resetState();
        showScreen('start')
    }
});
if (loadState() && state.totalRounds > 0) showScreen('shop'); else showScreen('start');</script>
