                        spawnParticle({
                            x: s.x,
                            y: s.y,
                            vx: 0,
                            vy: 0,
                            life: 42,
                            size: 8,
                            grow: 5,
                            color: '#11a36b',
                            type: 'ring'
                        });
                        Audio2.pop();
                        if (len(buddy.pts.head.x - s.x, buddy.pts.head.y - s.y) < 230) addEmotion(2.4);
                    }
                } else if (s.kind === 'mine') {
                    if (s.armed < 30) s.armed++;
                    else {
                        let trig = len(buddy.pts.hip.x - s.x, buddy.pts.hip.y - s.y) < 38;
                        if (!trig) for (const it of items) if (!it.held && len(it.x - s.x, it.y - s.y) < it.radius + 20) {
                            trig = true;
                            break;
                        }
                        if (trig) {
                            explode(s.x, s.y - 4, 11);
                            for (const p of buddy.list) if (len(p.x - s.x, p.y - s.y) < 70) applyImpulse(p, 0, -6);
                            s._dead = true;
                        }
                    }
                }
                if (s.life <= 0) s._dead = true;
            }
            for (let i = specials.length - 1; i >= 0; i--) if (specials[i]._dead) specials.splice(i, 1);
        }

        function renderSpecials() {
            for (const s of specials) {
                if (s.kind === 'mine') {
                    ctx.fillStyle = s.armed >= 30 ? '#b03a30' : '#7a8089';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, 8, Math.PI, 0);
                    ctx.fill();
                    ctx.fillRect(s.x - 9, s.y, 18, 3);
                    if (s.armed >= 30 && (Date.now() >> 8) % 2 === 0) dot({x: s.x, y: s.y - 4}, 2, '#ff4d3d');
                } else if (s.kind === 'vortex') {
                    ctx.strokeStyle = '#4f6bd6';
                    ctx.lineWidth = 3;
                    for (let k = 0; k < 3; k++) {
                        const t = (Date.now() / 200 + k * 2.1);
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, 10 + k * 7, t, t + 4);
                        ctx.stroke();
                    }
                    dot({x: s.x, y: s.y}, 5, '#2b3f8a');
                } else if (s.kind === 'radio') {
                    ctx.fillStyle = '#33414f';
                    roundRect(s.x - 12, s.y - 9, 24, 18, 4);
                    ctx.fill();
                    dot({x: s.x + 5, y: s.y}, 4, '#11a36b');
                    ctx.fillStyle = '#11a36b';
                    ctx.fillRect(s.x - 9, s.y - 5, 7, 10);
                    ctx.strokeStyle = '#33414f';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(s.x + 8, s.y - 9);
                    ctx.lineTo(s.x + 12, s.y - 18);
                    ctx.stroke();
                } else if (s.kind === 'orb') {
                    const rep = Math.sin(s.phase) < 0;
                    dot({x: s.x, y: s.y}, 9, rep ? '#e0483e' : '#11a36b');
                    dot({x: s.x, y: s.y}, 4, '#ffffff');
                }
            }
        }

        /* ---------------- melee & guns ---------------- */
        function punchAt(x, y, dx, dy, power) {
            const d = len(dx, dy), nx = dx / d, ny = dy / d;
            let hit = false;
            for (const p of buddy.list) {
                if (len(p.x - x, p.y - y) < p.radius + 26) {
                    const w = (p.name === 'head' || p.name === 'chest' || p.name === 'hip') ? 1.3 : 0.8;
                    applyImpulse(p, nx * clamp(power, 0.5, 16) * w, ny * clamp(power, 0.5, 16) * w);
                    hit = true;
                }
            }
            if (hit) {
                registerImpact(clamp(power, 1, 16) * 1.05, {x, y, type: 'punch', color: '#cfd6df'});
                S.stats.punches++;
                save();
                if (buddy.freeze > 30) shatterIce();
            }
            return hit;
        }

        function shatterIce() {
            // a hard hit while frozen cracks the ice off
            const cx = buddy.pts.hip.x, cy = buddy.pts.chest.y;
            buddy.freeze = 0;
            Audio2.freeze();
            for (let i = 0; i < 22; i++) {
                const a = rand(0, 6.2832), s = rand(2, 6);
                spawnParticle({
                    x: cx + rand(-20, 20),
                    y: cy + rand(-30, 30),
                    vx: Math.cos(a) * s,
                    vy: Math.sin(a) * s,
                    g: 0.18,
                    life: randInt(20, 40),
                    size: rand(2, 5),
                    color: choose(['#cdeffb', '#9fd6ef', '#ffffff']),
                    type: 'debris',
                    rot: rand(0, 6.28),
                    spin: rand(-0.3, 0.3)
                });
            }
        }

        function knifeAt(x, y, dx, dy) {
            const sp = len(dx, dy);
            if (sp < 2) return;
            const nx = dx / sp, ny = dy / sp;
            let hit = false;
            for (const p of buddy.list) {
                if (len(p.x - x, p.y - y) < p.radius + 16) {
                    applyImpulse(p, nx * clamp(sp * 0.5, 1, 8), ny * clamp(sp * 0.5, 1, 8));
                    hit = true;
                }
            }
            if (hit) {
                registerImpact(clamp(sp * 0.4, 2, 10), {x, y, type: 'hit', color: '#e0483e'});
                for (let i = 0; i < 6; i++) spawnParticle({
                    x,
                    y,
                    vx: rand(-1, 1),
                    vy: rand(-1, 1),
                    g: 0.1,
                    life: randInt(10, 18),
                    size: rand(1.5, 3),
                    color: '#e0483e',
                    type: 'spark'
                });
                Audio2.knife();
                addSlash(x - nx * 16, y - ny * 16, x + nx * 16, y + ny * 16);
            }
        }

        function fireGun(ox, oy, ax, ay, pellets, spread, power, boom) {
            const base = Math.atan2(ay - oy, ax - ox);
            let anyHit = false;
            for (let k = 0; k < pellets; k++) {
                const ang = base + rand(-spread, spread), dx = Math.cos(ang), dy = Math.sin(ang);
                let best = null, bestT = Infinity;
                for (const p of buddy.list) {
                    const t = (p.x - ox) * dx + (p.y - oy) * dy;
                    if (t < 0) continue;
                    const perp = len(p.x - (ox + dx * t), p.y - (oy + dy * t));
                    if (perp < p.radius + 6 && t < bestT) {
                        bestT = t;
                        best = p;
                    }
                }
                let hx, hy;
                if (best) {
                    hx = ox + dx * bestT;
                    hy = oy + dy * bestT;
                    applyImpulse(best, dx * power, dy * power);
                    anyHit = true;
                    spawnHitSparks(hx, hy, 6, '#cfd6df');
                } else {
                    hx = ox + dx * 2200;
                    hy = oy + dy * 2200;
                }
                addTracer(ox, oy, hx, hy);
            }
            for (let i = 0; i < 8; i++) {
                const a = base + rand(-0.5, 0.5);
                spawnParticle({
                    x: ox,
                    y: oy,
                    vx: Math.cos(a) * rand(2, 6),
                    vy: Math.sin(a) * rand(2, 6),
                    g: 0.05,
                    life: randInt(6, 12),
                    size: rand(2, 4),
                    color: choose(['#ffd24a', '#ffae3a', '#ffffff']),
                    type: 'spark'
                });
            }
            if (anyHit) {
                registerImpact(power * pellets * 0.45, {x: ax, y: ay, type: 'punch', color: '#cfd6df'});
                if (buddy.freeze > 30) shatterIce();
            }
            S.stats.shots++;
            save();
            if (boom) Audio2.shotgun(); else Audio2.shot();
            addShake(boom ? 6 : 2);
        }

        const tracers = [], slashes = [];

        function addTracer(x1, y1, x2, y2) {
            tracers.push({x1, y1, x2, y2, life: 6, max: 6});
            if (tracers.length > 30) tracers.shift();
        }

        function addSlash(x1, y1, x2, y2) {
            slashes.push({x1, y1, x2, y2, life: 10, max: 10});
            if (slashes.length > 20) slashes.shift();
        }

        function updateBeams() {
            for (let i = tracers.length - 1; i >= 0; i--) if (--tracers[i].life <= 0) tracers.splice(i, 1);
            for (let i = slashes.length - 1; i >= 0; i--) if (--slashes[i].life <= 0) slashes.splice(i, 1);
        }

        function renderBeams() {
            for (const t of tracers) {
                ctx.globalAlpha = t.life / t.max;
                ctx.strokeStyle = '#ffce4a';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(t.x1, t.y1);
                ctx.lineTo(t.x2, t.y2);
                ctx.stroke();
            }
            for (const s of slashes) {
                ctx.globalAlpha = s.life / s.max;
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(s.x1, s.y1);
                ctx.lineTo(s.x2, s.y2);
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
        }

        function renderFires() {

        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

            if (speech.life <= 0) return;
            const h = buddy.pts.head, x = h.x;
            ctx.font = "600 13px 'Segoe UI',system-ui,sans-serif";
            const w = ctx.measureText(speech.text).width + 18, bh = 24;
            const bx = x - w / 2, by = h.y - h.radius - 36;
            ctx.globalAlpha = clamp(speech.life / 20, 0, 1);
            ctx.fillStyle = '#1b2330';
            roundRect(bx, by, w, bh, 8);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x - 5, by + bh);
            ctx.lineTo(x + 5, by + bh);
            ctx.lineTo(x, by + bh + 7);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(speech.text, x, by + bh / 2);
            ctx.globalAlpha = 1;
        }

        function spend(n) {

            S.cash -= n;
            updateCashUI();
            saveNow();
            return true;
        }

        let activeTool = 'grab';

        function setActiveTool(id) {
            if (!S.unlocked[id]) return;
            activeTool = id;
            markActiveTool();
            updateCursorClass();
        }

        function buyTool(id) {
            const t = TOOLS_MAP[id];
            if (!t || S.unlocked[id]) return;
            if (!spend(t.price)) return;
            S.unlocked[id] = true;
            saveNow();
            Audio2.coin();
            buildToolbar();
            setActiveTool(id);
            refreshPanel();
        }

        function buySkin(id) {
            const s = SKINS.find(x => x.id === id);
            if (!s) return;
            if (S.ownedSkins[id]) {
                selectSkin(id);
                return;
            }
            if (!spend(s.price)) return;
            S.ownedSkins[id] = true;
            saveNow();
            Audio2.coin();
            selectSkin(id);
        }

        function selectSkin(id) {
            S.selectedSkin = id;
            saveNow();
            refreshPanel();
        }

        function buyMode(id) {
            const m = MODES.find(x => x.id === id);
            if (!m) return;
            if (S.modesOwned[id]) {
                toggleMode(id, !S.modes[id]);
                return;
            }
            if (!spend(m.price)) return;
            S.modesOwned[id] = true;
            S.modes[id] = true;
            saveNow();
            Audio2.coin();
            refreshPanel();
        }

        function toggleMode(id, on) {
            S.modes[id] = !!on;
            saveNow();
            refreshPanel();
        }

        /* ---------------- toolbar ---------------- */
        function glyphHTML(t, cls) {
            if (t.badge) return '<span class="' + cls + '"><span class="badge">' + t.badge + '</span></span>';
            return '<span class="' + cls + '">' + t.icon + '</span>';
        }

        function buildToolbar() {
            toolbarEl.innerHTML = '';
            for (const t of TOOLS) {
                if (!S.unlocked[t.id]) continue;
                const b = document.createElement('button');
                b.className = 'tool' + (t.id === activeTool ? ' active' : '');
                b.dataset.id = t.id;
                b.innerHTML = glyphHTML(t, 'ico') + '<span class="nm">' + t.name + '</span>';
                b.addEventListener('click', () => {
                    Audio2.resume();
                    Audio2.click();
                    setActiveTool(t.id);
                });
                toolbarEl.appendChild(b);
            }
        }

        function markActiveTool() {
            for (const b of toolbarEl.children) b.classList.toggle('active', b.dataset.id === activeTool);
        }

        /* ---------------- mood UI ---------------- */
        function updateMoodUI() {
            const e = buddy.emotion, pct = Math.abs(e) / 100 * 50;
            if (e >= 0) {
                moodFillEl.style.left = '50%';
                moodFillEl.style.width = pct + '%';
                moodFillEl.style.background = '#11a36b';
            } else {
                moodFillEl.style.left = (50 - pct) + '%';
                moodFillEl.style.width = pct + '%';
                moodFillEl.style.background = '#e0483e';
            }
            let em;
            if (buddy.freeze > 15) em = '🥶';
            else if (buddy.fire > 15) em = '🥵';
            else if (e > 55) em = '😄';
            else if (e > 15) em = '🙂';
            else if (e > -15) em = '😐';
            else if (e > -55) em = '🙁';
            else em = '😣';
            moodEmojiEl.textContent = em;
        }

        /* ---------------- panels ---------------- */
        let currentPanel = null, shopTab = 'items';

        function openPanel(name) {
            currentPanel = name;
            overlayEl.classList.add('open');
            renderPanel(name);
        }

        function closePanel() {
            overlayEl.classList.remove('open');
            currentPanel = null;
        }

        function refreshPanel() {
            if (currentPanel) renderPanel(currentPanel);
        }

        function renderPanel(name) {
            if (name === 'shop') {
                modalTitleEl.textContent = 'Shop';
                renderShop();
            } else if (name === 'settings') {
                modalTitleEl.textContent = 'Settings';
                renderSettings();
            } else if (name === 'stats') {
                modalTitleEl.textContent = 'Stats';
                renderStats();
            }
        }

        function tabBtn(id, label) {
            return '<button data-tab="' + id + '" class="' + (shopTab === id ? 'on' : '') + '">' + label + '</button>';
        }

        function renderShop() {
            let h = '<div class="tabs">' + tabBtn('items', 'Items') + tabBtn('skins', 'Skins') + tabBtn('modes', 'Modes') + '</div>';
            if (shopTab === 'items') h += shopItemsHTML();
            else if (shopTab === 'skins') h += skinsSection();
            else h += shopModesHTML();
            modalBodyEl.innerHTML = h;
            wirePanel();
        }

        function shopItemsHTML() {
            let g = '<div class="grid">';
            for (const t of TOOLS) {
                const owned = !!S.unlocked[t.id];
                g += '<div class="card"><div class="top">' + glyphHTML(t, 'ci') + '<div class="tt">' + t.name + '</div></div>' +

        function skinsGrid() {
            let g = '<div class="grid">';
            for (const s of SKINS) {
                const owned = !!S.ownedSkins[s.id], sel = S.selectedSkin === s.id;
                g += '<div class="card"><div class="swatch"><span style="background:' + s.c.limb + '"></span><span style="background:' + s.c.torso + '"></span><span style="background:' + s.c.head + '"></span></div>' +
                    '<div class="tt">' + s.name + '</div><div class="act">' +
                    (owned
                        ? (sel ? '<button class="btn sel" disabled>Selected</button>' : '<button class="btn equip" data-skin="' + s.id + '">Select</button>')
                        : '<button class="btn buy" data-skinbuy="' + s.id + '" ' + (S.cash < s.price ? 'disabled' : '') + '><span class="price">$ ' + formatNum(s.price) + '</span></button>') +
                    '</div></div>';

        function renderStats() {
            const s = S.stats;
            const totalSec = Math.floor(s.playMs / 1000), mins = Math.floor(totalSec / 60);
            const time = mins >= 60 ? Math.floor(mins / 60) + 'h ' + (mins % 60) + 'm' : mins + 'm ' + (totalSec % 60) + 's';
            const stat = (v, k) => '<div class="stat"><div class="v">' + v + '</div><div class="k">' + k + '</div></div>';
            modalBodyEl.innerHTML = '<div class="stats-grid">' +

                stat(formatNum(s.punches), 'Punches landed') +
                stat(formatNum(s.explosions), 'Explosions') +
                stat(formatNum(s.fires), 'Times set on fire') +
                stat(formatNum(s.freezes || 0), 'Times frozen') +
                stat(formatNum(s.knockdowns), 'Bowling knockdowns') +

        function wirePanel() {
            const q = sel => modalBodyEl.querySelectorAll(sel);
            q('[data-tab]').forEach(b => b.onclick = () => {
                shopTab = b.dataset.tab;
                Audio2.click();
                renderShop();
            });
            q('[data-buy]').forEach(b => b.onclick = () => buyTool(b.dataset.buy));
            q('[data-equip]').forEach(b => b.onclick = () => {
                setActiveTool(b.dataset.equip);
                Audio2.click();
                refreshPanel();
            });
            q('[data-skinbuy]').forEach(b => b.onclick = () => buySkin(b.dataset.skinbuy));
            q('[data-skin]').forEach(b => b.onclick = () => selectSkin(b.dataset.skin));
            q('[data-modebuy]').forEach(b => b.onclick = () => buyMode(b.dataset.modebuy));
            q('[data-mode]').forEach(b => b.onclick = () => toggleMode(b.dataset.mode, !S.modes[b.dataset.mode]));
            q('[data-ck]').forEach(inp => inp.oninput = () => {
                S.customSkin[inp.dataset.ck] = inp.value;
                save();
            });
            const uc = modalBodyEl.querySelector('#useCustom');
            if (uc) uc.onclick = () => selectSkin('custom');
            q('[data-rg]').forEach(inp => inp.oninput = () => {
                const v = +inp.value, k = inp.dataset.rg;
                document.getElementById('rv_' + k).textContent = v;
                if (k === 'iter') S.settings.iterations = v; else {
                    S.settings.objectCap = v;
                    enforceCap();
                }
                save();
            });
            q('[data-sw]').forEach(inp => inp.onchange = () => {
                const k = inp.dataset.sw;
                if (k === 'trails') S.settings.trails = inp.checked; else S.settings.sound = inp.checked;
                save();
            });
            const rb = modalBodyEl.querySelector('#resetBtn');
            const cb = modalBodyEl.querySelector('#clearBtn');
            if (rb) rb.onclick = doReset;
            if (cb) cb.onclick = doClear;
        }

        function doClear() {
            const cap = S.settings.objectCap;
            S.settings.objectCap = 0;
            enforceCap();
            S.settings.objectCap = cap;
            specials = [];
            fires.length = 0;
        }

        function doReset() {
            if (!confirm('Reset all cash, unlocks, skins and settings? This cannot be undone.')) return;
            try {
                localStorage.removeItem(SAVE_KEY);
            } catch (e) {
            }
            S.cash = 0;
            S.totalCash = 0;
            S.unlocked = {};
            S.ownedSkins = {};
            S.selectedSkin = 'default';
            S.modes = {lowGravity: false, heavyHitter: false};
            S.modesOwned = {};
            S.settings = {iterations: 14, objectCap: 40, trails: false, sound: true};
            S.stats = {
                playMs: 0,
                itemsThrown: 0,
                punches: 0,
                explosions: 0,
                fires: 0,
                knockdowns: 0,
                shots: 0,
                freezes: 0
            };
            S.customSkin = {head: '#7aa2d6', torso: '#34507a', limb: '#7aa2d6', eye: '#15202e', detail: '#15202e'};
            DEFAULT_UNLOCKED.forEach(id => S.unlocked[id] = true);
            DEFAULT_OWNED_SKINS.forEach(id => S.ownedSkins[id] = true);
            saveNow();
            items = [];
            specials = [];
            fires.length = 0;
            popups.length = 0;
            buddy.fire = 0;
            buddy.freeze = 0;
            buddy.emotion = 0;
            buildBuddy(W / 2);
            updateCashUI();
            buildToolbar();
            setActiveTool('grab');
            refreshPanel();
        }

        /* ============================================================
           INPUT
           ============================================================ */
        const pointer = {x: 400, y: 250, px: 400, py: 250, down: false, speed: 0};
        let meleeCd = 0;

        function localPos(e) {
            const r = canvas.getBoundingClientRect();
            return {x: e.clientX - r.left, y: e.clientY - r.top};
        }

        function onDown(e) {
            if (currentPanel !== null) return;
            Audio2.resume();
            hideHint();
            const L = localPos(e);
            pointer.x = L.x;
            pointer.y = L.y;
            pointer.px = L.x;
            pointer.py = L.y;
            pointer.down = true;
            pointer.speed = 0;
            const t = TOOLS_MAP[activeTool];
            if (t.type === 'grab') startGrab(L.x, L.y);
            else if (t.type === 'throw') startThrow(t.kind, L.x, L.y);
            else if (t.type === 'place') placeSpecial(t.kind, L.x, L.y);
            else if (t.type === 'gun') doGun(t.sub, L.x, L.y);
            else if (t.type === 'melee' && t.sub === 'fist') doPunchClick(L.x, L.y);
            updateCursorClass();
        }

        function onMove(e) {
            const L = localPos(e);
            pointer.px = pointer.x;
            pointer.py = pointer.y;
            pointer.x = L.x;
            pointer.y = L.y;
            const dx = pointer.x - pointer.px, dy = pointer.y - pointer.py;
            pointer.speed = pointer.speed * 0.5 + len(dx, dy) * 0.5;
            if (!pointer.down || currentPanel !== null) return;
            const t = TOOLS_MAP[activeTool];
            if (t.type === 'melee' && meleeCd <= 0 && pointer.speed > 3) {
                if (t.sub === 'fist') {
                    if (punchAt(pointer.x, pointer.y, dx, dy, pointer.speed * 0.85)) meleeCd = 3;
                } else {
                    knifeAt(pointer.x, pointer.y, dx, dy);
                    meleeCd = 3;
                }
            }
        }

        function onUp() {
            if (!pointer.down) return;
            pointer.down = false;
            const t = TOOLS_MAP[activeTool];
            if (t.type === 'grab' && buddy.grab) {
                buddy.grab.grabbed = false;
                buddy.grab.pinned = false;
                buddy.grab = null;
            } else if (t.type === 'throw' && heldItem) {
                heldItem.held = false;
                S.stats.itemsThrown++;
                save();
                Audio2.whoosh();
                heldItem = null;
            }
            updateCursorClass();
        }

        function startGrab(x, y) {
            let best = null, bd = 46;
            for (const p of buddy.list) {
                const d = len(p.x - x, p.y - y);
                if (d < bd) {
                    bd = d;
                    best = p;
                }
            }
            if (best) {
                best.grabbed = true;
                best.pinned = true;
                best.x = x;
                best.y = y;
                best.oldX = x;
                best.oldY = y;
                buddy.grab = best;
            }
        }

        function startThrow(kind, x, y) {
            const it = spawnItem(kind, x, y, 0, 0);
            if (it) {
                it.held = true;
                it.oldX = x;
                it.oldY = y;
                heldItem = it;
            }
        }

        function doGun(sub, x, y) {
            const ox = W / 2, oy = H - 6;
            if (sub === 'shotgun') fireGun(ox, oy, x, y, 7, 0.16, 5, true);
            else fireGun(ox, oy, x, y, 1, 0, 9, false);
        }

        function doPunchClick(x, y) {
            const c = buddy.pts.chest;
            let dx = c.x - x, dy = c.y - y;
            if (len(dx, dy) < 1) {
                dx = 0;
                dy = -1;
            }
            punchAt(x, y, dx, dy, 5);
        }

        let hintGone = false;

        function hideHint() {
            if (hintGone || !hintEl) return;
            hintGone = true;
            hintEl.classList.add('gone');
            setTimeout(() => {
                if (hintEl && hintEl.parentNode) hintEl.remove();
            }, 600);
        }

        function updateCursorClass() {
            const t = TOOLS_MAP[activeTool];
            canvas.classList.remove('cursor-hit', 'cursor-grabbing');
            if (pointer.down && t.type === 'grab') canvas.classList.add('cursor-grabbing');
            else if (t.type !== 'grab') canvas.classList.add('cursor-hit');
        }

        /* ============================================================
           RESIZE / LOOP / RENDER
           ============================================================ */
        function resize() {
            const r = stage.getBoundingClientRect();
            const w = Math.max(320, Math.floor(r.width)), h = Math.max(300, Math.floor(r.height));
            DPR = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = Math.floor(w * DPR);
            canvas.height = Math.floor(h * DPR);
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
            W = w;
            H = h;
            floorY = H - FLOOR_MARGIN;
            for (const p of buddy.list) {
                p.x = clamp(p.x, p.radius, W - p.radius);
                if (p.y > floorY - p.radius) p.y = floorY - p.radius;
            }
            for (const it of items) {
                it.x = clamp(it.x, it.radius, W - it.radius);
                if (it.y > floorY - it.radius) it.y = floorY - it.radius;
            }
        }

        function step() {
            gravityNow = S.modes.lowGravity ? GRAVITY * 0.35 : GRAVITY;
            if (impactSfxCd > 0) impactSfxCd--;
            if (meleeCd > 0) meleeCd--;
            stepBuddy();
            stepItems();
            stepSpecials();
            updateFires();
            updateParticles();
            updatePopups();
            updateBeams();
            updateSpeech();
            shakeMag *= 0.86;
            if (shakeMag < 0.2) shakeMag = 0;
            S.stats.playMs += STEP;
        }

        /* ------------------------------------------------------------
           THE SKY  (a small gift to the buddy)

           He stands alone in a box; the only thing that ever happened to
           him was force. So: a sky he can't earn, can't buy, and doesn't
           react to. It just turns over him whether anyone is watching or
           not — dawn, day, dusk, night, and back. ~4 minutes a full turn.

           Everything is FLAT colour (no gradients, no alpha) — the horizon
           is honest bands blocked in like a painter would, the sun and moon
           are solid discs on an arc, and the stars simply aren't drawn in
           daylight, then grow in number and size as night deepens. Indifferent
           and quiet, which is the whole point.
           ------------------------------------------------------------ */
        const SKY_PERIOD = 600000; // ms for a full day->night->day cycle
// four phases, each a [sky, lowSky] pair of flat colours
        const SKY_KEYS = [
            {t: 0.00, sky: '#1b2440', low: '#3a3358'}, // deep night
            {t: 0.12, sky: '#e8d9a8', low: '#f0b27a'}, // pre-dawn glow
            {t: 0.25, sky: '#bfe0f2', low: '#e9f3f7'}, // morning
            {t: 0.50, sky: '#a7d4ef', low: '#dfeef6'}, // midday
            {t: 0.72, sky: '#f3c08a', low: '#e8915f'}, // dusk
            {t: 0.85, sky: '#5a4a6e', low: '#7a5a72'}, // twilight
            {t: 1.00, sky: '#1b2440', low: '#3a3358'}  // back to night
        ];
// fixed star field, generated once (positions in 0..1 space)
        let STARS = null;

        function ensureStars() {
            if (STARS) return;
            STARS = [];
            for (let i = 0; i < 90; i++) {
                STARS.push({
                    x: Math.random(),
                    y: Math.random() * 0.7,
                    r: 0.6 + Math.random() * 1.4,
                    tw: Math.random() * 6.28,
                    sp: 0.5 + Math.random() * 1.5
                });
            }
        }

        function hexLerp(a, b, t) {
            const ai = parseInt(a.slice(1), 16), bi = parseInt(b.slice(1), 16);
            const ar = (ai >> 16) & 255, ag = (ai >> 8) & 255, ab = ai & 255;
            const br = (bi >> 16) & 255, bg = (bi >> 8) & 255, bb = bi & 255;
            const r = Math.round(lerp(ar, br, t)), g = Math.round(lerp(ag, bg, t)), bl = Math.round(lerp(ab, bb, t));
            return 'rgb(' + r + ',' + g + ',' + bl + ')';
        }

        function skyPhase() {
            const now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
            return (now % SKY_PERIOD) / SKY_PERIOD; // 0..1
        }

        function skyColors(p) {
            let lo = SKY_KEYS[0], hi = SKY_KEYS[SKY_KEYS.length - 1];
            for (let i = 0; i < SKY_KEYS.length - 1; i++) {
                if (p >= SKY_KEYS[i].t && p <= SKY_KEYS[i + 1].t) {
                    lo = SKY_KEYS[i];
                    hi = SKY_KEYS[i + 1];
                    break;
                }
            }
            const span = (hi.t - lo.t) || 1, k = clamp((p - lo.t) / span, 0, 1);
            return {sky: hexLerp(lo.sky, hi.sky, k), low: hexLerp(lo.low, hi.low, k)};
        }

// how "night" it is, 0 (full day) .. 1 (full night) — drives stars
        function nightness(p) {
            // night is near p=0/1; day near p=0.5. cosine gives a smooth bell.
            return clamp(Math.cos(p * Math.PI * 2) * 0.5 + 0.5, 0, 1);
        }

        function drawRoom() {
            ensureStars();
            const p = skyPhase();
            const c = skyColors(p);
            const horizon = floorY - 90; // where the low band meets the upper sky

            // upper sky band (flat)
            if (S.settings.trails) {
                ctx.globalAlpha = 0.22;
            }
            ctx.fillStyle = c.sky;
            ctx.fillRect(-40, -40, W + 80, horizon + 140);
            ctx.globalAlpha = 1;

            const night = nightness(p);

            // stars — only when there's any night at all; drawn as solid dots,
            // count and size scaled by how deep the night is (no alpha fade).
            if (night > 0.04) {
                const shown = Math.floor(STARS.length * night);
                ctx.fillStyle = '#f4f1e4';
                for (let i = 0; i < shown; i++) {
                    const s = STARS[i];
                    const sx = s.x * W, sy = s.y * horizon;
                    // gentle size twinkle via sine on radius (size, not opacity)
                    const tw = 0.7 + 0.3 * Math.sin(p * 6.28 * 40 * s.sp + s.tw);
                    const r = s.r * night * tw;
                    if (r < 0.25) continue;
                    ctx.beginPath();
                    ctx.arc(sx, sy, r, 0, 6.2832);
                    ctx.fill();
                }
            }

            // celestial body on a proper arc. Map the phase to an arc angle so the body
            // rises at the left horizon, peaks high and central, and sets at the right.
            // Day runs roughly p in [0.12, 0.75]; night is the rest (moon takes over).
            const horizonY = floorY - 60;     // visual horizon line for rise/set
            const peakY = 70;                 // highest point in the sky
            function bodyAt(frac) {           // frac 0=rise(left) .5=peak(center) 1=set(right)
                const a = frac * Math.PI;       // 0..PI
                return {x: W * (0.08 + 0.84 * frac), y: lerp(horizonY, peakY, Math.sin(a))};
            }

            if (night < 0.5) {
                // SUN — its day fraction maps the daylit part of the phase to 0..1
                const dayFrac = clamp((p - 0.12) / (0.75 - 0.12), 0, 1);
                const pos = bodyAt(dayFrac);
                const r = 26;
                ctx.fillStyle = '#ffd24a';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, r, 0, 6.2832);
                ctx.fill();
                ctx.fillStyle = '#ffe27a';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, r * 0.62, 0, 6.2832);
                ctx.fill();
            } else {
                // MOON — night spans p in [0.75 .. 1] U [0 .. 0.12]; fold into one 0..1 fraction
                let nf = (p >= 0.75) ? (p - 0.75) / (1.12 - 0.75) : (p + 1 - 0.75) / (1.12 - 0.75);
                nf = clamp(nf, 0, 1);
                const pos = bodyAt(nf);
                const r = 22;
                ctx.fillStyle = '#eef0e0';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, r, 0, 6.2832);
                ctx.fill();
                ctx.fillStyle = c.sky; // carve the crescent with the opaque sky colour
                ctx.beginPath();
                ctx.arc(pos.x + r * 0.5, pos.y - r * 0.25, r * 0.92, 0, 6.2832);
                ctx.fill();
            }

            // ground (kept solid, slightly tinted toward the low sky at night so it reads as lit)
            const groundTop = hexLerp('#c7cdd6', '#5a5f70', night);
            const groundEdge = hexLerp('#aab2bf', '#474c5c', night);
            ctx.fillStyle = groundTop;
            ctx.fillRect(-40, floorY, W + 80, H - floorY + 80);
            ctx.fillStyle = groundEdge;
            ctx.fillRect(-40, floorY - 2, W + 80, 2);
        }

        function render() {
            let sx = 0, sy = 0;
            if (shakeMag > 0) {
                sx = rand(-shakeMag, shakeMag);
                sy = rand(-shakeMag, shakeMag);
            }
            ctx.save();
            ctx.translate(sx, sy);
            drawRoom();
            renderFires();
            renderSpecials();
            renderItems();
            renderBuddy();
            renderParticles();
            renderBeams();
            renderPopups();
            renderSpeech();
            ctx.restore();
        }

        let frameCount = 0, lastT = 0, acc = 0;

        function frame(now) {
            if (!lastT) lastT = now;
            let dt = now - lastT;
            lastT = now;
            if (dt > 200) dt = 200;
            if (currentPanel === null) {
                acc += dt;
                let n = 0;
                while (acc >= STEP && n < 6) {
                    step();
                    acc -= STEP;
                    n++;
                }
                if (acc > STEP * 6) acc = 0;
            } else acc = 0;
            if (frameCount % 5 === 0) updateMoodUI();
            if (frameCount % 300 === 0) save();
            frameCount++;
            render();
            requestAnimationFrame(frame);
        }

        function init() {
            loadSave();
            if (!S.modesOwned) S.modesOwned = {};
            resize();
            buildBuddy(W / 2);
            updateCashUI();
            buildToolbar();
            if (!S.unlocked[activeTool]) activeTool = 'grab';
            setActiveTool(activeTool);
            updateMoodUI();
            document.querySelectorAll('.nav [data-panel]').forEach(b => b.addEventListener('click', () => {
                Audio2.resume();
                Audio2.click();
                openPanel(b.dataset.panel);
            }));
            document.getElementById('modalClose').addEventListener('click', () => {
                Audio2.click();
                closePanel();
            });
            overlayEl.addEventListener('click', e => {
                if (e.target === overlayEl) closePanel();
            });
            canvas.addEventListener('pointerdown', onDown);
            window.addEventListener('pointermove', onMove);
            window.addEventListener('pointerup', onUp);
            window.addEventListener('pointercancel', onUp);
            window.addEventListener('resize', resize);
            window.addEventListener('orientationchange', () => setTimeout(resize, 200));
            window.addEventListener('beforeunload', saveNow);
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) saveNow();
            });
            resize();
            requestAnimationFrame(frame);
        }

        init();
    })();

</script>
<script src="../logo.js"></script>
</body>
</html>
