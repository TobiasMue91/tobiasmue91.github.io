<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Buddy — Physics Ragdoll Sandbox</title>
    <meta name="description"
          content="Interactive Buddy — a modern single-file recreation of the classic physics ragdoll sandbox. Punch, throw, freeze, explode and set your floppy buddy on fire to earn cash and unlock items, weapons and skins. Free, offline, no dependencies.">
    <meta name="author" content="Claude Opus 4.8 prompted by Tobias Müller">
    <meta name="viewport"
          content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="theme-color" content="#11a36b">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Interactive Buddy — Physics Ragdoll Sandbox">
    <meta property="og:description"
          content="A modern single-file recreation of the classic Interactive Buddy. Stable Verlet ragdoll physics, tools, weapons, fire, ice cream freezing, a shop and skins. Offline and dependency-free.">
    <meta property="og:site_name" content="GPTGames.dev">
    <style>
        :root {
            --bg: #eceef2;
            --panel: #ffffff;
            --panel-2: #f5f7f9;
            --panel-3: #eef1f4;
            --ink: #1b2330;
            --muted: #69737f;
            --faint: #9aa3ad;
            --line: #e0e4ea;
            --line-2: #d3d9e0;
            --accent: #11a36b;
            --accent-press: #0d8a5b;
            --accent-soft: #e4f4ec;
            --danger: #e0483e;
            --danger-soft: #fbe9e7;
            --warn: #e08a1e;
            --ice: #3fa9d6;
            --ice-soft: #e2f2fa;
            --radius: 14px;
            --radius-sm: 10px;
            --shadow: 0 1px 2px rgba(20, 25, 35, .05), 0 10px 30px rgba(20, 25, 35, .10);
            --mono: 'SF Mono', 'Roboto Mono', 'DejaVu Sans Mono', ui-monospace, Consolas, monospace;
            --sans: 'Segoe UI', system-ui, -apple-system, Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        html, body {
            margin: 0;
            height: 100%
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: var(--sans);
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            font-size: 15px;
            line-height: 1.45
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 16px;
            background: var(--panel);
            border-bottom: 1px solid var(--line);
            flex: 0 0 auto;
            z-index: 6
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0
        }

        .brand .mark {
            width: 30px;
            height: 30px;
            border-radius: 9px;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            flex: 0 0 auto
        }

        .brand .name {
            font-weight: 700;
            letter-spacing: .2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .brand .name small {
            display: block;
            font-weight: 500;
            font-size: 11px;
            color: var(--faint);
            letter-spacing: .6px;
            text-transform: uppercase
        }

        .cash {
            display: flex;
            align-items: baseline;
            gap: 4px;
            margin-left: 6px;
            padding: 6px 12px;
            background: var(--accent-soft);
            border-radius: 999px;
            border: 1px solid #cdeadd;
            flex: 0 0 auto
        }

        .cash .sym {
            color: var(--accent);
            font-weight: 800;
            font-size: 14px
        }

        .cash .val {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 18px;
            color: var(--accent-press);
            font-variant-numeric: tabular-nums
        }

        .spacer {
            flex: 1 1 auto
        }

        .nav {
            display: flex;
            gap: 8px;
            flex: 0 0 auto
        }

        .nav button {
            appearance: none;
            border: 1px solid var(--line-2);
            background: var(--panel);
            color: var(--ink);
            font: inherit;
            font-weight: 600;
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: .12s
        }

        .nav button:hover {
            background: var(--panel-2);
            border-color: #c2c9d2
        }

        .nav button:active {
            transform: translateY(1px)
        }

        .stage {
            position: relative;
            flex: 1 1 auto;
            min-height: 0;
            background: #dfe3ea;
            overflow: hidden
        }

        #game {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: grab
        }

        #game.cursor-hit {
            cursor: crosshair
        }

        #game.cursor-grabbing {
            cursor: grabbing
        }

        .mood {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 4;
            background: rgba(255, 255, 255, .92);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 8px 10px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 9px;
            backdrop-filter: blur(4px)
        }

        .mood .lbl {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .6px
        }

        .mood .track {
            position: relative;
            width: 120px;
            height: 8px;
            background: var(--panel-3);
            border-radius: 6px;
            overflow: hidden
        }

        .mood .mid {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--line-2)
        }

        .mood .fill {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 0;
            background: var(--accent);
            border-radius: 6px;
            transition: width .15s, background .25s, left .15s
        }

        .mood .emoji {
            font-size: 16px;
            width: 18px;
            text-align: center
        }

        .hint {
            position: absolute;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            z-index: 4;
            background: rgba(27, 35, 48, .85);
            color: #fff;
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 999px;
            white-space: nowrap;
            transition: opacity .5s;
            pointer-events: none
        }

        .hint.gone {
            opacity: 0
        }

        .toolbar {
            flex: 0 0 auto;
            background: var(--panel);
            border-top: 1px solid var(--line);
            padding: 10px 12px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: thin;
            z-index: 5
        }

        .toolbar::-webkit-scrollbar {
            height: 6px
        }

        .toolbar::-webkit-scrollbar-thumb {
            background: var(--line-2);
            border-radius: 6px
        }

        .tool {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            min-width: 64px;
            padding: 8px 6px 6px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--panel);
            cursor: pointer;
            transition: .12s;
            color: var(--ink)
        }

        .tool:hover {
            background: var(--panel-2);
            border-color: var(--line-2)
        }

        .tool:active {
            transform: translateY(1px)
        }

        .tool.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 4px 14px rgba(17, 163, 107, .32)
        }

        .tool .ico {
            font-size: 22px;
            line-height: 1;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .tool .badge {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            background: var(--panel-3);
            color: var(--ink);
            font-family: var(--mono);
            font-weight: 700;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .tool.active .badge {
            background: rgba(255, 255, 255, .22);
            color: #fff
        }

        .tool .nm {
            font-size: 10.5px;
            font-weight: 600;
            line-height: 1.1;
            max-width: 62px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 20;
            background: rgba(20, 25, 35, .42);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            opacity: 0;
            pointer-events: none;
            transition: opacity .18s
        }

        .overlay.open {
            opacity: 1;
            pointer-events: auto
        }

        .modal {
            width: min(680px, 100%);
            max-height: 88vh;
            background: var(--panel);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            transform: translateY(8px) scale(.99);
            transition: transform .18s
        }

        .overlay.open .modal {
            transform: none
        }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--line)
        }

        .modal-head h2 {
            margin: 0;
            font-size: 19px;
            font-weight: 750;
            letter-spacing: .2px
        }

        .modal-head .x {
            appearance: none;
            border: none;
            background: var(--panel-3);
            color: var(--muted);
            width: 32px;
            height: 32px;
            border-radius: 9px;
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
            transition: .12s
        }

        .modal-head .x:hover {
            background: var(--line-2);
            color: var(--ink)
        }

        .modal-body {
            padding: 18px 20px 22px;
            overflow: auto
        }

        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            background: var(--panel-3);
            padding: 4px;
            border-radius: 11px
        }

        .tabs button {
            flex: 1;
            appearance: none;
            border: none;
            background: transparent;
            color: var(--muted);
            font: inherit;
            font-weight: 600;
            font-size: 13px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: .12s
        }

        .tabs button.on {
            background: var(--panel);
            color: var(--ink);
            box-shadow: 0 1px 3px rgba(20, 25, 35, .10)
        }

        .grid {
            display: grid;
            grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
            background: var(--panel);
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .card .top {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .card .ci {
            font-size: 24px;
            width: 30px;
            text-align: center
        }

        .card .ci .badge {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: var(--panel-3);
            color: var(--ink);
            font-family: var(--mono);
            font-weight: 700;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto
        }

        .card .tt {
            font-weight: 700;
            font-size: 13.5px
        }

        .card .ds {
            font-size: 11.5px;
            color: var(--muted);
            line-height: 1.35;
            min-height: 31px
        }

        .card .act {
            margin-top: 2px
        }

        .btn {
            appearance: none;
            border: none;
            font: inherit;
            font-weight: 650;
            font-size: 12.5px;
            padding: 8px 10px;
            border-radius: 9px;
            cursor: pointer;
            width: 100%;
            transition: .12s
        }

        .btn.buy {
            background: var(--accent);
            color: #fff
        }

        .btn.buy:hover {
            background: var(--accent-press)
        }

        .btn.buy:disabled {
            background: var(--panel-3);
            color: var(--faint);
            cursor: not-allowed
        }

        .btn.owned {
            background: var(--panel-3);
            color: var(--muted);
            cursor: default
        }

        .btn.sel {
            background: var(--ink);
            color: #fff
        }

        .btn.equip {
            background: var(--accent-soft);
            color: var(--accent-press);
            border: 1px solid #cdeadd
        }

        .btn.equip:hover {
            background: #d8efe3
        }

        .price {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-family: var(--mono);
            font-weight: 700
        }

        .swatch {
            width: 100%;
            height: 46px;
            border-radius: 9px;
            border: 1px solid var(--line-2);
            display: flex;
            overflow: hidden
        }

        .swatch span {
            flex: 1
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid var(--line)
        }

        .row:last-child {
            border-bottom: none
        }

        .row .info {
            min-width: 0
        }

        .row .info .t {
            font-weight: 650;
            font-size: 14px
        }

        .row .info .s {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px
        }

        .row .ctl {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 10px
        }

        input[type=range] {
            width: 150px;
            accent-color: var(--accent)
        }

        .rv {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 13px;
            min-width: 34px;
            text-align: right
        }

        .switch {
            position: relative;
            width: 46px;
            height: 26px;
            flex: 0 0 auto
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0
        }

        .switch .sl {
            position: absolute;
            inset: 0;
            background: var(--line-2);
            border-radius: 999px;
            cursor: pointer;
            transition: .16s
        }

        .switch .sl:before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            left: 3px;
            top: 3px;
            background: #fff;
            border-radius: 50%;
            transition: .16s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, .2)
        }

        .switch input:checked + .sl {
            background: var(--accent)
        }

        .switch input:checked + .sl:before {
            transform: translateX(20px)
        }

        .stats-grid {
            display: grid;
            grid-template-columns:1fr 1fr;
            gap: 10px
        }

        .stat {
            background: var(--panel-2);
            border: 1px solid var(--line);
            border-radius: 11px;
            padding: 12px 14px
        }

        .stat .v {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 20px;
            color: var(--ink)
        }

        .stat .k {
            font-size: 11.5px;
            color: var(--muted);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: .4px
        }

        .color-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 0;
            border-bottom: 1px solid var(--line)
        }

        .color-row label {
            font-weight: 600;
            font-size: 13px
        }

        .color-row input[type=color] {
            width: 46px;
            height: 30px;
            border: 1px solid var(--line-2);
            border-radius: 8px;
            background: none;
            cursor: pointer;
            padding: 2px
        }

        .note {
            font-size: 12px;
            color: var(--muted);
            margin: 0 0 14px
        }

        .section-title {
            font-weight: 700;
            margin: 20px 0 4px
        }

        .danger-link {
            background: none;
            border: none;
            color: var(--danger);
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            margin-top: 8px
        }

        @media (max-width: 560px) {
            .brand .name {
                display: none
            }

            .cash {
                margin-left: 0
            }

            .nav button {
                padding: 8px 10px
            }

            .mood .track {
                width: 84px
            }
        }
    </style>
</head>
<body>
<div id="app">
    <header class="topbar">
        <div class="brand">
            <div class="mark">IB</div>
            <div class="name">Interactive Buddy<small>GPTGames.dev</small></div>
        </div>
        <div class="cash"><span class="sym">$</span><span class="val" id="cashValue">0</span></div>
        <div class="spacer"></div>
        <nav class="nav">
            <button data-panel="shop">Shop</button>
            <button data-panel="stats">Stats</button>
            <button data-panel="settings">Settings</button>
        </nav>
    </header>
    <main class="stage" id="stage">
        <canvas id="game"></canvas>
        <div class="mood"><span class="lbl">Mood</span>
            <div class="track">
                <div class="mid"></div>
                <div class="fill" id="moodFill"></div>
            </div>
            <span class="emoji" id="moodEmoji">🙂</span></div>
        <div class="hint" id="hint">Drag the buddy to fling him — pick tools below</div>
    </main>
    <footer class="toolbar" id="toolbar"></footer>
</div>
<div class="overlay" id="overlay">
    <div class="modal">
        <div class="modal-head"><h2 id="modalTitle">Shop</h2>
            <button class="x" id="modalClose" aria-label="Close">×</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>
<script>
    (function () {
        'use strict';

        /* ============================================================
           Interactive Buddy — rebuilt physics core
           Key fixes vs. the original:
           - Muscle/stand controller is orientation-aware, fades out in
             the air and at speed, and is capped below gravity so the
             buddy can never lock upside-down.
           - collideWorld uses consistent restitution + tangential
             friction on ALL four boundaries with positional "slop",
             so no energy is injected at walls/ceiling (no more
             "magnetic walls") and resting jitter is killed.
           - Non-crossing constraints stop legs/arms locking inverted.
           - Constraint solving is split: stiff structural pass +
             soft pose pass, so the two stop juggling each other
             (kills the standing "dance").
           - New ice-cream tool: freezes the buddy, extinguishes fire.
           ============================================================ */

        const STEP = 1000 / 60;
        const FLOOR_MARGIN = 38;
        const GRAVITY = 0.42;
        const DAMPING = 0.99;
        const SAVE_KEY = 'gptgames_interactive_buddy_v2';

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const stage = document.getElementById('stage');
        const cashValueEl = document.getElementById('cashValue');
        const moodFillEl = document.getElementById('moodFill');
        const moodEmojiEl = document.getElementById('moodEmoji');
        const hintEl = document.getElementById('hint');
        const toolbarEl = document.getElementById('toolbar');
        const overlayEl = document.getElementById('overlay');
        const modalTitleEl = document.getElementById('modalTitle');
        const modalBodyEl = document.getElementById('modalBody');

        let W = 800, H = 500, floorY = 462, DPR = 1;

        const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
        const lerp = (a, b, t) => a + (b - a) * t;
        const rand = (a, b) => a + Math.random() * (b - a);
        const randInt = (a, b) => Math.floor(rand(a, b + 1));
        const choose = arr => arr[(Math.random() * arr.length) | 0];
        const len = (x, y) => Math.sqrt(x * x + y * y) || 0.0001;

        /* ---------------- persistent state ---------------- */
        const S = {
            cash: 0, totalCash: 0,
            unlocked: {}, ownedSkins: {}, selectedSkin: 'default',
            customSkin: {head: '#7aa2d6', torso: '#34507a', limb: '#7aa2d6', eye: '#15202e', detail: '#15202e'},
            modes: {lowGravity: false, heavyHitter: false}, modesOwned: {},
            settings: {iterations: 14, objectCap: 40, trails: false, sound: true},
            stats: {playMs: 0, itemsThrown: 0, punches: 0, explosions: 0, fires: 0, knockdowns: 0, shots: 0, freezes: 0}
        };
        const DEFAULT_UNLOCKED = ['grab', 'fist', 'baseball'];
        const DEFAULT_OWNED_SKINS = ['default', 'classic'];

        let saveTimer = null;

        function save() {
            if (saveTimer) return;
            saveTimer = setTimeout(() => {
                saveTimer = null;
                saveNow();
            }, 350);
        }

        function saveNow() {
            try {
                localStorage.setItem(SAVE_KEY, JSON.stringify(S));
            } catch (e) {
            }
        }

        function loadSave() {
            let data = null;
            try {
                data = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null');
            } catch (e) {
                data = null;
            }
            if (data && typeof data === 'object') {
                S.cash = +data.cash || 0;
                S.totalCash = +data.totalCash || 0;
                if (data.unlocked) S.unlocked = data.unlocked;
                if (data.ownedSkins) S.ownedSkins = data.ownedSkins;
                if (typeof data.selectedSkin === 'string') S.selectedSkin = data.selectedSkin;
                if (data.customSkin) Object.assign(S.customSkin, data.customSkin);
                if (data.modes) Object.assign(S.modes, data.modes);
                if (data.modesOwned) S.modesOwned = data.modesOwned;
                if (data.settings) Object.assign(S.settings, data.settings);
                if (data.stats) Object.assign(S.stats, data.stats);
            }
            DEFAULT_UNLOCKED.forEach(id => S.unlocked[id] = true);
            DEFAULT_OWNED_SKINS.forEach(id => S.ownedSkins[id] = true);
            S.settings.iterations = clamp(S.settings.iterations | 0, 6, 24);
            S.settings.objectCap = clamp(S.settings.objectCap | 0, 10, 1200);
        }

        /* ---------------- audio ---------------- */
        const Audio2 = (() => {
            let ac = null, noise = null;

            function ensure() {
                if (ac) return;
                const AC = window.AudioContext || window.webkitAudioContext;
                if (!AC) return;
                ac = new AC();
                const n = 0.5 * ac.sampleRate | 0;
                noise = ac.createBuffer(1, n, ac.sampleRate);
                const d = noise.getChannelData(0);
                for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
            }

            function on() {
                return S.settings.sound && ac;
            }

            function tone(freq, dur, type, gain, slideTo) {
                if (!on()) return;
                const t = ac.currentTime, o = ac.createOscillator(), g = ac.createGain();
                o.type = type || 'sine';
                o.frequency.setValueAtTime(freq, t);
                if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t + dur);
                g.gain.setValueAtTime(0.0001, t);
                g.gain.exponentialRampToValueAtTime(gain, t + 0.005);
                g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
                o.connect(g).connect(ac.destination);
                o.start(t);
                o.stop(t + dur + 0.02);
            }

            function burst(dur, gain, lp, hp) {
                if (!on()) return;
                const t = ac.currentTime, src = ac.createBufferSource(), g = ac.createGain();
                src.buffer = noise;
                let node = src;
                if (lp) {
                    const f = ac.createBiquadFilter();
                    f.type = 'lowpass';
                    f.frequency.setValueAtTime(lp, t);
                    f.frequency.exponentialRampToValueAtTime(Math.max(80, lp * 0.4), t + dur);
                    node.connect(f);
                    node = f;
                }
                if (hp) {
                    const f = ac.createBiquadFilter();
                    f.type = 'highpass';
                    f.frequency.value = hp;
                    node.connect(f);
                    node = f;
                }
                g.gain.setValueAtTime(gain, t);
                g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
                node.connect(g).connect(ac.destination);
                src.start(t);
                src.stop(t + dur + 0.02);
            }

            return {
                resume() {
                    ensure();
                    if (ac && ac.state === 'suspended') ac.resume();
                },
                punch(v) {
                    ensure();
                    const s = clamp(v || 1, 0.4, 2);
                    burst(0.10, 0.32 * s, 1400);
                    tone(150, 0.12, 'sine', 0.30 * s, 60);
                },
                bounce(v) {
                    ensure();
                    tone(520 + 220 * clamp(v || 0.5, 0, 1), 0.06, 'triangle', 0.10);
                },
                boom(v) {
                    ensure();
                    const s = clamp(v || 1, 0.6, 1.8);
                    burst(0.45 * s, 0.5, 1600);
                    tone(110, 0.5 * s, 'sine', 0.4, 30);
                    tone(70, 0.6 * s, 'sine', 0.3, 28);
                },
                shot() {
                    ensure();
                    burst(0.07, 0.42, 5000, 600);
                    tone(220, 0.05, 'square', 0.12, 90);
                },
                shotgun() {
                    ensure();
                    burst(0.18, 0.55, 3000);
                    tone(120, 0.22, 'sine', 0.32, 40);
                },
                whoosh() {
                    ensure();
                    burst(0.22, 0.10, 900);
                },
                ignite() {
                    ensure();
                    burst(0.30, 0.18, 2600, 700);
                },
                freeze() {
                    ensure();
                    tone(1200, 0.18, 'sine', 0.12, 320);
                    tone(800, 0.22, 'triangle', 0.10, 240);
                    burst(0.18, 0.10, 6000, 1500);
                },
                splat() {
                    ensure();
                    tone(300, 0.08, 'sine', 0.16, 120);
                    burst(0.09, 0.12, 1200);
                },
                coin() {
                    ensure();
                    tone(880, 0.08, 'square', 0.14);
                    setTimeout(() => tone(1320, 0.10, 'square', 0.14), 70);
                },
                click() {
                    ensure();
                    tone(660, 0.03, 'triangle', 0.06);
                },
                knife() {
                    ensure();
                    burst(0.06, 0.20, 6000, 2000);
                },
                pop() {
                    ensure();
                    tone(420, 0.05, 'sine', 0.08);
                }
            };
        })();

        /* ---------------- Verlet primitives ---------------- */
        let gravityNow = GRAVITY;
        const MAX_VEL = 60;

        function integrate(p) {
            if (p.pinned) {
                p.oldX = p.x;
                p.oldY = p.y;
                return;
            }
            // frozen points barely move (encased in ice)
            const damp = p.frozen ? 0.6 : DAMPING;
            let vx = (p.x - p.oldX) * damp;
            let vy = (p.y - p.oldY) * damp;
            const sp = len(vx, vy);
            if (sp > MAX_VEL) {
                vx = vx / sp * MAX_VEL;
                vy = vy / sp * MAX_VEL;
            }
            if (!isFinite(vx)) vx = 0;
            if (!isFinite(vy)) vy = 0;
            p.oldX = p.x;
            p.oldY = p.y;
            p.x += vx;
            p.y += vy + gravityNow;
        }

        function solveConstraint(c) {
            const a = c.a, b = c.b;
            const dx = b.x - a.x, dy = b.y - a.y;
            const d = len(dx, dy);
            if (d === 0) return; // coincident: skip to avoid 0/0
            const pct = (c.rest - d) / d * c.stiff;
            const ox = dx * pct, oy = dy * pct;
            const am = a.pinned ? 0 : (1 / (a.mass || 1));
            const bm = b.pinned ? 0 : (1 / (b.mass || 1));
            const tot = (am + bm) || 1;
            a.x -= ox * (am / tot);
            a.y -= oy * (am / tot);
            b.x += ox * (bm / tot);
            b.y += oy * (bm / tot);
        }

// Positional "slop": project only ~85% of the penetration so resting
// contacts don't fight and jitter (per Bullet/GameDev guidance).
        const SLOP = 0.9;

        function collideWorld(p) {
            const vx = p.x - p.oldX, vy = p.y - p.oldY;
            const b = p.bounce != null ? p.bounce : 0.3;
            const fr = p.friction != null ? p.friction : 0.85;
            let impact = 0;
            // floor
            if (p.y + p.radius > floorY) {
                const pen = (p.y + p.radius) - floorY;
                p.y -= pen * SLOP;
                if (vy > 0) {
                    impact = Math.max(impact, vy);
                    p.oldY = p.y + vy * b;
                }
                p.oldX = p.x - vx * fr; // tangential friction
            }
            // ceiling
            if (p.y - p.radius < 0) {
                const pen = p.radius - (p.y - p.radius < 0 ? p.y - p.radius : 0);
                p.y = lerp(p.y, p.radius, SLOP);
                if (vy < 0) {
                    impact = Math.max(impact, -vy);
                    p.oldY = p.y - vy * b;
                }
                p.oldX = p.x - vx * fr;
            }
            // left wall
            if (p.x - p.radius < 0) {
                p.x = lerp(p.x, p.radius, SLOP);
                if (vx < 0) {
                    impact = Math.max(impact, -vx);
                    p.oldX = p.x - vx * b;
                }
                p.oldY = p.y - vy * fr;
            }
            // right wall
            if (p.x + p.radius > W) {
                p.x = lerp(p.x, W - p.radius, SLOP);
                if (vx > 0) {
                    impact = Math.max(impact, vx);
                    p.oldX = p.x - vx * b;
                }
                p.oldY = p.y - vy * fr;
            }
            return impact;
        }

        function collideCircles(a, b, restB) {
            const dx = b.x - a.x, dy = b.y - a.y;
            const d = len(dx, dy);
            const min = a.radius + b.radius;
            if (d >= min) return 0;
            const nx = d === 0 ? 1 : dx / d, ny = d === 0 ? 0 : dy / d;
            const rel = Math.abs(((a.x - a.oldX) - (b.x - b.oldX)) * nx + ((a.y - a.oldY) - (b.y - b.oldY)) * ny);
            const overlap = (min - d) * SLOP;
            const ia = a.pinned ? 0 : 1 / (a.mass || 1);
            const ib = b.pinned ? 0 : 1 / (b.mass || 1);
            const tot = (ia + ib) || 1;
            a.x -= nx * overlap * (ia / tot);
            a.y -= ny * overlap * (ia / tot);
            b.x += nx * overlap * (ib / tot);
            b.y += ny * overlap * (ib / tot);
            if (restB) {
                let bvx = b.x - b.oldX, bvy = b.y - b.oldY;
                const vn = bvx * nx + bvy * ny;
                if (vn < 0) {
                    bvx -= (1 + restB) * vn * nx;
                    bvy -= (1 + restB) * vn * ny;
                    b.oldX = b.x - bvx;
                    b.oldY = b.y - bvy;
                }
            }
            return rel;
        }

        function applyImpulse(p, ix, iy) {
            if (p.pinned) return;
            p.oldX -= ix;
            p.oldY -= iy; // v = x - old, lowering old raises velocity
        }

        /* ---------------- particles ---------------- */
        const PARTICLE_MAX = 700;
        const particles = new Array(PARTICLE_MAX);
        for (let i = 0; i < PARTICLE_MAX; i++) particles[i] = {life: 0};
        let pRing = 0;

        function spawnParticle(o) {
            const p = particles[pRing];
            pRing = (pRing + 1) % PARTICLE_MAX;
            p.x = o.x;
            p.y = o.y;
            p.vx = o.vx || 0;
            p.vy = o.vy || 0;
            p.g = o.g || 0;
            p.life = o.life;
            p.max = o.life;
            p.size = o.size || 3;
            p.color = o.color || '#888';
            p.type = o.type || 'spark';
            p.grow = o.grow || 0;
            p.spin = o.spin || 0;
            p.rot = o.rot || 0;
            p.fadeIn = o.fadeIn || 0;
        }

        function updateParticles() {
            for (let i = 0; i < PARTICLE_MAX; i++) {
                const p = particles[i];
                if (p.life <= 0) continue;
                p.life--;
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.g;
                p.vx *= 0.99;
                p.size += p.grow;
                p.rot += p.spin;
            }
        }

        function renderParticles() {
            for (let i = 0; i < PARTICLE_MAX; i++) {
                const p = particles[i];
                if (p.life <= 0) continue;
                let a = p.life / p.max;
                if (p.fadeIn && (p.max - p.life) < p.fadeIn) a = (p.max - p.life) / p.fadeIn;
                ctx.globalAlpha = clamp(a, 0, 1) * (p.type === 'smoke' ? 0.55 : 1);
                ctx.fillStyle = p.color;
                if (p.type === 'ring') {
                    ctx.globalAlpha = clamp(a, 0, 1) * 0.7;
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(1, p.size), 0, 6.2832);
                    ctx.stroke();
                } else if (p.type === 'debris') {
                    const s = Math.max(1, p.size);
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot);
                    ctx.fillRect(-s / 2, -s / 2, s, s);
                    ctx.restore();
                } else {
                    const s = p.type === 'smoke' ? Math.max(1, p.size) : Math.max(0.5, p.size * (0.4 + 0.6 * a));
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, s, 0, 6.2832);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;
        }

        const popups = [];

        function spawnPopup(x, y, text, color) {
            popups.push({x, y, text, color, life: 52, max: 52});
            if (popups.length > 40) popups.shift();
        }

        function updatePopups() {
            for (let i = popups.length - 1; i >= 0; i--) {
                const p = popups[i];
                p.y -= 0.7;
                p.life--;
                if (p.life <= 0) popups.splice(i, 1);
            }
        }

        function getMonoFont() {
            return "'SF Mono','Roboto Mono',ui-monospace,Consolas,monospace";
        }

        function renderPopups() {
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = '700 16px ' + getMonoFont();
            for (const p of popups) {
                const a = clamp(p.life / p.max, 0, 1);
                ctx.globalAlpha = a;
                ctx.fillStyle = p.color;
                ctx.fillText(p.text, p.x, p.y);
            }
            ctx.globalAlpha = 1;
        }

        const fires = [];
        let shakeMag = 0;

        function addShake(m) {
            shakeMag = Math.min(24, Math.max(shakeMag, m));
        }

        /* ============================================================
           THE BUDDY
           ============================================================ */
        const BODY = {
            head: {ox: 0, oy: -54, r: 16, m: 2.2, fr: 0.85},
            chest: {ox: 0, oy: -25, r: 13, m: 3.0, fr: 0.85},
            lShoulder: {ox: -12, oy: -27, r: 8, m: 1.2, fr: 0.85},
            rShoulder: {ox: 12, oy: -27, r: 8, m: 1.2, fr: 0.85},
            hip: {ox: 0, oy: 0, r: 12, m: 5.0, fr: 0.80},
            lElbow: {ox: -17, oy: -13, r: 6, m: 1.0, fr: 0.9},
            lHand: {ox: -22, oy: 7, r: 7, m: 0.8, fr: 0.9},
            rElbow: {ox: 17, oy: -13, r: 6, m: 1.0, fr: 0.9},
            rHand: {ox: 22, oy: 7, r: 7, m: 0.8, fr: 0.9},
            lKnee: {ox: -8, oy: 30, r: 7, m: 2.5, fr: 0.7},
            lFoot: {ox: -16, oy: 60, r: 8, m: 3.0, fr: 0.5},
            rKnee: {ox: 8, oy: 30, r: 7, m: 2.5, fr: 0.7},
            rFoot: {ox: 16, oy: 60, r: 8, m: 3.0, fr: 0.5}
        };

        const buddy = {pts: {}, list: [], cons: [], emotion: 0, fire: 0, freeze: 0, grab: null, recover: 1, cashAcc: 0};

        const BONES = []; // pose targets: child driven toward rest DIRECTION relative to parent
        function buildBuddy(cx) {
            const hipY = floorY - 168;
            buddy.pts = {};
            buddy.list = [];
            buddy.cons = [];
            BONES.length = 0;
            for (const name in BODY) {
                const s = BODY[name];
                const x = cx + s.ox, y = hipY + s.oy;
                const p = {
                    name,
                    x,
                    y,
                    oldX: x,
                    oldY: y,
                    radius: s.r,
                    mass: s.m,
                    friction: s.fr,
                    bounce: 0.02,
                    pinned: false,
                    grabbed: false,
                    frozen: false
                };
                buddy.pts[name] = p;
                buddy.list.push(p);
            }
            const con = (a, b, stiff) => {
                const A = buddy.pts[a], B = buddy.pts[b];
                buddy.cons.push({a: A, b: B, rest: len(B.x - A.x, B.y - A.y), stiff});
            };
            // rigid skeleton bones (solved hard) — these never fight the controller
            con('head', 'chest', 1.0);
            con('chest', 'hip', 1.0);
            con('chest', 'lShoulder', 1.0);
            con('chest', 'rShoulder', 1.0);
            con('lShoulder', 'rShoulder', 1.0);
            con('lShoulder', 'lElbow', 1.0);
            con('lElbow', 'lHand', 1.0);
            con('rShoulder', 'rElbow', 1.0);
            con('rElbow', 'rHand', 1.0);
            con('hip', 'lKnee', 1.0);
            con('lKnee', 'lFoot', 1.0);
            con('hip', 'rKnee', 1.0);
            con('rKnee', 'rFoot', 1.0);
            // pose bones: target = parent + restDir*L (rotates WITH the parent, so no self-oscillation)
            const bone = (par, chi, w) => {
                const a = BODY[par], b = BODY[chi];
                const dx = b.ox - a.ox, dy = b.oy - a.oy, d = len(dx, dy);
                BONES.push({par, chi, nx: dx / d, ny: dy / d, L: d, w: w == null ? 1 : w});
            };
            bone('hip', 'chest', 1);
            bone('chest', 'head', 1);
            bone('chest', 'lShoulder', 0.6);
            bone('chest', 'rShoulder', 0.6);
            bone('lShoulder', 'lElbow', 0.4);
            bone('lElbow', 'lHand', 0.4);
            bone('rShoulder', 'rElbow', 0.4);
            bone('rElbow', 'rHand', 0.4);
            bone('hip', 'lKnee', 1);
            bone('lKnee', 'lFoot', 1);
            bone('hip', 'rKnee', 1);
            bone('rKnee', 'rFoot', 1);
        }

        function buddyAvgSpeed() {
            let s = 0;
            for (const p of buddy.list) s += len(p.x - p.oldX, p.y - p.oldY);
            return s / buddy.list.length;
        }

        /* ------------------------------------------------------------
           STAND CONTROLLER  (the big fix)

           The original "applyMuscles" matched a WORLD-SPACE shape using
           absolute offsets, was always on, and was stronger than gravity.
           That caused all three reported bugs at once: it oscillated
           against itself (the "dance"), it held the body inverted (head
           pulling the torso upside-down), and mid-air it yanked the body
           toward whatever the absolute offsets pointed at (the magnetic
           walls). It is gone.

           The replacement has two cooperating parts:

           1. poseSolve — for every bone, push the child toward the rest
              DIRECTION relative to its parent (target = parent + dir*len).
              Because the target rotates WITH the parent, it never builds a
              fixed world-space pull and never oscillates. Mass-weighted, so
              the heavy hip/feet act as the anchor and the light limbs swing
              into place. Gated by uprightness: near zero when inverted, so
              gravity always wins a flip — no upside-down lock.

           2. getUp — a gentle bootstrap that lifts the hip over the feet
              and rotates the torso toward vertical. Independent of current
              uprightness (so a fully collapsed buddy can rise), but it is
              strongest while he is NOT yet upright and eases off as he
              stands, handing over to poseSolve.

           Both are gated by "settle" (feet near the floor AND moving slowly)
           so a thrown buddy stays a floppy ragdoll in the air and only
           reassembles once he comes to rest.
           ------------------------------------------------------------ */
        const POSE_K = 0.22;

        function poseSolve(strength, upGate) {
            for (const bn of BONES) {
                const par = buddy.pts[bn.par], chi = buddy.pts[bn.chi];
                const s = strength * bn.w * upGate;
                if (s <= 0) continue;
                const tx = par.x + bn.nx * bn.L, ty = par.y + bn.ny * bn.L;
                const ox = (tx - chi.x) * s, oy = (ty - chi.y) * s;
                const am = par.grabbed ? 0 : 1 / (par.mass || 1);
                const bm = chi.grabbed ? 0 : 1 / (chi.mass || 1);
                const tot = (am + bm) || 1;
                if (!chi.grabbed) {
                    chi.x += ox * (bm / tot);
                    chi.y += oy * (bm / tot);
                }
                if (!par.grabbed) {
                    par.x -= ox * (am / tot);
                    par.y -= oy * (am / tot);
                }
            }
        }

        function getUp(g) {
            const P = buddy.pts, hip = P.hip, lf = P.lFoot, rf = P.rFoot, chest = P.chest, head = P.head;
            const footMidX = (lf.x + rf.x) * 0.5, footY = Math.max(lf.y, rf.y);
            const k = 0.06 * g;
            if (!hip.grabbed) {
                hip.x += (footMidX - hip.x) * k * 0.4;
                hip.y += ((footY - 58) - hip.y) * k;
            }
            if (!chest.grabbed) {
                const tx = hip.x, ty = hip.y - len(BODY.chest.ox - BODY.hip.ox, BODY.chest.oy - BODY.hip.oy);
                chest.x += (tx - chest.x) * k * 0.8;
                chest.y += (ty - chest.y) * k * 0.8;
            }
            if (!head.grabbed) {
                const tx = hip.x, ty = hip.y - (-BODY.head.oy);
                head.x += (tx - head.x) * k * 0.7;
                head.y += (ty - head.y) * k * 0.7;
            }
            for (const fn of ['lFoot', 'rFoot']) {
                const p = P[fn];
                if (p.grabbed) continue;
                p.x += (hip.x + BODY[fn].ox - p.x) * k * 0.4;
            }
        }

        /* Narrow-stance pull: keeps the feet from splaying into a wide sit while the
           buddy is standing. Pulls each foot toward its rest X offset under the hip,
           without touching hip height (so it never fights gravity / destabilises).
           Gated by uprightness so a flopping/airborne buddy is unaffected. */
        function stancePull(g, upGate) {
            if (g <= 0 || upGate <= 0) return;
            const P = buddy.pts, hip = P.hip;
            const k = 0.09 * g * upGate;
            for (const fn of ['lFoot', 'rFoot']) {
                const p = P[fn];
                if (p.grabbed) continue;
                p.x += (hip.x + BODY[fn].ox - p.x) * k;
            }
            for (const kn of ['lKnee', 'rKnee']) {
                const p = P[kn];
                if (p.grabbed) continue;
                p.x += (hip.x + BODY[kn].ox - p.x) * k * 0.6;
            }
        }

        /* Non-crossing limb constraints. These prevent legs/arms from passing
           through each other and locking in a crossed/inverted tangle.
           We keep left-side points left of the hip and right-side right of it,
           with a small dead-zone so they can still touch naturally. */
        function antiCross() {
            const P = buddy.pts, cx = P.hip.x;
            const pushL = (p, gap) => {
                if (!p.grabbed && p.x > cx - gap) p.x = lerp(p.x, cx - gap, 0.5);
            };
            const pushR = (p, gap) => {
                if (!p.grabbed && p.x < cx + gap) p.x = lerp(p.x, cx + gap, 0.5);
            };
            // only enforce when roughly upright/standing so flopping stays free
            const ux = P.chest.x - P.hip.x, uy = P.chest.y - P.hip.y;
            const upright = -uy / len(ux, uy);
            if (upright < 0.3) return;
            pushL(P.lFoot, 3);
            pushR(P.rFoot, 3);
            pushL(P.lKnee, 2);
            pushR(P.rKnee, 2);
        }

        let petAcc = 0;

        function stepBuddy() {
            for (const p of buddy.list) integrate(p);

            const sp = buddyAvgSpeed();
            buddy.recover = clamp(1 - sp / 14, 0, 1);

            // constraint solving: rigid skeleton, solved hard
            const iters = S.settings.iterations;
            for (let k = 0; k < iters; k++) {
                for (const c of buddy.cons) solveConstraint(c);
            }

            // settle gate: feet near floor AND slow. No standing while frozen.
            const lf = buddy.pts.lFoot, rf = buddy.pts.rFoot;
            const footHeight = Math.min(floorY - lf.y, floorY - rf.y); // small when on floor
            const nearFloor = clamp(1 - footHeight / 55, 0, 1);
            const slow = clamp(1 - sp / 5, 0, 1);
            const settle = nearFloor * slow * (1 - clamp(buddy.freeze / 40, 0, 1));
            if (settle > 0) {
                const P = buddy.pts;
                const uy = P.chest.y - P.hip.y;
                const upright = clamp(-uy / len(P.chest.x - P.hip.x, uy), -1, 1);
                const upGate = clamp((upright + 0.2) / 1.2, 0, 1); // ~0 inverted, 1 upright
                getUp(settle * (1 - upGate * 0.55)); // bootstrap: strong when down, eases as he rises
                poseSolve(POSE_K * settle, upGate);
                stancePull(settle, upGate);          // keep feet in a narrow natural stance
            }
            antiCross();

            // world collision
            const g = buddy.grab;
            let hardest = 0;
            for (const p of buddy.list) {
                if (p === g) continue;
                const imp = collideWorld(p);
                if (imp > hardest) hardest = imp;
            }
            if (hardest > 9 && !g) registerImpact(hardest * 0.7, {
                x: buddy.pts.hip.x,
                y: buddy.pts.hip.y,
                type: 'land',
                color: '#c6cdd6'
            });

            // grabbing / petting
            if (g) {
                g.x = pointer.x;
                g.y = pointer.y;
                const ds = len(pointer.x - pointer.px, pointer.y - pointer.py);
                if (ds < 6) {
                    petAcc++;
                    if (petAcc % 5 === 0) addEmotion(0.7);
                }
            }

            // mood drifts toward neutral
            buddy.emotion += (0 - buddy.emotion) * 0.004;

            // movement earns a trickle of cash
            if (sp > 3) {
                buddy.cashAcc += sp * 0.02;
                if (buddy.cashAcc >= 1) {
                    const c = Math.floor(buddy.cashAcc);
                    addCash(c);
                    buddy.cashAcc -= c;
                }
            }

            // fire & freeze tick
            if (buddy.fire > 0) {
                buddy.fire = Math.max(0, buddy.fire - 0.16);
                fireTickBuddy();
            }
            if (buddy.freeze > 0) {
                buddy.freeze = Math.max(0, buddy.freeze - 0.14);
                const fz = buddy.freeze > 0;
                for (const p of buddy.list) p.frozen = fz;
                if (buddy.freeze > 6 && Math.random() < 0.12) {
                    const p = choose(buddy.list);
                    spawnParticle({
                        x: p.x + rand(-p.radius, p.radius),
                        y: p.y,
                        vx: rand(-0.3, 0.3),
                        vy: rand(0.2, 0.8),
                        g: 0.02,
                        life: randInt(20, 36),
                        size: rand(1.5, 3),
                        color: '#cdeffb',
                        type: 'spark'
                    });
                }
            } else {
                for (const p of buddy.list) if (p.frozen) p.frozen = false;
            }
        }

        function addEmotion(d) {
            buddy.emotion = clamp(buddy.emotion + d, -100, 100);
            if (Math.abs(d) >= 2) {
                const h = buddy.pts.head;
                spawnPopup(h.x + rand(-7, 7), h.y - 24, d > 0 ? '+' : '−', d > 0 ? '#11a36b' : '#e0483e');
            }
        }

        let impactSfxCd = 0;

        function registerImpact(mag, opts) {
            opts = opts || {};
            const mult = S.modes.heavyHitter ? 1.8 : 1;
            const cash = Math.round(mag * 0.55 * mult);
            if (cash > 0) addCash(cash);
            addEmotion(-clamp(mag * 0.4, 1, 24));
            if (opts.x != null) spawnHitSparks(opts.x, opts.y, clamp(mag * 0.45, 3, 18) | 0, opts.color || '#cfd6df');
            if (impactSfxCd <= 0) {
                if (opts.type === 'punch') Audio2.punch(mag / 11);
                else if (opts.type === 'land') Audio2.punch(mag / 16);
                else Audio2.bounce(clamp(mag / 14, 0, 1));
                impactSfxCd = 2;
            }
        }

        function spawnHitSparks(x, y, count, color) {
            count = clamp(count, 2, 22);
            for (let i = 0; i < count; i++) {
                const a = rand(0, 6.2832), s = rand(1, 5);
                spawnParticle({
                    x,
                    y,
                    vx: Math.cos(a) * s,
                    vy: Math.sin(a) * s - 1,
                    g: 0.16,
                    life: randInt(14, 26),
                    size: rand(1.5, 3.2),
                    color,
                    type: 'spark'
                });
            }
        }

        function igniteBuddy(amount) {
            if (buddy.freeze > 0) { // ice protects / cancels with fire
                buddy.freeze = Math.max(0, buddy.freeze - amount * 1.5);
                for (let i = 0; i < 6; i++) spawnParticle({
                    x: choose(buddy.list).x,
                    y: choose(buddy.list).y,
                    vx: rand(-1, 1),
                    vy: rand(-1.5, -0.4),
                    g: 0.02,
                    life: randInt(14, 24),
                    size: rand(2, 4),
                    color: '#d7eef9',
                    type: 'smoke'
                });
                return;
            }
            if (buddy.fire <= 0) {
                S.stats.fires++;
                save();
            }
            buddy.fire = clamp(buddy.fire + amount, 0, 100);
        }

        function freezeBuddy(amount) {
            if (buddy.fire > 0) { // extinguish first
                buddy.fire = Math.max(0, buddy.fire - amount * 1.4);
                for (let i = 0; i < 8; i++) spawnParticle({
                    x: choose(buddy.list).x,
                    y: choose(buddy.list).y - 4,
                    vx: rand(-0.6, 0.6),
                    vy: rand(-1.4, -0.6),
                    g: -0.01,
                    life: randInt(24, 44),
                    size: rand(4, 7),
                    grow: 0.2,
                    color: '#9aa3ad',
                    type: 'smoke'
                });
            }
            const was = buddy.freeze;
            buddy.freeze = clamp(buddy.freeze + amount, 0, 100);
            if (was < 30 && buddy.freeze >= 30) {
                S.stats.freezes++;
                save();
                Audio2.freeze();
                addEmotion(-4);
                say(choose(['B-b-brr!', 'C-cold!', '❄']));
            }
        }

        let fireBuddyAcc = 0;

        function fireTickBuddy() {
            const pts = buddy.list;
            for (let i = 0; i < 2; i++) {
                const p = choose(pts);
                spawnParticle({
                    x: p.x + rand(-p.radius, p.radius),
                    y: p.y + rand(-p.radius, p.radius),
                    vx: rand(-0.5, 0.5),
                    vy: rand(-2.4, -1.2),
                    g: -0.02,
                    life: randInt(16, 30),
                    size: rand(3, 6),
                    color: choose(['#ff7a18', '#ff9b2e', '#ffcf3a', '#f0451e']),
                    type: 'spark'
                });
            }
            if (Math.random() < 0.35) {
                const p = choose(pts);
                spawnParticle({
                    x: p.x,
                    y: p.y - p.radius,
                    vx: rand(-0.4, 0.4),
                    vy: rand(-1.4, -0.7),
                    g: -0.01,
                    life: randInt(34, 60),
                    size: rand(4, 8),
                    grow: 0.22,
                    color: '#6b6f78',
                    type: 'smoke'
                });
            }
            fireBuddyAcc++;
            if (fireBuddyAcc % 12 === 0) {
                addEmotion(-1.4);
                addCash(S.modes.heavyHitter ? 2 : 1);
            }
        }

        /* ---------------- skins & buddy render ---------------- */
        function getSkin() {
            if (S.selectedSkin === 'custom') return S.customSkin;
            return SKINS_MAP[S.selectedSkin] || SKINS_MAP.default;
        }

        function capsule(a, b, width, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
        }

        function dot(p, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, 6.2832);
            ctx.fill();
        }

        function renderBuddy() {
            const P = buddy.pts, sk = getSkin();
            // legs
            capsule(P.hip, P.lKnee, 14, sk.limb);
            capsule(P.lKnee, P.lFoot, 13, sk.limb);
            capsule(P.hip, P.rKnee, 14, sk.limb);
            capsule(P.rKnee, P.rFoot, 13, sk.limb);
            dot(P.lFoot, 8, sk.limb);
            dot(P.rFoot, 8, sk.limb);
            // torso
            capsule(P.chest, P.hip, 27, sk.torso);
            // arms (pivot from shoulders)
            capsule(P.lShoulder, P.lElbow, 11, sk.limb);
            capsule(P.lElbow, P.lHand, 10, sk.limb);
            capsule(P.rShoulder, P.rElbow, 11, sk.limb);
            capsule(P.rElbow, P.rHand, 10, sk.limb);
            dot(P.lHand, 7, sk.limb);
            dot(P.rHand, 7, sk.limb);
            // head
            dot(P.head, P.head.radius, sk.head);
            drawFace(sk);
            // ice encasement overlay (drawn on top, fully opaque per preference)
            if (buddy.freeze > 4) drawIce();
        }

        function drawIce() {
            const P = buddy.list;
            const a = clamp(buddy.freeze / 60, 0, 1);
            // bounding region of the buddy
            let minx = 1e9, miny = 1e9, maxx = -1e9, maxy = -1e9;
            for (const p of P) {
                minx = Math.min(minx, p.x - p.radius);
                miny = Math.min(miny, p.y - p.radius);
                maxx = Math.max(maxx, p.x + p.radius);
                maxy = Math.max(maxy, p.y + p.radius);
            }
            const pad = 6 + 8 * a;
            minx -= pad;
            miny -= pad;
            maxx += pad;
            maxy += pad;
            const cx = (minx + maxx) / 2, cy = (miny + maxy) / 2;
            const rx = (maxx - minx) / 2, ry = (maxy - miny) / 2;
            // Respect the strict "no transparency on drawing output" rule: the ice is
            // ALWAYS fully opaque. Instead of fading in with alpha, it GROWS — the shell
            // scales up from the body as the freeze level rises, so it never pops in and
            // never uses globalAlpha. Fully frozen = full-size solid cube.
            const grow = 0.4 + 0.6 * a;       // shell scale, 0.4 -> 1.0
            const erx = rx * grow, ery = ry * grow;
            ctx.save();
            ctx.fillStyle = '#bfe6f7';
            ctx.beginPath();
            ctx.ellipse(cx, cy, erx, ery, 0, 0, 6.2832);
            ctx.fill();
            // crisp rim
            ctx.strokeStyle = '#8fcfeb';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.ellipse(cx, cy, erx, ery, 0, 0, 6.2832);
            ctx.stroke();
            // facets (solid lines)
            ctx.strokeStyle = '#dff3fc';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx - erx * 0.5, cy - ery);
            ctx.lineTo(cx - erx * 0.2, cy + ery * 0.3);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx + erx * 0.4, cy - ery * 0.8);
            ctx.lineTo(cx + erx * 0.1, cy + ery);
            ctx.stroke();
            // shine block
            ctx.fillStyle = '#eaf7fd';
            ctx.beginPath();
            ctx.moveTo(cx - erx * 0.55, cy - ery * 0.55);
            ctx.lineTo(cx - erx * 0.30, cy - ery * 0.62);
            ctx.lineTo(cx - erx * 0.36, cy - ery * 0.20);
            ctx.lineTo(cx - erx * 0.60, cy - ery * 0.14);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawFace(sk) {
            const head = buddy.pts.head, chest = buddy.pts.chest;
            const ang = Math.atan2(head.y - chest.y, head.x - chest.x) + Math.PI / 2;
            const e = buddy.emotion;
            ctx.save();
            ctx.translate(head.x, head.y);
            ctx.rotate(ang);
            const ex = 6.2, ey = -3.5;
            const pr = e < -40 ? 2.0 : 2.7;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(-ex, ey, 4.4, 0, 6.2832);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ex, ey, 4.4, 0, 6.2832);
            ctx.fill();
            ctx.fillStyle = sk.eye;
            ctx.beginPath();
            ctx.arc(-ex, ey + 0.4, pr, 0, 6.2832);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ex, ey + 0.4, pr, 0, 6.2832);
            ctx.fill();
            if (e < -30) {
                ctx.strokeStyle = sk.detail;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(-ex - 4, ey - 6);
                ctx.lineTo(-ex + 3, ey - 3);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(ex + 4, ey - 6);
                ctx.lineTo(ex - 3, ey - 3);
                ctx.stroke();
            }
            const my = 6, curve = (e / 100) * 8;
            ctx.strokeStyle = sk.detail;
            ctx.lineWidth = 2.4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-7, my);
            ctx.quadraticCurveTo(0, my + curve, 7, my);
            ctx.stroke();
            ctx.restore();
        }

        /* ============================================================
           ITEMS
           ============================================================ */
        const ITEM_DEFS = {
            baseball: {r: 9, m: 1.4, bounce: 0.50, fr: 0.92, color: '#eef0f2', line: '#d2473b'},
            bowling: {r: 16, m: 7.0, bounce: 0.22, fr: 0.85, color: '#262b35', holes: true},
            bouncy: {r: 10, m: 0.8, bounce: 0.92, fr: 0.97, color: '#f0641e', hi: '#ff9d5c'},
            baby: {r: 12, m: 1.2, bounce: 0.30, fr: 0.90, color: '#f4c9b6', baby: true, flammable: true},
            grenade: {r: 9, m: 1.6, bounce: 0.40, fr: 0.90, color: '#3f5a3a', fuse: 96},
            molotov: {
                r: 9,
                m: 1.3,
                bounce: 0.20,
                fr: 0.90,
                color: '#7a4a22',
                cap: '#cf7a2a',
                molotov: true,
                flammable: true
            },
            fireball: {r: 11, m: 0.6, bounce: 0.40, fr: 0.97, color: '#f0641e', emits: true},
            icecream: {
                r: 11,
                m: 0.9,
                bounce: 0.10,
                fr: 0.96,
                color: '#fbe3ef',
                cone: '#d9a154',
                scoop: '#f7c8df',
                icecream: true
            }
        };
        let items = [];
        let heldItem = null;

        function spawnItem(kind, x, y, vx, vy) {
            const def = ITEM_DEFS[kind];
            if (!def) return null;
            const it = {
                kind,
                def,
                x,
                y,
                oldX: x - (vx || 0),
                oldY: y - (vy || 0),
                radius: def.r,
                mass: def.m,
                bounce: def.bounce,
                friction: def.fr,
                pinned: false,
                held: false,
                age: 0,
                fuse: def.fuse || 0,
                emits: !!def.emits,
                flammable: !!def.flammable,
                fireStrength: 0,
                impacted: false,
                hitCd: 0,
                _dead: false
            };
            items.push(it);
            enforceCap();
            return it;
        }

        function enforceCap() {
            const cap = S.settings.objectCap;
            while (items.length > cap) {
                let idx = 0;
                while (idx < items.length && items[idx].held) idx++;
                if (idx >= items.length) break;
                items.splice(idx, 1);
            }
        }

        function stepItems() {
            for (const it of items) {
                if (it.hitCd > 0) it.hitCd--;
                if (it.held) {
                    it.oldX = it.x;
                    it.oldY = it.y;
                    it.x = pointer.x;
                    it.y = pointer.y;
                    continue;
                }
                it.age++;
                integrate(it);
                const imp = collideWorld(it);
                if (imp > 2) {
                    Audio2.bounce(clamp(imp / 14, 0, 1));
                    handleItemImpact(it, imp, null);
                }
                if (it.emits && Math.random() < 0.5) spawnParticle({
                    x: it.x,
                    y: it.y,
                    vx: rand(-0.5, 0.5),
                    vy: rand(-0.5, 0.5),
                    g: -0.02,
                    life: randInt(8, 16),
                    size: rand(2, 4),
                    color: choose(['#ff7a18', '#ffb13a', '#f0451e']),
                    type: 'spark'
                });
                if (it.fuse > 0) {
                    it.fuse--;
                    if (it.fuse < 16 && it.fuse % 4 === 0) spawnParticle({
                        x: it.x,
                        y: it.y - it.radius,
                        vx: 0,
                        vy: -0.6,
                        g: 0,
                        life: 8,
                        size: 2,
                        color: '#ffd24a',
                        type: 'spark'
                    });
                    if (it.fuse <= 0) {
                        explode(it.x, it.y, 9);
                        it._dead = true;
                    }
                }
            }
            // item vs buddy
            for (const it of items) {
                if (it.held || it._dead) continue;
                for (const p of buddy.list) {
                    const rel = collideCircles(p, it, it.bounce);
                    if (rel > 3 && it.hitCd <= 0) {
                        const mag = rel * clamp(it.mass, 1, 5) * 0.5;
                        registerImpact(mag, {x: (p.x + it.x) / 2, y: (p.y + it.y) / 2, type: 'hit', color: '#cfd6df'});
                        it.hitCd = 6;
                        if (it.kind === 'bowling' && rel > 6) {
                            S.stats.knockdowns++;
                            save();
                        }
                        handleItemImpact(it, rel, p);
                    }
                }
            }
            // item vs item (separation only)
            for (let i = 0; i < items.length; i++) {
                const a = items[i];
                if (a.held || a._dead) continue;
                for (let j = i + 1; j < items.length; j++) {
                    const b = items[j];
                    if (b.held || b._dead) continue;
                    collideCircles(a, b, 0);
                }
            }
            for (let i = items.length - 1; i >= 0; i--) if (items[i]._dead) items.splice(i, 1);
        }

        function handleItemImpact(it, mag, p) {
            if (it.impacted || mag <= 3) return;
            if (it.kind === 'molotov') {
                it.impacted = true;
                it._dead = true;
                spawnFire(it.x, Math.min(it.y, floorY - 2), 38);
                Audio2.ignite();
                addShake(4);
            } else if (it.kind === 'fireball') {
                it.impacted = true;
                it._dead = true;
                Audio2.ignite();
                if (p) igniteBuddy(45); else spawnFire(it.x, Math.min(it.y, floorY - 2), 22);
                for (let i = 0; i < 14; i++) {
                    const a = rand(0, 6.2832), s = rand(1, 4);
                    spawnParticle({
                        x: it.x,
                        y: it.y,
                        vx: Math.cos(a) * s,
                        vy: Math.sin(a) * s,
                        g: 0.05,
                        life: randInt(14, 26),
                        size: rand(2, 4),
                        color: choose(['#ff7a18', '#ffb13a', '#f0451e']),
                        type: 'spark'
                    });
                }
            } else if (it.kind === 'icecream') {
                it.impacted = true;
                it._dead = true;
                Audio2.splat();
                // splatter
                for (let i = 0; i < 16; i++) {
                    const a = rand(0, 6.2832), s = rand(0.6, 3);
                    spawnParticle({
                        x: it.x,
                        y: it.y,
                        vx: Math.cos(a) * s,
                        vy: Math.sin(a) * s - 1,
                        g: 0.14,
                        life: randInt(18, 34),
                        size: rand(2, 4.5),
                        color: choose(['#f7c8df', '#fbe3ef', '#f0b6d2', '#ffffff']),
                        type: 'spark'
                    });
                }
                if (p) {
                    freezeBuddy(16);
                    addEmotion(buddy.fire > 0 ? 2 : 3.5);
                    spawnPopup(buddy.pts.head.x, buddy.pts.head.y - 30, '🍦', '#e985b6');
                } else {
                    spawnParticle({
                        x: it.x,
                        y: Math.min(it.y, floorY - 2),
                        vx: 0,
                        vy: 0,
                        life: 20,
                        size: 8,
                        grow: 3,
                        color: '#f7c8df',
                        type: 'ring'
                    });
                }
            }
        }

        function renderItems() {
            for (const it of items) {
                const d = it.def;
                if (it.kind === 'icecream') {
                    renderIceCream(it);
                    continue;
                }
                ctx.fillStyle = d.color;
                ctx.beginPath();
                ctx.arc(it.x, it.y, it.radius, 0, 6.2832);
                ctx.fill();
                if (it.kind === 'baseball') {
                    ctx.strokeStyle = d.line;
                    ctx.lineWidth = 1.4;
                    ctx.beginPath();
                    ctx.arc(it.x - 11, it.y, it.radius - 1, -0.9, 0.9);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(it.x + 11, it.y, it.radius - 1, Math.PI - 0.9, Math.PI + 0.9);
                    ctx.stroke();
                } else if (it.kind === 'bowling') {
                    dot({x: it.x - 3, y: it.y - 3}, 1.8, '#0f1218');
                    dot({x: it.x + 1.5, y: it.y - 4}, 1.8, '#0f1218');
                    dot({x: it.x - 0.5, y: it.y - 6}, 1.8, '#0f1218');
                } else if (it.kind === 'bouncy') {
                    dot({x: it.x - it.radius * 0.32, y: it.y - it.radius * 0.32}, it.radius * 0.28, d.hi);
                } else if (it.kind === 'baby') {
                    dot({x: it.x - 3.5, y: it.y - 2}, 1.6, '#2a1d18');
                    dot({x: it.x + 3.5, y: it.y - 2}, 1.6, '#2a1d18');
                    ctx.strokeStyle = '#2a1d18';
                    ctx.lineWidth = 1.4;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.arc(it.x, it.y + 2, 3, 0.2, Math.PI - 0.2);
                    ctx.stroke();
                    dot({x: it.x, y: it.y - it.radius + 2}, 1.5, '#86b6e0');
                } else if (it.kind === 'grenade') {
                    ctx.fillStyle = '#2c3f29';
                    ctx.fillRect(it.x - 3, it.y - it.radius - 3, 6, 4);
                    if (it.fuse > 0 && it.fuse < 30 && (it.fuse >> 2) % 2 === 0) dot({
                        x: it.x,
                        y: it.y - it.radius - 4
                    }, 2.4, '#e0483e');
                } else if (it.kind === 'molotov') {
                    ctx.fillStyle = d.cap;
                    ctx.fillRect(it.x - 2.5, it.y - it.radius - 4, 5, 5);
                    spawnGlow(it.x, it.y - it.radius - 5, 3);
                } else if (it.kind === 'fireball') {
                    dot(it, it.radius * 0.55, '#ffd24a');
                }
            }
        }

        function renderIceCream(it) {
            const d = it.def;
            // cone (triangle below center) + scoop (circle above) — solid colors
            ctx.fillStyle = d.cone;
            ctx.beginPath();
            ctx.moveTo(it.x - it.radius * 0.55, it.y);
            ctx.lineTo(it.x + it.radius * 0.55, it.y);
            ctx.lineTo(it.x, it.y + it.radius * 1.2);
            ctx.closePath();
            ctx.fill();
            // waffle lines
            ctx.strokeStyle = '#b9823f';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(it.x - it.radius * 0.3, it.y + it.radius * 0.2);
            ctx.lineTo(it.x + it.radius * 0.1, it.y + it.radius * 0.9);
            ctx.stroke();
            // scoop
            dot({x: it.x, y: it.y - it.radius * 0.25}, it.radius * 0.8, d.scoop);
            dot({x: it.x - it.radius * 0.28, y: it.y - it.radius * 0.5}, it.radius * 0.34, '#ffffff'); // highlight
            // cherry
            dot({x: it.x, y: it.y - it.radius * 1.0}, 2.4, '#e0483e');
        }

        let glowAcc = 0;

        function spawnGlow(x, y, r) {
            if ((glowAcc++ & 1) === 0) spawnParticle({
                x,
                y,
                vx: 0,
                vy: -0.6,
                g: 0,
                life: 10,
                size: r,
                color: '#ffae3a',
                type: 'spark'
            });
        }

        function explode(x, y, force) {
            const radius = 60 + force * 12;
            const apply = (p) => {
                if (p.pinned) return;
                const dx = p.x - x, dy = p.y - y, dd = len(dx, dy);
                if (dd > radius) return;
                const f = force * (1 - dd / radius);
                applyImpulse(p, (dx / dd) * f, (dy / dd) * f - f * 0.25);
            };
            for (const p of buddy.list) apply(p);
            for (const it of items) if (!it.held) apply(it);
            const n = 28 + (force * 2 | 0);
            for (let i = 0; i < n; i++) {
                const a = rand(0, 6.2832), s = rand(2, 8);
                spawnParticle({
                    x,
                    y,
                    vx: Math.cos(a) * s,
                    vy: Math.sin(a) * s,
                    g: 0.12,
                    life: randInt(18, 38),
                    size: rand(2, 5),
                    color: choose(['#ff7a18', '#ffb13a', '#ffe08a', '#f0451e', '#9aa3ad']),
                    type: 'spark'
                });
            }
            for (let i = 0; i < 6; i++) spawnParticle({
                x: x + rand(-10, 10),
                y: y + rand(-10, 10),
                vx: rand(-1, 1),
                vy: rand(-2, -0.5),
                g: -0.02,
                life: randInt(40, 70),
                size: rand(6, 12),
                grow: 0.4,
                color: '#5a5e66',
                type: 'smoke'
            });
            spawnParticle({x, y, vx: 0, vy: 0, life: 22, size: 10, grow: 6, color: '#ffb13a', type: 'ring'});
            const hd = buddy.pts.hip, dd = len(hd.x - x, hd.y - y);
            if (dd < radius) registerImpact(force * (1 - dd / radius) * 1.4, {
                x: hd.x,
                y: hd.y,
                type: 'land',
                color: '#ffb13a'
            });
            if (dd < radius * 0.5) igniteBuddy(18);
            Audio2.boom(force / 9);
            addShake(8 + force);
            S.stats.explosions++;
            save();
            if (force >= 9 && Math.random() < 0.45) say(choose(['OW!', 'AAH!', 'OOF!', 'WHY?!']));
        }

        let specials = [];

        function placeSpecial(kind, x, y) {
            if (kind === 'mine') specials.push({kind, x, y: floorY - 4, armed: 0, life: 1e9, _dead: false});
            else if (kind === 'vortex') specials.push({kind, x, y, life: 300, _dead: false});
            else if (kind === 'radio') specials.push({
                kind,
                x,
                y: Math.min(y, floorY - 16),
                life: 540,
                ringT: 0,
                _dead: false
            });
            else if (kind === 'orb') specials.push({kind, x, y, life: 360, phase: 0, _dead: false});
            while (specials.length > 80) specials.shift();
            Audio2.pop();
        }

        function pullToward(cx, cy, strength, radius) {
            const apply = (p) => {
                if (p.pinned || p.held) return;
                const dx = cx - p.x, dy = cy - p.y, dd = len(dx, dy);
                if (dd > radius || dd < 1) return;
                const f = strength * (1 - dd / radius);
                applyImpulse(p, (dx / dd) * f, (dy / dd) * f);
            };
            for (const p of buddy.list) apply(p);
            for (const it of items) apply(it);
        }

        function stepSpecials() {
            for (const s of specials) {
                s.life--;
                if (s.kind === 'vortex') {
                    pullToward(s.x, s.y, 1.15, 230);
                    if (s.life % 3 === 0) {
                        const a = rand(0, 6.2832), r = rand(20, 80);
                        spawnParticle({
                            x: s.x + Math.cos(a) * r,
                            y: s.y + Math.sin(a) * r,
                            vx: -Math.cos(a) * 2,
                            vy: -Math.sin(a) * 2,
                            life: 18,
                            size: 2,
                            color: '#4f6bd6',
                            type: 'spark'
                        });
                    }
                } else if (s.kind === 'orb') {
                    s.phase += 0.06;
                    pullToward(s.x, s.y, 0.85 * Math.sin(s.phase), 160);
                } else if (s.kind === 'radio') {
                    s.ringT++;
                    if (s.ringT % 26 === 0) {
