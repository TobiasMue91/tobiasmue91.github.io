<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☄️</text></svg>">
    <title>ASTEROIDS // NEON DRIFT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="description"
          content="Asteroids reimagined: neon vector arcade action with waves, saucers, power-ups and synthesized sound. Pure HTML5, one file, zero dependencies.">
    <style>
        :root {
            --ink: #0a0a14;
            --cyan: #22e6ff;
            --magenta: #ff3ec8;
            --lime: #b6ff2e;
            --amber: #ffb02e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--ink);
            touch-action: none;
            overscroll-behavior: none
        }

        body {
            font-family: 'Courier New', ui-monospace, monospace;
            color: #cfe;
            user-select: none;
            -webkit-user-select: none
        }

        #wrap {
            position: fixed;
            inset: 0
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%
        }

        /* overlay screens */
        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, rgba(10, 10, 20, .55), rgba(10, 10, 20, .92));
            z-index: 10;
            text-align: center;
            padding: 24px
        }

        .hidden {
            display: none !important
        }

        h1 {
            font-size: clamp(34px, 8vw, 84px);
            letter-spacing: .14em;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 8px var(--cyan), 0 0 24px var(--cyan), 0 0 64px rgba(34, 230, 255, .5);
            margin-bottom: 6px
        }

        h1 em {
            font-style: normal;
            color: var(--magenta);
            text-shadow: 0 0 8px var(--magenta), 0 0 24px var(--magenta)
        }

        .sub {
            letter-spacing: .4em;
            opacity: .7;
            font-size: clamp(10px, 2vw, 14px);
            margin-bottom: 34px
        }

        .btn {
            font-family: inherit;
            font-size: clamp(15px, 2.4vw, 20px);
            letter-spacing: .25em;
            padding: 14px 42px;
            margin-top: 8px;
            background: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan);
            cursor: pointer;
            box-shadow: 0 0 12px rgba(34, 230, 255, .35), inset 0 0 12px rgba(34, 230, 255, .12);
            transition: all .15s
        }

        .btn:hover, .btn:focus-visible {
            background: rgba(34, 230, 255, .12);
            box-shadow: 0 0 24px rgba(34, 230, 255, .7), inset 0 0 18px rgba(34, 230, 255, .25);
            outline: none;
            transform: translateY(-1px)
        }

        .help {
            margin-top: 30px;
            font-size: 12px;
            line-height: 2;
            opacity: .65;
            letter-spacing: .12em
        }

        .help b {
            color: var(--lime);
            font-weight: 400
        }

        .stat {
            font-size: clamp(16px, 3vw, 24px);
            letter-spacing: .2em;
            margin: 4px 0
        }

        .stat span {
            color: var(--amber);
            text-shadow: 0 0 10px var(--amber)
        }

        #newbest {
            color: var(--magenta);
            text-shadow: 0 0 12px var(--magenta);
            letter-spacing: .3em;
            font-size: 14px;
            margin: 10px 0;
            animation: blink 1s steps(2) infinite
        }

        @keyframes blink {
            50% {
                opacity: .25
            }
        }

        /* touch controls */
        #touch {
            position: fixed;
            inset: 0;
            z-index: 5;
            display: none;
            pointer-events: none
        }

        .tbtn {
            position: absolute;
            width: 74px;
            height: 74px;
            border-radius: 50%;
            border: 1px solid rgba(34, 230, 255, .5);
            background: rgba(34, 230, 255, .06);
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: rgba(180, 240, 255, .8)
        }

        .tbtn:active {
            background: rgba(34, 230, 255, .25)
        }

        #tL {
            left: 18px;
            bottom: 96px
        }

        #tR {
            left: 110px;
            bottom: 96px
        }

        #tT {
            right: 110px;
            bottom: 96px
        }

        #tF {
            right: 18px;
            bottom: 96px;
            border-color: rgba(255, 62, 200, .6);
            color: rgba(255, 150, 225, .9)
        }

        @media (pointer: coarse) {
            #touch {
                display: block
            }
        }

        @media (prefers-reduced-motion: reduce) {
            #newbest {
                animation: none
            }
        }
    </style>
</head>
<body>
<div id="wrap">
    <canvas id="cv"></canvas>
</div>

<div class="screen" id="menu">
    <h1>ASTEROIDS<br><em>NEON DRIFT</em></h1>
    <div class="sub">SURVIVE · SHATTER · CHAIN</div>
    <button class="btn" id="startBtn">▶ LAUNCH</button>
    <div class="help">
        <b>←→ / A D</b> rotate &nbsp; <b>↑ / W</b> thrust &nbsp; <b>SPACE</b> fire<br>
        <b>P</b> pause &nbsp; <b>M</b> mute &nbsp; chain kills fast to build your <b>combo ×</b><br>
        grab drifting capsules: <b style="color:var(--cyan)">S</b>pread &nbsp;<b style="color:var(--magenta)">R</b>apid
        &nbsp;<b style="color:var(--amber)">Ø</b>shield
    </div>
</div>

<div class="screen hidden" id="over">
    <h1 style="font-size:clamp(28px,6vw,60px)">SIGNAL <em>LOST</em></h1>
    <div id="newbest" class="hidden">★ NEW HIGH SCORE ★</div>
    <div class="stat">SCORE <span id="fScore">0</span></div>
    <div class="stat">BEST <span id="fBest">0</span></div>
    <div class="stat">WAVE <span id="fWave">1</span> · MAX COMBO <span id="fCombo">×1</span></div>
    <button class="btn" id="againBtn">↻ RE-LAUNCH</button>
    <div class="help">or press <b>R</b></div>
</div>

<div id="touch">
    <div class="tbtn" id="tL">⟲</div>
    <div class="tbtn" id="tR">⟳</div>
    <div class="tbtn" id="tT">▲</div>
    <div class="tbtn" id="tF">✦</div>
</div>

<script>
    'use strict';
    /* ============================================================
     ASTEROIDS // NEON DRIFT — single-file rewrite for gptgames.dev
     ============================================================ */
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');
    let W = 0, H = 0, DPR = 1;

    function resize() {
        DPR = Math.min(devicePixelRatio || 1, 2);
        W = innerWidth;
        H = innerHeight;
        cv.width = W * DPR;
        cv.height = H * DPR;
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }

    addEventListener('resize', resize);
    resize();

    const TAU = Math.PI * 2;
    const rnd = (a = 1, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
    const pick = a => a[Math.random() * a.length | 0];
    const wrap = o => {
        const m = o.r + 4;
        if (o.x < -m) o.x = W + m; else if (o.x > W + m) o.x = -m;
        if (o.y < -m) o.y = H + m; else if (o.y > H + m) o.y = -m;
    };
    const dist2 = (a, b) => {
        const dx = a.x - b.x, dy = a.y - b.y;
        return dx * dx + dy * dy
    };
    const hit = (a, b) => dist2(a, b) < (a.r + b.r) * (a.r + b.r);
    const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ---------- audio: tiny synth, no assets ---------- */
    const SFX = (() => {
        let ac = null, muted = false, master;
        const ensure = () => {
            if (!ac) {
                ac = new (AudioContext || webkitAudioContext)();
                master = ac.createGain();
                master.gain.value = .35;
                master.connect(ac.destination);
            }
            if (ac.state === 'suspended') ac.resume();
        };

        function tone({f = 440, f2, type = 'square', dur = .1, vol = .5, slide = 0, delay = 0}) {
            if (muted) return;
            ensure();
            const t = ac.currentTime + delay, o = ac.createOscillator(), g = ac.createGain();
            o.type = type;
            o.frequency.setValueAtTime(f, t);
            if (f2 !== undefined) o.frequency.exponentialRampToValueAtTime(Math.max(f2, 1), t + dur);
            else if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(f + slide, 1), t + dur);
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(.001, t + dur);
            o.connect(g).connect(master);
            o.start(t);
            o.stop(t + dur + .02);
        }

        function noise(dur = .3, vol = .5, fc = 800) {
            if (muted) return;
            ensure();
            const t = ac.currentTime, n = ac.sampleRate * dur | 0, buf = ac.createBuffer(1, n, ac.sampleRate),
                d = buf.getChannelData(0);
            for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
            const s = ac.createBufferSource();
            s.buffer = buf;
            const fl = ac.createBiquadFilter();
            fl.type = 'lowpass';
            fl.frequency.value = fc;
            const g = ac.createGain();
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(.001, t + dur);
            s.connect(fl).connect(g).connect(master);
            s.start(t);
        }

        return {
            ensure,
            shoot: () => tone({f: 900, f2: 220, type: 'square', dur: .09, vol: .25}),
            eshoot: () => tone({f: 300, f2: 120, type: 'sawtooth', dur: .15, vol: .25}),
            boomBig: () => {
                noise(.5, .8, 500);
                tone({f: 90, f2: 30, type: 'triangle', dur: .4, vol: .6})
            },
            boomSmall: () => noise(.22, .45, 1200),
            thrust: () => noise(.08, .06, 300),
            die: () => {
                noise(.8, .9, 400);
                tone({f: 220, f2: 30, type: 'sawtooth', dur: .7, vol: .5})
            },
            power: () => {
                tone({f: 523, dur: .08, vol: .35});
                tone({f: 784, dur: .1, vol: .35, delay: .08});
                tone({f: 1046, dur: .14, vol: .35, delay: .16})
            },
            wave: () => {
                tone({f: 392, dur: .12, vol: .3});
                tone({f: 523, dur: .12, vol: .3, delay: .12});
                tone({f: 659, dur: .2, vol: .3, delay: .24})
            },
            saucer: () => tone({f: 600, f2: 800, type: 'sine', dur: .2, vol: .12}),
            combo: m => tone({f: 600 + m * 80, f2: 900 + m * 80, type: 'square', dur: .07, vol: .2}),
            shield: () => tone({f: 1200, f2: 400, type: 'sine', dur: .25, vol: .35}),
            toggle() {
                muted = !muted;
                return muted
            }
        };
    })();

    /* ---------- input ---------- */
    const key = {L: 0, R: 0, T: 0, F: 0};
    addEventListener('keydown', e => {
        const k = e.code;
        if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'Space'].includes(k)) e.preventDefault();
        if (k === 'ArrowLeft' || k === 'KeyA') key.L = 1;
        if (k === 'ArrowRight' || k === 'KeyD') key.R = 1;
        if (k === 'ArrowUp' || k === 'KeyW') key.T = 1;
        if (k === 'Space') key.F = 1;
        if (k === 'KeyP' && state === 'play') paused = !paused;
        if (k === 'KeyM') SFX.toggle();
        if (k === 'KeyR' && state === 'over') start();
        if ((k === 'Enter' || k === 'Space') && state === 'menu') start();
    });
    addEventListener('keyup', e => {
        const k = e.code;
        if (k === 'ArrowLeft' || k === 'KeyA') key.L = 0;
        if (k === 'ArrowRight' || k === 'KeyD') key.R = 0;
        if (k === 'ArrowUp' || k === 'KeyW') key.T = 0;
        if (k === 'Space') key.F = 0;
    });
    // touch
    for (const [id, prop] of [['tL', 'L'], ['tR', 'R'], ['tT', 'T'], ['tF', 'F']]) {
        const el = document.getElementById(id);
        const on = e => {
            e.preventDefault();
            key[prop] = 1;
            SFX.ensure()
        };
        const off = e => {
            e.preventDefault();
            key[prop] = 0
        };
        el.addEventListener('touchstart', on, {passive: false});
        el.addEventListener('touchend', off);
        el.addEventListener('touchcancel', off);
    }

    /* ---------- entities ---------- */
    let ship, asteroids = [], bullets = [], ebullets = [], saucers = [], parts = [], pops = [], powerups = [];
    let score = 0, lives = 3, wave = 0, state = 'menu', paused = false;
    let combo = 1, comboT = 0, maxCombo = 1, shake = 0, flash = 0, hueT = 0;
    let best = 0;
    try {
        best = +localStorage.getItem('nd_best') || 0
    } catch (e) {
    }

    const COLORS = {rock: ['#8fd3ff', '#a8b8ff', '#7ff0e0'], saucer: '#ff3ec8', bullet: '#b6ff2e', ebullet: '#ff5a5a'};

    function makeShip() {
        return {
            x: W / 2, y: H / 2, vx: 0, vy: 0, a: -Math.PI / 2, r: 13, cool: 0, inv: 150, thrust: 0,
            weapon: 'single', weaponT: 0, shield: 0, dead: 0
        };
    }

    function makeAsteroid(x, y, tier, vx, vy) {
        const r = [46, 26, 14][tier];
        const n = 8 + tier * 2 + (Math.random() * 3 | 0);
        const shape = [];
        for (let i = 0; i < n; i++) shape.push(rnd(.68, 1.12));
        return {
            x, y, tier, r, shape,
            vx: vx ?? rnd(-1, 1) * (0.6 + wave * .07),
            vy: vy ?? rnd(-1, 1) * (0.6 + wave * .07),
            rot: rnd(TAU), spin: rnd(-.02, .02), col: pick(COLORS.rock)
        };
    }

    function spawnAsteroidEdge(tier = 0) {
        let x, y;
        if (Math.random() < .5) {
            x = Math.random() < .5 ? -50 : W + 50;
            y = rnd(H)
        } else {
            x = rnd(W);
            y = Math.random() < .5 ? -50 : H + 50
        }
        asteroids.push(makeAsteroid(x, y, tier));
    }

    function makeSaucer(big) {
        const y = rnd(H * .15, H * .85), dir = Math.random() < .5 ? 1 : -1;
        return {
            x: dir > 0 ? -40 : W + 40, y, vx: dir * (big ? 1.4 : 2.3), vy: 0, r: big ? 22 : 13, big,
            shotT: big ? 110 : 70, wob: rnd(TAU), hp: big ? 2 : 1
        };
    }

    function makePowerup(x, y) {
        const kind = pick(['spread', 'rapid', 'shield']);
        return {x, y, vx: rnd(-.7, .7), vy: rnd(-.7, .7), r: 11, kind, t: 900, pulse: rnd(TAU)};
    }

    function burst(x, y, n, col, spd = 3, life = 40) {
        if (reduceMotion) n = Math.min(n, 6);
        for (let i = 0; i < n; i++) {
            const a = rnd(TAU), s = rnd(.3, spd);
            parts.push({x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, l: rnd(life * .5, life), ml: life, col});
        }
    }

    function popText(x, y, txt, col) {
        pops.push({x, y, txt, col, l: 60})
    }

    /* ---------- flow ---------- */
    function start() {
        SFX.ensure();
        score = 0;
        lives = 3;
        wave = 0;
        combo = 1;
        maxCombo = 1;
        comboT = 0;
        asteroids = [];
        bullets = [];
        ebullets = [];
        saucers = [];
        parts = [];
        pops = [];
        powerups = [];
        ship = makeShip();
        state = 'play';
        paused = false;
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('over').classList.add('hidden');
        nextWave();
    }

    function nextWave() {
        wave++;
        const n = 3 + wave;
        for (let i = 0; i < Math.min(n, 11); i++) spawnAsteroidEdge(0);
        if (wave > 1) SFX.wave();
        popText(W / 2, H * .35, 'WAVE ' + wave, '#22e6ff');
    }

    function gameOver() {
        state = 'over';
        const nb = score > best;
        if (nb) {
            best = score;
            try {
                localStorage.setItem('nd_best', best)
            } catch (e) {
            }
        }
        document.getElementById('fScore').textContent = score;
        document.getElementById('fBest').textContent = best;
        document.getElementById('fWave').textContent = wave;
        document.getElementById('fCombo').textContent = '×' + maxCombo;
        document.getElementById('newbest').classList.toggle('hidden', !nb);
        document.getElementById('over').classList.remove('hidden');
    }

    document.getElementById('startBtn').onclick = start;
    document.getElementById('againBtn').onclick = start;

    function addScore(pts, x, y) {
        const v = pts * combo;
        score += v;
        comboT = 140;
        if (combo < 9) {
            combo++;
            SFX.combo(combo)
        }
        maxCombo = Math.max(maxCombo, combo);
        popText(x, y, '+' + v + (combo > 2 ? '  ×' + (combo - 1) : ''), combo > 4 ? '#ff3ec8' : '#b6ff2e');
    }

    function killShip() {
        if (ship.shield > 0) {
            ship.shield = 0;
            ship.inv = 90;
            SFX.shield();
            burst(ship.x, ship.y, 20, '#ffb02e', 4);
            return
        }
        SFX.die();
        burst(ship.x, ship.y, 50, '#22e6ff', 5, 70);
        burst(ship.x, ship.y, 25, '#ffffff', 3, 50);
        shake = 18;
        flash = .5;
        lives--;
        if (lives <= 0) {
            ship.dead = 1;
            setTimeout(gameOver, 900)
        } else ship = makeShip();
    }

    function splitAsteroid(a, i) {
        asteroids.splice(i, 1);
        const big = a.tier === 0;
        (big ? SFX.boomBig : SFX.boomSmall)();
        shake = Math.max(shake, big ? 9 : 4);
        burst(a.x, a.y, big ? 26 : 12, a.col, big ? 3.4 : 2.6);
        addScore([20, 50, 100][a.tier], a.x, a.y);
        if (a.tier < 2) {
            for (let k = 0; k < 2; k++) {
                const a2 = rnd(TAU), s = rnd(.8, 1.8) + wave * .05;
                asteroids.push(makeAsteroid(a.x, a.y, a.tier + 1, a.vx * .4 + Math.cos(a2) * s, a.vy * .4 + Math.sin(a2) * s));
            }
        }
        if (Math.random() < .09) powerups.push(makePowerup(a.x, a.y));
    }

    /* ---------- update ---------- */
    let saucerTimer = 800;

    function update() {
        hueT += .01;
        if (comboT > 0) {
            comboT--;
            if (comboT === 0) combo = 1
        }

        // ship
        if (!ship.dead) {
            if (key.L) ship.a -= .075;
            if (key.R) ship.a += .075;
            if (key.T) {
                ship.vx += Math.cos(ship.a) * .14;
                ship.vy += Math.sin(ship.a) * .14;
                ship.thrust = 1;
                if (Math.random() < .5) SFX.thrust();
                if (!reduceMotion || Math.random() < .3)
                    parts.push({
                        x: ship.x - Math.cos(ship.a) * 14 + rnd(-3, 3),
                        y: ship.y - Math.sin(ship.a) * 14 + rnd(-3, 3),
                        vx: -Math.cos(ship.a) * rnd(1, 3) + ship.vx * .3,
                        vy: -Math.sin(ship.a) * rnd(1, 3) + ship.vy * .3,
                        l: rnd(10, 22),
                        ml: 22,
                        col: pick(['#ffb02e', '#ff5a2e', '#ffe27a'])
                    });
            } else ship.thrust = 0;
            const sp = Math.hypot(ship.vx, ship.vy), max = 7;
            if (sp > max) {
                ship.vx *= max / sp;
                ship.vy *= max / sp
            }
            ship.vx *= .992;
            ship.vy *= .992;
            ship.x += ship.vx;
            ship.y += ship.vy;
            wrap(ship);
            if (ship.inv > 0) ship.inv--;
            if (ship.weaponT > 0) {
                ship.weaponT--;
                if (ship.weaponT === 0) ship.weapon = 'single'
            }
            if (ship.cool > 0) ship.cool--;
            if (key.F && ship.cool <= 0) {
                SFX.shoot();
                const mk = da => bullets.push({
                    x: ship.x + Math.cos(ship.a + da) * 15,
                    y: ship.y + Math.sin(ship.a + da) * 15,
                    vx: ship.vx * .5 + Math.cos(ship.a + da) * 8.5,
                    vy: ship.vy * .5 + Math.sin(ship.a + da) * 8.5,
                    r: 2.5,
                    l: 52
                });
                if (ship.weapon === 'spread') {
                    mk(0);
                    mk(.22);
                    mk(-.22)
                } else mk(0);
                ship.cool = ship.weapon === 'rapid' ? 5 : 11;
                ship.vx -= Math.cos(ship.a) * .05;
                ship.vy -= Math.sin(ship.a) * .05; // recoil
            }
        }

        // asteroids
        for (const a of asteroids) {
            a.x += a.vx;
            a.y += a.vy;
            a.rot += a.spin;
            wrap(a)
        }

        // saucers
        if (--saucerTimer <= 0 && saucers.length < 2 && state === 'play') {
            saucers.push(makeSaucer(Math.random() < .55));
            saucerTimer = rnd(700, 1300) - wave * 20;
        }
        for (let i = saucers.length - 1; i >= 0; i--) {
            const s = saucers[i];
            s.wob += .05;
            s.y += Math.sin(s.wob) * .8;
            s.x += s.vx;
            if (Math.random() < .02) SFX.saucer();
            if (s.x < -60 || s.x > W + 60) {
                saucers.splice(i, 1);
                continue
            }
            if (--s.shotT <= 0 && !ship.dead) {
                s.shotT = s.big ? 100 : 65;
                let a;
                if (s.big) a = rnd(TAU); // big one sprays wildly
                else { // small one aims (with slight error that shrinks each wave)
                    a = Math.atan2(ship.y - s.y, ship.x - s.x) + rnd(-1, 1) * Math.max(.04, .3 - wave * .02);
                }
                ebullets.push({x: s.x, y: s.y, vx: Math.cos(a) * 4.2, vy: Math.sin(a) * 4.2, r: 3, l: 170});
                SFX.eshoot();
            }
        }

        // bullets
        const step = (arr) => {
            for (let i = arr.length - 1; i >= 0; i--) {
                const b = arr[i];
                b.x += b.vx;
                b.y += b.vy;
                wrap(b);
                if (--b.l <= 0) arr.splice(i, 1)
            }
        };
        step(bullets);
        step(ebullets);

        // powerups
        for (let i = powerups.length - 1; i >= 0; i--) {
            const p = powerups[i];
            p.x += p.vx;
            p.y += p.vy;
            p.pulse += .1;
            wrap(p);
            if (--p.t <= 0) {
                powerups.splice(i, 1);
                continue
            }
            if (!ship.dead && hit(p, ship)) {
                powerups.splice(i, 1);
                SFX.power();
                burst(p.x, p.y, 14, '#ffffff', 2.5);
                if (p.kind === 'shield') {
                    ship.shield = 1;
                    popText(p.x, p.y, 'SHIELD', '#ffb02e')
                } else {
                    ship.weapon = p.kind;
                    ship.weaponT = 600;
                    popText(p.x, p.y, p.kind.toUpperCase(), p.kind === 'spread' ? '#22e6ff' : '#ff3ec8')
                }
            }
        }

        // bullet vs asteroid / saucer
        outer:
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                for (let j = asteroids.length - 1; j >= 0; j--) {
                    if (hit(b, asteroids[j])) {
                        bullets.splice(i, 1);
                        splitAsteroid(asteroids[j], j);
                        continue outer
                    }
                }
                for (let j = saucers.length - 1; j >= 0; j--) {
                    const s = saucers[j];
                    if (hit(b, s)) {
                        bullets.splice(i, 1);
                        if (--s.hp <= 0) {
                            saucers.splice(j, 1);
                            SFX.boomBig();
                            shake = Math.max(shake, 10);
                            burst(s.x, s.y, 30, COLORS.saucer, 4);
                            addScore(s.big ? 150 : 250, s.x, s.y);
                            if (Math.random() < .35) powerups.push(makePowerup(s.x, s.y));
                        } else {
                            burst(s.x, s.y, 8, COLORS.saucer, 2);
                            SFX.boomSmall()
                        }
                        continue outer;
                    }
                }
            }

        // ship collisions
        if (!ship.dead && ship.inv <= 0) {
            for (let i = asteroids.length - 1; i >= 0; i--)
                if (hit(ship, asteroids[i])) {
                    splitAsteroid(asteroids[i], i);
                    killShip();
                    break
                }
            for (const s of saucers) if (hit(ship, s)) {
                killShip();
                break
            }
            for (let i = ebullets.length - 1; i >= 0; i--)
                if (hit(ship, ebullets[i])) {
                    ebullets.splice(i, 1);
                    killShip();
                    break
                }
        }

        // particles / popups
        for (let i = parts.length - 1; i >= 0; i--) {
            const p = parts[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= .97;
            p.vy *= .97;
            if (--p.l <= 0) parts.splice(i, 1)
        }
        for (let i = pops.length - 1; i >= 0; i--) {
            const p = pops[i];
            p.y -= .6;
            if (--p.l <= 0) pops.splice(i, 1)
        }

        if (asteroids.length === 0 && state === 'play') nextWave();
        if (shake > 0) shake *= .88;
        if (flash > 0) flash -= .04;
    }

    /* ---------- starfield ---------- */
    const stars = [];
    for (let i = 0; i < 140; i++) stars.push({x: Math.random(), y: Math.random(), z: rnd(.3, 1), tw: rnd(TAU)});

    /* ---------- draw ---------- */
    function glow(col, blur = 14) {
        ctx.shadowColor = col;
        ctx.shadowBlur = reduceMotion ? 0 : blur
    }

    function draw(t) {
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        // background
        const g = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * .75);
        g.addColorStop(0, '#101026');
        g.addColorStop(1, '#06060f');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
        // stars
        ctx.save();
        for (const s of stars) {
            const a = .25 + .55 * Math.abs(Math.sin(t * .001 * s.z + s.tw));
            ctx.fillStyle = `rgba(180,220,255,${a * s.z})`;
            ctx.fillRect(s.x * W, s.y * H, s.z < .6 ? 1 : 2, s.z < .6 ? 1 : 2);
        }
        ctx.restore();

        if (shake > .4 && !reduceMotion) ctx.translate(rnd(-shake, shake), rnd(-shake, shake));

        // asteroids
        for (const a of asteroids) {
            ctx.save();
            ctx.translate(a.x, a.y);
            ctx.rotate(a.rot);
            ctx.beginPath();
            const n = a.shape.length;
            for (let i = 0; i <= n; i++) {
                const ang = i / n * TAU, rr = a.r * a.shape[i % n];
                i ? ctx.lineTo(Math.cos(ang) * rr, Math.sin(ang) * rr) : ctx.moveTo(Math.cos(ang) * rr, Math.sin(ang) * rr);
            }
            ctx.closePath();
            glow(a.col);
            ctx.strokeStyle = a.col;
            ctx.lineWidth = 1.6;
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(20,30,60,.35)';
            ctx.fill();
            ctx.restore();
        }

        // saucers
        for (const s of saucers) {
            ctx.save();
            ctx.translate(s.x, s.y);
            glow(COLORS.saucer);
            ctx.strokeStyle = COLORS.saucer;
            ctx.lineWidth = 1.6;
            const r = s.r;
            ctx.beginPath();
            ctx.moveTo(-r, 0);
            ctx.lineTo(-r * .45, -r * .45);
            ctx.lineTo(r * .45, -r * .45);
            ctx.lineTo(r, 0);
            ctx.lineTo(r * .45, r * .45);
            ctx.lineTo(-r * .45, r * .45);
            ctx.closePath();
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-r, 0);
            ctx.lineTo(r, 0);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, -r * .45, r * .34, Math.PI, 0);
            ctx.stroke();
            ctx.restore();
        }

        // powerups
        for (const p of powerups) {
            const col = p.kind === 'spread' ? '#22e6ff' : p.kind === 'rapid' ? '#ff3ec8' : '#ffb02e';
            const pr = p.r + Math.sin(p.pulse) * 2, fade = p.t < 120 ? (p.t % 20 < 10 ? .25 : 1) : 1;
            ctx.save();
            ctx.globalAlpha = fade;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.pulse * .3);
            glow(col);
            ctx.strokeStyle = col;
            ctx.lineWidth = 1.6;
            ctx.strokeRect(-pr, -pr, pr * 2, pr * 2);
            ctx.shadowBlur = 0;
            ctx.fillStyle = col;
            ctx.font = 'bold 12px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.rotate(-p.pulse * .3);
            ctx.fillText(p.kind === 'shield' ? 'Ø' : p.kind[0].toUpperCase(), 0, 1);
            ctx.restore();
        }

        // bullets
        glow(COLORS.bullet, 10);
        ctx.fillStyle = COLORS.bullet;
        for (const b of bullets) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, TAU);
            ctx.fill()
        }
        glow(COLORS.ebullet, 10);
        ctx.fillStyle = COLORS.ebullet;
        for (const b of ebullets) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, TAU);
            ctx.fill()
        }
        ctx.shadowBlur = 0;

        // particles
        for (const p of parts) {
            ctx.globalAlpha = p.l / p.ml;
            ctx.fillStyle = p.col;
            ctx.fillRect(p.x - 1.2, p.y - 1.2, 2.4, 2.4);
        }
        ctx.globalAlpha = 1;

        // ship
        if (ship && !ship.dead && (ship.inv <= 0 || Math.floor(t / 80) % 2 === 0)) {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.a);
            if (ship.thrust) {
                const fl = rnd(8, 16);
                glow('#ffb02e', 12);
                ctx.strokeStyle = '#ffb02e';
                ctx.lineWidth = 1.6;
                ctx.beginPath();
                ctx.moveTo(-10, -4);
                ctx.lineTo(-10 - fl, 0);
                ctx.lineTo(-10, 4);
                ctx.stroke();
            }
            glow('#22e6ff');
            ctx.strokeStyle = '#e8fbff';
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            ctx.moveTo(16, 0);
            ctx.lineTo(-11, -9);
            ctx.lineTo(-6, 0);
            ctx.lineTo(-11, 9);
            ctx.closePath();
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(34,230,255,.12)';
            ctx.fill();
            if (ship.shield) {
                glow('#ffb02e');
                ctx.strokeStyle = `rgba(255,176,46,${.5 + .3 * Math.sin(t * .008)})`;
                ctx.beginPath();
                ctx.arc(0, 0, 22, 0, TAU);
                ctx.stroke();
            }
            ctx.restore();
        }

        // popups
        ctx.font = 'bold 15px Courier New';
        ctx.textAlign = 'center';
        for (const p of pops) {
            ctx.globalAlpha = Math.min(1, p.l / 30);
            glow(p.col, 8);
            ctx.fillStyle = p.col;
            ctx.fillText(p.txt, p.x, p.y);
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;

        // HUD
        if (state === 'play') {
            ctx.textAlign = 'left';
            ctx.font = '16px Courier New';
            glow('#22e6ff', 6);
            ctx.fillStyle = '#bff4ff';
            ctx.fillText('SCORE ' + score, 18, 30);
            ctx.fillText('BEST  ' + Math.max(best, score), 18, 52);
            ctx.textAlign = 'right';
            ctx.fillText('WAVE ' + wave, W - 18, 30);
            // lives as mini ships
            for (let i = 0; i < lives; i++) {
                ctx.save();
                ctx.translate(W - 30 - i * 24, 48);
                ctx.rotate(-Math.PI / 2);
                ctx.scale(.55, .55);
                ctx.strokeStyle = '#bff4ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(16, 0);
                ctx.lineTo(-11, -9);
                ctx.lineTo(-6, 0);
                ctx.lineTo(-11, 9);
                ctx.closePath();
                ctx.stroke();
                ctx.restore();
            }
            // combo meter
            if (combo > 1) {
                ctx.textAlign = 'center';
                const hue = combo > 4 ? '#ff3ec8' : '#b6ff2e';
                glow(hue, 10);
                ctx.fillStyle = hue;
                ctx.font = 'bold 22px Courier New';
                ctx.fillText('COMBO ×' + combo, W / 2, 36);
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,.15)';
                ctx.fillRect(W / 2 - 70, 44, 140, 3);
                ctx.fillStyle = hue;
                ctx.fillRect(W / 2 - 70, 44, 140 * (comboT / 140), 3);
            }
            // weapon timer
            if (ship.weapon !== 'single') {
                ctx.textAlign = 'left';
                ctx.font = '13px Courier New';
                const col = ship.weapon === 'spread' ? '#22e6ff' : '#ff3ec8';
                glow(col, 6);
                ctx.fillStyle = col;
                ctx.fillText(ship.weapon.toUpperCase() + ' ' + Math.ceil(ship.weaponT / 60) + 's', 18, H - 20);
            }
            ctx.shadowBlur = 0;
            if (paused) {
                ctx.fillStyle = 'rgba(6,6,15,.6)';
                ctx.fillRect(0, 0, W, H);
                ctx.textAlign = 'center';
                glow('#22e6ff');
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px Courier New';
                ctx.fillText('PAUSED', W / 2, H / 2);
                ctx.font = '14px Courier New';
                ctx.fillText('press P to resume', W / 2, H / 2 + 30);
                ctx.shadowBlur = 0;
            }
        }

        if (flash > 0) {
            ctx.fillStyle = `rgba(255,255,255,${flash})`;
            ctx.fillRect(-30, -30, W + 60, H + 60)
        }
    }

    /* ---------- main loop (fixed timestep) ---------- */
    let last = 0, acc = 0;
    const STEP = 1000 / 60;

    function loop(t) {
        requestAnimationFrame(loop);
        if (!last) last = t;
        acc += Math.min(t - last, 100);
        last = t;
        while (acc >= STEP) {
            if (state === 'play' && !paused) update();
            acc -= STEP;
        }
        draw(t);
    }

    requestAnimationFrame(loop);

    // demo drift on the menu: a few asteroids float behind the title
    for (let i = 0; i < 6; i++) asteroids.push(makeAsteroid(rnd(W), rnd(H), (Math.random() * 3) | 0));
    setInterval(() => {
        if (state !== 'play') for (const a of asteroids) {
            a.x += a.vx;
            a.y += a.vy;
            a.rot += a.spin;
            wrap(a)
        }
    }, 16);
</script>
<script src="../logo.js"></script>
</body>
</html>
