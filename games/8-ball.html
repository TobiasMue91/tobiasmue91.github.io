    function resetSpin() {
        spinX = 0;
        spinY = 0;
        drawSpin();
    }

    function setSpinFromEvent(e) {
        const r = EL.spin.getBoundingClientRect();
        let x = ((e.clientX - r.left) / r.width) * 2 - 1;
        let y = -(((e.clientY - r.top) / r.height) * 2 - 1);
        const m = Math.hypot(x, y);
        if (m > 0.82) {
            x = x / m * 0.82;
            y = y / m * 0.82;
        }
        spinX = x / 0.82;
        spinY = y / 0.82;
        drawSpin();
    }

    /* ---------------- particles & confetti ---------------- */
    function spark(x, y, n, col, spd, grav) {
        for (let i = 0; i < n; i++) {
            const a = Math.random() * TAU, s = spd * (0.4 + Math.random() * 0.8);
            particles.push({
                x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - (grav ? 60 : 0),
                life: 0.5 + Math.random() * 0.5, max: 1, col, sz: 1.4 + Math.random() * 1.8, g: grav ? 420 : 60
            });
        }
    }

    function confettiBurst() {
        const cols = ['#c9a24b', '#e6c87e', '#ece2cd', '#d9584a', '#2c5d86'];
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: MIDX + (Math.random() - 0.5) * 500, y: PY0 - 40 - Math.random() * 60,
                vx: (Math.random() - 0.5) * 160, vy: 40 + Math.random() * 120,
                life: 1.8 + Math.random() * 1.2, max: 3, col: cols[(Math.random() * cols.length) | 0],
                sz: 2 + Math.random() * 2.5, g: 260
            });
        }
    }

    function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.life -= dt;
            if (p.life <= 0) {
                particles.splice(i, 1);
                continue;
            }
            p.vy += p.g * dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
        }
    }

    /* ---------------- consume physics events ---------------- */
    function consumeEvents() {
        for (const e of events) {
            if (e.k === 'bb') {
                sfx('clack', e.v);
                if (e.v > 1250) shake(Math.min(5, e.v / 420));
            } else if (e.k === 'rail') {
                sfx('rail', e.v);
                if (e.v > 720) spark(e.x, e.y, 2, 'rgba(230,220,190,0.5)', 40, false);
            } else if (e.k === 'pocket') {
                sfx('pocket');
                spark(e.x, e.y, 9, '#c9a24b', 130, false);
            }
        }
        events.length = 0;
    }

    /* ---------------- drawing helpers ---------------- */
    function drawArrow(x, y, dx, dy, len, style, w) {
        ctx.strokeStyle = style;
        ctx.lineWidth = w;
        ctx.lineCap = 'round';
        const ex = x + dx * len, ey = y + dy * len;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(ex, ey);
        ctx.stroke();
        const ha = Math.atan2(dy, dx);
        ctx.beginPath();
        ctx.moveTo(ex, ey);
        ctx.lineTo(ex - Math.cos(ha - 0.5) * 7, ey - Math.sin(ha - 0.5) * 7);
        ctx.moveTo(ex, ey);
        ctx.lineTo(ex - Math.cos(ha + 0.5) * 7, ey - Math.sin(ha + 0.5) * 7);
        ctx.stroke();
    }

    function drawGuide(angle) {
        if (cue.held || !balls.includes(cue)) return;
        const dx = Math.cos(angle), dy = Math.sin(angle);
        const hit = castAll(cue.p.x, cue.p.y, dx, dy, cue, 1400);
        const hx = cue.p.x + dx * hit.t, hy = cue.p.y + dy * hit.t;
        ctx.save();
        ctx.setLineDash([7, 7]);
        ctx.lineDashOffset = RM ? 0 : -dashOff;
        ctx.strokeStyle = 'rgba(240,232,210,0.55)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(cue.p.x, cue.p.y);
        ctx.lineTo(hx, hy);
        ctx.stroke();
        ctx.setLineDash([]);
        if (hit.kind === 'ball') {
            ctx.beginPath();
            ctx.arc(hx, hy, R, 0, TAU);
            ctx.strokeStyle = 'rgba(240,232,210,0.5)';
            ctx.lineWidth = 1.3;
            ctx.stroke();
            const b = hit.b;
            let ox2 = (b.p.x - hx) / (2 * R), oy2 = (b.p.y - hy) / (2 * R);
            const ol = Math.hypot(ox2, oy2) || 1;
            ox2 /= ol;
            oy2 /= ol;
            const cut = Math.max(0, dx * ox2 + dy * oy2);
            drawArrow(b.p.x, b.p.y, ox2, oy2, 24 + cut * 62, 'rgba(240,232,210,0.85)', 2);
            let tx2 = dx - (dx * ox2 + dy * oy2) * ox2, ty2 = dy - (dx * ox2 + dy * oy2) * oy2;
            const tl = Math.hypot(tx2, ty2);
            if (tl > 0.06) drawArrow(hx, hy, tx2 / tl, ty2 / tl, 8 + (1 - cut) * 50, 'rgba(240,232,210,0.4)', 1.4);
        } else if (hit.kind === 'rail' && hit.n) {
            const d2n = dx * hit.n.x + dy * hit.n.y;
            const rx = dx - 2 * d2n * hit.n.x, ry = dy - 2 * d2n * hit.n.y;
            ctx.setLineDash([4, 6]);
            ctx.strokeStyle = 'rgba(240,232,210,0.3)';
            ctx.beginPath();
            ctx.moveTo(hx, hy);
            ctx.lineTo(hx + rx * 70, hy + ry * 70);
            ctx.stroke();
            ctx.setLineDash([]);
        } else if (hit.kind === 'pocket') {
            ctx.beginPath();
            ctx.arc(hit.pk.x, hit.pk.y, 9 + Math.sin(tNow * 6) * 1.6, 0, TAU);
            ctx.strokeStyle = 'rgba(230,200,126,0.85)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(hx, hy, 1.8, 0, TAU);
        ctx.fillStyle = 'rgba(240,232,210,0.8)';
        ctx.fill();
        ctx.restore();
    }

    function drawCueStick(angle, pull, alpha) {
        if (cue.held) return;
        const dx = Math.cos(angle), dy = Math.sin(angle);
        const tipD = R + 6 + Math.max(pull, -5);
        const tx = cue.p.x - dx * tipD, ty = cue.p.y - dy * tipD;
        const bx = tx - dx * 252, by = ty - dy * 252;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.lineCap = 'round';
        const mx = lerp(tx, bx, 0.55), my = lerp(ty, by, 0.55);
        ctx.strokeStyle = '#2b1809';
        ctx.lineWidth = 7.5;
        ctx.beginPath();
        ctx.moveTo(bx, by);
        ctx.lineTo(mx, my);
        ctx.stroke();
        const sg = ctx.createLinearGradient(mx, my, tx, ty);
        sg.addColorStop(0, '#8a5a2c');
        sg.addColorStop(1, '#d8b382');
        ctx.strokeStyle = sg;
        ctx.lineWidth = 5.5;
        ctx.beginPath();
        ctx.moveTo(mx, my);
        ctx.lineTo(tx, ty);
        ctx.stroke();
        for (const f of [0.62, 0.7]) {
            ctx.strokeStyle = 'rgba(201,162,75,0.9)';
            ctx.lineWidth = 6.4;
            const gx = lerp(tx, bx, f), gy = lerp(ty, by, f);
            ctx.beginPath();
            ctx.moveTo(gx, gy);
            ctx.lineTo(gx - dx * 2.5, gy - dy * 2.5);
            ctx.stroke();
        }
        ctx.strokeStyle = '#efe6d2';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(tx - dx * 6, ty - dy * 6);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(tx + dx * 1.2, ty + dy * 1.2, 2.6, 0, TAU);
        ctx.fillStyle = '#3d6ea5';
        ctx.fill();
        ctx.restore();
    }

    function drawBallSprite(b, x, y, scale, alpha) {
        if (b.dirty) renderSprite(b);
        if (alpha !== 1) ctx.globalAlpha = alpha;
        const s = SPRL * scale;
        ctx.drawImage(b.cv, x - s / 2, y - s / 2, s, s);
        if (alpha !== 1) ctx.globalAlpha = 1;
    }

    /* ---------------- master render ---------------- */
    function render() {
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        ctx.clearRect(0, 0, W, H);
        ctx.save();
        if (shakeT > 0 && !RM) {
            const k = shakeAmp * (shakeT / 0.25);
            ctx.translate((Math.random() * 2 - 1) * k, (Math.random() * 2 - 1) * k);
        }
        ctx.drawImage(tcv, 0, 0, W, H);
        const human = !isAiTurn();
        if (state.phase === 'placing' && state.bih && state.bih.zone === 'kitchen') {
            ctx.fillStyle = 'rgba(236,226,205,0.055)';
            ctx.fillRect(PX0, PY0, HEADX - PX0, PY1 - PY0);
            ctx.strokeStyle = 'rgba(236,226,205,0.35)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(HEADX, PY0);
            ctx.lineTo(HEADX, PY1);
            ctx.stroke();
        }
        for (const s of sinks) {
            const t = Math.min(1, s.t / 0.28);
            const x = lerp(s.x0, s.px, smoothstep(t)), y = lerp(s.y0, s.py, smoothstep(t));
            drawBallSprite(s.b, x, y, 1 - 0.62 * t, 1 - t * 0.9);
        }
        for (const b of balls) {
            const sg = ctx.createRadialGradient(b.p.x + 3, b.p.y + 4, 1, b.p.x + 3, b.p.y + 4, R * 1.35);
            sg.addColorStop(0, 'rgba(0,0,0,0.38)');
            sg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = sg;
            ctx.beginPath();
            ctx.arc(b.p.x + 3, b.p.y + 4, R * 1.35, 0, TAU);
            ctx.fill();
        }
        for (const b of balls) drawBallSprite(b, b.p.x, b.p.y, 1, 1);
        if (state.phase === 'aim' && human) {
            const shownAngle = drag.on ? drag.lockAngle : aimAngle;
            drawGuide(shownAngle);
            drawCueStick(shownAngle, drag.on ? 12 + drag.power * 74 : 10, 1);
            // A small power pip travelling up the cue butt gives clear feedback that
            // the (direction-independent) drag is charging the shot.
            if (drag.on && drag.power > 0.02) {
                const dcos = Math.cos(shownAngle), dsin = Math.sin(shownAngle);
                const bx = cue.p.x - dcos * (R + 6 + 12 + drag.power * 74) - dcos * 40;
                const by = cue.p.y - dsin * (R + 6 + 12 + drag.power * 74) - dsin * 40;
                ctx.beginPath();
                ctx.arc(bx, by, 3.4, 0, TAU);
                ctx.fillStyle = 'rgba(230,200,126,' + (0.5 + drag.power * 0.5) + ')';
                ctx.fill();
            }
        } else if (state.phase === 'ai_aim' || state.phase === 'ai_strike') {
            drawGuide(aimAngle);
            drawCueStick(aimAngle, aiPull, 1);
        } else if (state.phase === 'strike' && pendingShot) {
            drawCueStick(pendingShot.angle, lerp(strikeFrom, -5, clamp(strikeT / 0.075, 0, 1)), 1);
        }
        if (state.phase === 'placing' && human) {
            const ok = validPlace(pointer.x, pointer.y);
            drawBallSprite(cue, pointer.x, pointer.y, 1, 0.55);
            ctx.beginPath();
            ctx.arc(pointer.x, pointer.y, R + 4, 0, TAU);
            ctx.strokeStyle = (ok && placeBadT <= 0) ? 'rgba(230,200,126,0.8)' : 'rgba(217,88,74,0.9)';
            ctx.lineWidth = 1.6;
            ctx.stroke();
        }
        for (const p of particles) {
            ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
            ctx.fillStyle = p.col;
            ctx.fillRect(p.x - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz);
        }
        ctx.globalAlpha = 1;
        ctx.restore();
    }

    /* ---------------- main update ---------------- */
    function update(dt) {
        dt = Math.min(dt || 0, 0.05);
        tNow += dt;
        dashOff = (dashOff + dt * 22) % 14;
        if (shakeT > 0) shakeT -= dt;
        if (placeBadT > 0) placeBadT -= dt;
        if (flashT > 0) {
            flashT -= dt;
            if (flashT <= 0) {
                EL.sub.textContent = baseSub;
                EL.sub.className = 'sub';
            }
        }
        for (let i = sinks.length - 1; i >= 0; i--) {
            sinks[i].t += dt;
            if (sinks[i].t >= 0.32) sinks.splice(i, 1);
        }
        updateParticles(dt);
        if (pendingEnd) {
            endTimer -= dt;
            if (endTimer <= 0) {
                EL.endTitle.textContent = pendingEnd.title;
                EL.endSub.textContent = pendingEnd.sub;
                EL.ovEnd.classList.remove('hidden');
                pendingEnd = null;
            }
        }
        switch (state.phase) {
            case 'rolling': {
                acc += dt;
                let guard = 0;
                while (acc >= PSTEP && guard++ < 40) {
                    stepPhysics(PSTEP);
                    acc -= PSTEP;
                    if (!anyMoving()) {
                        acc = 0;
                        consumeEvents();
                        onBallsStopped();
                        break;
                    }
                }
                consumeEvents();
                break;
            }
            case 'strike': {
                strikeT += dt;
                if (strikeT >= 0.085 && pendingShot) {
                    const p = pendingShot;
                    pendingShot = null;
                    fireShot(p);
                }
                break;
            }
            case 'ai_think': {
                aiT -= dt;
                if (aiT <= 0) {
                    if (state.bih) {
                        const p = aiChooseBIH(2, state.bih.zone);
                        placeCue(p.x, p.y);
                        turnMsg();
                    }
                    aiPlan = state.breakDone ? aiChooseShot(2, cue.p) : aiBreakPlan();
                    aiFrom = aimAngle;
                    aiT = 0;
                    aiPull = 10;
                    state.phase = 'ai_aim';
                }
                break;
            }
            case 'ai_aim': {
                aiT += dt;
                aimAngle = angLerp(aiFrom, aiPlan.angle, smoothstep(Math.min(1, aiT / 0.8)));
                if (aiT >= 0.95) {
                    state.phase = 'ai_strike';
                    aiT = 0;
                }
                break;
            }
            case 'ai_strike': {
                aiT += dt;
                aiPull = 10 + aiPlan.power * 70 * smoothstep(Math.min(1, aiT / 0.45));
                if (aiT >= 0.6) {
                    strikeFrom = aiPull;
                    pendingShot = {angle: aiPlan.angle, power: aiPlan.power, sx: aiPlan.sx, sy: aiPlan.sy};
                    strikeT = 0;
                    state.phase = 'strike';
                }
                break;
            }
        }
    }

    /* ---------------- input ----------------
       Modelled on the standard 8-ball control (Miniclip / Coolmath):
       AIM and POWER are separate. You aim first, then a press LOCKS that aim, and a
       drag — in any direction, from anywhere — sets the power. Release to shoot.

       • Desktop: move the mouse to aim the cue (no button). Press to lock the aim.
         Then drag any direction to build power (distance only — where the cursor is
         doesn't matter), and release to shoot. A tap with no drag cancels. ← / →
         nudge the aim; you can also nudge it while holding, before you release.
       • Touch (no hover): the first drag aims — sweep your finger and the cue tracks
         the direction from the cue ball to your finger. Lift, and the aim stays put.
         Then press again and drag any direction to set power and release to shoot.
         (The very first touch after it becomes your turn just aims; it never fires by
         accident.) This mirrors "drag to aim, then drag for power" from the standard
         mobile game, without needing a separate power slider.

       In both cases the rule you care about holds: the aim is fixed the moment you
       commit to the power drag, and the power drag works from anywhere on the table. */
    function evtPos(e) {
        const r = EL.table.getBoundingClientRect();
        return {x: (e.clientX - r.left) * W / (r.width || W), y: (e.clientY - r.top) * H / (r.height || H)};
    }

    const PULL_MAX = 220;   // px of drag for full power
    const PULL_DEAD = 9;    // px before power registers (also the tap-to-cancel threshold)

    function bindInput() {
        EL.table.addEventListener('pointerdown', e => {
            audio();
            const p = evtPos(e);
            pointer = p;
            if (state.phase === 'placing' && !isAiTurn()) {
                if (placeCue(p.x, p.y)) {
                    state.phase = 'aim';
                    turnMsg();
                } else {
                    placeBadT = 0.35;
                    sfx('bad');
                }
                return;
            }
            if (state.phase !== 'aim' || isAiTurn()) return;

            if (e.pointerType === 'touch' && !aimReady) {
                // First touch of the turn on a touch device: this gesture AIMS only.
                // No hover exists, so we can't have pre-aimed; sweep to set the line,
                // lift to commit it. Never fires on this gesture.
                aiming = true;
                aimAngle = Math.atan2(p.y - cue.p.y, p.x - cue.p.x);
                EL.hint.textContent = 'drag to aim \u00b7 lift when the line is right';
                if (EL.table.setPointerCapture) try {
                    EL.table.setPointerCapture(e.pointerId);
                } catch (err) {
                }
                return;
            }

            // Power phase. The press LOCKS the current aim; from here only drag
            // DISTANCE matters (any direction, anywhere on the table).
            drag.on = true;
            drag.startX = p.x;
            drag.startY = p.y;
            drag.power = 0;
            drag.lockAngle = aimAngle;
            if (EL.table.setPointerCapture) try {
                EL.table.setPointerCapture(e.pointerId);
            } catch (err) {
            }
            EL.hint.textContent = 'drag any direction to set power \u00b7 release to shoot \u00b7 tap to cancel';
        });
        EL.table.addEventListener('pointermove', e => {
            const p = evtPos(e);
            pointer = p;
            if (state.phase !== 'aim' || isAiTurn()) return;
            if (drag.on) {
                // Power = distance dragged from the press point, DIRECTION-INDEPENDENT.
                // Aim is frozen at drag.lockAngle; the cursor's position is irrelevant.
                const dist = hyp(p.x - drag.startX, p.y - drag.startY);
                drag.power = clamp((dist - PULL_DEAD) / PULL_MAX, 0, 1);
                EL.powerFill.style.width = (drag.power * 100) + '%';
            } else if (aiming) {
                // touch aim sweep: cue points from the ball toward the finger
                aimAngle = Math.atan2(p.y - cue.p.y, p.x - cue.p.x);
            } else if (e.pointerType !== 'touch') {
                // desktop: hovering (no button) aims toward the cursor
                if (keyAimT <= 0) aimAngle = Math.atan2(p.y - cue.p.y, p.x - cue.p.x);
                if (keyAimT > 0 && hyp(e.movementX || 0, e.movementY || 0) > 5) keyAimT = 0;
            }
        });
        const release = () => {
            if (aiming) {
                // finished aiming on touch — lock it in, next press will be the power drag
                aiming = false;
                aimReady = true;
                restoreHint();
                return;
            }
            if (drag.on) {
                if (drag.power > 0.04 && state.phase === 'aim' && !isAiTurn()) {
                    aimAngle = drag.lockAngle;
                    strikeFrom = 12 + drag.power * 74;
                    pendingShot = {angle: drag.lockAngle, power: drag.power, sx: spinX, sy: spinY};
                    strikeT = 0;
                    state.phase = 'strike';
                    aimReady = false;                  // next turn re-aims from scratch on touch
                }
                drag.on = false;
                drag.power = 0;
                EL.powerFill.style.width = '0%';
                restoreHint();
            }
        };
        EL.table.addEventListener('pointerup', release);
        EL.table.addEventListener('pointercancel', release);
        window.addEventListener('keydown', e => {
            if (state.phase !== 'aim' || isAiTurn()) return;
            const step = e.shiftKey ? 0.012 : 0.0028;
            let dir = 0;
            if (e.key === 'ArrowLeft') dir = -1;
            else if (e.key === 'ArrowRight') dir = 1;
            else return;
            e.preventDefault();
            keyAimT = 1;
            aimReady = true;                           // keyboard counts as having aimed
            if (drag.on) drag.lockAngle += dir * step; // fine-tune even while holding
            else aimAngle += dir * step;
        });
        // spin widget
        let spinDrag = false;
        EL.spin.addEventListener('pointerdown', e => {
            audio();
            spinDrag = true;
            setSpinFromEvent(e);
        });
        EL.spin.addEventListener('pointermove', e => {
            if (spinDrag) setSpinFromEvent(e);
        });
        window.addEventListener('pointerup', () => {
            spinDrag = false;
        });
        EL.spinReset.addEventListener('click', resetSpin);
        // dock buttons
        EL.btnSound.addEventListener('click', () => {
            muted = !muted;
            EL.btnSound.textContent = muted ? 'Sound off' : 'Sound on';
            EL.btnSound.setAttribute('aria-pressed', String(!muted));
            if (!muted) audio();
        });
        EL.btnMenu.addEventListener('click', () => {
            EL.ovEnd.classList.add('hidden');
            EL.ovMenu.classList.remove('hidden');
        });
        document.querySelectorAll('.sw').forEach(b => {
            b.addEventListener('click', () => {
                feltTheme = b.dataset.felt;
                document.querySelectorAll('.sw').forEach(x => x.classList.toggle('on', x === b));
                renderTable();
            });
        });
        document.querySelectorAll('[data-diff]').forEach(b => {
            b.addEventListener('click', () => {
                audio();
                EL.ovMenu.classList.add('hidden');
                newGame('ai', b.dataset.diff);
            });
        });
        EL.btnTwo.addEventListener('click', () => {
            audio();
            EL.ovMenu.classList.add('hidden');
            newGame('2p');
        });
        EL.btnRematch.addEventListener('click', () => {
            EL.ovEnd.classList.add('hidden');
            newRack();
        });
        EL.btnEndMenu.addEventListener('click', () => {
            EL.ovEnd.classList.add('hidden');
            EL.ovMenu.classList.remove('hidden');
        });
    }

    /* ---------------- boot ---------------- */
    function boot() {
        buildNumberBitmaps();
        renderTable();
        buildRack();
        drawSpin();
        updateHud();
        setMsg('Eight Ball', 'Pick a game to begin.');
        restoreHint();
        bindInput();
        let last = 0;
        const loop = ts => {
            const dt = last ? (ts - last) / 1000 : 0;
            last = ts;
            update(dt);
            render();
            requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
    }

    /* debug / test API (also handy for tinkerers reading the source) */
    window.__pool = {
        state,
        get balls() {
            return balls;
        },
        get allBalls() {
            return allBalls;
        },
        get cue() {
            return cue;
        },
        POCKETS, SEGS,
        srand, newGame, newRack, fireShot, placeCue, remaining,
        aiChooseShot, aiChooseBIH, aiBreakPlan, castAll, pathClear, validPlace,
        get shot() {
            return shot;
        },
        tick(dt) {
            update(dt);
            render();
        },
        auto() {
            if (state.over) return 'over';
            if (state.bih) {
                const p = aiChooseBIH(state.turn, state.bih.zone);
                placeCue(p.x, p.y);
            }
            const plan = state.breakDone ? aiChooseShot(state.turn, cue.p) : aiBreakPlan();
            fireShot(plan);
            return 'fired';
        }
    };

    boot();
</script>
<script src="../logo.js"></script>
</body>
