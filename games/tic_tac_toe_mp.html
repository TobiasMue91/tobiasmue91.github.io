<html lang="en">
<head>

    <!-- Structured data -->
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "VideoGame",
            "name": "Tic Tac Toe",
            "url": "https://www.gptgames.dev/games/tic_tac_toe_mp.html",
            "image": "https://www.gptgames.dev/screenshots/screenshot_32.webp",
            "description": "Play Tic Tac Toe against an AI, in local two-player mode, or online with a friend.",
            "author": { "@type": "Person", "name": "Tobias Müller" },
            "applicationCategory": "Game",
            "operatingSystem": "Web Browser",
            "playMode": ["SinglePlayer", "CoOp", "MultiPlayer"]

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --paper: #fdf6e3;
            --paper-line: #d9cdb0;
            --ink: #3a3226;
            --ink-soft: #6b6151;
            --x-color: #d1495b;
            --o-color: #2a7faf;
            --accent: #e9a23b;
            --win: #6aa84f;
            --shadow: rgba(58, 50, 38, 0.18);
            --radius: 18px;
            --cell-line: #b9ab8a;
        }

        * { box-sizing: border-box; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: 'Fredoka', 'Trebuchet MS', sans-serif;
            color: var(--ink);
            background-color: var(--paper);
            background-image:
                    repeating-linear-gradient(transparent, transparent 31px, var(--paper-line) 31px, var(--paper-line) 32px),
                    radial-gradient(circle at 12% 18%, rgba(233, 162, 59, 0.10), transparent 40%),
                    radial-gradient(circle at 88% 82%, rgba(42, 127, 175, 0.08), transparent 42%);
            background-attachment: fixed;
            padding: clamp(16px, 4vw, 48px) 16px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        h1 {
            font-family: 'Patrick Hand', cursive;
            font-size: clamp(2.6rem, 8vw, 4rem);
            margin: 0 0 4px;
            text-align: center;
            color: var(--ink);
            letter-spacing: 1px;
            transform: rotate(-1.4deg);
            text-shadow: 2px 2px 0 rgba(233, 162, 59, 0.35);
        }
        h1 .x { color: var(--x-color); }
        h1 .o { color: var(--o-color); }

        .tagline {
            font-family: 'Patrick Hand', cursive;
            font-size: 1.2rem;
            color: var(--ink-soft);
            margin: 0 0 22px;
            text-align: center;
        }

        .card {
            background: #fffdf5;
            border: 2.5px solid var(--ink);
            border-radius: var(--radius);
            box-shadow: 6px 6px 0 var(--shadow);
            padding: clamp(20px, 5vw, 34px);
            width: min(560px, 100%);
            position: relative;
        }

        .screen { display: none; }
        .screen.active { display: block; animation: pop 0.35s ease; }

        @keyframes pop {
            from { opacity: 0; transform: translateY(8px) scale(0.99); }
            to   { opacity: 1; transform: none; }
        }

        /* ---------- Mode select ---------- */
        .mode-grid { display: grid; gap: 14px; }

        .mode-btn {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 1.15rem;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            border: 2.5px solid var(--ink);
            border-radius: 14px;
            background: var(--paper);
            color: var(--ink);
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--shadow);
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.15s;
        }
        .mode-btn:hover, .mode-btn:focus-visible {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--shadow);
            background: #fff8e6;
            outline: none;
        }
        .mode-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--shadow); }
        .mode-btn .emoji { font-size: 1.9rem; line-height: 1; }
        .mode-btn .label { display: block; }
        .mode-btn .sub { display: block; font-weight: 500; font-size: 0.9rem; color: var(--ink-soft); }

        .difficulty {
            margin-top: 18px;
            display: none;
        }
        .difficulty.show { display: block; animation: pop 0.3s ease; }
        .difficulty p { margin: 0 0 8px; font-weight: 600; }
        .seg {
            display: flex;
            gap: 8px;
        }
        .seg button {
            flex: 1;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            padding: 12px;
            border: 2.5px solid var(--ink);
            border-radius: 12px;
            background: var(--paper);
            color: var(--ink);
            cursor: pointer;
            box-shadow: 3px 3px 0 var(--shadow);
            transition: transform 0.1s, background 0.15s;
        }
        .seg button[aria-pressed="true"] { background: var(--accent); }
        .seg button:hover { transform: translateY(-2px); }
        .seg button:active { transform: translateY(1px); }

        /* ---------- Game screen ---------- */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 10px;
            margin-bottom: 18px;
        }
        .score-pill {
            flex: 1;
            text-align: center;
            border: 2.5px solid var(--ink);
            border-radius: 14px;
            padding: 10px 6px;
            background: var(--paper);
            box-shadow: 3px 3px 0 var(--shadow);
            transition: transform 0.18s ease, background 0.18s ease;
        }
        .score-pill.turn { background: #fff3d6; transform: translateY(-4px) rotate(-1deg); }
        .score-pill .who { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .score-pill .mark { font-family: 'Patrick Hand', cursive; font-size: 1.5rem; }
        .score-pill.p1 .mark { color: var(--x-color); }
        .score-pill.p2 .mark { color: var(--o-color); }
        .score-pill .num { font-size: 1.6rem; font-weight: 700; line-height: 1; }
        .score-divider { display: flex; align-items: center; font-weight: 700; color: var(--ink-soft); }

        .status {
            text-align: center;
            font-family: 'Patrick Hand', cursive;
            font-size: 1.5rem;
            min-height: 1.5em;
            margin: 4px 0 16px;
            color: var(--ink);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 0;
            width: min(360px, 80vw);
            aspect-ratio: 1;
            margin: 0 auto;
            position: relative;
        }
        .cell {
            border: none;
            background: transparent;
            font-family: 'Patrick Hand', cursive;
            font-size: clamp(3rem, 16vw, 5rem);
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--ink);
            position: relative;
            padding: 0;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            transition: background 0.15s;
            border-radius: 8px;
        }
        .cell:hover:not(:disabled) { background: rgba(233, 162, 59, 0.14); }
        .cell:focus-visible { outline: 3px dashed var(--accent); outline-offset: -6px; }
        .cell:disabled { cursor: default; }
        /* hand-drawn grid lines */
        .cell:nth-child(3n+1), .cell:nth-child(3n+2) { border-right: 4px solid var(--cell-line); }
        .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3),
        .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-bottom: 4px solid var(--cell-line); }
        .cell .mark { display: inline-block; animation: ink 0.25s ease; }
        @keyframes ink {
            from { transform: scale(0.3) rotate(-12deg); opacity: 0; }
            to   { transform: scale(1) rotate(0); opacity: 1; }
        }
        .cell.x .mark { color: var(--x-color); }
        .cell.o .mark { color: var(--o-color); }
        .cell.win { background: rgba(106, 168, 79, 0.22); animation: winpulse 0.9s ease infinite alternate; }
        @keyframes winpulse { to { background: rgba(106, 168, 79, 0.4); } }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 22px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            padding: 12px 22px;
            border: 2.5px solid var(--ink);
            border-radius: 12px;
            background: var(--accent);
            color: var(--ink);
            cursor: pointer;
            box-shadow: 3px 3px 0 var(--shadow);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn.ghost { background: var(--paper); }
        .btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--shadow); }
        .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--shadow); }

        .icon-btn {
            position: absolute;
            top: 14px;
            z-index: 5;
            border: 2.5px solid var(--ink);
            background: var(--paper);
            border-radius: 10px;
            width: 42px; height: 42px;
            font-family: 'Patrick Hand', cursive;
            font-size: 1.6rem;
            line-height: 1;
            cursor: pointer;
            color: var(--ink);
            box-shadow: 2px 2px 0 var(--shadow);
            display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--shadow); }
        #back-btn { left: 14px; }
        #sound-btn { right: 14px; }
        .ico-arrow {
            display: block;
            font-size: 1.9rem;
            line-height: 1;
            transform: translateY(-2px);
        }

        /* ---------- Online sub-panel ---------- */
        .online-panel { margin-top: 4px; }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-weight: 600; margin-bottom: 6px; }
        .field input {
            width: 100%;
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            padding: 12px 14px;
            border: 2.5px solid var(--ink);
            border-radius: 12px;
            background: var(--paper);
            color: var(--ink);
        }
        .field input:focus-visible { outline: 3px dashed var(--accent); outline-offset: 2px; }
        .share {
            display: flex; gap: 8px; margin-top: 8px;
        }
        .share input { flex: 1; cursor: pointer; }
        .notice {
            font-size: 0.9rem;
            color: var(--ink-soft);
            margin-top: 10px;
            text-align: center;
        }
        .error-note {
            background: #fce8e8;
            border: 2px solid var(--x-color);
            border-radius: 12px;
            padding: 12px;
            color: #8c2f3b;
            margin-top: 12px;
            font-size: 0.95rem;
        }
        .hidden { display: none !important; }

        .visually-hidden {
            position: absolute; width: 1px; height: 1px;
            padding: 0; margin: -1px; overflow: hidden;
            clip: rect(0,0,0,0); white-space: nowrap; border: 0;
        }

        /* confetti */
        .confetti {
            position: fixed; top: -10px; width: 10px; height: 14px;
            pointer-events: none; z-index: 999; opacity: 0.9;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(540deg); opacity: 0.9; }
        }

        footer {
            margin-top: 28px;
            font-family: 'Patrick Hand', cursive;
            color: var(--ink-soft);
            font-size: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
<h1><span class="x">✕</span> Tic Tac Toe <span class="o">◯</span></h1>
<p class="tagline">scribble three in a row to win</p>

<main class="card">
    <!-- screen: mode select -->
    <section id="screen-menu" class="screen active" aria-label="Choose game mode">
        <div class="mode-grid">
            <button class="mode-btn" data-mode="ai">
                <span class="emoji" aria-hidden="true">🤖</span>
                <span><span class="label">Play vs Computer</span><span class="sub">One player against the AI</span></span>
            </button>
            <button class="mode-btn" data-mode="local">
                <span class="emoji" aria-hidden="true">🧑‍🤝‍🧑</span>
                <span><span class="label">Local Two-Player</span><span class="sub">Pass-and-play on this device</span></span>
            </button>
            <button class="mode-btn" data-mode="online">
                <span class="emoji" aria-hidden="true">🌐</span>
                <span><span class="label">Online Multiplayer</span><span class="sub">Invite a friend with a link</span></span>
            </button>
        </div>

        <div id="difficulty" class="difficulty" aria-label="AI difficulty">
            <p>How tough should the computer be?</p>
            <div class="seg" role="group" aria-label="Difficulty">
                <button data-diff="easy" aria-pressed="false">Easy</button>
                <button data-diff="medium" aria-pressed="false">Medium</button>
                <button data-diff="hard" aria-pressed="true">Hard</button>
            </div>
            <div class="controls" style="margin-top:16px;">
                <button class="btn" id="start-ai">Start Game</button>
            </div>
        </div>
    </section>

    <!-- screen: online setup -->
    <section id="screen-online" class="screen" aria-label="Online multiplayer setup">
        <button class="icon-btn" id="online-back-btn" aria-label="Back to menu" style="position:static; margin-bottom:14px;"><span class="ico-arrow" aria-hidden="true">←</span></button>
        <div class="online-panel">
            <div class="field">
                <label for="player-name">Your name</label>
                <input type="text" id="player-name" maxlength="20" placeholder="e.g. Tobias" autocomplete="off">
            </div>
            <div class="controls" style="justify-content:flex-start; margin-top:0;">
                <button class="btn" id="online-create">Create game</button>
            </div>
            <div id="share-wrap" class="hidden">
                <p class="notice" style="text-align:left;margin-top:18px;">Send this link to a friend — the match starts when they join:</p>
                <div class="share">
                    <input type="text" id="share-url" readonly aria-label="Game invite link">
                    <button class="btn" id="copy-btn" type="button">Copy</button>
                </div>
            </div>
            <div id="online-error" class="error-note hidden"></div>
        </div>
    </section>

    <!-- screen: game -->
    <section id="screen-game" class="screen" aria-label="Game board">
        <button class="icon-btn" id="back-btn" aria-label="Back to menu" title="Back to menu"><span class="ico-arrow" aria-hidden="true">←</span></button>
        <button class="icon-btn" id="sound-btn" aria-label="Toggle sound" aria-pressed="true" title="Toggle sound">🔊</button>

        <div class="scoreboard" aria-hidden="false">
            <div class="score-pill p1" id="pill-1">
                <div class="who" id="name-1">You</div>
                <div class="mark">✕</div>
                <div class="num" id="score-1">0</div>
            </div>
            <div class="score-divider">vs</div>
            <div class="score-pill p2" id="pill-2">
                <div class="who" id="name-2">Computer</div>
                <div class="mark">◯</div>
                <div class="num" id="score-2">0</div>
            </div>
        </div>

        <p class="status" id="status" role="status" aria-live="polite">Your move.</p>

        <div class="board" id="board" role="grid" aria-label="Tic Tac Toe board">
            <!-- cells injected -->
        </div>

        <div class="controls">
            <button class="btn" id="next-round" hidden>Next round</button>
            <button class="btn ghost" id="reset-scores">Reset scores</button>
        </div>
    </section>
</main>

<footer>Built by Claude Opus 4.8 · prompted by Tobias Müller</footer>

<!-- live region for screen readers -->
<div id="sr-announce" class="visually-hidden" aria-live="assertive"></div>

<script type="module">
    /* ============================================================
       Tic Tac Toe — three modes over one shared engine.
       Online uses Firebase if reachable; otherwise it degrades.
       ============================================================ */

    // ---------- DOM helpers ----------
    const $ = sel => document.querySelector(sel);
    const screens = {
        menu: $('#screen-menu'),
        online: $('#screen-online'),
        game: $('#screen-game'),
    };
    function showScreen(name) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[name].classList.add('active');
    }
    function announce(msg) { $('#sr-announce').textContent = msg; }

    // ---------- Shared game engine ----------
    const WINS = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6],
    ];
    function winnerOf(board) {
        for (const [a,b,c] of WINS) {
            if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                return { mark: board[a], line: [a,b,c] };
            }
        }
        if (board.every(c => c)) return { mark: 'tie', line: null };
        return null;
    }

    // ---------- Sound (WebAudio, no assets) ----------
    let soundOn = true;
    let audioCtx;
    function beep(freq, dur = 0.08, type = 'sine', vol = 0.15) {
        if (!soundOn) return;
        try {
            audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type; o.frequency.value = freq;
            g.gain.value = vol;
            o.connect(g); g.connect(audioCtx.destination);
            o.start();
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            o.stop(audioCtx.currentTime + dur);
        } catch (e) { /* ignore */ }
    }
    const sndMove = m => beep(m === 'X' ? 440 : 330, 0.07, 'triangle');
    const sndWin  = () => { beep(523,0.1); setTimeout(()=>beep(659,0.1),90); setTimeout(()=>beep(784,0.18),180); };
    const sndTie  = () => beep(200, 0.18, 'sawtooth', 0.1);

    $('#sound-btn').addEventListener('click', e => {
        soundOn = !soundOn;
        e.currentTarget.textContent = soundOn ? '🔊' : '🔇';
        e.currentTarget.setAttribute('aria-pressed', String(soundOn));
    });

    // ---------- Confetti (respects reduced motion) ----------
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function celebrate() {
        if (reduceMotion) return;
        const colors = ['#d1495b','#2a7faf','#e9a23b','#6aa84f'];
        for (let i = 0; i < 70; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.background = colors[i % colors.length];
            c.style.animationDuration = (2 + Math.random() * 1.5) + 's';
            c.style.animationDelay = (Math.random() * 0.4) + 's';
            c.style.transform = `rotate(${Math.random()*360}deg)`;
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 4000);
        }
    }

    // ---------- Build board cells ----------
    const boardEl = $('#board');
    const cellEls = [];
    for (let i = 0; i < 9; i++) {
        const b = document.createElement('button');
        b.className = 'cell';
        b.dataset.index = i;
        b.setAttribute('role', 'gridcell');
        b.setAttribute('aria-label', `Cell ${i + 1}, empty`);
        b.addEventListener('click', () => onCellClick(i));
        boardEl.appendChild(b);
        cellEls.push(b);
    }

    // Keyboard grid navigation (arrow keys)
    boardEl.addEventListener('keydown', e => {
        const idx = cellEls.indexOf(document.activeElement);
        if (idx === -1) return;
        let next = null;
        if (e.key === 'ArrowRight') next = idx % 3 === 2 ? idx - 2 : idx + 1;
        else if (e.key === 'ArrowLeft') next = idx % 3 === 0 ? idx + 2 : idx - 1;
        else if (e.key === 'ArrowDown') next = (idx + 3) % 9;
        else if (e.key === 'ArrowUp') next = (idx + 6) % 9;
        if (next !== null) { e.preventDefault(); cellEls[next].focus(); }
    });

    // ---------- Game state ----------
    const G = {
        mode: 'ai',          // 'ai' | 'local' | 'online'
        difficulty: 'hard',
        board: Array(9).fill(''),
        turn: 'X',
        over: false,
        myMark: 'X',         // for ai & online: which mark the human controls
        aiMark: 'O',
        names: { X: 'You', O: 'Computer' },
        scores: { X: 0, O: 0, tie: 0 },
        starter: 'X',        // alternates each round
        locked: false,       // prevents input during AI move / opponent turn
    };

    let painted = Array(9).fill(null); // tracks last-rendered mark per cell

    function paint() {
        G.board.forEach((m, i) => {
            const cell = cellEls[i];
            const filled = !!m;
            // Only rebuild the cell's content when its mark actually changed.
            // This keeps existing <span class="mark"> elements alive so the
            // ink-in animation doesn't replay on every move.
            if (painted[i] !== m) {
                cell.innerHTML = m ? `<span class="mark">${m === 'X' ? '✕' : '◯'}</span>` : '';
                cell.classList.toggle('x', m === 'X');
                cell.classList.toggle('o', m === 'O');
                painted[i] = m;
            }
            cell.classList.remove('win');
            cell.setAttribute('aria-label', `Cell ${i + 1}, ${m ? (m === 'X' ? 'X' : 'O') : 'empty'}`);
            const disabled = filled || G.over || G.locked || !isMyTurn();
            cell.disabled = disabled;
        });
        // scoreboard
        $('#name-1').textContent = G.names.X;
        $('#name-2').textContent = G.names.O;
        $('#score-1').textContent = G.scores.X;
        $('#score-2').textContent = G.scores.O;
        $('#pill-1').classList.toggle('turn', !G.over && G.turn === 'X');
        $('#pill-2').classList.toggle('turn', !G.over && G.turn === 'O');
    }

    function isMyTurn() {
        if (G.over) return false;
        if (G.mode === 'local') return true;
        return G.turn === G.myMark;
    }

    function setStatus(text) { $('#status').textContent = text; }

    function refreshStatus() {
        if (G.over) return;
        if (G.mode === 'local') {
            setStatus(`${G.names[G.turn]}'s turn (${G.turn === 'X' ? '✕' : '◯'})`);
        } else if (G.mode === 'ai') {
            setStatus(isMyTurn() ? 'Your move.' : 'Computer is thinking…');
        } else {
            setStatus(isMyTurn() ? 'Your move.' : `Waiting for ${G.names[G.turn]}…`);
        }
    }

    // ---------- Move application ----------
    function applyMove(i, mark) {
        G.board[i] = mark;
        sndMove(mark);
        const result = winnerOf(G.board);
        if (result) {
            endRound(result);
        } else {
            G.turn = mark === 'X' ? 'O' : 'X';
        }
    }

    function endRound(result) {
        G.over = true;
        if (result.line) {
            result.line.forEach(idx => cellEls[idx].classList.add('win'));
        }
        if (result.mark === 'tie') {
            G.scores.tie++;
            setStatus("It's a draw! 🤝");
            announce('The game is a draw.');
            sndTie();
        } else {
            G.scores[result.mark]++;
            const winnerName = G.names[result.mark];
            let msg;
            if (G.mode === 'local') msg = `${winnerName} wins! 🎉`;
            else msg = (result.mark === G.myMark) ? 'You win! 🎉' : `${winnerName} wins!`;
            setStatus(msg);
            announce(msg);
            sndWin();
            if (G.mode === 'local' || result.mark === G.myMark) celebrate();
        }
        $('#next-round').hidden = false;
        paint();
    }

    function onCellClick(i) {
        if (G.over || G.locked || G.board[i] || !isMyTurn()) return;

        if (G.mode === 'online') {
            ONLINE.makeMove(i);
            return;
        }

        const mark = G.turn;
        applyMove(i, mark);
        paint();
        refreshStatus();

        if (!G.over && G.mode === 'ai' && G.turn === G.aiMark) {
            G.locked = true;
            paint();
            const delay = reduceMotion ? 120 : 420;
            setTimeout(() => {
                const move = chooseAIMove();
                applyMove(move, G.aiMark);
                G.locked = false;
                paint();
                refreshStatus();
            }, delay);
        }
    }

    // ---------- AI: minimax with difficulty ----------
    function emptyCells(b) { return b.map((v,i)=>v?null:i).filter(v=>v!==null); }

    function minimax(b, mark) {
        const res = winnerOf(b);
        if (res) {
            if (res.mark === G.aiMark) return { score: 10 };
            if (res.mark === 'tie') return { score: 0 };
            return { score: -10 };
        }
        const moves = [];
        for (const i of emptyCells(b)) {
            b[i] = mark;
            const r = minimax(b, mark === 'X' ? 'O' : 'X');
            moves.push({ index: i, score: r.score });
            b[i] = '';
        }
        if (mark === G.aiMark) {
            return moves.reduce((best, m) => m.score > best.score ? m : best, { score: -Infinity });
        } else {
            return moves.reduce((best, m) => m.score < best.score ? m : best, { score: Infinity });
        }
    }

    function bestMove() {
        return minimax(G.board.slice(), G.aiMark).index;
    }
    function randomMove() {
        const cells = emptyCells(G.board);
        return cells[Math.floor(Math.random() * cells.length)];
    }
    function chooseAIMove() {
        if (G.difficulty === 'easy') return randomMove();
        if (G.difficulty === 'medium') return Math.random() < 0.5 ? bestMove() : randomMove();
        return bestMove(); // hard
    }

    // ---------- Round / game setup ----------
    function newRound() {
        G.board = Array(9).fill('');
        G.over = false;
        G.locked = false;
        G.starter = G.starter === 'X' ? 'O' : 'X';
        G.turn = G.starter;
        $('#next-round').hidden = true;
        paint();
        refreshStatus();
        // if AI starts
        if (G.mode === 'ai' && G.turn === G.aiMark) {
            G.locked = true; paint();
            setTimeout(() => {
                applyMove(bestMove(), G.aiMark);
                G.locked = false; paint(); refreshStatus();
            }, reduceMotion ? 120 : 400);
        }
    }

    function startLocalOrAI(mode) {
        G.mode = mode;
        G.board = Array(9).fill('');
        G.over = false; G.locked = false;
        G.starter = 'X'; G.turn = 'X';
        if (mode === 'ai') {
            G.myMark = 'X'; G.aiMark = 'O';
            G.names = { X: 'You', O: 'Computer' };
        } else {
            G.names = { X: 'Player 1', O: 'Player 2' };
        }
        G.scores = { X: 0, O: 0, tie: 0 };
        $('#next-round').hidden = true;
        showScreen('game');
        paint();
        refreshStatus();
    }

    // ---------- Menu wiring ----------
    let pendingMode = null;
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const mode = btn.dataset.mode;
            if (mode === 'ai') {
                pendingMode = 'ai';
                $('#difficulty').classList.add('show');
                $('#start-ai').focus();
            } else if (mode === 'local') {
                $('#difficulty').classList.remove('show');
                startLocalOrAI('local');
            } else if (mode === 'online') {
                $('#difficulty').classList.remove('show');
                ONLINE.openSetup();
            }
        });
    });

    document.querySelectorAll('.seg button').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.seg button').forEach(x => x.setAttribute('aria-pressed','false'));
            b.setAttribute('aria-pressed','true');
            G.difficulty = b.dataset.diff;
        });
    });
    $('#start-ai').addEventListener('click', () => startLocalOrAI('ai'));

    $('#next-round').addEventListener('click', () => {
        if (G.mode === 'online') { ONLINE.requestRestart(); return; }
        newRound();
    });
    $('#reset-scores').addEventListener('click', () => {
        G.scores = { X: 0, O: 0, tie: 0 };
        paint();
        announce('Scores reset.');
    });
    function goMenu() {
        if (G.mode === 'online') ONLINE.leave();
        $('#difficulty').classList.remove('show');
        showScreen('menu');
    }
    $('#back-btn').addEventListener('click', goMenu);
    $('#online-back-btn').addEventListener('click', () => showScreen('menu'));

    /* ============================================================
       ONLINE MODE — Firebase wrapper with graceful degradation.
       If ../firebase.js or the realtime DB can't load, the online
       button still works up to a friendly error; AI & local are
       fully functional regardless.
       ============================================================ */
    const ONLINE = (() => {
        let db, gameRef, fns, available = false, loaded = false;
        let gameId, isPlayerTwo = false, myName = '';
        let unsub = null;

        async function ensureFirebase() {
            if (loaded) return available;
            loaded = true;
            try {
                const appMod = await import('../firebase.js');
                fns = await import('https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js');
                db = fns.getDatabase(appMod.app);
                available = true;
            } catch (e) {
                console.warn('Firebase unavailable:', e);
                available = false;
            }
            return available;
        }

        function showError(msg) {
            const el = $('#online-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        async function openSetup() {
            showScreen('online');
            $('#online-error').classList.add('hidden');
            $('#share-wrap').classList.add('hidden');
            $('#player-name').focus();
            const ok = await ensureFirebase();
            // Joining via shared link?
            const hash = location.hash.slice(1);
            if (ok && hash) {
                isPlayerTwo = true;
                $('#online-create').textContent = 'Join game';
            } else {
                isPlayerTwo = false;
                $('#online-create').textContent = 'Create game';
            }
            if (!ok) {
                showError('Online play needs a connection to the game server and it could not be reached. You can still play vs Computer or Local two-player.');
            }
        }

        async function start() {
            const ok = await ensureFirebase();
            if (!ok) {
                showError('Could not reach the game server. Try AI or Local mode instead.');
                return;
            }
            myName = ($('#player-name').value || (isPlayerTwo ? 'Player 2' : 'Player 1')).slice(0, 20);
            const hash = location.hash.slice(1);
            gameId = (isPlayerTwo && hash) ? hash : Math.random().toString(36).slice(2, 7);
            location.hash = gameId;
            gameRef = fns.ref(db, `games/${gameId}`);

            G.mode = 'online';
            G.myMark = isPlayerTwo ? 'O' : 'X';
            G.scores = { X: 0, O: 0, tie: 0 };

            const snap = await fns.get(gameRef);
            if (!isPlayerTwo) {
                if (!snap.val()) {
                    await fns.set(gameRef, {
                        player1: { name: myName, symbol: 'X' },
                        player2: null,
                        board: Array(9).fill(''),
                        turn: 'X',
                        winner: null,
                        starter: 'X',
                        scores: { X: 0, O: 0, tie: 0 },
                    });
                }
                // show share link, wait for player 2
                const url = location.href.split('#')[0] + '#' + gameId;
                $('#share-url').value = url;
                $('#share-wrap').classList.remove('hidden');
            } else {
                if (!snap.val()) {
                    showError('That game could not be found. Ask your friend for a fresh link.');
                    return;
                }
                await fns.update(gameRef, { player2: { name: myName, symbol: 'O' } });
                enterGame();
            }

            // clean up if creator disconnects before anyone joins
            fns.onDisconnect(gameRef).remove();
            subscribe();
        }

        function subscribe() {
            if (unsub) unsub();
            unsub = fns.onValue(gameRef, snap => {
                const g = snap.val();
                if (!g) return;
                // names & scores
                G.names = {
                    X: g.player1?.name || 'Player 1',
                    O: g.player2?.name || 'Player 2',
                };
                if (g.scores) G.scores = g.scores;
                G.board = g.board || Array(9).fill('');
                G.turn = g.turn || 'X';

                if (g.player2 && screens.game.classList.contains('active') === false) {
                    enterGame();
                }

                G.over = !!g.winner;
                paint();

                if (!g.player2) {
                    setStatus('Waiting for a friend to join…');
                    return;
                }

                if (g.winner) {
                    const result = winnerOf(G.board) || { mark: g.winner, line: null };
                    // highlight + status without double-counting (scores stored server-side)
                    if (result.line) result.line.forEach(idx => cellEls[idx].classList.add('win'));
                    if (g.winner === 'tie') { setStatus("It's a draw! 🤝"); }
                    else if (g.winner === G.myMark) { setStatus('You win! 🎉'); celebrate(); }
                    else { setStatus(`${G.names[g.winner]} wins!`); }
                    $('#next-round').hidden = false;
                } else {
                    $('#next-round').hidden = true;
                    refreshStatus();
                }
            });
        }

        function enterGame() {
            showScreen('game');
            paint();
            refreshStatus();
        }

        async function makeMove(i) {
            const snap = await fns.get(gameRef);
            const g = snap.val();
            if (!g || g.winner) return;
            if (g.turn !== G.myMark) return;
            const board = g.board.slice();
            if (board[i]) return;
            board[i] = G.myMark;
            sndMove(G.myMark);
            const result = winnerOf(board);
            const updates = { board, turn: G.myMark === 'X' ? 'O' : 'X' };
            if (result) {
                updates.winner = result.mark;
                const scores = g.scores || { X:0,O:0,tie:0 };
                scores[result.mark] = (scores[result.mark] || 0) + 1;
                updates.scores = scores;
            }
            await fns.update(gameRef, updates);
        }

        async function requestRestart() {
            const snap = await fns.get(gameRef);
            const g = snap.val();
            const starter = (g.starter === 'X') ? 'O' : 'X';
            await fns.update(gameRef, {
                board: Array(9).fill(''),
                turn: starter,
                starter,
                winner: null,
            });
        }

        function leave() {
            if (unsub) { unsub(); unsub = null; }
            if (gameRef && fns) { try { fns.remove(gameRef); } catch(e){} }
            location.hash = '';
        }

        // copy link
        $('#copy-btn').addEventListener('click', async () => {
            const input = $('#share-url');
            try { await navigator.clipboard.writeText(input.value); }
            catch { input.select(); document.execCommand('copy'); }
            const btn = $('#copy-btn');
            const old = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = old, 1800);
        });
        $('#share-url').addEventListener('click', e => e.target.select());
        $('#online-create').addEventListener('click', start);
        $('#player-name').addEventListener('keyup', e => { if (e.key === 'Enter') start(); });

        return { openSetup, makeMove, requestRestart, leave };
    })();

    // If page is opened directly on a #gameId link, jump to online join.
    if (location.hash.slice(1)) {
        ONLINE.openSetup();
    }
</script>
<script src="../logo.js"></script>
</body>
