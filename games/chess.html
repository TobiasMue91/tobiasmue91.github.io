<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♞</text></svg>">
    <title>Midnight Chess — play against a real engine</title>
    <meta name="description"
          content="A dependency-free chess game with a built-in engine: alpha-beta search, quiescence, full rules, eval bar, sound and hints. One file, no libraries.">
    <style>
        :root {
            --felt: #141a16;
            --felt-2: #1b231e;
            --panel: #20291f;
            --panel-edge: #2e3a2c;
            --ink: #e9e2d0;
            --ink-dim: #a9a390;
            --brass: #c9a25e;
            --brass-bright: #e6c684;
            --light-sq: #e7d9b9;
            --dark-sq: #8a5a35;
            --danger: #c0563f;
            --good: #7fa66a;
            --radius: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            height: 100%
        }

        body {
            min-height: 100%;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--ink);
            background: radial-gradient(1200px 700px at 20% -10%, #24301f 0%, transparent 60%),
            radial-gradient(900px 600px at 110% 110%, #10251c 0%, transparent 55%),
            var(--felt);
            line-height: 1.5;
        }

        h1, h2, h3, .serif {
            font-family: Georgia, "Times New Roman", serif
        }

        header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            max-width: 1180px;
            margin: 0 auto;
            padding: 1.4rem 1.2rem .6rem;
            flex-wrap: wrap;
            gap: .4rem;
        }

        header h1 {
            font-size: clamp(1.6rem, 3.4vw, 2.3rem);
            font-weight: 400;
            letter-spacing: .02em;
        }

        header h1 .knight {
            color: var(--brass);
            font-size: 1.1em;
            vertical-align: -4px;
            margin-right: .15em
        }

        header .sub {
            color: var(--ink-dim);
            font-size: .85rem;
            font-style: italic
        }

        main {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 1.2rem 2rem;
        }

        .table {
            display: grid;
            grid-template-columns:minmax(0, auto) minmax(280px, 360px);
            gap: 1.6rem;
            align-items: start;
            justify-content: center;
            margin-top: .8rem;
        }

        /* ---------- board + eval bar ---------- */
        .stage {
            display: flex;
            gap: .9rem;
            align-items: stretch;
            justify-content: center
        }

        .evalwrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .4rem;
            padding-top: 22px;
            padding-bottom: 22px
        }

        #evalbar {
            width: 14px;
            flex: 1;
            border-radius: 7px;
            overflow: hidden;
            position: relative;
            background: #0c0f0c;
            border: 1px solid var(--panel-edge);
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, .6);
        }

        #evalfill {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg, #fdf8ec, #d9cfb4);
            transition: height .6s cubic-bezier(.4, 0, .2, 1);
        }

        #evalbar.thinking::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent, rgba(201, 162, 94, .35), transparent);
            background-size: 100% 200%;
            animation: scan 1.2s linear infinite;
        }

        @keyframes scan {
            from {
                background-position: 0 -100%
            }
            to {
                background-position: 0 100%
            }
        }

        #evalnum {
            font-size: .7rem;
            color: var(--ink-dim);
            font-variant-numeric: tabular-nums;
            min-height: 1em
        }

        .boardcol {
            display: flex;
            flex-direction: column;
            gap: .7rem;
            min-width: 0
        }

        .boardframe {
            padding: 22px;
            border-radius: 14px;
            position: relative;
            background: linear-gradient(155deg, #3a2a1b, #241708 70%);
            box-shadow: 0 18px 40px rgba(0, 0, 0, .55), inset 0 1px 0 rgba(255, 255, 255, .08);
        }

        .coords {
            position: absolute;
            color: #caa06a;
            font-size: .66rem;
            letter-spacing: .05em;
            font-variant-numeric: tabular-nums;
            user-select: none
        }

        #files {
            left: 22px;
            right: 22px;
            bottom: 4px;
            display: flex
        }

        #files span {
            flex: 1;
            text-align: center
        }

        #ranks {
            top: 22px;
            bottom: 22px;
            left: 6px;
            display: flex;
            flex-direction: column
        }

        #ranks span {
            flex: 1;
            display: flex;
            align-items: center
        }

        #board {
            display: grid;
            grid-template-columns:repeat(8, 1fr);
            grid-template-rows:repeat(8, 1fr);
            width: min(560px, calc(100vw - 7.6rem));
            aspect-ratio: 1;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, .5);
            touch-action: none;
        }

        .sq {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none
        }

        .sq.light {
            background: var(--light-sq)
        }

        .sq.dark {
            background: var(--dark-sq)
        }

        .sq.lastmove.light {
            background: #d9c883
        }

        .sq.lastmove.dark {
            background: #a1802f
        }

        .sq.selected {
            box-shadow: inset 0 0 0 3px var(--brass-bright)
        }

        .sq.hinted {
            z-index: 1;
            animation: hintpulse .8s ease-in-out 2;
            box-shadow: inset 0 0 0 4px var(--brass-bright), 0 0 18px 4px rgba(230, 198, 132, .75);
        }

        @keyframes hintpulse {
            0%, 100% {
                box-shadow: inset 0 0 0 4px var(--brass-bright), 0 0 18px 4px rgba(230, 198, 132, .75)
            }
            50% {
                box-shadow: inset 0 0 0 7px var(--brass-bright), 0 0 26px 8px rgba(230, 198, 132, .95)
            }
        }

        .sq.check {
            background: radial-gradient(circle, #d05a3f 20%, var(--danger) 100%) !important
        }

        .sq .dot {
            position: absolute;
            width: 32%;
            height: 32%;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(201, 162, 94, .95) 0%, rgba(160, 120, 50, .85) 100%);
            box-shadow: 0 0 0 2px rgba(30, 22, 8, .45), 0 1px 4px rgba(0, 0, 0, .4);
        }

        .sq.capturable::before {
            content: "";
            position: absolute;
            inset: 5%;
            border-radius: 50%;
            border: 5px solid rgba(201, 162, 94, .9);
            box-shadow: 0 0 0 2px rgba(30, 22, 8, .4), inset 0 0 0 2px rgba(30, 22, 8, .4);
            pointer-events: none;
        }

        .pc {
            font-size: calc(min(560px, 100vw - 7.6rem) / 8 * .78);
            line-height: 1;
            pointer-events: none;
            transition: transform .12s ease;
            filter: drop-shadow(0 3px 3px rgba(0, 0, 0, .35));
        }

        .sq:hover .pc {
            transform: translateY(-2px)
        }

        .pc.w {
            color: #f7f1e1;
            text-shadow: 0 0 1px #443722, 1px 1px 0 #55432a, -1px 1px 0 #55432a, 1px -1px 0 #55432a, -1px -1px 0 #55432a
        }

        .pc.b {
            color: #221a12;
            text-shadow: 0 1px 1px rgba(255, 240, 210, .25)
        }

        .pc.dragging {
            opacity: .35
        }

        #ghost {
            position: fixed;
            pointer-events: none;
            z-index: 50;
            transform: translate(-50%, -56%);
            display: none;
            filter: drop-shadow(0 8px 8px rgba(0, 0, 0, .5))
        }

        .boardbtns {
            display: flex;
            gap: .5rem;
            justify-content: center;
            flex-wrap: wrap
        }

        /* ---------- panels ---------- */
        .panel {
            background: linear-gradient(170deg, var(--panel), #1a221a);
            border: 1px solid var(--panel-edge);
            border-radius: var(--radius);
            padding: .9rem 1rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .35);
        }

        .side {
            display: flex;
            flex-direction: column;
            gap: .9rem
        }

        .playerline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: .5rem;
            min-height: 1.9em
        }

        .playerline .name {
            font-weight: 600;
            letter-spacing: .02em
        }

        .playerline .name .turnpip {
            display: inline-block;
            width: .55em;
            height: .55em;
            border-radius: 50%;
            background: var(--brass);
            margin-right: .45em;
            opacity: 0;
            transition: opacity .3s
        }

        .playerline.active .turnpip {
            opacity: 1;
            box-shadow: 0 0 8px var(--brass)
        }

        .caps {
            font-size: 1.15rem;
            letter-spacing: -.08em;
            color: var(--ink-dim);
            min-height: 1.2em
        }

        .caps .adv {
            font-size: .72rem;
            letter-spacing: 0;
            color: var(--brass);
            margin-left: .35em;
            font-variant-numeric: tabular-nums
        }

        #status {
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 1.02rem;
            border-top: 1px solid var(--panel-edge);
            margin-top: .6rem;
            padding-top: .6rem;
            color: var(--brass-bright);
            min-height: 2.1em;
        }

        #thoughts {
            font-size: .75rem;
            color: var(--ink-dim);
            min-height: 1.1em;
            font-variant-numeric: tabular-nums
        }

        h3.label {
            font-size: .72rem;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--ink-dim);
            font-family: inherit;
            font-weight: 600;
            margin-bottom: .5rem;
        }

        #history {
            display: grid;
            grid-template-columns:2.2em 1fr 1fr;
            gap: .15rem .4rem;
            max-height: 220px;
            overflow-y: auto;
            font-variant-numeric: tabular-nums;
            font-size: .92rem;
            scrollbar-width: thin;
            scrollbar-color: var(--panel-edge) transparent;
        }

        #history:empty::after {
            content: "No moves yet — the opening is yours.";
            grid-column: 1/-1;
            color: var(--ink-dim);
            font-style: italic;
            font-size: .85rem
        }

        #history .num {
            color: var(--ink-dim)
        }

        #history .mv {
            cursor: pointer;
            padding: .05rem .35rem;
            border-radius: 4px
        }

        #history .mv:hover {
            background: rgba(201, 162, 94, .15)
        }

        #history .mv.cur {
            background: var(--brass);
            color: #1b1508;
            font-weight: 600
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: .5rem
        }

        button {
            background: #2b3627;
            color: var(--ink);
            border: 1px solid var(--panel-edge);
            padding: .5rem .9rem;
            border-radius: 7px;
            cursor: pointer;
            font-size: .85rem;
            font-family: inherit;
            letter-spacing: .02em;
            transition: background .15s, transform .1s, border-color .15s;
        }

        button:hover {
            background: #37452f;
            border-color: var(--brass)
        }

        button:active {
            transform: translateY(1px)
        }

        button:focus-visible {
            outline: 2px solid var(--brass-bright);
            outline-offset: 2px
        }

        button.primary {
            background: var(--brass);
            color: #1c1406;
            border-color: transparent;
            font-weight: 600
        }

        button.primary:hover {
            background: var(--brass-bright)
        }

        button:disabled {
            opacity: .4;
            cursor: default;
            transform: none
        }

        .settings {
            display: flex;
            flex-direction: column;
            gap: .55rem;
            font-size: .88rem
        }

        .setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: .8rem
        }

        select {
            background: #161c15;
            color: var(--ink);
            border: 1px solid var(--panel-edge);
            border-radius: 6px;
            padding: .3rem .5rem;
            font-family: inherit;
            font-size: .85rem;
        }

        input[type=checkbox] {
            accent-color: var(--brass);
            width: 1.05rem;
            height: 1.05rem
        }

        footer {
            max-width: 1180px;
            margin: 0 auto;
            padding: 1rem 1.2rem 2rem;
            color: var(--ink-dim);
            font-size: .78rem;
            text-align: center;
            font-style: italic
        }

        /* modal */
        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(8, 10, 8, .72);
            z-index: 100;
            backdrop-filter: blur(3px)
        }

        .modal.open {
            display: flex
        }

        .modal-card {
            background: var(--panel);
            border: 1px solid var(--brass);
            border-radius: 12px;
            padding: 1.4rem 1.6rem;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0, 0, 0, .6);
            max-width: 90vw
        }

        .modal-card h3 {
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: .3rem
        }

        .modal-card p {
            color: var(--ink-dim);
            font-size: .9rem;
            margin-bottom: .8rem
        }

        .promos {
            display: flex;
            gap: .6rem;
            justify-content: center
        }

        .promos button {
            font-size: 2.4rem;
            padding: .4rem .7rem;
            line-height: 1
        }

        #toast {
            position: fixed;
            left: 50%;
            bottom: 1.4rem;
            transform: translate(-50%, calc(100% + 2rem));
            visibility: hidden;
            background: var(--panel);
            border: 1px solid var(--brass);
            color: var(--ink);
            padding: .55rem 1.1rem;
            border-radius: 8px;
            font-size: .86rem;
            z-index: 110;
            transition: transform .35s cubic-bezier(.2, .9, .3, 1.2), visibility 0s .35s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .5);
        }

        #toast.show {
            transform: translate(-50%, 0);
            visibility: visible;
            transition: transform .35s cubic-bezier(.2, .9, .3, 1.2), visibility 0s
        }

        @media (max-width: 900px) {
            .table {
                grid-template-columns:1fr
            }

            .stage {
                flex-direction: row
            }

            #board {
                width: min(560px, calc(100vw - 6.4rem))
            }

            .pc {
                font-size: calc(min(560px, 100vw - 6.4rem) / 8 * .78)
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition: none !important;
                animation: none !important
            }
        }
    </style>
</head>
<body>
<header>
    <h1><span class="knight">♞</span>Midnight Chess</h1>
    <span class="sub serif">one file · no libraries · a real engine inside</span>
</header>
<main>
    <div class="table">
        <section class="stage" aria-label="Chessboard">
            <div class="evalwrap" title="Engine evaluation (white's advantage grows upward)">
                <div id="evalbar">
                    <div id="evalfill"></div>
                </div>
                <div id="evalnum">0.0</div>
            </div>
            <div class="boardcol">
                <div class="boardframe">
                    <div id="board" role="grid" aria-label="Chess board"></div>
                    <div class="coords" id="files"></div>
                    <div class="coords" id="ranks"></div>
                </div>
                <div class="boardbtns">
                    <button id="flip" title="Flip board (F)">⇅ Flip</button>
                    <button id="prev" title="Previous move (←)">← Back</button>
                    <button id="next" title="Next move (→)">Forward →</button>
                    <button id="hint" title="Ask the engine for a suggestion (H)">☼ Hint</button>
                </div>
            </div>
        </section>
        <aside class="side">
            <div class="panel">
                <div class="playerline" id="line-b">
                    <span class="name"><span class="turnpip"></span>Black — <span id="bname">Engine</span></span>
                    <span class="caps" id="caps-b"></span>
                </div>
                <div class="playerline" id="line-w">
                    <span class="name"><span class="turnpip"></span>White — You</span>
                    <span class="caps" id="caps-w"></span>
                </div>
                <div id="status">White to move. Good luck.</div>
                <div id="thoughts"></div>
            </div>
            <div class="panel">
                <h3 class="label">Moves</h3>
                <div id="history"></div>
            </div>
            <div class="panel">
                <div class="controls">
                    <button id="new" class="primary">New game</button>
                    <button id="undo">Undo</button>
                    <button id="save">Save</button>
                    <button id="load">Load</button>
                </div>
            </div>
            <div class="panel">
                <h3 class="label">Settings</h3>
                <div class="settings">
                    <div class="setting">
                        <label for="level">Engine strength</label>
                        <select id="level">
                            <option value="1">Casual (fast &amp; forgiving)</option>
                            <option value="2" selected>Club player</option>
                            <option value="3">Tournament</option>
                            <option value="4">Merciless</option>
                        </select>
                    </div>
                    <div class="setting">
                        <label for="side">You play</label>
                        <select id="side">
                            <option value="w" selected>White</option>
                            <option value="b">Black</option>
                            <option value="both">Both (engine off)</option>
                        </select>
                    </div>
                    <div class="setting">
                        <label for="hints">Show legal moves</label>
                        <input type="checkbox" id="hints" checked>
                    </div>
                    <div class="setting">
                        <label for="sound">Sound</label>
                        <input type="checkbox" id="sound" checked>
                    </div>
                </div>
            </div>
        </aside>
    </div>
</main>
<footer>No frameworks were harmed in the making of this game. Keys: ← → navigate · F flip · H hint · U undo.</footer>

<div id="ghost" class="pc"></div>

<div class="modal" id="promo-modal" aria-modal="true" role="dialog">
    <div class="modal-card">
        <h3 class="serif">Promote to…</h3>
        <p>Choose the piece your pawn becomes.</p>
        <div class="promos" id="promo-btns"></div>
    </div>
</div>
<div class="modal" id="over-modal" aria-modal="true" role="dialog">
    <div class="modal-card">
        <h3 class="serif" id="over-title"></h3>
        <p id="over-sub"></p>
        <button class="primary" id="over-new">Play again</button>
    </div>
</div>
<div id="toast" role="status"></div>

<script>
    "use strict";
    /* ============================================================
       MIDNIGHT CHESS
       Board representation: 0x88. Engine: iterative deepening,
       alpha-beta with quiescence, MVV-LVA ordering, piece-square
       tables. Full rules: castling, en passant, promotion,
       fifty-move rule, threefold repetition, insufficient material.
       ============================================================ */

    // ---------- constants ----------
    const EMPTY = 0, P = 1, N = 2, B = 3, R = 4, Q = 5, K = 6;
    const WHITE = 8, BLACK = 16;
    const TYPE = p => p & 7;
    const COLOR = p => p & 24;
    const GLYPH = {1: "♟", 2: "♞", 3: "♝", 4: "♜", 5: "♛", 6: "♚"};
    const VAL = {1: 100, 2: 320, 3: 330, 4: 500, 5: 900, 6: 20000};
    const LETTER = {1: "", 2: "N", 3: "B", 4: "R", 5: "Q", 6: "K"};
    const files = "abcdefgh";
    const sqName = s => files[s & 7] + (8 - (s >> 4));
    const parseSq = str => (8 - parseInt(str[1])) * 16 + files.indexOf(str[0]);
    const onBoard = s => !(s & 0x88);

    const N_DIRS = [-33, -31, -18, -14, 14, 18, 31, 33];
    const B_DIRS = [-17, -15, 15, 17];
    const R_DIRS = [-16, -1, 1, 16];
    const K_DIRS = [-17, -16, -15, -1, 1, 15, 16, 17];

    // ---------- piece-square tables (from white's view, 8x8) ----------
    const PST_P = [0, 0, 0, 0, 0, 0, 0, 0, 50, 50, 50, 50, 50, 50, 50, 50, 10, 10, 20, 30, 30, 20, 10, 10, 5, 5, 10, 26, 26, 10, 5, 5, 0, 0, 0, 22, 22, 0, 0, 0, 5, -5, -10, 0, 0, -10, -5, 5, 5, 10, 10, -20, -20, 10, 10, 5, 0, 0, 0, 0, 0, 0, 0, 0];
    const PST_N = [-50, -40, -30, -30, -30, -30, -40, -50, -40, -20, 0, 0, 0, 0, -20, -40, -30, 0, 10, 15, 15, 10, 0, -30, -30, 5, 15, 20, 20, 15, 5, -30, -30, 0, 15, 20, 20, 15, 0, -30, -30, 5, 10, 15, 15, 10, 5, -30, -40, -20, 0, 5, 5, 0, -20, -40, -50, -40, -30, -30, -30, -30, -40, -50];
    const PST_B = [-20, -10, -10, -10, -10, -10, -10, -20, -10, 0, 0, 0, 0, 0, 0, -10, -10, 0, 5, 10, 10, 5, 0, -10, -10, 5, 5, 10, 10, 5, 5, -10, -10, 0, 10, 10, 10, 10, 0, -10, -10, 10, 10, 10, 10, 10, 10, -10, -10, 5, 0, 0, 0, 0, 5, -10, -20, -10, -10, -10, -10, -10, -10, -20];
    const PST_R = [0, 0, 0, 0, 0, 0, 0, 0, 5, 10, 10, 10, 10, 10, 10, 5, -5, 0, 0, 0, 0, 0, 0, -5, -5, 0, 0, 0, 0, 0, 0, -5, -5, 0, 0, 0, 0, 0, 0, -5, -5, 0, 0, 0, 0, 0, 0, -5, -5, 0, 0, 0, 0, 0, 0, -5, 0, 0, 0, 5, 5, 0, 0, 0];
    const PST_Q = [-20, -10, -10, -5, -5, -10, -10, -20, -10, 0, 0, 0, 0, 0, 0, -10, -10, 0, 5, 5, 5, 5, 0, -10, -5, 0, 5, 5, 5, 5, 0, -5, 0, 0, 5, 5, 5, 5, 0, -5, -10, 5, 5, 5, 5, 5, 0, -10, -10, 0, 5, 0, 0, 0, 0, -10, -20, -10, -10, -5, -5, -10, -10, -20];
    const PST_K_MID = [-30, -40, -40, -50, -50, -40, -40, -30, -30, -40, -40, -50, -50, -40, -40, -30, -30, -40, -40, -50, -50, -40, -40, -30, -30, -40, -40, -50, -50, -40, -40, -30, -20, -30, -30, -40, -40, -30, -30, -20, -10, -20, -20, -20, -20, -20, -20, -10, 20, 20, 0, 0, 0, 0, 20, 20, 20, 30, 10, 0, 0, 10, 30, 20];
    const PST_K_END = [-50, -40, -30, -20, -20, -30, -40, -50, -30, -20, -10, 0, 0, -10, -20, -30, -30, -10, 20, 30, 30, 20, -10, -30, -30, -10, 30, 40, 40, 30, -10, -30, -30, -10, 30, 40, 40, 30, -10, -30, -30, -10, 20, 30, 30, 20, -10, -30, -30, -30, 0, 0, 0, 0, -30, -30, -50, -30, -30, -30, -30, -30, -30, -50];
    const PST = {1: PST_P, 2: PST_N, 3: PST_B, 4: PST_R, 5: PST_Q};

    // ---------- game state ----------
    function newState() {
        return {
            board: new Int8Array(128),
            turn: WHITE,
            castling: {wk: true, wq: true, bk: true, bq: true},
            ep: -1,               // en passant target square (0x88) or -1
            half: 0, full: 1,
            kings: {[WHITE]: 0, [BLACK]: 0},
            reps: {},             // position-key -> count
        };
    }

    let S = newState();

    function setStart(st) {
        st.board.fill(EMPTY);
        const back = [R, N, B, Q, K, B, N, R];
        for (let f = 0; f < 8; f++) {
            st.board[0x00 + f] = back[f] | BLACK;
            st.board[0x10 + f] = P | BLACK;
            st.board[0x60 + f] = P | WHITE;
            st.board[0x70 + f] = back[f] | WHITE;
        }
        st.turn = WHITE;
        st.castling = {wk: true, wq: true, bk: true, bq: true};
        st.ep = -1;
        st.half = 0;
        st.full = 1;
        st.kings[WHITE] = 0x74;
        st.kings[BLACK] = 0x04;
        st.reps = {};
        st.reps[posKey(st)] = 1;
    }

    function posKey(st) {
        let s = "";
        for (let r = 0; r < 8; r++) for (let f = 0; f < 8; f++) s += st.board[r * 16 + f].toString(32);
        const c = st.castling;
        return s + "|" + st.turn + "|" + (c.wk ? 1 : 0) + (c.wq ? 1 : 0) + (c.bk ? 1 : 0) + (c.bq ? 1 : 0) + "|" + st.ep;
    }

    // ---------- attack detection ----------
    function attacked(st, sq, byColor) {
        // pawns
        const pd = byColor === WHITE ? [17, 15] : [-17, -15];
        for (const d of pd) {
            const s = sq + d;
            if (onBoard(s) && st.board[s] === (P | byColor)) return true;
        }
        for (const d of N_DIRS) {
            const s = sq + d;
            if (onBoard(s) && st.board[s] === (N | byColor)) return true;
        }
        for (const d of K_DIRS) {
            const s = sq + d;
            if (onBoard(s) && st.board[s] === (K | byColor)) return true;
        }
        for (const d of B_DIRS) {
            let s = sq + d;
            while (onBoard(s)) {
                const p = st.board[s];
                if (p) {
                    if (COLOR(p) === byColor && (TYPE(p) === B || TYPE(p) === Q)) return true;
                    break;
                }
                s += d;
            }
        }
        for (const d of R_DIRS) {
            let s = sq + d;
            while (onBoard(s)) {
                const p = st.board[s];
                if (p) {
                    if (COLOR(p) === byColor && (TYPE(p) === R || TYPE(p) === Q)) return true;
                    break;
                }
                s += d;
            }
        }
        return false;
    }

    const inCheck = (st, color = st.turn) => attacked(st, st.kings[color], color === WHITE ? BLACK : WHITE);

    // ---------- move generation ----------
    // move: {from,to,piece,captured,promo,flags} flags: e=enpassant, c=castle, 2=double push
    function genMoves(st, capsOnly = false) {
        const moves = [], us = st.turn, them = us === WHITE ? BLACK : WHITE;
        const push = (from, to, captured = 0, promo = 0, flags = "") => moves.push({
            from,
            to,
            piece: st.board[from],
            captured,
            promo,
            flags
        });
        for (let sq = 0; sq < 128; sq++) {
            if (!onBoard(sq)) continue;
            const p = st.board[sq];
            if (!p || COLOR(p) !== us) continue;
            const t = TYPE(p);
            if (t === P) {
                const dir = us === WHITE ? -16 : 16;
                const startRank = us === WHITE ? 6 : 1, promoRank = us === WHITE ? 0 : 7;
                const one = sq + dir;
                if (!capsOnly && onBoard(one) && !st.board[one]) {
                    if ((one >> 4) === promoRank) {
                        for (const pr of [Q, R, B, N]) push(sq, one, 0, pr);
                    } else {
                        push(sq, one);
                        const two = sq + dir * 2;
                        if ((sq >> 4) === startRank && !st.board[two]) push(sq, two, 0, 0, "2");
                    }
                }
                for (const dd of [dir - 1, dir + 1]) {
                    const to = sq + dd;
                    if (!onBoard(to)) continue;
                    const tp = st.board[to];
                    if (tp && COLOR(tp) === them) {
                        if ((to >> 4) === promoRank) {
                            for (const pr of [Q, R, B, N]) push(sq, to, tp, pr);
                        } else push(sq, to, tp);
                    } else if (to === st.ep && st.ep >= 0) {
                        push(sq, to, P | them, 0, "e");
                    }
                }
            } else if (t === N || t === K) {
                for (const d of (t === N ? N_DIRS : K_DIRS)) {
                    const to = sq + d;
                    if (!onBoard(to)) continue;
                    const tp = st.board[to];
                    if (!tp) {
                        if (!capsOnly) push(sq, to);
                    } else if (COLOR(tp) === them) push(sq, to, tp);
                }
                if (t === K && !capsOnly) {
                    // castling
                    const home = us === WHITE ? 0x70 : 0x00;
                    if (sq === home + 4) {
                        const c = st.castling;
                        const kOK = us === WHITE ? c.wk : c.bk, qOK = us === WHITE ? c.wq : c.bq;
                        if (kOK && !st.board[home + 5] && !st.board[home + 6]
                            && !attacked(st, home + 4, them) && !attacked(st, home + 5, them) && !attacked(st, home + 6, them)
                            && TYPE(st.board[home + 7]) === R && COLOR(st.board[home + 7]) === us)
                            push(sq, home + 6, 0, 0, "c");
                        if (qOK && !st.board[home + 3] && !st.board[home + 2] && !st.board[home + 1]
                            && !attacked(st, home + 4, them) && !attacked(st, home + 3, them) && !attacked(st, home + 2, them)
                            && TYPE(st.board[home]) === R && COLOR(st.board[home]) === us)
                            push(sq, home + 2, 0, 0, "c");
                    }
                }
            } else {
                const dirs = t === B ? B_DIRS : t === R ? R_DIRS : K_DIRS; // queen uses K_DIRS
                for (const d of dirs) {
                    let to = sq + d;
                    while (onBoard(to)) {
                        const tp = st.board[to];
                        if (!tp) {
                            if (!capsOnly) push(sq, to);
                        } else {
                            if (COLOR(tp) === them) push(sq, to, tp);
                            break;
                        }
                        to += d;
                    }
                }
            }
        }
        return moves;
    }

    // make/unmake; returns undo record or null if illegal (leaves king in check)
    function makeMove(st, m) {
        const us = st.turn, them = us === WHITE ? BLACK : WHITE;
        const undo = {m, ep: st.ep, castling: {...st.castling}, half: st.half, full: st.full, capturedSq: -1};
        st.board[m.from] = EMPTY;
        st.board[m.to] = m.promo ? (m.promo | us) : m.piece;
        if (m.flags === "e") {
            const capSq = m.to + (us === WHITE ? 16 : -16);
            st.board[capSq] = EMPTY;
            undo.capturedSq = capSq;
        }
        if (m.flags === "c") {
            const home = us === WHITE ? 0x70 : 0x00;
            if (m.to === home + 6) {
                st.board[home + 5] = st.board[home + 7];
                st.board[home + 7] = EMPTY;
            } else {
                st.board[home + 3] = st.board[home];
                st.board[home] = EMPTY;
            }
        }
        if (TYPE(m.piece) === K) st.kings[us] = m.to;
        // castling rights
        const c = st.castling;
        if (m.from === 0x74 || m.to === 0x74) {
            c.wk = false;
            c.wq = false;
        }
        if (m.from === 0x04 || m.to === 0x04) {
            c.bk = false;
            c.bq = false;
        }
        if (m.from === 0x77 || m.to === 0x77) c.wk = false;
        if (m.from === 0x70 || m.to === 0x70) c.wq = false;
        if (m.from === 0x07 || m.to === 0x07) c.bk = false;
        if (m.from === 0x00 || m.to === 0x00) c.bq = false;
        st.ep = m.flags === "2" ? (m.from + (us === WHITE ? -16 : 16)) : -1;
        st.half = (TYPE(m.piece) === P || m.captured) ? 0 : st.half + 1;
        if (us === BLACK) st.full++;
        st.turn = them;
        if (attacked(st, st.kings[us], them)) {
            unmakeMove(st, undo);
            return null;
        }
        return undo;
    }

    function unmakeMove(st, u) {
        const m = u.m;
        st.turn = st.turn === WHITE ? BLACK : WHITE;
        const us = st.turn;
        st.board[m.from] = m.piece;
        st.board[m.to] = EMPTY;
        if (m.captured) {
            if (m.flags === "e") st.board[u.capturedSq] = m.captured;
            else st.board[m.to] = m.captured;
        }
        if (m.flags === "c") {
            const home = us === WHITE ? 0x70 : 0x00;
            if (m.to === home + 6) {
                st.board[home + 7] = st.board[home + 5];
                st.board[home + 5] = EMPTY;
            } else {
                st.board[home] = st.board[home + 3];
                st.board[home + 3] = EMPTY;
            }
        }
        if (TYPE(m.piece) === K) st.kings[us] = m.from;
        st.ep = u.ep;
        st.castling = u.castling;
        st.half = u.half;
        st.full = u.full;
    }

    function legalMoves(st) {
        const out = [];
        for (const m of genMoves(st)) {
            const u = makeMove(st, m);
            if (u) {
                unmakeMove(st, u);
                out.push(m);
            }
        }
        return out;
    }

    // ---------- game result ----------
    function insufficientMaterial(st) {
        const minors = [];
        for (let sq = 0; sq < 128; sq++) {
            if (!onBoard(sq)) continue;
            const p = st.board[sq];
            if (!p) continue;
            const t = TYPE(p);
            if (t === P || t === R || t === Q) return false;
            if (t === N || t === B) minors.push({t, sq, c: COLOR(p)});
        }
        if (minors.length <= 1) return true;
        if (minors.length === 2 && minors[0].t === B && minors[1].t === B) {
            const shade = s => ((s >> 4) + (s & 7)) & 1;
            return shade(minors[0].sq) === shade(minors[1].sq);
        }
        return false;
    }

    function gameResult(st) {
        const moves = legalMoves(st);
        if (moves.length === 0) {
            if (inCheck(st)) return {over: true, result: st.turn === WHITE ? "0-1" : "1-0", reason: "checkmate"};
            return {over: true, result: "½–½", reason: "stalemate"};
        }
        if (st.half >= 100) return {over: true, result: "½–½", reason: "fifty-move rule"};
        if ((st.reps[posKey(st)] || 0) >= 3) return {over: true, result: "½–½", reason: "threefold repetition"};
        if (insufficientMaterial(st)) return {over: true, result: "½–½", reason: "insufficient material"};
        return {over: false, moves};
    }

    // ---------- SAN ----------
    function toSAN(st, m, allMoves) {
        if (m.flags === "c") return (m.to & 7) === 6 ? "O-O" : "O-O-O";
        const t = TYPE(m.piece);
        let s = LETTER[t];
        if (t !== P) {
            // disambiguation
            const others = allMoves.filter(x => x !== m && x.to === m.to && TYPE(x.piece) === t && x.from !== m.from);
            if (others.length) {
                const sameFile = others.some(x => (x.from & 7) === (m.from & 7));
                const sameRank = others.some(x => (x.from >> 4) === (m.from >> 4));
                if (!sameFile) s += files[m.from & 7];
                else if (!sameRank) s += (8 - (m.from >> 4));
                else s += sqName(m.from);
            }
        }
        if (m.captured) {
            if (t === P) s += files[m.from & 7];
            s += "x";
        }
        s += sqName(m.to);
        if (m.promo) s += "=" + LETTER[m.promo];
        const u = makeMove(st, m);
        const res = gameResult(st);
        if (res.over && res.reason === "checkmate") s += "#";
        else if (inCheck(st)) s += "+";
        unmakeMove(st, u);
        return s;
    }

    // ---------- evaluation ----------
    function evaluate(st) {
        let score = 0, phase = 0;
        let wMat = 0, bMat = 0;
        for (let sq = 0; sq < 128; sq++) {
            if (!onBoard(sq)) continue;
            const p = st.board[sq];
            if (!p) continue;
            const t = TYPE(p);
            if (t !== P && t !== K) phase += (t === Q ? 4 : t === R ? 2 : 1);
            if (COLOR(p) === WHITE) wMat += VAL[t]; else bMat += VAL[t];
        }
        const endgame = phase <= 6;
        for (let sq = 0; sq < 128; sq++) {
            if (!onBoard(sq)) continue;
            const p = st.board[sq];
            if (!p) continue;
            const t = TYPE(p), r = sq >> 4, f = sq & 7;
            const idx = r * 8 + f, mirror = (7 - r) * 8 + f;
            let v = VAL[t];
            if (t === K) v = 0;
            const table = t === K ? (endgame ? PST_K_END : PST_K_MID) : PST[t];
            if (COLOR(p) === WHITE) score += v + table[idx];
            else score -= v + table[mirror];
        }
        // small mobility nudge
        return score;
    }

    // ---------- search ----------
    const engine = {nodes: 0, stopAt: 0, stopped: false, best: null};
    const MATE = 100000;

    function orderMoves(moves, pvMove) {
        for (const m of moves) {
            m.score = 0;
            if (pvMove && m.from === pvMove.from && m.to === pvMove.to && m.promo === pvMove.promo) m.score = 1e6;
            else if (m.captured) m.score = 10 * VAL[TYPE(m.captured)] - VAL[TYPE(m.piece)] + 1000;
            else if (m.promo) m.score = 900;
        }
        moves.sort((a, b) => b.score - a.score);
    }

    function quiescence(st, alpha, beta) {
        engine.nodes++;
        if ((engine.nodes & 2047) === 0 && performance.now() > engine.stopAt) {
            engine.stopped = true;
            return alpha;
        }
        const stand = st.turn === WHITE ? evaluate(st) : -evaluate(st);
        if (stand >= beta) return beta;
        if (stand > alpha) alpha = stand;
        const caps = genMoves(st, true);
        orderMoves(caps, null);
        for (const m of caps) {
            const u = makeMove(st, m);
            if (!u) continue;
            const score = -quiescence(st, -beta, -alpha);
            unmakeMove(st, u);
            if (engine.stopped) return alpha;
            if (score >= beta) return beta;
            if (score > alpha) alpha = score;
        }
        return alpha;
    }

    function alphabeta(st, depth, alpha, beta, ply, pvMove) {
        engine.nodes++;
        if ((engine.nodes & 2047) === 0 && performance.now() > engine.stopAt) {
            engine.stopped = true;
            return alpha;
        }
        if (ply > 0 && ((st.reps[posKey(st)] || 0) >= 2 || st.half >= 100)) return 0; // draw-ish
        if (depth === 0) return quiescence(st, alpha, beta);
        const moves = genMoves(st);
        orderMoves(moves, ply === 0 ? pvMove : null);
        let legal = 0, bestLocal = null;
        for (const m of moves) {
            const u = makeMove(st, m);
            if (!u) continue;
            legal++;
            const key = posKey(st);
            st.reps[key] = (st.reps[key] || 0) + 1;
            const check = inCheck(st);
            const ext = check ? 1 : 0;
            const score = -alphabeta(st, depth - 1 + ext, -beta, -alpha, ply + 1, pvMove);
            st.reps[key]--;
            unmakeMove(st, u);
            if (engine.stopped) return alpha;
            if (score > alpha) {
                alpha = score;
                bestLocal = m;
                if (ply === 0) engine.best = {move: m, score};
                if (alpha >= beta) break;
            }
        }
        if (legal === 0) {
            return inCheck(st) ? -MATE + ply : 0;
        }
        return alpha;
    }

    // levels: [maxDepth, timeMs, blunderChance]
    const LEVELS = {1: [2, 300, .35], 2: [3, 700, .12], 3: [4, 1600, 0], 4: [6, 3200, 0]};

    function think(st, level, onDone) {
        const [maxDepth, timeMs, blunder] = LEVELS[level];
        const legal = legalMoves(st);
        if (!legal.length) {
            onDone(null);
            return;
        }
        // intentional imperfection on lower levels
        if (blunder && Math.random() < blunder) {
            const caps = legal.filter(m => m.captured);
            const pool = (caps.length && Math.random() < .5) ? caps : legal;
            setTimeout(() => onDone({
                move: pool[Math.floor(Math.random() * pool.length)],
                score: 0,
                depth: 0,
                nodes: 0
            }), 260 + Math.random() * 400);
            return;
        }
        engine.nodes = 0;
        engine.stopped = false;
        engine.best = null;
        engine.stopAt = performance.now() + timeMs;
        let depth = 1, lastGood = null;
        const step = () => {
            engine.best = null;
            alphabeta(st, depth, -Infinity, Infinity, 0, lastGood ? lastGood.move : null);
            if (engine.best && !engine.stopped) lastGood = {...engine.best, depth, nodes: engine.nodes};
            else if (engine.best && !lastGood) lastGood = {...engine.best, depth, nodes: engine.nodes};
            depth++;
            if (!engine.stopped && depth <= maxDepth && performance.now() < engine.stopAt) {
                setTimeout(step, 0); // yield to UI
            } else {
                if (!lastGood) lastGood = {move: legal[0], score: 0, depth: 1, nodes: engine.nodes};
                lastGood.nodes = engine.nodes;
                onDone(lastGood);
            }
        };
        setTimeout(step, 10);
    }

    // ============================================================
    //  UI
    // ============================================================
    const $ = id => document.getElementById(id);
    const boardEl = $("board"), ghost = $("ghost");
    let orientation = "white";
    let selected = -1, legalCache = [];
    let history = [];        // {m, san, keyAfter, capturedType}
    let viewIndex = -1;      // -1 = live position index is history.length-1; we track separately
    let viewing = -1;        // index into history currently displayed (history.length-1 = live)
    let engineBusy = false, gameOver = false;
    let humanSide = "w";

    // build squares
    const squares = [];
    (function () {
        for (let r = 0; r < 8; r++) for (let f = 0; f < 8; f++) {
            const d = document.createElement("div");
            d.className = "sq " + (((r + f) & 1) ? "dark" : "light");
            d.dataset.sq = r * 16 + f;
            d.setAttribute("role", "gridcell");
            boardEl.appendChild(d);
            squares.push(d);
        }
        $("files").innerHTML = "abcdefgh".split("").map(c => `<span>${c}</span>`).join("");
        $("ranks").innerHTML = [8, 7, 6, 5, 4, 3, 2, 1].map(n => `<span>${n}</span>`).join("");
    })();

    function idxToSq(i) { // DOM index -> 0x88 respecting orientation
        const r = Math.floor(i / 8), f = i % 8;
        return orientation === "white" ? r * 16 + f : (7 - r) * 16 + (7 - f);
    }

    function sqToIdx(sq) {
        const r = sq >> 4, f = sq & 7;
        return orientation === "white" ? r * 8 + f : (7 - r) * 8 + (7 - f);
    }

    function displayState() {
        // state at "viewing" index (replay support)
        if (viewing === history.length - 1) return S;
        const st = newState();
        setStart(st);
        for (let i = 0; i <= viewing; i++) {
            const u = makeMove(st, history[i].m);
            const k = posKey(st);
            st.reps[k] = (st.reps[k] || 0) + 1;
        }
        return st;
    }

    function render() {
        const st = displayState();
        const last = viewing >= 0 ? history[viewing].m : null;
        const check = inCheck(st) ? st.kings[st.turn] : -1;
        for (let i = 0; i < 64; i++) {
            const sq = idxToSq(i), el = squares[i], p = st.board[sq];
            el.innerHTML = p ? `<span class="pc ${COLOR(p) === WHITE ? "w" : "b"}">${GLYPH[TYPE(p)]}</span>` : "";
            el.classList.toggle("lastmove", !!last && (sq === last.from || sq === last.to));
            el.classList.toggle("check", sq === check);
            el.classList.toggle("selected", sq === selected);
            el.classList.remove("capturable");
            el.querySelector(".dot")?.remove();
            el.setAttribute("aria-label", sqName(sq) + (p ? ": " + (COLOR(p) === WHITE ? "white " : "black ") + ["", "pawn", "knight", "bishop", "rook", "queen", "king"][TYPE(p)] : ""));
        }
        if (selected >= 0 && $("hints").checked) {
            for (const m of legalCache.filter(m => m.from === selected)) {
                const el = squares[sqToIdx(m.to)];
                if (m.captured) el.classList.add("capturable");
                else {
                    const dot = document.createElement("div");
                    dot.className = "dot";
                    el.appendChild(dot);
                }
            }
        }
        renderPanels(st);
    }

    function renderPanels(st) {
        // captured pieces & material
        const capsW = [], capsB = []; // capsW = pieces White has captured (black pieces)
        for (let i = 0; i <= viewing; i++) {
            const h = history[i];
            if (h.capturedType) {
                if (COLOR(h.m.piece) === WHITE) capsW.push(h.capturedType); else capsB.push(h.capturedType);
            }
        }
        const sum = a => a.reduce((s, t) => s + VAL[t], 0);
        const diff = sum(capsW) - sum(capsB);
        const fmt = (arr, adv) => arr.sort((a, b) => VAL[b] - VAL[a]).map(t => GLYPH[t]).join("") + (adv > 0 ? `<span class="adv">+${(adv / 100).toFixed(adv % 100 ? 1 : 0).replace(/\.0$/, "")}</span>` : "");
        $("caps-w").innerHTML = fmt(capsW, diff);
        $("caps-b").innerHTML = fmt(capsB, -diff);
        // turn pips
        $("line-w").classList.toggle("active", st.turn === WHITE && !gameOver);
        $("line-b").classList.toggle("active", st.turn === BLACK && !gameOver);
        // history
        const h = $("history");
        h.innerHTML = "";
        for (let i = 0; i < history.length; i += 2) {
            const num = document.createElement("span");
            num.className = "num";
            num.textContent = (i / 2 + 1) + ".";
            h.appendChild(num);
            for (let j = i; j < i + 2; j++) {
                const cell = document.createElement("span");
                if (j < history.length) {
                    cell.className = "mv" + (j === viewing ? " cur" : "");
                    cell.textContent = history[j].san;
                    cell.onclick = () => {
                        viewing = j;
                        selected = -1;
                        render();
                    };
                }
                h.appendChild(cell);
            }
        }
        const cur = h.querySelector(".cur");
        if (cur) cur.scrollIntoView({block: "nearest"});
        $("prev").disabled = viewing < 0;
        $("next").disabled = viewing >= history.length - 1;
    }

    function setStatus(html) {
        $("status").innerHTML = html;
    }

    // ---------- sound (WebAudio, no assets) ----------
    let audioCtx = null;

    function blip(freq, dur = 0.07, type = "sine", gain = 0.12) {
        if (!$("sound").checked) return;
        try {
            audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = type;
            o.frequency.value = freq;
            g.gain.setValueAtTime(gain, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            o.connect(g).connect(audioCtx.destination);
            o.start();
            o.stop(audioCtx.currentTime + dur);
        } catch (e) {
        }
    }

    const snd = {
        move: () => blip(340, .06, "triangle"),
        capture: () => {
            blip(220, .09, "square", .09);
            setTimeout(() => blip(160, .08, "square", .07), 40);
        },
        check: () => {
            blip(660, .09, "sawtooth", .06);
            setTimeout(() => blip(880, .1, "sawtooth", .05), 90);
        },
        castle: () => {
            blip(300, .05, "triangle");
            setTimeout(() => blip(380, .06, "triangle"), 70);
        },
        end: () => {
            [523, 392, 330, 262].forEach((f, i) => setTimeout(() => blip(f, .22, "sine", .09), i * 140));
        }
    };

    // ---------- toast ----------
    let toastTimer;

    function toast(msg) {
        const t = $("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
    }

    // ---------- eval bar ----------
    function setEval(cp, mate) {
        const bar = $("evalfill"), num = $("evalnum");
        let pct;
        if (mate !== undefined && mate !== null) {
            pct = mate > 0 ? 100 : 0;
            num.textContent = "M" + Math.abs(mate);
        } else {
            pct = 100 / (1 + Math.pow(10, -cp / 400)); // logistic
            num.textContent = (cp > 0 ? "+" : "") + (cp / 100).toFixed(1);
        }
        bar.style.height = pct + "%";
    }

    // ---------- moves (human) ----------
    function atLive() {
        return viewing === history.length - 1;
    }

    function goLive() {
        viewing = history.length - 1;
        render();
    }

    function tryHumanMove(from, to) {
        const cand = legalCache.filter(m => m.from === from && m.to === to);
        if (!cand.length) return false;
        if (cand.length > 1) { // promotion
            openPromo(cand);
            return true;
        }
        commitMove(cand[0]);
        return true;
    }

    function commitMove(m) {
        const all = legalCache.length ? legalCache : legalMoves(S);
        const san = toSAN(S, m, all);
        const capturedType = m.captured ? TYPE(m.captured) : 0;
        makeMove(S, m);
        const key = posKey(S);
        S.reps[key] = (S.reps[key] || 0) + 1;
        history.push({m, san, capturedType});
        viewing = history.length - 1;
        selected = -1;
        legalCache = [];
        const res = gameResult(S);
        if (m.flags === "c") snd.castle();
        else if (capturedType) snd.capture();
        else snd.move();
        if (!res.over && inCheck(S)) snd.check();
        render();
        if (res.over) {
            finish(res);
            return;
        }
        setStatus(S.turn === WHITE ? "White to move." : "Black to move.");
        maybeEngineMove();
    }

    function finish(res) {
        gameOver = true;
        engineBusy = false;
        $("evalbar").classList.remove("thinking");
        snd.end();
        const title = res.reason === "checkmate"
            ? (res.result === "1-0" ? "White wins" : "Black wins")
            : "Draw";
        const humanWon = res.reason === "checkmate" && ((res.result === "1-0") === (humanSide !== "b")) && humanSide !== "both";
        const sub = res.reason === "checkmate"
            ? `Checkmate. ${res.result}` + (humanSide === "both" ? "" : humanWon ? " — well played." : " — the engine sends its regards.")
            : `By ${res.reason}. ${res.result}`;
        setStatus(`<strong>${title}</strong> — ${sub}`);
        $("over-title").textContent = title;
        $("over-sub").textContent = sub;
        setTimeout(() => $("over-modal").classList.add("open"), 650);
        renderPanels(S);
    }

    // ---------- engine turn ----------
    function engineColor() {
        return humanSide === "w" ? BLACK : humanSide === "b" ? WHITE : 0;
    }

    function maybeEngineMove() {
        if (gameOver || engineBusy) return;
        if (humanSide === "both") return;
        if (S.turn !== engineColor()) return;
        engineBusy = true;
        $("evalbar").classList.add("thinking");
        $("thoughts").textContent = "Engine is thinking…";
        const lvl = parseInt($("level").value);
        think(S, lvl, (result) => {
            engineBusy = false;
            $("evalbar").classList.remove("thinking");
            if (!result || gameOver) return;
            // eval from white's perspective
            const cpWhite = S.turn === WHITE ? result.score : -result.score;
            if (Math.abs(result.score) > MATE - 1000) {
                const plies = MATE - Math.abs(result.score);
                setEval(cpWhite, (cpWhite > 0 ? 1 : -1) * Math.max(1, Math.ceil(plies / 2)));
            } else setEval(cpWhite);
            if (result.depth)
                $("thoughts").textContent = `depth ${result.depth} · ${result.nodes.toLocaleString()} nodes`;
            else
                $("thoughts").textContent = "played on instinct";
            legalCache = legalMoves(S);
            commitMove(result.move);
        });
    }

    // ---------- input: click + drag ----------
    let dragging = null;

    function squareFromEvent(e) {
        const pt = e.touches ? e.touches[0] : e;
        const el = document.elementFromPoint(pt.clientX, pt.clientY)?.closest(".sq");
        return el ? parseInt(el.dataset.sq) : -1;
    }

    function canGrab(sq) {
        if (gameOver || engineBusy || !atLive()) return false;
        const p = S.board[sq];
        if (!p || COLOR(p) !== S.turn) return false;
        if (humanSide !== "both" && S.turn === engineColor()) return false;
        return true;
    }

    boardEl.addEventListener("pointerdown", e => {
        const sq = squareFromEvent(e);
        if (sq < 0) return;
        if (!atLive()) {
            toast("Viewing history — press Forward to return to the game.");
            return;
        }
        if (selected >= 0 && tryHumanMove(selected, sq)) {
            render();
            return;
        }
        if (canGrab(sq)) {
            selected = sq;
            legalCache = legalMoves(S);
            dragging = {from: sq};
            const p = S.board[sq];
            ghost.textContent = GLYPH[TYPE(p)];
            ghost.className = "pc " + (COLOR(p) === WHITE ? "w" : "b");
            ghost.style.fontSize = getComputedStyle(squares[0]).width;
            render();
            squares[sqToIdx(sq)].querySelector(".pc")?.classList.add("dragging");
            moveGhost(e);
        } else {
            selected = -1;
            render();
        }
    });

    function moveGhost(e) {
        const pt = e.touches ? e.touches[0] : e;
        ghost.style.display = "block";
        ghost.style.left = pt.clientX + "px";
        ghost.style.top = pt.clientY + "px";
    }

    window.addEventListener("pointermove", e => {
        if (dragging) moveGhost(e);
    });
    window.addEventListener("pointerup", e => {
        if (!dragging) return;
        ghost.style.display = "none";
        const to = squareFromEvent(e);
        const from = dragging.from;
        dragging = null;
        if (to >= 0 && to !== from) {
            if (tryHumanMove(from, to)) return;
        }
        render(); // keep selection for click-move
    });

    // ---------- promotion ----------
    let promoPending = null;

    function openPromo(cands) {
        promoPending = cands;
        const wrap = $("promo-btns");
        wrap.innerHTML = "";
        const col = COLOR(cands[0].piece) === WHITE ? "w" : "b";
        for (const t of [Q, R, N, B]) {
            const b = document.createElement("button");
            b.innerHTML = `<span class="pc ${col}">${GLYPH[t]}</span>`;
            b.onclick = () => {
                $("promo-modal").classList.remove("open");
                const m = promoPending.find(x => x.promo === t);
                promoPending = null;
                commitMove(m);
            };
            wrap.appendChild(b);
        }
        $("promo-modal").classList.add("open");
    }

    // ---------- controls ----------
    function startNewGame() {
        S = newState();
        setStart(S);
        history = [];
        viewing = -1;
        selected = -1;
        legalCache = [];
        gameOver = false;
        engineBusy = false;
        $("over-modal").classList.remove("open");
        humanSide = $("side").value;
        orientation = humanSide === "b" ? "black" : "white";
        setEval(0);
        $("thoughts").textContent = "";
        setStatus("White to move. Good luck.");
        render();
        maybeEngineMove();
    }

    $("new").onclick = () => {
        if (history.length === 0 || confirm("Start a new game? The current one will be lost.")) startNewGame();
    };
    $("over-new").onclick = startNewGame;
    $("flip").onclick = () => {
        orientation = orientation === "white" ? "black" : "white";
        render();
    };
    $("prev").onclick = () => {
        if (viewing >= 0) {
            viewing--;
            selected = -1;
            render();
        }
    };
    $("next").onclick = () => {
        if (viewing < history.length - 1) {
            viewing++;
            selected = -1;
            render();
        }
    };
    $("side").onchange = () => {
        humanSide = $("side").value;
        orientation = humanSide === "b" ? "black" : "white";
        render();
        maybeEngineMove();
    };
    $("hints").onchange = render;

    $("undo").onclick = () => {
        if (engineBusy || !history.length) return;
        goLive();
        // undo engine reply + your move when playing vs engine
        const n = (humanSide !== "both" && history.length >= 2 && S.turn !== engineColor()) ? 2 : 1;
        for (let i = 0; i < n && history.length; i++) {
            S.reps[posKey(S)]--;
            // rebuild by replay (simplest correct path for reps & state)
            history.pop();
        }
        const st = newState();
        setStart(st);
        for (const h of history) {
            makeMove(st, h.m);
            const k = posKey(st);
            st.reps[k] = (st.reps[k] || 0) + 1;
        }
        S = st;
        gameOver = false;
        selected = -1;
        legalCache = [];
        viewing = history.length - 1;
        $("over-modal").classList.remove("open");
        setStatus(S.turn === WHITE ? "White to move." : "Black to move.");
        render();
    };

    $("hint").onclick = () => {
        if (gameOver || engineBusy || !atLive()) return;
        if (humanSide !== "both" && S.turn === engineColor()) return;
        $("thoughts").textContent = "Consulting the engine…";
        think(S, 3, (r) => {
            if (!r || gameOver) return;
            const all = legalMoves(S);
            const san = toSAN(S, r.move, all);
            $("thoughts").textContent = "";
            toast("Engine suggests: " + san);
            const a = squares[sqToIdx(r.move.from)], b = squares[sqToIdx(r.move.to)];
            for (const el of [a, b]) {
                el.classList.add("hinted");
                setTimeout(() => el.classList.remove("hinted"), 2600);
            }
        });
    };

    // ---------- save / load ----------
    $("save").onclick = () => {
        try {
            localStorage.setItem("midnightChess", JSON.stringify({
                moves: history.map(h => ({from: h.m.from, to: h.m.to, promo: h.m.promo || 0})),
                humanSide, level: $("level").value
            }));
            toast("Game saved.");
        } catch (e) {
            toast("Couldn't save (storage unavailable).");
        }
    };

    function loadSaved(silent) {
        let data;
        try {
            data = JSON.parse(localStorage.getItem("midnightChess"));
        } catch (e) {
        }
        if (!data || !Array.isArray(data.moves)) {
            if (!silent) toast("No saved game found.");
            return false;
        }
        $("side").value = data.humanSide || "w";
        if (data.level) $("level").value = data.level;
        startNewGameSilent();
        for (const rec of data.moves) {
            const all = legalMoves(S);
            const m = all.find(x => x.from === rec.from && x.to === rec.to && (x.promo || 0) === (rec.promo || 0));
            if (!m) break;
            const san = toSAN(S, m, all);
            const capturedType = m.captured ? TYPE(m.captured) : 0;
            makeMove(S, m);
            const k = posKey(S);
            S.reps[k] = (S.reps[k] || 0) + 1;
            history.push({m, san, capturedType});
        }
        viewing = history.length - 1;
        const res = gameResult(S);
        render();
        if (res.over) finish(res);
        else {
            setStatus(S.turn === WHITE ? "White to move." : "Black to move.");
            maybeEngineMove();
        }
        toast("Game loaded.");
        return true;
    }

    function startNewGameSilent() {
        S = newState();
        setStart(S);
        history = [];
        viewing = -1;
        selected = -1;
        legalCache = [];
        gameOver = false;
        engineBusy = false;
        humanSide = $("side").value;
        orientation = humanSide === "b" ? "black" : "white";
        setEval(0);
        $("thoughts").textContent = "";
    }

    $("load").onclick = () => loadSaved(false);

    // ---------- keyboard ----------
    window.addEventListener("keydown", e => {
        if (e.target.tagName === "SELECT" || e.target.tagName === "INPUT") return;
        const k = e.key.toLowerCase();
        if (e.key === "ArrowLeft") $("prev").click();
        else if (e.key === "ArrowRight") $("next").click();
        else if (k === "f") $("flip").click();
        else if (k === "h") $("hint").click();
        else if (k === "u") $("undo").click();
    });

    // ---------- boot ----------
    startNewGame();
    if (localStorage.getItem("midnightChess")) {
        $("thoughts").textContent = "A saved game exists — press Load to resume it.";
    }
</script>
<script src="../logo.js"></script>
</body>
