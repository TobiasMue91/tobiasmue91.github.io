<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
    <title>Pawpurr — A Game for Cats</title>
    <meta name="description"
          content="A game for your cat. Prey darts, freezes, and vanishes the way real prey does. Tuned to feline eyes and hunting instincts. Endless, low-clutter, paw-friendly.">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #070a12;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }

        canvas {
            display: block;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        #veil {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 16px;
            background: radial-gradient(circle at 50% 38%, #142640, #05080f 72%);
            color: #eef3ff;
            font-family: ui-rounded, "SF Pro Rounded", Avenir, system-ui, sans-serif;
            transition: opacity .5s ease;
            padding: 30px;
        }

        #veil.gone {
            opacity: 0;
            pointer-events: none;
        }

        #veil .paw {
            font-size: clamp(46px, 13vw, 84px);
            filter: drop-shadow(0 0 18px rgba(120, 200, 255, .5));
        }

        #veil h1 {
            font-size: clamp(38px, 11vw, 80px);
            font-weight: 800;
            letter-spacing: -.03em;
            color: #ffe14d;
            text-shadow: 0 0 40px rgba(255, 225, 77, .35);
            line-height: .9;
        }

        #veil p {
            font-size: clamp(15px, 4vw, 19px);
            max-width: 32ch;
            line-height: 1.5;
            opacity: .85;
        }

        #veil .tips {
            font-size: 13px;
            opacity: .5;
            max-width: 36ch;
            line-height: 1.6;
            margin-top: 2px;
        }

        #go {
            margin-top: 8px;
            background: #3aa0ff;
            color: #021024;
            border: none;
            font: inherit;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: .02em;
            padding: 16px 46px;
            border-radius: 50px;
            cursor: pointer;
            animation: pulse 2.6s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(58, 160, 255, .45)
            }
            70% {
                box-shadow: 0 0 0 26px rgba(58, 160, 255, 0)
            }
            100% {
                box-shadow: 0 0 0 0 rgba(58, 160, 255, 0)
            }
        }

        #tally {
            position: fixed;
            top: max(14px, env(safe-area-inset-top));
            left: max(14px, env(safe-area-inset-left));
            z-index: 5;
            font-family: ui-monospace, monospace;
            font-size: 13px;
            letter-spacing: .1em;
            color: rgba(255, 255, 255, .26);
            pointer-events: none;
            transition: opacity 1s ease;
            opacity: 0;
        }

        @media (prefers-reduced-motion: reduce) {
            #go {
                animation: none
            }
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tally">CAUGHT · 0</div>
<div id="veil">
    <div class="paw">🐾</div>
    <h1>Pawpurr</h1>
    <p>A game for your cat. The critters dart, freeze, and disappear — just like real prey. Lay the tablet flat and let
        them hunt.</p>
    <button id="go">Let them play</button>
    <div class="tips">Best flat on the floor in a sturdy case. Only a few targets at a time, tuned for cat eyes. It
        never ends — close the tab when playtime's over.
    </div>
</div>

<script>
    "use strict";
    const cv = document.getElementById("c"), x = cv.getContext("2d");
    let W, H, DPR;

    function size() {
        DPR = Math.min(2, devicePixelRatio || 1);
        W = innerWidth;
        H = innerHeight;
        cv.width = W * DPR;
        cv.height = H * DPR;
        cv.style.width = W + "px";
        cv.style.height = H + "px";
        x.setTransform(DPR, 0, 0, DPR, 0, 0);
    }

    addEventListener("resize", size);
    size();

    /* Cat-vision palette: blues & yellows, high contrast, no red-as-signal */
    const KINDS = [
        {fill: "#ffe14d", glow: "rgba(255,225,77,"},
        {fill: "#36c4ff", glow: "rgba(54,196,255,"},
        {fill: "#eaf2ff", glow: "rgba(234,242,255,"},
    ];
    const rnd = (a, b) => a + Math.random() * (b - a);
    const now = () => performance.now();
    // Hardening: clamp any negative radius so the canvas can never throw IndexSizeError.
    const _arc = CanvasRenderingContext2D.prototype.arc;
    CanvasRenderingContext2D.prototype.arc = function (cx, cy, r, a, b, c) {
        return _arc.call(this, cx, cy, r > 0 ? r : 0, a, b, c);
    };

    /* ====== PREY STATE MACHINE (the research core) ======
       Cats respond to quick DART -> sudden FREEZE -> vanish/HIDE -> reappear,
       not continuous drift. Max MAX_ACTIVE visible to avoid overstimulation. */
    const MAX_ACTIVE = 3, POOL = 6;
    const S = {HIDDEN: 0, EMERGE: 1, FREEZE: 2, DART: 3, FLEE: 4, POP: 5};

    class Critter {
        constructor() {
            this.k = KINDS[(Math.random() * KINDS.length) | 0];
            this.r = rnd(16, 24);
            this.face = 0;
            this.tw = Math.random() * 9;
            // personality: 0 = slow/hesitant lingerer, 1 = quick skittery darter
            this.skit = Math.random();
            this.hide(rnd(200, 1800));
        }

        hide(delay) {
            this.state = S.HIDDEN;
            this.alpha = 0;
            this.until = now() + delay;
            this.x = rnd(this.r * 3, W - this.r * 3);
            this.y = rnd(this.r * 3, H - this.r * 3);
        }

        emerge() {
            this.state = S.EMERGE;
            this.until = now() + rnd(180, 420);
            this.scale = 0;
            ripples.push({x: this.x, y: this.y, r: 4, a: .6, c: this.k.fill, grow: 1.4});
        }

        freeze() {
            this.state = S.FREEZE;
            // when the cat's been idle, hold the freeze longer = a real pounce window
            const linger = engage < 0.25 ? rnd(700, 1500) : rnd(250, 900);
            this.until = now() + linger;
            this.twitchAt = now() + rnd(120, 500);
        }

        dart() {
            this.state = S.DART;
            const ang = rnd(0, Math.PI * 2), dist = rnd(90, 260);
            this.fromx = this.x;
            this.fromy = this.y;
            this.tox = Math.max(this.r * 2, Math.min(W - this.r * 2, this.x + Math.cos(ang) * dist));
            this.toy = Math.max(this.r * 2, Math.min(H - this.r * 2, this.y + Math.sin(ang) * dist));
            this.t0 = now();
            // faster when skittery and when the cat is on a catching streak (adaptive)
            this.dur = rnd(130, 240) * (1 - this.skit * 0.4) * (1 - engage * 0.25);
            this.face = Math.atan2(this.toy - this.fromy, this.tox - this.fromx);
        }

        // an attention-grab: an injured-prey wiggle-and-bolt, used when the cat goes quiet
        lure() {
            this.state = S.DART;
            this.wounded = now() + 260;
            const ang = rnd(0, Math.PI * 2), dist = rnd(140, 300);
            this.fromx = this.x;
            this.fromy = this.y;
            this.tox = Math.max(this.r * 2, Math.min(W - this.r * 2, this.x + Math.cos(ang) * dist));
            this.toy = Math.max(this.r * 2, Math.min(H - this.r * 2, this.y + Math.sin(ang) * dist));
            this.t0 = now();
            this.dur = rnd(220, 360); // a touch slower/limping = wounded look
            this.face = Math.atan2(this.toy - this.fromy, this.tox - this.fromx);
        }

        flee(px, py) {
            this.state = S.FLEE;
            const ang = Math.atan2(this.y - py, this.x - px), dist = rnd(180, 320);
            this.fromx = this.x;
            this.fromy = this.y;
            this.tox = Math.max(this.r * 2, Math.min(W - this.r * 2, this.x + Math.cos(ang) * dist));
            this.toy = Math.max(this.r * 2, Math.min(H - this.r * 2, this.y + Math.sin(ang) * dist));
            this.t0 = now();
            this.dur = rnd(90, 150);
            this.face = ang;
        }

        pop() {
            this.state = S.POP;
            this.until = now() + 160;
            // satisfying "kill phase" closure: a little spray of particles
            bursts.push({x: this.x, y: this.y, r: 8, a: 1, c: this.k.fill});
            for (let i = 0; i < 7; i++) {
                const a = rnd(0, Math.PI * 2), s = rnd(1.5, 4.5);
                particles.push({x: this.x, y: this.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, a: 1, c: this.k.fill});
            }
            onCatch(this);
        }

        update(t) {
            switch (this.state) {
                case S.HIDDEN:
                    if (t >= this.until && activeCount() < MAX_ACTIVE) this.emerge();
                    break;
                case S.EMERGE: {
                    const p = 1 - Math.max(0, (this.until - t) / 420);
                    this.scale = Math.min(1, p * 1.2);
                    this.alpha = Math.min(1, p * 1.5);
                    if (t >= this.until) {
                        this.scale = 1;
                        this.alpha = 1;
                        this.freeze();
                    }
                    break;
                }
                case S.FREEZE:
                    if (t >= this.twitchAt) {
                        this.tw += 0.6;
                        this.twitchAt = t + rnd(150, 500);
                    }
                    if (t >= this.until) this.dart();
                    break;
                case S.DART:
                case S.FLEE: {
                    const p = Math.min(1, (t - this.t0) / this.dur);
                    const e = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
                    this.x = this.fromx + (this.tox - this.fromx) * e;
                    this.y = this.fromy + (this.toy - this.fromy) * e;
                    if (p >= 1) {
                        this.wounded = 0;
                        if (this.state === S.FLEE) {
                            this.alpha = 1;
                            this.hide(rnd(500, 1600));
                        } else {
                            (Math.random() < 0.7) ? this.freeze() : this.hide(rnd(300, 1100));
                        }
                    }
                    break;
                }
                case S.POP:
                    this.alpha = Math.max(0, (this.until - t) / 160);
                    if (t >= this.until) this.hide(rnd(700, 2200));
                    break;
            }
        }

        draw() {
            if (this.state === S.HIDDEN || this.alpha <= 0.01) return;
            const a = this.alpha;
            const g = x.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 3);
            g.addColorStop(0, this.k.glow + (0.5 * a) + ")");
            g.addColorStop(1, "rgba(0,0,0,0)");
            x.fillStyle = g;
            x.beginPath();
            x.arc(this.x, this.y, this.r * 3, 0, 7);
            x.fill();
            const sc = this.state === S.EMERGE ? this.scale : 1, r = this.r;
            x.save();
            x.globalAlpha = a;
            x.translate(this.x, this.y);
            // a wounded-prey limp: a little extra roll while luring
            let roll = this.face;
            if (this.wounded && now() < this.wounded + this.dur) roll += Math.sin(now() / 45) * 0.5;
            x.rotate(roll);
            x.scale(sc, sc);
            x.fillStyle = this.k.fill;
            x.strokeStyle = this.k.fill;
            x.lineWidth = 3;
            x.lineCap = "round";
            const sh = Math.sin(this.tw) * 4;
            for (let i = -1; i <= 1; i++) {
                const off = i * 6;
                x.beginPath();
                x.moveTo(off, -r * 0.45);
                x.lineTo(off - 5, -r - 3 + sh);
                x.stroke();
                x.beginPath();
                x.moveTo(off, r * 0.45);
                x.lineTo(off - 5, r + 3 - sh);
                x.stroke();
            }
            x.beginPath();
            x.ellipse(0, 0, r * 1.1, r * 0.78, 0, 0, 7);
            x.fill();
            x.beginPath();
            x.arc(r * 0.85, 0, r * 0.5, 0, 7);
            x.fill();
            x.lineWidth = 2;
            x.beginPath();
            x.moveTo(r * 1.1, -3);
            x.lineTo(r * 1.7, -8 + Math.sin(this.tw) * 3);
            x.moveTo(r * 1.1, 3);
            x.lineTo(r * 1.7, 8 + Math.cos(this.tw) * 3);
            x.stroke();
            x.restore();
        }
    }

    function activeCount() {
        return critters.filter(c => c.state !== S.HIDDEN).length;
    }

    /* ====== THE STRING: a ribbon that peeks from an edge, wiggles, whips back ====== */
    class StringTease {
        constructor() {
            this.tipx = null;
            this.schedule(rnd(4000, 9000));
        }

        schedule(d) {
            this.active = false;
            this.next = now() + d;
            this.tipx = null;
        }

        start() {
            this.active = true;
            this.t0 = now();
            this.dur = rnd(2200, 3800);
            this.edge = (Math.random() * 4) | 0;
            this.pos = rnd(0.2, 0.8);
            this.k = KINDS[(Math.random() * KINDS.length) | 0];
            this.len = rnd(140, 260);
            this.phase = Math.random() * 9;
        }

        update(t) {
            if (!this.active) {
                if (t >= this.next && activeCount() < MAX_ACTIVE) this.start();
                return;
            }
            this.phase += 0.18;
            if (t - this.t0 >= this.dur) this.schedule(rnd(5000, 12000));
        }

        draw(t) {
            if (!this.active) return;
            const p = (t - this.t0) / this.dur;
            let ext = p < 0.18 ? (p / 0.18) : p > 0.82 ? (1 - (p - 0.82) / 0.18) : 1;
            ext = Math.max(0, Math.min(1, ext));          // guard: never negative
            const L = this.len * ext;
            let ax, ay, dx, dy;
            if (this.edge === 0) {
                ax = W * this.pos;
                ay = 0;
                dx = 0;
                dy = 1;
            } else if (this.edge === 1) {
                ax = W;
                ay = H * this.pos;
                dx = -1;
                dy = 0;
            } else if (this.edge === 2) {
                ax = W * this.pos;
                ay = H;
                dx = 0;
                dy = -1;
            } else {
                ax = 0;
                ay = H * this.pos;
                dx = 1;
                dy = 0;
            }
            x.save();
            x.lineCap = "round";
            x.lineJoin = "round";
            x.strokeStyle = this.k.fill;
            const seg = 14;
            let px = ax, py = ay;
            for (let i = 1; i <= seg; i++) {
                const f = i / seg, along = L * f;
                const perp = Math.sin(this.phase + f * 6) * 18 * f * ext;
                const nx = ax + dx * along + (-dy) * perp, ny = ay + dy * along + (dx) * perp;
                x.lineWidth = Math.max(1, 9 * (1 - f));
                x.globalAlpha = 0.9 * ext;
                x.beginPath();
                x.moveTo(px, py);
                x.lineTo(nx, ny);
                x.stroke();
                px = nx;
                py = ny;
            }
            x.globalAlpha = ext;
            x.fillStyle = this.k.fill;
            x.beginPath();
            x.arc(px, py, 5 * ext, 0, 7);
            x.fill();
            x.restore();
            this.tipx = px;
            this.tipy = py;
        }
    }

    /* ====== paws / touch ====== */
    let lastPaw = now();

    function pawAt(px, py) {
        lastPaw = now();
        engage = Math.min(1, engage + 0.12);   // contact raises engagement
        for (const c of critters) {
            if (c.state === S.HIDDEN || c.state === S.POP) continue;
            const d = Math.hypot(c.x - px, c.y - py);
            if (d < c.r + 26) c.pop(); else if (d < 150) c.flee(px, py);
        }
        if (tease.active && tease.tipx != null) {
            if (Math.hypot(tease.tipx - px, tease.tipy - py) < 40) {
                tease.t0 = now() - tease.dur * 0.85;
                chirp(740);
                bursts.push({x: tease.tipx, y: tease.tipy, r: 6, a: 1, c: tease.k.fill});
            }
        }
    }

    cv.addEventListener("pointerdown", e => pawAt(e.clientX, e.clientY), {passive: true});
    cv.addEventListener("pointermove", e => {
        if (e.pressure > 0 || e.buttons) pawAt(e.clientX, e.clientY);
    }, {passive: true});

    /* ====== catch feedback ====== */
    let score = 0, bursts = [], ripples = [], particles = [];
    // engage: 0..1 rolling measure of how active the cat is. Drives adaptive difficulty.
    let engage = 0.3;
    const tally = document.getElementById("tally");

    function onCatch(c) {
        score++;
        engage = Math.min(1, engage + 0.18);
        chirp(c.k.fill === "#ffe14d" ? 620 : 760);
        tally.textContent = "CAUGHT · " + score;
        tally.style.opacity = .85;
        clearTimeout(onCatch._t);
        onCatch._t = setTimeout(() => tally.style.opacity = 0, 1400);
    }

    let actx;

    function chirp(f) {
        try {
            actx = actx || new (window.AudioContext || webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = "triangle";
            o.frequency.value = f;
            o.connect(g);
            g.connect(actx.destination);
            g.gain.setValueAtTime(0.0001, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.045, actx.currentTime + 0.012);
            g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.13);
            o.start();
            o.stop(actx.currentTime + 0.15);
        } catch (e) {
        }
    }

    /* ====== loop ====== */
    const critters = Array.from({length: POOL}, () => new Critter());
    const tease = new StringTease();
    let lureAt = 0;

    function frame(t) {
        // engagement slowly fades; this is what makes prey slow & linger when ignored
        engage = Math.max(0, engage - 0.0012);
        x.fillStyle = "rgba(7,10,18,0.32)";
        x.fillRect(0, 0, W, H);

        // attention rescue: if untouched for a while, send a wounded-prey lure
        if (t - lastPaw > 4500 && t > lureAt) {
            const cand = critters.filter(c => c.state === S.FREEZE || c.state === S.EMERGE);
            if (cand.length) {
                cand[(Math.random() * cand.length) | 0].lure();
            }
            lureAt = t + rnd(2600, 4200);
        }

        tease.update(t);
        tease.draw(t);
        for (const c of critters) {
            c.update(t);
            c.draw();
        }

        for (const r of ripples) {
            r.r += (r.grow || 2);
            r.a -= 0.02;
            x.globalAlpha = Math.max(0, r.a);
            x.strokeStyle = r.c;
            x.lineWidth = 2;
            x.beginPath();
            x.arc(r.x, r.y, r.r, 0, 7);
            x.stroke();
            x.globalAlpha = 1;
        }
        ripples = ripples.filter(r => r.a > 0);
        for (const b of bursts) {
            b.r += 2.6;
            b.a -= 0.04;
            x.globalAlpha = Math.max(0, b.a);
            x.strokeStyle = b.c;
            x.lineWidth = 3;
            x.beginPath();
            x.arc(b.x, b.y, b.r, 0, 7);
            x.stroke();
            x.globalAlpha = 1;
        }
        bursts = bursts.filter(b => b.a > 0);
        for (const pt of particles) {
            pt.x += pt.vx;
            pt.y += pt.vy;
            pt.vx *= 0.92;
            pt.vy *= 0.92;
            pt.a -= 0.045;
            x.globalAlpha = Math.max(0, pt.a);
            x.fillStyle = pt.c;
            x.beginPath();
            x.arc(pt.x, pt.y, 2.4, 0, 7);
            x.fill();
            x.globalAlpha = 1;
        }
        particles = particles.filter(pt => pt.a > 0);
        requestAnimationFrame(frame);
    }

    document.getElementById("go").addEventListener("click", () => {
        document.getElementById("veil").classList.add("gone");
        try {
            actx = new (window.AudioContext || webkitAudioContext)();
        } catch (e) {
        }
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen().catch(() => {
        });
    });
    requestAnimationFrame(frame);
</script>
</body>
</html>
