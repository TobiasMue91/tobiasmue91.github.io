<script>
    "use strict";
    /* ============================================================
     DUCK HUNT '26 — a love letter to the NES Zapper.
     Everything procedural: pixel art painted in code,
     sound synthesized with WebAudio. Zero assets.
     ============================================================ */

    const W = 480, H = 300, SCALE_PAD = 0;
    const cv = document.getElementById('game');
    const cx = cv.getContext('2d');
    cv.width = W;
    cv.height = H;

    function fit() {
        const s = Math.min(innerWidth / W, innerHeight / H) * 0.96;
        cv.style.width = (W * s) + 'px';
        cv.style.height = (H * s) + 'px';
    }

    addEventListener('resize', fit);
    fit();

    /* ---------------- Audio: tiny NES-ish synth ---------------- */
    let AC = null;

    function ac() {
        if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
        if (AC.state === 'suspended') AC.resume();
        return AC;
    }

    function env(g, t, a, d, peak = 0.25) {
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(peak, t + a);
        g.gain.exponentialRampToValueAtTime(0.0001, t + a + d);
    }

    function blip(freq, type = 'square', a = 0.005, d = 0.12, peak = 0.2, slideTo = null, dur = null) {
        const A = ac(), t = A.currentTime;
        const o = A.createOscillator(), g = A.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t);
        if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + (dur || a + d));
        env(g, t, a, d, peak);
        o.connect(g).connect(A.destination);
        o.start(t);
        o.stop(t + a + d + 0.05);
    }

    function noise(d = 0.15, peak = 0.3, hp = 800) {
        const A = ac(), t = A.currentTime;
        const len = A.sampleRate * d, buf = A.createBuffer(1, len, A.sampleRate);
        const ch = buf.getChannelData(0);
        for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / len);
        const src = A.createBufferSource();
        src.buffer = buf;
        const f = A.createBiquadFilter();
        f.type = 'highpass';
        f.frequency.value = hp;
        const g = A.createGain();
        g.gain.value = peak;
        src.connect(f).connect(g).connect(A.destination);
        src.start(t);
    }

    const SFX = {
        shot() {
            noise(0.18, 0.35, 600);
            blip(180, 'square', 0.002, 0.08, 0.18, 60, 0.09);
        },
        empty() {
            blip(140, 'square', 0.002, 0.05, 0.12);
        },
        quack() {
            blip(340, 'square', 0.01, 0.09, 0.14, 220, 0.1);
        },
        hit() {
            blip(880, 'square', 0.002, 0.06, 0.18);
            setTimeout(() => blip(1320, 'square', 0.002, 0.08, 0.16), 60);
        },
        fall() {
            blip(1400, 'triangle', 0.01, 0.7, 0.12, 200, 0.7);
        },
        thud() {
            noise(0.08, 0.25, 100);
            blip(70, 'triangle', 0.002, 0.1, 0.2);
        },
        flyoff() {
            blip(500, 'square', 0.01, 0.25, 0.1, 900, 0.25);
        },
        laugh() {
            [420, 500, 420, 500, 420].forEach((f, i) => setTimeout(() => blip(f, 'square', 0.005, 0.08, 0.12), i * 110));
        },
        round() {
            [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => blip(f, 'square', 0.004, 0.12, 0.15), i * 100));
        },
        perfect() {
            [784, 988, 1175, 1568, 1976].forEach((f, i) => setTimeout(() => blip(f, 'square', 0.004, 0.14, 0.15), i * 80));
        },
        over() {
            [392, 330, 262, 196].forEach((f, i) => setTimeout(() => blip(f, 'triangle', 0.005, 0.25, 0.16), i * 180));
        },
        honk() {
            blip(190, 'sawtooth', 0.01, 0.22, 0.16, 150, 0.22);
        },
        power() {
            [660, 880, 1320].forEach((f, i) => setTimeout(() => blip(f, 'square', 0.003, 0.09, 0.14), i * 60));
        },
        bossdie() {
            [1046, 880, 1046, 1318, 1568].forEach((f, i) => setTimeout(() => blip(f, 'square', 0.004, 0.13, 0.16), i * 90));
            noise(0.4, 0.25, 300);
        },
    };

    /* ---------------- Music: 4-layer chiptune engine ----------------
     Layers: LEAD (square w/ vibrato), HARM (arpeggiated square),
             BASS (triangle), DRUMS (noise hat/snare + pitch-drop kick).
     Pattern data is 16th-note steps; '.' = rest, '-' = tie/sustain.  */
    const NOTE = (() => { // name -> freq
        const N = {}, names = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        for (let o = 1; o <= 7; o++) names.forEach((n, i) => N[n + o] = 440 * Math.pow(2, (o * 12 + i - 57) / 12));
        return N;
    })();

    // --- The tune: "Open Season" — bouncy hunting romp, A(4 bars) + B(4 bars)
    // 16 steps per bar. Uppercase entries are note names; null = rest; '-' = hold.
    const q = '-';
    const LEAD_A = [
        'E5', q, 'G5', q, 'C6', q, 'G5', q, 'A5', q, 'G5', 'E5', q, 'D5', 'E5', q,
        'F5', q, 'A5', q, 'C6', q, 'A5', q, 'B5', 'A5', 'G5', q, 'E5', q, null, null,
        'E5', q, 'G5', q, 'C6', q, 'D6', q, 'E6', q, 'D6', 'C6', q, 'B5', 'C6', q,
        'D6', 'C6', 'B5', 'A5', 'G5', q, 'E5', q, 'G5', q, q, q, null, null, null, null];
    const LEAD_B = [
        'C6', q, q, 'B5', 'C6', q, 'E6', q, 'D6', q, 'C6', 'B5', q, 'A5', q, null,
        'A5', q, q, 'G5', 'A5', q, 'C6', q, 'B5', q, 'A5', 'G5', q, 'E5', q, null,
        'F5', 'G5', 'A5', q, 'C6', q, 'A5', q, 'D6', q, 'C6', 'B5', q, 'C6', q, null,
        'E6', q, 'D6', q, 'C6', q, 'G5', q, 'C6', q, q, q, q, q, null, null];
    const HARM_A = [ // offbeat arps (root-5th-oct stabs)
        null, 'C4', null, 'E4', null, 'G4', null, 'E4', null, 'C4', null, 'E4', null, 'G4', null, 'E4',
        null, 'F4', null, 'A4', null, 'C5', null, 'A4', null, 'G4', null, 'B4', null, 'D5', null, 'B4',
        null, 'C4', null, 'E4', null, 'G4', null, 'E4', null, 'A4', null, 'C5', null, 'E5', null, 'C5',
        null, 'F4', null, 'A4', null, 'G4', null, 'B4', null, 'C5', null, 'E5', null, 'G5', null, null];
    const HARM_B = [
        null, 'A4', null, 'C5', null, 'E5', null, 'C5', null, 'A4', null, 'C5', null, 'E5', null, 'C5',
        null, 'F4', null, 'A4', null, 'C5', null, 'A4', null, 'E4', null, 'G4', null, 'B4', null, 'G4',
        null, 'F4', null, 'A4', null, 'D5', null, 'A4', null, 'G4', null, 'B4', null, 'D5', null, 'B4',
        null, 'G4', null, 'B4', null, 'D5', null, 'B4', null, 'C5', null, 'E5', null, 'G5', null, null];
    const BASS_A = [
        'C3', q, q, q, 'C3', q, 'G2', q, 'C3', q, q, q, 'E3', q, 'G3', q,
        'F2', q, q, q, 'F3', q, 'F2', q, 'G2', q, q, q, 'G3', q, 'B2', q,
        'C3', q, q, q, 'C3', q, 'G2', q, 'A2', q, q, q, 'A3', q, 'E3', q,
        'F2', q, 'F3', q, 'G2', q, 'G3', q, 'C3', q, 'G2', q, 'E2', q, 'C2', q];
    const BASS_B = [
        'A2', q, q, q, 'A2', q, 'E3', q, 'A2', q, q, q, 'C3', q, 'E3', q,
        'F2', q, q, q, 'F3', q, 'C3', q, 'E2', q, q, q, 'E3', q, 'B2', q,
        'D3', q, q, q, 'D3', q, 'A2', q, 'G2', q, q, q, 'G3', q, 'D3', q,
        'G2', q, 'G3', q, 'B2', q, 'D3', q, 'C3', q, 'E3', q, 'G3', q, 'C3', q];
    // drums: k=kick, s=snare, h=hat, H=open hat
    const DRUM_A = 'k.h.s.hhk.h.s.hHk.h.s.hhk.hks.hH'.repeat(2).split('');
    const DRUM_B = 'k.h.s.hhkkh.s.hHk.h.s.hhk.hks.sH'.repeat(2).split('');

    const music = {
        on: false, step: 0, section: 0, next: 0, bpm: 172, master: null, full: false,
        gain(A) {
            if (!this.master) {
                this.master = A.createGain();
                this.master.gain.value = 0.5;
                this.master.connect(A.destination);
            }
            return this.master;
        },
    };

    function mTone(A, when, freq, dur, type, vol, opts = {}) {
        const o = A.createOscillator(), g = A.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, when);
        if (opts.vibrato) {
            const lfo = A.createOscillator(), lg = A.createGain();
            lfo.frequency.value = 6;
            lg.gain.value = freq * 0.012;
            lfo.connect(lg).connect(o.frequency);
            lfo.start(when);
            lfo.stop(when + dur);
        }
        if (opts.slideTo) o.frequency.exponentialRampToValueAtTime(opts.slideTo, when + dur);
        g.gain.setValueAtTime(0.0001, when);
        g.gain.exponentialRampToValueAtTime(vol, when + 0.008);
        g.gain.setValueAtTime(vol, when + dur * 0.7);
        g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
        o.connect(g).connect(music.gain(A));
        o.start(when);
        o.stop(when + dur + 0.03);
    }

    function mNoise(A, when, dur, vol, hp) {
        const len = Math.max(1, A.sampleRate * dur), buf = A.createBuffer(1, len, A.sampleRate);
        const ch = buf.getChannelData(0);
        for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / len);
        const s = A.createBufferSource();
        s.buffer = buf;
        const f = A.createBiquadFilter();
        f.type = 'highpass';
        f.frequency.value = hp;
        const g = A.createGain();
        g.gain.value = vol;
        s.connect(f).connect(g).connect(music.gain(A));
        s.start(when);
    }

    function noteAt(pat, i) { // resolve note + sustained length in steps
        const v = pat[i];
        if (!v || v === q) return null;
        let len = 1;
        while (pat[(i + len) % pat.length] === q && len < 8) len++;
        return {f: NOTE[v], len};
    }

    function scheduleStep(A, when, stepDur) {
        const i = music.step % 64;
        const A_sec = music.section % 2 === 0;
        const lead = A_sec ? LEAD_A : LEAD_B, harm = A_sec ? HARM_A : HARM_B;
        const bass = A_sec ? BASS_A : BASS_B, drum = A_sec ? DRUM_A : DRUM_B;
        const n1 = noteAt(lead, i), n2 = noteAt(harm, i), n3 = noteAt(bass, i);
        if (n1 && music.full) mTone(A, when, n1.f, n1.len * stepDur * 0.92, 'square', 0.13, {vibrato: n1.len > 2});
        if (n2) mTone(A, when, n2.f, stepDur * 0.85, 'square', 0.05);
        if (n3) mTone(A, when, n3.f, n3.len * stepDur * 0.95, 'triangle', 0.20);
        const d = drum[i];
        if (music.full) {
            if (d === 'k') mTone(A, when, 130, 0.10, 'triangle', 0.32, {slideTo: 40});
            if (d === 's') {
                mNoise(A, when, 0.09, 0.16, 1200);
                mTone(A, when, 190, 0.06, 'triangle', 0.10, {slideTo: 120});
            }
            if (d === 'h') mNoise(A, when, 0.03, 0.07, 6000);
            if (d === 'H') mNoise(A, when, 0.10, 0.08, 5500);
        } else if (d === 'h' || d === 'H') mNoise(A, when, 0.03, 0.04, 7000);
        music.step++;
        if (music.step % 64 === 0) music.section++;
    }

    function musicTick() {
        if (!music.on || muted) return;
        const A = ac();
        const stepDur = 60 / music.bpm / 4;
        while (music.next < A.currentTime + 0.12) {
            if (music.next < A.currentTime) music.next = A.currentTime + 0.02;
            scheduleStep(A, music.next, stepDur);
            music.next += stepDur;
        }
    }

    setInterval(musicTick, 30);

    function startMusic(full) {
        const A = ac();
        music.full = full;
        if (!music.on) {
            music.on = true;
            music.step = 0;
            music.section = 0;
            music.next = A.currentTime + 0.05;
        }
    }

    function stopMusic() {
        music.on = false;
    }

    /* ---------------- Helpers ---------------- */
    const rnd = (a, b) => a + Math.random() * (b - a);
    const irnd = (a, b) => Math.floor(rnd(a, b + 1));
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const lerp = (a, b, t) => a + (b - a) * t;

    function lerpColor(c1, c2, t) {
        return `rgb(${Math.round(lerp(c1[0], c2[0], t))},${Math.round(lerp(c1[1], c2[1], t))},${Math.round(lerp(c1[2], c2[2], t))})`;
    }

    function px(x, y, w, h, color) {
        cx.fillStyle = color;
        cx.fillRect(Math.round(x), Math.round(y), w, h);
    }

    /* ---------------- Game state ---------------- */
    const ST = {TITLE: 0, PLAY: 1, ROUNDCARD: 2, GAMEOVER: 3};
    let state = ST.TITLE;
    let mouse = {x: W / 2, y: H / 2, inside: false};
    let shake = 0, flash = 0;
    let score = 0, best = 0, round = 1, ammo = 3;
    let wave = 0, wavesPerRound = 5, hitsThisRound = 0, ducksThisRound = 0;
    let combo = 0, comboTimer = 0;
    let ducks = [], feathers = [], popups = [], clouds = [], shells = [];
    let pickups = [], fireflies = [];
    let freezeT = 0, doubleT = 0;      // power-up timers
    let bossWave = false;
    let dog = null;           // {t, mode:'laugh'|'fetch', count}

    /* best score persists on gptgames.dev; degrades gracefully where storage is blocked */
    const store = {
        get(k) {
            try {
                return localStorage.getItem(k);
            } catch (e) {
                return null;
            }
        },
        set(k, v) {
            try {
                localStorage.setItem(k, v);
            } catch (e) {
            }
        },
    };
    best = parseInt(store.get('duckhunt26_best') || '0', 10) || 0;
    let waveTimer = 0;        // time left for current wave (flyaway)
    let cardTimer = 0, cardText = '', cardSub = '';
    let time = 0, frame = 0;
    let muted = false;
    let flashRing = null;     // muzzle ring {x,y,t}
    let perfectRound = true;
    let titlePulse = 0;

    /* clouds */
    for (let i = 0; i < 5; i++) clouds.push({x: rnd(0, W), y: rnd(15, 90), s: rnd(0.5, 1.2), v: rnd(2, 6)});

    /* trees: fixed, varied layout so the horizon looks composed */
    const TREES = [];
    (function () {
        let x = 14;
        while (x < W - 10) {
            TREES.push({x, s: rnd(0.7, 1.25)});
            x += irnd(34, 62);
        }
    })();

    /* ---------------- Sky / palette (day → dusk per round) ---------------- */
    function skyT() {
        return clamp((round - 1) / 6, 0, 1);
    }  // 0=day, 1=dusk
    const SKY_TOP = [[96, 168, 240], [46, 26, 74]];
    const SKY_BOT = [[168, 216, 248], [214, 88, 64]];
    const GRASS_A = [[64, 152, 56], [38, 72, 52]];
    const GRASS_B = [[48, 120, 44], [28, 54, 42]];
    const TREE_COL = [[34, 102, 38], [24, 48, 40]];

    /* ---------------- Ducks ---------------- */
    const DUCK_COLORS = [
        {body: '#7a4a1e', head: '#1e6b2e', wing: '#5a3414', belly: '#d9c9a0', beak: '#f2a416'}, // mallard-ish
        {body: '#333340', head: '#8a2020', wing: '#222230', belly: '#8888a0', beak: '#f2a416'}, // dark red-head
        {body: '#3a6ea8', head: '#20304a', wing: '#2a5280', belly: '#bcd6ee', beak: '#f2c04a'}, // rare blue: bonus!
    ];

    function spawnDucks() {
        bossWave = (round % 3 === 0 && wave >= wavesPerRound - 1);
        if (bossWave) {
            ammo = 6;
            waveTimer = 14;
            ducks.push({
                x: W / 2, y: 90, vx: 70 + round * 8, vy: 0,
                speed: 70 + round * 8, type: 0, rare: false,
                boss: true, hp: 4 + Math.floor(round / 3) * 2, maxHp: 4 + Math.floor(round / 3) * 2,
                stateT: 0, mode: 'fly', flap: 0, turnT: 0, quackT: 1, bobT: rnd(0, 6),
            });
            ducksThisRound++;
            if (!muted) SFX.honk();
            return;
        }
        ammo = 3;
        waveTimer = Math.max(4.5, 8 - round * 0.5);
        const n = round >= 3 ? 2 : (wave % 2 === 1 && round >= 2 ? 2 : 1);
        for (let i = 0; i < n; i++) {
            const rare = Math.random() < 0.08;
            const type = rare ? 2 : irnd(0, 1);
            const speed = (55 + round * 14 + rnd(-8, 8)) * (rare ? 1.5 : 1);
            ducks.push({
                x: rnd(60, W - 60), y: H - 60,
                vx: rnd(-1, 1) < 0 ? -speed : speed,
                vy: -rnd(speed * 0.5, speed * 0.9),
                speed, type, rare,
                stateT: 0, mode: 'fly',       // fly | hit | fall | gone | flyaway
                flap: rnd(0, 6), turnT: rnd(0.4, 1.2),
                quackT: rnd(1, 4),
            });
            ducksThisRound++;
        }
    }

    function updateDucks(dt) {
        const spd = freezeT > 0 ? 0.3 : 1;   // time freeze slows the flock
        for (const d of ducks) {
            d.flap += dt * (10 + d.speed / 20) * spd;
            if (d.boss && d.mode === 'fly') {
                d.bobT += dt * spd;
                d.x += d.vx * dt * spd;
                d.y = 90 + Math.sin(d.bobT * 2.2) * 46;
                if (d.x < 50) {
                    d.x = 50;
                    d.vx = Math.abs(d.vx);
                }
                if (d.x > W - 50) {
                    d.x = W - 50;
                    d.vx = -Math.abs(d.vx);
                }
                d.quackT -= dt;
                if (d.quackT <= 0) {
                    if (!muted) SFX.honk();
                    d.quackT = rnd(2.5, 4.5);
                }
                continue;
            }
            if (d.mode === 'fly' || d.mode === 'flyaway') {
                d.quackT -= dt;
                if (d.quackT <= 0 && d.mode === 'fly') {
                    if (!muted) SFX.quack();
                    d.quackT = rnd(2, 5);
                }
                if (d.mode === 'fly') {
                    d.turnT -= dt * spd;
                    if (d.turnT <= 0) {
                        d.turnT = rnd(0.5, 1.4);
                        const ang = rnd(0, Math.PI * 2);
                        d.vx = Math.cos(ang) * d.speed;
                        d.vy = Math.sin(ang) * d.speed * 0.8;
                        if (d.y > H - 110 && d.vy > 0) d.vy = -Math.abs(d.vy);
                    }
                    d.x += d.vx * dt * spd;
                    d.y += d.vy * dt * spd;
                    if (d.x < 20) {
                        d.x = 20;
                        d.vx = Math.abs(d.vx);
                    }
                    if (d.x > W - 20) {
                        d.x = W - 20;
                        d.vx = -Math.abs(d.vx);
                    }
                    if (d.y < 24) {
                        d.y = 24;
                        d.vy = Math.abs(d.vy);
                    }
                    if (d.y > H - 80) {
                        d.y = H - 80;
                        d.vy = -Math.abs(d.vy);
                    }
                } else { // flyaway: soar up
                    d.vy = -140;
                    d.x += d.vx * dt * 0.6;
                    d.y += d.vy * dt;
                    if (d.y < -30) d.mode = 'gone';
                }
            } else if (d.mode === 'hit') {
                d.stateT += dt;
                if (d.stateT > 0.45) {
                    d.mode = 'fall';
                    if (!muted) SFX.fall();
                }
            } else if (d.mode === 'fall') {
                d.y += 260 * dt;
                d.flap += dt * 30;
                if (d.y > H - 62) {
                    d.mode = 'gone';
                    if (!muted) SFX.thud();
                    dog = {t: 0, mode: 'fetch', x: d.x, count: 1};
                }
            }
        }
        ducks = ducks.filter(d => d.mode !== 'gone');
    }

    function drawDuck(d) {
        const c = d.boss
            ? {body: '#9aa0a8', head: '#2a2a30', wing: '#6a7078', belly: '#e8e8ec', beak: '#f28030'}
            : DUCK_COLORS[d.type];
        const flap = d.mode === 'hit' ? 0 : Math.sin(d.flap);
        const dir = d.vx >= 0 ? 1 : -1;
        cx.save();
        cx.translate(Math.round(d.x), Math.round(d.y));
        if (shakeVal()) cx.translate(rnd(-1, 1), rnd(-1, 1));
        if (d.boss) {
            // HP pips above (drawn unscaled/unflipped)
            if (d.mode === 'fly') {
                for (let i = 0; i < d.maxHp; i++) {
                    cx.fillStyle = i < d.hp ? '#ff5a3c' : 'rgba(0,0,0,0.35)';
                    cx.fillRect(-d.maxHp * 4 + i * 8, -34, 6, 5);
                }
            }
            cx.scale(2.2, 2.2);
            if (d.hitFlash > 0) {
                d.hitFlash -= 0.05;
                cx.globalAlpha = 0.55;
            }
        }
        cx.scale(dir, 1);
        if (d.mode === 'hit') {
            // stunned: flipped, X eyes
            cx.rotate(Math.sin(d.stateT * 30) * 0.15);
        }
        if (d.mode === 'fall') cx.rotate(Math.PI);
        // pixel duck ~26x18
        const B = c.body, HD = c.head, WG = c.wing, BL = c.belly, BK = c.beak;
        const p = (x, y, w, h, col) => {
            cx.fillStyle = col;
            cx.fillRect(x, y, w, h);
        };
        // body
        p(-10, -4, 18, 9, B);
        p(-8, 4, 14, 3, BL);
        p(-13, -2, 4, 5, B);                    // tail
        // head + neck
        p(6, -9, 8, 7, HD);
        p(5, -4, 5, 4, HD);
        // beak
        p(13, -7, 5, 3, BK);
        // eye
        if (d.mode === 'hit') {
            p(9, -8, 1, 1, '#fff');
            p(11, -6, 1, 1, '#fff');
            p(10, -7, 1, 1, '#000');
        } else p(10, -7, 2, 2, '#000');
        // wing: 3-frame flap, always rooted at the shoulder (-4,-2)
        // frame 0 = up, 1 = mid, 2 = down
        const wf = d.mode === 'fall' ? 1 : (flap > 0.35 ? 0 : flap < -0.35 ? 2 : 1);
        if (wf === 0) {          // raised: stacked upward from the shoulder
            p(-6, -4, 9, 3, WG);   // root, overlaps body
            p(-5, -7, 7, 3, WG);
            p(-4, -10, 5, 3, WG);
        } else if (wf === 1) {   // mid: flat along the back
            p(-8, -4, 12, 3, WG);
            p(-6, -6, 8, 2, WG);
        } else {                 // down: folded over the flank, inside the body
            p(-7, -2, 11, 4, WG);
            p(-5, 2, 8, 2, WG);   // tip tucked against the belly line
        }
        // rare sparkle
        if (d.rare && frame % 20 < 10) {
            p(irnd(-10, 12), irnd(-10, 4), 1, 1, '#fff');
        }
        cx.restore();
    }

    /* ---------------- Shooting ---------------- */
    function shoot(x, y) {
        if (state !== ST.PLAY) return;
        // collecting a power-up is free — check before spending a shell
        for (const p of pickups) {
            if (!p.taken && Math.hypot(p.x - x, p.y - y) < 16) {
                p.taken = true;
                applyPickup(p.kind, p.x, p.y);
                return;
            }
        }
        if (ammo <= 0) {
            if (!muted) SFX.empty();
            return;
        }
        ammo--;
        if (!muted) SFX.shot();
        shake = 5;
        flash = 0.5;
        flashRing = {x, y, t: 0};
        let hitAny = false;
        const live = ducks.filter(d => d.mode === 'fly' || d.mode === 'flyaway');
        live.sort((a, b) => ((a.x - x) ** 2 + (a.y - y) ** 2) - ((b.x - x) ** 2 + (b.y - y) ** 2));
        for (const d of live) {
            const dist = Math.hypot(d.x - x, d.y - y);
            const radius = d.boss ? 34 : 18;
            if (dist < radius) {
                hitAny = true;
                combo++;
                comboTimer = 3;
                const mult = (doubleT > 0 ? 2 : 1);
                if (d.boss) {
                    d.hp--;
                    d.hitFlash = 1;
                    const pts = 150 * combo * mult;
                    score += pts;
                    popups.push({x: d.x, y: d.y - 40, t: 0, text: pts + '', rare: false});
                    for (let i = 0; i < 8; i++) feathers.push({
                        x: x,
                        y: y,
                        vx: rnd(-60, 60),
                        vy: rnd(-80, 0),
                        t: 0,
                        col: i % 2 ? '#e8e8ec' : '#9aa0a8',
                        r: rnd(0, Math.PI)
                    });
                    if (d.hp <= 0) {
                        d.mode = 'hit';
                        d.stateT = 0;
                        hitsThisRound++;
                        const bonus = 1000 * mult + round * 200;
                        score += bonus;
                        popups.push({x: d.x, y: d.y - 20, t: 0, text: 'GOOSE DOWN! +' + bonus, rare: true});
                        if (!muted) SFX.bossdie();
                        shake = 10;
                        // the goose always drops a gift
                        dropPickup(d.x, d.y, ['shell', 'freeze', 'double'][irnd(0, 2)]);
                    } else if (!muted) SFX.hit();
                } else {
                    d.mode = 'hit';
                    d.stateT = 0;
                    const base = d.rare ? 500 : 100 + (round - 1) * 25;
                    const pts = base * combo * mult;
                    score += pts;
                    hitsThisRound++;
                    popups.push({
                        x: d.x,
                        y: d.y - 14,
                        t: 0,
                        text: pts + (combo > 1 ? `  x${combo}` : ''),
                        rare: d.rare
                    });
                    for (let i = 0; i < 10; i++) feathers.push({
                        x: d.x, y: d.y, vx: rnd(-50, 50), vy: rnd(-70, 10), t: 0,
                        col: i % 3 === 0 ? '#fff' : DUCK_COLORS[d.type].belly, r: rnd(0, Math.PI)
                    });
                    if (d.rare) dropPickup(d.x, d.y, ['shell', 'freeze', 'double'][irnd(0, 2)]);
                    if (!muted) SFX.hit();
                }
                break;
            }
        }
        if (!hitAny) {
            combo = 0;
            perfectRound = false;
        }
        if (ammo === 0) {
            const flying = ducks.filter(d => d.mode === 'fly');
            if (flying.length) {
                flying.forEach(d => d.mode = 'flyaway');
                if (!muted) SFX.flyoff();
                dog = {t: 0, mode: 'laugh', x: W / 2, count: 0};
                if (!muted) setTimeout(() => {
                    if (!muted) SFX.laugh();
                }, 500);
                perfectRound = false;
            }
        }
    }

    /* ---------------- Power-ups ---------------- */
    const PICKUP_INFO = {
        shell: {col: '#ffd23f', label: '+1 SHELL'},
        freeze: {col: '#7fd8ff', label: 'TIME FREEZE'},
        double: {col: '#ff7fd0', label: 'DOUBLE POINTS'},
    };

    function dropPickup(x, y, kind) {
        pickups.push({x, y, vy: 26, kind, t: 0, taken: false});
    }

    function applyPickup(kind, x, y) {
        if (!muted) SFX.power();
        popups.push({x, y: y - 10, t: 0, text: PICKUP_INFO[kind].label, rare: true});
        if (kind === 'shell') ammo = Math.min(ammo + 1, 6);
        if (kind === 'freeze') freezeT = 4;
        if (kind === 'double') doubleT = 8;
    }

    function updatePickups(dt) {
        for (const p of pickups) {
            p.t += dt;
            if (!p.taken) {
                p.y += p.vy * dt;
                p.x += Math.sin(p.t * 3) * 12 * dt;
            }
            if (p.y > H - 66) p.taken = true;  // lost in the grass
        }
        pickups = pickups.filter(p => !p.taken);
    }

    function drawPickups() {
        for (const p of pickups) {
            const info = PICKUP_INFO[p.kind];
            cx.save();
            cx.translate(Math.round(p.x), Math.round(p.y));
            // tiny parachute
            cx.fillStyle = '#e8e8ec';
            cx.fillRect(-7, -14, 14, 4);
            cx.fillRect(-5, -16, 10, 2);
            cx.strokeStyle = 'rgba(255,255,255,0.6)';
            cx.lineWidth = 1;
            cx.beginPath();
            cx.moveTo(-6, -10);
            cx.lineTo(-3, -2);
            cx.moveTo(6, -10);
            cx.lineTo(3, -2);
            cx.stroke();
            // crate, pulsing
            const pulse = frame % 30 < 15;
            cx.fillStyle = pulse ? '#fff' : info.col;
            cx.fillRect(-5, -2, 10, 10);
            cx.fillStyle = '#000';
            cx.font = 'bold 8px monospace';
            cx.textAlign = 'center';
            cx.fillText(p.kind === 'shell' ? '+' : (p.kind === 'freeze' ? '❄' : '2×'), 0, 6);
            cx.restore();
        }
    }

    /* ---------------- Wave / round flow ---------------- */
    function startRound(r) {
        round = r;
        wave = 0;
        hitsThisRound = 0;
        ducksThisRound = 0;
        perfectRound = true;
        cardText = `ROUND ${r}`;
        cardSub = r === 1 ? 'CLICK TO SHOOT · 3 SHELLS PER WAVE'
            : r % 3 === 0 ? 'SOMETHING BIG IS COMING...'
                : (r >= 4 ? 'DUSK FALLS. THEY FLY FASTER.' : 'THEY FLY FASTER NOW');
        state = ST.ROUNDCARD;
        cardTimer = 1.8;
        if (!muted) SFX.round();
    }

    function nextWave() {
        wave++;
        if (wave > wavesPerRound) {
            // round over: need 60% hits to advance
            const need = Math.ceil(ducksThisRound * 0.6);
            if (hitsThisRound >= need) {
                if (perfectRound) {
                    score += 1000 * round;
                    if (!muted) SFX.perfect();
                    popups.push({x: W / 2, y: H / 2 - 30, t: 0, text: `PERFECT! +${1000 * round}`, rare: true});
                }
                startRound(round + 1);
            } else {
                state = ST.GAMEOVER;
                cardTimer = 0;
                best = Math.max(best, score);
                store.set('duckhunt26_best', String(best));
                stopMusic();
                if (!muted) SFX.over();
            }
            return;
        }
        spawnDucks();
    }

    /* ---------------- Input ---------------- */
    function toGame(e) {
        const r = cv.getBoundingClientRect();
        const px = ((e.clientX ?? e.touches?.[0]?.clientX) - r.left) / r.width * W;
        const py = ((e.clientY ?? e.touches?.[0]?.clientY) - r.top) / r.height * H;
        return {x: clamp(px, 0, W), y: clamp(py, 0, H)};
    }

    cv.addEventListener('mousemove', e => {
        const p = toGame(e);
        mouse.x = p.x;
        mouse.y = p.y;
        mouse.inside = true;
    });
    cv.addEventListener('mouseleave', () => mouse.inside = false);
    cv.addEventListener('mousedown', e => {
        const p = toGame(e);
        press(p.x, p.y);
    });
    cv.addEventListener('touchstart', e => {
        e.preventDefault();
        const p = toGame(e);
        mouse.x = p.x;
        mouse.y = p.y;
        mouse.inside = true;
        press(p.x, p.y);
    }, {passive: false});
    addEventListener('keydown', e => {
        if (e.key === 'm' || e.key === 'M') muted = !muted;
        if ((e.key === 'Enter' || e.key === ' ') && (state === ST.TITLE || state === ST.GAMEOVER)) beginGame();
    });

    function press(x, y) {
        ac(); // unlock audio
        if (state === ST.TITLE || state === ST.GAMEOVER) {
            beginGame();
            return;
        }
        if (state === ST.ROUNDCARD) return;
        shoot(x, y);
    }

    function beginGame() {
        score = 0;
        combo = 0;
        ducks = [];
        feathers = [];
        popups = [];
        dog = null;
        pickups = [];
        freezeT = 0;
        doubleT = 0;
        bossWave = false;
        startMusic(true);   // full band
        startRound(1);
    }

    /* ---------------- Update ---------------- */
    let last = performance.now();

    function loop(now) {
        const dt = Math.min(0.05, (now - last) / 1000);
        last = now;
        time += dt;
        frame++;
        titlePulse += dt;

        shake = Math.max(0, shake - dt * 30);
        flash = Math.max(0, flash - dt * 3);
        freezeT = Math.max(0, freezeT - dt);
        doubleT = Math.max(0, doubleT - dt);
        if (comboTimer > 0) {
            comboTimer -= dt;
            if (comboTimer <= 0) combo = 0;
        }
        clouds.forEach(c => {
            c.x += c.v * dt;
            if (c.x > W + 60) c.x = -60;
        });
        feathers.forEach(f => {
            f.t += dt;
            f.x += f.vx * dt;
            f.y += f.vy * dt;
            f.vy += 80 * dt;
            f.r += dt * 4;
        });
        feathers = feathers.filter(f => f.t < 1.4);
        popups.forEach(p => {
            p.t += dt;
            p.y -= 20 * dt;
        });
        popups = popups.filter(p => p.t < 1.2);
        updatePickups(dt);
        // fireflies drift in at dusk
        const duskAmt = skyT();
        if (duskAmt > 0.35 && fireflies.length < 14 && Math.random() < dt * 2) {
            fireflies.push({x: rnd(0, W), y: rnd(H - 140, H - 60), ph: rnd(0, 6), vx: rnd(-8, 8), vy: rnd(-4, 4)});
        }
        fireflies.forEach(f => {
            f.ph += dt * 3;
            f.x += f.vx * dt;
            f.y += f.vy * dt;
            if (Math.random() < dt * 0.4) {
                f.vx = rnd(-10, 10);
                f.vy = rnd(-6, 6);
            }
            f.x = clamp(f.x, 0, W);
            f.y = clamp(f.y, H - 150, H - 55);
        });
        if (duskAmt < 0.35) fireflies.length = 0;
        if (flashRing) {
            flashRing.t += dt;
            if (flashRing.t > 0.25) flashRing = null;
        }
        if (dog) {
            dog.t += dt;
            if (dog.t > 1.6) dog = null;
        }

        if (state === ST.ROUNDCARD) {
            cardTimer -= dt;
            if (cardTimer <= 0) {
                state = ST.PLAY;
                nextWaveGate = true;
                spawnDucks();
                wave = 1;
            }
        } else if (state === ST.PLAY) {
            updateDucks(dt);
            waveTimer -= dt;
            const active = ducks.filter(d => d.mode !== 'gone');
            if (waveTimer <= 0) {
                const flying = ducks.filter(d => d.mode === 'fly');
                if (flying.length) {
                    flying.forEach(d => d.mode = 'flyaway');
                    if (!muted) SFX.flyoff();
                    dog = {t: 0, mode: 'laugh', x: W / 2, count: 0};
                    if (!muted) setTimeout(() => {
                        if (!muted) SFX.laugh();
                    }, 400);
                    perfectRound = false;
                }
                waveTimer = 99; // wait for flyaway to clear
            }
            if (active.length === 0) nextWave();
        }

        draw();
        requestAnimationFrame(loop);
    }

    let nextWaveGate = false;

    function shakeVal() {
        return shake > 0;
    }

    /* ---------------- Drawing ---------------- */
    function draw() {
        const t = skyT();
        cx.save();
        if (shake > 0) cx.translate(rnd(-shake, shake), rnd(-shake, shake));

        // sky
        const g = cx.createLinearGradient(0, 0, 0, H);
        g.addColorStop(0, lerpColor(SKY_TOP[0], SKY_TOP[1], t));
        g.addColorStop(1, lerpColor(SKY_BOT[0], SKY_BOT[1], t));
        cx.fillStyle = g;
        cx.fillRect(0, 0, W, H);

        // sun / moon
        const sunY = lerp(46, 190, t);
        cx.fillStyle = t < 0.5 ? '#fff3b0' : '#ffb454';
        cx.beginPath();
        cx.arc(W - 80, sunY, 16, 0, 7);
        cx.fill();
        if (t > 0.6) {
            cx.fillStyle = '#e8e8f8';
            cx.beginPath();
            cx.arc(70, 50, 10, 0, 7);
            cx.fill();
            cx.fillStyle = lerpColor(SKY_TOP[0], SKY_TOP[1], t);
            cx.beginPath();
            cx.arc(74, 47, 9, 0, 7);
            cx.fill();
        }
        // stars at dusk
        if (t > 0.5) {
            cx.fillStyle = 'rgba(255,255,255,' + ((t - 0.5) * 2 * 0.8) + ')';
            for (let i = 0; i < 24; i++) {
                const sx = (i * 97) % W, sy = (i * 53) % 120;
                if ((frame + i * 7) % 90 < 80) cx.fillRect(sx, sy, 1, 1);
            }
        }

        // clouds
        clouds.forEach(c => {
            cx.fillStyle = `rgba(255,255,255,${lerp(0.85, 0.25, t)})`;
            const s = c.s;
            cx.fillRect(c.x, c.y, 34 * s, 8 * s);
            cx.fillRect(c.x + 6 * s, c.y - 5 * s, 20 * s, 6 * s);
        });

        // distant treeline: proper pixel trees (trunk + layered canopy)
        const treeCol = lerpColor(TREE_COL[0], TREE_COL[1], t);
        const treeDark = lerpColor([24, 78, 30], [16, 36, 32], t);
        const trunkCol = lerpColor([92, 62, 34], [44, 34, 30], t);
        for (const tr of TREES) {
            const bx = tr.x, base = H - 58, s = tr.s;
            // trunk
            cx.fillStyle = trunkCol;
            cx.fillRect(bx - 2 * s, base - 14 * s, 4 * s, 14 * s);
            // canopy: three stacked, narrowing blobs
            cx.fillStyle = treeCol;
            cx.fillRect(bx - 13 * s, base - 26 * s, 26 * s, 13 * s);
            cx.fillRect(bx - 10 * s, base - 35 * s, 20 * s, 11 * s);
            cx.fillRect(bx - 6 * s, base - 42 * s, 12 * s, 9 * s);
            // shading on the right side + under-canopy
            cx.fillStyle = treeDark;
            cx.fillRect(bx + 5 * s, base - 26 * s, 8 * s, 13 * s);
            cx.fillRect(bx + 3 * s, base - 35 * s, 7 * s, 11 * s);
            cx.fillRect(bx + 1 * s, base - 42 * s, 5 * s, 9 * s);
            cx.fillRect(bx - 13 * s, base - 15 * s, 26 * s, 2 * s);
        }

        // ducks behind grass
        ducks.forEach(drawDuck);

        // pickups drift down over everything airborne
        drawPickups();

        // fireflies (dusk ambience)
        fireflies.forEach(f => {
            const glow = (Math.sin(f.ph) + 1) / 2;
            cx.fillStyle = `rgba(220,255,140,${0.25 + glow * 0.65})`;
            cx.fillRect(Math.round(f.x), Math.round(f.y), 2, 2);
        });

        // feathers
        feathers.forEach(f => {
            cx.save();
            cx.translate(f.x, f.y);
            cx.rotate(f.r);
            cx.fillStyle = f.col;
            cx.globalAlpha = clamp(1.4 - f.t, 0, 1);
            cx.fillRect(-2, -1, 4, 2);
            cx.restore();
        });

        // grass
        cx.fillStyle = lerpColor(GRASS_A[0], GRASS_A[1], t);
        cx.fillRect(0, H - 60, W, 60);
        cx.fillStyle = lerpColor(GRASS_B[0], GRASS_B[1], t);
        for (let i = 0; i < W; i += 8) {
            const h = 6 + ((i * 13) % 9);
            cx.fillRect(i, H - 60, 4, -h);
        }
        // bush left, bush right
        cx.fillStyle = lerpColor(GRASS_B[0], GRASS_B[1], t);
        cx.fillRect(10, H - 84, 44, 30);
        cx.fillRect(20, H - 94, 24, 14);
        cx.fillRect(W - 60, H - 80, 46, 26);

        // dog
        if (dog) drawDog(dog);

        // active power-up ambience
        if (freezeT > 0) {
            cx.fillStyle = `rgba(127,216,255,${Math.min(0.16, freezeT * 0.1)})`;
            cx.fillRect(0, 0, W, H);
        }

        // popups
        popups.forEach(p => {
            cx.font = 'bold 10px monospace';
            cx.textAlign = 'center';
            cx.fillStyle = p.rare ? '#ffd23f' : '#ffffff';
            cx.globalAlpha = clamp(1.2 - p.t, 0, 1);
            cx.fillText(p.text, p.x, p.y);
            cx.globalAlpha = 1;
        });

        // muzzle flash ring
        if (flashRing) {
            const r = flashRing.t * 90;
            cx.strokeStyle = `rgba(255,240,180,${1 - flashRing.t * 4})`;
            cx.lineWidth = 2;
            cx.beginPath();
            cx.arc(flashRing.x, flashRing.y, r, 0, 7);
            cx.stroke();
        }

        // HUD
        if (state === ST.PLAY || state === ST.ROUNDCARD) drawHUD(t);

        // screens
        if (state === ST.TITLE) drawTitle();
        if (state === ST.ROUNDCARD) drawCard();
        if (state === ST.GAMEOVER) drawGameOver();

        // crosshair
        if (mouse.inside) drawCrosshair(mouse.x, mouse.y);

        // white flash on shot
        if (flash > 0) {
            cx.fillStyle = `rgba(255,255,255,${flash * 0.5})`;
            cx.fillRect(0, 0, W, H);
        }

        cx.restore();
    }

    function drawHUD(t) {
        cx.font = 'bold 11px monospace';
        cx.textAlign = 'left';
        cx.fillStyle = 'rgba(0,0,0,0.35)';
        cx.fillRect(0, 0, W, 20);
        cx.fillStyle = '#fff';
        cx.fillText('SCORE ' + String(score).padStart(6, '0'), 8, 14);
        cx.textAlign = 'center';
        cx.fillText('R' + round + ' · WAVE ' + Math.min(wave, wavesPerRound) + '/' + wavesPerRound, W / 2, 14);
        // shells (up to 6 with pickups)
        cx.textAlign = 'right';
        const maxShells = Math.max(3, ammo);
        for (let i = 0; i < maxShells; i++) {
            cx.fillStyle = i < ammo ? '#ffd23f' : 'rgba(255,255,255,0.2)';
            cx.fillRect(W - 14 - i * 10, 5, 6, 10);
            cx.fillStyle = i < ammo ? '#e07020' : 'rgba(255,255,255,0.12)';
            cx.fillRect(W - 14 - i * 10, 5, 6, 3);
        }
        // active effect badges under the shell row
        let bx = W - 8;
        if (freezeT > 0) {
            cx.font = 'bold 9px monospace';
            cx.textAlign = 'right';
            cx.fillStyle = '#7fd8ff';
            cx.fillText('❄ ' + freezeT.toFixed(1), bx, 30);
            bx -= 54;
        }
        if (doubleT > 0) {
            cx.font = 'bold 9px monospace';
            cx.textAlign = 'right';
            cx.fillStyle = '#ff7fd0';
            cx.fillText('2× ' + doubleT.toFixed(1), bx, 30);
        }
        // boss banner
        if (bossWave && ducks.some(d => d.boss && d.mode === 'fly')) {
            cx.font = 'bold 11px monospace';
            cx.textAlign = 'center';
            cx.fillStyle = frame % 40 < 24 ? '#ff5a3c' : '#ffd23f';
            cx.fillText('!! BOSS GOOSE !!', W / 2, 40);
        }
        // hit meter bottom
        const need = Math.ceil(Math.max(ducksThisRound, wavesPerRound) * 0.6);
        cx.textAlign = 'left';
        cx.fillStyle = 'rgba(255,255,255,0.8)';
        cx.font = '9px monospace';
        cx.fillText('HITS ' + hitsThisRound, 8, H - 8);
        if (combo > 1) {
            cx.textAlign = 'center';
            cx.font = 'bold 12px monospace';
            cx.fillStyle = '#ffd23f';
            cx.fillText('COMBO x' + combo, W / 2, H - 8);
        }
        // wave timer bar
        if (state === ST.PLAY && waveTimer < 90) {
            const maxT = Math.max(4.5, 8 - round * 0.5);
            const frac = clamp(waveTimer / maxT, 0, 1);
            cx.fillStyle = 'rgba(0,0,0,0.3)';
            cx.fillRect(W / 2 - 40, 24, 80, 4);
            cx.fillStyle = frac < 0.3 ? '#ff5a3c' : '#ffd23f';
            cx.fillRect(W / 2 - 40, 24, 80 * frac, 4);
        }
        cx.fillStyle = 'rgba(255,255,255,0.4)';
        cx.font = '8px monospace';
        cx.textAlign = 'right';
        cx.fillText(muted ? '[M] UNMUTE' : '[M] MUTE', W - 8, H - 8);
    }

    function drawCrosshair(x, y) {
        cx.strokeStyle = '#fff';
        cx.lineWidth = 1;
        cx.beginPath();
        cx.arc(x, y, 7, 0, 7);
        cx.stroke();
        cx.beginPath();
        cx.moveTo(x - 11, y);
        cx.lineTo(x - 4, y);
        cx.moveTo(x + 4, y);
        cx.lineTo(x + 11, y);
        cx.moveTo(x, y - 11);
        cx.lineTo(x, y - 4);
        cx.moveTo(x, y + 4);
        cx.lineTo(x, y + 11);
        cx.stroke();
        cx.fillStyle = '#ff5a3c';
        cx.fillRect(x - 1, y - 1, 2, 2);
    }

    function drawDog(d) {
        // pixel dog rising from grass
        const rise = d.t < 0.4 ? d.t / 0.4 : (d.t > 1.2 ? 1 - (d.t - 1.2) / 0.4 : 1);
        const baseY = H - 52 + (1 - clamp(rise, 0, 1)) * 40;
        const x = d.mode === 'fetch' ? clamp(d.x, 40, W - 40) : W / 2;
        cx.save();
        cx.beginPath();
        cx.rect(0, 0, W, H - 52);
        cx.clip();
        const p = (ox, oy, w, h, c) => {
            cx.fillStyle = c;
            cx.fillRect(Math.round(x + ox), Math.round(baseY + oy), w, h);
        };
        // body
        p(-12, -16, 24, 16, '#b07830');
        p(-14, -20, 12, 10, '#b07830');   // head
        p(-16, -18, 4, 4, '#7a4c18');     // snout
        p(-6, -24, 4, 6, '#7a4c18');      // ear
        p(-11, -18, 2, 2, '#000');        // eye
        if (d.mode === 'laugh') {
            // bouncing + open mouth
            const b = Math.abs(Math.sin(d.t * 12)) * 3;
            cx.translate(0, -b);
            p(-16, -14, 5, 3, '#802020');   // laughing mouth
            if (Math.floor(d.t * 8) % 2 === 0) {
                cx.font = 'bold 9px monospace';
                cx.fillStyle = '#fff';
                cx.textAlign = 'center';
                cx.fillText('HA HA!', x, baseY - 30);
            }
        } else {
            // holds duck up
            p(-2, -30, 14, 10, '#7a4a1e');
            p(8, -34, 7, 6, '#1e6b2e');
            cx.font = '8px monospace';
            cx.fillStyle = '#fff';
            cx.textAlign = 'center';
            cx.fillText('GOT IT!', x, baseY - 38);
        }
        cx.restore();
    }

    function drawTitle() {
        cx.fillStyle = 'rgba(6,8,24,0.55)';
        cx.fillRect(0, 0, W, H);
        const bob = Math.sin(titlePulse * 2) * 3;
        cx.textAlign = 'center';
        cx.font = 'bold 34px monospace';
        cx.fillStyle = '#000';
        cx.fillText('DUCK HUNT', W / 2 + 2, 96 + bob + 2);
        cx.fillStyle = '#ffd23f';
        cx.fillText('DUCK HUNT', W / 2, 96 + bob);
        cx.font = 'bold 14px monospace';
        cx.fillStyle = '#ff5a3c';
        cx.fillText("'26", W / 2 + 92, 78 + bob);
        // demo duck flying across
        const dx = (titlePulse * 60) % (W + 80) - 40;
        cx.save();
        cx.translate(dx, 140 + Math.sin(titlePulse * 3) * 10);
        drawDuck({x: 0, y: 0, vx: 1, vy: 0, flap: titlePulse * 10, mode: 'fly', type: 0, rare: false, stateT: 0});
        cx.restore();
        cx.font = '11px monospace';
        cx.fillStyle = '#fff';
        cx.fillText('3 shells per wave · hit 60% to advance', W / 2, 186);
        cx.fillText('blue ducks drop power-ups · click crates to grab them', W / 2, 202);
        cx.fillText('every 3rd round: the BOSS GOOSE', W / 2, 218);
        if (Math.floor(titlePulse * 2) % 2 === 0) {
            cx.font = 'bold 13px monospace';
            cx.fillStyle = '#ffd23f';
            cx.fillText('CLICK TO START', W / 2, 240);
        }
        if (best > 0) {
            cx.font = '10px monospace';
            cx.fillStyle = 'rgba(255,255,255,.7)';
            cx.fillText('BEST ' + best, W / 2, 262);
        }
    }

    function drawCard() {
        cx.fillStyle = 'rgba(0,0,0,0.45)';
        cx.fillRect(0, H / 2 - 36, W, 72);
        cx.textAlign = 'center';
        cx.font = 'bold 22px monospace';
        cx.fillStyle = '#ffd23f';
        cx.fillText(cardText, W / 2, H / 2 - 4);
        cx.font = '10px monospace';
        cx.fillStyle = '#fff';
        cx.fillText(cardSub, W / 2, H / 2 + 18);
    }

    function drawGameOver() {
        cx.fillStyle = 'rgba(6,8,24,0.6)';
        cx.fillRect(0, 0, W, H);
        cx.textAlign = 'center';
        cx.font = 'bold 26px monospace';
        cx.fillStyle = '#ff5a3c';
        cx.fillText('THE DUCKS WON', W / 2, 110);
        cx.font = 'bold 14px monospace';
        cx.fillStyle = '#fff';
        cx.fillText('SCORE  ' + score, W / 2, 150);
        cx.fillStyle = score >= best && score > 0 ? '#ffd23f' : 'rgba(255,255,255,.7)';
        cx.font = '11px monospace';
        cx.fillText((score >= best && score > 0 ? '★ NEW BEST ★' : 'BEST  ' + best), W / 2, 172);
        cx.fillText('you reached round ' + round, W / 2, 194);
        if (Math.floor(time * 2) % 2 === 0) {
            cx.font = 'bold 12px monospace';
            cx.fillStyle = '#ffd23f';
            cx.fillText('CLICK TO HUNT AGAIN', W / 2, 232);
        }
    }

    requestAnimationFrame(loop);
</script>
<script src="../logo.js"></script>
</body>
</html>
